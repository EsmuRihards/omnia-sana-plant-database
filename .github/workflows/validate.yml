name: Validate references

# Runs the reference-integrity checker on every push and pull request so a
# broken REF-XXXX -> BibTeX link can never silently land on the main branch.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate references
        run: python validate_references.py
