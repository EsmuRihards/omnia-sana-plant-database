name: Validate database

# Runs the integrity checker on every push and pull request so a broken
# REF-XXXX -> BibTeX link, an unknown action/condition/compound id, or a
# malformed record can never silently land.

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate database
        run: python scripts/validate.py
