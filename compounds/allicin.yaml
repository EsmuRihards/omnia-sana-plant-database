id: allicin
name: Allicin / organosulfur thiosulfinates
class: organosulfur
synonyms:
- ajoene
- allicin
- alliin
- s-allyl-cysteine
toxicity_flag: dose-limited
description: GATE. Declared by 1 plant. Antiplatelet activity is the recognised interaction hazard. Note
  allicin is not present in intact garlic and forms on crushing, then degrades - an extraction recommendation
  keyed on it is a claim about an unstable analyte.
