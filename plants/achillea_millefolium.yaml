botanical_description:
  text: Aromatic, rhizomatous perennial herb with erect, grooved, softly hairy stems arising in clumps
    from a creeping rootstock. The leaves are alternate, 2-3-pinnately dissected into narrow feathery
    segments, giving the whole plant a soft, fern-like texture (hence 'millefolium', thousand-leaved).
    Numerous small white to pale-pink flower heads are borne in dense, flat-topped compound corymbs at
    the stem tips. The plant has a sweet, herbaceous, slightly medicinal aroma when crushed.
  height: 20-100 cm (occasionally to 1 m)
  habit: Erect, rhizomatous, mat-forming perennial herb
  leaves: Alternate, 2-3-pinnately dissected into narrow feathery segments; aromatic when crushed
  flowers: Small white to pale pink flower heads in dense, flat-topped compound corymbs
  stem: Erect, grooved, softly hairy/woolly, plain green (never purple-blotched)
  root: Creeping, fibrous rhizome
  fruit: Small flattened achenes without pappus
  flowering_period: June-September
  reference_ids:
  - REF-0369
  status: verified
habitat:
  text: A common plant of grassland, meadows, roadsides, pastures and waste ground on a wide range of
    soils; native throughout Europe and temperate Asia and now naturalised across North America, Australia
    and New Zealand.
  reference_ids:
  - REF-0369
  status: verified
harvesting:
  text: The flowering aerial parts (leaf, stem and flower) are cut as the flat-topped corymbs open, in
    mid- to late summer, and dried quickly in a warm, shaded, airy place to preserve the essential oil
    and colour.
  parts:
  - Flower
  - Leaf
  - Stem
  season: Summer, at full flower (June-September)
  reference_ids:
  - REF-0369
  status: verified
traditional_uses:
  text: Yarrow has an ancient reputation as a wound herb (its old name 'staunchweed' and its association
    with Achilles reflect traditional use to stop bleeding and heal wounds) and as a bitter digestive
    and diaphoretic remedy for feverish colds, spasmodic gastrointestinal complaints, hepatobiliary disorders
    and gynaecological complaints. The flowering herb is classically taken as a hot infusion at the onset
    of a cold or fever to promote sweating, and used as a bitter tonic to stimulate appetite and digestion.
  reference_ids:
  - REF-0369
  - REF-2077
  status: verified
preparations:
- name: Infusion
  text: Dried flowering herb infused in hot water as a bitter digestive and diaphoretic tea, traditionally
    taken hot at the onset of colds and fevers.
  reference_ids:
  - REF-0369
  status: verified
- name: Tincture
  text: Alcoholic extract of the fresh or dried flowering herb, typically around 1:5 in 45% alcohol.
  status: draft
- name: Poultice/compress
  text: Fresh crushed leaf or flowering tops applied directly to minor cuts and wounds, reflecting the
    traditional styptic (bleeding-stopping) and vulnerary use.
  reference_ids:
  - REF-0369
  - REF-2085
  status: verified
- name: Essential oil
  text: Steam-distilled from the flowering tops; the chamazulene-rich blue oil is used in low dilution
    for its anti-inflammatory action.
  reference_ids:
  - REF-0369
  status: draft
dosage:
- name: Dried herb infusion
  text: The EU herbal monograph gives 1.5-4 g of the comminuted herb in 150-250 mL of boiling water as
    an infusion, three or four times daily between meals; for loss of appetite the liquid preparations
    are taken 30 minutes before meals. Educational reference only, not a prescription.
  reference_ids:
  - REF-3064
  - REF-0373
  status: verified
- name: Tincture (ethanol 45% V/V)
  text: The EU herbal monograph gives 2-4 mL three times daily in adolescents, adults and elderly. Educational
    reference only, not a prescription.
  reference_ids:
  - REF-3064
  status: verified
