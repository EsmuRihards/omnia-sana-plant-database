contraindications:
- note: Generally very safe. Rarely causes contact dermatitis in sensitive individuals (sesquiterpene
    lactones, same Asteraceae family). Avoid high doses during pregnancy (emmenagogue at large doses).
    May increase photosensitivity. Allergic reactions uncommon but possible in those sensitive to Asteraceae
    plants.
  severity: caution
  reference_ids:
  - REF-0011
  - REF-0098
  - REF-0296
  status: verified
- note: 'Duke (2002) rates yarrow as ++ with clinical evidence (score 2) for antibacterial, antiseptic,
    antispasmodic, choleretic, aperitif, and astringent activities, consistent with Commission E (KOM)
    approval for loss of appetite and dyspeptic ailments. Yarrow contains achillin, achilleic acid, and
    apigenin — compounds with anti-inflammatory and hemostatic properties. Traditional use for wound healing,
    fever management, and digestive complaints is well-supported. Dose: 2–4 g dried herb as tea three
    times daily. Caution: yarrow belongs to the Asteraceae family and can cause allergic reactions in
    sensitive individuals; rare contact dermatitis from sesquiterpene lactones has been reported. Contraindicated
    in pregnancy due to potential emmenagogue effects (Duke, 2002).'
  severity: caution
  reference_ids:
  - REF-0011
  - REF-0098
  - REF-0296
  status: verified
- note: As a member of the daisy family (Asteraceae) it can cause allergic reactions or contact dermatitis
    in sensitive people, and handling the fresh plant in sunlight can occasionally cause photosensitivity.
  severity: info
  reference_ids:
  - REF-0369
  status: verified
- note: Medicinal use is traditionally avoided in pregnancy (can stimulate the uterus and influence menstruation);
    caution while breastfeeding.
  severity: caution
  reference_ids:
  - REF-0373
  status: verified
- note: May interact with anticoagulant, sedative and blood-pressure medications and with drugs metabolised
    by the liver; seek professional advice if on regular medication.
  severity: caution
  reference_ids:
  - REF-0369
  status: verified
- note: Correct identification is essential, as several poisonous white-flowered umbellifers can be confused
    with yarrow; clinical evidence in humans is limited.
  severity: info
  reference_ids:
  - REF-0370
  - REF-0369
  status: verified
