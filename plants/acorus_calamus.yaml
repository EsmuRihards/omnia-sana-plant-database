internal_notes: 'Enriched 2026-06-12 from scientific literature (Journal of Applied Toxicology asarone
  toxicology review; Phytochemistry systematic review). Record status set to needs-review because beta-asarone
  carries documented carcinogenicity and regulatory restrictions. Originally a skeleton imported from
  the omniasana.bio Symptom-to-Plant Lookup tool (indigestion, bloating, appetite-loss); associations
  retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced review of
  Acorus calamus in neurological and metabolic disorders (REF-0624) supporting the preclinical nervine/neuroprotective
  activity. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split out, constituents
  linked to compounds). | 2026-06-20: added 3 PubMed-sourced references to the plant-level references
  bucket (least-cited enrichment): REF-0716, REF-0717, REF-0718.'
