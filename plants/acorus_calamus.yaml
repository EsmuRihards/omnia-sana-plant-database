id: acorus-calamus
scientific_name: Acorus calamus
common_names:
- Sweet Flag
- Calamus
- Sweet sedge
- Sweet root
family: Acoraceae
parts_used:
- Rhizome
constituents:
- name: Phenylpropanoid asarones (alpha- and beta-asarone)
