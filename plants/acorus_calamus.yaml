dangerous_lookalikes:
- dangerous_plant: iris-pseudacorus
  severity: irritant
  confused_part: Sword-shaped leaves and the aromatic rhizome gathered from wet ground; yellow flag iris
    grows in the same wet habitat with near-identical sword-shaped leaves.
  confusion_context: 'Sweet flag (Acorus calamus) is foraged in marshes and pond margins for its aromatic
    rhizome and leaves. Yellow flag iris (Iris pseudacorus) grows in exactly the same wet habitat and
    has near-identical erect sword-shaped leaves - its very name pseudacorus means ''false sweet-flag.''
    Iris pseudacorus is a low-severity poison: all parts, especially the rhizome, cause salivation, vomiting
    and diarrhoea if eaten, and the sap can irritate skin. Because a non-flowering iris clump is easily
    taken for sweet flag, and the prized part (the rhizome) is the most toxic part of the iris, this is
    a genuine foraging hazard.'
  distinguishing_features:
  - 'SMELL (decisive): crush a leaf or the rhizome. Sweet flag is strongly and sweetly aromatic (spicy/citrus).
    Yellow flag iris has no such fragrance - it is odourless.'
  - 'Leaf detail: sweet flag has a prominent off-centre raised midrib and one crinkled/wavy leaf margin.
    Iris leaves are flat and plain with a central midrib and straight (not wavy) margins.'
  - 'Flower/structure: sweet flag bears a unique finger-like green spadix angling out from the side of
    a leaf-like stalk. Yellow flag iris bears showy bright-yellow iris flowers. If it has a yellow iris
    flower, it is not sweet flag.'
  key_test: Crush a leaf and smell it. A strong sweet, spicy-citrus aroma with a wavy leaf margin and
    an off-centre midrib = sweet flag. No fragrance, flat leaves with straight margins, and (in season)
    bright-yellow iris flowers = yellow flag iris - do not eat; its rhizome causes vomiting and diarrhoea.
    If there is no aroma, do not use it.
  reference_ids:
  - REF-2667
  - REF-2668
