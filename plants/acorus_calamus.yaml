contraindications:
- note: 'SERIOUS: beta-asarone is hepatotoxic, mutagenic and carcinogenic in animal studies. Regulators
    have restricted internal use of asarone-containing Acorus calamus (the Asian high-beta-asarone varieties),
    and it is banned as a food additive in the USA. Avoid internal use except properly characterised beta-asarone-free
    preparations.'
  severity: serious
  reference_ids:
  - REF-0515
  - REF-0516
  status: verified
- note: Do not use in pregnancy or breastfeeding, or for prolonged periods. The North American variety
    (Acorus americanus) is essentially beta-asarone-free, but most commercial calamus is not.
  severity: caution
  reference_ids:
  - REF-0515
  status: verified
