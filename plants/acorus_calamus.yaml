botanical_description:
  text: Aromatic, semi-aquatic perennial herb spreading by a thick, branching, aromatic rhizome that creeps
    horizontally in mud at the water's edge. The leaves are erect, sword-shaped (ensiform), bright green
    and arranged in a fan like an iris, with a distinctive off-centre midrib and one crinkled, wavy margin.
    A small, finger-like, greenish-yellow flower spike (spadix) emerges obliquely part-way up a leaf-like
    flowering stem in summer, but in cool temperate climates the plant rarely sets viable seed and spreads
    mainly by rhizome division.
  height: 50-150 cm (leaves)
  habit: Erect, rhizomatous, semi-aquatic perennial herb
  leaves: Erect, sword-shaped, iris-like, with an off-centre midrib and one wavy margin; strongly aromatic
    when crushed
  flowers: Small greenish-yellow flowers crowded on a finger-like spadix borne obliquely on a leaf-like
    stalk
  stem: Leaf-like flowering stalk arising from the rhizome; the true stem is the underground rhizome
  root: Thick, branching, aromatic creeping rhizome
  fruit: Rarely sets viable seed in temperate climates; propagates mainly by rhizome division
  flowering_period: Late spring to summer
  reference_ids:
  - REF-0516
  status: verified
habitat:
  text: Grows in shallow water and wet mud at the margins of ponds, lakes, slow-moving rivers and marshes.
    Native to Asia and North America and long naturalised across Europe, where it was historically cultivated
    and traded for its aromatic rhizome.
  reference_ids:
  - REF-0516
  status: verified
harvesting:
  text: The rhizome is dug from autumn to early spring, when its aromatic oil content is highest, then
    washed, peeled and dried; the strong sweet-spicy fragrance released on cutting helps confirm correct
    identification against non-aromatic look-alikes such as yellow flag iris.
  parts:
  - Rhizome
  season: Autumn to early spring
  reference_ids:
  - REF-0516
  status: verified
traditional_uses:
  text: Sweet flag rhizome is a classic aromatic bitter and nervine of Ayurvedic and East Asian traditional
    medicine, used for indigestion, bloating, flatulence and poor appetite, and as a nervine tonic for
    memory, concentration and mild nervous complaints.
  reference_ids:
  - REF-0516
  status: verified
preparations:
- name: Decoction
  text: Dried, peeled rhizome simmered in water as a bitter digestive and nervine decoction.
  reference_ids:
  - REF-0516
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried rhizome.
  status: draft
- name: Powder
  text: Dried rhizome powdered and traditionally taken in small amounts, often with honey, as a digestive
    and nervine remedy.
  status: draft
dosage:
- name: All preparations
  text: Because beta-asarone is hepatotoxic, mutagenic and carcinogenic in animal studies and its content
    varies widely between varieties, no general dose is given here; internal use should be restricted
    to properly characterised, beta-asarone-free preparations under professional guidance. Educational
    reference only, not a prescription.
  reference_ids:
  - REF-0515
  - REF-0516
  status: draft
