contraindications:
- note: Rare reports of liver injury have prompted a precaution; large meta-analytic data found no evidence
    of hepatotoxicity, but stop use and seek advice if signs of liver problems occur (jaundice, dark urine,
    upper-abdominal pain).
  severity: serious
  reference_ids:
  - REF-0415
  - REF-0670
  status: verified
- note: Current evidence does not show an increased risk of breast cancer or proliferation of oestrogen-sensitive
    tissue, but women with or at risk of hormone-sensitive cancer should use it only under medical guidance.
  severity: info
  reference_ids:
  - REF-0416
  status: verified
- note: Not recommended during pregnancy or breastfeeding.
  severity: caution
