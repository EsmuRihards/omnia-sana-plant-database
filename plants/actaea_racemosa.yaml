botanical_description:
  text: Tall, woodland perennial herb rising from a thick, knotty, dark rhizome with wiry black roots.
    The leaves are large and compound (2-3-ternately divided), with sharply toothed, oval to lance-shaped
    leaflets. In summer it sends up tall, wand-like racemes of small, unpleasant-smelling white flowers
    held well above the foliage, giving rise to the old name 'bugbane'; the flowers lack petals and consist
    mainly of a fluffy cluster of white stamens.
  height: 1-2.5 m (flowering stems)
  habit: Tall, rhizomatous, woodland perennial herb
  leaves: Large, 2-3-ternately compound, with sharply toothed oval to lance-shaped leaflets
  flowers: Small, malodorous, petal-less white flowers with fluffy stamens in tall wand-like racemes
  stem: Tall, erect flowering stem well above the basal foliage
  root: Thick, knotty, dark rhizome with numerous wiry black roots
  fruit: Dry, follicle-like seed pods
  flowering_period: Summer (June-September)
  reference_ids:
  - REF-2398
  status: verified
habitat:
  text: Native to rich, shaded deciduous woodland and woodland margins of eastern North America, from
    southern Canada to Georgia, typically on moist, humus-rich soils.
  reference_ids:
  - REF-2398
  status: verified
harvesting:
  text: The root and rhizome are dug in autumn, after the seeds have ripened and the foliage has died
    back and the plant's energy has returned to the rootstock; the rhizome is cleaned, cut and dried.
  parts:
  - Root and rhizome
  season: Autumn
  reference_ids:
  - REF-2398
  status: verified
traditional_uses:
  text: Black cohosh root was used by Native American peoples for gynaecological complaints, rheumatism
    and general malaise, and entered nineteenth-century Eclectic medicine as a remedy for menstrual and
    menopausal disorders. It remains best known today as a standardised extract for menopausal hot flashes,
    night sweats and mood disturbance.
  reference_ids:
  - REF-2398
  - REF-2589
  status: verified
preparations:
- name: Standardised extract
  text: Isopropanolic or ethanolic extracts of the dried root and rhizome, standardised to triterpene
    glycoside content, are the best-studied clinical form.
  reference_ids:
  - REF-0415
  - REF-2398
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried root and rhizome, typically around 1:10.
  status: draft
- name: Decoction
  text: Traditional decoction of the dried, chopped root and rhizome.
  reference_ids:
  - REF-2398
  status: draft
dosage:
- name: Standardised extract
  text: The WHO monograph on Rhizoma Cimicifugae Racemosae gives a daily dosage of 40-60% isopropyl alcohol
    or ethanol extracts of the crude drug corresponding to 40 mg of drug, which matches the extract dose
    used in clinical studies. Educational reference only, not a prescription.
  reference_ids:
  - REF-3100
  - REF-3098
  - REF-0415
  status: verified
- name: Tincture (1:10)
  text: Traditional herbal references suggest around 1-2 mL of a 1:10 tincture, up to three times daily.
    Neither the EU herbal monograph nor the WHO monograph gives a tincture posology - both specify
    standardised extract preparations only - so this figure is traditional rather than regulatory.
    Educational reference only, not a prescription.
  status: draft
actions:
- action: anticancer
  note: Black cohosh (Actaea racemosa) extracts and the triterpene glycoside actein inhibit proliferation
    of human breast, colon and liver cancer cells and potentiate chemotherapy (preclinical).
  reference_ids:
  - REF-2828
  - REF-2829
  - REF-2830
  - REF-2831
  status: needs-review
