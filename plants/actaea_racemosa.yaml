internal_notes: 'Enriched 2026-06-12 from scientific literature (Climacteric meta-analysis; Integrative
  Cancer Therapies systematic review). Actaea racemosa = Cimicifuga racemosa. Originally a skeleton imported
  from the omniasana.bio Symptom-to-Plant Lookup tool (menopause, hot-flashes, pms, anxiety); associations
  retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced systematic
  review (Borrelli & Ernst) that found the evidence for efficacy on menopausal symptoms inconsistent (REF-0623),
  added as a balancing counterpoint to the positive meta-analysis. Further enriched 2026-06-14 with five
  more PubMed sources (REF-0670..REF-0674) - a large isopropanolic-extract meta-analysis (REF-0670), a
  combination RCT (REF-0671), two null RCTs including an oncology Phase III trial (REF-0672, REF-0673)
  and an anxiety/depression meta-analysis (REF-0674). | 2026-06-15: migrated to entity schema (actions->vocab
  ids, indications split out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific
  publications: added 5 PubMed-verified @article sources (REF-2397, REF-2398, REF-2399, REF-2400, REF-2401)
  — woven into relevant actions/indications and the plant-level references bucket.'
