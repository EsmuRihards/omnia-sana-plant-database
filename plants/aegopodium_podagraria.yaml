contraindications:
- note: Generally safe as a food plant when young leaves are harvested. Contains furocoumarins (photosensitising
    compounds) — handling large quantities in bright sunlight may cause skin irritation. Individuals with
    Apiaceae allergies should exercise caution. Not recommended in therapeutic doses during pregnancy.
