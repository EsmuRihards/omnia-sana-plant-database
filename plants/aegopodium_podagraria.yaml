botanical_description:
  text: Vigorous, low, patch-forming perennial herb spreading rapidly by white, brittle, creeping rhizomes.
    The leaves are broad and twice-ternate (in threes of threes), with oval, sharply toothed leaflets,
    borne on long stalks. In summer it sends up hollow, grooved, unspotted green stems topped with flat
    umbels of small white flowers, typical of the carrot family. The whole plant smells mildly of parsley
    or carrot when crushed.
  height: 30-100 cm
  habit: Low, mat-forming, rhizomatous perennial herb
  leaves: Broad, twice-ternate, with oval sharply toothed leaflets in groups of three
  flowers: Small white flowers in flat compound umbels
  stem: Hollow, grooved, plain green (never purple-spotted)
  root: Thin, white, brittle, fast-spreading creeping rhizome
  fruit: Small ridged schizocarp typical of the carrot family
  flowering_period: May-July
  reference_ids:
  - REF-0719
  status: verified
habitat:
  text: A common weed of gardens, hedgerows, shaded waste ground and disturbed soil, often near old dwellings;
    native to Europe and temperate Asia and widely naturalised elsewhere, where its invasive spreading
    rhizomes make it a persistent garden weed.
  reference_ids:
  - REF-0719
  status: verified
harvesting:
  text: The young leaves and stems are gathered in spring, before flowering, when they are most tender
    and least bitter; the root can be dug at the same time. Careful identification against poisonous Apiaceae
    look-alikes (poison hemlock, hemlock water-dropwort, fool's parsley) is essential before harvesting.
  parts:
  - Leaf
  - Root
  - Stem
  season: Spring, before flowering
  reference_ids:
  - REF-0719
  status: verified
traditional_uses:
  text: Ground elder has long been used in European folk medicine as a remedy for gout and rheumatic and
    arthritic joint pain (reflected in the name 'podagraria', from podagra, gout), typically applied as
    a poultice or taken as a decoction. The young leaves have also been eaten as a spring pot-herb, valued
    for their nutrient content as well as their medicinal reputation.
  reference_ids:
  - REF-0719
  status: verified
preparations:
- name: Decoction
  text: Dried or fresh leaf, stem and root simmered in water as a traditional remedy for gout and rheumatic
    pain.
  reference_ids:
  - REF-0719
  status: verified
- name: Poultice
  text: Fresh leaves crushed or boiled and applied directly to gouty or arthritic joints.
  reference_ids:
  - REF-0719
  status: draft
- name: Fresh leaf (culinary/medicinal)
  text: Young spring leaves eaten as a cooked pot-herb, similarly to spinach, continuing the traditional
    food-medicine use.
  reference_ids:
  - REF-0719
  status: verified
dosage:
- name: Decoction / infusion
  text: Traditional use has no standardised modern dose; herbal references suggest a small handful of
    fresh leaf and stem per cup as an infusion or light decoction. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Polyacetylenes (falcarindiol)
  note: Falcarindiol, a potent COX-1 inhibitor (IC50 0.3 microM), identified as a key anti-inflammatory
    constituent underlying the plant's traditional anti-rheumatic and analgesic use.
