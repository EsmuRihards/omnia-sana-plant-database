id: aesculus-hippocastanum
scientific_name: Aesculus hippocastanum
common_names:
- Horse Chestnut
- Conker tree
- Buckeye
family: Sapindaceae
external_ids:
  gbif: 3189815
  wikidata: Q26899
parts_used:
- Seed (standardised extract)
constituents:
- name: Triterpene saponins (escin / aescin)
  compounds:
  - triterpene-saponin
  - terpene
  - saponin
  - escin
  note: The active mixture responsible for the venotonic and anti-oedematous effects; extracts are standardised
    to it. Escin is available as oral drages and a transdermal gel, with efficacy shown in chronic venous
    insufficiency and blunt-trauma injury.
  reference_ids:
  - REF-0471
  - REF-0470
  - REF-0590
  - REF-0677
  - REF-2402
- name: Flavonoids and coumarins (aesculin)
  compounds:
  - flavonoid
  - coumarin
  note: Supporting constituents of the seed.
  reference_ids:
  - REF-0471
  - REF-2406
botanical_description:
  text: Large deciduous tree, to 25-30 m, with a broad domed crown and stout, upward-arching branches.
    The leaves are opposite and palmately compound, with five to seven large, obovate, toothed leaflets
    radiating from a long stalk. In spring the tree bears large, showy, upright pyramidal flower spikes
    ('candles') of white flowers marked with yellow or pink at the base. The glossy brown seeds ('conkers')
    develop inside a spiky green husk and fall in autumn.
  height: Up to 25-30 m
  habit: Large deciduous tree
  leaves: Opposite, palmately compound with 5-7 large obovate toothed leaflets
  flowers: Showy, upright, pyramidal spikes ('candles') of white flowers marked yellow/pink at the base
  stem: Stout trunk with a broad domed crown of upward-arching branches
  root: Not medicinally used
  fruit: Glossy brown seed ('conker') enclosed in a spiny green husk
  flowering_period: April-May
  reference_ids:
  - REF-2402
  status: verified
habitat:
  text: Native to the Balkan Peninsula, and widely planted and naturalised as an ornamental and avenue
    tree across temperate Europe, North America and elsewhere.
  reference_ids:
  - REF-2402
  status: verified
harvesting:
  text: The seeds are gathered as they fall from the spiny husks in autumn; medicinal use requires a standardised,
    processed extract, since the raw seed, bark and leaves contain toxic esculin and must never be eaten
    raw.
  parts:
  - Seed (standardised extract)
  season: Autumn
  reference_ids:
  - REF-0470
  - REF-2402
  status: verified
traditional_uses:
  text: Horse chestnut seed has a long folk history as a remedy for varicose veins, haemorrhoids and 'heavy
    legs', and was also used topically for rheumatic pain and bruising. Modern use is almost exclusively
    as a standardised seed extract for chronic venous insufficiency, confirming this traditional venous-support
    reputation.
  reference_ids:
  - REF-2402
  status: verified
preparations:
- name: Standardised extract (oral)
  text: Standardised seed extract, normalised to escin content, taken as tablets or capsules for chronic
    venous insufficiency; this is the best-studied clinical form.
  reference_ids:
  - REF-0590
  - REF-2402
  status: verified
- name: Topical gel
  text: Escin-containing transdermal gel applied to the skin over affected veins or bruised tissue.
  reference_ids:
  - REF-0590
  status: verified
dosage:
- name: Standardised oral extract
  text: Clinical studies commonly use extracts standardised to around 100-150 mg escin daily, in divided
    doses. Educational reference only, not a prescription.
  reference_ids:
  - REF-0590
  status: draft
- name: Topical gel
  text: Applied topically per product labelling to the affected area, typically several times daily. Educational
    reference only, not a prescription.
  status: draft
actions:
- action: anti-inflammatory
  note: Anti-oedematous and anti-inflammatory - escin reduces vascular permeability in inflamed tissue
    and exerts venotonic effects on veins
  reference_ids:
  - REF-0590
  - REF-2402
  - REF-2403
  - REF-2405
  status: verified
- action: anti-oedematous
  note: Anti-oedematous and anti-inflammatory - escin reduces vascular permeability in inflamed tissue
    and exerts venotonic effects on veins
  reference_ids:
  - REF-0590
  status: verified
- action: anticancer
  reference_ids:
  - REF-0471
  - REF-0675
  - REF-2832
  - REF-2833
  - REF-2834
  - REF-2835
  status: needs-review
  note: Escin, the triterpene saponin of Aesculus hippocastanum, induces apoptosis and cell-cycle arrest
    and chemosensitizes breast, hepatocellular, lung and pancreatic cancer cells (preclinical, including
    in vivo xenograft models).
- action: venotonic
  note: Anti-oedematous and anti-inflammatory - escin reduces vascular permeability in inflamed tissue
    and exerts venotonic effects on veins; Relief of haemorrhoid symptoms (venotonic)
  reference_ids:
  - REF-0590
  - REF-2402
  status: needs-review
indications:
- condition: arthritis
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0471
  - REF-0590
