drug_class_interactions:
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: Horse chestnut seed contains aescin and coumarin-like constituents (esculin) that may add
    to the effect of blood-thinning or antiplatelet drugs, so combined use should be monitored.
  reference_ids:
  - REF-2446
