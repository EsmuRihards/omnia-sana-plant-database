  - REF-0676
  - REF-2405
  status: needs-review
- condition: cancer
  note: Escin shows antiproliferative and pro-apoptotic activity and enhances chemotherapy/immunotherapy
    efficacy in breast (MCF-7), hepatocellular, lung and pancreatic cancer models; it modulates NF-kappaB,
    p53, p38 MAPK/ERK and PD-L1 (preclinical).
  reference_ids:
