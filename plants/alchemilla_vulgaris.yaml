contraindications:
- note: Generally considered very safe. One of the gentlest astringent herbs in European herbalism. No
    significant drug interactions. Tannin content means very high doses should be avoided in sensitive
    stomachs. Not significantly contraindicated in pregnancy at normal herbal tea doses, but medicinal
    doses should be used cautiously.
  severity: caution
  reference_ids:
  - REF-0113
  - REF-0193
  - REF-0208
  status: verified
- note: Duke (2002) rates lady's mantle as ++ and notes astringent, angioprotective, anti-inflammatory,
    and vulnerary activities at the experimental level (score 1). The plant is rich in tannins and is
    traditionally used for diarrhea, wound healing, and as a mild gynecological tonic. Duke notes its
    anti-inflammatory and antioxidant properties as experimentally supported. No significant safety concerns
    are noted at usual herbal doses; the plant is generally well-tolerated (Duke, 2002).
  severity: info
  reference_ids:
