constituents:
- name: Phenolic compounds and tannins
  note: Lady's mantle is rich in ellagitannins and other tannins (the basis of its astringency) together
    with phenolic acids (gallic and caffeic acids) and flavonoids such as quercetin and catechin, which
    underlie its antioxidant activity.
  reference_ids:
  - REF-0686
  - REF-0687
contraindications:
- note: Generally considered very safe. One of the gentlest astringent herbs in European herbalism. No
    significant drug interactions. Tannin content means very high doses should be avoided in sensitive
    stomachs. Not significantly contraindicated in pregnancy at normal herbal tea doses, but medicinal
    doses should be used cautiously.
  reference_ids:
  - REF-0113
  - REF-0193
  - REF-0208
  status: verified
- note: Duke (2002) rates lady's mantle as ++ and notes astringent, angioprotective, anti-inflammatory,
    and vulnerary activities at the experimental level (score 1). The plant is rich in tannins and is
    traditionally used for diarrhea, wound healing, and as a mild gynecological tonic. Duke notes its
    anti-inflammatory and antioxidant properties as experimentally supported. No significant safety concerns
    are noted at usual herbal doses; the plant is generally well-tolerated (Duke, 2002).
  reference_ids:
  - REF-0113
  - REF-0193
  - REF-0208
  status: verified
internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx).
  reference_ids are plant-level: the book lists parts and actions as flat, unmapped lists, so the full
  set of references cited for this plant is attached to each action rather than split per action. constituents
  not yet extracted — manual enrichment pending. Further enriched 2026-06-15 with five PubMed sources (REF-0685..REF-0689): a cardioprotective
  study confirming antioxidant and anti-inflammatory activity (REF-0685) and two phytochemical/antioxidant
  studies (REF-0686, REF-0687); the ethanolic extract also showed preclinical antitumour and immunomodulatory
  activity against breast cancer and melanoma (REF-0688, REF-0689). Phenolic and tannin constituents added.'
