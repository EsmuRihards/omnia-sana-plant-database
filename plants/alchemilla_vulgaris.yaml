internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx).
  reference_ids are plant-level: the book lists parts and actions as flat, unmapped lists, so the full
  set of references cited for this plant is attached to each action rather than split per action. constituents
  not yet extracted — manual enrichment pending. Further enriched 2026-06-15 with five PubMed sources
  (REF-0685..REF-0689): a cardioprotective study confirming antioxidant and anti-inflammatory activity
  (REF-0685) and two phytochemical/antioxidant studies (REF-0686, REF-0687); the ethanolic extract also
  showed preclinical antitumour and immunomodulatory activity against breast cancer and melanoma (REF-0688,
  REF-0689). Phenolic and tannin constituents added. | 2026-06-15: migrated to entity schema (actions->vocab
  ids, indications split out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific
  publications: added 11 PubMed-verified @article sources (REF-2226, REF-2227, REF-0686, REF-0685, REF-2228,
  REF-0687, REF-2229, REF-2230, REF-2231, REF-2232, REF-2233) — woven into relevant actions/indications
  and the plant-level references bucket.'
