constituents:
- name: Allicin and organosulfur compounds (ajoene, S-allyl-cysteine)
  compounds:
  - allicin
  - organosulfur
  note: Allicin (diallyl thiosulfinate), formed enzymatically when raw garlic is crushed, together with
    ajoene and the aged-garlic compound S-allyl-cysteine, are the principal bioactives behind garlic's
    antimicrobial and cardiovascular effects — acting partly by raising nitric oxide and by targeting
    microbial thiol-containing enzymes.
  reference_ids:
  - REF-0647
  - REF-0649
  - REF-0650
  - REF-2426
  - REF-2427
botanical_description:
  text: Bulbous perennial herb usually grown as an annual, forming an underground compound bulb ('head')
    of several angular cloves wrapped in papery white to purplish skin. The leaves are flat, narrow and
    strap-shaped, greyish-green, arising from the bulb. A tall, leafless flowering stem (scape) may rise
    from the bulb bearing a rounded umbel of small pink-white flowers, often mixed with small bulbils,
    though cultivated garlic rarely sets true seed.
  height: 30-100 cm (flowering scape)
  habit: Bulbous perennial herb, usually grown as an annual
  leaves: Flat, narrow, strap-shaped, greyish-green
  flowers: Small pink-white flowers in a rounded umbel, often mixed with bulbils; true seed is rare in
    cultivated garlic
  stem: Tall, leafless flowering scape when present
  root: Fibrous roots below a compound bulb of several cloves
  fruit: Rarely sets true seed; propagated mainly by cloves
  flowering_period: Summer
  reference_ids:
  - REF-2426
  status: verified
habitat:
  text: Believed to originate in Central Asia; cultivated worldwide in temperate and subtropical climates
    as a garden and field crop, thriving in well-drained, sunny sites.
  reference_ids:
  - REF-2426
  status: draft
harvesting:
  text: Bulbs are lifted in mid- to late summer once the leaves have yellowed and died back, then cured
    (dried) in a warm, airy place before storage; young leaves and immature flower scapes ('sprouts')
    can be cut earlier in the season.
  parts:
  - Leaf
  - Root
  - Young sprouts
  season: Mid- to late summer for the bulb; spring for young leaves and sprouts
  status: draft
traditional_uses:
  text: Garlic has one of the longest continuous medicinal histories of any plant, used across many traditional
    systems (Ayurvedic, Chinese, Egyptian, Greco-Roman and European folk medicine) as an antimicrobial,
    cardiovascular and respiratory remedy, for colds and infections, and as a digestive and immune tonic.
    This traditional reputation is now among the most extensively clinically studied of all herbal medicines.
  reference_ids:
  - REF-0166
  - REF-2426
  status: verified
preparations:
- name: Fresh clove
  text: Fresh clove crushed or chopped and left to stand briefly (activating allicin formation) before
    eating raw or lightly cooked.
  reference_ids:
  - REF-2426
  status: verified
- name: Standardised extract/powder
  text: Dried garlic powder standardised to allicin content, or aged garlic extract, taken as capsules
    or tablets.
  reference_ids:
  - REF-0127
  - REF-2426
  status: verified
- name: Tincture
  text: Alcoholic extract of the fresh bulb.
  status: draft
dosage:
- name: Fresh clove
  text: Traditional and clinical references commonly cite around one fresh clove (about 4 g) daily. Educational
    reference only, not a prescription.
  status: draft
- name: Standardised powder extract
  text: Clinical trials commonly use around 300 mg of standardised dried powder extract (about 1.3% allicin),
    up to three times daily. Educational reference only, not a prescription.
  reference_ids:
