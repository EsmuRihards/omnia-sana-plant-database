internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx).
  reference_ids are plant-level: the book lists parts and actions as flat, unmapped lists, so the full
  set of references cited for this plant is attached to each action rather than split per action. constituents
  not yet extracted — manual enrichment pending. Further enriched 2026-06-14 with six PubMed-sourced studies
  (REF-0646..REF-0651): blood-pressure/cholesterol/immunity and cardiovascular meta-analyses and reviews
  (REF-0646, REF-0647, REF-0648), an aged-garlic RCT in treated hypertensives (REF-0649), and allicin
  antimicrobial studies including activity against multidrug-resistant lung pathogens (REF-0650, REF-0651);
  allicin/organosulfur constituents added. | 2026-06-15: migrated to entity schema (actions->vocab ids,
  indications split out, constituents linked to compounds).'
