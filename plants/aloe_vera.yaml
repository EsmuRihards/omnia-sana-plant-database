  traditional_uses, preparations, dosage + constituents) sourced from the existing references bucket;
  general/undated claims marked status: draft per the integrity-first sourcing policy. | 2026-07-19
  (dosage-sourcing campaign, batch 9): the ''Topical gel'' entry is sourced to the WHO monograph on Aloe
  Vera Gel, WHO Vol 1 (REF-3103, new) - fresh gel, or preparations containing 10-70% fresh gel. The ''Oral
  gel/juice'' entry is left UNSOURCED because WHO gives no oral posology for the gel, and a SAFETY
  DISTINCTION was added to its text instead: WHO''s separate ''Aloe'' monograph covers the dried leaf JUICE
  (latex), a stimulant laxative dosed at 0.04-0.17 g. Those two preparations differ in action and by orders
  of magnitude in dose, and conflating them - which is easy, since both are called ''aloe'' - would be
  dangerous. Also rejected here: REF-2235, which the trial-mining pass flagged, is a composition review
  reporting constituent contents in mg/100 g, not a dose. | 2026-07-19 (dosage-sourcing campaign, closing
  sweep): DOCUMENTED DEAD END - closing sweep of the dosage-sourcing campaign. The remaining unsourced
  dosage entry/entries on this record were searched against every seam this campaign opened and none yields
  a dose for this species in this preparation. Seams checked: (1) the official EMA herbal medicines register
  (medicines-output-herbal_medicines-report, 251 rows, retrieved 2026-07-18), matched on the accepted
  binomial AND on every synonym and common name appearing in a register row; (2) WHO monographs on selected
  medicinal plants Volumes 1-4, indexed by Latin drug title with each monograph''s Definition read to
  confirm the species - 177 monographs indexed; (3) this plant''s own reference bucket, mined for human
