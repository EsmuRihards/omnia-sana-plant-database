id: aloe-vera
scientific_name: Aloe vera
common_names:
- Aloe Vera
- True Aloe
- Barbados Aloe
- Medicinal Aloe
- Burn Plant
- First Aid Plant
family: Asphodelaceae
external_ids:
  gbif: 2777724
  powo: 'urn:lsid:ipni.org:names:530017-1'
