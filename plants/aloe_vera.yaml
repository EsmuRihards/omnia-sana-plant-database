parts_used:
- Leaf
botanical_description:
  text: Succulent, rosette-forming perennial with thick, fleshy, lance-shaped leaves edged with soft,
    pale teeth, each leaf filled with a clear, slippery, mucilaginous gel beneath a tougher green rind.
    In favourable conditions it produces a tall flowering spike bearing tubular yellow (sometimes orange)
    flowers.
  height: Leaves 40-80 cm; flower spike to about 1 m
  habit: Succulent, rosette-forming perennial
  leaves: Thick, fleshy, lance-shaped, edged with soft pale teeth, filled with clear mucilaginous gel
  flowers: Tubular yellow (occasionally orange) flowers on a tall, unbranched or sparsely branched spike
  stem: Very short, often inconspicuous, below the leaf rosette
  root: Shallow, fibrous roots
  fruit: Capsule (rarely produced in cultivation)
  flowering_period: Varies with climate; typically under warm, dry conditions
  reference_ids:
  - REF-2234
  status: verified
habitat:
  text: Believed native to the Arabian Peninsula, and now cultivated and naturalised throughout arid and
    semi-arid tropical and subtropical regions worldwide as a garden, medicinal and commercial crop.
  reference_ids:
  - REF-2234
  status: draft
harvesting:
  text: Outer, mature leaves are cut close to the base as needed; the clear inner gel (mucilage) is separated
    from the outer rind and from the bitter yellow latex (aloin-containing exudate) just under the rind,
    since the gel and the latex have different uses and safety profiles.
  parts:
  - Leaf
  season: Year-round where climate permits, from mature outer leaves
  reference_ids:
  - REF-2234
  status: verified
traditional_uses:
  text: Aloe vera has an ancient reputation, recorded from ancient Egypt onward, as a topical remedy for
    burns, wounds and skin inflammation (the 'burn plant' / 'first aid plant'), and the bitter leaf latex
    has been used traditionally as a stimulant laxative. It remains one of the most widely used topical
    botanicals for skin care and minor wound healing.
  reference_ids:
  - REF-2234
  status: verified
preparations:
- name: Fresh gel
  text: Clear inner leaf gel applied fresh, or as a stabilised commercial gel, directly to the skin for
    burns, minor wounds and skin irritation.
  reference_ids:
  - REF-2234
  status: verified
- name: Oral juice/gel
  text: Inner leaf gel (latex-free) taken orally, used traditionally for digestive support.
  reference_ids:
  - REF-2234
  status: draft
- name: Latex/dried juice
  text: The bitter yellow leaf exudate (containing anthraquinone glycosides) used traditionally as a stimulant
    laxative; not recommended for prolonged use.
  status: draft
dosage:
- name: Topical gel
  text: The WHO monograph on Aloe Vera Gel specifies fresh gel, or preparations containing 10-70% fresh
    gel, applied to the affected skin area. Educational reference only, not a prescription.
  reference_ids:
  - REF-3103
  status: verified
- name: Oral gel/juice
  text: Traditional references suggest around 1 tablespoon of gel, up to three times daily. WHO gives no
    oral posology for the GEL. One critical distinction applies here - WHO's separate monograph on Aloe
    covers the dried leaf JUICE (latex), a stimulant laxative dosed at only 0.04-0.17 g, and that figure
    must never be read across to aloe gel or gel juice, which are different preparations with different
    actions. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Polysaccharides (acemannan)
  compounds:
  - polysaccharide
  - mucilage
  note: Acemannan and other glucomannans are the principal gel polysaccharides, underlying the emollient
    and wound-healing effects.
  reference_ids:
  - REF-0087
  - REF-2234
- name: Anthraquinones (aloin, aloe-emodin)
  compounds:
  - anthraquinone
  note: Found mainly in the leaf latex (not the inner gel); responsible for the traditional laxative effect
    and requiring caution with prolonged use.
  reference_ids:
  - REF-2234
- name: Enzymes, vitamins and minerals
  note: Minor bioactive enzymes, vitamins (including C and E) and minerals contribute to the antioxidant
    and skin-conditioning properties of the gel.
  reference_ids:
  - REF-2234
