botanical_description:
  text: Deciduous, aromatic shrub with slender, brittle branches and whorls of narrow, lance-shaped, rough-textured
    leaves that release a strong lemon scent when crushed. Small, pale lilac to white flowers are borne
    in loose terminal and axillary spikes in late summer.
  height: 1-3 m
  habit: Deciduous, aromatic shrub
  leaves: Narrow, lance-shaped, rough-textured, borne in whorls of three; strongly lemon-scented when
    crushed
  flowers: Small, pale lilac to white flowers in loose terminal and axillary spikes
  stem: Slender, brittle, woody branches
  root: Woody rootstock
  fruit: Small dry schizocarp
  flowering_period: Late summer
  reference_ids:
  - REF-0474
  status: verified
habitat:
  text: Native to South America (Argentina, Chile, Peru) and widely cultivated as a culinary and medicinal
    herb in warm-temperate and Mediterranean climates worldwide, typically in sunny, well-drained garden
    sites.
  reference_ids:
  - REF-0474
  status: verified
harvesting:
  text: Leaves are picked through the growing season, with the essential oil content and aroma at their
    best just before flowering; leaves are used fresh or dried quickly in a warm, shaded, airy place to
    preserve the lemon-scented volatile oil.
  parts:
  - Leaf
  season: Spring to autumn, best just before flowering
  reference_ids:
  - REF-0474
  status: verified
traditional_uses:
  text: Lemon verbena leaf is a traditional South American and Mediterranean remedy for digestive complaints
    (indigestion, flatulence), as a calming, mildly sedative tea for anxiety and sleep, and is widely
    drunk as a fragrant culinary herbal tea.
  reference_ids:
  - REF-0474
  status: verified
preparations:
- name: Infusion
  text: Fresh or dried leaf infused in hot water as a fragrant digestive and calming tea.
  reference_ids:
  - REF-0474
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried leaf.
  status: draft
- name: Standardised extract
  text: Concentrated leaf extract (rich in verbascoside) used in some clinical studies of muscle recovery
    and antioxidant support.
  reference_ids:
  - REF-0692
  status: verified
dosage:
- name: Infusion
  text: The EU herbal monograph on Verbenae citriodorae folium gives, for adolescents, adults and elderly -
    for mild symptoms of mental stress, 5 g of the comminuted leaf in 100 mL of boiling water as a decoction
    three times daily; to aid sleep, 1-2 g in 200 mL as an infusion half an hour before bedtime; and for
    mild digestive complaints, 2-3 g in 200 mL as an infusion 1-3 times daily, or 1 g in 200 mL up to
    5 times daily. Not recommended in children. If symptoms persist longer than 2 weeks a healthcare practitioner
    should be consulted. Educational reference only, not a prescription.
  reference_ids:
  - REF-3079
  status: verified
- name: Tincture
  text: About 2-4 mL of a 1:5 tincture, up to three times daily. Educational reference only, not a prescription.
  status: draft
