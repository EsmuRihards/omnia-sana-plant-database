internal_notes: 'Enriched 2026-06-12 from scientific literature (Journal of Ethnopharmacology review of A. citrodora;
  congeneric anxiety RCT of A. polystachya). Originally a skeleton imported from the omniasana.bio
  Symptom-to-Plant Lookup tool (insomnia, anxiety, indigestion, muscle-soreness, inflammation); associations
  retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced randomized,
  placebo-controlled trial of a lemon verbena extract (Recoverben) showing reduced loss of muscle strength
  and muscle soreness with faster recovery after exhaustive exercise (REF-0620), directly supporting the
  antioxidant / muscle-recovery action. Further enriched 2026-06-15 with five PubMed sources
  (REF-0690..REF-0694) - two randomized sleep trials (an insomnia RCT, REF-0690, and a sleep-quality RCT,
  REF-0691), a verbascoside-rich antioxidant/anti-inflammatory study (REF-0692), an
  antioxidant/antiproliferation study (REF-0693) and an immune/antioxidant study (REF-0694). | 2026-06-15:
  migrated to entity schema (actions->vocab ids, indications split out, constituents linked to compounds). |
  2026-06-20: enriched to >=10 scientific publications: added 5 PubMed-verified @article sources (REF-0474,
  REF-0693, REF-2407, REF-2408, REF-2409) — woven into relevant actions/indications and the plant-level
  references bucket. | 2026-07-11: added monograph-base fields (botanical_description, habitat, harvesting,
  traditional_uses, preparations, dosage) sourced from the existing references bucket; general/undated
  claims marked status: draft per the integrity-first sourcing policy. | 2026-07-13: added anticancer action
  (where absent) + cancer indication (anticancer/antitumour research) sourced from the plant''s cited
  literature, as part of the cancer-condition campaign. | 2026-07-18 (dosage-sourcing campaign, batch 4):
  the ''Infusion'' entry is sourced to the EU herbal monograph on Verbenae citriodorae folium (REF-3079,
  new) - THE monograph that the phantom REF-0522 was almost certainly mistaken for, since ''Verbenae
  citriodorae folium'' (this plant, Aloysia citrodora) reads like a Verbena officinalis drug name. Rewritten
  from a flat ''2-3 g up to three times daily'' to the monograph''s three distinct posologies (mental stress
  5 g decoction 3x daily; sleep 1-2 g half an hour before bedtime; digestive 2-3 g 1-3x daily or 1 g up to
  5x daily). The ''Tincture'' entry is left UNSOURCED and draft: the monograph lists herbal-tea preparations
  only - no tincture and no extract - so the ''2-4 mL of a 1:5 tincture'' figure has no regulatory backing
  and was not propped up with the tea monograph.'