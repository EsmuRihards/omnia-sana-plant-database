internal_notes: 'Enriched 2026-06-12 from scientific literature (Journal of Ethnopharmacology review of
  A. citrodora; congeneric anxiety RCT of A. polystachya). Originally a skeleton imported from the omniasana.bio
  Symptom-to-Plant Lookup tool (insomnia, anxiety, indigestion, muscle-soreness, inflammation); associations
  retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced randomized,
  placebo-controlled trial of a lemon verbena extract (Recoverben) showing reduced loss of muscle strength
  and muscle soreness with faster recovery after exhaustive exercise (REF-0620), directly supporting the
  antioxidant / muscle-recovery action. Further enriched 2026-06-15 with five PubMed sources (REF-0690..REF-0694)
  - two randomized sleep trials (an insomnia RCT, REF-0690, and a sleep-quality RCT, REF-0691), a verbascoside-rich
  antioxidant/anti-inflammatory study (REF-0692), an antioxidant/antiproliferation study (REF-0693) and
  an immune/antioxidant study (REF-0694). | 2026-06-15: migrated to entity schema (actions->vocab ids,
  indications split out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific
  publications: added 5 PubMed-verified @article sources (REF-0474, REF-0693, REF-2407, REF-2408, REF-2409)
  — woven into relevant actions/indications and the plant-level references bucket.'
