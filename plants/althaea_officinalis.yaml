id: althaea-officinalis
scientific_name: Althaea officinalis
common_names:
- Marshmallow Root
- Marsh mallow
- White mallow
family: Malvaceae
parts_used:
- Root
constituents:
- name: Mucilage polysaccharides (rhamnogalacturonans, arabinans, glucans, arabinogalactans)
  compounds:
  - polysaccharide
  - mucilage
  note: The principal soothing, film-forming constituents; the isolated rhamnogalacturonan also shows
    direct antitussive activity in animal models.
  reference_ids:
  - REF-0481
  - REF-0578
  - REF-1369
  - REF-1372
- name: Flavonoids and phenolic acids
  compounds:
  - phenolic-acid
  - flavonoid
  note: Antioxidant constituents.
  reference_ids:
  - REF-0482
- name: Pectin and starch
  compounds:
  - pectin
  - starch
  note: Other carbohydrate constituents of the root.
  reference_ids:
  - REF-0481
actions:
- action: antitussive
  note: Antitussive (calms dry, irritating cough) - in animal studies the root rhamnogalacturonan suppresses
    the cough reflex dose-dependently, comparably to codeine, via 5-HT2 receptors rather than bronchodilation
  reference_ids:
  - REF-0481
  - REF-0578
  - REF-0579
  - REF-1368
  status: verified
- action: demulcent
  note: Demulcent for irritation of the mouth or throat and associated dry cough (mucilage coats and soothes);
    Eases mild stomach and gut discomfort, including heartburn / acid reflux and indigestion (protective
    mucilage)
  reference_ids:
  - REF-0481
  - REF-0482
  - REF-1368
  - REF-1374
  status: verified
- action: emollient
  note: Topical soothing for irritated skin
  reference_ids:
  - REF-0482
  - REF-1370
  - REF-1373
  status: needs-review
indications:
- condition: acid-reflux
  note: Eases mild stomach and gut discomfort, including heartburn / acid reflux and indigestion (protective
    mucilage)
  reference_ids:
  - REF-0481
  status: verified
- condition: cough
  note: Antitussive (calms dry, irritating cough) - in animal studies the root rhamnogalacturonan suppresses
    the cough reflex dose-dependently, comparably to codeine, via 5-HT2 receptors rather than bronchodilation;
    Demulcent for irritation of the mouth or throat and associated dry cough (mucilage coats and soothes)
  reference_ids:
  - REF-0481
  - REF-0482
  - REF-0578
  - REF-0579
  - REF-1368
  status: verified
- condition: eczema
  note: inferred from emollient action
  reference_ids:
  - REF-0482
  - REF-1373
  status: needs-review
- condition: indigestion
  note: Eases mild stomach and gut discomfort, including heartburn / acid reflux and indigestion (protective
    mucilage)
  reference_ids:
  - REF-0481
  status: verified
- condition: skin-irritation
  note: Topical soothing for irritated skin
  reference_ids:
  - REF-0482
  - REF-1370
  - REF-1373
  status: needs-review
- condition: sore-throat
  reference_ids:
  - REF-0481
  status: verified
contraindications:
- note: Very well tolerated. The mucilage can slow the absorption of other medicines, so take other drugs
    about an hour before or after marshmallow.
  severity: info
  reference_ids:
  - REF-0481
  - REF-0482
  status: verified
- note: It may mildly lower blood sugar (caution alongside antidiabetic medicines). Use in pregnancy and
    breastfeeding is not recommended in the absence of adequate data.
  severity: caution
  reference_ids:
  - REF-0481
  status: verified
