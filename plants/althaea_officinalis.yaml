id: althaea-officinalis
scientific_name: Althaea officinalis
common_names:
- Marshmallow Root
- Marsh mallow
- White mallow
family: Malvaceae
external_ids:
  gbif: 3152520
  wikidata: Q158496
parts_used:
- Root
constituents:
- name: Mucilage polysaccharides (rhamnogalacturonans, arabinans, glucans, arabinogalactans)
  compounds:
  - polysaccharide
  - mucilage
  note: The principal soothing, film-forming constituents; the isolated rhamnogalacturonan also shows
    direct antitussive activity in animal models.
  reference_ids:
  - REF-0481
  - REF-0578
  - REF-1369
  - REF-1372
- name: Flavonoids and phenolic acids
  compounds:
  - phenolic-acid
  - flavonoid
  note: Antioxidant constituents.
  reference_ids:
  - REF-0482
- name: Pectin and starch
  compounds:
  - pectin
  - starch
  note: Other carbohydrate constituents of the root.
  reference_ids:
  - REF-0481
botanical_description:
  text: Soft, downy perennial herb with an erect, branching stem and broad, soft, velvety, greyish-green
    leaves, shallowly 3-5-lobed and toothed. Pale pink to white five-petalled flowers, typical of the
    mallow family, are borne singly or in small clusters in the leaf axils. The thick, fleshy, whitish
    taproot is the main medicinal part, rich in soothing mucilage.
  height: 60-120 cm
  habit: Erect, downy, branching perennial herb
  leaves: Broad, soft, velvety, greyish-green, shallowly 3-5-lobed and toothed
  flowers: Pale pink to white, five-petalled, typical mallow flowers, borne singly or in small axillary
    clusters
  stem: Erect, branching, softly downy
  root: Thick, fleshy, whitish taproot, rich in mucilage
  fruit: Flat, disc-shaped cluster of small seeded segments ('cheeses')
  flowering_period: July-September
  reference_ids:
  - REF-0481
  status: verified
habitat:
  text: Grows in damp meadows, salt marshes, ditches and riverbanks, especially near brackish or coastal
    wetlands; native to Europe, Western Asia and North Africa.
  reference_ids:
  - REF-0481
  status: verified
harvesting:
  text: The root is dug in autumn from plants at least two years old, when mucilage content is highest,
    then washed, peeled and dried quickly to prevent mould, given its high mucilage and sugar content.
  parts:
  - Root
  season: Autumn, from two-year-old (or older) plants
  reference_ids:
  - REF-0481
  status: verified
traditional_uses:
  text: 'Marshmallow root has an ancient reputation, reflected in its Greek name ''Althaea'' (to heal),
    as a soothing demulcent for irritated mucous membranes: dry cough and sore throat, and mild inflammation
    and discomfort of the stomach and gut. It has also been applied topically as a soothing poultice for
    irritated skin.'
  reference_ids:
  - REF-0481
  status: verified
preparations:
- name: Cold infusion (maceration)
  text: Dried root macerated in cold water for several hours to extract the maximum mucilage without degrading
    it, then strained; the classic preparation for cough and digestive demulcent use.
  reference_ids:
  - REF-0481
  status: verified
- name: Decoction
  text: Dried root gently simmered in water; a warmer alternative preparation, though prolonged heat can
    reduce mucilage yield.
  reference_ids:
  - REF-0481
  status: draft
- name: Syrup
  text: Root extract combined with sugar syrup as a soothing preparation for cough, especially in children.
  status: draft
dosage:
- name: Cold infusion (root)
  text: The EU herbal monograph describes traditional use of about 0.5-3 g dried root per cup as a cold
    macerate, taken up to several times daily. Educational reference only, not a prescription.
  reference_ids:
  - REF-0481
  status: draft
actions:
- action: anticancer
  reference_ids:
  - REF-1371
  - REF-1369
  status: needs-review
  note: Althaea officinalis root extract and its polysaccharides show chemopreventive/anticancer activity,
    including protection against chemically induced hepatocarcinogenesis (preclinical).
- action: antitussive
  note: Antitussive (calms dry, irritating cough) - in animal studies the root rhamnogalacturonan suppresses
    the cough reflex dose-dependently, comparably to codeine, via 5-HT2 receptors rather than bronchodilation
  reference_ids:
  - REF-0481
  - REF-0578
  - REF-0579
  - REF-1368
  status: verified
- action: demulcent
  note: Demulcent for irritation of the mouth or throat and associated dry cough (mucilage coats and soothes);
    Eases mild stomach and gut discomfort, including heartburn / acid reflux and indigestion (protective
    mucilage)
  reference_ids:
  - REF-0481
  - REF-0482
  - REF-1368
  - REF-1374
  status: verified
- action: emollient
  note: Topical soothing for irritated skin
  reference_ids:
  - REF-0482
  - REF-1370
  - REF-1373
  status: needs-review
indications:
- condition: acid-reflux
  note: Eases mild stomach and gut discomfort, including heartburn / acid reflux and indigestion (protective
    mucilage)
  reference_ids:
  - REF-0481
  status: verified
- condition: cancer
  note: Althaea officinalis extract is chemoprotective against N-diethylnitrosamine-induced liver carcinogenesis,
    and marshmallow polysaccharides show documented anticancer activity (preclinical/chemopreventive).
  reference_ids:
  - REF-1371
  - REF-1369
  status: needs-review
- condition: cough
  note: Antitussive (calms dry, irritating cough) - in animal studies the root rhamnogalacturonan suppresses
    the cough reflex dose-dependently, comparably to codeine, via 5-HT2 receptors rather than bronchodilation;
    Demulcent for irritation of the mouth or throat and associated dry cough (mucilage coats and soothes)
  reference_ids:
  - REF-0481
  - REF-0482
  - REF-0578
  - REF-0579
  - REF-1368
  status: verified
- condition: eczema
  note: inferred from emollient action
  reference_ids:
  - REF-0482
  - REF-1373
  status: needs-review
- condition: indigestion
  note: Eases mild stomach and gut discomfort, including heartburn / acid reflux and indigestion (protective
    mucilage)
  reference_ids:
  - REF-0481
  status: verified
- condition: skin-irritation
  note: Topical soothing for irritated skin
  reference_ids:
  - REF-0482
  - REF-1370
  - REF-1373
  status: needs-review
- condition: sore-throat
  reference_ids:
  - REF-0481
  status: verified
contraindications:
- note: Very well tolerated. The mucilage can slow the absorption of other medicines, so take other drugs
    about an hour before or after marshmallow.
  severity: info
  reference_ids:
  - REF-0481
  - REF-0482
  status: verified
- note: It may mildly lower blood sugar (caution alongside antidiabetic medicines). Use in pregnancy and
    breastfeeding is not recommended in the absence of adequate data.
  severity: caution
  reference_ids:
  - REF-0481
  status: verified
