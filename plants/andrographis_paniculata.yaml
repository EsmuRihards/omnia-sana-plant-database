- action: anticancer
  note: Andrographolide, the principal diterpene lactone of Andrographis paniculata, suppresses proliferation
    and induces apoptosis across breast, lung, colon, cervical, hepatic and haematological cancers via
    NF-kappaB and PI3K/Akt inhibition (preclinical).
  reference_ids:
