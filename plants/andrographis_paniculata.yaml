contraindications:
- note: 'Avoid in pregnancy and when trying to conceive: high doses have shown reproductive toxicity in
    animals and the herb has a traditional reputation as an abortifacient.'
  severity: caution
  reference_ids:
  - REF-0393
  - REF-0395
  status: verified
- note: High doses have caused nephrotoxicity and reproductive toxicity in studies; use standardized products
    at recommended doses and avoid prolonged high-dose use.
  severity: caution
