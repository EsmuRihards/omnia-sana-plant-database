internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx). reference_ids are
  plant-level: the book lists parts and actions as flat, unmapped lists, so the full set of references cited
  for this plant is attached to each action rather than split per action. constituents not yet extracted —
  manual enrichment pending. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split
  out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific publications: added 10
  PubMed-verified @article sources (REF-1388, REF-1389, REF-1390, REF-1391, REF-1392, REF-1393, REF-1394,
  REF-1395, REF-1396, REF-1397) — woven into relevant actions/indications and the plant-level references
  bucket. | 2026-07-11: added monograph-base fields (botanical_description, habitat, harvesting,
  traditional_uses, preparations, dosage + constituents) sourced from the existing references bucket;
  general/undated claims marked status: draft per the integrity-first sourcing policy. | 2026-07-18
  (dosage-sourcing campaign, batch 6): the ''Seed infusion'' entry is sourced to the WHO monograph on
  Fructus Anethi, WHO Vol 3 (REF-3094, new); WHO gives an average daily dose of 3 g of the dried ripe fruit,
  or 0.1-0.3 g essential oil. The previous ''1-3 g of crushed seed per cup, up to three times daily''
  implied up to 9 g/day, three times the WHO daily figure. There is no EMA monograph for dill. The
  ''Tincture'' entry is left UNSOURCED and draft - WHO gives no tincture posology for Fructus Anethi, so the
  ''1-4 mL of a 1:5 tincture'' figure was not propped up with the fruit monograph. Also note: this plant''s
  common_names carried split-citation junk (''European dill (World Health Organization'', ''2007)'')
  repaired in the same session''s data-hygiene pass. | 2026-07-19 (dosage-sourcing campaign, closing sweep):
  DOCUMENTED DEAD END - closing sweep of the dosage-sourcing campaign. The remaining unsourced dosage
  entry/entries on this record were searched against every seam this campaign opened and none yields a dose
  for this species in this preparation. Seams checked: (1) the official EMA herbal medicines register
  (medicines-output-herbal_medicines-report, 251 rows, retrieved 2026-07-18), matched on the accepted
  binomial AND on every synonym and common name appearing in a register row; (2) WHO monographs on selected
  medicinal plants Volumes 1-4, indexed by Latin drug title with each monograph''s Definition read to
  confirm the species - 177 monographs indexed; (3) this plant''s own reference bucket, mined for human
  studies that state an administered dose. Per the campaign''s integrity bar the entry is left unsourced at
  status draft rather than attached to a tangentially-related paper.'