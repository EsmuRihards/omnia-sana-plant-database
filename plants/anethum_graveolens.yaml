contraindications:
- note: Widely used as a food herb/spice; WHO monograph notes a “generally regarded as safe” status as
    a flavouring agent (World Health Organization, 2007). Allergic reactions (including oral itching,
    swelling, urticaria, vomiting/diarrhoea) are reported; avoid if you react to Apiaceae-family plants
    (World Health Organization, 2007; Egyptian Drug Authority, n.d.).
  severity: caution
  reference_ids:
  - REF-0064
  - REF-0103
  - REF-0174
  - REF-0210
  - REF-0310
  status: verified
- note: 'Duke (2002) provides clinical evidence (score 2) for dill''s antibacterial and antispasmodic
    activities, consistent with Commission E and PhEur approvals. Traditional uses include management
    of colic, dyspepsia, and flatulence. The plant is a well-documented lactagogue (promotes milk production)
    and has a mild hypotensive effect. Dose: 1–3 g seeds as tea three times daily. Dill is generally safe
    (++) with no known significant contraindications at culinary and medicinal doses (Duke, 2002).'
  severity: caution
