botanical_description:
  text: Aromatic annual herb with a slender, hollow, ridged, blue-green stem. The leaves are finely divided
    into thread-like segments, feathery and soft, similar to fennel but more delicate. Small yellow flowers
    are borne in flat, wide compound umbels at the stem tips in summer, ripening into flattened, ridged,
    aromatic seeds (fruits).
  height: 40-120 cm
  habit: Erect, aromatic annual herb
  leaves: Finely divided into thread-like, feathery segments
  flowers: Small yellow flowers in flat, wide compound umbels
  stem: Slender, hollow, ridged, blue-green, unspotted
  root: Slender taproot
  fruit: Small, flattened, ridged, aromatic seed (mericarp)
  flowering_period: June-August
  reference_ids:
  - REF-1388
  status: verified
habitat:
  text: Believed native to the eastern Mediterranean, Western Asia and southern Russia; widely cultivated
    as a culinary and medicinal herb in gardens and fields across Europe, Asia and the Americas.
  reference_ids:
  - REF-1388
  status: draft
harvesting:
  text: Leaves are picked fresh through the growing season; the seeds are harvested in late summer once
    the umbels have browned and dried, then threshed and dried further before storage.
  parts:
  - Leaf
  - Seed
  - Stem
  season: Leaf through summer; seed in late summer to early autumn
  status: draft
traditional_uses:
  text: Dill seed and leaf have a long culinary-medicinal history as a carminative digestive remedy for
    colic, dyspepsia and flatulence, and as a traditional lactagogue (galactagogue) to support breastfeeding;
    dill water ('gripe water') is a classic infant remedy for colic.
  reference_ids:
  - REF-1388
  status: verified
preparations:
- name: Infusion (seed)
  text: Crushed dill seed infused in hot water as a traditional carminative digestive tea.
  status: draft
- name: Infusion (leaf)
  text: Fresh or dried leaf infused as a milder digestive tea, also used culinarily.
  reference_ids:
  - REF-1388
  status: verified
- name: Essential oil
  text: Steam-distilled from the seed; used in low dilution for its aromatic carminative and antimicrobial
    properties.
  status: draft
dosage:
- name: Seed infusion
  text: The WHO monograph on Fructus Anethi gives an average daily dose of 3 g of the dried ripe fruit,
    or 0.1-0.3 g of the essential oil, or the equivalent in other preparations. Educational reference
    only, not a prescription.
  reference_ids:
  - REF-3094
  status: verified
- name: Tincture
  text: About 1-4 mL of a 1:5 tincture, up to three times daily. Educational reference only, not a prescription.
  status: draft
