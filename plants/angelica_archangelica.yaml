  status: verified
- note: Medicinal doses should be avoided during pregnancy and breastfeeding.
  severity: caution
  reference_ids:
  - REF-0396
  status: verified
- note: Coumarin constituents may interact with anticoagulant medicines, and furanocoumarins with photosensitising
    drugs; when wild-harvesting, take great care to distinguish garden angelica from poisonous Apiaceae
    look-alikes such as hemlock.
  severity: caution
