contraindications:
- note: Generally safe as a food plant. Allergic reactions are possible in those sensitive to Asteraceae.
    Avoid in pregnancy due to uterine-stimulating effects reported in animal studies. The burs (seed heads)
    can cause mechanical irritation of skin and eyes on contact. Not recommended in biliary obstruction.
  severity: caution
  reference_ids:
  - REF-0211
  - REF-0309
  - REF-0313
  status: verified
- note: 'Duke (2002) rates burdock as +++ and notes antibacterial, antimutagenic, antitumor, choleretic,
    diuretic, and prebiotic (bifidogenic) activities at the experimental level (score 1). The root is
    rich in inulin (a prebiotic fructooligosaccharide), which promotes growth of beneficial intestinal
    bacteria. Dose: 1–2 g dried root in tea three times daily, or 2–4 ml of tincture. Duke notes burdock''s
    general safety, though it belongs to the Asteraceae family and can trigger reactions in sensitive
    individuals. It should be distinguished from belladonna and similar plants, which resemble it in early
    growth (Duke, 2002).'
  severity: serious
  reference_ids:
  - REF-0211
  - REF-0309
  - REF-0313
  status: verified
