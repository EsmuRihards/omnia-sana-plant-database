botanical_description:
  text: Robust biennial herb forming a large rosette of huge, heart-shaped (rhubarb-like), long-stalked
    leaves, dark green above and whitish-woolly beneath, in its first year. In the second year it sends
    up a tall, branching, grooved flowering stem bearing purple thistle-like flower heads enclosed in
    a globe of stiff, hooked bracts that ripen into the familiar clinging burrs.
  height: 1-2 m (flowering stem, second year)
  habit: Robust biennial herb; large rosette in year one, tall branching stem in year two
  leaves: Huge, heart-shaped, long-stalked, dark green above and whitish-woolly beneath
  flowers: Purple thistle-like flower heads enclosed in a globe of stiff, hooked bracts
  stem: Tall, branching, grooved flowering stem (second year only)
  root: Long, thick, fleshy first-year taproot
  fruit: Bristly, hooked burr enclosing small achenes, clinging to fur and clothing
  flowering_period: July-September (second year)
  reference_ids:
  - REF-0705
  - REF-0709
  status: verified
habitat:
  text: A common weed of disturbed ground, waste places, roadsides, field margins and riverbanks on rich,
    moist soils; native to Europe and temperate Asia and naturalised in North America and elsewhere.
  reference_ids:
  - REF-0705
  status: verified
harvesting:
  text: The root is dug at the end of the first growing season (autumn) or early in the second spring,
    before the flowering stem develops, when it is at its most tender and richest in inulin; leaves are
    picked through the first year, and the seed/fruit is collected from the dried burrs in the second
    autumn. Careful identification against deadly nightshade, whose root can resemble burdock, is essential
    before digging.
  parts:
  - Leaf
  - Root
  - Seed
  season: Root at the end of year one or start of year two; leaf through year one; seed in year-two autumn
  reference_ids:
  - REF-0706
  status: verified
traditional_uses:
  text: Burdock root is a classic 'alterative' or blood-purifying herb of European and East Asian (gobo)
    traditional medicine, used for chronic skin conditions, as a mild diuretic supporting elimination,
    and as a digestive bitter; the root is also eaten as a root vegetable (gobo) in Japanese cuisine.
  reference_ids:
  - REF-0705
  - REF-0709
  status: verified
preparations:
- name: Decoction (root)
  text: Dried or fresh root simmered in water as a traditional alterative and digestive decoction.
  reference_ids:
  - REF-0705
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried root, typically around 1:5.
  status: draft
- name: Fresh root (culinary)
  text: Fresh root peeled and cooked as a root vegetable (gobo), continuing the traditional food-medicine
    use.
  reference_ids:
  - REF-0706
  status: verified
dosage:
- name: Root decoction
  text: Traditional herbal references suggest around 1-2 g of dried root per cup, up to three times daily.
    Educational reference only, not a prescription.
  status: draft
- name: Tincture (1:5)
  text: About 2-4 mL of a 1:5 tincture, up to three times daily. Educational reference only, not a prescription.
