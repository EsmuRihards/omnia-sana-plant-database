botanical_description:
  text: Biennial herb closely related to greater burdock, forming a first-year rosette of large, heart-shaped,
    long-stalked leaves, green above and grey-woolly beneath, generally smaller than Arctium lappa. In
    the second year it produces a branching flowering stem with smaller purple thistle-like flower heads
    in a looser, more sprawling habit, each enclosed in a globe of hooked bracts that ripen into clinging
    burrs.
  height: 0.5-1.5 m (flowering stem, second year)
  habit: Biennial herb; first-year rosette, sprawling branched second-year stem
  leaves: Large, heart-shaped, long-stalked, green above and grey-woolly beneath (smaller than A. lappa)
  flowers: Smaller purple thistle-like flower heads in a looser, sprawling arrangement, enclosed in hooked
    bracts
  stem: Branching, more sprawling than A. lappa (second year only)
  root: Long, fleshy first-year taproot ('wild rhubarb')
  fruit: Bristly, hooked burr enclosing small achenes
  flowering_period: July-September (second year)
  reference_ids:
  - REF-0476
  status: verified
habitat:
  text: A common weed of waste ground, roadsides, hedgerows and disturbed soil; native to Europe and widely
    naturalised in North America, where it is often the most common wild burdock species.
  reference_ids:
  - REF-0476
  status: verified
harvesting:
  text: The root is dug at the end of the first growing season or early in the second spring, before flowering;
    leaf may be gathered through the first year. Careful identification against deadly nightshade, whose
    root can resemble burdock, is essential before digging.
  parts:
  - Root (and leaf)
  season: End of year one or start of year two, before flowering
  reference_ids:
  - REF-0476
  status: verified
traditional_uses:
  text: Lesser burdock is used interchangeably with the better-studied Arctium lappa in Western herbal
    medicine, as a traditional alterative/depurative for chronic skin conditions such as eczema, psoriasis
    and acne, and as a mild diuretic supporting elimination.
  reference_ids:
  - REF-0476
  - REF-0477
  status: verified
preparations:
- name: Decoction (root)
  text: Dried or fresh root simmered in water as a traditional alterative and skin-support decoction.
  reference_ids:
