internal_notes: 'Enriched 2026-06-12 from general phytotherapy literature (Herbal Reality and Drugs.com
  monographs). Medicinal burdock is usually Arctium lappa; A. minus is used similarly. The book database
  already contains A. lappa (Greater Burdock). Originally a skeleton imported from the omniasana.bio Symptom-to-Plant
  Lookup tool (eczema, acne, skin-irritation, detox); associations retained and now part-mapped and cited.
  Further enriched 2026-06-14 with a PubMed-sourced pharmacological review of the better-studied congener
  Arctium lappa (REF-0625), whose root supports the traditional skin/alterative use and antioxidant activity.
  | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split out, constituents linked
