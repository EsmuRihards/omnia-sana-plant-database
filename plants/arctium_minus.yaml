  status: verified
- name: Tincture
  text: Alcoholic extract of the dried root, typically around 1:5.
  status: draft
- name: Topical wash
  text: Cooled decoction used as a topical wash for eczema, acne and other skin irritation, reflecting
    the traditional external alterative use.
  reference_ids:
