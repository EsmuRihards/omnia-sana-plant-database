dangerous_lookalikes:
- dangerous_plant: buxus-sempervirens
  severity: dangerous
  confused_part: Small leathery evergreen leaves gathered as the medicinal 'uva-ursi'; the poisonous leaves
    of box look similar and have been used to adulterate bearberry.
  confusion_context: Bearberry (Arctostaphylos uva-ursi) leaves are collected as a urinary herb. As documented
    in pharmacognosy, during collection bearberry is commonly confused with cowberry (edible) and with
    box (Buxus sempervirens), and poisonous box - which lacks bearberry's active arbutin - has occasionally
    been used to adulterate the drug. Box leaves are poisonous, containing steroidal alkaloids that cause
    vomiting, diarrhoea, dizziness and, in quantity, convulsions and respiratory failure. Because the
    small leathery evergreen leaves are similar, box is a genuine toxic adulterant/look-alike of bearberry.
  distinguishing_features:
  - 'Leaf apex (decisive): bearberry leaves are spatulate with an entire (untoothed) margin and a rounded
    apex. Box leaves have a small notch cut out at the tip (emarginate).'
  - 'Leaf underside: box leaves have a loose, separable epidermis on the underside and lack the astringency
    of bearberry; bearberry leaves are firm and astringent with a net of sunken veins.'
  - 'Source: buy uva-ursi only from suppliers who authenticate the leaf, since adulteration with box cannot
    be judged casually.'
  key_test: Check the leaf tip. Bearberry leaves are spoon-shaped with a smooth margin and a ROUNDED tip.
    A leaf with a notch cut out of the tip (and a loose skin on the underside) is box - poisonous, not
    bearberry. Use only authenticated uva-ursi.
  reference_ids:
  - REF-2698
  - REF-2699
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
