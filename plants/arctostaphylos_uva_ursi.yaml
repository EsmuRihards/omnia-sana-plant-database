contraindications:
- note: 'Short-term use only: not for more than 1 week at a time and not more than about 5 times per year.
    If symptoms persist beyond ~4 days, worsen, or are accompanied by fever, blood in the urine or pain,
    seek medical care.'
  severity: info
  reference_ids:
  - REF-0405
  status: verified
- note: Contraindicated in pregnancy and breastfeeding and not for use in children or adolescents under
    18 years.
  severity: caution
  reference_ids:
  - REF-0405
  status: verified
- note: Works best when the urine is alkaline; avoid taking with substances that acidify the urine. The
    hydroquinone released can be irritant/potentially hepatotoxic, so prolonged or repeated use must be
    avoided.
  severity: serious
  reference_ids:
