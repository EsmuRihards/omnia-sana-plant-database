id: arctostaphylos-uva-ursi
scientific_name: Arctostaphylos uva-ursi
common_names:
- Bearberry
- Uva-ursi
- Kinnikinnick
- Bear's grape
family: Ericaceae
parts_used:
- Leaf
constituents:
- name: Arbutin (and methylarbutin)
  compounds:
  - glycoside
  note: Hydroquinone glycoside; hydrolysed and excreted as antibacterial hydroquinone in the urine.
  reference_ids:
  - REF-0405
