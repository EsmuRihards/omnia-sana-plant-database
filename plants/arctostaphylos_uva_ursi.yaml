internal_notes: 'Enriched 2026-06-12 from scientific and regulatory literature (EMA HMPC monograph, ESCOP
  monograph, Journal of Ethnopharmacology toxicology study). Originally a skeleton imported from the omniasana.bio
  Symptom-to-Plant Lookup tool (uti, infection); associations retained and now part-mapped and cited.
  NOTE strict short-term-use and pregnancy contraindications. Further enriched 2026-06-15 with five PubMed
  sources (REF-0700..REF-0704). Two primary-care randomized trials (REF-0700, REF-0701) found that uva-ursi
  did not reliably relieve UTI symptoms or safely replace antibiotics (one failed non-inferiority with
  more pyelonephritis), so the urinary action - though monograph-supported for traditional use - has weak
  clinical-trial backing. An analytical study quantified arbutin and hydroquinone in the leaf (REF-0702),
  and two studies characterise arbutin anti-inflammatory and antioxidant pharmacology (REF-0703, REF-0704).
  | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split out, constituents linked
  to compounds). | 2026-06-20: enriched to >=10 scientific publications: added 10 PubMed-verified @article
  sources (REF-2370, REF-2371, REF-2372, REF-2373, REF-2374, REF-2375, REF-0406, REF-2376, REF-2377, REF-2378)
  — woven into relevant actions/indications and the plant-level references bucket. | 2026-07-11: added
