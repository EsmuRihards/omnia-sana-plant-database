  - REF-2375
botanical_description:
  text: Low, mat-forming evergreen shrub with trailing, woody stems that root as they spread. The leaves
    are small, leathery, spatula-shaped (spoon-shaped), glossy dark green above and paler beneath, with
    a smooth, untoothed margin and a rounded tip. Small, urn-shaped, pink-and-white flowers hang in short
    clusters in spring, followed by bright red, mealy berries.
  height: 5-30 cm (trailing/prostrate)
  habit: Low, mat-forming, trailing evergreen shrub
  leaves: Small, leathery, spatula-shaped, glossy dark green above, entire (untoothed) margin, rounded
    tip
  flowers: Small, urn-shaped, pink-and-white, in short drooping clusters
  stem: Trailing, woody, rooting as it spreads
  root: Woody, fibrous roots along trailing stems
  fruit: Bright red, mealy berry
  flowering_period: April-June
  reference_ids:
  - REF-0405
  status: verified
habitat:
  text: Grows on dry, acidic, sandy or rocky ground in open woodland, heath, moorland and mountain slopes
    across the northern hemisphere (Europe, Asia and North America), often in exposed, cold, upland or
    subarctic sites.
  reference_ids:
  - REF-0405
  status: verified
harvesting:
  text: The leaves are gathered in autumn to early spring (outside the flowering and fruiting season),
    when arbutin content is at its highest, and dried carefully to preserve the glycoside.
  parts:
  - Leaf
  season: Autumn to early spring
  reference_ids:
  - REF-0405
  status: verified
traditional_uses:
  text: Bearberry leaf is a long-established European folk and official (EU herbal monograph) remedy for
    mild, uncomplicated lower urinary tract infections and cystitis, used short-term as a urinary antiseptic;
    it has also been used traditionally as an astringent for mild diarrhoea.
  reference_ids:
  - REF-0405
  status: verified
preparations:
- name: Cold infusion (maceration)
  text: Dried leaf macerated in cold water for several hours, which extracts less tannin (reducing gastric
    irritation) than a hot infusion; the preferred traditional preparation.
  reference_ids:
  - REF-0405
  status: verified
- name: Infusion/decoction
  text: Dried leaf infused or lightly decocted in hot water; alkalinising the urine (e.g. with dietary
    measures) is traditionally recommended alongside use, since arbutin's antibacterial action requires
    alkaline urine.
  reference_ids:
  - REF-0405
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried leaf.
  status: draft
dosage:
- name: Infusion
  text: The EU herbal monograph describes traditional use of about 3 g dried leaf per cup, up to four
    times daily, for no more than one week at a time and no more than about five times a year. Educational
    reference only, not a prescription.
  reference_ids:
  - REF-0405
  status: draft
actions:
- action: anticancer
  note: Arbutin, the hydroquinone glucoside characteristic of bearberry (Arctostaphylos uva-ursi), shows
    antiproliferative and pro-apoptotic activity across multiple cancer types (preclinical).
  reference_ids:
  - REF-2862
  - REF-2863
  status: needs-review
- action: antimicrobial
  note: Antibacterial in the urinary tract (arbutin is converted to antibacterial hydroquinone, favoured
    by alkaline urine); Urinary antiseptic for mild, uncomplicated lower urinary tract infection / cystitis
    (short-term)
