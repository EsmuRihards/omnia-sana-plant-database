contraindications:
- note: 'CAUTION: Contains thujone, which is neurotoxic in significant amounts. Internal use should be
    limited in duration and dose — short-term use only (under 4 weeks). Contraindicated in pregnancy (powerful
    uterine stimulant). Avoid in epilepsy, renal disease, and in children. The small amounts present in
    properly prepared bitter tinctures and vermouth are generally considered safe. The thujone content
    of absinthe was historically exaggerated.'
  severity: caution
  reference_ids:
  - REF-0020
  - REF-0098
  - REF-0112
  status: verified
- note: Duke (2002) rates wormwood as + (use with caution) and provides clinical evidence (score 2) for
    use as an aperitif and bitter digestive tonic, consistent with Commission E approval for dyspeptic
    complaints and loss of appetite. The plant contains absinthin and artabsin (bitter sesquiterpene lactones)
    responsible for digestive stimulation, and also thujone — a neurotoxic ketone that is the active agent
    responsible for 'absinthism' (historical neurological syndrome linked to absinthe consumption). Duke
    strongly cautions that thujone content limits safe long-term use, and wormwood should not be taken
    internally for more than 4 weeks at a time. Strictly contraindicated in pregnancy (abortifacient,
    neurotoxic) and epilepsy (Duke, 2002).
  severity: caution
  reference_ids:
  - REF-0020
  - REF-0098
  - REF-0112
  status: verified
