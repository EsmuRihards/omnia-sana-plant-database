id: artemisia-vulgaris
scientific_name: Artemisia vulgaris
common_names:
- Mugwort
- common mugwort
- sailor's tobacco
family: Asteraceae
parts_used:
- Leaf
- Root
- Stem
botanical_description:
  text: Tall, aromatic perennial herb with deeply lobed, dark green leaves that are distinctively silvery-white
    and woolly beneath. Small, dull reddish-brown to yellowish flower heads are borne in dense, branched,
    leafy spikes. The reddish-brown, ridged stems and the leaf's contrasting silver underside are characteristic
    field marks.
  height: 60-150 cm
  habit: Tall, erect, aromatic perennial herb
  leaves: Deeply lobed, dark green above, distinctively silvery-white woolly beneath
  flowers: Small, dull reddish-brown to yellowish flower heads in dense, branched, leafy spikes
  stem: Reddish-brown, ridged, often woody at the base
  root: Woody, spreading rhizome
  fruit: Small achene without pappus
  flowering_period: July-September
  reference_ids:
  - REF-0733
  status: verified
habitat:
  text: A common plant of waste ground, roadsides, hedgerows and riverbanks; native to Europe, Asia and
    North Africa and widely naturalised in North America.
  reference_ids:
  - REF-0733
  status: verified
harvesting:
  text: The flowering aerial parts (leaf and stem) are cut in summer as flowering begins and dried in
    a warm, shaded, airy place; the root can be dug in autumn.
  parts:
  - Leaf
  - Root
  - Stem
  season: Summer for aerial parts; autumn for root
  reference_ids:
  - REF-0733
  status: verified
traditional_uses:
  text: Mugwort is a widely used traditional bitter digestive tonic and calming nervine, and has a long
    reputation as an emmenagogue for menstrual complaints (reflected in its traditional use to bring on
    delayed menstruation, which is also why it is contraindicated in pregnancy). It has also been burned
    as 'moxa' in East Asian moxibustion and used as an insect repellent ('sailor's tobacco').
  reference_ids:
  - REF-0733
  status: verified
preparations:
- name: Infusion
  text: Dried leaf and flowering tops infused in hot water as a bitter digestive and calming tea.
  reference_ids:
  - REF-0733
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried herb.
  status: draft
- name: Moxa (external heat therapy)
  text: Dried, processed leaf ('moxa') burned near or on the skin over acupuncture points in traditional
    East Asian moxibustion.
  reference_ids:
  - REF-0733
  status: draft
dosage:
- name: Infusion
  text: Traditional herbal references suggest around 1-2 g of dried herb per cup, up to three times daily,
    for short-term use. Educational reference only, not a prescription.
  status: draft
