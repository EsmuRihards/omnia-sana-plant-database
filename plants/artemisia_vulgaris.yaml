contraindications:
- note: Contains thujone; avoid high doses or prolonged use. Contraindicated in pregnancy (uterine stimulant
    and abortifacient). May cause allergic reactions in individuals sensitive to the Asteraceae family.
    Avoid in epilepsy. Not recommended for children.
  reference_ids:
  - REF-0023
  - REF-0098
  - REF-0149
  status: verified
- note: Duke (2002) rates mugwort as + (use with caution) and notes abortifacient (score 1), emmenagogue,
    aperitif (score 1), and insecticide activities. Duke clearly flags mugwort as contraindicated in pregnancy
    due to well-documented abortifacient and uterotonic properties. Traditional use has been as a digestive
    bitter, and the plant contains volatile oils, sesquiterpene lactones, and flavonoids. Duke notes that
    the plant may cause allergic reactions in individuals sensitive to Asteraceae and warns against long-term
    use due to potential neurotoxicity from thujone-containing essential oil (Duke, 2002).
  reference_ids:
  - REF-0023
  - REF-0098
  - REF-0149
  status: verified
