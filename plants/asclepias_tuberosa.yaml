botanical_description:
  text: Erect perennial herb with hairy, unbranched stems and narrow, lance-shaped, alternate leaves (unlike
    most milkweeds, its sap is clear rather than milky). Vivid orange-red flowers are borne in showy,
    flat-topped umbel-like clusters at the stem tips, making it a prized butterfly and pollinator plant.
    The stout, fibrous, branching root is the medicinal part.
  height: 30-90 cm
  habit: Erect, hairy perennial herb
  leaves: Narrow, lance-shaped, alternate
  flowers: Vivid orange-red flowers in showy, flat-topped umbel-like clusters
  stem: Erect, hairy, unbranched, exuding clear (not milky) sap when cut
  root: Stout, fibrous, branching taproot
  fruit: Spindle-shaped seed pod (follicle) releasing silky-tufted seeds
  flowering_period: June-September
  reference_ids:
  - REF-0494
  status: verified
habitat:
  text: Native to dry prairies, open fields, roadsides and sandy or rocky open ground across most of eastern
    and central North America.
  reference_ids:
  - REF-0494
  status: verified
harvesting:
  text: The root is dug in autumn after the plant has finished flowering and seeding, then cleaned and
    dried; given its cardiac glycoside content and near-absence of modern safety data, harvesting and
    use should only be undertaken with expert guidance.
  parts:
  - Root
  season: Autumn
  reference_ids:
  - REF-0494
  status: draft
traditional_uses:
  text: Pleurisy root has a Native American and Eclectic-medicine reputation, reflected in its name, as
    an expectorant and diaphoretic for chest complaints, bronchitis and pleurisy, used to promote sweating
    during feverish illness and help clear phlegm.
  reference_ids:
  - REF-0494
  - REF-0495
  status: verified
preparations:
- name: Decoction
  text: Dried root simmered in water as a traditional expectorant and diaphoretic remedy; given its cardiac
    glycoside content, only under qualified practitioner guidance.
  reference_ids:
