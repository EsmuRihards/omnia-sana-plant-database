  status: draft
- name: Tincture
  text: Alcoholic extract of the dried root.
  status: draft
dosage:
- name: All preparations
  text: Because the root contains cardiac glycosides and modern safety/efficacy data are very limited,
    no general dose is given here; use only under the guidance of a qualified practitioner, and never
    in pregnancy, breastfeeding, infancy, or with a heart condition or cardiac glycoside medicines. Educational
    reference only, not a prescription.
