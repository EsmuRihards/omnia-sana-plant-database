common_names:
- Pleurisy Root
- Butterfly weed
- Butterfly milkweed
- Orange milkweed
scientific_name: Asclepias tuberosa
family: Apocynaceae
parts_used:
- name: Root
  medicinal_actions:
  - action: Traditional expectorant - helps clear phlegm in chest conditions, bronchitis and pleurisy
    reference_ids:
    - REF-0494
    - REF-0495
    status: needs-review
  - action: Diaphoretic - promotes sweating to support feverish illness
    reference_ids:
    - REF-0494
    - REF-0495
    status: needs-review
  - action: Anti-inflammatory for lung inflammation (traditional)
    reference_ids:
    - REF-0495
    status: needs-review
constituents:
- name: Cardiac glycosides (cardenolides such as asclepin, calactin and calotropin)
  note: Heart-active compounds that make dosing and safety critical.
  reference_ids:
  - REF-0494
  - REF-0495
- name: Flavonoids and amino acids
  note: Supporting constituents of the root.
  reference_ids:
  - REF-0495
contraindications:
- note: 'Contains cardiac glycosides: do NOT use in pregnancy, breastfeeding or infancy, in anyone with
    a heart condition, or alongside cardiac glycoside medicines (e.g. digoxin).'
  reference_ids:
  - REF-0494
  - REF-0495
  status: verified
- note: Large doses are emetic and purgative (cause vomiting and diarrhoea). There is very little modern
    safety or efficacy data, so use only under the guidance of a qualified practitioner.
  reference_ids:
  - REF-0495
  status: verified
internal_notes: Enriched 2026-06-12 from general herbal literature (traditional monographs). Record status
  set to needs-review because Asclepias tuberosa contains cardiac glycosides and has essentially no modern
  clinical evidence. Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool
  (bronchitis, cough, fever); associations retained and now part-mapped and cited.
last_updated: '2026-06-12'
status: needs-review
