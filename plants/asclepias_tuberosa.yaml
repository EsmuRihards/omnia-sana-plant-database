contraindications:
- note: 'Contains cardiac glycosides: do NOT use in pregnancy, breastfeeding or infancy, in anyone with
    a heart condition, or alongside cardiac glycoside medicines (e.g. digoxin). The plant''s cardenolide-rich
    latex is directly toxic - a documented case caused corneal injury through Na/K-ATPase inhibition.'
  severity: caution
  reference_ids:
  - REF-0494
  - REF-0495
  - REF-0626
  status: verified
- note: Large doses are emetic and purgative (cause vomiting and diarrhoea). There is very little modern
    safety or efficacy data, so use only under the guidance of a qualified practitioner.
  severity: info
  reference_ids:
