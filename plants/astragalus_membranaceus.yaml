  note: Astragalus membranaceus and its constituents (astragaloside IV, cycloastragenol, Astragalus polysaccharide)
    inhibit tumour growth, invasion and metastasis and enhance antitumour immunity across lung, colorectal
    and gastrointestinal cancers (preclinical, incl. in vivo).
- action: antioxidant
