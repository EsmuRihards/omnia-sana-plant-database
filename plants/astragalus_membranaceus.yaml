common_names:
- Astragalus
- Huang qi
- Milkvetch root
- Mongolian milkvetch
scientific_name: Astragalus membranaceus
family: Fabaceae
parts_used:
- name: Root
  medicinal_actions:
  - action: Immune support / immunomodulation (activates macrophages, NK cells, T and B lymphocytes)
    reference_ids:
    - REF-0401
    - REF-0402
    status: verified
  - action: Adaptogenic tonic for fatigue and low vitality (traditional 'Qi' tonic)
    reference_ids:
    - REF-0402
    status: verified
  - action: Supports resistance to colds and respiratory infection (immune)
    reference_ids:
    - REF-0401
    status: verified
  - action: Renoprotective (kidney support)
    reference_ids:
    - REF-0402
    status: verified
  - action: Antioxidant and anti-inflammatory
    reference_ids:
    - REF-0402
    status: verified
constituents:
- name: Astragalus polysaccharides (APS)
  note: Principal immunomodulatory constituents.
  reference_ids:
  - REF-0401
- name: Cycloartane triterpenoid saponins (astragaloside IV)
  note: Major bioactive saponin with cardio-, neuro-, hepato- and renoprotective effects.
  reference_ids:
  - REF-0402
- name: Isoflavonoids (calycosin, formononetin)
  note: Antioxidant flavonoid constituents of the root.
  reference_ids:
  - REF-0402
contraindications:
- note: Astragalus stimulates immune activity; on theoretical grounds it should be used cautiously in
    autoimmune disease and with immunosuppressant medicines (for example after organ transplant) - discuss
    with a clinician.
  reference_ids:
  - REF-0401
  status: verified
- note: Generally well tolerated; high-quality long-term human safety and toxicity data remain limited.
  reference_ids:
  - REF-0402
  status: verified
- note: Safety in pregnancy and breastfeeding has not been established; avoid medicinal doses.
  reference_ids:
  - REF-0402
  status: needs-review
internal_notes: Enriched 2026-06-12 from scientific literature (Archives of Pharmacal Research review
  of Astragalus polysaccharide; Advances in Pharmacology review of astragaloside IV). Originally a skeleton
  imported from the omniasana.bio Symptom-to-Plant Lookup tool (immune-support, fatigue, cold, kidney-support);
  associations retained and now part-mapped and cited.
