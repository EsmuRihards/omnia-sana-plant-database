botanical_description:
  text: Erect perennial herb with a long, fibrous, pale yellow taproot. The leaves are pinnately compound
    with numerous small, oval leaflets, giving a soft, ferny appearance. Small, pale yellow, pea-like
    flowers are borne in loose axillary clusters (racemes), followed by membranous, inflated seed pods
    that give the species its name.
  height: 40-100 cm
  habit: Erect perennial herb
  leaves: Pinnately compound with numerous small, oval leaflets
  flowers: Small, pale yellow, pea-like flowers in loose axillary racemes
  stem: Erect, softly hairy
  root: Long, fibrous, pale yellow taproot (the medicinal part, huang qi)
  fruit: Membranous, inflated seed pod
  flowering_period: June-July
  reference_ids:
  - REF-0402
  status: verified
habitat:
  text: Native to the grasslands, sunny slopes and forest margins of northern and north-eastern China,
    Mongolia and parts of Korea; widely cultivated as a medicinal crop across East Asia.
  reference_ids:
  - REF-0402
  status: verified
harvesting:
  text: The root is dug from plants at least four years old, typically in spring or autumn, then cleaned
    and dried, often sliced into the characteristic pale, fibrous 'coin' slices used in traditional decoctions.
  parts:
  - Root
  season: Spring or autumn, from four-year-old (or older) plants
  reference_ids:
  - REF-0402
  status: verified
traditional_uses:
  text: Astragalus root (huang qi) is one of the most widely used tonic herbs in traditional Chinese medicine,
    classified as a 'Qi tonic' for fatigue, low vitality and reduced resistance to colds and infections,
    and used to support immune, cardiovascular and kidney health.
  reference_ids:
  - REF-0402
  - REF-0401
  status: verified
preparations:
- name: Decoction
  text: Dried, sliced root simmered in water, often alongside other tonic herbs, as the classic traditional
    Chinese medicine preparation.
  reference_ids:
  - REF-0402
  status: verified
- name: Standardised extract
  text: Concentrated extract standardised to polysaccharide or astragaloside IV content, taken as capsules
    or tablets.
  reference_ids:
  - REF-0401
  - REF-0402
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried root.
  status: draft
dosage:
- name: Decoction
  text: The WHO monograph on Radix Astragali gives doses of 3-9 g per day. Traditional Chinese medicine
    references often cite a considerably higher 9-30 g of dried root per day; WHO's figure is the conservative
    regulatory-tier one and is stated here in preference. Educational reference only, not a prescription.
  reference_ids:
  - REF-3102
  status: verified
- name: Standardised extract
  text: Clinical studies commonly use extracts providing the equivalent of several grams of dried root
    daily, in divided doses. Educational reference only, not a prescription.
  reference_ids:
  - REF-0401
  status: draft
