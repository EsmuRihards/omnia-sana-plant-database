id: astragalus-membranaceus
scientific_name: Astragalus membranaceus
common_names:
- Astragalus
- Huang qi
- Milkvetch root
- Mongolian milkvetch
family: Fabaceae
external_ids:
  gbif: 2933951
  powo: urn:lsid:ipni.org:names:478610-1
  wikidata: Q15532251
parts_used:
- Root
constituents:
- name: Astragalus polysaccharides (APS)
  compounds:
  - polysaccharide
  note: Principal immunomodulatory constituents.
  reference_ids:
  - REF-0401
- name: Cycloartane triterpenoid saponins (astragaloside IV)
  compounds:
  - saponin
  note: Major bioactive saponin with cardio-, neuro-, hepato- and renoprotective effects.
