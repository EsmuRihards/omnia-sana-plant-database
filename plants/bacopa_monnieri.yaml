contraindications:
- note: Generally well tolerated at standard doses. The most commonly reported side effects are gastrointestinal
    — nausea, stomach cramps, and increased bowel movements — which can be reduced by taking with food.
    Not recommended during pregnancy. May interact with medications that increase acetylcholine levels
    (e.g. Alzheimer's medications). Use with caution in thyroid conditions, as bacopa may increase thyroid
    hormone levels.
