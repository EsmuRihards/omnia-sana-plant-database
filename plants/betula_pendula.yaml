id: betula-pendula
scientific_name: Betula pendula
common_names:
- Birch
- Silver Birch
- Warty Birch
- European White Birch
- East Asian White Birch
family: Betulaceae
external_ids:
  gbif: 5331916
  powo: 'urn:lsid:ipni.org:names:295174-1'
  wikidata: Q156895
parts_used:
- Bark
- Leaf
- Sap
botanical_description:
  text: Elegant deciduous tree with a slender trunk, distinctive smooth white bark that peels in papery
    horizontal strips and becomes dark and fissured near the base with age, and characteristically drooping
    ('pendulous') branchlets. The leaves are small, triangular to diamond-shaped, doubly toothed and long-pointed.
    Male and female flowers are borne in separate catkins on the same tree in spring.
  height: Up to 25-30 m
  habit: Slender deciduous tree with drooping branchlets
  leaves: Small, triangular to diamond-shaped, doubly toothed, long-pointed
  flowers: Separate male and female catkins on the same tree
  stem: Slender trunk with smooth white, papery, peeling bark, dark and fissured at the base with age
  root: Shallow, wide-spreading root system
  fruit: Tiny winged seed (samara) shed from the female catkin
  flowering_period: April-May
  reference_ids:
  - REF-0743
  status: verified
habitat:
  text: A pioneer tree of light, well-drained, often poor or acidic soils, growing in woodland, heathland
    and waste ground across Europe and much of temperate Asia.
  reference_ids:
  - REF-0743
  status: verified
harvesting:
  text: Leaves are picked in spring and early summer while young and tender; bark is collected from felled
    or fallen wood (living trees should not be stripped of bark, which can kill them); sap is tapped in
    early spring, before leaf-out, through a small hole bored in the trunk.
  parts:
  - Bark
  - Leaf
  - Sap
  season: Leaf in spring/early summer; sap in early spring before leaf-out; bark from felled wood
  reference_ids:
  - REF-0743
  status: verified
traditional_uses:
  text: Birch leaf is a classic European 'aquaretic' diuretic used for urinary gravel, kidney stones and
    as a spring detoxifying tonic, and for rheumatic and joint complaints; the bark and its extracts have
    a long folk history for skin conditions, while the sap has been drunk fresh as a traditional spring
    tonic.
  reference_ids:
  - REF-0743
  status: verified
preparations:
- name: Infusion (leaf)
  text: Dried leaf infused in hot water as a traditional diuretic and 'detox' tea, classically taken as
    a course in spring.
  reference_ids:
  - REF-0743
  status: verified
- name: Decoction (bark)
  text: Bark simmered in water or processed into extracts for topical skin use.
  reference_ids:
  - REF-0743
  status: draft
- name: Fresh sap
  text: Sap collected fresh in early spring and drunk directly as a traditional tonic, or fermented into
    birch wine/vinegar.
  status: draft
dosage:
- name: Leaf infusion
  text: The EU herbal monograph gives 2-3 g of the comminuted leaf in 150 mL of boiling water as an infusion,
    up to 4 times daily, in adolescents, adults and elderly, with adequate fluid intake; dry extract at
    0.25-1 g 4 times daily and liquid extract at 15 mL 2-3 times daily are also listed. Traditionally
    used over a period of 2-4 weeks. Not recommended under 12 years. Educational reference only, not a
    prescription.
  reference_ids:
  - REF-3076
  - REF-0080
  status: verified
constituents:
- name: Flavonoids (quercetin, myricetin, hyperoside)
  compounds:
  - flavonoid
  - quercetin
  note: Principal diuretic and antioxidant constituents of the leaf.
  reference_ids:
