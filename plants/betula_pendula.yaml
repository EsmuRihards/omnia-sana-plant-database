contraindications:
- note: Generally considered safe when used appropriately. Side effects may include diarrhea, nausea,
    and allergic reactions (itching, rash, stuffy nose). Not recommended for individuals with edema caused
    by heart or kidney dysfunction. Ensure adequate fluid intake when using as a diuretic. Frequency of
    side effects is unknown.
  severity: info
  reference_ids:
  - REF-0080
  - REF-0188
  - REF-0203
  status: verified
- note: Duke (2002) provides clinical evidence (score 2) for birch leaf's diuretic activity, as well as
    for its use in urinary gravel, kidney stones, and rheumatic conditions — consistent with Commission
    E (KOM) and German Phytotherapy (PIP) approvals. It acts as an aquaretic, increasing urine volume
    without electrolyte loss. Antimelanomic activity has been demonstrated in experimental studies. The
    plant has a good safety profile and is classified as non-toxic at usual therapeutic doses (Duke, 2002).
  severity: info
  reference_ids:
  - REF-0080
  - REF-0188
  - REF-0203
  - REF-0063
  status: verified
