  sourced from the existing references bucket; general/undated claims marked status: draft per the
  integrity-first sourcing policy. | 2026-07-13: added anticancer action (where absent) + cancer indication
  (anticancer/antitumour research) sourced from the plant''s cited literature, as part of the
  cancer-condition campaign. | 2026-07-18 (dosage-sourcing campaign, batch 3): dosage sourced to the EU
  herbal monograph on Betula pendula/pubescens folium (EMA/HMPC/573241/2014 = REF-3076, new), with REF-0080
  kept as a secondary citation. REF-0080 was not cited alone because it is the public-summary leaflet, not
  the posology-bearing monograph - and it was itself repaired in the same session''s EMA-citation audit (its
  title field had held a bare URL). The existing 2-3 g figure matched; frequency corrected from ''up to
  three times daily'' to the monograph''s up to 4 times daily, and the 2-4 week traditional duration added.
  status -> verified.'