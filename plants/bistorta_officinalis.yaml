contraindications:
- note: 'Very tannin-rich: high or prolonged intake may cause stomach upset or constipation and can reduce
    the absorption of iron and some medicines taken at the same time.'
  severity: info
  reference_ids:
  - REF-0411
  status: verified
- note: Traditional use only; diarrhoea persisting beyond a few days, or mouth/throat inflammation that
    does not settle, needs medical assessment.
