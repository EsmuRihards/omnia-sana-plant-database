common_names:
- Bistort
- Common bistort
- Snakeroot
- Easter-ledges
- Adderwort
scientific_name: Bistorta officinalis
family: Polygonaceae
parts_used:
- name: Rhizome (root) and aerial parts
  medicinal_actions:
  - action: Astringent for mild diarrhoea (tannins tighten the gut lining and reduce excess secretion)
    reference_ids:
    - REF-0410
    - REF-0411
    status: verified
  - action: Anti-inflammatory gargle / mouthwash for inflammation of the mouth and throat (sore throat)
    reference_ids:
    - REF-0410
    - REF-0411
    status: verified
  - action: Vulnerary and styptic for minor wounds (topical)
    reference_ids:
    - REF-0410
    - REF-0411
    status: verified
  - action: Antibacterial (topical) - GC-MS-characterised extracts showed antibacterial activity
    reference_ids:
    - REF-0410
    - REF-0627
    status: verified
constituents:
- name: 'Tannins (15-36% of the rhizome: oligomeric proanthocyanidins, gallotannins, catechins)'
  note: Very high tannin content is the basis of the strong astringency.
  reference_ids:
  - REF-0411
  - REF-0410
- name: Phenolic acids and flavonoids
  note: Contribute to antioxidant and antibacterial activity.
  reference_ids:
  - REF-0410
- name: Starch and oxalic acid
  note: Other rhizome constituents.
  reference_ids:
  - REF-0411
contraindications:
- note: 'Very tannin-rich: high or prolonged intake may cause stomach upset or constipation and can reduce
    the absorption of iron and some medicines taken at the same time.'
  reference_ids:
  - REF-0411
  status: verified
- note: Traditional use only; diarrhoea persisting beyond a few days, or mouth/throat inflammation that
    does not settle, needs medical assessment.
  reference_ids:
  - REF-0411
  status: verified
- note: Safety in pregnancy and breastfeeding is not established; avoid medicinal doses.
  reference_ids:
  - REF-0411
  status: needs-review
internal_notes: Enriched 2026-06-12 from scientific and general literature (Journal of Ethnopharmacology
  activity study; WebMD monograph). Bistorta officinalis = Persicaria bistorta = Polygonum bistorta. Originally
  a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (diarrhea, sore-throat, wounds);
  associations retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced
  GC-MS study of Persicaria bistorta that characterised its constituents and confirmed antibacterial activity
  (REF-0627).
last_updated: '2026-06-14'
status: verified
