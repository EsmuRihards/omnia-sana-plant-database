dangerous_lookalikes:
- dangerous_plant: digitalis-purpurea
  severity: fatal
  confused_part: Pre-flowering rosette leaves gathered for cooking (salads, savoury pies, pasta fillings).
  confusion_context: Foxglove's soft, wrinkled first-year leaves closely resemble borage leaves gathered for food, and the mix-up is repeatedly documented — including people who developed high digitoxin levels and heart block after eating a few 'borage' leaves, one batch bought from a nursery mislabelled as borage. Foxglove leaves contain cardiac glycosides and can be fatal.
  distinguishing_features:
  - Borage leaves bear coarse, stiff, bristly hairs that feel rough or prickly; foxglove leaves are softly downy and velvety.
  - Crushed borage foliage smells clearly of cucumber; foxglove foliage has no cucumber smell.
  - 'In flower they are unmistakable: borage has bright blue five-pointed star flowers with a black central cone; foxglove has tall one-sided spikes of pendulous tubular thimble flowers. Do not identify from leaves alone if you can wait for flowers.'
  key_test: 'Rub and crush a leaf: borage feels coarse and bristly and smells of cucumber; a soft, velvety leaf with no cucumber smell should be treated as foxglove — do not eat it.'
