botanical_description:
  text: Robust, bristly annual herb with hollow, branching stems covered in coarse, stiff hairs. The leaves
    are large, oval and wrinkled, also coarsely hairy, and smell of cucumber when crushed. The flowers
    are strikingly bright blue, star-shaped with five pointed petals and a prominent black central cone
    of anthers, borne in nodding clusters.
  height: 30-100 cm
  habit: Robust, bristly, branching annual herb
  leaves: Large, oval, wrinkled, coarsely hairy, smelling of cucumber when crushed
  flowers: Bright blue, star-shaped, five-pointed, with a prominent black central cone, in nodding clusters
  stem: Hollow, branching, covered in coarse stiff hairs
  root: Shallow taproot
  fruit: Small, dark, oily nutlet (seed)
  flowering_period: June-September
  reference_ids:
  - REF-0749
  status: verified
habitat:
  text: Grows readily on disturbed, nutrient-rich ground, gardens, waste places and field margins; native
    to the Mediterranean region and widely naturalised and cultivated across Europe and elsewhere as a
    culinary and oil-seed crop.
  reference_ids:
  - REF-0749
  status: verified
harvesting:
  text: Leaves and flowers are picked fresh through the growing season, at their best just as the flowers
    open; the seed is collected in late summer once the seed heads have dried, pressed for its gamma-linolenic-acid-rich
    oil.
  parts:
  - Flower
  - Leaf
  - Seed
  - Stem
  season: Leaf and flower through summer; seed in late summer
  reference_ids:
  - REF-0749
  status: verified
traditional_uses:
  text: Borage has a long folk reputation, reflected in the old saying 'borage for courage', as a mood-lifting,
    cooling herb for feverish colds and respiratory complaints, and as a digestive and anti-inflammatory
    remedy; the fresh leaves and flowers have also been used culinarily. Modern use is centred on the
    seed oil, rich in gamma-linolenic acid (GLA), for inflammatory and skin conditions.
  reference_ids:
  - REF-0749
  status: verified
preparations:
- name: Seed oil
  text: Cold-pressed seed oil, standardised for GLA content, taken as capsules; the preferred modern medicinal
    form, since the whole herb carries pyrrolizidine-alkaloid caution.
  reference_ids:
  - REF-0749
  status: verified
- name: Fresh leaf/flower (culinary)
  text: Fresh leaves and flowers used in salads and as a garnish, continuing the traditional food use,
    and only in the short term given PA content.
  status: draft
- name: Infusion
  text: Dried leaf infused as a traditional cooling tea for fevers, though use should be short-term and
    PA-aware.
  reference_ids:
  - REF-0749
  status: draft
dosage:
- name: Seed oil (standardised)
  text: Products are commonly standardised to around 20-24% GLA, with typical intakes of one to a few
    300 mg softgels daily. Educational reference only, not a prescription.
  status: draft
- name: Whole-herb preparations
  text: A phase-two randomised placebo-controlled trial in moderate persistent asthma used Borago officinalis
    extract at 5 mL three times daily for one month. Because of pyrrolizidine alkaloid content, whole-herb
    (leaf/flower) preparations should only be used short-term and from PA-controlled sources; avoid in
    pregnancy, breastfeeding and liver disease. Educational reference only, not a prescription.
  reference_ids:
  - REF-1952
  - REF-3070
  status: verified
constituents:
- name: Gamma-linolenic acid (GLA) seed oil
  compounds:
  - gla
  note: Borage seed oil has one of the highest known GLA contents of any plant oil (typically 20-26%),
    the basis of its anti-inflammatory reputation.
  reference_ids:
  - REF-0749
- name: Pyrrolizidine alkaloids
  compounds:
  - alkaloid
  note: Unsaturated pyrrolizidine alkaloids present in the whole herb are hepatotoxic and genotoxic on
    cumulative exposure, limiting internal whole-herb use; the refined seed oil is largely free of them.
  reference_ids:
  - REF-0749
- name: Mucilage and tannins
  compounds:
  - mucilage
  - tannin
  note: Contribute to the plant's traditional demulcent and astringent properties.
  reference_ids:
  - REF-0749
