common_names:
- Boswellia
- Indian frankincense
- Salai guggul
- Shallaki
scientific_name: Boswellia serrata
family: Burseraceae
parts_used:
- name: Gum resin (oleo-gum-resin)
  medicinal_actions:
  - action: Anti-inflammatory (inhibits 5-lipoxygenase / leukotriene synthesis and NF-kB signalling)
    reference_ids:
    - REF-0423
    status: verified
  - action: 'Osteoarthritis: reduces joint pain and stiffness and improves function (over at least 4 weeks)'
    reference_ids:
    - REF-0422
    status: verified
  - action: Supports inflammatory arthritis including rheumatoid arthritis
    reference_ids:
    - REF-0423
    status: verified
  - action: Analgesic (pain relief)
    reference_ids:
    - REF-0422
    status: verified
  - action: Supportive in inflammatory bowel disease (ulcerative colitis, Crohn's disease)
    reference_ids:
    - REF-0423
    status: verified
  - action: Supportive in bronchial asthma
    reference_ids:
    - REF-0423
    status: verified
constituents:
- name: Boswellic acids (pentacyclic triterpenes, especially KBA and AKBA)
  note: The principal anti-inflammatory compounds; AKBA inhibits 5-lipoxygenase. Absorption improves when
    taken with a high-fat meal.
  reference_ids:
  - REF-0423
- name: Other triterpenes and essential oil of the resin
  note: Additional constituents of the oleo-gum-resin.
  reference_ids:
  - REF-0423
contraindications:
- note: Generally well tolerated; the most commonly reported side effects are mild gastrointestinal symptoms,
    and allergic reactions are rare.
  reference_ids:
  - REF-0423
  - REF-0422
  status: verified
- note: Boswellic acids can affect drug-metabolising enzymes, so caution is advised when taking other
    medicines; safety in pregnancy and breastfeeding is not established, so avoid medicinal doses.
  reference_ids:
  - REF-0423
  status: needs-review
internal_notes: Enriched 2026-06-12 from scientific literature (BMC Complementary Medicine and Therapies
  osteoarthritis meta-analysis; review of boswellic acids in chronic inflammatory disease). Originally
  a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (inflammation, arthritis, asthma,
  pain, ibd); associations retained and now part-mapped and cited.
last_updated: '2026-06-12'
status: verified
