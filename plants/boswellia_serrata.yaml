internal_notes: 'Enriched 2026-06-12 from scientific literature (BMC Complementary Medicine and Therapies
  osteoarthritis meta-analysis; review of boswellic acids in chronic inflammatory disease). Originally
  a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (inflammation, arthritis, asthma,
  pain, ibd); associations retained and now part-mapped and cited. Further enriched 2026-06-14 with PubMed-sourced
  evidence - a double-blind RCT in knee osteoarthritis with radiographic and hs-CRP outcomes (REF-0573)
  and an independent systematic review/meta-analysis of supplements for osteoarthritis that ranked Boswellia
  among the few with a large short-term effect on pain (REF-0574). | 2026-06-15: migrated to entity schema
  (actions->vocab ids, indications split out, constituents linked to compounds). | 2026-06-20: enriched
