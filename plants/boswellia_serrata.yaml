id: boswellia-serrata
scientific_name: Boswellia serrata
common_names:
- Boswellia
- Indian frankincense
- Salai guggul
- Shallaki
family: Burseraceae
parts_used:
- Gum resin (oleo-gum-resin)
constituents:
- name: Boswellic acids (pentacyclic triterpenes, especially KBA and AKBA)
  compounds:
  - boswellic-acid
  - terpene
  note: The principal anti-inflammatory compounds; AKBA inhibits 5-lipoxygenase. Absorption improves when
    taken with a high-fat meal.
  reference_ids:
  - REF-0423
- name: Other triterpenes and essential oil of the resin
  compounds:
  - essential-oil
  - terpene
  note: Additional constituents of the oleo-gum-resin.
  reference_ids:
  - REF-0423
botanical_description:
  text: Small to medium deciduous tree with thin, papery, peeling bark. The leaves are pinnately compound
    with numerous small, toothed leaflets, clustered toward the branch tips. Small, pale yellow to white
    flowers are borne in axillary racemes. When the bark is cut, it exudes a fragrant, resinous gum (oleo-gum-resin)
    that hardens into pale, waxy tears - the medicinal part.
  height: 4-10 m
  habit: Small to medium deciduous tree
  leaves: Pinnately compound with numerous small, toothed leaflets
  flowers: Small, pale yellow to white flowers in axillary racemes
  stem: Thin, papery, peeling bark, exuding resin when cut
  root: Woody root system
  fruit: Small, three-valved capsule
  flowering_period: Varies with climate; typically before or with new leaves
  reference_ids:
  - REF-0423
  status: verified
habitat:
  text: Native to dry, rocky, hilly terrain of India and parts of the Middle East and North Africa, where
    it is tapped for its resin much like frankincense (Boswellia sacra).
  reference_ids:
  - REF-0423
  status: verified
harvesting:
  text: The bark is deliberately incised and the exuded oleo-gum-resin is allowed to harden and is collected
    over several days to weeks, then cleaned and graded before use or extraction.
  parts:
  - Gum resin (oleo-gum-resin)
  season: Tapped through the dry season
  reference_ids:
  - REF-0423
  status: verified
traditional_uses:
  text: Boswellia resin (salai guggul) is a mainstay of Ayurvedic medicine for inflammatory joint and
    respiratory conditions, and has been burned as incense across many cultures. Modern standardised extracts,
    rich in boswellic acids, are used for osteoarthritis, inflammatory bowel disease and other inflammatory
    conditions, directly building on this traditional anti-inflammatory reputation.
  reference_ids:
  - REF-0423
  status: verified
preparations:
- name: Standardised extract
  text: Resin extract standardised to boswellic acid (often AKBA) content, taken as capsules or tablets,
    ideally with a fat-containing meal to aid absorption.
  reference_ids:
  - REF-0423
  status: verified
- name: Resin/incense
  text: Raw resin tears burned as incense or chewed traditionally; not a standardised medicinal dose.
  status: draft
- name: Topical cream
  text: Resin extract formulated into topical creams for joint and skin application.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials in osteoarthritis commonly use extracts providing around 100-250 mg of boswellic
    acids (or several hundred mg of standardised extract) daily, in divided doses, taken with food. Educational
    reference only, not a prescription.
  reference_ids:
  - REF-0423
  status: draft
actions:
- action: analgesic
  note: Analgesic (pain relief)
  reference_ids:
  - REF-0422
  - REF-0573
  - REF-1810
  - REF-1816
  - REF-1817
  status: verified
- action: anti-inflammatory
  note: Anti-inflammatory (inhibits 5-lipoxygenase / leukotriene synthesis and NF-kB signalling); Reduces
    inflammatory markers (e.g. hs-CRP) and, in one RCT, improved knee joint-space and reduced osteophytes
    on radiograph
  reference_ids:
  - REF-0423
  - REF-0573
  - REF-1809
  - REF-1810
  - REF-1811
  - REF-1812
  - REF-1813
  - REF-1815
  - REF-1816
  - REF-1817
  - REF-1818
  status: needs-review
indications:
- condition: arthritis
  note: 'Osteoarthritis: reduces joint pain and stiffness and improves function (over at least 4 weeks);
    Supports inflammatory arthritis including rheumatoid arthritis'
  reference_ids:
  - REF-0422
  - REF-0423
  - REF-0573
  - REF-0574
  status: verified
- condition: asthma
  note: Supportive in bronchial asthma
  reference_ids:
  - REF-0423
  status: verified
- condition: back-pain
  note: inferred from analgesic action
  reference_ids:
  - REF-0422
  status: needs-review
- condition: headache
  note: inferred from analgesic action
  reference_ids:
  - REF-0422
  status: needs-review
- condition: ibd
  note: Supportive in inflammatory bowel disease (ulcerative colitis, Crohn's disease)
  reference_ids:
  - REF-0423
  status: verified
- condition: inflammation
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0423
  - REF-0573
  status: needs-review
- condition: pain
  note: 'Analgesic (pain relief); Osteoarthritis: reduces joint pain and stiffness and improves function
    (over at least 4 weeks)'
  reference_ids:
  - REF-0422
  - REF-0573
  - REF-0574
  status: verified
- condition: skin-irritation
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0423
  - REF-0573
  status: needs-review
contraindications:
- note: Generally well tolerated; the most commonly reported side effects are mild gastrointestinal symptoms,
    and allergic reactions are rare.
  severity: info
  reference_ids:
  - REF-0423
  - REF-0422
  status: verified
- note: Boswellic acids can affect drug-metabolising enzymes, so caution is advised when taking other
    medicines; safety in pregnancy and breastfeeding is not established, so avoid medicinal doses.
  severity: caution
  reference_ids:
  - REF-0423
  status: needs-review
