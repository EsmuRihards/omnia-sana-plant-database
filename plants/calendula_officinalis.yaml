contraindications:
- note: Generally very safe for topical use. May cause contact dermatitis in rare cases (Asteraceae family
    allergy). Internal use is safe in normal doses. Avoid during pregnancy at therapeutic doses (uterine
    stimulant potential). Generally safe during breastfeeding for topical use.
  severity: caution
  reference_ids:
  - REF-0112
  - REF-0183
  - REF-0199
  status: verified
- note: 'Duke (2002) rates calendula (Calendula officinalis) and notes anti-inflammatory, wound-healing
    (vulnerary), antifungal, and antispasmodic activities at experimental levels. Commission E (KOM) approves
    calendula flower for wound healing and anti-inflammatory uses, both topically and as a gargle. The
    plant contains flavonoids, triterpene saponins (oleanolic acid glycosides), and essential oils. Dose:
    1–2 g dried flower as tea (for mouth rinse/gargle); or as cream/ointment containing 2–5% calendula
    extract for topical use. Duke notes that calendula is generally very well-tolerated, though Asteraceae
    sensitivity can occasionally cause allergic reactions (Duke, 2002).'
  severity: info
  reference_ids:
  - REF-0112
  - REF-0183
  - REF-0199
  status: verified
