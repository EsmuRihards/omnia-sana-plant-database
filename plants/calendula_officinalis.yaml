id: calendula-officinalis
scientific_name: Calendula officinalis
common_names:
- Pot marigold
- Calendula
- common marigold
family: Asteraceae
wp_post_id: 150
parts_used:
- Flower
- Petals
botanical_description:
  text: Aromatic annual or short-lived perennial herb with soft, hairy, oblong leaves and branching, slightly
    sticky stems. The flower heads are bright orange to yellow, daisy-like, with numerous narrow ray florets
    surrounding a darker central disc, opening in sunlight and closing at dusk.
  height: 30-60 cm
  habit: Erect, branching annual or short-lived perennial herb
  leaves: Soft, hairy, oblong to lance-shaped
  flowers: Bright orange to yellow, daisy-like flower heads with numerous narrow ray florets
  stem: Branching, softly hairy, slightly sticky
  root: Shallow taproot
  fruit: Curved, ridged achene, without pappus
  flowering_period: June to first frost
  reference_ids:
  - REF-0752
  status: verified
habitat:
  text: Widely cultivated as a garden and medicinal plant; believed native to southern Europe and the
    Mediterranean, now naturalised in gardens and waste ground worldwide.
  reference_ids:
  - REF-0752
  status: draft
harvesting:
  text: The flower heads (or just the ray-floret petals) are picked by hand as they open, through the
    flowering season, and dried quickly in a warm, shaded, airy place to preserve colour and resin content.
  parts:
  - Flower
  - Petals
  season: Through the flowering season (summer to autumn), as flowers open
  reference_ids:
  - REF-0752
  status: verified
traditional_uses:
  text: Calendula flower is one of the most widely used topical wound-healing and skin-soothing herbs
    in Western herbal medicine, applied to cuts, grazes, minor burns and skin inflammation, and used internally
    as a gentle anti-inflammatory and antimicrobial remedy and as a gargle for mouth and throat irritation.
  reference_ids:
  - REF-0752
  status: verified
preparations:
- name: Infused oil
  text: Dried petals infused in a carrier oil, used as a soothing base for topical creams and balms for
    skin healing.
  reference_ids:
  - REF-0752
  status: verified
- name: Cream/ointment
  text: Standardised flower extract formulated into a cream or ointment for topical wound and skin care;
    the best-studied modern form.
  reference_ids:
  - REF-0752
  status: verified
- name: Infusion
  text: Dried flower infused in hot water, taken internally or used as a gargle/mouthwash.
  status: draft
dosage:
- name: Topical cream/ointment
  text: Applied to the affected skin area 2-3 times daily, per product labelling. Educational reference
    only, not a prescription.
  status: draft
- name: Infusion/gargle
  text: Traditional herbal references suggest around 1-2 g of dried flower per cup, up to three times
    daily. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Triterpene saponins (oleanolic acid glycosides, calendulosides)
  compounds:
  - triterpene-saponin
  - saponin
  note: Principal wound-healing and anti-inflammatory constituents of the flower.
  reference_ids:
  - REF-0752
- name: Flavonoids and carotenoids
  compounds:
  - flavonoid
  - carotenoid
  note: Antioxidant flavonoids and carotenoids give the flower its orange-yellow colour and contribute
    to its antioxidant activity.
  reference_ids:
