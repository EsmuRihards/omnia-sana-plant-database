contraindications:
- note: Generally safe in moderate consumption. High caffeine intake may cause insomnia, anxiety, palpitations,
    or dependence. Large amounts of green tea extract supplements may be hepatotoxic (rare). May reduce
    iron absorption if consumed with meals. Avoid very high supplement doses during pregnancy.
  reference_ids:
  - REF-0045
  - REF-0061
  - REF-0184
  status: verified
- note: Duke (2002) rates tea (Camellia sinensis) as ++ and notes anti-aggregant, antioxidant, anticariogenic,
    and antibacterial activities at the experimental level (score 1). The catechins (EGCG, ECG) and polyphenols
    are responsible for the antioxidant and anticancer properties under research investigation. Duke notes
    that green tea preserves more polyphenols than black tea due to less oxidation. Regular tea consumption
    is associated with reduced cardiovascular risk. Excess consumption (>10 cups daily) may cause fluoride-related
    bone changes. Caffeine content is relevant for sleep disturbance, anxiety, and interactions with cardiovascular
    medications (Duke, 2002).
  reference_ids:
  - REF-0045
  - REF-0061
  - REF-0184
  status: verified
