id: camellia-sinensis
scientific_name: Camellia sinensis
common_names:
- Tea
- green tea
- black tea
- white tea
- oolong
family: Theaceae
parts_used:
- Leaf
- Young sprouts
botanical_description:
  text: Evergreen shrub or small tree with glossy, dark green, leathery, finely toothed leaves. Small,
    fragrant, white flowers with a prominent central boss of yellow stamens are borne singly or in small
    clusters in the leaf axils. Commercial tea is made from the young leaves and unopened leaf buds ('sprouts'),
    processed differently to yield green, black, white or oolong tea from the same species.
  height: 1-9 m (kept pruned to 1-1.5 m under cultivation)
  habit: Evergreen shrub or small tree, usually kept pruned as a shrub
  leaves: Glossy, dark green, leathery, finely toothed
  flowers: Small, fragrant, white, with a prominent boss of yellow stamens
  stem: Woody, branching, evergreen
  root: Deep taproot
  fruit: Woody capsule containing a few large seeds
  flowering_period: Autumn to winter
  reference_ids:
  - REF-0045
  status: verified
habitat:
  text: Native to the subtropical and tropical forests and hillsides of East and South Asia (China, India,
    Myanmar); cultivated extensively across Asia, Africa and elsewhere on well-drained, acidic upland
    soils.
  reference_ids:
  - REF-0045
  status: draft
harvesting:
  text: The youngest leaves and unopened leaf buds ('flush') are hand- or machine-picked repeatedly through
    the growing season; how the fresh leaf is subsequently processed (withered, rolled, oxidised, fixed
    and dried) determines whether it becomes green, black, white or oolong tea.
  parts:
  - Leaf
  - Young sprouts
  season: Repeated flushes through the growing season
  reference_ids:
  - REF-0045
  status: verified
traditional_uses:
  text: Tea has an ancient East Asian tradition as both a beverage and a medicinal tonic, used for alertness,
    digestion and general wellbeing; green tea in particular has a long-standing reputation, now widely
    studied, as an antioxidant, cardiometabolic and cognitive-support beverage.
  reference_ids:
  - REF-0045
  - REF-0755
  status: verified
preparations:
- name: Infusion (green tea)
  text: Young leaf, minimally oxidised, infused in hot water; the least-processed and most-studied form
    for antioxidant polyphenol content.
  reference_ids:
  - REF-0045
  status: verified
- name: Infusion (black/oolong tea)
  text: Leaf that has been withered, rolled and fully or partially oxidised before drying, infused in
    hot water; a more oxidised, less catechin-rich preparation with its own flavour and mild stimulant
    profile.
  status: draft
- name: Standardised extract
  text: Concentrated leaf extract standardised to catechin (e.g. EGCG) content, taken as capsules; used
    in some clinical studies, though high-dose extracts carry rare hepatotoxicity concerns.
  reference_ids:
  - REF-0045
  status: verified
dosage:
- name: Infusion
  text: Traditional and common use is around 2-4 g of dried leaf per cup, up to several cups daily; moderate
    consumption (a few cups per day) is generally considered safe. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Catechins (EGCG, ECG) and polyphenols
  compounds:
  - catechin
  - phenolic-compound
  note: Principal antioxidant polyphenols, most concentrated in minimally oxidised green tea; epigallocatechin
    gallate (EGCG) is the best studied.
  reference_ids:
  - REF-0045
  - REF-0755
- name: Caffeine and theanine
  note: Caffeine gives tea its mild stimulant effect; L-theanine, a unique amino acid, is associated with
    calm alertness and modulates caffeine's effects.
  reference_ids:
  - REF-0755
- name: Theaflavins and thearubigins
  note: Oxidative polymerisation products of catechins formed during black tea processing, contributing
    to black tea's colour and its own antioxidant profile.
  reference_ids:
  - REF-0045
