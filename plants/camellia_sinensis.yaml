drug_class_interactions:
- drug_class: antihypertensives
  severity: caution
  mechanism: Green tea catechins block an intestinal uptake transporter (OATP1A2) that some blood-pressure
    medicines rely on for absorption. In a controlled study, drinking green tea cut blood levels of the
    beta-blocker nadolol by about 85% and blunted its blood-pressure-lowering effect. If you take nadolol
    (or other OATP-transported medicines), separate green tea from the dose by several hours and keep
    intake consistent; watch that your blood pressure stays controlled.
  reference_ids:
  - REF-2510
  - REF-2511
