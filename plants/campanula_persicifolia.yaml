botanical_description:
  text: An elegant perennial herb of the bellflower family, 30-90 cm tall, growing from a slender rhizome.
    It forms an overwintering rosette of narrow, leathery, finely-toothed leaves that resemble those of
    a peach tree (hence 'peach-leaved'); the few stem leaves are similar but smaller. The large, broad,
    open bell-shaped flowers - about 3-4 cm across, clear blue to lilac or white - are borne in a loose,
    one-sided spike in summer. Like other bellflowers it exudes a white latex when cut. It is widely grown
    as an ornamental garden perennial, and its young leaves and roots have historically been eaten.
  height: 30-90 cm
  habit: Slender rhizomatous perennial with an evergreen leaf rosette
  leaves: Narrow, leathery, finely toothed, peach-leaf-like; mostly in a basal rosette
  flowers: Large, broad, open bells (3-4 cm), clear blue to lilac or white, in a loose one-sided spike
  stem: Erect, slender, little-branched, exuding white latex when cut
  root: Slender rhizome with fibrous roots
  fruit: A nodding capsule opening by pores near the top
  flowering_period: June-August
  reference_ids:
  - REF-2816
  status: verified
habitat:
  text: Open woodland, wood margins, scrub, hedge banks and dry to moist grassland across much of Europe
    and into western Asia; also very widely cultivated and naturalised as a garden ornamental. It favours
    well-drained soils in sun or light shade.
  reference_ids:
  - REF-2816
  status: verified
harvesting:
  text: Young leaves and shoots are gathered in spring for use as a salad or pot-herb (mild, faintly sweet,
    like other bellflowers and rampion); the flowers are gathered in summer, and the root can be dug in
    autumn. Chiefly a food and ornamental plant rather than a medicinal drug.
  parts:
  - Leaf
  - Flower
  - Root
  season: Young leaves/shoots in spring; flowers in summer; root in autumn
  reference_ids:
  - REF-2820
  status: verified
traditional_uses:
  text: 'Peach-leaved bellflower is primarily an edible and ornamental plant rather than a classical medicinal
    herb: its young leaves and roots have long been eaten as a wild salad green or pot-herb, in the same
    way as its relative rampion (Campanula rapunculus). Folk use of bellflowers (Campanula) includes a
    leaf or flower infusion as a gentle gargle and wash for sore throat and mouth inflammation, and topical
    use of the crushed herb on inflamed skin. More broadly, the genus Campanula has traditional records
    of use for inflammatory, respiratory and cardiovascular complaints, backed by its phenolic, flavonoid
    and triterpene chemistry.'
  reference_ids:
  - REF-2820
  - REF-2816
  status: verified
