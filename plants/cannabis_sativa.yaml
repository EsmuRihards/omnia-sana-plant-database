botanical_description:
  text: Erect annual herb with a distinctive palmately compound leaf of narrow, serrated leaflets. The
    plant is usually dioecious (separate male and female plants); female plants develop dense, resinous
    flower clusters, while male plants bear looser pollen-releasing flowers. The seed (achene) is small,
    hard-shelled and oil-rich.
  height: 1-5 m, depending on variety and cultivation
  habit: Erect, fast-growing annual herb
  leaves: Palmately compound, narrow serrated leaflets
  flowers: Dioecious; female flowers in dense resinous clusters, male flowers looser and pollen-releasing
  stem: Erect, fibrous, often ridged
  root: Taproot with fibrous lateral roots
  fruit: Small, hard-shelled, oil-rich achene (seed)
  flowering_period: Late summer to autumn
  reference_ids:
  - REF-0044
  status: verified
habitat:
  text: Believed native to Central Asia; now cultivated worldwide, with industrial hemp (low-THC cultivars)
    grown in temperate climates for fibre, seed and cannabinoid extraction, subject to varying legal regulation
    by jurisdiction.
  reference_ids:
  - REF-0044
  status: draft
harvesting:
  text: Flowers (and resin-bearing leaves) are harvested at peak resin/cannabinoid content, typically
    as the flower clusters mature in late summer to autumn; seed is harvested once mature and dried, then
    pressed for oil or used whole.
  parts:
  - Flower
  - Leaf
  - Seed
  season: Late summer to autumn
  reference_ids:
  - REF-0044
  status: verified
traditional_uses:
  text: Cannabis/hemp has a long multi-cultural history as a fibre, food and medicinal plant, traditionally
    used for pain, muscle spasm, sleep and appetite, alongside industrial use of the fibre and seed. Modern
    cannabinoid research, particularly on THC and CBD, has substantially expanded the evidence base for
    pain, spasticity and specific seizure disorders.
  reference_ids:
  - REF-0044
  - REF-0058
  status: verified
preparations:
- name: Seed / seed oil
  text: Whole or hulled seed, or cold-pressed seed oil, used as a nutritional food source (essentially
    free of psychoactive cannabinoids).
  reference_ids:
  - REF-0044
  status: verified
- name: Standardised cannabinoid extract
  text: Extract standardised to specific cannabinoid content (e.g. CBD), used in regulated medicinal products;
    regulatory status varies widely by jurisdiction and product type.
  reference_ids:
  - REF-0058
  status: verified
- name: Dried flower
  text: Dried flower used traditionally and in some jurisdictions medicinally; legal status and THC content
    vary widely.
  status: draft
dosage:
- name: All preparations
  text: Because cannabinoid content, legal status and formulation vary enormously between products, no
    general dose is given here; use only regulated, quality-controlled products under appropriate medical
    or legal guidance. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Cannabinoids (THC, CBD and related compounds)
  note: The characteristic bioactive compounds of the resin-bearing flowers, varying widely in ratio and
    concentration between cultivars; THC is psychoactive, CBD is not.
  reference_ids:
  - REF-0044
  - REF-0058
- name: Terpenes
  compounds:
  - terpene
  - essential-oil
  note: Aromatic terpenes contribute to the plant's characteristic scent and may modulate cannabinoid
    effects.
  reference_ids:
  - REF-0044
- name: Seed oil fatty acids
  note: Hemp seed is rich in polyunsaturated fatty acids (including omega-3 and omega-6), giving the pressed
    seed oil its nutritional value; essentially free of psychoactive cannabinoids.
  reference_ids:
  - REF-0044
