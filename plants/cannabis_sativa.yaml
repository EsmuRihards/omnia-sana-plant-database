contraindications:
- note: Industrial hemp (low-THC cannabis) seed oil and seeds are generally safe as food. CBD products
    derived from hemp may interact with medications metabolised by cytochrome P450 liver enzymes, including
    common anticoagulants, antiepileptics, and immunosuppressants. THC-containing preparations impair
    driving and are regulated or prohibited in many jurisdictions. Not recommended during pregnancy or
    breastfeeding. Quality and cannabinoid content vary widely between hemp products.
  reference_ids:
  - REF-0044
  - REF-0058
  - REF-0213
  status: verified
- note: Duke (2002) rates cannabis as ++ and notes clinical evidence (score 2) for its antiemetic activity,
    especially relevant for chemotherapy-induced nausea. Score 1 activities include analgesic, anticonvulsant,
    and anti-inflammatory properties. Duke highlights the legal and pharmacological complexity, noting
    THC as the primary psychoactive compound. Medically, synthetic cannabinoids (dronabinol, nabilone)
    are clinically approved for nausea and anorexia. Duke cautions that while the plant has genuine therapeutic
    potential, psychoactive effects, legal restrictions, and risk of dependence with regular use must
    be considered (Duke, 2002).
  reference_ids:
  - REF-0044
  - REF-0058
  - REF-0213
  status: verified
