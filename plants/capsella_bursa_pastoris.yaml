internal_notes: 'Enriched 2026-06-12 from general and phytotherapy literature (Herbal Reality monograph;
  ESCOP note citing an RCT showing reduced menstrual blood loss). Originally a skeleton imported from
  the omniasana.bio Symptom-to-Plant Lookup tool (heavy-bleeding, wounds, menstrual-cramps); associations
  retained and now part-mapped and cited. Further enriched 2026-06-14 by citing that RCT directly - the
  PubMed-sourced triple-blind trial by Naafe et al. (REF-0608) in which Capsella bursa-pastoris significantly
  reduced heavy menstrual bleeding (PBLAC score) versus control. | 2026-06-15: migrated to entity schema
  (actions->vocab ids, indications split out, constituents linked to compounds). | 2026-06-20: added 3
  PubMed-sourced references to the plant-level references bucket (least-cited enrichment): REF-0761, REF-0762,
  REF-0763. | 2026-06-20: enriched to >=10 scientific publications: added 9 PubMed-verified @article sources
  (REF-1971, REF-1972, REF-1973, REF-0761, REF-0763, REF-1974, REF-0762, REF-1975, REF-1976) — woven into
  relevant actions/indications and the plant-level references bucket. | 2026-07-11: added monograph-base
  fields (botanical_description, habitat, harvesting, traditional_uses, preparations, dosage) sourced
  from the existing references bucket; general/undated claims marked status: draft per the integrity-first
  sourcing policy. | 2026-07-18 (dosage-sourcing campaign, batch 2): dosage sourced to the EU herbal monograph
  on Capsella bursa-pastoris (L.) Medikus, herba (EMA/HMPC/262766/2010 = REF-3068, new), with REF-0508
  (ESCOP news item on shepherd''s purse and heavy menstrual bleeding) kept as a secondary citation - REF-0508
  is a web news page, not a monograph, so it was not used alone. Tea rewritten to the monograph''s 1-5
  g single dose 2-4x daily (daily 3-20 g). The ''Tincture / 1-4 mL of a 1:5'' entry was renamed to ''Liquid
  extract'' because that is what the monograph actually specifies (1-4 mL 3x daily). Added the monograph''s
  key timing instruction: start 3-5 days before menstruation and continue during bleeding. Adults only.
  status -> verified. DEAD END (preparations, 2026-07-20): checked against the monograph references already
  on this record, judged from their stored posology summaries and not from the full monograph PDFs - a
  later pass with the PDFs, or a new seam (Health Canada NNHPD, ESCOP, Commission E), may still resolve
  these. ''Tincture'': The monograph lists comminuted herbal substance for tea and liquid extract only.
  No tincture, no ethanol strength, no 1:5 ratio. | ''Poultice'': The monograph''s posology is oral only
  (tea and liquid extract) and its indication is menstrual. It contains no cutaneous route, no poultice,
  and no wound or haemostatic application.'
