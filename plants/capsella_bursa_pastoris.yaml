id: capsella-bursa-pastoris
scientific_name: Capsella bursa-pastoris
common_names:
- Shepherd's Purse
- Shepherd's bag
- Mother's heart
family: Brassicaceae
external_ids:
  gbif: 5375388
  powo: urn:lsid:ipni.org:names:30092589-2
  wikidata: Q27264
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Flavonoids and tannins
  compounds:
  - flavonoid
  - tannin
  note: Astringent constituents underlying the styptic action.
  reference_ids:
  - REF-0507
- name: Vitamin K, biogenic amines and organic acids (oxalic, dicarboxylic)
  note: Constituents linked to its blood-clotting (haemostatic) effect.
  reference_ids:
  - REF-0507
botanical_description:
  text: Small, variable annual or biennial herb with a basal rosette of deeply toothed, dandelion-like
    leaves and a slender, upright, sparsely branched flowering stem bearing tiny stalked white flowers.
    As the flowers fade, they give way to distinctive small, flattened, heart- or purse-shaped seed pods,
    the origin of the common name.
  height: 10-40 cm
  habit: Small, upright annual to biennial herb
  leaves: Basal rosette deeply toothed (dandelion-like); stem leaves smaller, arrow-shaped, clasping
  flowers: Tiny, white, four-petalled flowers on slender stalks along an elongating raceme
  stem: Slender, upright, sparsely branched
  root: Slender taproot
  fruit: Small, flattened, heart- or purse-shaped seed pod (silicle)
  flowering_period: Almost year-round in mild climates; peak spring to autumn
  reference_ids:
  - REF-0507
  status: verified
habitat:
  text: A common weed of cultivated ground, gardens, roadsides, waste places and lawns worldwide; native
    to Europe and Asia and now naturalised on every inhabited continent.
  reference_ids:
  - REF-0507
  status: verified
harvesting:
  text: The whole flowering plant is cut just as it comes into flower and while the seed pods are still
    forming, then dried quickly, since the fresh or freshly dried herb is considered most active for its
    haemostatic effect.
  parts:
  - Aerial parts (flowering herb)
  season: While flowering and early seed-pod formation
  reference_ids:
  - REF-0507
  status: verified
traditional_uses:
  text: Shepherd's purse has a long folk reputation as a styptic and haemostatic herb, traditionally used
    to stop bleeding - from minor wounds, nosebleeds, heavy menstrual bleeding and postpartum bleeding
    - and as a uterine tonic to ease menstrual flow and cramps.
  reference_ids:
  - REF-0507
  status: verified
preparations:
- name: Infusion
  text: Dried flowering herb infused in hot water as a traditional styptic and menstrual-support tea.
  reference_ids:
  - REF-0507
  status: verified
- name: Tincture
  text: Alcoholic extract of the fresh or dried flowering herb, typically around 1:5.
  status: draft
- name: Poultice
  text: Crushed fresh herb applied directly to minor wounds to help stop bleeding.
  status: draft
dosage:
- name: Infusion
  text: The EU herbal monograph gives 1-5 g of the comminuted herb as a single dose for tea preparation,
    2-4 times daily (daily dose 3-20 g), in adults. For heavy menstrual bleeding the monograph directs
    that use be started 3-5 days before menstruation and continued during the bleeding. Not recommended
    under 18 years. Educational reference only, not a prescription.
  reference_ids:
  - REF-3068
  - REF-0508
  status: verified
- name: Liquid extract
  text: The EU herbal monograph gives 1-4 mL as a single dose, three times daily (daily dose 3-12 mL),
    in adults, on the same pre-menstrual timing as the tea. Educational reference only, not a prescription.
  reference_ids:
  - REF-3068
  status: verified
actions:
- action: astringent
  note: Astringent / styptic for minor wounds (helps stop bleeding, topical)
  reference_ids:
  - REF-0507
  - REF-1971
  - REF-1972
  status: verified
- action: emmenagogue
  note: Tones the uterus and eases menstrual flow and cramps (traditional)
  reference_ids:
  - REF-0507
  status: needs-review
- action: styptic
  note: Astringent / styptic for minor wounds (helps stop bleeding, topical); Haemostatic / styptic -
    reduces heavy menstrual bleeding (menorrhagia); also used for nosebleeds and postpartum bleeding.
    In a randomized clinical trial, Capsella bursa-pastoris added to mefenamic acid reduced menstrual
    blood loss significantly more than mefenamic acid alone
  reference_ids:
  - REF-0507
  - REF-0508
  - REF-0608
  - REF-1972
  status: verified
indications:
- condition: diarrhea
  note: inferred from astringent action
  reference_ids:
  - REF-0507
  status: needs-review
- condition: heavy-bleeding
  note: Haemostatic / styptic - reduces heavy menstrual bleeding (menorrhagia); also used for nosebleeds
    and postpartum bleeding. In a randomized clinical trial, Capsella bursa-pastoris added to mefenamic
    acid reduced menstrual blood loss significantly more than mefenamic acid alone
  reference_ids:
  - REF-0507
  - REF-0508
  - REF-0608
  - REF-1971
  - REF-1972
  status: verified
- condition: menstrual-cramps
  note: Tones the uterus and eases menstrual flow and cramps (traditional)
  reference_ids:
  - REF-0507
  status: needs-review
- condition: pms
  note: inferred from emmenagogue action
  reference_ids:
  - REF-0507
  status: needs-review
- condition: skin-irritation
  note: inferred from astringent action
  reference_ids:
  - REF-0507
  status: needs-review
- condition: wounds
  note: Astringent / styptic for minor wounds (helps stop bleeding, topical)
  reference_ids:
  - REF-0507
  status: verified
contraindications:
- note: Avoid during pregnancy (it stimulates the uterus). Any heavy or abnormal bleeding needs medical
    evaluation to identify the cause - do not self-treat without assessment.
  severity: caution
  reference_ids:
  - REF-0507
  status: verified
- note: May affect blood pressure and heart rhythm, so use caution with cardiac, blood-pressure, anticoagulant,
    thyroid and sedative medicines.
  severity: caution
  reference_ids:
  - REF-0507
  status: needs-review
