contraindications:
- note: Capsaicin causes intense burning sensation; avoid contact with eyes and mucous membranes. High
    oral doses can cause gastrointestinal irritation, nausea, and diarrhoea. Topical preparations may
    cause skin irritation and should be used diluted. Not recommended for individuals with active peptic
    ulcers. Caution with anticoagulants — capsaicin may enhance bleeding risk. During pregnancy, culinary
    amounts are considered safe, but high-dose supplements should be avoided. Repeated topical application
    leads to desensitisation (TRPV1 depletion), which is the basis for its analgesic use. Children under
    2 should not be given capsaicin-containing topical products (Basu and Bhattacharyya, 2023).
  severity: caution
  reference_ids:
  - REF-0010
  - REF-0021
  - REF-0057
  - REF-0161
  - REF-0169
  - REF-0214
  status: verified
- note: Duke (2002) rates cayenne/chili pepper (Capsicum annuum) highly for its clinically documented
    analgesic, counterirritant, and rubefacient activities. Commission E approves topical capsaicin preparations
    for muscle pain, arthritis, and neuralgia (score 2). The active compound capsaicin depletes substance
    P in sensory neurons upon repeated application, reducing pain signals. Capsaicin cream (0.025–0.075%)
    is a validated treatment for post-herpetic neuralgia, diabetic neuropathy, and osteoarthritis pain.
    Internal use can irritate mucous membranes; external use requires avoiding contact with eyes and mucous
    membranes (Duke, 2002).
  severity: caution
