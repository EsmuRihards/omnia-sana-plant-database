botanical_description:
  text: Bushy annual or short-lived perennial herb (grown as an annual in temperate climates) with glossy,
    oval to lance-shaped leaves. Small, star-shaped, white to greenish flowers give way to the characteristic
    fleshy, hollow fruit (a berry), which ripens from green through yellow to red and varies enormously
    in size, shape and pungency between cultivars.
  height: 0.5-1.5 m
  habit: Bushy annual or short-lived perennial herb
  leaves: Glossy, oval to lance-shaped
  flowers: Small, star-shaped, white to greenish, borne singly or in small clusters
  stem: Branching, semi-woody at the base in older plants
  root: Fibrous root system
  fruit: Fleshy, hollow berry, ripening green to yellow/orange/red, containing numerous flat seeds
  flowering_period: Summer, continuing until frost
  reference_ids:
  - REF-2142
  status: verified
habitat:
  text: Native to Central and South America; cultivated worldwide in warm and temperate climates as a
    food and medicinal crop, thriving in full sun on well-drained soil.
  reference_ids:
  - REF-2142
  status: draft
harvesting:
  text: Fruit is picked at the desired stage of ripeness (green for milder use, fully red for maximum
    capsaicin and carotenoid content) through summer and autumn; seeds are separated and dried from fully
    ripe fruit.
  parts:
  - Fruit
  - Seed
  season: Summer to autumn, at desired ripeness
  status: draft
traditional_uses:
  text: Chili pepper fruit has a long history across the Americas and, after global spread, in many other
    traditional medicine systems as a warming digestive stimulant and topical counterirritant/analgesic
    for muscle and joint pain, building on capsaicin's now well-documented ability to desensitise pain-sensing
    nerve fibres with repeated application.
  reference_ids:
  - REF-2142
  status: verified
preparations:
- name: Topical cream/ointment (capsaicin)
  text: Standardised capsaicin cream or patch applied to the affected area for muscle, joint or nerve
    pain; repeated application depletes substance P and reduces pain signalling.
  reference_ids:
  - REF-2149
  status: verified
- name: Tincture/infusion (internal)
  text: Small amounts of dried fruit infused or tinctured as a warming digestive stimulant; avoid contact
    with eyes and mucous membranes.
  status: draft
- name: Culinary use
  text: Fresh or dried fruit used as a food spice, the most common traditional and modern form of use.
  status: draft
dosage:
- name: Topical capsaicin cream
  text: The EU herbal monograph on Capsici fructus gives semi-solid dosage forms corresponding to 40-53
    mg capsaicinoids per 100 g, applied as a thin layer to the affected area 2-4 times daily, in adults
    and elderly. For medicated plasters, a maximum of 1 plaster per day applied for at least 4 and up
    to 12 hours, with at least 12 hours before a new plaster is applied to the same area. Not recommended
    under 18 years. Expect an initial burning sensation that lessens with repeated use. Note the monograph
    covers hot chilli fruit (C. annuum var. minimum and small-fruited C. frutescens), not sweet peppers.
    Educational reference only, not a prescription.
  reference_ids:
  - REF-3090
  status: verified
- name: Internal use
  text: Culinary amounts are considered safe; high-dose internal supplements should be avoided, especially
    in pregnancy or with peptic ulcer disease. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Capsaicinoids (capsaicin, dihydrocapsaicin)
  note: The pungent alkaloid-like compounds responsible for the fruit's heat and its counterirritant/analgesic
    action via TRPV1 receptor desensitisation.
  reference_ids:
  - REF-2149
- name: Carotenoids (capsanthin, beta-carotene)
  compounds:
  - carotenoid
  note: Give ripe red fruit its colour and contribute antioxidant and anti-inflammatory activity.
  reference_ids:
  - REF-2149
- name: Flavonoids (luteolin, apigenin)
  compounds:
  - flavonoid
  - luteolin
  - apigenin
  note: Antioxidant and anti-inflammatory flavonoids identified in leaf and fruit extracts.
  reference_ids:
