internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx). reference_ids are
  plant-level: the book lists parts and actions as flat, unmapped lists, so the full set of references cited
  for this plant is attached to each action rather than split per action. constituents not yet extracted —
  manual enrichment pending. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split
  out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific publications: added 11
  PubMed-verified @article sources (REF-2142, REF-2143, REF-2144, REF-2145, REF-2146, REF-2147, REF-2148,
  REF-2149, REF-2150, REF-2151, REF-2152) — woven into relevant actions/indications and the plant-level
  references bucket. | 2026-07-11: added monograph-base fields (botanical_description, habitat, harvesting,
  traditional_uses, preparations, dosage + constituents) sourced from the existing references bucket;
  general/undated claims marked status: draft per the integrity-first sourcing policy. | 2026-07-18
  (dosage-sourcing campaign, batch 5): the ''Topical capsaicin cream'' entry is sourced to the EU herbal
  monograph on Capsici fructus (EMA/HMPC/674139/2013 = REF-3090, new). The entry''s ''0.025-0.075%
  strength'' (= 25-75 mg capsaicinoids/100 g) overlapped but did not match the monograph''s 40-53 mg/100 g,
  and its ''3-4 times daily'' became the monograph''s 2-4 times daily; the medicated-plaster posology (max 1
  per day, 4-12 hours, 12-hour gap before reapplying to the same site) was absent entirely and is now
  included. SCOPE NOTE added to the text: the monograph covers hot chilli fruit - C. annuum var. minimum and
  small-fruited C. frutescens - not sweet peppers, which matters because this record''s id is the bare
  species name. The ''Internal use'' entry is left unsourced: the monograph is cutaneous-only and gives no
  internal posology, which is consistent with that entry''s existing advice against high-dose internal
  supplements. | 2026-07-19 (dosage-sourcing campaign, closing sweep): DOCUMENTED DEAD END - closing sweep
  of the dosage-sourcing campaign. The remaining unsourced dosage entry/entries on this record were searched
  against every seam this campaign opened and none yields a dose for this species in this preparation. Seams
  checked: (1) the official EMA herbal medicines register (medicines-output-herbal_medicines-report, 251
  rows, retrieved 2026-07-18), matched on the accepted binomial AND on every synonym and common name
  appearing in a register row; (2) WHO monographs on selected medicinal plants Volumes 1-4, indexed by Latin
  drug title with each monograph''s Definition read to confirm the species - 177 monographs indexed; (3)
  this plant''s own reference bucket, mined for human studies that state an administered dose. Per the
  campaign''s integrity bar the entry is left unsourced at status draft rather than attached to a
  tangentially-related paper.'