  status: verified
- note: 'Duke (2002) provides clinical evidence (score 2) for caraway as an appetite stimulant, cough
    suppressant, cholagogue, and bronchitis remedy, consistent with Commission E approvals. It demonstrates
    anti-Candida activity and antispasmodic effects on gastrointestinal smooth muscle. Recommended dose:
    1.5–6 g of fruit daily, or 3–6 drops of essential oil. The herb is classified as generally safe with
    no known hazards at therapeutic doses, though it should be used cautiously in pregnancy due to mild
    emmenagogue activity (Duke, 2002).'
  severity: caution
