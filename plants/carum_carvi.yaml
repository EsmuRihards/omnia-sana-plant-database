botanical_description:
  text: Biennial (occasionally annual) herb with finely divided, feathery, carrot-like leaves similar
    to those of other Apiaceae. In its second year it sends up a branched, grooved, hollow flowering stem
    topped with flat compound umbels of small white or pinkish flowers, followed by the characteristic
    curved, ridged, strongly aromatic seeds (the familiar rye-bread spice).
  height: 30-60 cm
  habit: Biennial herb, low rosette in year one, branched flowering stem in year two
  leaves: Finely divided, feathery, carrot-like
  flowers: Small white or pinkish flowers in flat compound umbels
  stem: Branched, grooved, hollow, plain green (unspotted)
  root: Slender, edible taproot
  fruit: Curved, ridged, strongly aromatic seed (mericarp)
  flowering_period: June-July (second year)
  reference_ids:
  - REF-1977
  status: verified
habitat:
  text: Grows in meadows, grassy roadsides and waste ground on well-drained soils; native to Europe and
    Western Asia and widely cultivated as a spice crop.
  status: draft
harvesting:
  text: The seed is harvested in mid- to late summer of the second year, once the umbels have browned
    and dried, then threshed and dried further; leaves can be picked through the first year and the root
    dug in autumn of year one or spring of year two.
  parts:
  - Leaf
  - Root
  - Seed
  season: Seed in mid- to late summer (second year); leaf through year one; root in autumn/spring
  status: draft
traditional_uses:
  text: Caraway seed is one of the classic Apiaceae carminative digestive spices, used traditionally for
    indigestion, bloating, flatulence and poor appetite, and, per the EU herbal monograph, for symptomatic
    relief of mild digestive complaints and bloating.
  reference_ids:
  - REF-1977
  status: verified
preparations:
- name: Infusion (seed)
  text: Crushed or lightly crushed seed infused in hot water as a traditional carminative digestive tea.
  reference_ids:
  - REF-1977
  status: verified
- name: Essential oil
  text: Steam-distilled from the seed; used in small internal doses or diluted for topical/aromatic use,
    not for self-dosing at high concentration.
  status: draft
- name: Culinary use
  text: Whole seed used as a food spice (rye bread, cabbage dishes), continuing the traditional food-medicine
    use.
  status: draft
dosage:
- name: Seed infusion
  text: The EU herbal monograph describes traditional use of about 0.5-2 g crushed fruit (seed) per 150
    mL hot water, 1-3 times daily, in adolescents, adults and elderly; not recommended under 12 years.
    Educational reference only, not a prescription.
  reference_ids:
  - REF-0078
  status: verified
