contraindications:
- note: 'Generally very safe as a food spice (normal culinary amounts).Tea (traditional use): The EU herbal
    monograph describes caraway fruit tea for bloating/flatulence and gives a typical adult infusion dose
    of 0.5–2 g in 150 ml hot water, 1–3× daily; if symptoms last >2 weeks, seek medical advice. Allergy
    caution: Avoid if you’re allergic to Apiaceae family plants (e.g., fennel, anise, celery, coriander,
    dill) or have known cross-allergies (the monograph also mentions mugwort/birch allergy). Gallbladder/bile
    problems: Not recommended if you have gallstones or other biliary disorders (caraway can stimulate
    bile flow). Pregnancy & breastfeeding: Safety isn’t well established for medicinal dosing, so not
    recommended as a “treatment” during pregnancy/lactation (food use is a different story). Children:
    The EU monograph does not recommend medicinal use under 12 due to lack of data. Essential oil caution:
    Caraway essential oil is highly concentrated—don’t self-dose internally; it can irritate and is easy
    to overdo.'
  severity: caution
  reference_ids:
  - REF-0078
  - REF-0126
  - REF-0215
  status: verified
- note: 'Duke (2002) provides clinical evidence (score 2) for caraway as an appetite stimulant, cough
    suppressant, cholagogue, and bronchitis remedy, consistent with Commission E approvals. It demonstrates
    anti-Candida activity and antispasmodic effects on gastrointestinal smooth muscle. Recommended dose:
    1.5–6 g of fruit daily, or 3–6 drops of essential oil. The herb is classified as generally safe with
    no known hazards at therapeutic doses, though it should be used cautiously in pregnancy due to mild
    emmenagogue activity (Duke, 2002).'
  severity: caution
