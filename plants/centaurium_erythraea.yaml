common_names:
- Centaury
- Common centaury
- European centaury
- Feverwort
scientific_name: Centaurium erythraea
family: Gentianaceae
parts_used:
- name: Aerial parts (flowering herb)
  medicinal_actions:
  - action: Aromatic bitter tonic for temporary loss of appetite
    reference_ids:
    - REF-0431
    - REF-0432
    status: verified
  - action: Digestive aid for mild dyspeptic complaints such as indigestion and bloating (stimulates gastric
      and bile secretion)
    reference_ids:
    - REF-0431
    - REF-0432
    status: verified
constituents:
- name: Secoiridoid bitter glycosides (gentiopicroside, swertiamarin, sweroside, centapicrin)
  note: The intensely bitter principles that stimulate digestive secretions.
  reference_ids:
  - REF-0431
  - REF-0432
- name: Xanthones and flavonoids
  note: Additional constituents of the herb.
  reference_ids:
  - REF-0432
  - REF-0431
- name: Phenolic acids
  note: Antioxidant constituents.
  reference_ids:
  - REF-0431
contraindications:
- note: Because bitters increase stomach-acid secretion, centaury is contraindicated in peptic (stomach
    or duodenal) ulcer disease and hyperacidity.
  reference_ids:
  - REF-0431
  status: verified
- note: Traditional use only; appetite loss or dyspepsia that persists needs medical assessment. Use during
    pregnancy and breastfeeding is not recommended.
  reference_ids:
  - REF-0431
  status: verified
