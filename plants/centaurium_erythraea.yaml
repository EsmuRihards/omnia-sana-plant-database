botanical_description:
  text: Slender annual or biennial herb with a basal rosette of oval leaves and an erect, wiry, four-angled
    flowering stem branching near the top. Small, star-shaped, pink flowers with five pointed petals open
    only in sunshine, borne in dense, flat-topped clusters at the stem tips.
  height: 10-40 cm
  habit: Slender, erect annual to biennial herb
  leaves: Basal rosette of oval leaves; stem leaves smaller, opposite
  flowers: Small, star-shaped, pink, five-petalled, opening only in sunshine, in flat-topped clusters
  stem: Erect, wiry, four-angled, branching near the top
  root: Slender taproot
  fruit: Small, narrow capsule
  flowering_period: June-September
  reference_ids:
  - REF-0431
  status: verified
habitat:
  text: Grows in dry grassland, chalk downland, dunes and open woodland on well-drained, often calcareous
    soils; native to Europe, North Africa and Western Asia.
  reference_ids:
  - REF-0431
  status: verified
harvesting:
  text: The flowering aerial parts are cut in summer while in flower, when the intensely bitter secoiridoid
    content is highest, and dried in a warm, shaded, airy place.
  parts:
  - Aerial parts (flowering herb)
  season: Summer flowering period
  reference_ids:
  - REF-0431
  status: verified
traditional_uses:
  text: Centaury is one of the classic European bitter digestive herbs, traditionally used for temporary
    loss of appetite and mild dyspeptic complaints such as indigestion and bloating, stimulating gastric
    and bile secretion.
  reference_ids:
  - REF-0431
  status: verified
preparations:
- name: Cold infusion (maceration)
  text: Dried herb macerated in cold water for several hours, which extracts the bitter principles while
    minimising extraction of harsher tannins; a traditional preparation method for bitters.
  reference_ids:
  - REF-0431
  status: draft
- name: Infusion
  text: Dried herb infused briefly in hot water and taken shortly before meals as a bitter digestive tonic.
  reference_ids:
  - REF-0431
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried herb.
  status: draft
dosage:
- name: Infusion
  text: The EU herbal monograph gives 1-4 g of the comminuted herb in 200 mL of boiling water as an infusion,
    up to 4 times daily, in adults and elderly; a powdered herbal substance at 0.25-2 g up to 3 times
    daily, liquid extract 2-4 mL up to 3 times daily, and tincture 1.5-5 g up to 3 times daily are also
    listed. Not recommended under 18 years, and contraindicated in peptic ulcer. Educational reference
    only, not a prescription.
  reference_ids:
  - REF-3067
  - REF-0431
  status: verified
