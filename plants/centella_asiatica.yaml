botanical_description:
  text: Low, creeping perennial herb rooting at the nodes along slender, prostrate stems. The leaves are
    long-stalked, rounded to kidney- or fan-shaped, with a gently scalloped (crenate) margin, arising
    in small clusters at each node. Tiny, pinkish-white flowers are borne in small, inconspicuous clusters
    hidden near the base of the leaf stalks, close to the ground.
  height: 5-20 cm (creeping/prostrate)
  habit: Low, creeping, mat-forming perennial herb
  leaves: Long-stalked, rounded/kidney-shaped, scalloped margin, hairless
  flowers: Tiny, pinkish-white, in small inconspicuous clusters near the base of the leaf stalks
  stem: Slender, prostrate, rooting at the nodes
  root: Fine roots at each node
  fruit: Small, flattened, ridged schizocarp
  flowering_period: Year-round in favourable climates
  reference_ids:
  - REF-0457
  status: verified
habitat:
  text: Grows in damp, shaded ground, lawns, ditches and wetland margins throughout tropical and subtropical
    Asia (China, India, Southeast Asia) and parts of Africa, Australia and the Pacific.
  reference_ids:
  - REF-0457
  status: verified
harvesting:
  text: The aerial parts (leaves and trailing stems) are harvested during active growth, cut a short distance
    above the soil to allow regrowth, and used fresh or dried.
  parts:
  - Aerial parts (leaf and herb)
  season: During active growth (warm season)
  status: draft
traditional_uses:
  text: Gotu kola is a cornerstone herb of Ayurvedic and traditional Chinese medicine, valued as a 'rasayana'
    (rejuvenating) tonic for skin healing, memory and mental clarity, and calming the mind; it has a particularly
    strong traditional and modern reputation for wound healing and connective-tissue/vascular support,
    reflected in its widespread use for scars, minor wounds and varicose veins.
  reference_ids:
  - REF-0457
  status: verified
preparations:
- name: Standardised extract
  text: Extract titrated to triterpenoid (asiaticoside/madecassoside) content, taken orally as capsules/tablets
    for venous and cognitive support, or applied topically for wound and scar care.
  reference_ids:
  - REF-0457
  status: verified
- name: Infusion
  text: Fresh or dried leaf infused in hot water as a traditional calming and tonic tea.
  status: draft
- name: Topical cream/ointment
  text: Standardised extract or fresh leaf preparation applied topically to wounds, scars and inflamed
    skin.
  reference_ids:
  - REF-0457
  status: verified
dosage:
- name: Standardised oral extract
  text: Clinical studies commonly use extracts providing around 60-180 mg total triterpenoids daily, in
    divided doses. Educational reference only, not a prescription.
  reference_ids:
  - REF-0457
  status: draft
- name: Topical preparations
  text: The EU herbal monograph on Centella asiatica herba is for CUTANEOUS USE ONLY and gives, for adults
    and elderly, a single dose of 0.6 g of the comminuted herb infused in a small amount of boiling water,
    the still-warm infusion applied as an impregnated dressing 3 times daily (daily dose 1.8 g); or 0.6
    g of the powdered herb applied to the affected area 3 times daily. Not to be used for more than 1
    week, and not recommended under 18 years. The monograph gives no oral posology - see the separate
    standardised-extract entry. Educational reference only, not a prescription.
  reference_ids:
  - REF-3085
  status: verified
