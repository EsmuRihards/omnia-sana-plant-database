internal_notes: 'Enriched 2026-06-12 from scientific literature (J Cell Mol Med review of asiaticoside/madecassoside;
  Panminerva Medica status paper on titrated Centella extract). Originally a skeleton imported from the
  omniasana.bio Symptom-to-Plant Lookup tool (wounds, anxiety, memory, varicose-veins, cognitive-function);
  associations retained and now part-mapped and cited. Further enriched 2026-06-14 with PubMed-sourced
  reviews - a chronic-venous-insufficiency systematic review (REF-0569) and the Cochrane phlebotonics
  review that includes Centella among agents reducing leg oedema (REF-0570) support the venous action,
  while a cognition/mood meta-analysis (REF-0568) found improved alertness and reduced anger but no significant
  cognitive-domain benefit (added as a needs-review qualifier). | 2026-06-15: migrated to entity schema
  (actions->vocab ids, indications split out, constituents linked to compounds). | 2026-06-20: enriched
  to >=10 scientific publications: added 11 PubMed-verified @article sources (REF-2087, REF-2088, REF-2089,
  REF-2090, REF-2091, REF-2092, REF-2093, REF-2094, REF-2095, REF-2096, REF-2097) — woven into relevant
  actions/indications and the plant-level references bucket.'
