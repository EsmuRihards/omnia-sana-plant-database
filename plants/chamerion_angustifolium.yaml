botanical_description:
  text: Tall, upright perennial herb spreading by rhizomes, forming large colonies especially on disturbed
    or burned ground (hence 'fireweed'). The leaves are narrow, lance-shaped, and willow-like, arranged
    spirally up the stem. Bright pink-purple, four-petalled flowers are borne in a tall, tapering terminal
    spike (raceme), opening progressively from the base upward as the plant flowers through summer.
  height: 60-200 cm
  habit: Tall, upright, rhizomatous perennial herb, often forming large colonies
  leaves: Narrow, lance-shaped, willow-like, spirally arranged
  flowers: Bright pink-purple, four-petalled, in a tall tapering terminal raceme
  stem: Erect, usually unbranched, reddish toward the base
  root: Spreading rhizome
  fruit: Long, narrow seed pod splitting to release cottony-tufted seeds
  flowering_period: July-September
  reference_ids:
  - REF-1658
  status: verified
habitat:
  text: A classic pioneer plant of disturbed, burned or cleared ground, forest clearings, roadsides and
    riverbanks; native across the temperate and boreal Northern Hemisphere (Europe, Asia, North America).
  reference_ids:
  - REF-1658
  status: verified
harvesting:
  text: Young shoots are gathered in spring while still tender (traditionally eaten like asparagus); leaves
    and flowers are picked through summer at flowering, with the leaf sometimes fermented for 'Ivan-chai'
    tea. Careful identification against the deadly false hellebore (Veratrum), which can share early-spring
    habitat, is essential when gathering young shoots.
  parts:
  - Flower
  - Leaf
  - Young sprouts
  season: Young sprouts in spring; leaf and flower through summer
  reference_ids:
  - REF-1658
  status: verified
traditional_uses:
  text: Fireweed has a long circumpolar tradition as a food plant (young shoots as a spring vegetable,
    fermented leaf as 'Ivan-chai' tea) and as a folk remedy for digestive complaints and topically as
    a poultice for wounds and skin inflammation, reflecting its astringent, anti-inflammatory character.
  reference_ids:
  - REF-1658
  status: verified
preparations:
- name: Infusion (leaf, 'Ivan-chai')
  text: Fresh or fermented, dried leaf infused in hot water as a traditional tea, valued both as a beverage
    and a mild digestive/anti-inflammatory remedy.
  reference_ids:
  - REF-1658
  status: verified
- name: Poultice
  text: Fresh crushed leaf applied topically to minor wounds and skin inflammation.
  status: draft
- name: Young shoots (culinary)
  text: Young spring shoots peeled and eaten cooked, similarly to asparagus, continuing the traditional
    food use.
  status: draft
dosage:
- name: Infusion
  text: The EU herbal monograph on Epilobium angustifolium L. and/or Epilobium parviflorum Schreb., herba -
    which covers this species under its Epilobium name - gives 1.5-2.0 g of the comminuted herb in 250
    mL of boiling water as an infusion, twice daily, in adults and elderly; long-term use is possible.
    A doctor should be consulted if fever, spasms, blood in the urine, painful urination or urinary retention
    occur. Educational reference only, not a prescription.
  reference_ids:
  - REF-3075
  status: verified
