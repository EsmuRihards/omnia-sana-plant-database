contraindications:
- note: Generally considered safe at culinary and traditional tea-preparation doses. No major contraindications
    established for healthy adults in normal use. The young shoots and leaves are widely eaten as a spring
    vegetable in many cultures without adverse effects. At higher supplemental doses, limited human safety
    data are available; caution is advised during pregnancy and breastfeeding due to lack of robust safety
    studies. Tannin content may cause digestive upset or constrain iron absorption at very high doses.
    Rarely, contact dermatitis has been reported with topical preparations in sensitive individuals (Kozhevnikov
    and Kozhevnikova, 2021).
  reference_ids:
  - REF-0022
  - REF-0118
  - REF-0146
  - REF-0216
  - REF-0317
  status: verified
- note: Duke (2002) includes fireweed (Epilobium angustifolium) as ++ with primarily experimental (score
    1) evidence. It is used in European phytomedicine as an anti-inflammatory and astringent for gastrointestinal
    complaints. The related species Epilobium parviflorum has clinical support for benign prostatic hyperplasia
    (BPH), though data for E. angustifolium specifically is limited. Duke does not note major safety concerns
    at customary herbal doses (Duke, 2002).
  reference_ids:
