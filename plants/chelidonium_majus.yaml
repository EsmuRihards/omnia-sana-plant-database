id: chelidonium-majus
scientific_name: Chelidonium majus
common_names:
- Greater Celandine
- Tetterwort
- Swallowwort
- Nipplewort
family: Papaveraceae
parts_used:
- Aerial parts (and fresh orange latex)
constituents:
- name: Isoquinoline alkaloids (chelidonine, coptisine, berberine, sanguinarine, chelerythrine)
  compounds:
  - alkaloid
  - berberine
  note: The biologically active and toxicologically important constituents.
  reference_ids:
  - REF-0460
- name: Flavonoids and phenolic acids
  compounds:
  - phenolic-acid
  - flavonoid
  note: Antioxidant constituents.
  reference_ids:
  - REF-0460
- name: Orange latex (alkaloid-rich sap)
  compounds:
  - alkaloid
  note: The caustic sap used traditionally on warts.
  reference_ids:
  - REF-0460
botanical_description:
  text: Branching perennial herb with soft, brittle, hairy stems that exude a distinctive bright orange-yellow
    latex (sap) when cut or broken. The leaves are deeply lobed, pale bluish-green beneath, giving a delicate,
    almost fern-like appearance. Small, four-petalled, bright yellow flowers are borne in loose umbel-like
    clusters.
  height: 30-90 cm
  habit: Branching, brittle-stemmed perennial herb
  leaves: Deeply lobed, pale bluish-green beneath
  flowers: Small, four-petalled, bright yellow, in loose umbel-like clusters
  stem: Soft, brittle, hairy, exuding bright orange-yellow latex when broken
  root: Branching taproot, also exuding orange latex
  fruit: Slender, curved capsule
  flowering_period: April-September
  reference_ids:
  - REF-0460
  status: verified
habitat:
  text: Grows in shaded, nutrient-rich ground - hedgerows, walls, waste ground and woodland edges, often
    near old buildings; native to Europe and Western Asia and naturalised in North America.
  reference_ids:
  - REF-0460
  status: verified
harvesting:
  text: The flowering aerial parts are cut in spring to summer; the fresh orange latex is collected by
    breaking a stem or leaf as needed for topical (wart) use. Given the documented hepatotoxicity of oral
    preparations, harvesting for internal use is not recommended.
  parts:
  - Aerial parts (and fresh orange latex)
  season: Spring to summer, while flowering
  reference_ids:
  - REF-0460
  status: verified
traditional_uses:
  text: Greater celandine has a long European folk history, reflected in its name 'tetterwort', as a topical
    remedy for warts and skin blemishes (the fresh orange latex dabbed directly on), and internally as
    a bitter choleretic digestive remedy for biliary and upper-abdominal dyspepsia - though oral use is
    now medically restricted because of documented liver injury.
  reference_ids:
  - REF-0460
  status: verified
preparations:
- name: Fresh latex (topical, warts only)
  text: Fresh orange latex from a broken stem dabbed directly onto warts, the classic external folk use;
    kept well away from eyes, mucous membranes and broken skin.
  reference_ids:
  - REF-0460
  status: verified
- name: Infusion/tincture (historical, oral - restricted)
  text: Historically taken as an infusion or tincture for biliary dyspepsia, but oral use is now restricted
    in several jurisdictions due to hepatotoxicity risk and should only be considered under professional
    supervision, if at all.
  reference_ids:
  - REF-0459
  status: draft
dosage:
- name: All internal preparations
  text: Because of a documented risk of acute liver injury, no internal dose is given here; oral use should
    be avoided, especially by anyone with liver disease, and any sign of jaundice, dark urine or upper-abdominal
    pain warrants immediate medical attention. Educational reference only, not a prescription.
  reference_ids:
  - REF-0459
  - REF-0601
  status: draft
