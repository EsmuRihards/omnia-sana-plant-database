contraindications:
- note: 'SERIOUS: oral greater celandine can cause acute idiosyncratic liver injury (hepatocellular hepatotoxicity
    with jaundice). Multiple reported cases - dozens of herb-induced liver injury reports in the literature,
    with continuing recent case reports - led regulators to restrict or suspend oral products. Do not
    take internally if you have any liver disease, and stop immediately and seek care at any sign of liver
    problems (jaundice, dark urine, upper-abdominal pain).'
  severity: serious
  reference_ids:
  - REF-0459
  - REF-0601
  status: verified
- note: Avoid in pregnancy and breastfeeding. The fresh orange latex is irritant and caustic - keep it
    away from the eyes and broken skin.
  severity: caution
  reference_ids:
  - REF-0459
  - REF-0460
  status: verified
