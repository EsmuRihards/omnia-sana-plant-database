internal_notes: 'Enriched 2026-06-12 from scientific literature (Annals of Hepatology clinical review
  of hepatotoxicity; Forschende Komplementarmedizin integrative review). Record status set to needs-review
  because oral use carries a documented hepatotoxicity risk that regulators have restricted. Originally
  a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (indigestion, bloating, warts);
  associations retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced
  2024 report of two herb-induced liver injury cases plus a literature review of 38 such cases (REF-0601),
  reinforcing the serious hepatotoxicity caution. | 2026-06-15: migrated to entity schema (actions->vocab
  ids, indications split out, constituents linked to compounds).'
