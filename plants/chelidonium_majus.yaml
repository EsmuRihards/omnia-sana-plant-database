common_names:
- Greater Celandine
- Tetterwort
- Swallowwort
- Nipplewort
scientific_name: Chelidonium majus
family: Papaveraceae
parts_used:
- name: Aerial parts (and fresh orange latex)
  medicinal_actions:
  - action: Antispasmodic / choleretic bitter for upper-abdominal and biliary dyspepsia (indigestion,
      bloating, cramping) - oral use now restricted for safety
    reference_ids:
    - REF-0460
    status: needs-review
  - action: Fresh orange latex traditionally dabbed on warts
    reference_ids:
    - REF-0460
    status: needs-review
  - action: Anti-inflammatory, antimicrobial and analgesic (preclinical)
    reference_ids:
    - REF-0460
    status: needs-review
constituents:
- name: Isoquinoline alkaloids (chelidonine, coptisine, berberine, sanguinarine, chelerythrine)
  note: The biologically active and toxicologically important constituents.
  reference_ids:
  - REF-0460
- name: Flavonoids and phenolic acids
  note: Antioxidant constituents.
  reference_ids:
  - REF-0460
- name: Orange latex (alkaloid-rich sap)
  note: The caustic sap used traditionally on warts.
  reference_ids:
  - REF-0460
contraindications:
- note: 'SERIOUS: oral greater celandine can cause acute idiosyncratic liver injury (hepatocellular hepatotoxicity
    with jaundice). Multiple reported cases led regulators to restrict or suspend oral products. Do not
    take internally if you have any liver disease, and stop immediately and seek care at any sign of liver
    problems (jaundice, dark urine, upper-abdominal pain).'
  reference_ids:
  - REF-0459
  status: verified
- note: Avoid in pregnancy and breastfeeding. The fresh orange latex is irritant and caustic - keep it
    away from the eyes and broken skin.
  reference_ids:
  - REF-0459
  - REF-0460
  status: verified
internal_notes: Enriched 2026-06-12 from scientific literature (Annals of Hepatology clinical review of
  hepatotoxicity; Forschende Komplementarmedizin integrative review). Record status set to needs-review
  because oral use carries a documented hepatotoxicity risk that regulators have restricted. Originally
  a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (indigestion, bloating, warts);
  associations retained and now part-mapped and cited.
last_updated: '2026-06-12'
status: needs-review
