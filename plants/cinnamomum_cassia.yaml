contraindications:
- note: 'Cassia is high in coumarin: regular high intake of cassia bark or supplements can stress or damage
    the liver. For frequent or medicinal use, prefer true Ceylon cinnamon (Cinnamomum verum) and keep
    within safe daily limits.'
  severity: info
  reference_ids:
  - REF-0430
  status: verified
- note: Its blood-sugar-lowering action means it can add to the effect of diabetes medicines (risk of
    hypoglycaemia); avoid concentrated/medicinal doses in pregnancy (culinary amounts are fine).
  severity: caution
  reference_ids:
  - REF-0429
  status: verified
