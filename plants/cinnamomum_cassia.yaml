id: cinnamomum-cassia
scientific_name: Cinnamomum cassia
common_names:
- Cassia Cinnamon
- Chinese cinnamon
- Cassia bark
- Rou gui
family: Lauraceae
parts_used:
- Bark
constituents:
- name: Cinnamaldehyde (cinnamic aldehyde)
  note: The main volatile-oil constituent; associated with the insulin-sensitising effect.
  reference_ids:
  - REF-0430
- name: Proanthocyanidins and other polyphenols
  compounds:
  - proanthocyanidin
  - phenolic-compound
  note: Antioxidant constituents of the bark.
  reference_ids:
  - REF-0430
- name: Coumarin
  compounds:
  - coumarin
  note: Present in much higher amounts in cassia than in Ceylon cinnamon (~2-5 mg/g); the key safety-limiting
    compound.
  reference_ids:
  - REF-0430
actions:
- action: antidiabetic
  note: Lowers fasting blood glucose as an adjunct in type 2 diabetes (evidence is positive but mixed)
    - recent meta-analyses report reduced fasting glucose, HbA1c and HOMA-IR
  reference_ids:
  - REF-0429
  - REF-0430
  - REF-0598
  - REF-0599
  - REF-1820
  - REF-1821
  - REF-1823
  - REF-1828
  status: verified
- action: carminative
  note: Warming carminative for indigestion (traditional)
  reference_ids:
  - REF-0430
  - REF-1822
  - REF-1824
  - REF-1825
  - REF-1826
  status: needs-review
- action: lipid-lowering
  note: Improves the lipid profile (lowers total and LDL cholesterol and triglycerides)
  reference_ids:
  - REF-0429
  - REF-0430
  - REF-0599
  - REF-1821
  status: verified
indications:
- condition: bloating
  note: inferred from carminative action
  reference_ids:
  - REF-0430
  status: needs-review
- condition: blood-sugar
  note: Lowers fasting blood glucose as an adjunct in type 2 diabetes (evidence is positive but mixed)
    - recent meta-analyses report reduced fasting glucose, HbA1c and HOMA-IR
  reference_ids:
  - REF-0429
  - REF-0430
  - REF-0598
  - REF-0599
  status: verified
- condition: cardiovascular-support
  note: inferred from lipid-lowering action
  reference_ids:
  - REF-0429
  - REF-0430
  - REF-0599
  status: needs-review
- condition: high-cholesterol
  note: inferred from lipid-lowering action
  reference_ids:
  - REF-0429
  - REF-0430
  - REF-0599
  status: needs-review
- condition: indigestion
  note: Warming carminative for indigestion (traditional)
  reference_ids:
  - REF-0430
  status: needs-review
- condition: metabolic-support
  note: inferred from antidiabetic action
  reference_ids:
  - REF-0429
  - REF-0430
  - REF-0598
  - REF-0599
  status: needs-review
contraindications:
- note: 'Cassia is high in coumarin: regular high intake of cassia bark or supplements can stress or damage
    the liver. For frequent or medicinal use, prefer true Ceylon cinnamon (Cinnamomum verum) and keep
    within safe daily limits.'
  severity: info
  reference_ids:
  - REF-0430
  status: verified
- note: Its blood-sugar-lowering action means it can add to the effect of diabetes medicines (risk of
    hypoglycaemia); avoid concentrated/medicinal doses in pregnancy (culinary amounts are fine).
  severity: caution
  reference_ids:
  - REF-0429
  status: verified
