drug_class_interactions:
- drug_class: antidiabetics
  severity: caution
  mechanism: Cinnamon can lower blood sugar, so combining it with diabetes medicines such as insulin,
    metformin or sulfonylureas may increase the risk of hypoglycaemia; monitor blood glucose.
