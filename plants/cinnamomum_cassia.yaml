id: cinnamomum-cassia
scientific_name: Cinnamomum cassia
common_names:
- Cassia Cinnamon
- Chinese cinnamon
- Cassia bark
- Rou gui
family: Lauraceae
external_ids:
  gbif: 6688
  powo: 'urn:lsid:ipni.org:names:77109079-1'
  wikidata: Q204148
parts_used:
- Bark
constituents:
- name: Cinnamaldehyde (cinnamic aldehyde)
  note: The main volatile-oil constituent; associated with the insulin-sensitising effect.
  reference_ids:
  - REF-0430
- name: Proanthocyanidins and other polyphenols
  compounds:
  - proanthocyanidin
  - phenolic-compound
  note: Antioxidant constituents of the bark.
  reference_ids:
  - REF-0430
- name: Coumarin
  compounds:
  - coumarin
  note: Present in much higher amounts in cassia than in Ceylon cinnamon (~2-5 mg/g); the key safety-limiting
    compound.
  reference_ids:
  - REF-0430
botanical_description:
  text: Evergreen tree with smooth, aromatic, reddish-brown bark and leathery, oval leaves with three
    prominent longitudinal veins. Small, pale yellow-green flowers are borne in panicles, followed by
    small, dark, single-seeded berries. The dried inner bark, rolled into thick, dark reddish-brown quills,
    is the cassia cinnamon of commerce.
  height: Up to 10-15 m
  habit: Evergreen tree
  leaves: Leathery, oval, with three prominent longitudinal veins
  flowers: Small, pale yellow-green, in panicles
  stem: Smooth, aromatic, reddish-brown bark
  root: Woody root system
  fruit: Small, dark, single-seeded berry
  flowering_period: Varies with climate
  status: draft
habitat:
  text: Native to southern China and mainland Southeast Asia; cultivated extensively in China, Vietnam
    and Indonesia on warm, humid, tropical to subtropical hillsides.
  status: draft
harvesting:
  text: The bark is stripped from branches and stems of mature trees, then dried; as it dries it curls
    into the characteristic thick quills of cassia cinnamon, distinctly darker and rougher than the thin,
    tightly rolled quills of true (Ceylon) cinnamon.
  parts:
  - Bark
  status: draft
traditional_uses:
  text: Cassia bark (rou gui) is a major warming spice and digestive remedy of traditional Chinese medicine,
    used for cold-type digestive complaints, circulation and metabolic support; its cinnamaldehyde-rich
    bark is now widely studied as an adjunct for blood glucose and lipid management in type 2 diabetes,
    directly building on this traditional metabolic reputation.
  reference_ids:
  - REF-0430
  status: verified
preparations:
- name: Standardised extract/powder
  text: Dried bark powder or standardised extract taken as capsules, the form used in most clinical glucose/lipid
    studies.
  reference_ids:
  - REF-0430
  status: verified
- name: Decoction/infusion
  text: Bark simmered or infused in hot water as a warming traditional digestive tea.
  status: draft
- name: Culinary use
  text: Ground bark or whole quills used as a food spice, the most common traditional and modern form
    of use.
  status: draft
dosage:
- name: Standardised extract/powder
  text: Clinical trials in type 2 diabetes commonly use around 1-6 g of cassia bark powder daily; because
    of its coumarin content, intake should be kept modest and consistent, and true (Ceylon) cinnamon preferred
    for frequent medicinal use. Educational reference only, not a prescription.
  reference_ids:
  - REF-0430
  status: draft
actions:
- action: antidiabetic
  note: Lowers fasting blood glucose as an adjunct in type 2 diabetes (evidence is positive but mixed)
    - recent meta-analyses report reduced fasting glucose, HbA1c and HOMA-IR
