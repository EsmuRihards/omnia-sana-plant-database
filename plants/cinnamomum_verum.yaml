id: cinnamomum-verum
scientific_name: Cinnamomum verum
common_names:
- True Cinnamon
- Ceylon cinnamon
- Sri Lanka cinnamon
family: Lauraceae
external_ids:
  gbif: 3033987
  powo: 'urn:lsid:ipni.org:names:463752-1'
  wikidata: Q370239
parts_used:
- Bark
constituents:
- name: Cinnamaldehyde
  compounds:
  - essential-oil
  note: Trans-cinnamaldehyde is the principal constituent of cinnamon bark essential oil and the main
    driver of its antimicrobial, antifungal (anti-Candida) and anti-inflammatory activity, acting partly
    by damaging microbial cell membranes and inhibiting NF-kB signalling.
  reference_ids:
  - REF-0668
  - REF-0669
  - REF-2414
- name: Coumarin (species caution)
  compounds:
  - coumarin
  note: Cassia cinnamon (C. cassia) contains high levels of coumarin, which is potentially hepatotoxic
    in excess; true Ceylon cinnamon (C. verum) contains only trace coumarin and is the safer culinary/medicinal
    choice. Several pooled clinical and antimicrobial studies do not distinguish the two species.
  reference_ids:
  - REF-0668
botanical_description:
  text: Evergreen tree with smooth, thin, light brown bark and leathery, oval leaves with three prominent
    longitudinal veins, often flushed reddish-pink when young. Small, pale yellow-green flowers are borne
    in panicles, followed by small, dark, single-seeded berries. The thin inner bark is peeled and dried
    into the characteristic pale, tightly layered, multi-ply quills of true cinnamon.
  height: Up to 10-15 m (often coppiced lower in cultivation)
  habit: Evergreen tree, often coppiced/pruned under cultivation
  leaves: Leathery, oval, three prominent longitudinal veins, reddish-pink when young
  flowers: Small, pale yellow-green, in panicles
  stem: Smooth, thin, light brown bark
  root: Woody root system
  fruit: Small, dark, single-seeded berry
  flowering_period: Varies with climate
  status: draft
habitat:
  text: Native to Sri Lanka and the Malabar coast of southern India; cultivated in warm, humid tropical
    lowlands, especially Sri Lanka, which remains the main source of true (Ceylon) cinnamon.
  status: draft
harvesting:
  text: Young shoots are cut back to encourage thin, straight new growth; the thin outer bark is scraped
    away and the paper-thin inner bark is peeled off, dried and rolled by hand into the characteristic
    multi-layered quills of Ceylon cinnamon.
  parts:
  - Bark
  status: draft
traditional_uses:
  text: True cinnamon bark has an ancient trade and medicinal history across Asia, the Middle East and
    Europe as a warming digestive and circulatory remedy, used for indigestion and as a general tonic
    spice; because it contains only trace coumarin, it is considered the safer species for frequent or
    medicinal use compared with cassia.
  reference_ids:
  - REF-0101
  status: verified
preparations:
- name: Standardised extract/powder
  text: Dried bark powder or standardised extract taken as capsules for metabolic and antioxidant support.
  reference_ids:
  - REF-0101
  status: draft
- name: Decoction/infusion
  text: Bark simmered or infused in hot water as a warming digestive tea.
  status: draft
- name: Culinary use
  text: Ground bark or whole quills used as a food spice, the traditional and most common form of use.
  status: draft
dosage:
- name: Bark powder
  text: The EU herbal monograph on Cinnamomum verum J.S. Presl, cortex gives, for adults and elderly,
    0.5-1 g of the comminuted bark as an infusion up to 4 times daily; a liquid extract at 0.5-1 mL three
    times daily and a tincture at a daily dose of 2-4 mL are also listed. Not recommended under 18 years,
    and a practitioner should be consulted if symptoms persist beyond 2 weeks. Note this is Ceylon cinnamon
    (C. verum); cassia species carry a much higher coumarin load and are not covered here. Educational
    reference only, not a prescription.
  reference_ids:
  - REF-3091
  status: verified
