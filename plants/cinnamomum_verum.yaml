drug_class_interactions:
- drug_class: antidiabetics
  severity: caution
  mechanism: Cinnamon can lower blood sugar (a meta-analysis of 28 trials in type 2 diabetes found reduced
    fasting glucose and HbA1c), so combining it with diabetes medicines such as insulin, metformin or
    sulfonylureas may increase the risk of hypoglycaemia; monitor blood glucose.
  reference_ids:
  - REF-2448
  - REF-2514
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: trigonella-foenum-graecum
  type: caution
  note: Cinnamon and fenugreek can each lower blood sugar, so taking them together — especially alongside
    diabetes medicines — may add up and increase the risk of blood sugar dropping too low (hypoglycaemia).
    Monitor your blood glucose.
  reference_ids:
