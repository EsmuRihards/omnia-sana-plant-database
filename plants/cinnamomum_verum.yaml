internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx).
  reference_ids are plant-level: the book lists parts and actions as flat, unmapped lists, so the full
  set of references cited for this plant is attached to each action rather than split per action. constituents
  not yet extracted — manual enrichment pending. Further enriched 2026-06-14 with six PubMed-sourced studies
  (REF-0664..REF-0669): type-2-diabetes glycaemic meta-analyses (REF-0664, REF-0665), lipid and cardiovascular-risk
  meta-analyses (REF-0666, REF-0667), and cinnamaldehyde antifungal/anti-tumour mechanism studies (REF-0668,
  REF-0669); cinnamaldehyde and coumarin (species-caution) constituents added. Note: several pooled meta-analyses
  and the C. cassia antifungal study (REF-0668) do not isolate C. verum specifically. | 2026-06-15: migrated
  to entity schema (actions->vocab ids, indications split out, constituents linked to compounds).'
