id: cinnamomum-verum
scientific_name: Cinnamomum verum
common_names:
- True Cinnamon
- Ceylon cinnamon
- Sri Lanka cinnamon
family: Lauraceae
parts_used:
- Bark
constituents:
- name: Cinnamaldehyde
  compounds:
  - essential-oil
  note: Trans-cinnamaldehyde is the principal constituent of cinnamon bark essential oil and the main
    driver of its antimicrobial, antifungal (anti-Candida) and anti-inflammatory activity, acting partly
    by damaging microbial cell membranes and inhibiting NF-kB signalling.
  reference_ids:
  - REF-0668
  - REF-0669
- name: Coumarin (species caution)
  compounds:
  - coumarin
  note: Cassia cinnamon (C. cassia) contains high levels of coumarin, which is potentially hepatotoxic
    in excess; true Ceylon cinnamon (C. verum) contains only trace coumarin and is the safer culinary/medicinal
    choice. Several pooled clinical and antimicrobial studies do not distinguish the two species.
  reference_ids:
  - REF-0668
