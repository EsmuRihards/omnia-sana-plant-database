contraindications:
- note: True cinnamon (C. verum) is safe in culinary and moderate medicinal doses. Cassia (C. cassia)
    contains high coumarin — excessive intake may be hepatotoxic and should not be confused with true
    cinnamon. May lower blood sugar — use caution with antidiabetic medications. Avoid high doses during
    pregnancy.
  severity: serious
  reference_ids:
  - REF-0006
  - REF-0101
  - REF-0136
  status: verified
- note: 'Duke (2002) rates Ceylon cinnamon as +++ and provides clinical evidence (score 2) for antibacterial
    activity, consistent with Commission E and WHO recognition. Key activities include antifungal (anti-Candida),
    antispasmodic, and carminative effects. Cinnamon contains cinnamaldehyde, eugenol, and coumarin. Important
    safety concern: Duke''s entry aggregates true cinnamon (C. verum) and cassia (C. cassia) — cassia
    contains significantly higher coumarin levels (potentially hepatotoxic) than true Ceylon cinnamon.
    True cinnamon (C. verum) has very low coumarin content and is safe at normal culinary doses. Medicinal
    dose: 0.5–1 g bark powder three times daily. Caution: cinnamon bark oil is highly irritating to mucous
    membranes (Duke, 2002).'
  severity: serious
  reference_ids:
