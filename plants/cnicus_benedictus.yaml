id: cnicus-benedictus
scientific_name: Cnicus benedictus
common_names:
- Blessed Thistle
- Holy thistle
- St Benedict's thistle
- Spotted thistle
family: Asteraceae
external_ids:
  gbif: 3127698
  powo: 'urn:lsid:ipni.org:names:61760-2'
  wikidata: Q15548577
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Sesquiterpene lactones (cnicin, arctigenin, arctiin)
  compounds:
  - sesquiterpene-lactone
  - sesquiterpene
  - arctigenin
  note: Cnicin is the principal bitter principle and main bioactive compound.
  reference_ids:
  - REF-0419
- name: Flavonoids, lignans and tannins
  compounds:
  - flavonoid
  - lignan
  - tannin
  note: Additional antioxidant and astringent constituents.
  reference_ids:
  - REF-0419
- name: Volatile oil
  compounds:
  - essential-oil
  note: Aromatic constituents of the herb.
  reference_ids:
  - REF-0419
botanical_description:
  text: Branching annual herb with a hairy, reddish, ridged stem and spiny, deeply lobed leaves with prominent
    pale veins. The flower heads are pale yellow, thistle-like, surrounded by a whorl of spiny, leaf-like
    bracts, giving the plant its 'spotted thistle' appearance.
  height: 20-60 cm
  habit: Branching, hairy annual herb
  leaves: Spiny, deeply lobed, with prominent pale veins
  flowers: Pale yellow, thistle-like flower heads surrounded by spiny bracts
  stem: Hairy, reddish, ridged, branching
  root: Shallow taproot
  fruit: Ribbed achene with a feathery pappus
  flowering_period: June-August
  reference_ids:
  - REF-0419
  status: verified
habitat:
  text: Grows on dry, sunny waste ground, roadsides and rocky slopes; native to the Mediterranean region
    and Western Asia and naturalised elsewhere as a garden escape.
  reference_ids:
  - REF-0419
  status: verified
harvesting:
  text: The flowering aerial parts are cut as the plant comes into flower, in summer, and dried in a warm,
    shaded, airy place to preserve the bitter principle cnicin.
  parts:
  - Aerial parts (flowering herb)
  season: Summer, at flowering
  reference_ids:
  - REF-0419
  status: verified
traditional_uses:
  text: Blessed thistle has a long European folk reputation as a bitter digestive tonic for loss of appetite
    and dyspepsia (an approved use under German Commission E) and, more anecdotally, as a traditional
    galactagogue to support breast-milk supply, though robust clinical evidence for the latter is lacking.
  reference_ids:
  - REF-0419
  - REF-0420
  status: verified
preparations:
- name: Infusion
  text: Dried flowering herb infused briefly in hot water as a bitter digestive tea, taken before meals.
  reference_ids:
  - REF-0420
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried herb.
  status: draft
dosage:
- name: Infusion
  text: Traditional herbal references suggest around 1-2 g of dried herb per cup, taken before meals,
    up to three times daily. Educational reference only, not a prescription.
  reference_ids:
  - REF-0420
  status: draft
