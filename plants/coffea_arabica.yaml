- note: 'Duke (2002) notes clinical evidence (score 2) for coffee as an adsorbent (activated charcoal
    use), astringent, bronchodilator, and gastric stimulant. A key safety concern: unfiltered (e.g., French
    press or boiled) coffee raises LDL cholesterol (hypercholesterolemic effect, score 2) due to diterpenes
    cafestol and kahweol. Filtered coffee does not carry this risk. Duke notes coffee''s CNS stimulant,
    diuretic, and hepatoprotective properties, though excessive consumption is associated with increased
    anxiety, tachycardia, and hypertension. It is contraindicated in peptic ulcer disease due to gastric
    acid stimulation (Duke, 2002).'
