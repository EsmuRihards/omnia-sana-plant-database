contraindications:
- note: Caffeine is the primary psychoactive component; excessive intake (>400 mg/day in adults, >200
    mg/day in pregnancy) can cause anxiety, insomnia, palpitations, and elevated blood pressure. Caffeine
    dependence and withdrawal (headaches, fatigue) are well documented. Individuals with anxiety disorders,
    arrhythmias, or hypertension should limit intake. Cafestol and kahweol in unfiltered coffee (e.g.,
    French press, espresso) raise LDL cholesterol; paper-filtered coffee removes these compounds. During
    pregnancy, limit to <200 mg caffeine/day due to risk of foetal growth restriction. Coffee may interact
    with certain medications including thyroid hormones, levothyroxine, and some antibiotics (ciprofloxacin
    increases caffeine levels). Heartburn and gastro-oesophageal reflux are common side effects in sensitive
    individuals (EFSA, 2015; NIH, 2023).
  severity: caution
  reference_ids:
