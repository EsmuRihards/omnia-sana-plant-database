id: cordyceps-militaris
scientific_name: Cordyceps militaris
common_names:
- Cordyceps
- caterpillar fungus
- Dong Chong Xia Cao (冬蟲夏草)
- Ziemas tārps – vasaras zāle
- Yartsa gunbu
family: Cordycipitaceae
