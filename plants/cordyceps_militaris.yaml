contraindications:
- note: 'Generally well tolerated short-term in human studies, but research is still limited (Ontawong
    et al., 2024; Hirsch et al., 2016). Possible side effects: stomach upset, nausea, diarrhea, headache
    (reported broadly for “Cordyceps” supplements; not everyone gets this) (Jędrejko, Lazur and Muszyńska,
    2021). Avoid / use medical guidance if you have: autoimmune disease, you’re on immunosuppressants,
    you have a bleeding disorder, or you take blood thinners/antiplatelet drugs (theoretical interaction
    + caution used in reviews) (Jędrejko, Lazur and Muszyńska, 2021). Pregnancy/lactation: not enough
    safety data → best to avoid (Jędrejko, Lazur and Muszyńska, 2021). Quality matters: choose reputable
    brands with testing for contaminants and clear labeling (fruiting body vs mycelium; extract ratio)
    (Jędrejko et al., 2022).'
