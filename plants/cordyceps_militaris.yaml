botanical_description:
  text: Entomopathogenic fungus (not a true plant) that develops from a mycelium infecting and consuming
    an insect host - classically a moth caterpillar or pupa buried in the soil. In late season it produces
    a slender, bright orange, club-shaped fruiting body (stroma) that emerges from the ground above the
    mummified host, its surface minutely roughened with embedded spore-producing structures.
  height: Fruiting body 2-8 cm
  habit: Entomopathogenic fungus, fruiting body emerging from a buried insect host
  leaves: Not applicable (fungus)
  flowers: Not applicable (fungus)
  stem: Slender, bright orange, club-shaped fruiting body (stroma)
  root: Anchored to the mummified insect host below ground
  fruit: Minutely roughened fertile head bearing embedded perithecia (spore-producing structures)
  flowering_period: Fruiting body typically appears in autumn
  reference_ids:
  - REF-2153
  status: verified
habitat:
  text: Grows on insect larvae and pupae in cool, moist forest soils and grassland across temperate and
    alpine East Asia; commercially, most Cordyceps militaris is now cultivated on grain or insect-based
    substrate rather than wild-collected.
  reference_ids:
  - REF-2153
  status: draft
harvesting:
  text: Wild fruiting bodies are dug up carefully with the insect host attached, in autumn when they emerge;
    cultivated material is harvested from the growing substrate once the orange fruiting bodies mature,
    then dried.
  parts:
  - Whole Plant
  season: Autumn (wild); at maturity under cultivation
  status: draft
traditional_uses:
  text: Cordyceps has a centuries-long reputation in Chinese and Tibetan traditional medicine as a tonic
    ('Dong Chong Xia Cao' - winter worm, summer grass) for vitality, stamina, respiratory and kidney support,
    and recovery from fatigue and illness, and remains a prized adaptogenic tonic today.
  reference_ids:
  - REF-0218
  - REF-0318
  status: verified
preparations:
- name: Standardised extract
  text: Cultivated fruiting-body extract, standardised to cordycepin or polysaccharide content, taken
    as capsules or powder.
  reference_ids:
  - REF-2153
  status: verified
- name: Decoction
  text: Dried fruiting body simmered in water or added to soups/tonics, a traditional preparation.
  status: draft
dosage:
- name: Standardised extract
  text: Studies of ergogenic and immune support commonly use around 1-3 g of dried fruiting body or standardised
    extract daily. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Cordycepin (3'-deoxyadenosine)
  note: A nucleoside analogue considered the marker bioactive compound, studied for anti-inflammatory,
