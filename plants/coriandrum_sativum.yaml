contraindications:
- note: '• Food use is generally safe for most people (leaf in salads, seed as spice) (Burdock & Carabin,
    2009). • Allergy is the main “big warning.” Coriander can trigger reactions ranging from mild oral
    itching to more serious allergy in sensitive people, especially those with pollen allergies (e.g.,
    birch/mugwort) or other Apiaceae spice allergies (Thermo Fisher/Phadia, n.d.; Berghea et al., 2025).
    • If you use supplements (capsules/powder) and you take diabetes medication, be cautious: coriander
    seed powder has shown blood-sugar improvements in a small human trial, so it may add to the effect
    of glucose-lowering meds (Zamany et al., 2025). • Essential oil is not the same as the spice. Coriander
    essential oil is highly concentrated and should not be taken internally in “DIY doses.” It can be
    irritating, and safety data are discussed mainly for food-flavouring levels—not self-prescribed medicinal
    dosing (Burdock & Carabin, 2009). • Pregnancy / breastfeeding: normal culinary amounts are generally
    considered fine; “medicinal-dose” supplements or essential oil are best avoided unless guided by a
    qualified professional because safety data at higher doses is limited (Burdock & Carabin, 2009).'
  severity: caution
  reference_ids:
  - REF-0151
  - REF-0219
  - REF-0308
  status: verified
- note: 'Duke (2002) provides clinical evidence (score 2) for coriander''s role as an aperitif (appetite
    stimulant) and digestive tonic, consistent with Commission E approval. It demonstrates antispasmodic,
    carminative, and antifungal activities at the experimental level. Dose: 1–3 g crushed fruits (seeds)
    three times daily, or equivalent preparations. Duke notes mild hypoglycemic activity and a potential
    antiimplantation effect in high doses — use with caution in women attempting pregnancy (Duke, 2002).'
  severity: caution
  reference_ids:
  - REF-0151
  - REF-0219
  - REF-0308
  status: verified
