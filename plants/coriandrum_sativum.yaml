botanical_description:
  text: Slender annual herb with delicate, broad, lobed lower leaves and finely divided, feathery upper
    leaves - a marked contrast within the same plant. Small white or pale pink flowers are borne in flat
    compound umbels, followed by round, ridged, aromatic seeds. The fresh leaf ('cilantro') has a distinctive
    citrusy aroma, often described as soapy by those with a genetic sensitivity to it.
  height: 30-70 cm
  habit: Slender, erect annual herb
  leaves: Lower leaves broad and lobed; upper leaves finely divided and feathery
  flowers: Small white or pale pink flowers in flat compound umbels
  stem: Slender, erect, branching, hollow
  root: Slender taproot
  fruit: Round, ridged, aromatic seed (mericarp)
  flowering_period: June-August
  reference_ids:
  - REF-1700
  status: verified
habitat:
  text: Believed native to the Mediterranean region and Western Asia; cultivated worldwide as a culinary
    herb and spice crop on well-drained, sunny sites.
  reference_ids:
  - REF-1700
  status: draft
harvesting:
  text: Leaves are picked fresh through the growing season, before the plant bolts (flowers), when the
    flavour is best; the seed is harvested in late summer once the umbels have browned and dried, then
    threshed; the root can be dug at the same time as young leaves.
  parts:
  - Leaf
  - Root
  - Seed
  - Stem
  season: Leaf before flowering; seed in late summer
  status: draft
traditional_uses:
  text: Coriander seed and leaf have a very long culinary and medicinal history across the Mediterranean,
    Middle East and Asia as a digestive carminative for indigestion, bloating and cramping, and, more
    recently, studied for calming/anxiolytic effects on the central nervous system alongside cardiovascular
    and metabolic benefits.
  reference_ids:
  - REF-1700
  - REF-0779
  status: verified
preparations:
- name: Infusion (seed)
  text: Crushed seed infused in hot water as a traditional carminative digestive tea.
  status: draft
- name: Fresh leaf (culinary)
  text: Fresh leaf used as a culinary herb and garnish, the most common form of use, continuing the food-medicine
    tradition.
  status: draft
- name: Standardised extract
  text: Seed powder or extract studied for glycaemic and psychiatric-symptom support in clinical and preclinical
    work.
