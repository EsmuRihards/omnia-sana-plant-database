botanical_description:
  text: Small deciduous tree or large shrub with thorny branches and glossy, shallowly lobed leaves (less
    deeply cut than common hawthorn). Clusters of small, five-petalled white (occasionally pink) flowers
    with a strong scent appear in spring, followed by small red berries (haws), each usually containing
    two seeds (nutlets).
  height: 4-8 m
  habit: Small deciduous, thorny tree or large shrub
  leaves: Glossy, shallowly lobed (less deeply cut than C. monogyna)
  flowers: Clusters of small, five-petalled white to pink, strongly scented flowers
  stem: Thorny branches; grey, fissured bark on older wood
  root: Deep, spreading root system
  fruit: Small red berry (haw), usually with two seeds
  flowering_period: April-May
  reference_ids:
  - REF-0782
  status: verified
habitat:
  text: Grows in woodland, woodland edges, hedgerows and scrub, typically on richer, damper soils than
    common hawthorn; native to western and central Europe.
  reference_ids:
  - REF-0782
  status: verified
harvesting:
  text: Flowers are picked as they open in spring, leaves are picked with the young flowering shoots,
    and the ripe red berries (haws) are gathered in autumn; all three parts are used, often combined,
    in hawthorn preparations.
  parts:
  - Flower
  - Fruit
  - Leaf
  season: Flower and leaf in spring; fruit in autumn
  reference_ids:
  - REF-0782
  status: verified
traditional_uses:
  text: Hawthorn flower, leaf and berry have a long European tradition, and substantial modern clinical
    study, as a cardiovascular tonic - supporting heart function, mild circulatory complaints and calming
    nervous tension - reflected in its traditional use for 'heart strengthening' and its modern standing
    as a well-studied botanical for mild heart failure symptoms.
  reference_ids:
  - REF-0782
  status: verified
preparations:
- name: Standardised extract
  text: Leaf-and-flower extract standardised to flavonoid or oligomeric proanthocyanidin content, taken
    as tablets or capsules; the best-studied clinical form.
  reference_ids:
  - REF-0782
  status: verified
- name: Infusion
  text: Dried flower, leaf or berry infused in hot water as a traditional cardiovascular and calming tea.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried flower, leaf or berry.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical studies commonly use around 160-900 mg of standardised leaf-and-flower extract daily,
    in divided doses, with effects often taking 4-8 weeks to emerge; never used as a substitute for prescribed
    heart medication without medical supervision. Educational reference only, not a prescription.
  status: draft
constituents:
