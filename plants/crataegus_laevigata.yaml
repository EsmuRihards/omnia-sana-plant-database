contraindications:
- note: Generally safe and well tolerated. High doses may cause low blood pressure and sedation. May interact
    with cardiac glycosides (digoxin) and antihypertensive drugs. Consult a physician before using with
    existing heart medications.
  reference_ids:
  - REF-0108
  - REF-0138
  - REF-0196
  status: verified
- note: Duke (2002) rates hawthorn (Crataegus spp., including C. laevigata) as a triple-plus herb (+++)
    with Commission E approval (score 2-3) for decreasing cardiac output in functional Stage II heart
    insufficiency (NYHA). Clinical evidence supports hawthorn standardized extracts (80-500 mg, standardized
    to flavonoids or procyanidins) for angina, arrhythmia, atherosclerosis, and hypertension. Hawthorn
    may potentiate digitalis and other cardiac medications and is not considered suitable for self-medication
    without professional guidance (Duke, 2002).
  reference_ids:
  - REF-0108
  - REF-0138
  - REF-0196
  status: verified
