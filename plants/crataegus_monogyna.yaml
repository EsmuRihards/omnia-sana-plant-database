drug_class_interactions:
- drug_class: cardiac-glycosides
  severity: caution
  mechanism: Hawthorn has its own positive effect on the heart (a Cochrane review found it improves heart-failure
    symptoms and exercise tolerance) and shares P-glycoprotein handling with digoxin, so combining it
    with digoxin or other cardiac-glycoside heart drugs should be supervised even though a controlled
    study found no major change in digoxin levels.
  reference_ids:
  - REF-2441
  - REF-2442
  - REF-2526
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antihypertensives
  severity: caution
  mechanism: Hawthorn can mildly lower blood pressure and reduce cardiac oxygen demand (a Cochrane meta-analysis
    found a lower pressure-heart-rate product), which may add to the effect of blood-pressure and heart-failure
    medicines.
  reference_ids:
  - REF-2442
  - REF-2526
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: sedatives-cns-depressants
  severity: caution
  mechanism: Hawthorn is traditionally used as a calming, sedative herb; taken with sedatives, sleeping
    tablets or other central-nervous-system depressants (including alcohol) it may add to drowsiness and
    slowed reactions.
  reference_ids:
  - REF-2452
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
