botanical_description:
  text: Small deciduous tree or large shrub, densely thorny, with deeply lobed, glossy leaves (more deeply
    cut than midland hawthorn). Clusters of small, five-petalled white flowers with a strong, musky scent
    appear in spring ('May blossom'), followed by small red berries (haws), each containing a single seed
    (nutlet) - the origin of the species name monogyna.
  height: 5-10 m
  habit: Small deciduous, densely thorny tree or large shrub
  leaves: Deeply lobed, glossy (more deeply cut than C. laevigata)
  flowers: Clusters of small, five-petalled white, strongly musky-scented flowers
  stem: Densely thorny branches; grey, fissured bark on older wood
  root: Deep, spreading root system
  fruit: Small red berry (haw), containing a single seed
  flowering_period: May
  reference_ids:
  - REF-1709
  status: verified
habitat:
  text: One of the commonest hedgerow and scrub trees of Europe, growing in hedgerows, woodland edges,
    scrub and pasture on a wide range of soils; native to Europe, North Africa and Western Asia.
  reference_ids:
  - REF-1709
  status: verified
harvesting:
  text: Flowers are picked as they open in May, leaves are picked with the young flowering shoots, and
    the ripe red berries (haws) are gathered in autumn after the first frosts soften them slightly; all
    three parts are traditionally combined.
  parts:
  - Flower
  - Fruit
  - Leaf
  season: Flower and leaf in May; fruit in autumn
  reference_ids:
  - REF-1709
  status: verified
traditional_uses:
  text: Common hawthorn shares the same long cardiovascular and calming tradition as midland hawthorn,
    used across European herbal medicine as a heart tonic for mild circulatory complaints, palpitations
    and nervous tension, and remains one of the most clinically studied cardiovascular botanicals.
  reference_ids:
  - REF-1709
  status: verified
preparations:
- name: Standardised extract
  text: Leaf-and-flower extract standardised to flavonoid or procyanidin content, taken as tablets or
    capsules; the best-studied clinical form.
  reference_ids:
  - REF-1709
  status: verified
- name: Infusion
  text: Dried flower, leaf or berry infused in hot water as a traditional cardiovascular and calming tea.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried flower, leaf or berry.
  status: draft
dosage:
- name: Standardised extract
  text: The EU herbal monograph on Crataegus spp., folium cum flore gives dry extracts in divided daily
    doses of 240-900 mg (single dose 80-450 mg) or, for one quantified extract, 570-1750 mg daily (single
    dose 190-350 mg), in adults and elderly. If symptoms persist longer than 2 weeks a doctor should be
    consulted, and hawthorn is never used as a substitute for prescribed heart medication without medical
    supervision. Educational reference only, not a prescription.
  reference_ids:
  - REF-0082
  status: verified
- name: Herbal tea
  text: The EU herbal monograph gives 1-2 g of the comminuted leaf and flower in 150 mL of boiling water
    as an infusion, up to 4 times daily (maximum 6 g daily), in adults and elderly. Educational reference
    only, not a prescription.
  reference_ids:
  - REF-0082
  status: verified
constituents:
- name: Flavonoids (catechins, quercetin, vitexin) and anthocyanins
  compounds:
