id: crocus-sativus
scientific_name: Crocus sativus
common_names:
- Saffron
- true saffron
- autumn crocus
family: Iridaceae
parts_used:
- Flower
botanical_description:
  text: Small, cormous perennial with narrow, grass-like, dark green leaves emerging with or just after
    the flowers. Each flower is a delicate lilac-purple, six-petalled bloom with three golden-yellow anthers
    and a single style dividing into three long, deep-red, thread-like stigmas - the saffron of commerce.
    The plant is a sterile triploid that never sets seed and is propagated entirely by division of its
    underground corms.
  height: 10-20 cm
  habit: Small, cormous, autumn-flowering perennial
  leaves: Narrow, grass-like, dark green, emerging with or just after the flowers
  flowers: Lilac-purple, six-petalled, with three golden anthers and three long deep-red stigma threads
  stem: Very short; flowers arise almost directly from the corm
  root: Underground corm with fibrous roots
  fruit: Sterile triploid; does not set seed, propagated by corm division
  flowering_period: Autumn (October-November)
  status: draft
habitat:
  text: Believed to have originated in Greece or Crete and spread through cultivation across the Mediterranean,
    Middle East and Asia (notably Iran, Kashmir and Spain); grown in sunny, well-drained fields with hot,
    dry summers and cool, wet autumns/winters.
  status: draft
harvesting:
  text: The flowers are hand-picked at dawn as they open, and the three red stigma threads are immediately
    hand-separated from each flower and dried - an extremely labour-intensive process (many thousands
    of flowers are needed for a small amount of dried saffron), which accounts for saffron's high cost.
  parts:
  - Flower
  season: Autumn, at flowering, harvested at dawn
  status: draft
traditional_uses:
  text: Saffron has a long Mediterranean, Middle Eastern and South Asian tradition as both a prized culinary
    spice/dye and a medicinal herb, used for mood support, digestive complaints and as a mild emmenagogue;
    its traditional mood-lifting reputation is now supported by clinical trials comparing standardised
    saffron extract to conventional antidepressants for mild-to-moderate depression.
  reference_ids:
  - REF-0788
  status: verified
preparations:
- name: Standardised extract
  text: Stigma extract standardised to safranal/crocin content, taken as capsules; the form used in most
    clinical mood and metabolic studies.
  reference_ids:
  - REF-0788
  status: verified
- name: Infusion
  text: A few dried stigma threads steeped in hot water or milk, a traditional culinary and mild medicinal
    preparation.
  status: draft
- name: Culinary use
  text: Dried stigma threads used as a spice and natural dye/flavouring in cooking, the most common traditional
    and modern use.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials for mood support commonly use around 30 mg of standardised saffron extract daily
    (in divided doses); culinary use is typically well under 1 g. High medicinal doses (5 g or more) are
    considered potentially toxic and should be avoided. Educational reference only, not a prescription.
  reference_ids:
  - REF-0788
  status: draft
constituents:
- name: Crocin and crocetin
  note: Water-soluble carotenoid glycosides responsible for saffron's deep golden-red colour and much
    of its antioxidant and mood-related activity.
  reference_ids:
  - REF-0788
- name: Safranal
  note: The principal volatile aromatic compound, giving saffron its characteristic scent and contributing
    to its sedative and antidepressant activity.
  reference_ids:
  - REF-0788
- name: Picrocrocin
  note: The main bitter-tasting glycoside of the stigma, a precursor of safranal.
