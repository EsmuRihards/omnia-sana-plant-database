drug_class_interactions:
- drug_class: antidepressants-serotonergic
  severity: caution
  mechanism: 'Saffron has antidepressant, serotonin-related activity (a trial safely combined low-dose saffron with SSRIs); because both raise serotonergic activity, combining saffron with antidepressants may add to serotonergic effects, so watch for side effects such as agitation or restlessness.'
