drug_class_interactions:
- drug_class: antidepressants-serotonergic
  severity: caution
  mechanism: Saffron has antidepressant, serotonin-related activity (a meta-analysis of randomised trials
    found saffron more effective than placebo and comparable to standard antidepressants for mild-to-moderate
    depression; a trial safely combined low-dose saffron with SSRIs); because both raise serotonergic
    activity, combining saffron with antidepressants may add to serotonergic effects, so watch for side
    effects such as agitation or restlessness.
  reference_ids:
  - REF-2496
  - REF-2535
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: sedatives-cns-depressants
  severity: caution
  mechanism: Saffron is traditionally used as a calming, sedative herb; taken with sedatives, sleeping
    tablets or other central-nervous-system depressants (including alcohol) it may add to drowsiness and
    slowed reactions.
  reference_ids:
  - REF-2452
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antidiabetics
  severity: caution
  mechanism: Saffron lowers fasting blood glucose and HbA1c in trials in people with diabetes; combined
    with diabetes medicines it may add to blood-sugar lowering, so monitor blood sugar.
  reference_ids:
  - REF-2502
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
