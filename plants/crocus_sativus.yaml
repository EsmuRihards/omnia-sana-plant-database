contraindications:
- note: Culinary use is entirely safe. At very high doses (5g+), saffron can be toxic — but such doses
    far exceed culinary or therapeutic amounts. Avoid medicinal doses during pregnancy (uterine stimulant).
    May interact with antidepressants. High quality saffron is often adulterated; verify source.
  reference_ids:
  - REF-0005
  - REF-0115
  - REF-0172
  status: verified
- note: 'Duke (2002) rates saffron as ++ and provides a critical safety warning: abortifacient activity
    has clinical support (score 2), meaning that medicinal doses can induce abortion — saffron is strictly
    contraindicated in pregnancy at doses above culinary amounts. The plant also shows antidepressant,
    antioxidant, and antitumor activities at the experimental level (score 1). Dose (culinary): 0.5 g
    stigmas as flavoring; medicinal doses above 5 g are considered potentially toxic. Duke notes that
    saffron stigmas contain crocin and safranal, which are responsible for its antidepressant and antioxidant
    properties (Duke, 2002).'
  reference_ids:
  - REF-0005
  - REF-0115
  - REF-0172
  status: verified
