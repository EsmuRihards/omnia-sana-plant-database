internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx).
  reference_ids are plant-level: the book lists parts and actions as flat, unmapped lists, so the full
  set of references cited for this plant is attached to each action rather than split per action. constituents
  not yet extracted — manual enrichment pending. Further enriched 2026-06-14 with six PubMed-sourced studies
  (REF-0652..REF-0657): meta-analyses on lipids (REF-0652) and glycaemic parameters (REF-0653 positive,
  REF-0654 null - the glycaemic evidence is mixed), a metabolic-syndrome essential-oil RCT (REF-0655),
  a post-operative bowel-motility RCT (REF-0656), and an essential-oil antifungal/antioxidant study identifying
  cuminaldehyde (REF-0657); cuminaldehyde constituent added. | 2026-06-15: migrated to entity schema (actions->vocab
  ids, indications split out, constituents linked to compounds).'
