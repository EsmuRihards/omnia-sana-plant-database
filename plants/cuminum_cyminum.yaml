- note: 'Allergy risk: cumin can trigger allergic reactions in sensitive people; cross-reactivity is reported
    within Apiaceae spices (e.g., celery/coriander/fennel/cumin) and in “pollen–spice” allergy patterns
    (Lisiecka et al., 2025; Berghea et al., 2025).'
