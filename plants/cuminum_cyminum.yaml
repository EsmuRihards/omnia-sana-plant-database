- note: Duke (2002) rates cumin as +++ and notes carminative, digestive, and aperitif activities at experimental
    levels (score 1). The plant demonstrates estrogenic activity in animal studies and has antifungal
    and antioxidant properties. Photodermatitic potential (phototoxicity) of the essential oil is noted
    — users should avoid sun exposure after topical application. Duke advises caution in pregnancy due
    to potential emmenagogue and antifertility effects at high medicinal doses (Duke, 2002).
  severity: caution
