id: cuminum-cyminum
scientific_name: Cuminum cyminum
common_names:
- Cumin
- Roman cumin
- jeera
- zira (Britannica
- 2025)
family: Apiaceae
external_ids:
  gbif: 3034775
  powo: 'urn:lsid:ipni.org:names:840882-1'
  wikidata: Q132624
parts_used:
- Seed
constituents:
- name: Cuminaldehyde
  compounds:
  - essential-oil
  note: Cuminaldehyde (4-isopropylbenzaldehyde) is the dominant constituent of cumin-seed essential oil
    (around two-thirds of the oil) and the main driver of its antimicrobial, antifungal (anti-aflatoxigenic)
    and antioxidant activity.
  reference_ids:
  - REF-0657
botanical_description:
  text: Slender annual herb with finely divided, thread-like leaves similar to dill or fennel but smaller.
    Small white or pale pink flowers are borne in small compound umbels, followed by small, ridged, boat-shaped,
    strongly aromatic seeds.
  height: 20-30 cm
  habit: Slender, low-growing annual herb
  leaves: Finely divided, thread-like, similar to dill but smaller
  flowers: Small white or pale pink flowers in small compound umbels
  stem: Slender, branching
  root: Slender taproot
  fruit: Small, ridged, boat-shaped, strongly aromatic seed (mericarp)
  flowering_period: Summer
  status: draft
habitat:
  text: Believed native to the eastern Mediterranean and Central Asia; cultivated widely in warm, dry
    climates including India, the Middle East and North Africa as a major spice crop.
  status: draft
harvesting:
  text: The seed heads are cut when the fruit has ripened but before it shatters, usually in mid- to late
    summer, then dried and threshed.
  parts:
  - Seed
  season: Mid- to late summer
  status: draft
traditional_uses:
  text: Cumin seed has an ancient culinary and medicinal history across the Middle East, South Asia and
    the Mediterranean as a warming digestive carminative for indigestion, bloating and cramping, and is
    one of the most widely used spices worldwide.
  status: draft
preparations:
- name: Infusion (seed)
  text: Crushed or whole seed infused or lightly toasted then infused in hot water as a traditional carminative
    digestive tea.
  status: draft
- name: Culinary use
  text: Whole or ground seed used extensively as a food spice, the most common form of use.
  status: draft
dosage:
- name: Seed infusion
  text: Traditional herbal references suggest around 1-3 g of crushed seed per cup, up to three times
    daily. Educational reference only, not a prescription.
  status: draft
