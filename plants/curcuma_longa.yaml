drug_class_interactions:
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: Turmeric/curcumin can raise the blood levels of blood-thinning drugs such as warfarin and
    clopidogrel and has mild antiplatelet activity, so combined use should be monitored for increased
    bleeding risk.
  reference_ids:
  - REF-2454
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antidiabetics
  severity: caution
  mechanism: Turmeric/curcumin can lower blood glucose and HbA1c in people with type 2 diabetes (confirmed
    by meta-analysis of randomised trials); combined with diabetes medicines it may add to blood-sugar
    lowering, so monitor blood sugar.
  reference_ids:
  - REF-2486
  - REF-2485
  - REF-2525
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
