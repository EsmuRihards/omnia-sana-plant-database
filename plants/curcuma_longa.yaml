id: curcuma-longa
scientific_name: Curcuma longa
common_names:
- Tumeric
- Turmeric
- common turmeric
- Indian saffron
family: Zingiberaceae
parts_used:
- Rhizome
botanical_description:
  text: Rhizomatous perennial herb with large, broad, lance-shaped leaves arising directly from the underground
    rhizome in a clump. Pale yellow flowers are borne in a dense spike partly hidden among pale green
    to pink upper bracts. The branching, knobbly rhizome has a bright orange-yellow interior, the source
    of turmeric spice and dye.
  height: 60-100 cm
  habit: Rhizomatous perennial herb
  leaves: Large, broad, lance-shaped, arising directly from the rhizome
  flowers: Pale yellow, in a dense spike among pale green to pink upper bracts
  stem: Pseudostem formed by tightly overlapping leaf bases
  root: Branching, knobbly rhizome with a bright orange-yellow interior
  fruit: Rarely sets seed; propagated by rhizome division
  flowering_period: Summer to early autumn
  reference_ids:
  - REF-0791
  status: verified
habitat:
  text: Native to South Asia (India) and Southeast Asia; cultivated extensively in warm, humid tropical
    climates on well-drained, fertile soils.
  status: draft
harvesting:
  text: The rhizomes are dug at the end of the growing season, typically 8-10 months after planting, when
    the leaves have died back; they are cleaned, boiled or steamed, then dried and often ground into the
    familiar yellow powder.
  parts:
  - Rhizome
  season: End of growing season, 8-10 months after planting
  status: draft
traditional_uses:
  text: Turmeric rhizome is a cornerstone spice and medicine of Ayurvedic and traditional Chinese medicine,
    used for millennia as an anti-inflammatory, digestive and wound-healing remedy and valued as a golden
    dye; its curcuminoid-rich rhizome is now among the most extensively researched botanicals for inflammatory
    and joint conditions, directly building on this traditional reputation.
  reference_ids:
  - REF-0002
  - REF-0791
  status: verified
preparations:
- name: Standardised extract
  text: Rhizome extract standardised to curcuminoid content, often combined with piperine (black pepper
    extract) to improve absorption, taken as capsules; the form used in most clinical arthritis and inflammation
    studies.
  reference_ids:
  - REF-0791
  status: verified
- name: Decoction/'golden milk'
  text: Fresh or dried rhizome simmered in milk or water, traditionally with black pepper and a fat source,
    as a warming digestive and anti-inflammatory drink.
  status: draft
- name: Culinary use
  text: Fresh or dried, ground rhizome used extensively as a food spice and colourant.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials in arthritis commonly use around 1000-1500 mg of curcumin (or curcuminoid-standardised
    extract) daily, in divided doses, often combined with piperine. Educational reference only, not a
    prescription.
  reference_ids:
  - REF-0791
  status: draft
constituents:
- name: Curcuminoids (curcumin, demethoxycurcumin, bisdemethoxycurcumin)
  compounds:
  - curcumin
  note: The principal yellow-orange pigments and best-studied bioactive compounds, responsible for most
    of turmeric's anti-inflammatory and antioxidant activity; oral bioavailability is low unless combined
    with piperine or a lipid carrier.
  reference_ids:
  - REF-0002
  - REF-0791
- name: Essential (volatile) oil
  compounds:
  - essential-oil
  - terpene
  note: Aromatic sesquiterpenes (including turmerone) contributing to fragrance and additional bioactivity.
