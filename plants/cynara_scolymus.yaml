id: cynara-scolymus
scientific_name: Cynara scolymus
common_names:
- Artichoke
- Globe artichoke
- Garden artichoke
family: Asteraceae
parts_used:
- Leaf
constituents:
- name: Caffeoylquinic acids (chlorogenic acid and cynarin)
  compounds:
  - chlorogenic-acid
  note: The principal choleretic, hepatoprotective and antioxidant constituents.
  reference_ids:
  - REF-0461
  - REF-1638
- name: Flavonoids (luteolin glycosides)
  compounds:
  - flavonoid
  - glycoside
  - luteolin
  note: Antioxidant constituents of the leaf.
  reference_ids:
  - REF-0461
- name: Sesquiterpene lactones (cynaropicrin)
  compounds:
  - sesquiterpene-lactone
  - sesquiterpene
  note: The bitter principle that stimulates digestion.
  reference_ids:
  - REF-0461
actions:
- action: choleretic
  note: Choleretic - stimulates bile flow to aid fat digestion
  reference_ids:
  - REF-0461
  - REF-0462
  status: verified
- action: digestive
  note: Digestive aid for dyspeptic complaints - indigestion, bloating and fullness
  reference_ids:
  - REF-0461
  - REF-0462
  status: verified
- action: hepatoprotective
  note: Hepatoprotective / liver support (protects liver cells and may aid their regeneration)
  reference_ids:
  - REF-0461
  - REF-1634
  - REF-1635
  - REF-1639
  - REF-2568
  status: verified
- action: lipid-lowering
  note: Lipid-lowering - helps reduce cholesterol (an RCT showed lower total and LDL cholesterol and higher
    HDL; a Cochrane review judged the overall evidence promising but not yet convincing)
  reference_ids:
