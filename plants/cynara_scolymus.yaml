id: cynara-scolymus
scientific_name: Cynara scolymus
common_names:
- Artichoke
- Globe artichoke
- Garden artichoke
family: Asteraceae
external_ids:
  gbif: 3112361
  powo: 'urn:lsid:ipni.org:names:200902-1'
  wikidata: Q134609
parts_used:
- Leaf
constituents:
- name: Caffeoylquinic acids (chlorogenic acid and cynarin)
  compounds:
  - chlorogenic-acid
  note: The principal choleretic, hepatoprotective and antioxidant constituents.
  reference_ids:
  - REF-0461
  - REF-1638
- name: Flavonoids (luteolin glycosides)
  compounds:
  - flavonoid
  - glycoside
  - luteolin
  note: Antioxidant constituents of the leaf.
  reference_ids:
  - REF-0461
- name: Sesquiterpene lactones (cynaropicrin)
  compounds:
  - sesquiterpene-lactone
  - sesquiterpene
  note: The bitter principle that stimulates digestion.
  reference_ids:
  - REF-0461
botanical_description:
  text: Tall, thistle-like perennial herb with large, deeply lobed, silvery-green leaves, spiny in wild
    forms but usually spineless in cultivated globe artichoke. The plant produces a large, edible immature
    flower bud (the 'artichoke heart' of cuisine) which, left to mature, opens into a striking violet-blue
    thistle flower.
  height: 1-2 m
  habit: Tall, robust, thistle-like perennial herb
  leaves: Large, deeply lobed, silvery-green, spiny in wild forms
  flowers: Large violet-blue thistle-type flower head, harvested immature as the edible artichoke bud
  stem: Stout, ridged, branching
  root: Deep, fleshy taproot
  fruit: Achene with a feathery pappus
  flowering_period: Summer, if buds are left unharvested
  reference_ids:
  - REF-0461
  status: verified
habitat:
  text: Native to the Mediterranean region; cultivated widely as a vegetable and medicinal crop in warm-temperate
    climates on rich, well-drained soil.
  reference_ids:
  - REF-0461
  status: verified
harvesting:
  text: For medicinal use, the leaves are picked before flowering, when caffeoylquinic acid (chlorogenic
    acid/cynarin) content is highest, and dried; the edible flower bud is separately harvested young,
    before the flower opens.
  parts:
  - Leaf
  season: Before flowering
  reference_ids:
  - REF-0461
  status: verified
traditional_uses:
  text: Artichoke leaf has a long Mediterranean folk history as a bitter digestive and liver remedy, used
    to stimulate bile flow and ease dyspeptic complaints such as indigestion, bloating and fullness, and
    as a traditional hepatoprotective 'liver tonic'; modern standardised leaf extracts are also studied
    for supporting healthy cholesterol levels.
  reference_ids:
  - REF-0461
  status: verified
preparations:
- name: Standardised extract
  text: Dried leaf extract standardised to caffeoylquinic acid (chlorogenic acid/cynarin) content, taken
    as capsules or tablets for digestive and lipid support.
  reference_ids:
  - REF-0461
  status: verified
- name: Infusion
  text: Dried leaf infused in hot water as a bitter digestive tea, taken before meals.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried leaf.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical studies commonly use extracts providing around 300-640 mg dried leaf extract, up to three
    times daily. Educational reference only, not a prescription.
  reference_ids:
  - REF-0461
  status: draft
actions:
- action: choleretic
  note: Choleretic - stimulates bile flow to aid fat digestion
  reference_ids:
