drug_class_interactions:
- drug_class: diuretics
  severity: caution
  mechanism: Wild carrot is itself a diuretic; taken with pharmaceutical diuretics it may add to fluid
    and electrolyte (especially potassium) loss.
  reference_ids:
  - REF-2708
  - REF-2712
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-10'
- drug_class: antihypertensives
  severity: caution
  mechanism: As a diuretic, wild carrot may add to the blood-pressure-lowering and fluid-loss effects
    of antihypertensive medicines and cause dizziness.
  reference_ids:
  - REF-2708
  - REF-2712
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-10'
- drug_class: hormonal-therapies
  severity: caution
  mechanism: Wild carrot seed has estrogenic activity and interferes with implantation; it could theoretically
    interact with hormonal contraceptives, hormone replacement or fertility treatment.
  reference_ids:
  - REF-2724
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-10'
