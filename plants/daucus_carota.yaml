id: daucus-carota
scientific_name: Daucus carota
common_names:
- Wild carrot
- Queen Anne's lace
- bird's nest
- bishop's lace
common_slug: wild-carrot
family: Apiaceae
external_ids:
  gbif: 3034742
  wikidata: Q30056
synonyms:
- Daucus carota subsp. carota
parts_used:
- Fruit and seed
- Root
- Aerial parts
- Flower
botanical_description:
  text: Erect biennial herb of the carrot family, 30-100 cm tall, growing from a slender, whitish, aromatic
    taproot. The leaves are 2-3-pinnate, finely divided and feathery, and smell distinctly of carrot when
    crushed. Tiny white flowers are borne in a flat or slightly domed compound umbel, classically with
    a single dark purple-red floret at the very centre; a ruff of long, three-forked (feathery) bracts
    sits beneath the umbel. As the seed ripens the umbel curls inward into a concave 'bird's nest'. The
    stems are solid, ridged and roughly hairy (bristly).
  height: 30-100 cm
  habit: Erect biennial herb
  leaves: 2-3-pinnate, finely divided and feathery; smell of carrot when crushed
  flowers: Tiny white flowers in a flat compound umbel, usually with one dark purple-red central floret;
    a ruff of three-forked bracts beneath the umbel
  stem: Solid, ridged and roughly hairy (bristly) - 'Queen Anne has hairy legs'
  root: Slender, whitish, aromatic taproot
  fruit: Small dry oval fruit (mericarp) bearing hooked spines; the seed is rich in aromatic essential
    oil
  flowering_period: June-September
  reference_ids:
  - REF-2708
  status: verified
habitat:
  text: Dry grassland, meadows, roadsides, field margins and waste ground on well-drained, often chalky
    (calcareous) soils. Native to Europe, south-west Asia and North Africa and widely naturalised across
    temperate North America, Australia and elsewhere. The cultivated carrot (Daucus carota subsp. sativus)
    was domesticated from this wild stock.
  reference_ids:
  - REF-2708
  status: verified
harvesting:
  text: The ripe fruits (seeds) are collected from the drying umbels in late summer to autumn; the aromatic
    seed is the part richest in essential oil. The taproot is dug in the first-year rosette stage, before
    the plant flowers, when it is still tender; aerial parts are gathered while in flower. Only ever harvest
    where the plant can be identified with certainty against its deadly Apiaceae look-alikes.
  parts:
  - Fruit and seed
  - Root
  - Aerial parts
  season: Root in the first-year rosette; aerial parts in flower (summer); seed when ripe (late summer
    to autumn)
  reference_ids:
  - REF-2708
  - REF-2721
  status: verified
traditional_uses:
  text: Wild carrot has a long folk-medicinal history as a diuretic and urinary remedy for gravel, stones,
    cystitis and gout, and as a carminative aromatic bitter for flatulent indigestion. The seed is the
    classic part used and carries a well-documented traditional reputation as an emmenagogue and folk
    contraceptive ('Queen Anne's Lace seed'); experimental work confirms estrogenic and anti-implantation
    (pregnancy-interceptory) activity, which is also why the seed is avoided in pregnancy. The root is
    nutritive and rich in carotene, and the plant has been applied to wounds and inflamed skin.
  reference_ids:
  - REF-2708
  - REF-2724
  status: verified
preparations:
- name: Infusion
  text: Dried seed or aerial parts (herb) infused in hot water as a diuretic and carminative tea - the
    traditional way of taking wild carrot for urinary and digestive complaints.
  reference_ids:
  - REF-2708
  status: verified
- name: Seed preparation
  text: The bruised aromatic seed steeped or briefly simmered; the seed is the part richest in essential
    oil and is the classic diuretic and emmenagogue preparation.
  reference_ids:
  - REF-2708
  - REF-2724
  status: verified
- name: Tincture
  text: Alcoholic extract (typically around 1:5 in 45% alcohol) of the seed or whole herb.
  status: draft
- name: Poultice
  text: Crushed leaf or grated root applied externally to wounds and inflamed skin, reflecting the traditional
    vulnerary use; carrot seed oil bioactives promote wound healing in animal studies.
  reference_ids:
  - REF-2718
  status: draft
dosage:
- name: Dried herb/seed infusion
  text: Traditional herbal texts use roughly 1-2 g of dried seed, or 2-4 g of dried aerial parts, per
    cup as an infusion, up to three times daily. Educational reference only.
  status: draft
- name: Tincture (1:5)
  text: About 1-4 mL of a 1:5 tincture, up to three times daily in adults. Educational reference only,
    not a prescription.
  status: draft
constituents:
- name: Essential (volatile) oil
  compounds:
  - essential-oil
  - terpene
  - sesquiterpene
  note: Seed oil dominated by the sesquiterpene alcohol carotol (often >75%), with alpha-pinene, sabinene,
    beta-caryophyllene, geranyl acetate and daucol; gives the aromatic, carminative and antimicrobial
    character.
  reference_ids:
  - REF-2721
  - REF-2722
  - REF-2718
- name: Carotenoids
  compounds:
  - carotenoid
  note: Beta-carotene and other carotenoids, especially abundant in the root; carrot is the main dietary
    source of provitamin A.
  reference_ids:
  - REF-2709
- name: Falcarinol-type polyacetylenes
  note: C17-polyacetylenes (falcarinol, falcarindiol) with anticancer, anti-inflammatory, antifungal and
    antibacterial activity.
  reference_ids:
  - REF-2710
- name: Flavonoids and phenolic acids
  compounds:
  - flavonoid
  - luteolin
  - apigenin
  - quercetin
  - kaempferol
  - phenolic-acid
  - chlorogenic-acid
  - caffeic-acid
  note: Antioxidant flavonoids such as luteolin, apigenin, quercetin and kaempferol, and phenolic acids
    such as chlorogenic and caffeic acid.
  reference_ids:
  - REF-2708
  - REF-2715
- name: Dietary fibre and polysaccharides
  compounds:
  - pectin
  - polysaccharide
  note: Root rich in pectin and other polysaccharides; insoluble dietary fibre contributes hypoglycemic
    and hypolipidemic effects.
  reference_ids:
  - REF-2719
  - REF-2720
