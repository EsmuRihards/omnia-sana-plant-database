contraindications:
- note: Wild carrot SEED has estrogenic and anti-implantation (pregnancy-interceptory) activity and a
    long reputation as an emmenagogue and folk contraceptive; medicinal doses of the seed should be avoided
    in pregnancy and when trying to conceive.
  severity: warning
  reference_ids:
  - REF-2724
  - REF-2708
  status: verified
- note: Like other Apiaceae, wild carrot contains furanocoumarins that can cause photosensitivity; skin
    contact with the sap plus sun exposure may cause phytophotodermatitis. Avoid excessive sun or UV exposure
    when using the herb medicinally.
  severity: caution
  reference_ids:
  - REF-2708
  status: verified
- note: Excessive intake of carrot or carotene can cause a harmless, reversible yellow-orange discolouration
    of the skin (carotenodermia).
  severity: info
  reference_ids:
  - REF-2723
  status: verified
- note: 'CRITICAL foraging hazard: wild carrot grows among, and closely resembles, several deadly poisonous
    Apiaceae - poison hemlock (Conium maculatum), fool''s parsley (Aethusa cynapium), hemlock water-dropwort
    (Oenanthe crocata) and water hemlock (Cicuta virosa). Never gather wild carrot for use unless every
    look-alike has been positively excluded. Wild carrot has solid, ridged, bristly-HAIRY stems, a carrot
    smell, three-forked bracts beneath the umbel and usually a single dark central floret; the deadly
    hemlocks have smooth, hairless stems (often purple-blotched) and an unpleasant smell.'
  severity: serious
  reference_ids:
  - REF-2708
  - REF-2610
  - REF-2611
  status: verified
