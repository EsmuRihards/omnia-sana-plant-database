id: dioscorea-villosa
scientific_name: Dioscorea villosa
common_names:
- Wild Yam
- Colic root
- Rheumatism root
- Mexican wild yam
family: Dioscoreaceae
external_ids:
  gbif: 2754553
  wikidata: Q309632
parts_used:
- Root and rhizome
constituents:
- name: Steroidal saponins yielding diosgenin
  compounds:
  - saponin
  note: Diosgenin is an industrial precursor for making steroid hormones in the laboratory, but it is
    NOT converted into hormones in the human body. Oral bioavailability of diosgenin is low; in animal
    studies orally administered diosgenin restored skin thickness in ovariectomised mice and lowered blood
    lipids.
  reference_ids:
  - REF-0528
  - REF-0536
  - REF-2282
  - REF-2285
  - REF-2286
  - REF-2287
  - REF-2289
- name: Phytosterols and alkaloids
  compounds:
  - phytosterol
  - alkaloid
  note: Supporting constituents of the root.
  reference_ids:
  - REF-0528
  - REF-2281
botanical_description:
  text: Twining, herbaceous perennial vine with heart-shaped leaves arising from a knotty, woody, cinnamon-brown
    rhizome ('root'). Small, inconspicuous greenish-yellow flowers are borne on separate male and female
    plants, followed on female plants by small three-winged seed capsules.
  height: Vine to several metres, twining over support
  habit: Twining, herbaceous perennial vine
  leaves: Heart-shaped, alternate
  flowers: Small, inconspicuous, greenish-yellow, on separate male and female plants
  stem: Slender, twining
  root: Knotty, woody, cinnamon-brown rhizome
  fruit: Small three-winged seed capsule (female plants)
  flowering_period: Summer
  reference_ids:
  - REF-0528
  status: verified
habitat:
  text: Native to woodland edges, thickets and fence rows of eastern North America, growing over shrubs
    and fences in moist, rich soil.
  reference_ids:
  - REF-0528
  status: verified
harvesting:
  text: The knotty rhizome is dug in autumn once the aerial vine has died back, then cleaned and dried.
  parts:
  - Root and rhizome
  season: Autumn
  status: draft
traditional_uses:
  text: Wild yam root has a Native American and Eclectic-medicine history as an antispasmodic remedy for
    colic, menstrual cramps and rheumatic joint pain (reflected in the old names 'colic root' and 'rheumatism
    root'); despite a persistent modern myth, its diosgenin content is not converted into progesterone
    or other hormones in the human body.
  reference_ids:
  - REF-0528
  status: verified
preparations:
- name: Decoction
  text: Dried root and rhizome simmered in water as a traditional antispasmodic remedy for colic and cramping.
  reference_ids:
  - REF-0528
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried root and rhizome, typically around 1:5.
  status: draft
- name: Topical cream
  text: Root extract formulated into topical creams, historically marketed (without good supporting evidence)
    for menopausal symptoms.
  reference_ids:
  - REF-0614
  status: verified
dosage:
- name: Decoction
  text: Traditional herbal references suggest around 1-2 g of dried root per cup, up to three times daily.
    Educational reference only, not a prescription.
  status: draft
actions:
- action: analgesic
  note: Antispasmodic / analgesic for menstrual cramps and muscle spasm (antinociceptive in animal models)
  reference_ids:
  - REF-0528
  status: needs-review
- action: anti-inflammatory
  note: Anti-inflammatory for joint and inflammatory pain
  reference_ids:
  - REF-0528
  status: verified
- action: anticancer
