common_names:
- Wild Yam
- Colic root
- Rheumatism root
- Mexican wild yam
scientific_name: Dioscorea villosa
family: Dioscoreaceae
parts_used:
- name: Root and rhizome
  medicinal_actions:
  - action: Antispasmodic / analgesic for menstrual cramps and muscle spasm (antinociceptive in animal
      models)
    reference_ids:
    - REF-0528
    status: needs-review
  - action: Anti-inflammatory for joint and inflammatory pain
    reference_ids:
    - REF-0528
    status: verified
  - action: Traditional support for menopausal symptoms (see safety note - it does NOT act as a natural
      progesterone)
    reference_ids:
    - REF-0528
    status: needs-review
constituents:
- name: Steroidal saponins yielding diosgenin
  note: Diosgenin is an industrial precursor for making steroid hormones in the laboratory, but it is
    NOT converted into hormones in the human body. Oral bioavailability of diosgenin is low; in animal
    studies orally administered diosgenin restored skin thickness in ovariectomised mice and lowered
    blood lipids.
  reference_ids:
  - REF-0528
  - REF-0536
- name: Phytosterols and alkaloids
  note: Supporting constituents of the root.
  reference_ids:
  - REF-0528
contraindications:
- note: 'IMPORTANT myth-bust: wild yam / diosgenin is NOT converted into progesterone or DHEA in the body,
    so it does not work as a ''natural progesterone'' - claims to that effect are incorrect.'
  reference_ids:
  - REF-0528
  status: verified
- note: Generally well tolerated orally (no acute or subchronic toxicity in animal studies); large doses
    may cause nausea or vomiting. Avoid medicinal doses in pregnancy and breastfeeding and in hormone-sensitive
    conditions as a precaution.
  reference_ids:
  - REF-0528
  status: needs-review
internal_notes: Enriched 2026-06-12 from scientific literature (BMC Complementary and Alternative Medicine
  bioassay/toxicity study). Further enriched 2026-06-13 with an additional diosgenin pharmacokinetic/pharmacology
  study (REF-0536, Okawara et al. 2013) sourced from PubMed. Originally a skeleton imported from the omniasana.bio
  Symptom-to-Plant Lookup tool (menstrual-cramps, menopause, muscle-spasm); associations retained and now
  part-mapped and cited.
last_updated: '2026-06-13'
status: verified
