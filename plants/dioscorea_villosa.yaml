id: dioscorea-villosa
scientific_name: Dioscorea villosa
common_names:
- Wild Yam
- Colic root
- Rheumatism root
- Mexican wild yam
family: Dioscoreaceae
parts_used:
- Root and rhizome
constituents:
- name: Steroidal saponins yielding diosgenin
  compounds:
  - saponin
  note: Diosgenin is an industrial precursor for making steroid hormones in the laboratory, but it is
    NOT converted into hormones in the human body. Oral bioavailability of diosgenin is low; in animal
    studies orally administered diosgenin restored skin thickness in ovariectomised mice and lowered blood
    lipids.
  reference_ids:
  - REF-0528
  - REF-0536
- name: Phytosterols and alkaloids
  compounds:
  - phytosterol
  - alkaloid
  note: Supporting constituents of the root.
  reference_ids:
  - REF-0528
actions:
- action: analgesic
  note: Antispasmodic / analgesic for menstrual cramps and muscle spasm (antinociceptive in animal models)
  reference_ids:
  - REF-0528
  status: needs-review
- action: anti-inflammatory
  note: Anti-inflammatory for joint and inflammatory pain
  reference_ids:
  - REF-0528
  status: verified
- action: antispasmodic
  note: Antispasmodic / analgesic for menstrual cramps and muscle spasm (antinociceptive in animal models)
  reference_ids:
  - REF-0528
  status: needs-review
indications:
- condition: arthritis
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0528
  status: needs-review
- condition: back-pain
  note: inferred from analgesic action
  reference_ids:
  - REF-0528
  status: needs-review
- condition: headache
  note: inferred from analgesic action
  reference_ids:
  - REF-0528
  status: needs-review
- condition: inflammation
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0528
  status: needs-review
- condition: menopause
  note: Traditional support for menopausal symptoms (see safety note - it does NOT act as a natural progesterone)
    - a placebo-controlled crossover RCT of topical wild yam cream found little effect on menopausal symptoms,
    lipids or hormones
  reference_ids:
  - REF-0528
  - REF-0614
  status: needs-review
- condition: menstrual-cramps
  note: Antispasmodic / analgesic for menstrual cramps and muscle spasm (antinociceptive in animal models)
  reference_ids:
  - REF-0528
  status: needs-review
- condition: muscle-spasm
  note: Antispasmodic / analgesic for menstrual cramps and muscle spasm (antinociceptive in animal models)
  reference_ids:
  - REF-0528
  status: needs-review
- condition: pain
  note: Anti-inflammatory for joint and inflammatory pain
  reference_ids:
  - REF-0528
  status: verified
- condition: skin-irritation
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0528
  status: needs-review
contraindications:
- note: 'IMPORTANT myth-bust: wild yam / diosgenin is NOT converted into progesterone or DHEA in the body,
    so it does not work as a ''natural progesterone'' - claims to that effect are incorrect. Consistent
    with this, a randomized placebo-controlled crossover trial of topical wild yam cream found no significant
    change in symptoms, serum/salivary progesterone, oestradiol, FSH or lipids.'
  severity: info
  reference_ids:
  - REF-0528
  - REF-0614
  status: verified
- note: Generally well tolerated orally (no acute or subchronic toxicity in animal studies); large doses
    may cause nausea or vomiting. Avoid medicinal doses in pregnancy and breastfeeding and in hormone-sensitive
    conditions as a precaution.
  severity: caution
  reference_ids:
  - REF-0528
  status: needs-review
