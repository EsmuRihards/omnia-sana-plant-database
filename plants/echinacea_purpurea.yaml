id: echinacea-purpurea
scientific_name: Echinacea purpurea
common_names:
- Purple coneflower
- Snakeroot
- Black Sampson
family: Asteraceae
external_ids:
  gbif: 3150935
  powo: 'urn:lsid:ipni.org:names:1174497-2'
  wikidata: Q272661
