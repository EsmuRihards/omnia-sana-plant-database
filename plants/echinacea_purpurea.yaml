contraindications:
- note: Generally considered safe, but caution advised for those with autoimmune conditions. Not recommended
    for long-term use (more than 8 weeks continuously).
  severity: caution
  reference_ids:
  - REF-0153
  - REF-0271
  - REF-0308
  status: verified
- note: 'Duke (2002) rates echinacea as +++ — among the most thoroughly documented herbal immunostimulants.
    It notes experimental and clinical evidence for immunostimulant, antiviral, and anti-inflammatory
    activities. Multiple species have been studied (E. purpurea, E. angustifolia, E. pallida), and Duke
    emphasizes that species identification in commercial products is often unreliable. Commission E approves
    E. purpurea for supporting immune function during colds and flu. Dose: 900 mg standardized extract
    daily in acute use; use should be limited to 8 weeks continuous. Contraindicated in autoimmune diseases
    (MS, lupus, HIV/AIDS), tuberculosis, and with immunosuppressive drugs (cyclosporine) (Duke, 2002).'
  severity: caution
  reference_ids:
