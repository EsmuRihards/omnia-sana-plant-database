contraindications:
- note: Cardamom is generally considered safe for most people when used in culinary amounts. At medicinal
    doses (supplement form), rare side effects include mild gastrointestinal discomfort and allergic reactions.
    There are no well-documented serious drug interactions at culinary doses. Cardamom may mildly lower
    blood pressure — caution if combined with antihypertensive medications. Some sources suggest potential
    gallstone formation with very high doses, as cardamom may stimulate bile flow. Avoid therapeutic doses
    during pregnancy until more safety data are available; culinary use is considered safe. Allergy to
    other Zingiberaceae (ginger, turmeric) may indicate cross-reactivity risk (Korikanthimath and Hiremath,
    2002).
  reference_ids:
