  status: verified
- note: 'Duke (2002) provides clinical support (score 2) for cardamom as a cholagogue, antiviral agent,
    and appetite stimulant. Commission E and the German PDR (PHR) approve it for loss of appetite and
    bronchitis (score 2). The essential oil shows antispasmodic and carminative activity. Dose: 1.5 g
    ground fruit or equivalent preparation three times daily. Duke rates cardamom as generally safe (++),
    with no significant contraindications at therapeutic doses (Duke, 2002).'
