id: elettaria-cardamomum
scientific_name: Elettaria cardamomum
common_names:
- Cardamom
- Green cardamom
- true cardamom
- small cardamom
- '“elaichi” Note: Not the same as black cardamom  — that one is smokier and used differently in cooking'
family: Zingiberaceae
parts_used:
- Fruit
- Seed
botanical_description:
  text: Large, rhizomatous perennial herb with tall, reed-like leafy stems (pseudostems) formed by overlapping
    leaf sheaths, arising from a stout underground rhizome. Small, pale flowers with a violet-veined white
    lip are borne on separate trailing panicles that grow along the ground from the base of the plant.
    The fruit is a small, ridged, pale green three-sided capsule (the cardamom pod) containing numerous
    dark, aromatic seeds.
  height: 2-4 m (leafy stems)
  habit: Large, rhizomatous, reed-like perennial herb
  leaves: Long, lance-shaped, glossy, arranged on tall leafy pseudostems
  flowers: Small, pale, with a violet-veined white lip, on trailing panicles near the ground
  stem: Tall, reed-like leafy pseudostems; flowering panicles trail separately along the ground
  root: Stout underground rhizome
  fruit: Small, ridged, pale green three-sided capsule (pod) containing numerous dark aromatic seeds
  flowering_period: Varies with climate, often during the rainy season
  reference_ids:
  - REF-1668
  status: verified
habitat:
  text: Native to the moist evergreen forests of the Western Ghats of southern India and Sri Lanka; cultivated
    in warm, humid, shaded tropical conditions, notably in India, Guatemala and Sri Lanka.
  reference_ids:
  - REF-1668
  status: verified
harvesting:
  text: The unripe green pods are hand-picked just before full maturity, then carefully dried (traditionally
    in the shade or by gentle heat) to preserve the green colour and aromatic oil; the pods are typically
    used whole or the seeds removed and ground just before use.
  parts:
  - Fruit
  - Seed
  status: draft
traditional_uses:
  text: Cardamom has a long Ayurvedic, Middle Eastern and Asian tradition as a warming digestive carminative
    for indigestion and bloating, a remedy for respiratory complaints such as asthma and bronchitis, and
    a valued spice for tea, coffee and cooking.
  reference_ids:
  - REF-1668
  status: verified
preparations:
- name: Infusion (crushed pod/seed)
  text: Crushed pods or seeds infused in hot water, or added to tea/coffee, as a traditional carminative
    digestive preparation.
  reference_ids:
  - REF-1668
  status: verified
- name: Essential oil
  text: Steam-distilled from the seed; used in small internal doses or diluted for aromatic/topical use.
  status: draft
- name: Culinary use
  text: Whole or ground seed used extensively as a food spice, the most common form of use.
  status: draft
dosage:
- name: Ground fruit/seed
  text: Traditional herbal references suggest around 1.5 g ground fruit (pod and seed), up to three times
    daily. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Essential oil (1,8-cineole, alpha-terpinyl acetate)
  compounds:
  - essential-oil
  - cineole
  - terpene
  note: Seed essential oil dominated by 1,8-cineole and alpha-terpinyl acetate, giving the characteristic
    aroma and much of the carminative, antimicrobial and antioxidant activity.
  reference_ids:
  - REF-1668
- name: Flavonoids and phenolic compounds
  compounds:
  - flavonoid
  - phenolic-compound
  note: Additional antioxidant constituents of the seed.
  reference_ids:
  - REF-1668
