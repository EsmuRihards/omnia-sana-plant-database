contraindications:
- note: Generally safe with few side effects; taken late in the day it may cause mild insomnia or irritability.
    Use caution in uncontrolled high blood pressure.
  severity: caution
  reference_ids:
  - REF-0509
  status: verified
- note: May interact with digoxin, anticoagulants, and antidiabetic or sedative medicines. Safety in pregnancy
    and breastfeeding is not established, so avoid medicinal doses.
  severity: caution
