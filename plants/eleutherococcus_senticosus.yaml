common_names:
- Siberian Ginseng
- Eleuthero
- Devil's bush
- Touch-me-not
scientific_name: Eleutherococcus senticosus
family: Araliaceae
parts_used:
- name: Root and rhizome
  medicinal_actions:
  - action: Adaptogen for fatigue and physical/mental stress (improves endurance and resistance to stressors)
    reference_ids:
    - REF-0509
    - REF-0506
    - REF-0587
    status: verified
  - action: Cognitive-function and mental-performance support
    reference_ids:
    - REF-0506
    status: verified
  - action: Immune support (immunomodulatory)
    reference_ids:
    - REF-0509
    - REF-0506
    - REF-0587
    status: verified
  - action: Preclinical neuroprotective and antidiabetic (glucose-regulating) activity
    reference_ids:
    - REF-0587
    status: needs-review
constituents:
- name: Eleutherosides (B and E - lignan and phenylpropanoid glycosides)
  note: The principal marker compounds of the root; together with saponins, flavonoids and polysaccharides
    they underlie the adaptogenic, immunostimulatory and neuroprotective activity.
  reference_ids:
  - REF-0509
  - REF-0587
- name: Polysaccharides
  note: Immunomodulatory constituents.
  reference_ids:
  - REF-0506
  - REF-0509
contraindications:
- note: Generally safe with few side effects; taken late in the day it may cause mild insomnia or irritability.
    Use caution in uncontrolled high blood pressure.
  reference_ids:
  - REF-0509
  status: verified
- note: May interact with digoxin, anticoagulants, and antidiabetic or sedative medicines. Safety in pregnancy
    and breastfeeding is not established, so avoid medicinal doses.
  reference_ids:
  - REF-0509
  status: needs-review
internal_notes: Enriched 2026-06-12 from scientific literature (Holistic Nursing Practice review; Nutrients
  adaptogens review). Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool
  (fatigue, stress, cognitive-function, immune-support); associations retained and now part-mapped and
  cited. Further enriched 2026-06-14 with a PubMed-sourced comprehensive review of E. senticosus phytochemistry
  and pharmacology (REF-0587) supporting the adaptogenic and immunomodulatory actions and adding preclinical
  neuroprotective/antidiabetic activity (needs-review).
last_updated: '2026-06-14'
status: verified
