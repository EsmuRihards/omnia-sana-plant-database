drug_class_interactions:
- drug_class: cardiac-glycosides
  severity: caution
  mechanism: A case report described raised serum digoxin levels in a patient taking Siberian ginseng
    that fell back to normal on stopping it; laboratory work shows eleuthero contains digoxin-like substances
    that can interfere with digoxin blood tests. Whether a true change in digoxin levels or assay interference,
    use with digoxin warrants medical monitoring.
  reference_ids:
