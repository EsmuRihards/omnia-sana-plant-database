botanical_description:
  text: Deciduous shrub with numerous slender, spiny stems (unlike true Panax ginseng, hence 'eleuthero'
    rather than 'ginseng'). The leaves are palmately compound with five toothed leaflets on a long stalk.
    Small, pale purple or white flowers are borne in rounded umbels, followed by clusters of small black
    berries.
  height: 2-3 m
  habit: Deciduous, spiny shrub
  leaves: Palmately compound, five toothed leaflets on a long stalk
  flowers: Small, pale purple or white, in rounded umbels
  stem: Numerous slender, spiny stems
  root: Woody, aromatic root and rhizome
  fruit: Small black berry in clusters
  flowering_period: Summer
  reference_ids:
  - REF-0509
  status: verified
habitat:
  text: Native to the mixed and coniferous forest understorey of the Russian Far East, north-eastern China,
    Korea and Japan, growing in shaded, cool, moist woodland.
  reference_ids:
  - REF-0509
  status: verified
harvesting:
  text: The root and rhizome are dug in autumn from plants at least three to four years old, when their
    eleutheroside content is highest, then cleaned and dried.
  parts:
  - Root and rhizome
  season: Autumn, from mature (3-4+ year) plants
  status: draft
traditional_uses:
  text: Siberian ginseng root has a long Russian and Chinese traditional-medicine reputation as an adaptogenic
    tonic to improve resistance to physical, mental and environmental stress, support endurance and recovery,
    and bolster immune resilience during cold and flu season, closely paralleling (though botanically
    distinct from) true Panax ginseng.
  reference_ids:
  - REF-0509
  status: verified
preparations:
- name: Standardised extract
  text: Root extract standardised to eleutheroside B and E content, taken as capsules or tablets for adaptogenic
    and immune support.
  reference_ids:
  - REF-0509
  status: verified
- name: Decoction
  text: Comminuted dried root and rhizome as a herbal tea, 0.5-4 g in 150 ml boiling water as the daily
    dose, divided into one to three doses per the EU herbal monograph. Note the monograph describes an
    infusion in boiling water rather than a simmered decoction. Educational reference only, not a prescription.
  status: verified
  reference_ids:
  - REF-3089
- name: Tincture
  text: Alcoholic extract of the dried root and rhizome.
  status: draft
dosage:
- name: Standardised extract
  text: The EU herbal monograph on Eleutherococcus senticosus radix gives DAILY doses for adolescents,
    adults and elderly - herbal tea 0.5-4 g of the comminuted root in 150 mL of boiling water, divided
    into one to three doses; powdered herbal substance 0.75-3 g; liquid extract (DER 1:1, ethanol 30-40%)
    2-3 mL; and dry extracts at doses corresponding to those quantities of dried root. Often taken as
    a course of several weeks rather than continuously, and best avoided late in the day given a possible
    mild stimulant effect. Educational reference only, not a prescription.
  reference_ids:
  - REF-3089
  status: verified
