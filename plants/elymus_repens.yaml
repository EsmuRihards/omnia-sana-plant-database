id: elymus-repens
scientific_name: Elymus repens
common_names:
- Couch Grass
- Twitch grass
- Quack grass
- Dog grass
family: Poaceae
parts_used:
- Rhizome
constituents:
- name: Polysaccharides (the fructan triticin) and mucilage
  compounds:
  - polysaccharide
  - mucilage
  note: Soothing, demulcent carbohydrates of the rhizome.
  reference_ids:
  - REF-0437
  - REF-0438
  - REF-2564
- name: Flavonoids and phenolic acids (caffeoyl/feruloyl quinic esters)
  compounds:
  - phenolic-acid
  - flavonoid
  note: Antioxidant constituents.
  reference_ids:
  - REF-0437
- name: Small amount of volatile oil (agropyrene)
  compounds:
  - essential-oil
  note: Minor aromatic constituent.
  reference_ids:
  - REF-0438
botanical_description:
  text: Persistent, mat-forming perennial grass spreading rapidly by long, tough, jointed, creeping white
    rhizomes just below the soil surface. The leaves are flat, narrow and grass-like, greyish-green, rough
    on the upper surface. Slender flowering spikes bear flattened spikelets typical of a wild grass.
  height: 40-100 cm (flowering stems)
  habit: Persistent, mat-forming, rhizomatous perennial grass
  leaves: Flat, narrow, grass-like, greyish-green, rough on the upper surface
  flowers: Slender spike of flattened spikelets, typical of a wild grass
  stem: Erect flowering culms arising from creeping rhizomes
  root: Long, tough, jointed, creeping white rhizome (the medicinal part), plus fibrous roots
  fruit: Small grass caryopsis (grain)
  flowering_period: June-August
  reference_ids:
  - REF-0437
  status: verified
habitat:
  text: A common and persistent weed of cultivated ground, gardens, roadsides and waste places worldwide;
    native to Europe and temperate Asia and widely naturalised elsewhere.
  reference_ids:
  - REF-0437
  status: verified
harvesting:
  text: The rhizome is dug up, most easily in spring or autumn, then washed free of soil, cut into pieces
    and dried; because the plant spreads aggressively, harvesting is also a practical means of garden
    control.
  parts:
  - Rhizome
  season: Spring or autumn
  reference_ids:
  - REF-0437
  status: verified
traditional_uses:
  text: Couch grass rhizome has a long European folk and official (EU herbal monograph) use as a soothing
    diuretic 'irrigation' remedy for minor urinary tract complaints, taken with plenty of fluids to increase
    urine flow and help flush the urinary tract.
  reference_ids:
  - REF-0437
  status: verified
preparations:
- name: Decoction
  text: Dried, chopped rhizome simmered in water as a traditional diuretic 'irrigation' preparation, taken
    with plenty of additional fluids.
  reference_ids:
  - REF-0437
  status: verified
- name: Infusion
  text: Dried rhizome infused in hot water as a milder alternative to a decoction.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried rhizome.
  status: draft
dosage:
- name: Decoction
  text: The EU herbal monograph describes traditional use of about 6-9 g dried rhizome daily as a decoction,
    taken with plenty of fluids; not to be used if oedema is due to impaired heart or kidney function.
    Educational reference only, not a prescription.
  reference_ids:
  - REF-0437
  status: draft
actions:
- action: demulcent
  note: Soothing demulcent (mucilage) for urinary-tract irritation
  reference_ids:
  - REF-0438
  - REF-2565
  status: verified
- action: diuretic
  note: Diuretic irrigation of the urinary tract - adjuvant in minor urinary complaints (taken with plenty
    of fluids)
  reference_ids:
  - REF-0437
  - REF-0438
  - REF-2563
  status: verified
indications:
- condition: cough
  note: inferred from demulcent action
  reference_ids:
  - REF-0438
  status: needs-review
- condition: kidney-support
  reference_ids: []
  status: needs-review
- condition: skin-irritation
  note: inferred from demulcent action
  reference_ids:
  - REF-0438
  status: needs-review
- condition: sore-throat
  note: inferred from demulcent action
  reference_ids:
  - REF-0438
  status: needs-review
- condition: swelling
  note: Supports mild fluid retention / swelling
  reference_ids:
  - REF-0437
  status: needs-review
- condition: urinary-support
  note: inferred from diuretic action
  reference_ids:
  - REF-0437
  - REF-0438
  status: needs-review
- condition: uti
  note: Diuretic irrigation of the urinary tract - adjuvant in minor urinary complaints (taken with plenty
    of fluids)
  reference_ids:
  - REF-0437
  - REF-0438
  - REF-2563
  status: verified
contraindications:
- note: Drink plenty of fluids during use. Irrigation therapy must NOT be used if there is oedema (swelling)
    due to impaired heart or kidney function.
  severity: caution
  reference_ids:
  - REF-0437
  status: verified
- note: Traditional use only; if urinary symptoms persist or are accompanied by fever, spasms or blood
    in the urine, seek medical care. Use in pregnancy and breastfeeding is not recommended.
  severity: caution
  reference_ids:
  - REF-0437
  status: verified
