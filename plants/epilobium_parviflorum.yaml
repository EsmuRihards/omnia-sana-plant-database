id: epilobium-parviflorum
scientific_name: Epilobium parviflorum
common_names:
- Bay-leaf willowherb
- Small-flowered willowherb
- Hoary willowherb
family: Onagraceae
parts_used:
- Aerial parts (herb)
constituents:
- name: Macrocyclic ellagitannins (notably oenothein B)
  compounds:
  - tannin
  - phenolic-compound
  note: Characteristic Epilobium polyphenols underlying the anti-inflammatory and prostate activity; a
    genus review identifies oenothein B as the dominant constituent and likely driver of the antimicrobial,
    anti-inflammatory, anti-proliferative and antioxidant effects.
  reference_ids:
  - REF-0403
  - REF-0618
- name: Flavonoids (myricetin and quercetin glycosides)
  compounds:
  - flavonoid
  - glycoside
  - quercetin
  note: Antioxidant constituents.
  reference_ids:
  - REF-0403
- name: Plant sterols (beta-sitosterol)
  compounds:
  - phytosterol
  note: Sterols associated with benign prostatic hyperplasia support.
  reference_ids:
  - REF-0403
actions:
- action: anti-inflammatory
  note: Anti-inflammatory (inhibits COX-1 and COX-2 prostaglandin synthesis)
  reference_ids:
  - REF-0403
  status: verified
- action: antimicrobial
  note: Antibacterial, including against Escherichia coli (urinary support)
  reference_ids:
  - REF-0403
  status: verified
- action: antioxidant
  note: Antioxidant (hydroxyl-radical scavenging)
  reference_ids:
  - REF-0403
  status: verified
indications:
- condition: arthritis
  evidence: 2
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0403
  status: needs-review
- condition: infection
  evidence: 2
  note: inferred from antimicrobial action
  reference_ids:
  - REF-0403
  status: needs-review
- condition: inflammation
  evidence: 2
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0403
  status: needs-review
- condition: prostate-support
  evidence: 2
  note: Supports lower urinary tract symptoms of benign prostatic hyperplasia (prostate support) - a genus
    Epilobium review notes traditional BPH use attributed mainly to oenothein B, though clinical evidence
    is not yet conclusive
  reference_ids:
  - REF-0403
  - REF-0404
  - REF-0618
  status: verified
- condition: skin-irritation
  evidence: 2
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0403
  status: needs-review
- condition: urinary-support
  evidence: 3
  note: Antibacterial, including against Escherichia coli (urinary support); Supports lower urinary tract
    symptoms of benign prostatic hyperplasia (prostate support) - a genus Epilobium review notes traditional
    BPH use attributed mainly to oenothein B, though clinical evidence is not yet conclusive
  reference_ids:
  - REF-0403
  - REF-0404
  - REF-0618
  status: verified
- condition: uti
  evidence: 2
  note: Supports lower urinary tract symptoms of benign prostatic hyperplasia (prostate support) - a genus
    Epilobium review notes traditional BPH use attributed mainly to oenothein B, though clinical evidence
    is not yet conclusive
  reference_ids:
  - REF-0403
  - REF-0404
  - REF-0618
  status: verified
- condition: wounds
  evidence: 2
  note: inferred from antimicrobial action
  reference_ids:
  - REF-0403
  status: needs-review
contraindications:
- note: Lower urinary tract / prostate symptoms must be medically assessed first to exclude prostate cancer;
    willowherb is a supportive measure, not a substitute for diagnosis and treatment.
  severity: info
  reference_ids:
  - REF-0404
  status: verified
- note: Well tolerated over three months in clinical use; longer-term safety data are limited.
