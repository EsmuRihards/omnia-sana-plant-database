id: epilobium-parviflorum
scientific_name: Epilobium parviflorum
common_names:
- Bay-leaf willowherb
- Small-flowered willowherb
- Hoary willowherb
family: Onagraceae
external_ids:
  gbif: 3189157
  wikidata: Q159094
parts_used:
- Aerial parts (herb)
constituents:
- name: Macrocyclic ellagitannins (notably oenothein B)
  compounds:
  - tannin
  - phenolic-compound
  note: Characteristic Epilobium polyphenols underlying the anti-inflammatory and prostate activity; a
    genus review identifies oenothein B as the dominant constituent and likely driver of the antimicrobial,
    anti-inflammatory, anti-proliferative and antioxidant effects.
  reference_ids:
  - REF-0403
  - REF-0618
  - REF-2297
  - REF-2298
  - REF-2299
  - REF-2300
- name: Flavonoids (myricetin and quercetin glycosides)
  compounds:
  - flavonoid
  - glycoside
  - quercetin
  note: Antioxidant constituents.
  reference_ids:
  - REF-0403
  - REF-2303
- name: Plant sterols (beta-sitosterol)
  compounds:
  - phytosterol
  note: Sterols associated with benign prostatic hyperplasia support.
  reference_ids:
  - REF-0403
botanical_description:
  text: Slender, softly hairy perennial herb with narrow, lance-shaped leaves and small, four-petalled,
    pale pink to lilac flowers with a notched tip, borne singly in the upper leaf axils. After flowering,
    long, narrow seed pods split to release cottony-tufted seeds, typical of the willowherb genus.
  height: 20-60 cm
  habit: Slender, softly hairy, erect perennial herb
  leaves: Narrow, lance-shaped, softly hairy
  flowers: Small, four-petalled, pale pink to lilac, notched, borne singly in upper leaf axils
  stem: Slender, softly hairy, erect
  root: Fibrous root with short rhizome
  fruit: Long, narrow seed pod releasing cottony-tufted seeds
  flowering_period: June-September
  reference_ids:
  - REF-0403
  status: verified
habitat:
  text: Grows in damp meadows, ditches, streamsides and waste ground on moist soils; native to Europe
    and temperate Asia.
  reference_ids:
  - REF-0403
  status: verified
harvesting:
  text: The flowering aerial parts are cut in summer while in flower, and dried in a warm, shaded, airy
    place.
  parts:
  - Aerial parts (herb)
  season: Summer flowering period
  reference_ids:
  - REF-0403
  status: verified
traditional_uses:
  text: Small-flowered willowherb, along with related Epilobium species, has a Central European folk tradition
    as a supportive remedy for lower urinary tract symptoms associated with benign prostatic hyperplasia
    (BPH) and prostatitis, and as an antimicrobial and anti-inflammatory herb for minor infections; the
    traditional prostate-support use is attributed mainly to its oenothein B content, though robust clinical
    evidence remains limited.
  reference_ids:
  - REF-0403
  status: verified
preparations:
- name: Infusion
  text: Dried flowering herb infused in hot water as a traditional urinary and prostate-support tea.
  reference_ids:
  - REF-0403
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried herb.
  status: draft
dosage:
- name: Infusion
  text: Traditional herbal references suggest around 1-2 g of dried herb per cup, up to three times daily;
    lower urinary tract or prostate symptoms should always be medically assessed first. Educational reference
    only, not a prescription.
  status: draft
