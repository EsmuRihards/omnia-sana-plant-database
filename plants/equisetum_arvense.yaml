botanical_description:
  text: Perennial, spore-bearing (non-flowering) plant with two distinct stem types arising from a deep,
    black, jointed rhizome. In early spring, unbranched, pale brownish fertile stems appear first, each
    topped with a spore-bearing cone, and die back once spores are shed; these are followed by the familiar
    green, hollow, jointed, ridged sterile stems bearing whorls of thin, needle-like branches at each
    node, giving a bottlebrush appearance.
  height: 20-80 cm (sterile stems)
  habit: Perennial, spore-bearing (non-flowering) herb with separate fertile and sterile stems
  leaves: Reduced to small, fused, toothed sheaths at each stem node (true leaves absent)
  flowers: None; reproduces by spores borne in a cone atop the unbranched fertile spring stems
  stem: Hollow, jointed, ridged green sterile stems with whorled branches; separate pale unbranched fertile
    stems in spring
  root: Deep, black, jointed, far-spreading rhizome
  fruit: Spores released from the fertile cone, not a true fruit
  flowering_period: Not applicable (spore-bearing); fertile stems appear in early spring
  status: draft
habitat:
  text: Grows in damp grassland, waste ground, riverbanks, roadsides and disturbed soil on a wide range
    of soils; native and common across the temperate Northern Hemisphere (Europe, Asia, North America).
  status: draft
harvesting:
  text: The green sterile stems are cut in summer, at their most vigorous, and dried quickly in a warm,
    shaded, airy place; careful identification against the more toxic marsh horsetail (Equisetum palustre),
    which grows in similar damp ground, is essential before wild-harvesting.
  parts:
  - Stem
  - Whole Plant
  season: Summer, when sterile stems are fully grown
  status: draft
traditional_uses:
  text: Field horsetail has a long European folk history as a diuretic remedy for urinary gravel and mild
    fluid retention, as an astringent, anti-inflammatory and vulnerary herb for wounds and connective-tissue
    support, and, owing to its very high silica content, as a traditional tonic for hair, nails and skin.
  reference_ids:
  - REF-0041
  status: verified
preparations:
- name: Decoction/infusion
  text: Dried sterile stem simmered or infused in hot water as a traditional diuretic and connective-tissue-support
    tea.
  reference_ids:
  - REF-0041
  status: verified
- name: Poultice/wash
  text: Crushed or infused herb used topically as a wash or poultice for wounds and skin irritation.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried sterile stem.
  status: draft
dosage:
- name: Decoction/infusion
  text: The EU herbal monograph gives a single dose of 1-4 g of the comminuted herb in 150 mL of boiling
    water as an infusion or decoction (5-15 minutes), 3-4 times daily, for a daily dose of 3-12 g, in
    adolescents, adults and elderly; traditionally used over a period of 2 to 4 weeks. For cutaneous use,
    10 g in 1 L of water as a decoction for impregnated dressings and irrigation. Not recommended under
    12 years. Educational reference only, not a prescription.
  reference_ids:
  - REF-0083
  status: verified
