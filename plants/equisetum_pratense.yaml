id: equisetum-pratense
scientific_name: Equisetum pratense
common_names:
- Shady horsetail
- meadow horsetail
family: Equisetaceae
parts_used:
- Aerial parts
- Stem
constituents:
- name: Phenolic acids and flavonoids (polyphenolic derivatives)
  reference_ids:
  - REF-2360
botanical_description:
  text: Perennial, spore-bearing plant closely related to field horsetail, with a similar deep black rhizome.
    It is distinguished by its more delicate, softly drooping, finely branched sterile stems, which give
    the plant a lacier, more feathery appearance than the coarser field horsetail, and by its preference
    for shaded, woodland-edge habitats.
  height: 20-50 cm
  habit: Perennial, spore-bearing herb with delicate, drooping, finely branched sterile stems
  leaves: Reduced to small, fused, toothed sheaths at each stem node
  flowers: None; reproduces by spores borne in a cone on separate fertile stems in spring
  stem: Slender, hollow, jointed, with fine, softly drooping whorled branches
  root: Deep, black, jointed rhizome
  fruit: Spores released from the fertile cone, not a true fruit
  flowering_period: Not applicable (spore-bearing); fertile stems appear in spring
  status: draft
habitat:
  text: Grows in shaded woodland edges, damp meadows and streamside thickets, generally in cooler and
    more shaded sites than field horsetail; found across Europe, Asia and North America.
  status: draft
harvesting:
  text: The aerial (sterile) stems are cut in summer and dried; because this species is easily confused
    with other horsetails, including the more toxic marsh horsetail, careful identification is essential
    before wild-harvesting.
  parts:
  - Aerial parts
  - Stem
  season: Summer
  status: draft
traditional_uses:
  text: Meadow (shady) horsetail shares the broader horsetail genus's traditional folk reputation as a
    diuretic, astringent and wound-healing herb, though it has been studied far less than field horsetail
    and has no dedicated clinical evidence base of its own.
  status: draft
preparations:
- name: Infusion
  text: Dried aerial stem infused in hot water, following the same traditional preparation as other horsetails.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried aerial stem.
  status: draft
dosage:
- name: Infusion
  text: No species-specific dosing data exist; if used, follow the same conservative short-term dosing
    as field horsetail (around 2-4 g dried herb per cup) with professional guidance. Educational reference
    only, not a prescription.
  status: draft
actions:
- action: antioxidant
  note: Ethanolic extracts of the sterile stems of Equisetum pratense show free-radical-scavenging activity
    attributed to their polyphenolic and flavonoid content.
  reference_ids:
  - REF-2360
  - REF-2361
  status: verified
- action: neuroprotective
  note: In zebrafish models, Equisetum extracts (including E. pratense) showed neuroprotective and anxiolytic/antidepressant-like
    effects.
  reference_ids:
  - REF-2360
  status: draft
indications:
- condition: cardiovascular-support
  note: An early animal pharmacology study reported that an Equisetum pratense extract improved tolerance
    to myocardial hypoxia.
  reference_ids:
  - REF-2362
  status: draft
contraindications:
- note: Shady horsetail (Equisetum pratense) shares the horsetail genus's traditional use as a diuretic,
    astringent and wound-healing herb, but it has been studied far less than field horsetail (E. arvense)
    and almost no clinical data exist. As with other horsetails, prolonged use is cautioned because the
    genus contains the enzyme thiaminase, which can degrade vitamin B1; products are best sourced as thiaminase-inactivated
    preparations. Not evaluated for safety in pregnancy or lactation.
  severity: caution
  reference_ids: []
  status: needs-review
references:
- REF-2360
- REF-2361
- REF-2362
lookalikes_review:
  outcome: has-lookalikes
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-07'
dangerous_lookalikes:
- dangerous_plant: equisetum-palustre
  severity: dangerous
  confused_part: Sterile green stems gathered and dried for horsetail tea; toxic marsh horsetail looks
    very similar and grows in the same damp ground.
  confusion_context: Meadow horsetail (Equisetum pratense) is gathered for horsetail tea, but horsetails
    are notoriously hard to tell apart, and marsh horsetail (Equisetum palustre) - one of the most poisonous
    plants of wet grasslands - grows in the same damp habitat and looks very similar. Marsh horsetail
    contains the alkaloids palustrine and palustridiene plus high thiaminase (which destroys vitamin B1);
    it is a well-known livestock poison, and peer-reviewed work stresses that medicinal horsetail must
    be properly authenticated and differentiated from the more toxic marsh horsetail, which can adulterate
    herbal material. Because the species are so alike, unverified wild horsetail is a real hazard.
  distinguishing_features:
  - 'Branch teeth: marsh horsetail (the toxic one) has 5-6 teeth on each branch sheath that lie flat (appressed)
    against the branch. Broad, spreading teeth in threes or fours indicate a non-toxic horsetail rather
    than marsh horsetail.'
  - 'Branches solid vs hollow: marsh horsetail has hollow branches, whereas field horsetail''s branches
    are solid. A hollow first branch segment is a warning sign.'
  - 'First branch segment vs sheath: on marsh horsetail the lowest segment of each side branch is short
    - shorter than or about equal to the stem sheath it emerges from. A first branch segment clearly longer
    than the sheath indicates it is NOT marsh horsetail. Marsh horsetail also favours wet, marshy ground
    and fens.'
  key_test: 'Because horsetails are so alike and marsh horsetail is poisonous, only use wild horsetail
    if you can positively exclude marsh horsetail (Equisetum palustre): confirm branch sheaths have 3-4
    spreading teeth (not 5-6 flat-lying ones), solid (not hollow) branches, and a first branch segment
    longer than the stem sheath. If you cannot confirm all of these - or the plant grows in wet, marshy
    ground - do not use it.'
  reference_ids:
  - REF-2678
  - REF-2676
  - REF-2677
