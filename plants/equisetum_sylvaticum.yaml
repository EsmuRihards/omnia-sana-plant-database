id: equisetum-sylvaticum
scientific_name: Equisetum sylvaticum
common_names:
- Wood horsetail
- woodland horsetail
family: Equisetaceae
parts_used:
- Aerial parts
- Stem
constituents:
- name: Megastigmane and apocarotenoid glucosides (equiseoside A and B)
  reference_ids:
  - REF-2363
- name: Pectic polysaccharides
  reference_ids:
  - REF-2364
- name: Mixed-linkage (1->3,1->4)-beta-D-glucan
  reference_ids:
  - REF-2365
- name: Phenolic acids and flavonoids (polyphenolic derivatives)
  reference_ids:
  - REF-2360
actions:
- action: antioxidant
  note: Ethanolic extracts and isolated pectins of the sterile stems of Equisetum sylvaticum scavenge
    DPPH and hydroxyl radicals, an activity linked to their phenolic and polysaccharide constituents.
  reference_ids:
  - REF-2360
  - REF-2361
  - REF-2364
  status: verified
contraindications:
- note: Wood horsetail (Equisetum sylvaticum) shares the horsetail genus's traditional reputation as a
    diuretic, astringent and wound-healing herb, but the species itself is very little studied and no
    clinical data exist. As with other horsetails, prolonged use is cautioned because the genus contains
    the enzyme thiaminase, which can degrade vitamin B1; thiaminase-inactivated preparations are preferred.
    Not evaluated for safety in pregnancy or lactation.
  severity: caution
  reference_ids: []
  status: needs-review
