id: equisetum-sylvaticum
scientific_name: Equisetum sylvaticum
common_names:
- Wood horsetail
- woodland horsetail
family: Equisetaceae
parts_used:
- Aerial parts
- Stem
constituents:
- name: Megastigmane and apocarotenoid glucosides (equiseoside A and B)
  reference_ids:
  - REF-2363
- name: Pectic polysaccharides
  reference_ids:
  - REF-2364
- name: Mixed-linkage (1->3,1->4)-beta-D-glucan
  reference_ids:
  - REF-2365
- name: Phenolic acids and flavonoids (polyphenolic derivatives)
  reference_ids:
  - REF-2360
botanical_description:
  text: Perennial, spore-bearing plant distinguished within the horsetail genus by its finely and repeatedly
    branched sterile stems, in which each primary whorled branch itself bears further fine side-branches,
    giving the plant an especially soft, feathery, almost fern-like appearance. It shares the deep black
    jointed rhizome typical of the genus.
  height: 20-50 cm
  habit: Perennial, spore-bearing herb with finely, repeatedly branched, feathery sterile stems
  leaves: Reduced to small, fused, toothed sheaths at each stem node
  flowers: None; reproduces by spores borne in a cone on separate fertile stems in spring
  stem: Slender, hollow, jointed, with repeatedly branched, feathery whorled branches
  root: Deep, black, jointed rhizome
  fruit: Spores released from the fertile cone, not a true fruit
  flowering_period: Not applicable (spore-bearing); fertile stems appear in spring
  status: draft
habitat:
  text: Grows in damp woodland, woodland margins and shaded, boggy ground, typically in cooler northern
    and upland regions; found across Europe, Asia and North America.
  status: draft
harvesting:
  text: The aerial (sterile) stems are cut in summer and dried; because this species is easily confused
    with other horsetails, including the more toxic marsh horsetail, careful identification is essential
    before wild-harvesting.
  parts:
  - Aerial parts
  - Stem
  season: Summer
  status: draft
traditional_uses:
  text: Wood horsetail shares the broader horsetail genus's traditional folk reputation as a diuretic,
    astringent and wound-healing herb, though the species itself is very little studied and has no dedicated
    clinical evidence base of its own.
  status: draft
preparations:
- name: Infusion
  text: Dried aerial stem infused in hot water, following the same traditional preparation as other horsetails.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried aerial stem.
  status: draft
dosage:
- name: Infusion
  text: No species-specific dosing data exist; if used, follow the same conservative short-term dosing
    as field horsetail (around 2-4 g dried herb per cup) with professional guidance. Educational reference
    only, not a prescription.
  status: draft
actions:
- action: antioxidant
  note: Ethanolic extracts and isolated pectins of the sterile stems of Equisetum sylvaticum scavenge
    DPPH and hydroxyl radicals, an activity linked to their phenolic and polysaccharide constituents.
  reference_ids:
  - REF-2360
  - REF-2361
  - REF-2364
  status: verified
contraindications:
- note: Wood horsetail (Equisetum sylvaticum) shares the horsetail genus's traditional reputation as a
    diuretic, astringent and wound-healing herb, but the species itself is very little studied and no
    clinical data exist. As with other horsetails, prolonged use is cautioned because the genus contains
    the enzyme thiaminase, which can degrade vitamin B1; thiaminase-inactivated preparations are preferred.
    Not evaluated for safety in pregnancy or lactation.
  severity: caution
  reference_ids: []
  status: needs-review
