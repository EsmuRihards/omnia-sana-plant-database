id: eschscholzia-californica
scientific_name: Eschscholzia californica
common_names:
- California Poppy
- Golden poppy
- Cup of gold
family: Papaveraceae
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Isoquinoline alkaloids (protopine, allocryptopine, californidine, escholtzine, (S)-reticuline)
  compounds:
  - alkaloid
  note: (S)-reticuline modulates GABA-A receptor chloride currents, underlying the calming effect.
  reference_ids:
  - REF-0427
  - REF-0428
actions:
- action: analgesic
  note: Mild analgesic (traditional use for pain)
  reference_ids:
  - REF-0427
  status: needs-review
- action: anxiolytic
  note: Anxiolytic for anxiety and nervous tension - also supported by a double-blind RCT of a fixed California
    poppy + hawthorn (Crataegus) + magnesium combination in mild-to-moderate anxiety
  reference_ids:
  - REF-0427
  - REF-0606
  status: verified
- action: sedative
  note: Mild sedative / sleep support for insomnia (positive allosteric modulation of GABA-A receptors)
  reference_ids:
  - REF-0427
  status: verified
indications:
- condition: anxiety
  note: Anxiolytic for anxiety and nervous tension - also supported by a double-blind RCT of a fixed California
    poppy + hawthorn (Crataegus) + magnesium combination in mild-to-moderate anxiety
  reference_ids:
  - REF-0427
  - REF-0606
  status: verified
- condition: back-pain
  note: inferred from analgesic action
  reference_ids:
  - REF-0427
  status: needs-review
- condition: headache
  note: inferred from analgesic action
  reference_ids:
  - REF-0427
  status: needs-review
- condition: insomnia
  note: Mild sedative / sleep support for insomnia (positive allosteric modulation of GABA-A receptors)
  reference_ids:
  - REF-0427
  status: verified
- condition: nervous-tension
  note: Anxiolytic for anxiety and nervous tension - also supported by a double-blind RCT of a fixed California
    poppy + hawthorn (Crataegus) + magnesium combination in mild-to-moderate anxiety
  reference_ids:
  - REF-0427
  - REF-0606
  status: verified
- condition: pain
  note: Mild analgesic (traditional use for pain)
  reference_ids:
  - REF-0427
  status: needs-review
- condition: stress
  note: inferred from anxiolytic action
  reference_ids:
  - REF-0427
  - REF-0606
  status: needs-review
contraindications:
- note: 'Has sedative activity: it can add to the effects of alcohol, sedatives and sleep medicines, so
    avoid combining and do not use before driving.'
  severity: caution
  reference_ids:
  - REF-0427
  status: verified
- note: Alcoholic (ethanol) extracts inhibit or induce several cytochrome P450 enzymes (CYP3A4, 2C9, 2C19,
    2D6) and activate the pregnane X receptor, so there is a risk of herb-drug interactions; the water-based
    tea appears safer in this respect. Avoid in pregnancy and breastfeeding.
  severity: caution
  reference_ids:
  - REF-0428
  status: verified
