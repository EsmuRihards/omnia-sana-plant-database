id: eschscholzia-californica
scientific_name: Eschscholzia californica
common_names:
- California Poppy
- Golden poppy
- Cup of gold
family: Papaveraceae
external_ids:
  gbif: 2888380
  wikidata: Q158795
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Isoquinoline alkaloids (protopine, allocryptopine, californidine, escholtzine, (S)-reticuline)
  compounds:
  - alkaloid
  note: (S)-reticuline modulates GABA-A receptor chloride currents, underlying the calming effect.
  reference_ids:
  - REF-0427
  - REF-0428
  - REF-2305
  - REF-0808
  - REF-2306
  - REF-2307
  - REF-2316
botanical_description:
  text: Herbaceous perennial (often grown as an annual) with delicate, finely divided, blue-green feathery
    foliage. Solitary, cup-shaped, four-petalled flowers in vivid orange to yellow arise on long stalks,
    opening in full sun and closing at night or in dull weather, followed by a long, slender, ridged seed
    capsule that splits explosively when ripe.
  height: 20-60 cm
  habit: Herbaceous perennial, often grown as an annual
  leaves: Finely divided, blue-green, feathery
  flowers: Solitary, cup-shaped, four-petalled, vivid orange to yellow, opening in sun and closing at
    night
  stem: Slender, branching, blue-green
  root: Deep taproot
  fruit: Long, slender, ridged seed capsule, dehiscing explosively when ripe
  flowering_period: Spring to autumn
  reference_ids:
  - REF-0427
  status: verified
habitat:
  text: Native to open grassland, coastal scrub and disturbed ground of California and neighbouring states;
    widely cultivated and naturalised elsewhere as a garden ornamental.
  reference_ids:
  - REF-0427
  status: verified
harvesting:
  text: The flowering aerial parts are cut in summer while in flower, and dried in a warm, shaded, airy
    place.
  parts:
  - Aerial parts (flowering herb)
  season: Summer, at flowering
  reference_ids:
  - REF-0427
  status: verified
traditional_uses:
  text: California poppy has a Native American traditional reputation as a mild calming and pain-relieving
    remedy, used for insomnia, nervous tension and mild pain; unlike the related opium poppy it is non-addictive
    and its calming effects are now attributed to GABA-A receptor modulation, supporting its traditional
    anxiolytic and sedative use.
  reference_ids:
  - REF-0427
  status: verified
preparations:
- name: Infusion
  text: Dried flowering herb infused in hot water as a traditional calming, sleep-supporting tea.
  reference_ids:
  - REF-0427
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried flowering herb; note that alcoholic extracts (unlike the water-based
    tea) can affect drug-metabolising liver enzymes.
  reference_ids:
  - REF-0428
  status: draft
- name: Standardised extract
  text: Concentrated extract, sometimes combined with hawthorn and magnesium, studied in a clinical trial
    for mild-to-moderate anxiety.
  reference_ids:
  - REF-0606
  status: verified
dosage:
- name: Infusion
  text: Traditional herbal references suggest around 2-4 g of dried herb per cup, taken in the evening
    for sleep support or through the day for calming effect. Educational reference only, not a prescription.
  status: draft
actions:
- action: analgesic
  note: Mild analgesic (traditional use for pain)
  reference_ids:
  - REF-0427
  - REF-0807
  status: needs-review
- action: anxiolytic
  note: Anxiolytic for anxiety and nervous tension - also supported by a double-blind RCT of a fixed California
    poppy + hawthorn (Crataegus) + magnesium combination in mild-to-moderate anxiety
  reference_ids:
  - REF-0427
  - REF-0606
  - REF-0807
  - REF-0806
  - REF-2305
  status: verified
- action: sedative
