id: eschscholzia-californica
scientific_name: Eschscholzia californica
common_names:
- California Poppy
- Golden poppy
- Cup of gold
family: Papaveraceae
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Isoquinoline alkaloids (protopine, allocryptopine, californidine, escholtzine, (S)-reticuline)
  compounds:
  - alkaloid
  note: (S)-reticuline modulates GABA-A receptor chloride currents, underlying the calming effect.
  reference_ids:
