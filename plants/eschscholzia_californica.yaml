contraindications:
- note: 'Has sedative activity: it can add to the effects of alcohol, sedatives and sleep medicines, so
    avoid combining and do not use before driving.'
  severity: caution
  reference_ids:
  - REF-0427
  status: verified
- note: Alcoholic (ethanol) extracts inhibit or induce several cytochrome P450 enzymes (CYP3A4, 2C9, 2C19,
    2D6) and activate the pregnane X receptor, so there is a risk of herb-drug interactions; the water-based
    tea appears safer in this respect. Avoid in pregnancy and breastfeeding.
  severity: caution
  reference_ids:
  - REF-0428
  status: verified
