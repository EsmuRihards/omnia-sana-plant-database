  - REF-0807
  status: needs-review
- action: anxiolytic
  note: Anxiolytic for anxiety and nervous tension - also supported by a double-blind RCT of a fixed California
    poppy + hawthorn (Crataegus) + magnesium combination in mild-to-moderate anxiety
  reference_ids:
  - REF-0427
  - REF-0606
  - REF-0807
  - REF-0806
  - REF-2305
  status: verified
