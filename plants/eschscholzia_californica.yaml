common_names:
- California Poppy
- Golden poppy
- Cup of gold
scientific_name: Eschscholzia californica
family: Papaveraceae
parts_used:
- name: Aerial parts (flowering herb)
  medicinal_actions:
  - action: Mild sedative / sleep support for insomnia (positive allosteric modulation of GABA-A receptors)
    reference_ids:
    - REF-0427
    status: verified
  - action: Anxiolytic for anxiety and nervous tension - also supported by a double-blind RCT of a fixed
      California poppy + hawthorn (Crataegus) + magnesium combination in mild-to-moderate anxiety
    reference_ids:
    - REF-0427
    - REF-0606
    status: verified
  - action: Mild analgesic (traditional use for pain)
    reference_ids:
    - REF-0427
    status: needs-review
constituents:
- name: Isoquinoline alkaloids (protopine, allocryptopine, californidine, escholtzine, (S)-reticuline)
  note: (S)-reticuline modulates GABA-A receptor chloride currents, underlying the calming effect.
  reference_ids:
  - REF-0427
  - REF-0428
contraindications:
- note: 'Has sedative activity: it can add to the effects of alcohol, sedatives and sleep medicines, so
    avoid combining and do not use before driving.'
  reference_ids:
  - REF-0427
  status: verified
- note: Alcoholic (ethanol) extracts inhibit or induce several cytochrome P450 enzymes (CYP3A4, 2C9, 2C19,
    2D6) and activate the pregnane X receptor, so there is a risk of herb-drug interactions; the water-based
    tea appears safer in this respect. Avoid in pregnancy and breastfeeding.
  reference_ids:
  - REF-0428
  status: verified
internal_notes: Enriched 2026-06-12 from scientific literature (GABA-A receptor pharmacology study; CYP/P-gp/PXR
  herb-drug-interaction study). Originally a skeleton imported from the omniasana.bio Symptom-to-Plant
  Lookup tool (insomnia, anxiety, nervous-tension, pain); associations retained and now part-mapped and
  cited. Further enriched 2026-06-14 with a PubMed-sourced double-blind, placebo-controlled RCT (n=264)
  of a fixed Eschscholzia + Crataegus + magnesium combination that improved mild-to-moderate anxiety (REF-0606;
  a combination product, not California poppy alone).
last_updated: '2026-06-14'
status: verified
