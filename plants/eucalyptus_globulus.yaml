contraindications:
- note: Eucalyptus globulus essential oil is highly concentrated and rich in the monoterpene 1,8-cineole;
    it should never be applied undiluted to the skin or ingested outside of standardized pharmaceutical
    preparations. Improper use can cause irritation, nausea, dizziness, or neurological symptoms, and
    inhalation at high concentrations may provoke respiratory distress, particularly in infants, young
    children, or individuals with asthma or other airway sensitivities. For this reason, essential oil
    use is generally discouraged in children and during pregnancy unless under professional guidance.
    Preparations such as leaf-infused oils or external applications using whole plant material are considerably
    milder, but they should still be used with care and an understanding that different preparation methods
    carry different levels of risk.
  reference_ids:
  - REF-0224
  - REF-0256
  - REF-0309
  status: verified
- note: Duke (2002) provides clinical evidence (score 2) for eucalyptus as an expectorant and topical
    hyperemic (rubefacient), consistent with Commission E approval. Clinical evidence also supports its
    use in asthma, bronchitis, and catarrh. The essential oil (primarily 1,8-cineole) is the active constituent.
    Therapeutic use as steam inhalation is well-established. Internal use of the essential oil at high
    doses is contraindicated due to toxicity; even small amounts (3.5 ml) can be fatal in children. Contraindicated
    for inflammatory diseases of the gastrointestinal tract or bile ducts (Duke, 2002).
  reference_ids:
  - REF-0224
  - REF-0256
  - REF-0309
  status: verified
