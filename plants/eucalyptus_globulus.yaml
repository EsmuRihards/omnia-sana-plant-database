id: eucalyptus-globulus
scientific_name: Eucalyptus globulus
common_names:
- Blue gum eucalyptus
- Tasmanian blue gum
- southern blue gum
- blue gum
family: Myrtaceae
external_ids:
  gbif: 3176787
  wikidata: Q159528
parts_used:
- Leaf
botanical_description:
  text: 'Large, fast-growing evergreen tree with distinctive two-stage leaves: rounded, silvery-blue juvenile
    leaves borne in opposite pairs, giving way to narrow, sickle-shaped, aromatic, dark green mature leaves
    as the tree ages. Small, cream-white, fluffy flowers with numerous stamens are borne singly or in
    small clusters, followed by a woody, cup-shaped seed capsule (''gum nut'').'
  height: Up to 30-55 m
  habit: Large, fast-growing evergreen tree
  leaves: Juvenile leaves rounded, silvery-blue, opposite; mature leaves narrow, sickle-shaped, aromatic,
    dark green
  flowers: Small, cream-white, fluffy, with numerous stamens
  stem: Tall trunk with smooth, peeling, often bluish-grey bark
  root: Deep, extensive root system
  fruit: Woody, cup-shaped seed capsule ('gum nut')
  flowering_period: Varies with climate
  reference_ids:
  - REF-0224
  status: verified
habitat:
  text: Native to south-eastern Australia and Tasmania; widely planted worldwide in warm-temperate and
    Mediterranean climates for timber, essential oil production and as an ornamental/windbreak tree.
  status: draft
harvesting:
  text: Mature leaves are picked or pruned year-round and used fresh, dried, or steam-distilled for essential
    oil, which is the main commercial and medicinal form.
  parts:
  - Leaf
  status: draft
traditional_uses:
  text: Eucalyptus leaf has a long Australian Aboriginal and, after global spread, worldwide tradition
    as a respiratory remedy - inhaled as steam or applied as chest rubs for colds, coughs, bronchitis
    and catarrh - and as a topical antiseptic and rubefacient for minor wounds and muscular aches.
  reference_ids:
  - REF-0224
  status: verified
preparations:
- name: Steam inhalation
  text: A few drops of essential oil, or fresh/dried leaf, added to hot water and the vapour inhaled for
    respiratory congestion; the classic and best-established use.
  reference_ids:
  - REF-0224
  status: verified
- name: Topical chest rub/ointment
  text: Diluted essential oil in a carrier oil or standardised ointment applied to the chest and back
    for coughs and colds.
  reference_ids:
  - REF-0224
  status: verified
- name: Infusion (leaf)
  text: Comminuted dried leaf infused in 150 ml boiling water, 1.5-3 g up to four times daily (daily dose
    4.5-12 g) for oral use per the EU herbal monograph. Educational reference only, not a prescription.
  status: verified
  reference_ids:
  - REF-3083
dosage:
- name: Steam inhalation
  text: The EU herbal monograph on eucalyptus LEAF gives, for inhalation, 3 g of the comminuted leaf in
    boiling water up to 3 times daily (daily dose 3-9 g), and for oral use 1.5-3 g in 150 mL as an infusion
    up to 4 times daily (daily dose 4.5-12 g), in adolescents, adults and elderly. Use is CONTRAINDICATED
    in children under 30 months, and not recommended under 12 years. The essential oil is a separate herbal
    substance with its own monograph and its own posology - it is never taken internally or applied undiluted
    to skin on the strength of these leaf figures. Educational reference only, not a prescription.
  reference_ids:
  - REF-3083
  status: verified
constituents:
- name: Essential oil (1,8-cineole/eucalyptol)
  compounds:
  - essential-oil
  - cineole
  note: Leaf essential oil dominated by 1,8-cineole (eucalyptol, typically 70%+), the principal compound
    responsible for the plant's antimicrobial, anti-inflammatory and expectorant/decongestant activity.
  reference_ids:
  - REF-0224
- name: Flavonoids and tannins
  compounds:
