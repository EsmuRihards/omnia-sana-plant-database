  in infants and young children'' replaced with the monograph''s actual position - CONTRAINDICATED under
  30 months, not recommended under 12 years. Preparations sourced 2026-07-20 to monographs already on
  this record. Each supporting quote was checked to appear verbatim in the stored monograph posology,
  the reference confirmed present on the plant, and the dose form / plant part / route checked for mismatch;
