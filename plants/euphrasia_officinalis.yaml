id: euphrasia-officinalis
scientific_name: Euphrasia officinalis
common_names:
- Eyebright
- Euphrasy
- Red eyebright
family: Orobanchaceae
external_ids:
  gbif: 8106874
  powo: 'urn:lsid:ipni.org:names:802732-1'
  wikidata: Q17813184
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Iridoid glycosides (notably aucubin)
  compounds:
  - iridoid-glycoside
  - glycoside
  note: Give the plant its anti-inflammatory action on irritated tissue.
  reference_ids:
  - REF-0449
  - REF-0448
- name: Tannins
  compounds:
  - tannin
  note: Astringent constituents useful in watery, irritated eyes.
  reference_ids:
  - REF-0449
- name: Flavonoids (quercetin) and phenolic acids
  compounds:
  - phenolic-acid
  - flavonoid
  - quercetin
  note: Antioxidant constituents.
  reference_ids:
  - REF-0449
  - REF-0448
botanical_description:
  text: Small, semi-parasitic annual herb (drawing some nutrients from the roots of neighbouring grasses)
    with tiny, opposite, toothed leaves and delicate, two-lipped white to pale lilac flowers marked with
    purple veins and a yellow throat spot, giving a bright, eye-like appearance that inspired both its
    common and Latin names.
  height: 5-20 cm
  habit: Small, semi-parasitic annual herb
  leaves: Tiny, opposite, toothed
  flowers: Small, two-lipped, white to pale lilac, purple-veined with a yellow throat spot
  stem: Slender, often branched, hairy
  root: Slender root system that taps into neighbouring grass roots (hemiparasitic)
  fruit: Small, flattened, hairy capsule
  flowering_period: June-September
  reference_ids:
  - REF-0449
  status: verified
habitat:
  text: Grows in short, unimproved grassland, pastures, meadows and dunes on well-drained soils, always
    in association with grasses on which it partially parasitises; native to Europe.
  reference_ids:
  - REF-0449
  status: verified
harvesting:
  text: The flowering aerial parts are cut in summer while in flower and dried in a warm, shaded, airy
    place.
  parts:
  - Aerial parts (flowering herb)
  season: Summer, at flowering
  reference_ids:
  - REF-0449
  status: verified
traditional_uses:
  text: Eyebright has a centuries-old European folk reputation, reflected in its common name, as a soothing
    remedy for irritated, red or watery eyes and conjunctivitis, traditionally applied as a cooled compress
    or eyewash, and taken internally as an astringent for catarrh and mild digestive upset.
  reference_ids:
  - REF-0449
  - REF-0448
  status: verified
preparations:
- name: Cooled compress/eyewash
  text: Strained, cooled infusion applied as a compress over closed eyelids, or used (only when sterile,
    commercially prepared) as an eyewash for irritated or red eyes.
  reference_ids:
  - REF-0449
  status: verified
- name: Sterile eye drops
  text: Commercially prepared, sterile Euphrasia eye drops used for conjunctivitis; a prospective clinical
    cohort found improvement in most users.
  reference_ids:
  - REF-0613
  status: verified
- name: Infusion (internal)
  text: Dried flowering herb infused in hot water, taken internally as an astringent tea for catarrh.
  status: draft
dosage:
- name: Compress/eyewash
  text: A strained, cooled infusion applied as a compress several times daily; only sterile, commercially
    prepared products should ever be put directly into the eye. Educational reference only, not a prescription.
  status: draft
actions:
- action: anti-inflammatory
  note: Astringent and anti-inflammatory for eye irritation, redness and conjunctivitis (traditional,
    as an eye compress or bath) - an open prospective cohort of Euphrasia single-dose eye drops reported
    recovery or clear improvement in most patients with conjunctivitis
  reference_ids:
  - REF-0448
  - REF-0449
  - REF-2173
  - REF-2174
  - REF-2581
  status: verified
