contraindications:
- note: 'CRITICAL: do not put non-sterile, homemade eyebright preparations directly into the eye - this
    risks serious eye infection. Use only commercially prepared sterile products in the eye, or apply
    a strained, cooled infusion as a compress over closed eyelids.'
  severity: caution
  reference_ids:
  - REF-0449
  status: verified
- note: Traditional use only; persistent eye symptoms, pain, discharge or vision change need assessment
    by an eye-care professional. Safety in pregnancy and breastfeeding is not established.
  severity: caution
