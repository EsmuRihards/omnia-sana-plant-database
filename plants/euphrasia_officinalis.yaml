common_names:
- Eyebright
- Euphrasy
- Red eyebright
scientific_name: Euphrasia officinalis
family: Orobanchaceae
parts_used:
- name: Aerial parts (flowering herb)
  medicinal_actions:
  - action: Astringent and anti-inflammatory for eye irritation, redness and conjunctivitis (traditional,
      as an eye compress or bath)
    reference_ids:
    - REF-0449
    - REF-0448
    status: verified
  - action: Eases eye strain and watery, itchy eyes from allergy (hay fever / allergic conjunctivitis)
    reference_ids:
    - REF-0449
    status: needs-review
  - action: Soothes upper-respiratory catarrh and mild infection (traditional)
    reference_ids:
    - REF-0449
    status: needs-review
constituents:
- name: Iridoid glycosides (notably aucubin)
  note: Give the plant its anti-inflammatory action on irritated tissue.
  reference_ids:
  - REF-0449
  - REF-0448
- name: Tannins
  note: Astringent constituents useful in watery, irritated eyes.
  reference_ids:
  - REF-0449
- name: Flavonoids (quercetin) and phenolic acids
  note: Antioxidant constituents.
  reference_ids:
  - REF-0449
  - REF-0448
contraindications:
- note: 'CRITICAL: do not put non-sterile, homemade eyebright preparations directly into the eye - this
    risks serious eye infection. Use only commercially prepared sterile products in the eye, or apply
    a strained, cooled infusion as a compress over closed eyelids.'
  reference_ids:
  - REF-0449
  status: verified
- note: Traditional use only; persistent eye symptoms, pain, discharge or vision change need assessment
    by an eye-care professional. Safety in pregnancy and breastfeeding is not established.
  reference_ids:
  - REF-0449
  status: verified
internal_notes: Enriched 2026-06-12 from scientific and general literature (in-vitro corneal-cell study;
  Herbal Reality monograph). Euphrasia is now placed in Orobanchaceae (formerly Scrophulariaceae). Originally
  a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (eye-strain, allergy, infection);
  associations retained and now part-mapped and cited. NOTE sterility caution for eye use.
last_updated: '2026-06-12'
status: verified
