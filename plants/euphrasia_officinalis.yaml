id: euphrasia-officinalis
scientific_name: Euphrasia officinalis
common_names:
- Eyebright
- Euphrasy
- Red eyebright
family: Orobanchaceae
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Iridoid glycosides (notably aucubin)
  compounds:
  - iridoid-glycoside
  - glycoside
  note: Give the plant its anti-inflammatory action on irritated tissue.
  reference_ids:
  - REF-0449
  - REF-0448
- name: Tannins
  compounds:
  - tannin
  note: Astringent constituents useful in watery, irritated eyes.
  reference_ids:
  - REF-0449
- name: Flavonoids (quercetin) and phenolic acids
  compounds:
  - phenolic-acid
  - flavonoid
  - quercetin
  note: Antioxidant constituents.
  reference_ids:
  - REF-0449
  - REF-0448
actions:
- action: anti-inflammatory
  note: Astringent and anti-inflammatory for eye irritation, redness and conjunctivitis (traditional,
    as an eye compress or bath) - an open prospective cohort of Euphrasia single-dose eye drops reported
    recovery or clear improvement in most patients with conjunctivitis
  reference_ids:
  - REF-0448
  - REF-0449
  - REF-0613
  status: verified
- action: astringent
  note: Astringent and anti-inflammatory for eye irritation, redness and conjunctivitis (traditional,
    as an eye compress or bath) - an open prospective cohort of Euphrasia single-dose eye drops reported
