id: filipendula-ulmaria
scientific_name: Filipendula ulmaria
common_names:
- Meadowsweet
- queen of the meadow
- mead wort
family: Rosaceae
external_ids:
  gbif: 2987999
  wikidata: Q147176
parts_used:
- Flower
- Leaf
- Stem
botanical_description:
  text: Tall, moisture-loving perennial herb with pinnately compound leaves, dark green above and whitish-downy
    beneath, the leaflets sharply toothed. Dense, fluffy, creamy-white flower clusters with a strong,
    sweet, almond-like fragrance are borne atop reddish, grooved stems.
  height: 60-120 cm
  habit: Tall, erect, moisture-loving perennial herb
  leaves: Pinnately compound, dark green above, whitish-downy beneath, sharply toothed leaflets
  flowers: Dense, fluffy, creamy-white clusters with a strong sweet almond-like fragrance
  stem: Reddish, grooved, erect
  root: Fibrous roots from a short rhizome
  fruit: Small, spirally twisted achenes
  flowering_period: June-September
  reference_ids:
  - REF-0815
  status: verified
habitat:
  text: Grows in damp meadows, marshes, riverbanks, ditches and wet woodland margins; native to Europe
    and temperate Asia, favouring moist, nutrient-rich ground.
  reference_ids:
  - REF-0815
  status: verified
harvesting:
  text: The flowering tops, leaf and stem are cut in summer as the flowers open, when the characteristic
    salicylate content is highest, and dried in a warm, shaded, airy place.
  parts:
  - Flower
  - Leaf
  - Stem
  season: Summer, at flowering
  reference_ids:
  - REF-0815
  status: verified
traditional_uses:
  text: Meadowsweet is historically significant as the plant from which salicylic acid derivatives (the
    chemical basis of aspirin) were first isolated, and has long been used in European folk medicine as
    an anti-inflammatory, analgesic and gastroprotective remedy for feverish colds, rheumatic and joint
    pain, and digestive complaints such as acid reflux and indigestion - notably, its natural mucilage
    is thought to buffer the gastric irritation associated with isolated salicylates.
  reference_ids:
  - REF-0815
  - REF-2030
  status: verified
preparations:
- name: Infusion
  text: Dried flower, leaf and stem infused in hot water as a traditional anti-inflammatory and digestive
    tea.
  reference_ids:
  - REF-0815
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried aerial parts.
  status: draft
- name: Standardised extract
  text: Concentrated extract studied in vitro and in vivo for anti-inflammatory and gastroprotective activity.
  reference_ids:
  - REF-2030
  status: verified
dosage:
- name: Infusion
  text: The EU herbal monograph gives a single dose of 1.5-6 g of the comminuted herb as an infusion,
    for a daily dose of 2-18 g, in adults and elderly; a powdered herbal substance at 250-500 mg per dose
    (250-1500 mg daily) and a 1:5 tincture at 2-4 mL per dose (6-12 mL daily) are also listed. Contraindicated
    in hypersensitivity to salicylates. For rheumatic-type complaints, not to be used for more than 4
    weeks. Not recommended under 18 years. Educational reference only, not a prescription.
  reference_ids:
  - REF-3072
  status: verified
constituents:
- name: Salicylates (methyl salicylate, salicylic acid derivatives)
  note: Historically the source of aspirin's chemical inspiration; provide the plant's analgesic and anti-inflammatory
    activity, buffered by co-occurring mucilage and tannins.
  reference_ids:
  - REF-0815
  - REF-2030
- name: Flavonoids (quercetin, rutin, hyperoside)
  compounds:
  - flavonoid
  - quercetin
  - rutin
  note: Antioxidant constituents contributing to the plant's anti-inflammatory and gastroprotective effects.
  reference_ids:
  - REF-0815
- name: Tannins and essential oil
  compounds:
  - tannin
  - essential-oil
  note: Contribute to astringency and the characteristic sweet almond-like fragrance.
  reference_ids:
  - REF-0815
