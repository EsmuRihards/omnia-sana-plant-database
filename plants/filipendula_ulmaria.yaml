contraindications:
- note: Generally safe in normal culinary and medicinal doses. Avoid in salicylate sensitivity or aspirin
    allergy. Not recommended for children with viral illnesses (Reye's syndrome risk, as with other salicylate-containing
    plants). Avoid during pregnancy and breastfeeding.
  severity: caution
  reference_ids:
  - REF-0033
  - REF-0062
  - REF-0098
  status: verified
- note: Duke (2002) rates meadowsweet as ++ and notes analgesic, antiulcer, antirheumatic, astringent,
    and anti-aggregant activities at the experimental level (score 1). The plant is historically significant
    as a precursor to aspirin — salicylate compounds in meadowsweet were originally used to derive acetylsalicylic
    acid. Unlike aspirin, meadowsweet's salicylates are combined with protective mucilaginous compounds
    that may reduce gastric irritation. Duke notes that individuals with aspirin (salicylate) sensitivity
    should avoid meadowsweet; the plant also has anticoagulant properties that may interact with blood-thinning
    medications (Duke, 2002).
  severity: caution
  reference_ids:
  - REF-0033
  - REF-0062
  - REF-0098
  status: verified
