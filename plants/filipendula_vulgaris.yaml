internal_notes: 'Created 2026-07-10. 16 PubMed-verified @article refs REF-2725..REF-2740, each self-verified
  as genuine Filipendula vulgaris (note: Filipendula hexapetala Gilib. is a taxonomic SYNONYM of F. vulgaris,
  so hexapetala papers are genuine; the Russian nootropic papers call F. vulgaris ''meadowsweet'' but
  the binomial is F. vulgaris). Dropped generic multi-plant hits (E. coli polyphenol screen, Serbian/Bosnian
  multi-plant surveys) that did not clearly isolate F. vulgaris. Research-workflow leads (wf_25f58939-508)
  were self-verified because the workflow''s adversarial-verify stage failed on the session limit. Cross-links:
  filipendula-ulmaria (sibling), salix-alba (salicylate group), agrimonia-eupatoria (Rosaceae astringent,
  co-studied). Lookalike is a NAME-confusion safeguard vs hemlock water-dropwort (Oenanthe crocata), reusing
  REF-2612. | 2026-07-13: added anticancer action (where absent) + cancer indication (anticancer/antitumour
  research) sourced from the plant''s cited literature, as part of the cancer-condition campaign.'
