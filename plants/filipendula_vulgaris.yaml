contraindications:
- note: Dropwort contains salicylate compounds (salicylaldehyde, methyl salicylate), as in meadowsweet
    and willow. Avoid in salicylate or aspirin sensitivity, and use caution alongside anticoagulant or
    antiplatelet medicines. As with other salicylate-containing plants, avoid in children with viral illness
    (theoretical Reye's syndrome risk).
  severity: caution
  reference_ids:
  - REF-2734
  - REF-2727
  status: verified
- note: Safety in pregnancy and breastfeeding has not been established; avoid medicinal doses during pregnancy
    and lactation.
  severity: caution
  status: verified
- note: Generally well tolerated in traditional amounts; genotoxicity testing of dropwort extracts found
    them non-genotoxic and antigenotoxic (DNA-protective) at the doses studied.
  severity: info
  reference_ids:
  - REF-2731
  - REF-2740
  status: verified
