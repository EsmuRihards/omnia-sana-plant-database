botanical_description:
  text: 'Erect perennial herb of the rose family, 20-80 cm tall, growing from a short rootstock whose
    fibrous roots bear characteristic small tuber-like swellings (the ''drop-wort'' beads). The leaves
    are mostly in a basal rosette and are distinctive: long, fern-like and interruptedly pinnate, with
    many (up to 20+ pairs) small, deeply toothed leaflets. Small creamy-white flowers, often pink-tinged
    in bud and 6-petalled, are borne in an irregular terminal cyme. Unlike its sibling meadowsweet (Filipendula
    ulmaria) of wet ground, dropwort grows in dry calcareous grassland.'
  height: 20-80 cm
  habit: Erect perennial herb from a short rootstock bearing small root tubers
  leaves: Mostly a basal rosette; long, fern-like, interruptedly pinnate with many (to 20+ pairs) small,
    deeply toothed leaflets
  flowers: Creamy-white, often pink-tinged in bud, 6-petalled, in an irregular terminal cyme; faintly
    scented
  stem: Erect, slender, little-branched and nearly leafless above the basal rosette
  root: Fibrous roots bearing characteristic small tuber-like swellings ('dropwort' beads)
  fruit: A cluster of small, straight, hairy achenes
  flowering_period: May-August
  reference_ids:
  - REF-2725
  - REF-2730
  status: verified
habitat:
  text: Dry, unimproved calcareous (chalk and limestone) grassland, meadows, roadside banks and open scrub.
    Native across most of Europe, western Asia and North Africa. Unlike meadowsweet (F. ulmaria), which
    grows in wet meadows and beside water, dropwort is a plant of dry ground.
  reference_ids:
  - REF-2725
  status: verified
harvesting:
  text: The flowering tops and aerial parts are gathered in summer while in flower; the fern-like leaves
    and the small root tubers are also used. The material is dried for infusions and decoctions.
  parts:
  - Flower
  - Aerial parts
  - Root
  - Leaf
  season: Aerial parts and flowers in summer (May-August); roots and tubers in autumn
  reference_ids:
  - REF-2726
  status: verified
traditional_uses:
  text: Dropwort shares much of the European folk-medicine history of its sibling meadowsweet. The salicylate-
    and tannin-rich herb has been used as an astringent and anti-inflammatory remedy for diarrhoea and
    other gastrointestinal complaints, for rheumatic and arthritic pain, for kidney and bladder 'gravel'
    and urinary complaints, and as a wound and mouth wash. In Serbian and Balkan ethnomedicine the flowers
    and roots are used; Russian traditional medicine uses dropwort extracts as a nootropic and calming
    remedy for the nervous system.
  reference_ids:
  - REF-2726
  - REF-2736
  - REF-2739
  status: verified
