last_updated: '2026-06-14'
internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx).
  reference_ids are plant-level: the book lists parts and actions as flat, unmapped lists, so the full
  set of references cited for this plant is attached to each action rather than split per action. Enriched
  2026-06-13 from a comprehensive PubMed review (REF-0537, Badgujar et al. 2014): constituents extracted
  (essential oil/trans-anethole, flavonoids, phenolic acids, fatty acids) and the review cited alongside
  the book for the antimicrobial, antispasmodic and expectorant actions. Further enriched 2026-06-14 with
  two PubMed-sourced meta-analyses of RCTs adding a primary-dysmenorrhoea action (REF-0604, a fennel-specific
  meta-analysis; REF-0605, a cinnamon/fennel/ginger meta-analysis). | 2026-06-15: migrated to entity schema
  (actions->vocab ids, indications split out, constituents linked to compounds).'
