botanical_description:
  text: Aromatic, robust perennial (often grown as an annual/biennial) with a smooth, waxy, blue-green,
    hollow stem and finely divided, thread-fine, feathery leaves. Small yellow flowers are borne in large
    flat compound umbels in summer, ripening into ridged, strongly aniseed-scented seeds.
  height: 1-2 m
  habit: Aromatic, robust perennial herb (often grown as annual/biennial)
  leaves: Finely divided into thread-fine, hair-like, feathery segments
  flowers: Small yellow flowers in large flat compound umbels
  stem: Smooth, waxy, blue-green, hollow, unspotted
  root: Thick taproot, swollen and bulb-like in the Florence fennel variety
  fruit: Ridged, aromatic, aniseed-scented seed (mericarp)
  flowering_period: July-October
  reference_ids:
  - REF-0537
  status: verified
habitat:
  text: Native to the Mediterranean region; naturalised and widely cultivated worldwide in temperate and
    subtropical climates as a culinary herb, vegetable (Florence fennel) and spice crop.
  reference_ids:
  - REF-0537
  status: verified
harvesting:
  text: Leaves are picked fresh through the growing season; the seed is harvested in autumn once the umbels
    have browned and dried, then threshed; the swollen root/bulb of Florence fennel is harvested when
    mature, before flowering.
  parts:
  - Leaf
  - Root
  - Seed
  season: Leaf through summer; seed in autumn; bulb before flowering
  reference_ids:
  - REF-0537
  status: verified
traditional_uses:
  text: Fennel seed has an ancient Mediterranean and Asian tradition as a carminative digestive remedy
    for indigestion, bloating and colic (including infant colic, historically), a mild expectorant for
    respiratory catarrh, and a traditional lactagogue and emmenagogue owing to its mild estrogen-like
    activity.
  reference_ids:
  - REF-0537
  status: verified
preparations:
- name: Infusion (seed)
  text: Crushed seed infused in hot water as the classic carminative digestive tea.
  reference_ids:
  - REF-0537
  status: verified
- name: Standardised extract
  text: Seed extract studied in randomised trials for primary dysmenorrhoea (menstrual pain).
  reference_ids:
  - REF-0604
  status: verified
- name: Culinary use
  text: Seed, leaf ('fronds') and bulb used extensively as a food spice and vegetable.
  status: draft
dosage:
- name: Seed infusion
  text: The EU herbal monograph on bitter fennel fruit gives, for adults and adolescents, 1.5 g of the
    herbal substance in 250 mL of boiling water (steeped 15 minutes) as an infusion three times daily,
    for a daily dose of 4.5 g. For children 4 to 12 years, 1.0 g in 100 mL three times daily (daily dose
    3.0 g); use is not recommended under 4 years. Use should be short-term, and the monograph limits exposure
    because of the estragole content of the fruit. Educational reference only, not a prescription.
  reference_ids:
  - REF-3080
  status: verified
