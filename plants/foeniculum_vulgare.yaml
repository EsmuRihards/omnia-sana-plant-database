  severity: info
  reference_ids:
  - REF-0119
  status: verified
- note: 'Allergy to celery, carrot or mugwort: Fennel might cause an allergic reaction in people who are
    sensitive to these plants.'
  severity: info
  reference_ids:
  - REF-0119
  status: verified
- note: 'Bleeding disorders: Fennel might slow blood clotting. Taking fennel might increase the risk of
    bleeding or bruising in people with bleeding disorders.'
  severity: info
  reference_ids:
  - REF-0119
  status: verified
- note: 'Hormone-sensitive condition such as breast cancer, uterine cancer, ovarian cancer, endometriosis,
    or uterine fibroids: Fennel might act like estrogen. If you have any condition that might be made
    worse by estrogen, do not use fennel. (WebMD, n.d.b)'
  severity: caution
  reference_ids:
  - REF-0119
  status: verified
- note: 'Duke (2002) rates fennel as ++ and notes antispasmodic, carminative, and digestive activities
    at experimental levels (score 1). Its estrogenic activity is well-documented, and it is traditionally
    used as a lactagogue. Commission E approves fennel for dyspeptic complaints and upper respiratory
    tract catarrh. Dose: 1.5–7.5 g seed or equivalent daily. Duke cautions that fennel essential oil in
    large amounts may be neurotoxic (estrole content), and prolonged use of concentrated extracts should
    be avoided during pregnancy (Duke, 2002).'
  severity: caution
  reference_ids:
  - REF-0119
  - REF-0063
  status: verified
