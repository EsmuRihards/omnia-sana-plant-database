id: foeniculum-vulgare
scientific_name: Foeniculum vulgare
common_names:
- Fennel
- Common Fennel
- Florence Fennel
family: Apiaceae
parts_used:
- Leaf
- Root
- Seed
constituents:
- name: Essential oil (mainly trans-anethole, with fenchone and estragole/methyl chavicol)
  compounds:
  - essential-oil
  note: The aromatic volatile oil of the seed; trans-anethole is the principal component and is associated
    with the antispasmodic, carminative and estrogen-like activity.
  reference_ids:
  - REF-0537
- name: Flavonoids (quercetin, rutin and kaempferol glycosides)
  compounds:
  - flavonoid
  - glycoside
  - kaempferol
  - quercetin
  - rutin
  note: Antioxidant polyphenolic constituents.
  reference_ids:
  - REF-0537
- name: Phenolic acids (chlorogenic, caffeic and rosmarinic acids)
  compounds:
  - rosmarinic-acid
  - phenolic-acid
  - chlorogenic-acid
  - caffeic-acid
  note: Antioxidant and anti-inflammatory constituents.
  reference_ids:
  - REF-0537
- name: Fatty acids (chiefly petroselinic acid) and amino acids
  note: Major constituents of the fruit/seed oil.
  reference_ids:
  - REF-0537
actions:
- action: antimicrobial
  reference_ids:
  - REF-0119
  - REF-0537
  status: verified
- action: antispasmodic
  note: Antispasmodic (cramp easing)
  reference_ids:
  - REF-0119
  - REF-0537
  status: verified
- action: expectorant
  reference_ids:
  - REF-0119
  - REF-0537
  status: verified
