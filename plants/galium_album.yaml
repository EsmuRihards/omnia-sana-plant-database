botanical_description:
  text: Sprawling to erect perennial herb with slender, square-sectioned stems and whorls of narrow, lance-shaped
    leaves typical of the bedstraw genus. Numerous small, four-petalled, white star-shaped flowers are
    borne in loose, branched clusters, giving a frothy appearance.
  height: 30-100 cm
  habit: Sprawling to erect perennial herb
  leaves: Narrow, lance-shaped, in whorls of 6-8
  flowers: Small, four-petalled, white, star-shaped, in loose branched clusters
  stem: Slender, square-sectioned, smooth (not bristly like cleavers)
  root: Fibrous, spreading rootstock
  fruit: Small, smooth (non-hooked) twin nutlet, distinguishing it from bristly-fruited cleavers
  flowering_period: June-September
  status: draft
habitat:
  text: A common plant of grassland, meadows, hedgerows, roadsides and waste ground on a wide range of
    soils; native to Europe and temperate Asia.
  status: draft
harvesting:
  text: The flowering aerial parts are cut in summer while in flower and dried.
  parts:
  - Flower
  - Leaf
  - Aerial parts
  season: Summer, at flowering
  status: draft
traditional_uses:
  text: White bedstraw shares the broader bedstraw genus's folk reputation as a mild diuretic and topical
    remedy for minor skin and wound complaints, though species-specific clinical or traditional-use documentation
    is sparse; most available research on this species is phytochemical and antioxidant in nature rather
    than confirming a specific traditional-use record.
  status: draft
preparations:
- name: Infusion
  text: Dried flowering herb infused in hot water, following the general bedstraw-genus tradition; species-specific
    use documentation is limited.
  status: draft
- name: Fresh herb (topical)
  text: Fresh crushed herb applied topically for minor skin irritation, per general genus tradition.
  status: draft
dosage:
- name: Infusion
  text: No species-specific dosing data exist; if used, follow conservative genus-typical dosing (around
    2-4 g dried herb per cup) with professional guidance. Educational reference only, not a prescription.
  status: draft
actions:
- action: antioxidant
  note: Aerial-part and flower extracts of Galium album / G. mollugo show free-radical-scavenging and
    reactive-oxygen-species-reducing activity attributed to their polyphenol, flavonoid and iridoid content.
  reference_ids:
  - REF-0818
  - REF-2352
  - REF-2353
  - REF-2354
  status: verified
contraindications:
- note: White bedstraw (Galium album) is a widespread grassland plant that shares the bedstraw genus's
    folk-medicinal reputation as a mild diuretic and as a topical remedy for minor skin and wound complaints.
    Modern evidence is limited to phytochemical and antioxidant studies; no clinical trials exist. It
    is generally regarded as low in toxicity at culinary or tea amounts, but it has not been formally
    evaluated for safety in pregnancy, in lactation, or alongside medication, so caution is advised.
  severity: info
