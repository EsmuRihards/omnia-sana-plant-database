id: galium-aparine
scientific_name: Galium aparine
common_names:
- Cleavers
- clivers
- goose grass/goosegrass
- stickyweed
- stickywilly
- catchweed bedstraw
family: Rubiaceae
external_ids:
  gbif: 2913548
  wikidata: Q161581
parts_used:
- Leaf
- Seed
- Stem
botanical_description:
  text: Scrambling, sprawling annual herb covered in tiny hooked bristles on its square stems, leaves
    and seed capsules, allowing it to cling to clothing, fur and neighbouring plants as it climbs ('stickyweed').
    The leaves are narrow and lance-shaped, borne in whorls of six to eight. Tiny white, four-petalled
    flowers give way to small, round, bristly-hooked twin seed capsules ('goosegrass burrs').
  height: Scrambling stems to 1-2 m, supported by other vegetation
  habit: Scrambling, sprawling annual herb, climbing by hooked bristles
  leaves: Narrow, lance-shaped, in whorls of 6-8, with hooked bristles on the margins
  flowers: Tiny, white, four-petalled
  stem: Square-sectioned, weak, covered in tiny hooked bristles
  root: Shallow, fibrous root system
  fruit: Small, round, bristly-hooked twin nutlet, clinging to fur and clothing
  flowering_period: May-September
  reference_ids:
  - REF-1720
  status: verified
habitat:
  text: A common scrambling weed of hedgerows, waste ground, gardens and field margins, climbing over
    other vegetation for support; native to Europe, Asia and North Africa and widely naturalised elsewhere.
  reference_ids:
  - REF-1720
  status: verified
harvesting:
  text: The whole aerial plant (leaf, stem and seed) is cut in spring to early summer, before the fruit
    fully hardens, and used fresh (as juice) or dried.
  parts:
  - Leaf
  - Seed
  - Stem
  season: Spring to early summer
  status: draft
traditional_uses:
  text: Cleavers has a long European folk history as a lymphatic and diuretic 'spring tonic' herb, traditionally
    used to support the urinary system and lymphatic drainage, and topically as a soothing, emollient
    wash or poultice for skin irritation, wounds and minor swellings.
  reference_ids:
  - REF-1720
  status: verified
preparations:
- name: Fresh juice
  text: Fresh aerial parts crushed or juiced, traditionally taken as a spring tonic or applied topically
    to skin irritation and wounds.
  reference_ids:
  - REF-1720
  status: verified
- name: Infusion
  text: Dried or fresh herb infused in hot (or cold) water as a traditional diuretic and lymphatic-support
    tea.
  status: draft
- name: Poultice/wash
  text: Crushed fresh herb or a strained infusion applied topically as a wash or poultice for skin irritation
    and minor wounds.
  reference_ids:
  - REF-1720
  status: verified
dosage:
- name: Infusion
  text: Traditional herbal references suggest around 2-4 g of dried herb per cup, up to three times daily.
    Educational reference only, not a prescription.
  status: draft
constituents:
- name: Iridoid glycosides (asperuloside)
  compounds:
  - iridoid-glycoside
  - glycoside
  note: Characteristic Rubiaceae iridoids shared with related bedstraws, contributing to the plant's traditional
    activity.
  reference_ids:
  - REF-1720
- name: Flavonoids and phenolic acids
  compounds:
  - flavonoid
  - phenolic-acid
  note: Antioxidant constituents supporting the plant's antimicrobial and wound-healing activity.
  reference_ids:
  - REF-1720
- name: Tannins
  compounds:
  - tannin
  note: Astringent constituents contributing to the traditional topical use for skin and wounds.
