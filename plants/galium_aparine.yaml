contraindications:
- note: Duke (2002) describes cleavers as a diuretic, lymph tonic, and depurative with experimental support
    (score 1). The plant has been used in traditional medicine for swollen lymph nodes, urinary complaints,
    and skin conditions. Diuretic and anti-inflammatory activities are supported experimentally. No Commission
    E approval. Safety rating is ++ (relatively safe), with no known significant contraindications at
    usual herbal doses (Duke, 2002).
  severity: caution
