contraindications:
- note: Generally well tolerated at standard doses. May cause mild digestive upset, dry mouth, or dizziness
    in some individuals. May enhance the effects of anticoagulant and antihypertensive medications. Avoid
    during pregnancy and breastfeeding. Extended use beyond 6 months is not well studied in humans.
  severity: caution
  reference_ids:
  - REF-0019
  - REF-0125
  - REF-0298
  status: verified
- note: Duke (2002) rates reishi (Ganoderma lucidum) as + and notes immunostimulant, hepatoprotective,
    antioxidant, antitumor, and hypoglycemic activities at the experimental level (score 1). It is a key
    adaptogen in traditional Chinese medicine, valued for its polysaccharide (beta-glucan) content. Duke
    notes antiviral (score 1) and anti-aggregant activities. No strong clinical trials existed at time
    of publication, but lentinan and polysaccharide fractions from related species show immunomodulatory
    potential. Duke suggests caution in bleeding disorders due to anti-aggregant activity (Duke, 2002).
  severity: caution
