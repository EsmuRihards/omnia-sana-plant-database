botanical_description:
  text: Bracket (shelf) fungus (not a true plant) that grows on the trunks and stumps of deciduous trees.
    It develops a hard, kidney- or fan-shaped cap with a glossy, varnished, red-brown to mahogany crust
    and concentric growth rings, often on a lateral woody stalk; the pale underside is covered in fine
    pores that release rusty-brown spores. The mycelium spreads through the wood substrate before fruiting.
  height: Cap 5-20 cm across
  habit: Perennial wood-decay bracket fungus
  leaves: Not applicable (fungus)
  flowers: Not applicable (fungus); reproduces by spores
  stem: Hard, glossy, varnished kidney- or fan-shaped cap, often on a lateral stalk
  root: Mycelium spreading through the wood substrate
  fruit: Pale, finely pored underside releasing rusty-brown spores
  flowering_period: Fruiting body develops over weeks to months on the host wood
  reference_ids:
  - REF-0821
  status: verified
habitat:
  text: Grows as a wood-decay fungus on the stumps and trunks of deciduous trees (notably maple and other
    hardwoods) in East Asian forests; also widely cultivated commercially on hardwood logs or sawdust
    substrate.
  status: draft
harvesting:
  text: Wild fruiting bodies are collected once mature; cultivated material is harvested from logs or
    substrate at maturity, then dried and processed into slices, powder or extract.
  parts:
  - Mycelium
  - Whole Plant
  status: draft
traditional_uses:
  text: Reishi/lingzhi, the 'mushroom of immortality', is one of the most revered tonic fungi in traditional
    Chinese medicine, used for centuries to support vitality, calm the spirit, strengthen immunity and
    promote longevity; this traditional tonic reputation is now studied for immunomodulatory, anticancer-adjunct
    and metabolic effects.
  reference_ids:
  - REF-0821
  - REF-2039
  status: verified
preparations:
- name: Decoction
  text: Dried, sliced fruiting body simmered in water for an extended period, the traditional preparation
    to extract polysaccharides.
  status: draft
- name: Standardised extract
  text: Extract standardised to polysaccharide (beta-glucan) or triterpene content, taken as capsules
    or powder; the form used in most modern studies.
  reference_ids:
  - REF-0821
  - REF-2039
  status: verified
- name: Tincture
  text: Alcohol/water dual extraction, used to capture both water-soluble polysaccharides and alcohol-soluble
    triterpenes.
  status: draft
dosage:
- name: Standardised extract
  text: Traditional and clinical references commonly cite around 1-3 g of dried fruiting body extract
    daily, or higher doses of raw powder/decoction. Educational reference only, not a prescription.
  status: draft
