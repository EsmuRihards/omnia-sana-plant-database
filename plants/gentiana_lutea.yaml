id: gentiana-lutea
scientific_name: Gentiana lutea
common_names:
- Gentian
- Yellow gentian
- Bitterwort
- Great yellow gentian
family: Gentianaceae
parts_used:
- Root
constituents:
- name: Secoiridoid bitter glycosides (gentiopicroside, amarogentin, swertiamarin)
  compounds:
  - flavonoid
  - glycoside
  note: Amarogentin is one of the bitterest natural compounds known; these stimulate digestive secretions.
    Genus-level reviews identify these secoiridoids, together with xanthones and flavonoids, as the main
    bioactives and report gastrointestinal, hepatoprotective and anti-inflammatory activity.
  reference_ids:
  - REF-0453
  - REF-0454
  - REF-0580
  - REF-0581
- name: Xanthones (gentisin) and flavonoids
  compounds:
  - flavonoid
  note: Pigment and antioxidant constituents.
  reference_ids:
  - REF-0454
  - REF-0453
- name: Sugars (gentiobiose)
  note: Carbohydrate constituents of the root.
  reference_ids:
  - REF-0453
actions:
- action: bitter-tonic
  note: Aromatic bitter for temporary loss of appetite
  reference_ids:
  - REF-0453
  status: verified
- action: digestive
  note: Digestive aid for mild dyspeptic complaints - indigestion, bloating and fullness (stimulates gastric
    acid, enzyme and bile secretion)
  reference_ids:
  - REF-0453
  - REF-0454
  - REF-0580
  status: verified
indications:
- condition: appetite-loss
  evidence: 3
  note: Aromatic bitter for temporary loss of appetite
  reference_ids:
  - REF-0453
  status: verified
- condition: bloating
  evidence: 3
  note: Digestive aid for mild dyspeptic complaints - indigestion, bloating and fullness (stimulates gastric
    acid, enzyme and bile secretion)
  reference_ids:
  - REF-0453
  - REF-0454
  - REF-0580
  status: verified
- condition: indigestion
  evidence: 3
  note: Digestive aid for mild dyspeptic complaints - indigestion, bloating and fullness (stimulates gastric
    acid, enzyme and bile secretion)
  reference_ids:
  - REF-0453
  - REF-0454
  - REF-0580
  status: verified
- condition: nausea
  evidence: 2
  note: Eases nausea linked to sluggish digestion (traditional)
  reference_ids:
  - REF-0454
  status: needs-review
contraindications:
- note: Because bitters increase stomach-acid secretion, gentian is contraindicated in peptic (stomach
    or duodenal) ulcer disease and hyperacidity.
  severity: caution
  reference_ids:
  - REF-0453
  status: verified
- note: Traditional use only; appetite loss or dyspepsia that persists needs medical assessment, and use
    in pregnancy and breastfeeding is not recommended.
  severity: caution
  reference_ids:
