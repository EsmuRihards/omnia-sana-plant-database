  - glycoside
  note: Amarogentin is one of the bitterest natural compounds known; these stimulate digestive secretions.
    Genus-level reviews identify these secoiridoids, together with xanthones and flavonoids, as the main
    bioactives and report gastrointestinal, hepatoprotective and anti-inflammatory activity.
