botanical_description:
  text: Tall, robust perennial herb with a thick, fleshy taproot and large, broadly oval, strongly veined
    opposite leaves (a distinguishing feature from the deadly Veratrum album, which has alternate leaves).
    Bright golden-yellow, star-shaped flowers are borne in dense whorls in the leaf axils along the upper
    stem.
  height: 0.5-1.4 m
  habit: Tall, robust perennial herb
  leaves: Large, broadly oval, strongly veined, arranged in opposite pairs
  flowers: Bright golden-yellow, star-shaped, in dense axillary whorls
  stem: Stout, unbranched, hollow
  root: Thick, fleshy taproot (the medicinal part)
  fruit: Capsule with numerous winged seeds
  flowering_period: June-August
  reference_ids:
  - REF-0453
  status: verified
habitat:
  text: Grows in subalpine and alpine meadows and pastures of central and southern Europe, typically at
    moderate to high elevations on calcareous soils.
  reference_ids:
  - REF-0453
  status: verified
harvesting:
  text: The root is dug in autumn from plants at least several years old, when bitter secoiridoid content
    is highest, then cleaned and dried; careful identification against the deadly Veratrum album (white
    hellebore), which shares similar habitat and, before flowering, a superficially similar rosette, is
    essential before wild-harvesting.
  parts:
  - Root
  season: Autumn
  reference_ids:
  - REF-0453
  status: verified
traditional_uses:
  text: Gentian root is one of the classic bitter digestive herbs of European tradition, used to stimulate
    appetite and digestive secretions for temporary loss of appetite and mild dyspeptic complaints, and
    has long been a base ingredient of bitter tonics, aperitifs and digestifs.
  reference_ids:
  - REF-0453
  status: verified
preparations:
- name: Cold infusion (maceration)
  text: Dried root macerated in cold water for several hours to extract the bitter secoiridoids, a traditional
    preparation method for bitters.
  reference_ids:
  - REF-0453
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried root, often taken as a few drops before meals.
  status: draft
- name: Infusion
  text: Dried root infused briefly in hot water and taken shortly before meals as a bitter digestive tonic.
  reference_ids:
  - REF-0453
  status: verified
dosage:
- name: Infusion/tincture
  text: Traditional herbal references suggest around 0.5-2 g of dried root per dose, taken shortly before
    meals, up to three times daily. Educational reference only, not a prescription.
  status: draft
