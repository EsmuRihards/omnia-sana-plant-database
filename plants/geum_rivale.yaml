- Flower
botanical_description:
  text: A perennial herb of the rose family, 20-60 cm tall, growing from a thick, reddish, aromatic rhizome
    that smells of cloves when broken (from its eugenol content) - the source of the name 'chocolate root'.
    The basal leaves are pinnate with a large terminal lobe, forming a rosette. Its distinctive flowers
    are nodding (drooping) bells with dull purple-pink to orange sepals and cream-to-pink petals, quite
    unlike the erect open yellow flowers of its relative wood avens (Geum urbanum). The fruit is a rounded
    head of achenes, each with a hooked, feathery style that clings to fur and clothing.
  height: 20-60 cm
  habit: Erect perennial herb from a thick aromatic rhizome
  leaves: Basal rosette of pinnate leaves with a large terminal lobe; stem leaves smaller, trifoliolate
  flowers: Nodding, bell-shaped, dull purple-pink to orange sepals with cream-to-pink petals (distinct
    from the erect yellow flowers of wood avens)
  stem: Erect, reddish, softly hairy
  root: Thick reddish rhizome smelling of cloves (eugenol) - the 'chocolate root'
  fruit: A rounded head of achenes, each with a hooked, feathery style
  flowering_period: May-September
  reference_ids:
  - REF-2761
  - REF-2769
  status: verified
habitat:
  text: 'Damp ground: wet meadows, marshes, streamsides, ditches, fens and damp woodland across Europe,
    western Asia and North America. It favours moist, base-rich soils. Unlike wood avens (Geum urbanum),
    a plant of dry hedgerows and shade, water avens grows in wet, open places.'
  reference_ids:
  - REF-2761
  status: verified
harvesting:
  text: The reddish rhizome/root is the main medicinal part, dug in spring or autumn and dried carefully
    to preserve its clove-scented, eugenol-bearing, tannin-rich qualities; the aerial flowering parts
    are gathered in summer. The root has historically been used both as an astringent medicine and as
    a flavouring (a coffee/chocolate substitute and to flavour ale).
  parts:
  - Root
  - Rhizome
  - Aerial parts
  season: Root/rhizome in spring or autumn; aerial parts in flower (summer)
  reference_ids:
  - REF-2765
  - REF-2769
  status: verified
traditional_uses:
  text: Water avens shares the astringent, tannin-based traditional medicine of the avens (Geum) genus.
    The clove-scented root has been used as an astringent for diarrhoea, dysentery and other bowel complaints,
    as a gargle and mouth wash for sore throat, mouth ulcers and spongy gums, and as a wash for wounds
    and skin inflammation. It was also valued as an aromatic bitter tonic and, historically, a febrifuge,
    and the fragrant root was used to flavour ale and as a coffee/chocolate substitute (hence 'chocolate
    root').
  reference_ids:
  - REF-2769
  - REF-2768
  status: verified
preparations:
- name: Decoction
  text: The dried root/rhizome simmered in water as an astringent for diarrhoea and as a gargle for sore
    throat and inflamed gums.
  reference_ids:
  - REF-2769
  status: verified
- name: Infusion
  text: The aerial parts or root infused as a milder astringent and aromatic tonic tea.
  reference_ids:
  - REF-2769
  status: draft
- name: Gargle / mouthwash
  text: A cooled root decoction used as a gargle/mouthwash for sore throat, mouth ulcers and spongy gums.
  reference_ids:
  - REF-2769
  - REF-2771
  status: draft
- name: Tincture
  text: Alcoholic extract of the root (about 1:5).
  status: draft
dosage:
- name: Root decoction
  text: 'Traditional herbal use: roughly 1-4 g of dried root per cup as a decoction, up to three times
    daily. Educational reference only.'
  status: draft
- name: Tincture (1:5)
  text: About 1-4 mL of a 1:5 root tincture up to three times daily in adults. Educational reference only,
    not a prescription.
