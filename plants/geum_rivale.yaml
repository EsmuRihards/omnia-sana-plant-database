  - REF-2761
  - REF-2777
- name: Gallic acid and derivatives
  compounds:
  - gallic-acid
  - phenolic-acid
  note: Gallic acid and galloyl derivatives (antioxidant, antimicrobial).
  reference_ids:
  - REF-2761
  - REF-2762
