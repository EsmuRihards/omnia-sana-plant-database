contraindications:
- note: The root and herb are rich in tannins; large or prolonged doses may cause digestive upset or constipation
    and can reduce the absorption of iron and some medicines - take apart from iron supplements and other
    drugs.
  severity: caution
  reference_ids:
  - REF-2768
  - REF-2761
  status: verified
- note: Safety in pregnancy and breastfeeding has not been established; avoid medicinal doses during pregnancy
    and lactation.
  severity: caution
  status: verified
- note: In-vivo toxicity testing of avens (Geum) extract showed a favourable profile at the doses studied,
    but high-dose or long-term safety is not established.
