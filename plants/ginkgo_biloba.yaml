botanical_description:
  text: Ancient deciduous tree, a 'living fossil' with no close living relatives, bearing distinctive
    fan-shaped leaves with parallel forking veins that turn brilliant gold in autumn. The tree is dioecious
    (separate male and female trees); female trees bear fleshy, foul-smelling seed coats surrounding an
    edible inner nut (ginkgo nut) once the outer flesh is removed.
  height: Up to 30-40 m
  habit: Large, long-lived deciduous tree
  leaves: Distinctive fan-shaped, with parallel forking veins, turning gold in autumn
  flowers: Dioecious; wind-pollinated, inconspicuous
  stem: Tall, sturdy trunk with furrowed grey bark
  root: Deep, wide-spreading root system
  fruit: Fleshy, foul-smelling seed coat (female trees) surrounding an edible inner nut
  flowering_period: Spring
  reference_ids:
  - REF-0824
  status: verified
habitat:
  text: Native to China, where a small number of wild populations survive; now cultivated worldwide as
    a resilient, pollution-tolerant ornamental and medicinal tree.
  status: draft
harvesting:
  text: Leaves are picked in late summer to autumn, when flavonoid and terpenoid content is highest, and
    processed into standardised extracts; the inner seed is collected in autumn from fallen fruit, with
    the malodorous outer flesh removed (handled with gloves, as it can irritate skin).
  parts:
  - Leaf
  - Seed
  season: Leaf in late summer/autumn; seed in autumn
  status: draft
traditional_uses:
  text: 'Ginkgo leaf and seed have a long East Asian tradition: the seed used in traditional Chinese medicine
    (in small, cooked amounts) for respiratory complaints, and the leaf, though a more recent addition
    to Western herbalism, now one of the most extensively studied botanicals for cognitive and peripheral
    circulatory support, reflecting decades of standardised-extract clinical research.'
  reference_ids:
  - REF-0824
  status: verified
preparations:
- name: Standardised extract
  text: Leaf extract standardised to flavone glycosides and terpene lactones (commonly the EGb 761 standard),
    taken as tablets or capsules; the best-studied clinical form.
  reference_ids:
  - REF-0824
  - REF-0056
  status: verified
- name: Cooked seed (traditional, East Asian)
  text: Small numbers of cooked seeds used traditionally in East Asian cuisine and medicine; raw seeds
    are toxic (ginkgotoxin) and never eaten raw.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials for cognitive and circulatory support commonly use around 120-240 mg of standardised
    leaf extract daily, in divided doses. Educational reference only, not a prescription.
  reference_ids:
  - REF-0056
  status: draft
constituents:
- name: Flavone glycosides (quercetin, kaempferol, isorhamnetin glycosides)
  compounds:
  - flavonoid
  - quercetin
  - kaempferol
  - glycoside
  note: Antioxidant flavonoids of the leaf, standardised in clinical extracts.
  reference_ids:
  - REF-0824
- name: Terpene lactones (ginkgolides, bilobalide)
  compounds:
  - terpene
  note: Unique diterpene and sesquiterpene lactones responsible for platelet-activating-factor antagonism
    and much of the neuroprotective and circulatory activity; also the basis of the bleeding-risk caution.
  reference_ids:
  - REF-0824
  - REF-0056
- name: Ginkgotoxin (4'-O-methylpyridoxine)
  note: A neurotoxic compound present in the raw seed; the reason only cooked seed in small amounts, or
    standardised leaf extract, is used medicinally.
