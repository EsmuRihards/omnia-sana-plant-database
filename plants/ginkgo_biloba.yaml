contraindications:
- note: Generally well tolerated at standard doses but notable interactions exist. Ginkgo has antiplatelet
    and anticoagulant effects and should not be combined with warfarin, aspirin, or other blood-thinning
    medications without medical supervision. May lower the seizure threshold — avoid in epilepsy. Possible
    side effects include headache, dizziness, and GI upset. The raw seeds contain ginkgotoxin and are
    toxic; only processed leaf extracts are used medicinally.
  severity: caution
  reference_ids:
  - REF-0056
  - REF-0128
  - REF-0308
  status: verified
- note: 'Duke (2002) rates ginkgo as + (downgraded from higher rating for safety concerns) while noting
    clinical evidence (score 2) for anti-aggregant (platelet-inhibitory), anti-Alzheimer, and antioxidant
    activities. Commission E approves ginkgo leaf extract for cognitive deficits, peripheral circulatory
    disorders, and vertigo. However, Duke emphasizes significant safety concerns: ginkgo substantially
    increases bleeding risk when combined with anticoagulants (warfarin, aspirin, NSAIDs) and may cause
    spontaneous bleeding at high doses alone. Dose: 120–240 mg standardized extract (EGb 761) daily. Contraindicated
    with anticoagulants without medical supervision (Duke, 2002).'
  severity: caution
  reference_ids:
  - REF-0056
  - REF-0128
  - REF-0308
  - REF-0063
  status: verified
