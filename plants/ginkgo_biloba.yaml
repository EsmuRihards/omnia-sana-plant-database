drug_class_interactions:
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: Ginkgo has antiplatelet activity (ginkgolide PAF antagonism) and may add to the bleeding
    risk of anticoagulant or antiplatelet drugs; a systematic review of case reports links ginkgo to spontaneous
    bleeding (including intracranial bleeds) with elevated bleeding times. Stop before surgery.
  reference_ids:
  - REF-2436
  - REF-2529
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: nsaids
  severity: caution
  mechanism: Ginkgo's antiplatelet effect may add to the bleeding risk of NSAIDs such as ibuprofen; case
    reports of bleeding exist.
  reference_ids:
  - REF-2436
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: anticonvulsants
  severity: caution
  mechanism: Ginkgo can contain ginkgotoxin, which may lower the seizure threshold; use caution alongside
    anti-seizure medication.
  reference_ids:
  - REF-2436
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antihypertensives
  severity: caution
  mechanism: Ginkgo has been reported to interact with the blood-pressure medicine nifedipine (a calcium-channel
    blocker), raising its levels and side effects such as dizziness; combined use with blood-pressure
    medicines warrants monitoring.
  reference_ids:
  - REF-2500
  - REF-2436
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antidiabetics
  severity: caution
  mechanism: Ginkgo can change how some diabetes medicines are handled by the body (for example altering
    levels of tolbutamide), which may affect blood-sugar control; monitor blood sugar if combined with
    antidiabetic medicines.
  reference_ids:
  - REF-2436
  - REF-2500
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
