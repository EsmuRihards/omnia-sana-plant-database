constituents:
- name: Triterpenoid saponins (glycyrrhizin/glycyrrhizic acid)
  compounds:
  - saponin
  - glycyrrhizin
  note: The principal sweet-tasting compound, about 50 times sweeter than sucrose; responsible for the
    anti-inflammatory, antiviral and gastroprotective activity and also for the pseudoaldosteronism risk
    on prolonged high-dose use.
  reference_ids:
  - REF-0826
- name: Flavonoids and isoflavones (liquiritin, glabridin)
  compounds:
  - flavonoid
  note: Antioxidant and antimicrobial polyphenols, including the skin-lightening compound glabridin.
  reference_ids:
  - REF-0826
- name: Coumarins and sterols
  note: Minor supporting constituents of the root.
  reference_ids:
  - REF-0826
