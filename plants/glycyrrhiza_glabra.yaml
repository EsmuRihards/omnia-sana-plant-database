drug_class_interactions:
- drug_class: antihypertensives
  severity: caution
  mechanism: Licorice (glycyrrhizic acid) can cause sodium retention, potassium loss and raised blood
    pressure (pseudoaldosteronism), which can oppose blood-pressure medicines. Meta-analyses of randomised
    trials confirm that glycyrrhizic acid raises systolic and diastolic blood pressure, and a crossover
    trial found this even at a low daily dose (100 mg). Avoid regular or high licorice intake if you take
    blood-pressure medicines.
  reference_ids:
  - REF-2439
  - REF-2508
  - REF-2507
  - REF-2509
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: cardiac-glycosides
  severity: caution
  mechanism: Licorice-induced potassium loss can increase the risk of digoxin toxicity; a meta-analysis
    confirms licorice lowers plasma potassium, and low potassium makes the heart more sensitive to cardiac
    glycosides. Avoid regular or high intake.
  reference_ids:
  - REF-2439
  - REF-2508
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: diuretics
  severity: caution
  mechanism: Licorice (glycyrrhizic acid) causes the body to lose potassium; combined with potassium-wasting
    water tablets (thiazide or loop diuretics such as hydrochlorothiazide or furosemide) this can add
    up to dangerously low potassium, which a meta-analysis confirms licorice lowers. Licorice also works
    against potassium-sparing diuretics such as spironolactone by mimicking aldosterone. Avoid regular
    or high licorice intake with any diuretic.
  reference_ids:
  - REF-2508
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
