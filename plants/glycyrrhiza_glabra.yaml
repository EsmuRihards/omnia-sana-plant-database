contraindications:
- note: Avoid prolonged use of whole licorice root in large doses. May cause pseudoaldosteronism (hypertension,
    oedema, hypokalaemia). Contraindicated in hypertension, renal failure, liver disease, hypokalaemia,
    and pregnancy. DGL form is safer for prolonged gastric use. Interactions with antihypertensives, diuretics,
    and corticosteroids.
  severity: caution
  reference_ids:
  - REF-0012
  - REF-0089
  - REF-0305
  status: verified
- note: 'Duke (2002) rates licorice as ++ and documents extensive activities. Glycyrrhizin (the key compound)
    has anti-inflammatory, antiulcer, antiviral, and adrenal-stimulant properties. Duke highlights an
    important safety concern: chronic use of licorice can cause pseudoaldosteronism — sodium retention,
    potassium loss, edema, and hypertension — due to glycyrrhizin''s inhibition of cortisol metabolism.
    This effect is typically seen with >50 g licorice/day for more than 6 weeks. Deglycyrrhizinated licorice
    (DGL) avoids this side effect. Dose: 5–15 g dried root daily. Contraindicated in hypertension, kidney
    disease, low potassium, liver cirrhosis, and in combination with diuretics or corticosteroids (Duke,
    2002).'
  severity: caution
  reference_ids:
  - REF-0012
  - REF-0089
  - REF-0305
  status: verified
