id: glycyrrhiza-glabra
scientific_name: Glycyrrhiza glabra
common_names:
- Licorice root
- liquorice
- sweet root
family: Fabaceae
parts_used:
- Root
botanical_description:
  text: Herbaceous perennial legume with pinnately compound leaves of small, oval, slightly sticky leaflets.
    Pale blue-violet to lilac pea-like flowers are borne in loose spikes, followed by small, flattened,
    oblong pods. The sweet-tasting rhizome and root system, brownish-grey outside and bright yellow inside,
    is the medicinal part, spreading extensively underground via stolons.
  height: 1-1.5 m
  habit: Herbaceous perennial legume, spreading by underground stolons
  leaves: Pinnately compound, small oval leaflets, slightly sticky
  flowers: Pale blue-violet to lilac, pea-like, in loose spikes
  stem: Erect, branching
  root: Extensive, sweet-tasting rhizome and root system, brownish-grey outside, bright yellow inside
  fruit: Small, flattened, oblong pod
  flowering_period: June-August
  reference_ids:
  - REF-0826
  status: verified
habitat:
  text: Grows in dry, sunny, deep-soiled sites, riverbanks and open scrub; native to the Mediterranean
    region and Western to Central Asia, and cultivated widely for its root.
  reference_ids:
  - REF-0826
  status: verified
harvesting:
  text: The root and rhizome are dug in autumn from plants at least three to four years old, when glycyrrhizin
    content is highest, then cleaned and dried; sold whole, cut, or as processed extract.
  parts:
  - Root
  season: Autumn, from mature (3-4+ year) plants
  reference_ids:
  - REF-0826
  status: verified
traditional_uses:
  text: Licorice root is one of the oldest and most widely used herbs in the world, with a documented
    history across Chinese, Ayurvedic, Greek and European traditional medicine as a soothing demulcent
    and expectorant for coughs and sore throat, a gastroprotective remedy for stomach discomfort and ulcers,
    and a harmonising, sweetening addition to herbal formulas.
  reference_ids:
  - REF-0826
  status: verified
preparations:
- name: Decoction
  text: Dried root simmered in water as a traditional soothing, expectorant and gastroprotective tea.
  reference_ids:
  - REF-0826
  status: verified
- name: Deglycyrrhizinated licorice (DGL)
  text: Extract with most of the glycyrrhizin removed, used for prolonged gastric support without the
    blood-pressure/potassium risk of whole root.
  status: draft
- name: Standardised extract
  text: Root extract standardised to glycyrrhizin content, taken as capsules or lozenges.
  reference_ids:
  - REF-0826
  status: verified
dosage:
- name: Whole root/decoction
  text: Traditional herbal references limit regular whole-root use to under about 100 mg glycyrrhizin
    (roughly under 10-15 g dried root) daily, and for no more than 4-6 weeks continuously, given the pseudoaldosteronism
    risk; DGL is preferred for prolonged use. Educational reference only, not a prescription.
  status: draft
