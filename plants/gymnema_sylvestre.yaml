internal_notes: '2026-07-03: new record created for the safety-data campaign (gymnema was previously absent,
  blocking antidiabetic herb-drug/herb-herb records). Built from PubMed-verified sources: Baskaran 1990
  GS4 clinical trial (REF-2465), Kumar 2010 open-label trial (REF-2466), Alam 2018 enzyme-inhibitor review
  (REF-2467), Shiyovich 2010 hepatotoxicity case (REF-2468), Khan 2012 antidiabetic-plants review (REF-2469).
  Constituents name-only (compound entities not yet linked). | 2026-07-11: added monograph-base fields
  (botanical_description, habitat, harvesting, traditional_uses, preparations, dosage) sourced from the
  existing references bucket; general/undated claims marked status: draft per the integrity-first sourcing
  policy. | 2026-07-18: >=10-reference campaign close-out. Added REF-3059 (Tiwari 2014, phytochemistry/pharmacology
  review - wired to the gymnemic-acid and gurmarin constituents, traditional Ayurvedic use, lipid-lowering
  action and high-cholesterol indication) and REF-3060 (Leach 2007 systematic review - wired to the antidiabetic
  action and blood-sugar indication). Both PubMed-verified as Gymnema sylvestre specifically, not a congener.
  A third candidate (Devangan 2021 meta-analysis) was already cited as REF-2540. Unique reference count
  now 11; campaign target met.'
