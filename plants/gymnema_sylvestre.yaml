internal_notes: '2026-07-03: new record created for the safety-data campaign (gymnema
  was previously absent, blocking antidiabetic herb-drug/herb-herb records). Built
  from PubMed-verified sources: Baskaran 1990 GS4 clinical trial (REF-2465), Kumar
