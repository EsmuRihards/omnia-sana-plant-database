id: harpagophytum-procumbens
scientific_name: Harpagophytum procumbens
common_names:
- Devil's Claw
- Grapple plant
- Wood spider
family: Pedaliaceae
external_ids:
  gbif: 3585335
  powo: 'urn:lsid:ipni.org:names:675824-1'
  wikidata: Q386675
parts_used:
- Secondary root tuber
constituents:
- name: Iridoid glycosides (harpagoside, harpagide, procumbide)
  compounds:
  - iridoid-glycoside
  - harpagoside
  - glycoside
  note: Harpagoside is the main marker compound and anti-inflammatory principle; effective extracts are
    standardised to it, with the better-quality clinical evidence using preparations delivering roughly
    50-60 mg harpagoside per day.
  reference_ids:
  - REF-0444
  - REF-0443
  - REF-0562
- name: Phenylethanoids (acteoside/verbascoside) and flavonoids
  compounds:
  - verbascoside
  - flavonoid
  note: Antioxidant supporting constituents.
  reference_ids:
  - REF-0443
botanical_description:
  text: Low-growing, sprawling perennial herb with trailing stems and deeply lobed, greyish-green leaves
    arising from a large, fleshy primary taproot bearing smaller secondary storage tubers (the part used
    medicinally). Striking funnel-shaped, purplish-pink to violet flowers give way to a distinctive woody
    fruit covered in long, hooked spines - the origin of the common name.
  height: Trailing stems to 1.5 m, low-growing
  habit: Low-growing, sprawling perennial herb
  leaves: Deeply lobed, greyish-green
  flowers: Funnel-shaped, purplish-pink to violet
  stem: Trailing, sprawling stems
  root: Large primary taproot with smaller secondary storage tubers (the medicinal part)
  fruit: Woody capsule covered in long, hooked spines ('devil's claw')
  flowering_period: Summer (during the rainy season)
  reference_ids:
  - REF-0443
  status: verified
habitat:
  text: Native to the dry savannas and semi-desert regions of southern Africa, particularly the Kalahari
    Desert region of Namibia, Botswana and South Africa.
  reference_ids:
  - REF-0443
  status: verified
harvesting:
  text: The secondary root tubers are dug by hand, sliced and dried in the sun, traditionally by local
    harvesters in southern Africa; sustainable wild-harvesting practices are important given the plant's
    slow growth and habitat sensitivity.
  parts:
  - Secondary root tuber
  status: draft
traditional_uses:
  text: Devil's claw has a long southern African traditional-medicine history as a remedy for fever, pain
    and digestive complaints, and is now one of the most clinically studied herbal analgesics for osteoarthritis
    and chronic low back pain, with standardised extracts showing efficacy comparable to some conventional
    analgesics in trials.
  reference_ids:
  - REF-0443
  status: verified
preparations:
- name: Standardised extract
  text: Root tuber extract standardised to harpagoside content, taken as capsules or tablets; the best-studied
    clinical form for osteoarthritis and back pain.
  reference_ids:
  - REF-0443
  - REF-0562
  status: verified
- name: Decoction
  text: Dried root tuber simmered in water, a traditional preparation.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried root tuber.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials for osteoarthritis and back pain commonly use extracts providing around 50-60
    mg harpagoside daily. Educational reference only, not a prescription.
  reference_ids:
  - REF-0562
  status: draft
actions:
- action: analgesic
  note: Anti-inflammatory and analgesic for osteoarthritis (hip and knee) pain
