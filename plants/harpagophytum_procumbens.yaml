indications:
- condition: arthritis
  note: Anti-inflammatory and analgesic for osteoarthritis (hip and knee) pain; General joint pain and
    arthritis support
  reference_ids:
  - REF-0443
  - REF-0444
  status: verified
- condition: back-pain
  note: Effective at standardised doses (~50-60 mg harpagoside/day); an aqueous extract was non-inferior
    to rofecoxib for short-term chronic low back pain; Relief of chronic non-specific low back pain
  reference_ids:
  - REF-0443
  - REF-0444
  - REF-0561
  - REF-0562
  status: verified
- condition: headache
  note: inferred from analgesic action
  reference_ids:
