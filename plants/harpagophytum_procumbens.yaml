contraindications:
- note: Because it is a bitter that increases stomach-acid and bile secretion, it is contraindicated in
    active peptic ulcer, gastritis and (without medical supervision) gallstones.
  severity: caution
  reference_ids:
  - REF-0443
  status: verified
- note: May add to the effect of anticoagulants (e.g. warfarin) and may influence blood sugar, blood pressure
    and heart rhythm; use caution with these medicines.
  severity: caution
  reference_ids:
  - REF-0443
  status: verified
- note: Avoid during pregnancy (oxytocic/uterine effect) and while breastfeeding.
  severity: caution
  reference_ids:
