  - REF-0444
  status: needs-review
- condition: pain
  note: Anti-inflammatory and analgesic for osteoarthritis (hip and knee) pain; Effective at standardised
    doses (~50-60 mg harpagoside/day); an aqueous extract was non-inferior to rofecoxib for short-term
    chronic low back pain; General joint pain and arthritis support; Relief of chronic non-specific low
    back pain
  reference_ids:
  - REF-0443
  - REF-0444
  - REF-0561
  - REF-0562
  status: verified
- condition: skin-irritation
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0443
  - REF-0444
  status: needs-review
contraindications:
- note: Because it is a bitter that increases stomach-acid and bile secretion, it is contraindicated in
    active peptic ulcer, gastritis and (without medical supervision) gallstones.
  severity: caution
  reference_ids:
  - REF-0443
  status: verified
- note: May add to the effect of anticoagulants (e.g. warfarin) and may influence blood sugar, blood pressure
    and heart rhythm; use caution with these medicines.
  severity: caution
  reference_ids:
  - REF-0443
  status: verified
- note: Avoid during pregnancy (oxytocic/uterine effect) and while breastfeeding.
  severity: caution
  reference_ids:
  - REF-0443
  status: verified
