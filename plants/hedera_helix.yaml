contraindications:
- note: Generally well tolerated; occasional gastrointestinal upset or, rarely, allergic reaction. Use
    only standardised extract products - the fresh raw plant contains irritant saponins and falcarinol
    that can cause contact dermatitis.
  severity: info
  reference_ids:
  - REF-0472
  status: verified
- note: A cough lasting more than a week, or with fever, breathlessness or purulent sputum, needs medical
    assessment. Safety in pregnancy and breastfeeding is not established.
  severity: caution
  reference_ids:
