constituents:
- name: Triterpene saponins (hederacoside C, alpha-hederin)
  compounds:
  - triterpene-saponin
  - terpene
  - saponin
  note: The secretolytic and antispasmodic active constituents; extracts are standardised to them.
  reference_ids:
