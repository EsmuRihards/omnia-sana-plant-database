internal_notes: 'Enriched 2026-06-12 from scientific literature (two clinical effectiveness studies of
  standardised ivy-leaf extract in acute bronchitis / productive cough). Originally a skeleton imported
  from the omniasana.bio Symptom-to-Plant Lookup tool (cough, bronchitis); associations retained and now
  part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced randomized, double-blind, placebo-controlled
  multicentre trial of the EA 575 ivy-leaf extract in adults with acute cough, showing a significant,
  clinically relevant reduction in cough severity with onset within 48 hours (REF-0575). | 2026-06-15:
  migrated to entity schema (actions->vocab ids, indications split out, constituents linked to compounds).
  | 2026-06-20: added 3 PubMed-sourced references to the plant-level references bucket (least-cited enrichment):
  REF-0833, REF-0834, REF-0835. | 2026-06-20: enriched to >=10 scientific publications: added 11 PubMed-verified
  @article sources (REF-0834, REF-0833, REF-2308, REF-2309, REF-2310, REF-0835, REF-2311, REF-2312, REF-2313,
  REF-2314, REF-2315) — woven into relevant actions/indications and the plant-level references bucket.'
