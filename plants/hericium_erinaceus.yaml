id: hericium-erinaceus
scientific_name: Hericium erinaceus
common_names:
- Lions mane
- Lauvas krēpes
family: Hericiaceae
external_ids:
  gbif: 5248508
  wikidata: Q19737
parts_used:
- Fruiting body
- Mycelium
constituents:
- name: Erinacines and hericenones
  note: Diterpenoid erinacines (concentrated in the mycelium) and aromatic hericenones (in the fruiting
    body) are the signature low-molecular-weight compounds that stimulate nerve growth factor synthesis
    and underlie the mushroom's neurotrophic and neuroprotective effects.
  reference_ids:
  - REF-0642
  - REF-2419
  - REF-2421
- name: Polysaccharides (beta-glucans)
  compounds:
  - polysaccharide
  note: High-molecular-weight fruiting-body and mycelial polysaccharides with immunomodulatory, anti-inflammatory
    and prebiotic activity — alleviating ulcerative colitis, activating macrophages and supporting gut
    microbiota.
  reference_ids:
  - REF-0643
  - REF-0644
  - REF-2420
botanical_description:
  text: Wood-decay fungus (not a true plant) forming a distinctive rounded, cushion-like fruiting body
    covered in long, dangling, tooth-like spines rather than gills or pores, resembling a white or cream
    'lion's mane' or icicle cluster. It grows as a single mass rather than a typical cap-and-stem mushroom,
    on wounds or dead wood of hardwood trees.
  height: Fruiting body 5-40 cm across
  habit: Wood-decay fungus forming a rounded, spine-covered fruiting body
  leaves: Not applicable (fungus)
  flowers: Not applicable (fungus); reproduces by spores
  stem: No true cap-and-stem structure; a single cushion-like mass of hanging spines
  root: Mycelium spreading through the wood substrate
  fruit: Long, dangling, tooth-like spines bearing the spore-producing surface
  flowering_period: Fruiting body develops over weeks on wounds or dead hardwood
  status: draft
habitat:
  text: Grows on wounds, dead or dying wood of hardwood trees (notably oak and beech) in temperate forests
    of the Northern Hemisphere; also widely cultivated commercially on hardwood logs or sawdust substrate.
  status: draft
harvesting:
  text: Wild fruiting bodies are collected once mature; cultivated material is harvested from logs or
    substrate at maturity, then used fresh, dried, or processed into mycelium-based supplements.
  parts:
  - Fruit
  - Mycelium
  status: draft
traditional_uses:
  text: Lion's mane has a long East Asian culinary and medicinal tradition, valued in Chinese and Japanese
    medicine as a digestive tonic and, more recently, intensively studied for its unique ability to stimulate
    nerve growth factor, giving it a modern reputation as a neurotrophic and cognitive-support mushroom.
  reference_ids:
  - REF-0642
  status: verified
preparations:
- name: Standardised extract
  text: Fruiting-body or mycelium extract standardised to erinacine or hericenone content, taken as capsules
    or powder; the form used in most clinical cognitive-support studies.
  reference_ids:
  - REF-0642
  status: verified
- name: Fresh/dried fruiting body (culinary)
  text: Fresh or dried fruiting body cooked and eaten as a food, the traditional East Asian form of use.
  status: draft
dosage:
- name: Standardised extract
  text: A 49-week double-blind randomised trial in mild Alzheimer's disease used three erinacine A-enriched
    H. erinaceus mycelia capsules per day at 350 mg per capsule, i.e. 1050 mg daily. Other clinical studies
    of cognitive support commonly use around 1-3 g of dried fruiting body extract daily. Educational reference
    only, not a prescription.
  reference_ids:
  - REF-2419
  status: verified
