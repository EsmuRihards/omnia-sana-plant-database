internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx).
  reference_ids are plant-level: the book lists parts and actions as flat, unmapped lists, so the full
  set of references cited for this plant is attached to each action rather than split per action. constituents
  not yet extracted — manual enrichment pending. Further enriched 2026-06-14 with six PubMed-sourced studies
  (REF-0640..REF-0645): two randomised controlled trials of cognition/mood in healthy adults (REF-0640,
  REF-0641), a neurotrophic/neuroprotective review of erinacines and hericenones (REF-0642), polysaccharide
  studies on ulcerative colitis and macrophage immunomodulation (REF-0643, REF-0644), and clinical/preclinical
  evidence in chronic atrophic gastritis and Helicobacter pylori (REF-0645); erinacine/hericenone and
  polysaccharide constituents added. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications
  split out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific publications:
  added 5 PubMed-verified @article sources (REF-0642, REF-2418, REF-2419, REF-2420, REF-2421) — woven
  into relevant actions/indications and the plant-level references bucket.'
