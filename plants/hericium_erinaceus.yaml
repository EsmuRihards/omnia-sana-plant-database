constituents:
- name: Erinacines and hericenones
  note: Diterpenoid erinacines (concentrated in the mycelium) and aromatic hericenones (in the fruiting
    body) are the signature low-molecular-weight compounds that stimulate nerve growth factor synthesis
    and underlie the mushroom's neurotrophic and neuroprotective effects.
  reference_ids:
  - REF-0642
- name: Polysaccharides (beta-glucans)
  note: High-molecular-weight fruiting-body and mycelial polysaccharides with immunomodulatory, anti-inflammatory
    and prebiotic activity — alleviating ulcerative colitis, activating macrophages and supporting gut
    microbiota.
  reference_ids:
  - REF-0643
  - REF-0644
contraindications:
- note: Mild gastrointestinal upset (nausea, bloating, diarrhoea) is the most common side effect. Rare
    allergic reactions can occur, particularly in individuals sensitive to mushrooms, and it may slightly
    lower blood sugar or have mild blood-thinning effects, so caution is advised for people on diabetes
    or anticoagulant medications.
  reference_ids:
  - REF-0157
  - REF-0170
  - REF-0179
  status: verified
- note: Duke (2002) does not include a dedicated entry for Lion's mane mushroom (Hericium erinaceus) in
    the Handbook of Medicinal Herbs, Second Edition.
  reference_ids:
  - REF-0157
