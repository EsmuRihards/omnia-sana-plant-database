id: hericium-erinaceus
scientific_name: Hericium erinaceus
common_names:
- Lions mane
- Lauvas krēpes
family: Hericiaceae
parts_used:
- Fruit
- Mycelium
constituents:
- name: Erinacines and hericenones
  note: Diterpenoid erinacines (concentrated in the mycelium) and aromatic hericenones (in the fruiting
    body) are the signature low-molecular-weight compounds that stimulate nerve growth factor synthesis
    and underlie the mushroom's neurotrophic and neuroprotective effects.
  reference_ids:
  - REF-0642
  - REF-2419
  - REF-2421
- name: Polysaccharides (beta-glucans)
  compounds:
  - polysaccharide
  note: High-molecular-weight fruiting-body and mycelial polysaccharides with immunomodulatory, anti-inflammatory
    and prebiotic activity — alleviating ulcerative colitis, activating macrophages and supporting gut
    microbiota.
  reference_ids:
  - REF-0643
  - REF-0644
  - REF-2420
