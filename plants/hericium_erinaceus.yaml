internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx). reference_ids are
  plant-level: the book lists parts and actions as flat, unmapped lists, so the full set of references cited
  for this plant is attached to each action rather than split per action. constituents not yet extracted —
  manual enrichment pending. Further enriched 2026-06-14 with six PubMed-sourced studies
  (REF-0640..REF-0645): two randomised controlled trials of cognition/mood in healthy adults (REF-0640,
  REF-0641), a neurotrophic/neuroprotective review of erinacines and hericenones (REF-0642), polysaccharide
  studies on ulcerative colitis and macrophage immunomodulation (REF-0643, REF-0644), and
  clinical/preclinical evidence in chronic atrophic gastritis and Helicobacter pylori (REF-0645);
  erinacine/hericenone and polysaccharide constituents added. | 2026-06-15: migrated to entity schema
  (actions->vocab ids, indications split out, constituents linked to compounds). | 2026-06-20: enriched to
  >=10 scientific publications: added 5 PubMed-verified @article sources (REF-0642, REF-2418, REF-2419,
  REF-2420, REF-2421) — woven into relevant actions/indications and the plant-level references bucket. |
  2026-07-11: added monograph-base fields (botanical_description, habitat, harvesting, traditional_uses,
  preparations, dosage) sourced from the existing references bucket; general/undated claims marked status:
  draft per the integrity-first sourcing policy. | 2026-07-13: added anticancer action (where absent) +
  cancer indication (anticancer/antitumour research) sourced from the plant''s cited literature, as part of
  the cancer-condition campaign. | 2026-07-18 (dosage-sourcing campaign, batch 8): dosage sourced to
  REF-2419, a 49-week double-blind randomised trial in mild Alzheimer''s disease that administered three
  erinacine A-enriched H. erinaceus mycelia capsules per day at 350 mg per capsule (1050 mg/day). The
  entry''s existing ''1-3 g of dried fruiting body extract daily'' was kept as the broader clinical range
  but the trial''s exact administered dose now leads. No EMA or WHO monograph covers Hericium. | 2026-07-20:
  parts_used ''Fruit'' renamed to ''Fruiting body''. Terminology correction, not a new claim — a fungus has
  no fruit, and this record''s own preparations[] already reads "Fresh/dried fruiting body (culinary)" and
  its dosage entry already says "dried fruiting body extract". The old string also collided with the
  botanical ''Fruit'' bucket shared by hawthorn, rosehip and other berries (17 plants), which would silently
  join a mushroom to berry-extraction records in any part-keyed join. No source is cited because no new
  factual assertion is made; this aligns the field with what the record already states elsewhere.'