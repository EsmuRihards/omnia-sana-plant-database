botanical_description:
  text: Erect, branching annual to short-lived perennial shrub with reddish stems and deeply lobed, palmate
    leaves. Pale yellow to pink hibiscus-type flowers with a dark centre open briefly, followed by the
    fleshy, bright red calyx (sepals) that swells around the seed capsule - this calyx, not the flower
    petals, is the part harvested and used.
  height: 1-2.5 m
  habit: Erect, branching annual to short-lived perennial shrub
  leaves: Deeply lobed, palmate
  flowers: Pale yellow to pink, hibiscus-type, with a dark centre, short-lived
  stem: Reddish, branching
  root: Taproot with fibrous lateral roots
  fruit: Fleshy, bright red calyx surrounding a seed capsule (the calyx is the medicinal/culinary part)
  flowering_period: Summer to autumn
  status: draft
habitat:
  text: Believed native to West Africa; widely cultivated throughout the tropics and subtropics (Africa,
    Asia, the Caribbean and Central America) for its edible calyces.
  status: draft
harvesting:
  text: The fleshy red calyces are hand-picked shortly after the flower petals fall, while still fresh
    and plump, then separated from the seed pod and dried for storage.
  parts:
  - Calyx (dried flower calyces)
  status: draft
traditional_uses:
  text: Hibiscus calyx (known as roselle, sorrel or karkade in different regions) has a long traditional
    use across Africa, the Middle East and the Caribbean as a tart, cooling beverage and folk remedy for
    fevers and mild hypertension; this traditional blood-pressure-lowering reputation is now well supported
    by clinical trials of hibiscus tea/extract.
  reference_ids:
  - REF-0464
  status: verified
preparations:
- name: Infusion ('hibiscus tea')
  text: Dried calyces steeped in hot or cold water as a tart, ruby-red infusion; the form used in most
    clinical blood-pressure studies.
  reference_ids:
  - REF-0464
  status: verified
- name: Standardised extract
  text: Concentrated calyx extract, taken as capsules for cardiometabolic support.
  reference_ids:
  - REF-0464
  status: verified
- name: Culinary use
  text: Fresh or dried calyces used in cooking, jams and cold beverages, especially across West Africa
    and Latin America.
  status: draft
dosage:
- name: Infusion
  text: Clinical trials for blood pressure commonly use around 1.5-3 g of dried calyx (roughly one to
    two cups of tea) daily. Educational reference only, not a prescription.
  reference_ids:
  - REF-0464
  status: draft
