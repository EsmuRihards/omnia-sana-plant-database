common_names:
- Hibiscus
- Roselle
- Sorrel
- Karkade
scientific_name: Hibiscus sabdariffa
family: Malvaceae
parts_used:
- name: Calyx (dried flower calyces)
  medicinal_actions:
  - action: Lowers blood pressure, with the greatest effect in people with raised blood pressure
    reference_ids:
    - REF-0464
    - REF-0465
    status: verified
  - action: Improves the lipid profile - lowers LDL and total cholesterol
    reference_ids:
    - REF-0464
    - REF-0465
    status: verified
  - action: Antioxidant
    reference_ids:
    - REF-0464
    status: verified
constituents:
- name: Anthocyanins (delphinidin and cyanidin glucosides)
  note: The red pigments and principal antioxidant/vasoactive constituents.
  reference_ids:
  - REF-0464
- name: Organic acids (including hibiscus/hydroxycitric acid) and polyphenols
  note: Contribute to the tartness and cardiometabolic effects.
  reference_ids:
  - REF-0464
- name: Flavonoids
  note: Additional antioxidant constituents.
  reference_ids:
  - REF-0464
contraindications:
- note: Its blood-pressure-lowering effect can add to that of antihypertensive medicines; monitor blood
    pressure if you take them.
  reference_ids:
  - REF-0464
  status: verified
- note: May alter the absorption or levels of some medicines (e.g. paracetamol, chloroquine); avoid concentrated
    or medicinal doses in pregnancy.
  reference_ids:
  - REF-0464
  status: needs-review
