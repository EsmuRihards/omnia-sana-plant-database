drug_class_interactions:
- drug_class: antihypertensives
  severity: caution
  mechanism: 'Hibiscus (roselle) lowers systolic and diastolic blood pressure in trials (a meta-analysis found reductions of about 7.6/3.5 mmHg); combined with blood-pressure medicines it may add to their effect and cause blood pressure to drop too low, so monitor blood pressure.'
  reference_ids:
  - REF-2488
  - REF-2527
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: olea-europaea
  type: caution
  note: 'Hibiscus and olive leaf can each mildly lower blood pressure, so taking them together — especially alongside blood-pressure medicines — may add up and lower blood pressure more than expected. Monitor your blood pressure.'
  reference_ids:
  - REF-2527
  - REF-2537
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: nigella-sativa
  type: caution
  note: 'Hibiscus and black seed (Nigella sativa) can each mildly lower blood pressure, so taking them together — especially alongside blood-pressure medicines — may add up and lower blood pressure more than expected. Monitor your blood pressure.'
  reference_ids:
  - REF-2527
  - REF-2512
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
