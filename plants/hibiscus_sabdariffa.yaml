contraindications:
- note: Its blood-pressure-lowering effect can add to that of antihypertensive medicines; monitor blood
    pressure if you take them. Note that it is not superior to standard antihypertensive drugs and did
    not significantly lower blood pressure in the metabolic-syndrome subgroup.
  severity: info
