internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx). reference_ids are
  plant-level: the book lists parts and actions as flat, unmapped lists, so the full set of references cited
  for this plant is attached to each action rather than split per action. constituents not yet extracted —
  manual enrichment pending. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split
  out, constituents linked to compounds). | 2026-06-20: added 3 PubMed-sourced references to the plant-level
  references bucket (least-cited enrichment): REF-0836, REF-0837, REF-0838. | 2026-06-20: enriched to >=10
  scientific publications: added 11 PubMed-verified @article sources (REF-2317, REF-2318, REF-2319,
  REF-2320, REF-2321, REF-2322, REF-2323, REF-2324, REF-2325, REF-2326, REF-2327) — woven into relevant
  actions/indications and the plant-level references bucket. | 2026-07-11: added monograph-base fields
  (botanical_description, habitat, harvesting, traditional_uses, preparations, dosage + constituents)
  sourced from the existing references bucket; general/undated claims marked status: draft per the
  integrity-first sourcing policy. | 2026-07-13: added anticancer action (where absent) + cancer indication
  (anticancer/antitumour research) sourced from the plant''s cited literature, as part of the
  cancer-condition campaign. | 2026-07-19 (dosage-sourcing campaign, closing sweep): DOCUMENTED DEAD END -
  closing sweep of the dosage-sourcing campaign. The remaining unsourced dosage entry/entries on this record
  were searched against every seam this campaign opened and none yields a dose for this species in this
  preparation. Seams checked: (1) the official EMA herbal medicines register
  (medicines-output-herbal_medicines-report, 251 rows, retrieved 2026-07-18), matched on the accepted
  binomial AND on every synonym and common name appearing in a register row; (2) WHO monographs on selected
  medicinal plants Volumes 1-4, indexed by Latin drug title with each monograph''s Definition read to
  confirm the species - 177 monographs indexed; (3) this plant''s own reference bucket, mined for human
  studies that state an administered dose. Per the campaign''s integrity bar the entry is left unsourced at
  status draft rather than attached to a tangentially-related paper. SPECIFIC FINDING: a PubMed search did
  surface one apparently ideal source - a randomised controlled trial of seabuckthorn seed oil at 0.75 mL
  daily for 30 days in hypertensive subjects (Clin Nutr 2016, PMID 27522605). It was NOT used because PubMed
  flags it as a RETRACTED PUBLICATION. Retracted work must not be cited as a dose source. No other human
  trial stating a sea-buckthorn oil dose was found.'