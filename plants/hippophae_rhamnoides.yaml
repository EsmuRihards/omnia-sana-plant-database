id: hippophae-rhamnoides
scientific_name: Hippophae rhamnoides
common_names:
- Sea buckthorn
- common sea buckthorn
- seaberry
family: Elaeagnaceae
external_ids:
  gbif: 3039285
  powo: 'urn:lsid:ipni.org:names:323851-1'
  wikidata: Q165378
parts_used:
- Fruit
- Leaf
