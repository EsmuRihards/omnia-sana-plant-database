contraindications:
- note: Berries and juice are safe as food. Seed oil is safe topically and orally in moderate amounts.
    May have mild anticoagulant effects. May lower blood pressure and blood sugar — use caution with medications.
    Allergic reactions are rare.
  severity: caution
  reference_ids:
  - REF-0049
  - REF-0206
  - REF-0319
  status: verified
- note: Duke (2002) rates sea buckthorn as +++ and notes antioxidant, hepatoprotective, antiulcer, and
    vulnerary activities at the experimental level (score 1). The berries are exceptionally rich in vitamins
    C (one of the highest natural sources) and E, carotenoids, flavonoids, and omega-7 fatty acids (palmitoleic
    acid). Duke recommends sea buckthorn as a 'food farmacy' — consumed as part of the regular diet for
    its nutritional-medicinal benefits. Its radioprotective properties have been studied, though without
    strong clinical validation. No significant safety concerns at food doses (Duke, 2002).
  severity: info
  reference_ids:
  - REF-0049
  - REF-0206
  - REF-0319
  status: verified
