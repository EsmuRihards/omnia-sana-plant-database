id: humulus-lupulus
scientific_name: Humulus lupulus
common_names:
- Hop
- Hops
- common hop
- hop vine
family: Cannabaceae
parts_used:
- Flower
botanical_description:
  text: Vigorous, twining perennial climbing vine with rough, hairy stems and deeply lobed, opposite leaves
    resembling grape leaves. The plant is dioecious; female plants bear the characteristic papery, cone-like
    flower clusters ('hops'), covered in yellow, resinous lupulin glands, that are the medicinal and brewing
    part.
  height: Climbing vine to 6-8 m
  habit: Vigorous, twining, dioecious perennial climbing vine
  leaves: Deeply lobed, opposite, rough-textured, resembling grape leaves
  flowers: Papery, cone-like female flower clusters covered in yellow resinous lupulin glands
  stem: Rough, hairy, twining, climbing without tendrils
  root: Perennial rootstock (rhizome) sending up new climbing stems each year
  fruit: Small achene within the papery cone
  flowering_period: Late summer
  reference_ids:
  - REF-0839
  status: verified
habitat:
  text: Grows in hedgerows, woodland edges and damp thickets, climbing over other vegetation; native to
    Europe, Western Asia and North America, and widely cultivated for brewing.
  status: draft
harvesting:
  text: The female flower cones are picked in late summer once mature (when the lupulin glands are fully
    developed and sticky), then dried quickly to preserve the volatile oils and bitter resins.
  parts:
  - Flower
  season: Late summer, at cone maturity
  reference_ids:
  - REF-0839
  status: verified
traditional_uses:
  text: Hop cones have a long European tradition as a calming, sedative herb for nervous tension, restlessness
    and insomnia, and as a bitter digestive tonic; the sedative reputation, historically noted among hop-pickers
    who became drowsy from handling the cones, is now linked to GABA-A receptor-active bitter resins.
  reference_ids:
  - REF-0839
  status: verified
preparations:
- name: Infusion
  text: Dried flower cones infused in hot water as a traditional calming, sleep-supporting tea, often
    combined with valerian.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried cones.
  status: draft
- name: Standardised extract
  text: Concentrated extract standardised to xanthohumol/humulone content, studied for sleep-enhancing
    activity via GABA-A receptor modulation.
  reference_ids:
  - REF-0839
  status: verified
dosage:
- name: Infusion
  text: Traditional herbal references suggest around 0.5 g of dried flower per cup, taken before bed.
    Educational reference only, not a prescription.
  status: draft
constituents:
- name: Bitter acids (humulone, lupulone)
  note: Alpha- and beta-bitter acids responsible for the characteristic bitterness and much of the sedative,
    GABA-A-receptor-active and antimicrobial activity.
  reference_ids:
  - REF-0839
- name: Prenylflavonoids (xanthohumol, 8-prenylnaringenin)
  compounds:
  - flavonoid
  note: Xanthohumol has antioxidant activity; 8-prenylnaringenin has notable phytoestrogenic activity,
    the basis of the mild oestrogenic caution.
  reference_ids:
  - REF-1726
- name: Essential oil
  compounds:
  - essential-oil
  note: Aromatic volatile oil contributing to the characteristic hop aroma.
  reference_ids:
  - REF-0839
