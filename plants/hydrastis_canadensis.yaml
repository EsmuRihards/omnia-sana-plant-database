common_names:
- Goldenseal
- Orange root
- Yellow root
- Ground raspberry
scientific_name: Hydrastis canadensis
family: Ranunculaceae
parts_used:
- name: Rhizome and root
  medicinal_actions:
  - action: Antimicrobial (berberine) - supports skin, mucosal and gastrointestinal infections and sore
      throat
    reference_ids:
    - REF-0455
    - REF-0456
    status: verified
  - action: Anti-inflammatory and astringent for inflamed mucous membranes (sore-throat gargle, mouth)
    reference_ids:
    - REF-0455
    status: verified
  - action: Digestive / gastrointestinal support (traditional for dyspepsia and ulcers)
    reference_ids:
    - REF-0455
    status: needs-review
  - action: Topical for skin infections and irritation
    reference_ids:
    - REF-0455
    status: needs-review
constituents:
- name: Isoquinoline alkaloids - berberine (principal), hydrastine and canadine
  note: Berberine is the main antimicrobial, hypoglycaemic and hypolipidaemic constituent.
  reference_ids:
  - REF-0455
  - REF-0456
contraindications:
- note: 'Contraindicated in pregnancy and breastfeeding: berberine crosses the placenta and into milk
    and can cause or worsen newborn jaundice (risk of kernicterus); do not give to infants.'
  reference_ids:
  - REF-0455
  status: verified
- note: Berberine strongly inhibits drug-metabolising enzymes (especially CYP3A4 and CYP2D6), so it can
    raise the blood levels of many medicines - a significant herb-drug-interaction risk. High doses have
    shown possible liver, nerve and photo-toxicity.
  reference_ids:
  - REF-0455
  status: verified
