contraindications:
- note: 'Contraindicated in pregnancy and breastfeeding: berberine crosses the placenta and into milk
    and can cause or worsen newborn jaundice (risk of kernicterus); do not give to infants.'
  severity: caution
  reference_ids:
  - REF-0455
  status: verified
- note: Berberine strongly inhibits drug-metabolising enzymes (especially CYP3A4 and CYP2D6), so it can
    raise the blood levels of many medicines - a significant herb-drug-interaction risk. In a screen of
    commercial herbal products, goldenseal was among the most potent CYP2D6 inhibitors and also inhibited
    CYP3A4. High doses have shown possible liver, nerve and photo-toxicity.
  severity: caution
  reference_ids:
  - REF-0455
  - REF-0589
  status: verified
