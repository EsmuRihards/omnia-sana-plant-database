common_names:
- Goldenseal
- Orange root
- Yellow root
- Ground raspberry
scientific_name: Hydrastis canadensis
family: Ranunculaceae
parts_used:
- name: Rhizome and root
  medicinal_actions:
  - action: Antimicrobial (berberine) - supports skin, mucosal and gastrointestinal infections and sore
      throat
    reference_ids:
    - REF-0455
    - REF-0456
    - REF-0588
    status: verified
  - action: Anti-inflammatory and astringent for inflamed mucous membranes (sore-throat gargle, mouth)
    reference_ids:
    - REF-0455
    status: verified
  - action: Digestive / gastrointestinal support (traditional for dyspepsia and ulcers)
    reference_ids:
    - REF-0455
    status: needs-review
  - action: Topical for skin infections and irritation - whole-leaf extract is active in vitro against
      methicillin-resistant Staphylococcus aureus (MRSA)
    reference_ids:
    - REF-0455
    - REF-0588
    status: needs-review
constituents:
- name: Isoquinoline alkaloids - berberine (principal), hydrastine and canadine
  note: Berberine is the main antimicrobial, hypoglycaemic and hypolipidaemic constituent. Notably, whole-leaf
    extracts are more potent against MRSA than isolated berberine (owing to efflux-pump-inhibitory flavonoids)
    and show quorum-quenching, anti-virulence activity.
  reference_ids:
  - REF-0455
  - REF-0456
  - REF-0588
contraindications:
- note: 'Contraindicated in pregnancy and breastfeeding: berberine crosses the placenta and into milk
    and can cause or worsen newborn jaundice (risk of kernicterus); do not give to infants.'
  reference_ids:
  - REF-0455
  status: verified
- note: Berberine strongly inhibits drug-metabolising enzymes (especially CYP3A4 and CYP2D6), so it can
    raise the blood levels of many medicines - a significant herb-drug-interaction risk. In a screen of
    commercial herbal products, goldenseal was among the most potent CYP2D6 inhibitors and also inhibited
    CYP3A4. High doses have shown possible liver, nerve and photo-toxicity.
  reference_ids:
  - REF-0455
  - REF-0589
  status: verified
internal_notes: Enriched 2026-06-12 from scientific literature (Pharmacological Research critical review;
  European Journal of Medicinal Chemistry berberine review). Originally a skeleton imported from the omniasana.bio
  Symptom-to-Plant Lookup tool (infection, sore-throat, indigestion, skin-irritation); associations retained
  and now part-mapped and cited. NOTE pregnancy/infant contraindication and CYP drug interactions. Further
  enriched 2026-06-14 with a PubMed-sourced study showing whole-leaf goldenseal extract acts against MRSA
  by quorum-quenching and efflux-pump inhibition (more potent than berberine alone) (REF-0588) and a CYP-inhibition
  screen confirming goldenseal as a strong CYP2D6/CYP3A4 inhibitor (REF-0589).
