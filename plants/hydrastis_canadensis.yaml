parts_used:
- Rhizome and root
constituents:
- name: Isoquinoline alkaloids - berberine (principal), hydrastine and canadine
  compounds:
  - flavonoid
  - alkaloid
  - berberine
  note: Berberine is the main antimicrobial, hypoglycaemic and hypolipidaemic constituent. Notably, whole-leaf
    extracts are more potent against MRSA than isolated berberine (owing to efflux-pump-inhibitory flavonoids)
    and show quorum-quenching, anti-virulence activity.
  reference_ids:
  - REF-0455
  - REF-0456
  - REF-0588
botanical_description:
  text: Low, woodland perennial herb rising from a knotted, bright yellow rhizome with wiry yellow roots.
    Each stem bears two ragged, palmately lobed, maple-like leaves and a single small, inconspicuous greenish-white
    flower, followed by a raspberry-like cluster of red berries.
  height: 15-30 cm
  habit: Low, woodland perennial herb
  leaves: Two per stem, ragged, palmately lobed, maple-like
  flowers: Single, small, inconspicuous, greenish-white, petal-less
  stem: Hairy, upright, bearing two leaves
  root: Knotted, bright yellow rhizome with wiry yellow roots (the medicinal part)
  fruit: Raspberry-like cluster of red berries
  flowering_period: April-May
  reference_ids:
  - REF-0455
  status: verified
habitat:
  text: Grows in rich, shaded deciduous woodland with humus-rich soil; native to eastern North America,
    now scarce in the wild due to overharvesting and largely supplied by cultivation.
  reference_ids:
  - REF-0455
  status: verified
harvesting:
  text: The rhizome and root are dug in autumn from plants at least three to four years old, when berberine
    content is highest, then cleaned and dried; because wild populations are depleted, cultivated or sustainably
    sourced material is strongly preferred, and careful identification against the toxic mayapple and
    bloodroot, which share its woodland habitat, is essential before any wild-harvesting.
  parts:
  - Rhizome and root
  season: Autumn, from mature (3-4+ year) plants
  reference_ids:
  - REF-0455
  status: verified
traditional_uses:
  text: Goldenseal root has a Native American and, after adoption by Eclectic physicians, wider North
    American tradition as a bitter tonic and antimicrobial remedy for mucous-membrane infections, sore
    throat, digestive upset and topical skin infections, directly reflecting its high berberine content.
  reference_ids:
  - REF-0455
  status: verified
preparations:
- name: Decoction
  text: Dried rhizome and root simmered in water as a traditional bitter antimicrobial tea, or used as
    a gargle for sore throat.
  reference_ids:
  - REF-0455
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried rhizome and root.
  status: draft
- name: Standardised extract
  text: Extract standardised to berberine/hydrastine content, taken as capsules; whole-leaf extracts have
    shown stronger antimicrobial activity than isolated berberine in some studies.
  reference_ids:
  - REF-0588
  status: verified
dosage:
- name: Decoction/tincture
  text: The WHO monograph on Rhizoma Hydrastis gives a daily dose of 0.5-1.0 g of the dried rhizome and
    root three times, or taken as a decoction; a 1:1 liquid extract in 60% ethanol at 0.3-1.0 mL three
    times; or a 1:10 tincture in 60% ethanol at 2-4 mL three times. For short-term use only, given goldenseal's
    potent CYP-enzyme inhibition and its contraindication in pregnancy. Educational reference only, not
    a prescription.
  reference_ids:
  - REF-3095
  status: verified
