contraindications:
- note: 'Significant drug interactions: strongly induces CYP3A4 and P-glycoprotein, reducing plasma levels
    of many drugs including oral contraceptives, antiretrovirals, cyclosporine, warfarin, and digoxin.
    May cause photosensitivity (fair-skinned individuals). Do not combine with SSRIs, SNRIs, or MAOIs
    (serotonin syndrome risk). Avoid in bipolar disorder.'
  severity: caution
  reference_ids:
  - REF-0092
  - REF-0154
  - REF-0181
  status: verified
- note: 'Duke (2002) rates St. John''s wort as ++ (raised from earlier editions) and notes antidepressant,
    antiviral, antibacterial, and wound-healing activities at experimental and clinical levels. Hypericin
    and hyperforin are identified as key active constituents. Clinical evidence (score 2) confirms antidepressant
    efficacy in mild-to-moderate depression, and WHO/Commission E provide approval for this indication.
    Dose: 300 mg standardized extract (0.3% hypericin, 3–5% hyperforin) three times daily. Duke emphasizes
    the critical drug interaction: St. John''s wort is a potent CYP3A4 inducer and can significantly reduce
    blood levels of many medications including oral contraceptives, cyclosporine, antiretrovirals, and
    warfarin. Avoid combined use with SSRIs (serotonin syndrome risk) and pharmaceutical antidepressants
    (Duke, 2002).'
  severity: caution
  reference_ids:
  - REF-0092
  - REF-0154
  - REF-0181
  status: verified
