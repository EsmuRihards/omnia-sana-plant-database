contraindications:
- note: 'Significant drug interactions: strongly induces CYP3A4 and P-glycoprotein, reducing plasma levels
    of many drugs including oral contraceptives, antiretrovirals, cyclosporine, warfarin, and digoxin.
    May cause photosensitivity (fair-skinned individuals). Do not combine with SSRIs, SNRIs, or MAOIs
    (serotonin syndrome risk). Avoid in bipolar disorder.'
  severity: caution
  reference_ids:
  - REF-0154
  - REF-0181
  status: verified
- note: 'Duke (2002) rates St. John''s wort as ++ (raised from earlier editions) and notes antidepressant,
    antiviral, antibacterial, and wound-healing activities at experimental and clinical levels. Hypericin
    and hyperforin are identified as key active constituents. Clinical evidence (score 2) confirms antidepressant
    efficacy in mild-to-moderate depression, and WHO/Commission E provide approval for this indication.
    Dose: 300 mg standardized extract (0.3% hypericin, 3–5% hyperforin) three times daily. Duke emphasizes
    the critical drug interaction: St. John''s wort is a potent CYP3A4 inducer and can significantly reduce
    blood levels of many medications including oral contraceptives, cyclosporine, antiretrovirals, and
    warfarin. Avoid combined use with SSRIs (serotonin syndrome risk) and pharmaceutical antidepressants
    (Duke, 2002).'
  severity: caution
  reference_ids:
  - REF-0154
  - REF-0181
  status: verified
drug_class_interactions:
- drug_class: antidepressants-serotonergic
  severity: avoid
  mechanism: 'St John''s wort raises serotonin activity; combined with SSRIs, SNRIs or MAOIs it can trigger serotonin syndrome (agitation, tremor, sweating, rapid heartbeat). Reviews of clinical reports document serotonin syndrome and lethargy when it is combined with serotonin-reuptake inhibitors.'
  reference_ids:
  - REF-2434
  - REF-2436
  - REF-2523
  - REF-2522
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antiretrovirals
  severity: avoid
  mechanism: 'Potent CYP3A4 and P-glycoprotein induction lowers antiretroviral levels (indinavir exposure fell ~57%), risking loss of viral control and drug resistance.'
  reference_ids:
  - REF-2431
  - REF-2434
  - REF-2436
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: immunosuppressants
  severity: avoid
  mechanism: 'Enzyme and transporter induction reduces ciclosporin and tacrolimus levels; reported to cause subtherapeutic concentrations and transplant rejection.'
  reference_ids:
  - REF-2432
  - REF-2434
  - REF-2436
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: hormonal-therapies
  severity: avoid
  mechanism: 'Increased metabolism of ethinylestradiol and progestins reduces contraceptive exposure, causing breakthrough bleeding, ovulation and unplanned pregnancy. Randomised and controlled trials in women confirmed more breakthrough bleeding, reduced progestin levels and evidence of ovulation when St John''s wort was added to the pill.'
  reference_ids:
  - REF-2435
  - REF-2434
  - REF-2520
  - REF-2521
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: 'CYP induction increases warfarin clearance and can lower INR, reducing the anticoagulant effect; close monitoring is needed.'
  reference_ids:
  - REF-2436
  - REF-2434
  - REF-2522
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: cardiac-glycosides
  severity: caution
  mechanism: 'P-glycoprotein induction lowers digoxin levels (AUC fell ~25% over ten days), which may reduce its effect.'
  reference_ids:
  - REF-2433
  - REF-2434
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: statins
  severity: caution
  mechanism: 'CYP3A4 induction lowers levels of simvastatin and atorvastatin, potentially weakening their cholesterol-lowering effect.'
  reference_ids:
  - REF-2436
  - REF-2434
  - REF-2522
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: cyp3a4-substrates
  severity: caution
  mechanism: 'As a broad CYP3A4 and P-glycoprotein inducer, St John''s wort can lower levels of many medicines cleared by this pathway; check each medication individually.'
  reference_ids:
  - REF-2434
  - REF-2436
  - REF-2522
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: chemotherapy-agents
  severity: avoid
  mechanism: 'St John''s wort strongly induces CYP3A4 and P-glycoprotein, speeding the breakdown and removal of several cancer medicines. In patients it cut the active form of irinotecan (SN-38) by about 42% and reduced imatinib exposure by roughly a third - enough to weaken treatment and risk drug resistance. Do not take St John''s wort during chemotherapy.'
  reference_ids:
  - REF-2518
  - REF-2519
  - REF-2523
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
