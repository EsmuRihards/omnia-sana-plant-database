pairings:
- partner_id: crocus-sativus
  type: caution
  note: 'St John''s wort raises serotonin activity and can cause serotonin syndrome when combined with other serotonin-boosting agents; pairing it with another mood-active, serotonergic herb such as saffron may add to this risk.'
  reference_ids:
  - REF-2461
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: rhodiola-rosea
  type: caution
  note: 'St John''s wort is a strong enzyme inducer and increases serotonin activity; combining it with another antidepressant-type herb such as rhodiola may add to serotonergic effects and unpredictably change how each is handled by the body.'
  reference_ids:
  - REF-2461
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: valeriana-officinalis
  type: caution
  note: 'St John''s wort speeds up the breakdown of many substances and also raises serotonin activity; pairing it with a sedative herb such as valerian may add to drowsiness and can unpredictably change how each is handled by the body.'
  reference_ids:
  - REF-2461
  - REF-2474
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: piper-methysticum
  type: caution
  note: 'St John''s wort is a strong enzyme inducer and kava is a liver-metabolised sedative; combining them may add to central-nervous-system effects and alter how kava is processed, so combined use warrants caution.'
  reference_ids:
  - REF-2461
  - REF-2474
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
