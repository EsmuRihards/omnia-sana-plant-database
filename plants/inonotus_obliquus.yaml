id: inonotus-obliquus
scientific_name: Inonotus obliquus
common_names:
- Chaga
- Chaga mushroom
- clinker polypore
- birch conk
family: Hymenochaetaceae
external_ids:
  gbif: 2521089
  wikidata: Q1956937
parts_used:
- Mycelium
- Whole Plant
botanical_description:
  text: Parasitic wood-decay fungus (not a true plant) that grows almost entirely inside the trunk of
    living birch trees, visible externally only as a hard, black, cracked, charcoal-like mass (a sclerotium,
    sometimes called a 'conk') erupting through the bark. Unlike typical mushrooms, chaga has no true
    cap, gills or stem; its fertile spore-producing surface develops later, hidden beneath the bark after
    the tree dies.
  height: External mass 10-40 cm
  habit: Parasitic wood-decay fungus, growing mostly inside the host tree
  leaves: Not applicable (fungus)
  flowers: Not applicable (fungus); reproduces by spores
  stem: No true cap-and-stem structure; visible only as a hard black external mass (sclerotium)
  root: Fungal mycelium spreading through the living wood of the host tree
  fruit: Fertile spore-producing layer develops hidden beneath the bark, typically after the host tree
    dies
  flowering_period: The visible black mass persists and grows for years; not a seasonal fruiting body
  reference_ids:
  - REF-0848
  status: verified
habitat:
  text: Grows almost exclusively as a parasite on living birch trees in cold, northern temperate and boreal
    forests of Europe, Russia, North America and Asia.
  reference_ids:
  - REF-0848
  status: verified
harvesting:
  text: The hard black external mass (conk) is chopped or broken away from the living birch trunk, ideally
    without killing the tree, then dried and broken into pieces or ground for use; sustainable harvesting
    (leaving part of the conk to regrow) is recommended given the fungus's slow growth.
  parts:
  - Mycelium
  - Whole Plant
  status: draft
traditional_uses:
  text: Chaga has a long traditional use in Russian, Siberian, Baltic and Scandinavian folk medicine as
    a tonic remedy for digestive complaints, immune support and general vitality, traditionally taken
    as a dark, tea-like decoction; this traditional tonic reputation is now studied for its antioxidant,
    immunomodulatory and anti-inflammatory properties.
  reference_ids:
  - REF-0848
  - REF-2195
  status: verified
preparations:
- name: Decoction
  text: Chunks of the dried black conk simmered gently in water for an extended period, producing a dark,
    tea-like traditional tonic.
  reference_ids:
  - REF-0848
  status: verified
- name: Standardised extract
  text: Extract standardised to polysaccharide or polyphenol content, taken as capsules or powder.
  reference_ids:
  - REF-2195
  status: verified
dosage:
- name: Decoction
  text: Traditional references suggest simmering a small handful of chaga chunks (roughly 5-10 g) in water
    for an extended period, drunk as a daily tonic tea. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Melanin-rich pigments and betulinic acid derivatives
  note: Chaga's dark colour comes from melanin-like pigments; it also concentrates betulinic-acid-type
    triterpenes absorbed from its birch host, associated with antioxidant and anticancer research interest.
  reference_ids:
  - REF-0848
- name: Polysaccharides (beta-glucans)
  compounds:
  - polysaccharide
  note: Immunomodulatory polysaccharides contributing to the traditional tonic and immune-support use.
  reference_ids:
  - REF-2195
- name: Phenolic compounds
  compounds:
  - phenolic-compound
  note: Antioxidant phenolics contributing to chaga's free-radical-scavenging activity.
  reference_ids:
  - REF-2195
