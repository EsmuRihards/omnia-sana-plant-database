contraindications:
- note: 'Autoimmune conditions: Chaga can stimulate parts of the immune system—people with autoimmune
    diseases should be cautious.Blood thinners: Chaga contains compounds that may affect clotting—avoid
    large doses if on anticoagulants.Blood sugar meds: May slightly lower glucose—monitor if taking diabetes
    medication.Pregnancy & breastfeeding: Limited safety data—best avoided unless guided by a professional.Quality
    matters: Wild-harvested Chaga can accumulate heavy metals from trees and soil—source from reputable
    suppliers.'
  severity: caution
