common_names:
- Elecampane
- Horse-heal
- Elf dock
- Scabwort
scientific_name: Inula helenium
family: Asteraceae
parts_used:
- name: Root and rhizome
  medicinal_actions:
  - action: Expectorant for productive cough and bronchitis (long-standing respiratory remedy)
    reference_ids:
    - REF-0445
    status: verified
  - action: Antimicrobial, notably anti-staphylococcal (supports respiratory and skin infection)
    reference_ids:
    - REF-0445
    status: verified
  - action: Soothes irritated airways / chronic catarrh (traditional)
    reference_ids:
    - REF-0445
    status: needs-review
constituents:
- name: Sesquiterpene lactones (alantolactone, isoalantolactone, igalan)
  note: The antimicrobial principles of the root.
  reference_ids:
  - REF-0445
- name: Inulin
  note: A fructan polysaccharide abundant in the root (the genus Inula gives inulin its name).
  reference_ids:
  - REF-0445
- name: Essential oil
  note: Aromatic constituents of the root.
  reference_ids:
  - REF-0445
contraindications:
- note: The sesquiterpene lactones (especially alantolactone) are known skin sensitisers and can cause
    allergic contact dermatitis; people sensitive to the daisy family (Asteraceae) should be cautious.
  reference_ids:
  - REF-0445
  status: verified
- note: Large doses can cause nausea, vomiting and diarrhoea; safety in pregnancy and breastfeeding is
    not established, so avoid medicinal doses.
  reference_ids:
  - REF-0445
  status: needs-review
