  status: needs-review
- condition: respiratory-support
  note: inferred from expectorant action
  reference_ids:
  - REF-0445
  status: needs-review
- condition: skin-irritation
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0538
  status: needs-review
- condition: wounds
  note: inferred from antimicrobial action
  reference_ids:
  - REF-0445
  - REF-0539
  - REF-0540
  status: needs-review
contraindications:
- note: The sesquiterpene lactones (especially alantolactone) are known skin sensitisers and can cause
    allergic contact dermatitis; people sensitive to the daisy family (Asteraceae) should be cautious.
  severity: info
  reference_ids:
  - REF-0445
  status: verified
- note: Large doses can cause nausea, vomiting and diarrhoea; safety in pregnancy and breastfeeding is
    not established, so avoid medicinal doses.
  severity: caution
  reference_ids:
  - REF-0445
  status: needs-review
