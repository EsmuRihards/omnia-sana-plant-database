id: inula-helenium
scientific_name: Inula helenium
common_names:
- Elecampane
- Horse-heal
- Elf dock
- Scabwort
family: Asteraceae
parts_used:
- Root and rhizome
constituents:
- name: Sesquiterpene lactones (alantolactone, isoalantolactone, igalan, diplophyllin)
  compounds:
  - sesquiterpene-lactone
  - sesquiterpene
  note: The antimicrobial and anti-inflammatory principles of the root; the eudesmane core and the alpha,beta-methylene-lactone
    ring are essential for the antimicrobial activity.
  reference_ids:
  - REF-0445
  - REF-0538
  - REF-0539
  - REF-0540
- name: Inulin
  compounds:
  - polysaccharide
  - inulin
  note: A fructan polysaccharide abundant in the root (the genus Inula gives inulin its name).
  reference_ids:
  - REF-0445
- name: Essential oil
  compounds:
  - essential-oil
  note: Aromatic constituents of the root.
  reference_ids:
  - REF-0445
actions:
- action: anti-inflammatory
  note: Anti-inflammatory - sesquiterpene lactones (alantolactone, isoalantolactone) inhibit NF-kB and
    MAPK signalling and pro-inflammatory cytokines; total sesquiterpene lactones eased arthritis in animal
    models (potential in rheumatoid arthritis)
  reference_ids:
  - REF-0538
  - REF-1858
  - REF-1859
  - REF-1860
  - REF-1861
  status: verified
- action: antimicrobial
  note: Antimicrobial, notably anti-staphylococcal (membrane-damaging) and anti-mycobacterial (active
    against Mycobacterium tuberculosis in vitro); supports respiratory and skin infection
  reference_ids:
  - REF-0445
  - REF-0539
  - REF-0540
  - REF-1862
  status: verified
- action: expectorant
  note: Expectorant for productive cough and bronchitis (long-standing respiratory remedy)
  reference_ids:
  - REF-0445
  - REF-1858
  status: verified
indications:
- condition: arthritis
  note: Anti-inflammatory - sesquiterpene lactones (alantolactone, isoalantolactone) inhibit NF-kB and
    MAPK signalling and pro-inflammatory cytokines; total sesquiterpene lactones eased arthritis in animal
    models (potential in rheumatoid arthritis)
  reference_ids:
  - REF-0538
  status: verified
- condition: bronchitis
  note: Expectorant for productive cough and bronchitis (long-standing respiratory remedy)
  reference_ids:
  - REF-0445
  status: verified
- condition: cough
  note: Expectorant for productive cough and bronchitis (long-standing respiratory remedy); Soothes irritated
    airways / chronic catarrh (traditional)
  reference_ids:
  - REF-0445
  status: needs-review
- condition: infection
  note: Antimicrobial, notably anti-staphylococcal (membrane-damaging) and anti-mycobacterial (active
    against Mycobacterium tuberculosis in vitro); supports respiratory and skin infection
  reference_ids:
  - REF-0445
  - REF-0539
  - REF-0540
  status: verified
- condition: inflammation
  note: inferred from anti-inflammatory action
  reference_ids:
