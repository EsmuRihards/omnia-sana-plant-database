internal_notes: 'Enriched 2026-06-12 from scientific literature (Molecules antimicrobial/ethnobotanical study). Further
  enriched 2026-06-13 with three PubMed studies - a total-sesquiterpene-lactone
  anti-inflammatory/anti-arthritic study (REF-0538), an antistaphylococcal essential-oil study (REF-0539)
  and an antimycobacterial eudesmanolide study (REF-0540); a new anti-inflammatory action was added.
  Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (cough, bronchitis,
  infection); associations retained and now part-mapped and cited. | 2026-06-15: migrated to entity schema
  (actions->vocab ids, indications split out, constituents linked to compounds). | 2026-06-20: enriched to
  >=10 scientific publications: added 11 PubMed-verified @article sources (REF-1858, REF-0538, REF-1859,
  REF-1860, REF-1861, REF-1862, REF-1863, REF-1864, REF-1865, REF-1866, REF-1867) — woven into relevant
  actions/indications and the plant-level references bucket. | 2026-07-11: added monograph-base fields
  (botanical_description, habitat, harvesting, traditional_uses, preparations, dosage) sourced from the
  existing references bucket; general/undated claims marked status: draft per the integrity-first sourcing
  policy. | 2026-07-13: added anticancer action (where absent) + cancer indication (anticancer/antitumour
  research) sourced from the plant''s cited literature, as part of the cancer-condition campaign. |
  2026-07-19 (dosage-sourcing campaign, closing sweep): DOCUMENTED DEAD END - closing sweep of the
  dosage-sourcing campaign. The remaining unsourced dosage entry/entries on this record were searched
  against every seam this campaign opened and none yields a dose for this species in this preparation. Seams
  checked: (1) the official EMA herbal medicines register (medicines-output-herbal_medicines-report, 251
  rows, retrieved 2026-07-18), matched on the accepted binomial AND on every synonym and common name
  appearing in a register row; (2) WHO monographs on selected medicinal plants Volumes 1-4, indexed by Latin
  drug title with each monograph''s Definition read to confirm the species - 177 monographs indexed; (3)
  this plant''s own reference bucket, mined for human studies that state an administered dose. Per the
  campaign''s integrity bar the entry is left unsourced at status draft rather than attached to a
  tangentially-related paper.'