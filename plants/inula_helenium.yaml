id: inula-helenium
scientific_name: Inula helenium
common_names:
- Elecampane
- Horse-heal
- Elf dock
- Scabwort
family: Asteraceae
external_ids:
  gbif: 3148340
  wikidata: Q697416
parts_used:
- Root and rhizome
constituents:
- name: Sesquiterpene lactones (alantolactone, isoalantolactone, igalan, diplophyllin)
  compounds:
  - sesquiterpene-lactone
  - sesquiterpene
  note: The antimicrobial and anti-inflammatory principles of the root; the eudesmane core and the alpha,beta-methylene-lactone
    ring are essential for the antimicrobial activity.
  reference_ids:
  - REF-0445
  - REF-0538
  - REF-0539
  - REF-0540
- name: Inulin
  compounds:
  - polysaccharide
  - inulin
  note: A fructan polysaccharide abundant in the root (the genus Inula gives inulin its name).
  reference_ids:
  - REF-0445
- name: Essential oil
  compounds:
  - essential-oil
  note: Aromatic constituents of the root.
  reference_ids:
  - REF-0445
botanical_description:
  text: Tall, robust perennial herb with large, coarse, hairy leaves - broadly oval near the base and
    progressively smaller up the stem - arising from a thick, aromatic rhizome. Large, shaggy, bright
    yellow daisy-like flower heads with numerous narrow ray florets are borne at the top of stout, branching
    stems.
  height: 1-2.5 m
  habit: Tall, robust, coarse-leaved perennial herb
  leaves: Large, coarse, hairy, broadly oval near the base, smaller up the stem
  flowers: Large, shaggy, bright yellow daisy-like heads with numerous narrow ray florets
  stem: Stout, branching, hairy
  root: Thick, aromatic, branching rhizome (the medicinal part)
  fruit: Small achene with a pappus
  flowering_period: July-August
  reference_ids:
  - REF-0445
  status: verified
habitat:
  text: Grows in damp meadows, pastures, roadsides and woodland margins on moist, rich soils; native to
    Europe and Western Asia and naturalised in North America.
  reference_ids:
  - REF-0445
  status: verified
harvesting:
  text: The root and rhizome are dug in autumn of the second or later year, when sesquiterpene lactone
    and inulin content is highest, then cleaned, sliced and dried.
  parts:
  - Root and rhizome
  season: Autumn, from second-year or older plants
  reference_ids:
  - REF-0445
  status: verified
traditional_uses:
  text: Elecampane root has a long European tradition, reflected in the old name 'elf dock', as a warming
    expectorant remedy for productive cough, bronchitis and chronic respiratory catarrh, and topically
    and internally as an antimicrobial for skin and wound infections.
  reference_ids:
  - REF-0445
  status: verified
preparations:
- name: Decoction
  text: Dried root simmered in water as a traditional expectorant and antimicrobial tea.
  reference_ids:
  - REF-0445
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried root.
  status: draft
- name: Syrup
  text: Root decoction combined with honey or sugar syrup as a soothing cough remedy, especially for children.
  status: draft
dosage:
- name: Decoction
  text: Traditional herbal references suggest around 1-3 g of dried root per cup, up to three times daily.
    Educational reference only, not a prescription.
  status: draft
actions:
- action: anti-inflammatory
  note: Anti-inflammatory - sesquiterpene lactones (alantolactone, isoalantolactone) inhibit NF-kB and
    MAPK signalling and pro-inflammatory cytokines; total sesquiterpene lactones eased arthritis in animal
    models (potential in rheumatoid arthritis)
  reference_ids:
  - REF-0538
  - REF-1858
  - REF-1859
  - REF-1860
  - REF-1861
  status: verified
- action: anticancer
  reference_ids:
  - REF-1865
  - REF-1866
  - REF-1867
  status: needs-review
- action: antimicrobial
  note: Antimicrobial, notably anti-staphylococcal (membrane-damaging) and anti-mycobacterial (active
    against Mycobacterium tuberculosis in vitro); supports respiratory and skin infection
  reference_ids:
  - REF-0445
  - REF-0539
  - REF-0540
  - REF-1862
  status: verified
- action: expectorant
  note: Expectorant for productive cough and bronchitis (long-standing respiratory remedy)
  reference_ids:
  - REF-0445
  - REF-1858
  status: verified
