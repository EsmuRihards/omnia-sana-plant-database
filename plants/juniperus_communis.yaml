contraindications:
- note: 'Avoid in pregnancy. Juniper is not recommended during pregnancy (EMA/HMPC, 2023; Health Canada,
    2025).Avoid with kidney disorders / serious kidney disease. It’s not recommended if you have kidney
    disease (EMA/HMPC, 2023; Health Canada, 2025).Adults only (for medicinal use). Use in under-18s is
    not recommended due to lack of data (EMA/HMPC, 2023).Hydration matters. If you’re using it for urinary
    “flushing,” you need adequate fluid intake (EMA/HMPC, 2023).Stop and seek help if symptoms look serious.
    Fever, painful urination, cramps/spasms, or blood in urine = talk to a clinician (EMA/HMPC, 2023).Duration
    caution. If using it beyond a few weeks, talk to a health professional (Health Canada, 2025).If breastfeeding:
    ask a health professional first (EMA/HMPC, 2023; Health Canada, 2025).'
  severity: caution
  reference_ids:
  - REF-0035
  - REF-0073
  - REF-0229
  status: verified
- note: Duke (2002) rates juniper as + (use with caution), noting diuretic, carminative, and aquaretic
    activities, primarily at the experimental level (score 1). Traditional use for urinary infections
    is not supported by strong clinical evidence. The essential oil contains potentially nephrotoxic terpinen-4-ol,
    and juniper is contraindicated in kidney disease, urinary infections with inflammation, and pregnancy
    (emmenagogue and potential abortifacient properties). Commission E and PhEur do not recommend medicinal
    doses for prolonged use exceeding 4–6 weeks (Duke, 2002).
  severity: caution
  reference_ids:
  - REF-0035
  - REF-0073
  - REF-0229
  status: verified
