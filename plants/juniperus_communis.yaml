id: juniperus-communis
scientific_name: Juniperus communis
common_names:
- Common Juniper
- Juniper
- Juniper “berries” / juniper cone berries
- Eneberries / Enebær
- Jeneverbes (EMA/HMPC
- 2023)
family: Cupressaceae
parts_used:
- Fruit
- Leaf
- Stem
botanical_description:
  text: Evergreen coniferous shrub or small tree, often low and sprawling, with sharp, needle-like leaves
    in whorls of three, each bearing a single white band on the upper surface. The plant is dioecious;
    female plants bear small, round, fleshy, berry-like cones ('juniper berries') that take two to three
    years to ripen from green to blue-black.
  height: 1-10 m, highly variable (often a low sprawling shrub)
  habit: Evergreen coniferous shrub or small tree, often sprawling
  leaves: Sharp, needle-like, in whorls of three, each with a single white band above
  flowers: Dioecious, wind-pollinated, inconspicuous
  stem: Woody, often sprawling or low-growing, reddish-brown bark
  root: Woody, spreading root system
  fruit: Round, fleshy, berry-like cone, ripening blue-black over two to three years
  flowering_period: Spring
  reference_ids:
  - REF-0851
  status: verified
habitat:
  text: Grows on heath, moorland, rocky hillsides and open coniferous woodland on poor, often calcareous
    soils; one of the most widely distributed conifers, native across the Northern Hemisphere from Europe
    and Asia to North America.
  status: draft
harvesting:
  text: The ripe, blue-black berry-like cones are hand-picked in autumn, typically in their second or
    third year of ripening (a mix of ages is often present on the same shrub); leaves and young stems
    can be gathered through the growing season.
  parts:
  - Fruit
  - Leaf
  - Stem
  season: Fruit in autumn, when fully ripe (blue-black)
  status: draft
traditional_uses:
  text: Juniper berry has a long European tradition as a diuretic and urinary antiseptic for minor urinary
    complaints, a warming digestive carminative for indigestion and bloating, and a flavouring for gin
    and other spirits; the leaf and wood have also been burned or used topically for their antimicrobial
    properties.
  reference_ids:
  - REF-0851
  status: verified
preparations:
- name: Infusion (berries)
  text: Crushed ripe berries infused in hot water as a traditional diuretic and digestive tea, for short-term
    use only.
  status: draft
- name: Essential oil
  text: Steam-distilled from the berries; used in small internal doses for short periods or diluted for
    topical/aromatic use.
  reference_ids:
  - REF-0851
  status: verified
- name: Culinary use
  text: Dried berries used as a food spice and the classic flavouring for gin.
  status: draft
dosage:
- name: Berry infusion
  text: The EU herbal monograph and traditional references limit use to short courses of a few weeks,
    with adequate fluid intake, typically around 2-10 g crushed berries daily; not for use in kidney disease
    or pregnancy. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Essential oil (alpha-pinene, sabinene, limonene)
  compounds:
  - essential-oil
  - terpene
  note: Berry essential oil dominated by alpha-pinene, beta-pinene, sabinene and limonene, giving the
    characteristic aroma and the antimicrobial activity.
  reference_ids:
  - REF-0851
- name: Flavonoids and tannins
  compounds:
  - flavonoid
  - tannin
  note: Antioxidant and astringent supporting constituents.
