id: knautia-arvensis
scientific_name: Knautia arvensis
common_names:
- Field scabious
- blue buttons
- gypsy rose
common_slug: field-scabious
family: Caprifoliaceae
synonyms:
- Scabiosa arvensis
- Knautia arvensis subsp. arvensis
parts_used:
- Aerial parts
- Flower
- Root
- Leaf
botanical_description:
  text: A hairy perennial herb of the honeysuckle family (formerly Dipsacaceae), 25-100 cm tall, growing
    from a stout rootstock. The stems are roughly hairy and bear opposite leaves that are variable - the
    lower ones often lyre-shaped or pinnately lobed, the upper deeply cut. The flowers are massed into
    flat, domed pincushion heads about 3-4 cm across, lilac to bluish-violet, with the outer florets enlarged;
    the heads are carried on long stalks and, unlike true scabious (Scabiosa), the receptacle is hairy
    rather than scaly. It flowers through summer and is a favourite of bees and butterflies.
  height: 25-100 cm
  habit: Hairy perennial herb from a stout rootstock
  leaves: Opposite, hairy; lower leaves lyre-shaped/pinnately lobed, upper deeply cut
  flowers: Lilac to bluish-violet florets in flat, domed pincushion heads 3-4 cm across, outer florets
    enlarged
  stem: Erect, roughly hairy, branched above
  root: Stout rootstock with fibrous roots
  fruit: A small hairy achene enclosed in an epicalyx
  flowering_period: July-September
  reference_ids:
  - REF-2808
  status: verified
habitat:
  text: Dry grassland, meadows, pastures, dry hills, roadside banks, field margins and open woods, on
    well-drained and often calcareous soils across Europe and into western Asia and parts of Africa. A
    characteristic plant of unimproved dry meadows.
  reference_ids:
  - REF-2808
  status: verified
harvesting:
  text: The flowering aerial parts (leaves, stems, flower heads) are gathered in summer while in flower
    and dried; the root is also used. Best cut from established plants in dry grassland.
  parts:
  - Aerial parts
  - Flower
  - Root
  season: Aerial parts in flower (July-September); root in autumn
  reference_ids:
  - REF-2808
  status: verified
traditional_uses:
  text: Field scabious has a European folk-medicine reputation chiefly as a remedy for skin complaints
    - eczema, itching, scabies (the name 'scabious' comes from its use against 'the scab'), cuts and sores
    - taken internally as a 'blood purifier' (alterative/depurative) and applied externally as a wash
    or poultice. It has also been used for coughs and sore throats. The plant is rich in phenolic acids,
    flavonoids and saponins; the closely related genera Knautia, Scabiosa and Dipsacus in the honeysuckle
    family share this chemistry and a tradition of use in skin disease and inflammation.
  reference_ids:
  - REF-2811
  - REF-2810
  status: verified
preparations:
- name: Infusion
  text: The dried flowering herb infused as a tea traditionally taken as an alterative ('blood purifier')
    for skin complaints and for coughs.
  reference_ids:
  - REF-2810
  status: draft
- name: Wash / poultice
  text: A strong infusion or the crushed herb applied externally to eczema, itching, cuts and sores (traditional).
  reference_ids:
  - REF-2811
  status: draft
dosage:
- name: Dried herb infusion
  text: No standardised dose is established (little studied). Traditionally a few grams of the dried flowering
    herb are infused per cup. Educational reference only.
  status: draft
