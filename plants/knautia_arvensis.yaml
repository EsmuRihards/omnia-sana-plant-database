contraindications:
- note: Very little is known about the safety of field scabious and there are no clinical data; avoid
    medicinal doses in pregnancy and breastfeeding and use only modest amounts.
  severity: caution
  status: verified
- note: Most pharmacological data come from closely related Caprifoliaceae (genus Knautia, Scabiosa, Dipsacus)
    rather than Knautia arvensis itself; apply to field scabious with caution.
  severity: info
