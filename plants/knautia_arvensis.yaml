internal_notes: 'Created 2026-07-10 (inline research; the research-workflow agent failed on the session
  limit). SETTLED-INCOMPLETE: genuine Knautia arvensis medicinal/phytochemical literature is only 3 papers
  (REF-2808 phenolic profile, REF-2809 phenolic/flavone constituents, REF-2810 knautioside/saponosides).
  PubMed for K. arvensis is otherwise dominated by rumen/methane feed studies, plant-pathology and ecology
  (all rejected). Supplemented with 5 clearly-labelled Caprifoliaceae congeners (REF-2811 genus Knautia
  anti-acne/skin - matching the plant''s traditional skin use; REF-2812 Dipsacus/Scabiosa review; REF-2813
  Scabiosa review; REF-2814 Scabiosa antioxidant/antidiabetic; REF-2815 Dipsacus fullonum). 8 total -
  well under 15; genuine-only <15 is genuine for this species. Do NOT pad with unrelated species. Cross-links
  via shared compounds (chlorogenic-acid/flavonoid/iridoid-glycoside/saponin) and skin/inflammation indications.
  lookalikes none-known (distinctive lilac pincushion heads; confusable only with harmless Scabiosa/Succisa).'
