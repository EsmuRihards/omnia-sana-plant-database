id: lactuca-virosa
scientific_name: Lactuca virosa
common_names:
- Wild Lettuce
- Bitter lettuce
- Opium lettuce
- Lactucarium
family: Asteraceae
parts_used:
- Aerial parts and dried latex (lactucarium)
constituents:
- name: Sesquiterpene lactones (lactucin, lactucopicrin)
  compounds:
  - sesquiterpene-lactone
  - sesquiterpene
  note: Bitter, centrally-active constituents responsible for the sedative and pain-relieving effects;
    isolated lactucin and lactucopicrin produced analgesia comparable to ibuprofen and sedation in rodent
    tests.
  reference_ids:
  - REF-0526
  - REF-0527
  - REF-0622
- name: Lactucarium (the dried milky latex)
  note: The historical medicinal preparation, concentrating the active lactones.
  reference_ids:
  - REF-0526
actions:
- action: analgesic
  note: Mild analgesic / anodyne for pain (lactucin and lactucopicrin act on the central nervous system)
    - in mice these compounds produced analgesia comparable to ibuprofen
  reference_ids:
  - REF-0526
  - REF-0527
  - REF-0622
  - REF-2060
  status: needs-review
- action: antitussive
  note: Antitussive for an irritable, dry cough (traditional)
  reference_ids:
  - REF-0526
  - REF-2059
  status: needs-review
- action: anxiolytic
  note: Calming for nervous tension and restlessness
  reference_ids:
  - REF-0526
  status: needs-review
- action: sedative
  note: Sedative for sleeplessness / insomnia - lactucin and lactucopicrin showed sedative activity in
    animal models
  reference_ids:
  - REF-0526
  - REF-0622
  - REF-2060
  - REF-2061
  - REF-2062
  status: needs-review
