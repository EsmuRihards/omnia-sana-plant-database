contraindications:
- note: 'Can be unsafe in large amounts or if harvested too early: overdose can cause sweating, fast heartbeat,
    dilated pupils, dizziness, ringing in the ears, vision changes, heavy sedation, breathing difficulty
    and, in extreme cases, death.'
  severity: info
  reference_ids:
  - REF-0527
  status: verified
- note: Its sedative effect can add to that of sedatives and alcohol - avoid combining and do not use
    before driving. As a daisy-family (Asteraceae) plant it can cause allergy; avoid in pregnancy and
    breastfeeding.
  severity: caution
  reference_ids:
  - REF-0527
  - REF-0526
  status: verified
