common_names:
- Wild Lettuce
- Bitter lettuce
- Opium lettuce
- Lactucarium
scientific_name: Lactuca virosa
family: Asteraceae
parts_used:
- name: Aerial parts and dried latex (lactucarium)
  medicinal_actions:
  - action: Sedative for sleeplessness / insomnia
    reference_ids:
    - REF-0526
    status: needs-review
  - action: Mild analgesic / anodyne for pain (lactucin and lactucopicrin act on the central nervous system)
    reference_ids:
    - REF-0526
    - REF-0527
    status: needs-review
  - action: Calming for nervous tension and restlessness
    reference_ids:
    - REF-0526
    status: needs-review
  - action: Antitussive for an irritable, dry cough (traditional)
    reference_ids:
    - REF-0526
    status: needs-review
constituents:
- name: Sesquiterpene lactones (lactucin, lactucopicrin)
  note: Bitter, centrally-active constituents responsible for the sedative and pain-relieving effects.
  reference_ids:
  - REF-0526
  - REF-0527
- name: Lactucarium (the dried milky latex)
  note: The historical medicinal preparation, concentrating the active lactones.
  reference_ids:
  - REF-0526
contraindications:
- note: 'Can be unsafe in large amounts or if harvested too early: overdose can cause sweating, fast heartbeat,
    dilated pupils, dizziness, ringing in the ears, vision changes, heavy sedation, breathing difficulty
    and, in extreme cases, death.'
  reference_ids:
  - REF-0527
  status: verified
- note: Its sedative effect can add to that of sedatives and alcohol - avoid combining and do not use
    before driving. As a daisy-family (Asteraceae) plant it can cause allergy; avoid in pregnancy and
    breastfeeding.
  reference_ids:
  - REF-0527
  - REF-0526
  status: verified
internal_notes: Enriched 2026-06-12 from general literature (Herbal Reality and RxList monographs). Record
  status set to needs-review because of the overdose toxicity risk and limited modern evidence. Originally
  a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (insomnia, pain, nervous-tension,
  cough); associations retained and now part-mapped and cited.
