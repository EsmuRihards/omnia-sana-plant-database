  - REF-0527
  - REF-0622
  status: needs-review
- condition: cough
  note: Antitussive for an irritable, dry cough (traditional)
  reference_ids:
  - REF-0526
  status: needs-review
- condition: headache
  note: inferred from analgesic action
  reference_ids:
  - REF-0526
  - REF-0527
  - REF-0622
  status: needs-review
- condition: insomnia
  note: Sedative for sleeplessness / insomnia - lactucin and lactucopicrin showed sedative activity in
