internal_notes: 'Enriched 2026-06-12 from general literature (Herbal Reality and RxList monographs). Record
  status set to needs-review because of the overdose toxicity risk and limited modern evidence. Originally
  a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (insomnia, pain, nervous-tension,
  cough); associations retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced
  study showing the Lactuca sesquiterpene lactones lactucin and lactucopicrin have analgesic (ibuprofen-comparable)
  and sedative activity in mice (REF-0622), supporting the analgesic and sedative actions mechanistically
  (preclinical). | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split out, constituents
  linked to compounds). | 2026-06-20: added 3 PubMed-sourced references to the plant-level references
  bucket (least-cited enrichment): REF-0854, REF-0855, REF-0856. | 2026-06-20: enriched to >=10 scientific
  publications: added 7 PubMed-verified @article sources (REF-0622, REF-2059, REF-2060, REF-2061, REF-2062,
  REF-2063, REF-2064) — woven into relevant actions/indications and the plant-level references bucket.'
