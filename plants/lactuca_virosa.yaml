drug_class_interactions:
- drug_class: sedatives-cns-depressants
  severity: caution
  mechanism: 'Wild lettuce is traditionally used as a calming, sedative herb; taken with sedatives, sleeping tablets or other central-nervous-system depressants (including alcohol) it may add to drowsiness and slowed reactions.'
  reference_ids:
  - REF-2452
  - REF-2460
