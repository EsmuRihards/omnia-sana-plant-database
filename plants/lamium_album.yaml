botanical_description:
  text: Perennial herb closely resembling stinging nettle in leaf shape but entirely without stinging
    hairs. Square stems bear opposite, toothed, heart-shaped leaves, and whorls of white, hooded, two-lipped
    flowers cluster in the upper leaf axils.
  height: 20-60 cm
  habit: Erect, clump-forming perennial herb
  leaves: Opposite, toothed, heart-shaped, resembling stinging nettle but without stinging hairs
  flowers: White, hooded, two-lipped, in dense whorls in the upper leaf axils
  stem: Square (typical of the mint family), unarmed (no stinging hairs)
  root: Creeping rhizome
  fruit: Small nutlet (typical of Lamiaceae)
  flowering_period: March-November (almost year-round in mild climates)
  reference_ids:
  - REF-0349
  status: verified
habitat:
  text: Grows in hedgerows, waste ground, gardens and roadsides on nitrogen-rich soils; native to Europe
    and temperate Asia, widely naturalised elsewhere.
  status: draft
harvesting:
  text: The flowering tops are picked as they open, largely through spring to autumn given the long flowering
    season, and dried in a warm, shaded, airy place; the standardisation markers are richest in the flowering
    tops specifically.
  parts:
  - Flower
  - Leaf
  - Aerial parts
  season: Spring through autumn, as flowers open
  reference_ids:
  - REF-0349
  status: verified
traditional_uses:
  text: White dead-nettle flower has a long European folk history as an astringent remedy for catarrh
    and excessive menstrual or vaginal discharge, and topically as a vulnerary wash for minor wounds;
    the young leaves and shoots have also traditionally been eaten as a cooked spring pot-herb.
  status: draft
preparations:
- name: Infusion
  text: Dried flowering tops infused in hot water as a traditional astringent and expectorant tea.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried flowering herb.
  status: draft
- name: Poultice/wash
  text: Crushed fresh leaf or a strained infusion applied topically to minor wounds.
  status: draft
dosage:
- name: Infusion
  text: Traditional herbal references suggest around 2-4 g of dried flowering herb per cup, up to three
    times daily. Educational reference only, not a prescription.
  status: draft
