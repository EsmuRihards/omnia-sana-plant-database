botanical_description:
  text: Evergreen shrub or small tree with dark green, glossy, aromatic leaves, smooth-edged and slightly
    wavy at the margin. Small, pale yellow-green flowers are borne in clusters in the leaf axils in spring,
    followed by small, dark purple-black berries on female trees.
  height: 5-10 m (occasionally to 15-20 m)
  habit: Evergreen shrub or small tree
  leaves: Dark green, glossy, aromatic, smooth and slightly wavy at the margin
  flowers: Small, pale yellow-green, in axillary clusters
  stem: Woody, smooth grey-brown bark
  root: Woody root system
  fruit: Small, dark purple-black berry (female trees)
  flowering_period: Spring
  reference_ids:
  - REF-0065
  status: verified
habitat:
  text: Native to the Mediterranean region; widely cultivated as a culinary herb and ornamental tree in
    warm-temperate and Mediterranean climates worldwide.
  reference_ids:
  - REF-0065
  status: verified
harvesting:
  text: Leaves are picked year-round from established plants and used fresh or dried; berries/seed are
    collected once ripe in autumn.
  parts:
  - Fruit
  - Leaf
  - Seed
  season: Leaf year-round; fruit/seed in autumn
  status: draft
traditional_uses:
  text: Bay leaf has an ancient Mediterranean culinary and medicinal history, used as a digestive carminative
    for indigestion and bloating, and topically and traditionally for muscle and joint pain and minor
    wounds; it remains one of the most widely used culinary herbs worldwide.
  reference_ids:
  - REF-0065
  status: verified
preparations:
- name: Infusion (leaf)
  text: Dried leaf infused in hot water as a traditional digestive tea.
  reference_ids:
  - REF-0065
  status: verified
- name: Culinary use
  text: Whole dried or fresh leaves used to flavour soups, stews and sauces, removed before eating since
    they remain rigid; the most common form of use.
  status: draft
- name: Essential oil
  text: Steam-distilled from the leaves, used topically diluted or in aromatherapy.
  status: draft
dosage:
- name: Infusion
  text: Traditional herbal references suggest around 1-3 g of dried leaf per cup, up to three times daily.
    Educational reference only, not a prescription.
  status: draft
