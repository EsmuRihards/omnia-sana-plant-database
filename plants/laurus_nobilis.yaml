contraindications:
- note: Generally safe when used in food amounts. Not toxic to people and safe to cook with. Leaves are
    very rigid and leathery - should be removed before eating as they don't soften with cooking and edges
    can be sharp. Insufficient reliable information about safety during pregnancy or breastfeeding - stick
    to food amounts. Large amounts of bay leaf tea may cause vomiting (emetic properties) and drowsiness
    (sedative properties). In high doses, bay laurel has cytotoxic activity. Some people may experience
    allergic contact dermatitis from bay laurel oil.
  severity: caution
  reference_ids:
  - REF-0065
  - REF-0088
  - REF-0202
  - REF-0277
  - REF-0291
  status: verified
- note: Duke (2002) notes antibacterial, anti-inflammatory, and antioxidant activities for bay laurel,
    primarily at the experimental level. The essential oil contains eugenol and 1,8-cineole as principal
    bioactive components. Traditional dosages in European phytotherapy include 1–3 g of dried leaf as
    a tea. Caution is advised as the essential oil may cause allergic contact dermatitis, and bay berries
    should not be confused with the less toxic leaves (Duke, 2002).
  severity: caution
  reference_ids:
  - REF-0065
  - REF-0088
  - REF-0202
  - REF-0277
  - REF-0291
  status: verified
