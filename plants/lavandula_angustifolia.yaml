id: lavandula-angustifolia
scientific_name: Lavandula angustifolia
common_names:
- Lavender
- English lavender
- true lavender
family: Lamiaceae
parts_used:
- Flower
botanical_description:
  text: Aromatic, evergreen, woody-based perennial subshrub with narrow, grey-green, felted leaves. Slender
    flowering spikes carrying whorls of small, tubular, two-lipped violet-blue flowers rise well above
    the foliage on long, unbranched stalks.
  height: 30-60 cm
  habit: Aromatic, evergreen, woody-based perennial subshrub
  leaves: Narrow, grey-green, felted
  flowers: Small, tubular, two-lipped, violet-blue, in whorled spikes on long stalks
  stem: Woody at the base, with slender unbranched flowering stalks
  root: Woody rootstock
  fruit: Small nutlet (typical of Lamiaceae)
  flowering_period: June-August
  reference_ids:
  - REF-2205
  status: verified
habitat:
  text: Native to the mountains of the western Mediterranean (southern France, Spain, Italy); widely cultivated
    in sunny, well-drained, often calcareous sites across temperate and Mediterranean climates worldwide.
  reference_ids:
  - REF-2205
  status: verified
harvesting:
  text: The flower spikes are cut as the flowers open, in mid- to late summer, when essential oil content
    is highest, and dried in a warm, shaded, airy place or distilled fresh for essential oil.
  parts:
  - Flower
  season: Mid- to late summer, at flowering
  reference_ids:
  - REF-2205
  status: verified
traditional_uses:
  text: Lavender flower has a long Mediterranean and European tradition as a calming, sedative herb for
    nervous tension, anxiety and insomnia, and as a mild digestive carminative and antiseptic for minor
    wounds and skin irritation; the essential oil in particular has an extensive modern clinical evidence
    base for anxiety and sleep support.
  reference_ids:
  - REF-2205
  status: verified
preparations:
- name: Infusion
  text: Dried flowers infused in hot water as a traditional calming, digestive tea.
  reference_ids:
  - REF-2205
  status: verified
- name: Essential oil (aromatherapy/topical)
  text: Steam-distilled from the flowers; used diluted topically or by inhalation for relaxation and skin
    care.
  reference_ids:
  - REF-2205
  status: verified
- name: Standardised oral oil preparation
  text: Encapsulated, standardised lavender oil preparation (e.g. Silexan) studied in clinical trials
    for generalised anxiety.
  status: draft
dosage:
- name: Infusion
  text: Traditional herbal references suggest around 4-8 g of dried flowers per cup, up to three times
    daily. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Essential oil (linalool, linalyl acetate)
  compounds:
  - essential-oil
  - linalool
  note: Flower essential oil dominated by linalool and linalyl acetate, the principal compounds behind
    the calming, anxiolytic and antimicrobial activity.
  reference_ids:
  - REF-2205
- name: Flavonoids and phenolic acids
  compounds:
  - flavonoid
  - phenolic-acid
  note: Antioxidant constituents of the flower.
