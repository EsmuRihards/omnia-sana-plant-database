contraindications:
- note: Generally very safe. Essential oil should not be ingested in large amounts. Rarely, contact dermatitis
    may occur. May potentiate the effect of sedative medications. Avoid therapeutic doses during pregnancy.
  reference_ids:
  - REF-0043
  - REF-0155
  - REF-0265
  status: verified
- note: 'Duke (2002) rates lavender as ++ and provides clinical evidence (score 2) for carminative activity,
    consistent with Commission E approval for nervous stomach disorders and functional abdominal complaints.
    Additional experimental activities include anxiolytic, antispasmodic, and antiseptic effects. The
    essential oil demonstrates COX-2 inhibitory and Alzheimer''s-relevant properties at the experimental
    level. Dose: 1–2 teaspoons (4–8 g) dried flowers as tea; 1–3 drops essential oil in a carrier for
    topical or aromatherapy use. Duke notes that oral lavender oil (Silexan) has clinical evidence for
    generalized anxiety disorder (Duke, 2002).'
  reference_ids:
  - REF-0043
  - REF-0155
  - REF-0265
  status: verified
