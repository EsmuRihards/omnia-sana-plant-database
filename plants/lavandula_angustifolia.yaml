drug_class_interactions:
- drug_class: sedatives-cns-depressants
  severity: caution
  mechanism: Lavender has calming, sedative effects (its anxiolytic effect is supported by a meta-analysis
    of randomised trials of the oral oil preparation Silexan); taken with sedatives, sleeping tablets
    or other central-nervous-system depressants (including alcohol) it may add to drowsiness and slowed
    reactions.
  reference_ids:
  - REF-2452
  - REF-2460
  - REF-2531
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: valeriana-officinalis
  type: synergy
  note: Lavender and valerian are both calming herbs used to aid relaxation and sleep; taken together
    their sedative effects can add up, so while they may help relaxation they can also increase drowsiness
    — avoid combining with sedative medicines or before driving.
  reference_ids:
  - REF-2531
  - REF-2533
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: melissa-officinalis
