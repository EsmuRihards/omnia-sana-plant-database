contraindications:
- note: Generally very safe as a food. Raw or undercooked shiitake can cause a rare skin rash (shiitake
    dermatitis / flagellate dermatitis) in sensitive individuals — fully cooking eliminates this risk.
    May have mild anticoagulant effects. Rarely causes digestive upset. Well tolerated in normal culinary
    quantities.
  severity: caution
  reference_ids:
  - REF-0293
  - REF-0300
  - REF-0315
  status: verified
- note: 'Duke (2002) rates shiitake as +++ and notes immunostimulant, hypocholesterolemic, antibacterial,
    and anti-HIV activities at the experimental level (score 1). The key active compound is lentinan,
    a beta-1,3-glucan polysaccharide, which is used as an injectable anticancer drug in Japan. Duke notes
    clinical applications of shiitake preparations for immune support, cancer adjuvant therapy, and cholesterol
    management. Dose: 1–3 (606 mg) capsules up to three times daily for standardized preparations. Shiitake
    dermatitis (flagellate erythema) is a rare but recognized adverse effect from eating raw or undercooked
    shiitake — cooking prevents this (Duke, 2002).'
  severity: info
  reference_ids:
  - REF-0293
  - REF-0300
  - REF-0315
  status: verified
