id: lentinula-edodes
scientific_name: Lentinula edodes
common_names:
- Shiitake (mushroom)
- Shiitake
- Chinese forest mushroom
- black mushroom
family: Omphalotaceae
external_ids:
  gbif: 2537743
  wikidata: Q320999
parts_used:
- Mycelium
- Whole Plant
botanical_description:
  text: Wood-decay fungus (not a true plant) with a classic cap-and-stem mushroom form. The cap is broad,
    brown to dark brown, often with pale scale-like markings, with a fringed or curled margin when young;
    the underside bears numerous cream-coloured gills radiating from a central or slightly off-centre
    fibrous stem.
  height: Cap 5-20 cm across
  habit: Wood-decay fungus with a typical cap-and-stem structure
  leaves: Not applicable (fungus)
  flowers: Not applicable (fungus); reproduces by spores
  stem: Fibrous, central to slightly off-centre, often tough
  root: Mycelium spreading through the wood substrate
  fruit: Cream-coloured gills radiating beneath the cap, releasing spores
  flowering_period: Fruiting body develops over weeks on the growing substrate
  status: draft
habitat:
  text: Grows naturally as a wood-decay fungus on fallen broadleaf trees (notably shii, oak and chestnut)
    in East Asian forests; almost all commercial shiitake today is cultivated on hardwood logs or sawdust
    blocks.
  status: draft
harvesting:
  text: Fruiting bodies are hand-picked once the cap has opened but before the margin fully flattens,
    then used fresh or dried; mycelium-based extracts are cultivated separately in liquid or grain culture.
  parts:
  - Mycelium
  - Whole Plant
  status: draft
traditional_uses:
  text: Shiitake has a very long East Asian culinary and medicinal tradition, used in Chinese and Japanese
    medicine as a tonic for vitality and longevity and to support healthy qi and blood; its polysaccharide
    lentinan, isolated from the fruiting body, has been used clinically in Japan as an adjunct immunotherapy,
    directly building on this traditional immune-tonic reputation.
  reference_ids:
  - REF-0293
  status: verified
preparations:
- name: Culinary use
  text: Fresh or dried fruiting body cooked and eaten as a food, always fully cooked (never raw) to avoid
    the rare shiitake dermatitis reaction.
  status: draft
- name: Standardised extract
  text: Fruiting-body or mycelium extract standardised to polysaccharide (lentinan/beta-glucan) content,
    taken as capsules for immune support.
  reference_ids:
  - REF-0293
  status: verified
dosage:
- name: Standardised extract
  text: Traditional and product references commonly suggest around 1-3 g of dried extract daily, in divided
    doses. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Lentinan (beta-1,3-glucan polysaccharide)
  compounds:
  - polysaccharide
  note: The principal immunomodulatory polysaccharide, used clinically in Japan as an injectable cancer-adjuvant
    therapy.
  reference_ids:
  - REF-0293
- name: Eritadenine
  note: A unique amino-acid-derived compound studied for cholesterol-lowering activity.
