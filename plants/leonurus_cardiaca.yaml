contraindications:
- note: Contraindicated in pregnancy (uterine stimulant). Avoid in heavy menstrual bleeding. May enhance
    anticoagulant and antihypertensive drug effects. Avoid in thyroid disorders. Generally well tolerated
    in normal doses for short-term use.
  reference_ids:
  - REF-0145
  - REF-0198
  - REF-0270
  status: verified
- note: 'Duke (2002) rates motherwort as ++ and notes hypotensive, cardiotonic (negative chronotropic),
    anti-aggregant, and sedative activities at the experimental level (score 1). The plant is traditionally
    used for heart palpitations, hypertension, and menstrual regulation in European herbalism. Duke emphasizes
    strong safety caution: motherwort has documented oxytocic (uterine-stimulating) activity and is strictly
    contraindicated in pregnancy. It may also enhance the effects of cardiac medications and sedatives
    (Duke, 2002).'
  reference_ids:
  - REF-0145
  - REF-0198
  - REF-0270
  status: verified
