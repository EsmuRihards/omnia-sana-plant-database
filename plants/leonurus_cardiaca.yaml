id: leonurus-cardiaca
scientific_name: Leonurus cardiaca
common_names:
- Motherwort
- throw-wort
- lion's tail
family: Lamiaceae
external_ids:
  gbif: 5341389
  wikidata: Q161130
parts_used:
- Flower
- Leaf
- Stem
botanical_description:
  text: Tall, upright perennial herb with deeply palmately lobed lower leaves (giving a lion's-paw appearance,
    the source of the genus name) and progressively less-divided upper leaves. Small, pink to pale purple,
    spiny-toothed, two-lipped flowers are borne in dense whorls up the square stem.
  height: 50-150 cm
  habit: Tall, erect perennial herb
  leaves: Deeply palmately lobed lower leaves; less-divided, three-lobed upper leaves
  flowers: Small, pink to pale purple, spiny-toothed, two-lipped, in dense whorls up the stem
  stem: Square (typical of the mint family), erect, often reddish
  root: Fibrous rootstock
  fruit: Small nutlet (typical of Lamiaceae)
  flowering_period: June-September
  reference_ids:
  - REF-0860
  status: verified
habitat:
  text: Grows on waste ground, roadsides, hedgerows and near old dwellings; native to Central Asia and
    southeastern Europe and long naturalised across Europe and North America.
  reference_ids:
  - REF-0860
  status: verified
harvesting:
  text: The flowering aerial parts (leaf, stem and flower) are cut in summer as the plant comes into flower,
    and dried in a warm, shaded, airy place.
  parts:
  - Flower
  - Leaf
  - Stem
  season: Summer, at flowering
  reference_ids:
  - REF-0860
  status: verified
traditional_uses:
  text: Motherwort has a long European and Asian herbal tradition, reflected in its name, as a gynaecological
    and cardiac tonic, traditionally used for heart palpitations and nervous cardiac complaints, menstrual
    irregularities and cramps, and as a calming nervine for anxiety and to ease childbirth and postpartum
    recovery.
  reference_ids:
  - REF-0860
  - REF-0865
  status: verified
preparations:
- name: Infusion
  text: Dried flowering herb infused in hot water as a traditional cardiac-support and calming tea.
  reference_ids:
  - REF-0860
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried flowering herb, typically around 1:5.
  status: draft
dosage:
- name: Infusion
  text: The EU herbal monograph gives a single dose of 1.5-4.5 g of the comminuted herb for tea preparation,
    for a daily dose of 3-10 g, in adults and elderly; a 1:5 tincture in 45% V/V ethanol at 2-6 mL three
    times daily and a liquid extract at 2-4 mL three times daily are also listed. If symptoms persist
    longer than 4 weeks a healthcare practitioner should be consulted. Not recommended under 18 years.
    Educational reference only, not a prescription.
  reference_ids:
  - REF-3069
  - REF-0860
  status: verified
constituents:
- name: Iridoid glycosides (leonurine)
  compounds:
  - iridoid-glycoside
  - glycoside
  note: Leonurine and related iridoid/alkaloid-type constituents are considered the principal cardioactive
    and uterotonic compounds.
  reference_ids:
  - REF-0865
- name: Flavonoids and phenolic acids
  compounds:
  - flavonoid
  - phenolic-acid
  note: Antioxidant constituents contributing to the plant's anti-inflammatory activity.
  reference_ids:
  - REF-0865
- name: Diterpenes (marrubiin-type)
  compounds:
  - terpene
  note: Bitter diterpenes, shared with related Lamiaceae bitters, contributing to the traditional digestive
    and cardiac reputation.
  reference_ids:
  - REF-0860
