botanical_description:
  text: Erect annual herb, slender and often branched near the top, growing 30-80 (up to 100) cm tall
    from a fine taproot. Leaves are alternate, sessile, narrowly lanceolate to linear, blue-green and
    entire-margined. Flowers are pale blue (occasionally white or pink), five-petalled and borne on slender
    stalks in loose terminal cymes. The fruit is a small globular capsule ('boll') that splits into ten
    compartments, each containing one flattened, glossy, red-brown seed.
  height: 30-80 (up to 100) cm
  habit: Erect, slender annual herb
  leaves: Alternate, sessile, narrowly lanceolate to linear, blue-green, entire
  flowers: Pale blue (occasionally white or pink), five-petalled, in loose terminal cymes
  stem: Slender, erect, often branched above
  root: Fine taproot
  fruit: Globular capsule ('boll') splitting into ten compartments, each with one flattened glossy red-brown
    seed
  flowering_period: June-August
  reference_ids:
  - REF-2220
  status: verified
habitat:
  text: Native to the Mediterranean region and the Fertile Crescent, cultivated since prehistory for fibre
    and oil and now grown worldwide in temperate regions with well-drained, fertile soils and a cool,
    moist growing season; occasionally found as a naturalised escape on waste and cultivated ground.
  reference_ids:
  - REF-2220
  status: verified
harvesting:
  text: Grown as an annual crop, seed is harvested once the capsules ('bolls') have dried and turned brown,
    typically in late summer, by cutting or combining the whole plant and threshing out the seed. Whole
    seed stores well; it should only be ground shortly before use, since the oil in ground seed oxidises
    and turns rancid quickly.
  parts:
  - Seed
  season: Late summer, once bolls have dried
  reference_ids:
  - REF-2217
  status: verified
traditional_uses:
  text: Flaxseed has a long history of traditional use as a bulk-forming laxative and demulcent for constipation
    and irritated gut mucosa, and as a poultice for boils and inflamed skin. Modern interest centres on
    its lignan (secoisolariciresinol diglucoside) and alpha-linolenic acid content, studied for cardiovascular,
    metabolic and hormone-related outcomes.
  reference_ids:
  - REF-2217
  - REF-2219
  - REF-2220
  status: verified
preparations:
- name: Ground seed ('flax meal')
  text: Whole seed freshly ground (milled) and taken with plenty of liquid, or stirred into food; grinding
    is needed to make the oil and lignans bioavailable, as whole seeds largely pass through the gut undigested.
  reference_ids:
  - REF-2217
  status: verified
- name: Flaxseed oil
  text: Cold-pressed oil taken as a concentrated source of alpha-linolenic acid (omega-3); lacks the fibre
    and lignan content of the whole ground seed.
  reference_ids:
  - REF-2220
  status: verified
- name: Poultice
  text: Crushed or ground seed made into a warm paste and applied externally to boils and inflamed skin
    - a traditional demulcent, soothing application.
  status: draft
dosage:
- name: Ground seed
  text: Traditional guidance and Duke (2002) suggest 1-2 tablespoons of ground seed with ample water,
    once or twice daily. Educational reference only, not a prescription.
  reference_ids:
  - REF-0001
  - REF-0039
  - REF-0084
  - REF-0105
  - REF-0152
  - REF-0190
  - REF-0230
  status: verified
- name: Flaxseed oil
  text: A randomised placebo-controlled trial titrated flax oil capsules (550 mg alpha-linolenic acid
    per 1 g of oil) to 12 capsules per day, i.e. up to roughly 12 g of oil daily, over 16 weeks - broadly
    matching the 1-2 tablespoons (about 10-15 mL) daily often cited for omega-3 intake. That trial was
    in children and adolescents with bipolar disorder and its primary outcomes were null; it is cited
    here only as a source for an administered human dose of the oil, not as evidence of benefit. Note
    the EU herbal monograph on Lini semen covers the SEED, not the oil. Educational reference only, not
    a prescription.
  reference_ids:
  - REF-3104
  status: verified
constituents:
- name: Lignans (secoisolariciresinol diglucoside, SDG)
  compounds:
  - lignan
  note: Flax is the richest dietary source of SDG-type lignans, converted by gut bacteria to the mammalian
    lignans enterodiol and enterolactone; studied for antioxidant and hormone-modulating activity.
  reference_ids:
  - REF-2218
- name: Alpha-linolenic acid (omega-3 fatty acid)
  note: The dominant fatty acid of the seed oil (~50-55% of total oil), a plant-based omega-3 studied
    for cardiovascular and anti-inflammatory effects.
  reference_ids:
  - REF-2217
  - REF-2220
- name: Mucilage polysaccharides
  compounds:
  - mucilage
  - polysaccharide
  note: Concentrated in the seed coat; gives flaxseed its demulcent, laxative, bulk-forming action.
  reference_ids:
  - REF-2220
- name: Cyanogenic glycosides (linamarin, linustatin)
  compounds:
  - glycoside
  note: Present at low levels; cooking/roasting reduces them to negligible amounts in normal food use
    - a theoretical concern only at high raw intakes.
  reference_ids:
  - REF-2222
