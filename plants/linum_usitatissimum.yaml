contraindications:
- note: Flaxseeds are safe for most people at recommended food amounts (1–2 tablespoons ground/day). They
    must be ground or milled to be bioavailable — whole seeds largely pass through the gut undigested.
    High fibre content may cause bloating, flatulence, and loose stools, especially if fibre intake is
    increased rapidly without adequate hydration. Flaxseeds contain cyanogenic glycosides (linamarin,
    linustatin); cooking or roasting reduces these to negligible levels in normal food amounts. Raw seeds
    in very large quantities are a theoretical concern, but typical use is safe (EFSA, 2017).
  severity: info
  reference_ids:
  - REF-0001
  - REF-0039
  - REF-0084
  - REF-0105
  - REF-0152
  - REF-0190
  - REF-0230
  status: verified
- note: 'Medication interactions: Flaxseed may reduce absorption of oral medications if taken simultaneously
    — space flaxseed supplementation 1–2 hours from medications. Omega-3 ALA and lignans may mildly enhance
    anticoagulant/antiplatelet effects; use caution with blood thinners. Some sources suggest caution
    with hormone-sensitive conditions due to phytoestrogen (lignan) content, though dietary amounts are
    unlikely to pose risk (Adolphe et al., 2010).'
  severity: caution
  reference_ids:
