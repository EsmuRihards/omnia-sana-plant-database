  - REF-0190
  - REF-0230
  status: verified
- note: 'Duke (2002) rates flaxseed as +++ with clinical evidence (score 2) for antiatherogenic, hypocholesterolemic,
    laxative, lipolytic (fat-dissolving), and demulcent activities. Flaxseed''s omega-3 fatty acids (ALA)
    and lignans are associated with reduced cardiovascular risk. Commission E approves flaxseed as a laxative
    and for mucilaginous protection of inflamed gastrointestinal mucosa. Dose: 1–2 tablespoons ground
    seed with ample water, twice daily. Whole seeds should be chewed or ground for full medicinal effect.
    Cyanogenic glycosides are present but at safe levels in normal dietary amounts (Duke, 2002).'
  severity: info
