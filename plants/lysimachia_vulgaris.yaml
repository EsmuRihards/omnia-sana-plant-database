botanical_description:
  text: A tall, erect perennial herb of the primrose family, 60-150 cm high, spreading by creeping rhizomes
    to form patches. The stems are softly downy and bear lance-shaped leaves in whorls of three or four
    (or opposite pairs), often gland-dotted. Bright yellow, five-petalled star-shaped flowers, about 15
    mm across and often with reddish margins to the sepals, are carried in leafy branching clusters (panicles)
    at the top of the stem in summer. Despite the shared name 'loosestrife', it is unrelated to purple
    loosestrife (Lythrum salicaria).
  height: 60-150 cm
  habit: Tall erect rhizomatous perennial, spreading in patches
  leaves: Lance-shaped, in whorls of 3-4 or opposite, often gland-dotted, softly hairy beneath
  flowers: Bright yellow, 5-petalled, star-shaped (about 15 mm), in leafy terminal panicles; sepals often
    red-margined
  stem: Erect, softly downy, little-branched below the flower cluster
  root: Creeping rhizome with fibrous roots
  fruit: A small globular capsule
  flowering_period: June-August
  reference_ids:
  - REF-2796
  status: verified
habitat:
  text: 'Wet ground: margins of rivers, lakes, ponds and ditches, fens, marshes, wet meadows and damp
    woodland, across Europe and temperate Asia (and naturalised in North America). It favours moist to
    waterlogged, fertile soils in sun or light shade and can form dense stands.'
  reference_ids:
  - REF-2796
  status: verified
harvesting:
  text: The flowering aerial parts (leaves, stems, flowers) are gathered in summer while in flower and
    dried; the root/rhizome is also used. The plant is best cut from established patches in wet ground.
  parts:
  - Aerial parts
  - Flower
  - Root
  season: Aerial parts in flower (June-August); root in autumn
  reference_ids:
  - REF-2796
  status: verified
traditional_uses:
  text: 'Yellow loosestrife has a European folk-medicine reputation as an astringent and styptic: the
    flavonoid- and tannin-rich herb was used to stop bleeding (nosebleeds, wounds), for diarrhoea and
    dysentery, as a gargle and wash for mouth ulcers and sore throat, and to soothe inflammation. The
    dried herb was also burned to repel insects. More broadly, the genus Lysimachia is important in East
    Asian medicine - the closely related L. vulgaris var. davurica is used for liver and digestive complaints,
    while other congeners such as L. christinae (jin qian cao) are classic remedies for urinary and gallstones
    - reflecting a shared saponin and flavonoid chemistry.'
  reference_ids:
  - REF-2796
  - REF-2794
  - REF-2802
  status: verified
