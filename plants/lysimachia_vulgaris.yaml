internal_notes: 'Created 2026-07-10 (inline research; the research-workflow agent for this plant failed
  on the session limit). 15 refs REF-2793..REF-2807: 9 genuine Lysimachia vulgaris (incl. var. davurica,
  a variety of the species - PCSK9/lipid-lowering, liver-fibrosis/NASH, IBS-D, antibacterial/antitumor/antioxidant,
  flavonoid/rutin phytochem) + 6 clearly-labelled genus congeners (L. christinae renal/anticancer/saponins,
  L. foenum-graecum antioxidant, L. baviensis anti-inflammatory, L. capillipes anticancer saponins). Every
  congener labelled; the genus shares saponin/flavonoid chemistry. Non-medicinal L. vulgaris hits (pollen/canopy/wetland-ecology/heavy-metal
  bioindication) rejected. Strong genuine finding: PCSK9 inhibition -> statins interaction. Cross-link:
  primula-veris (Primulaceae saponins). lookalikes none-known (distinctive whorled leaves + yellow star
  flowers; unrelated to purple loosestrife Lythrum). | 2026-07-13: added anticancer action (where absent)
  + cancer indication (anticancer/antitumour research) sourced from the plant''s cited literature, as
  part of the cancer-condition campaign.'
