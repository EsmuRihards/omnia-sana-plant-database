common_names:
- Oregon Grape
- Oregon grape root
- Holly-leaved barberry
- Berberis aquifolium
scientific_name: Mahonia aquifolium
family: Berberidaceae
parts_used:
- name: Root (and bark/wood)
  medicinal_actions:
  - action: Topical treatment of mild-to-moderate psoriasis (reduces plaque severity)
    reference_ids:
    - REF-0487
    status: verified
  - action: Topical for atopic dermatitis (eczema) and skin irritation
    reference_ids:
    - REF-0487
    status: verified
  - action: Anti-inflammatory and antiproliferative (slows the skin-cell overgrowth of psoriasis)
    reference_ids:
    - REF-0487
    status: verified
  - action: Antimicrobial (berberine) - supports skin and mucosal infection
    reference_ids:
    - REF-0488
    status: needs-review
constituents:
- name: Isoquinoline alkaloids (berberine, berbamine, palmatine, jatrorrhizine, magnoflorine)
  note: Berberine is the main anti-psoriatic and antimicrobial constituent.
  reference_ids:
  - REF-0487
  - REF-0488
contraindications:
- note: 'Avoid internal use in pregnancy and breastfeeding: like goldenseal, the berberine it contains
    can cross the placenta and into milk and worsen newborn jaundice (kernicterus risk).'
  reference_ids:
  - REF-0488
  status: verified
- note: Berberine impairs the metabolism of some medicines - for example it raises blood levels of cyclosporine,
    risking toxicity - so use caution with prescription drugs. It is used mainly topically for skin conditions.
  reference_ids:
  - REF-0487
  - REF-0488
  status: verified
internal_notes: Enriched 2026-06-12 from scientific and general literature (J Clin Aesthet Dermatol review
  of topical Mahonia for psoriasis/eczema; Herbal Reality monograph). Mahonia aquifolium = Berberis aquifolium.
  Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (psoriasis, eczema,
  skin-irritation, infection); associations retained and now part-mapped and cited.
last_updated: '2026-06-12'
status: verified
