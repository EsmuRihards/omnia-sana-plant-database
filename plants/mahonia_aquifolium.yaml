internal_notes: 'Enriched 2026-06-12 from scientific and general literature (J Clin Aesthet Dermatol review
  of topical Mahonia for psoriasis/eczema; Herbal Reality monograph). Mahonia aquifolium = Berberis aquifolium.
  Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (psoriasis, eczema,
  skin-irritation, infection); associations retained and now part-mapped and cited. Further enriched 2026-06-14
  with a PubMed-sourced double-blind, placebo-controlled RCT of a topical Mahonia aquifolium cream showing
  significant PASI and quality-of-life improvement in mild-to-moderate psoriasis (REF-0591). | 2026-06-15:
  migrated to entity schema (actions->vocab ids, indications split out, constituents linked to compounds).
  | 2026-06-20: enriched to >=10 scientific publications: added 10 PubMed-verified @article sources (REF-1173,
  REF-1174, REF-1175, REF-1176, REF-1177, REF-1178, REF-1179, REF-1180, REF-1181, REF-1182) — woven into
