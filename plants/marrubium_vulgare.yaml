id: marrubium-vulgare
scientific_name: Marrubium vulgare
common_names:
- Horehound
- White horehound
- Common horehound
family: Lamiaceae
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Labdane diterpene marrubiin
  compounds:
  - terpene
  note: The characteristic bitter principle (pharmacopoeial material contains at least 0.7%); drives the
    expectorant and digestive actions. A phytochemical/pharmacological overview identifies marrubiin and
    the phenolic fraction as the basis for antioxidant, anti-inflammatory and antimicrobial activity.
  reference_ids:
  - REF-0468
  - REF-0469
  - REF-0603
- name: Flavonoids and phenylethanoid esters (e.g. verbascoside)
  compounds:
  - verbascoside
  - flavonoid
  note: Antioxidant and anti-inflammatory constituents.
  reference_ids:
  - REF-0468
  - REF-0469
- name: Tannins and volatile oil
  compounds:
  - essential-oil
  - tannin
  note: Astringent and aromatic constituents of the herb.
  reference_ids:
  - REF-0469
