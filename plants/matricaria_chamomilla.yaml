drug_class_interactions:
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: 'Chamomile contains natural coumarin constituents and has been linked in a case report to increased bleeding when taken with warfarin, so caution is advised when combining it with anticoagulant or antiplatelet drugs.'
  reference_ids:
  - REF-2447
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: valeriana-officinalis
  type: synergy
  note: 'Chamomile and valerian are both traditional mild sedatives for restlessness and poor sleep; taken together they may enhance calming and sleep effects but also add to drowsiness.'
  reference_ids:
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: melissa-officinalis
  type: synergy
  note: 'Chamomile and lemon balm are both gentle calming herbs commonly combined for stress and sleep; used together their mild sedative effects may add up.'
  reference_ids:
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
