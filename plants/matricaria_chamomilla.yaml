drug_class_interactions:
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: Chamomile contains natural coumarin constituents and has been linked in a case report to
    increased bleeding when taken with warfarin, so caution is advised when combining it with anticoagulant
    or antiplatelet drugs.
  reference_ids:
  - REF-2447
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: sedatives-cns-depressants
  severity: caution
  mechanism: Chamomile has calming, sedative effects (a randomised controlled trial found it reduces generalised-anxiety
    symptoms); taken with sedatives, sleeping tablets or other central-nervous-system depressants (including
    alcohol) it may add to drowsiness and slowed reactions.
  reference_ids:
  - REF-2452
  - REF-2460
  - REF-2532
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antidiabetics
  severity: caution
  mechanism: Chamomile improved blood-sugar control (lower HbA1c and insulin resistance) in a trial in
    type 2 diabetes; combined with diabetes medicines it may add to blood-sugar lowering, so monitor blood
    sugar.
  reference_ids:
  - REF-2501
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: valeriana-officinalis
  type: synergy
  note: Chamomile and valerian are both traditional mild sedatives for restlessness and poor sleep; taken
    together they may enhance calming and sleep effects but also add to drowsiness.
  reference_ids:
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: melissa-officinalis
  type: synergy
  note: Chamomile and lemon balm are both gentle calming herbs commonly combined for stress and sleep;
    used together their mild sedative effects may add up.
  reference_ids:
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: passiflora-incarnata
  type: synergy
  note: Chamomile and passionflower are both gentle calming, sleep-supporting herbs traditionally combined;
    used together they may reinforce each other's soothing, sleep-promoting effect.
  reference_ids:
  - REF-2452
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
