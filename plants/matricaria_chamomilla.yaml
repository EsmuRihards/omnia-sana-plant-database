id: matricaria-chamomilla
scientific_name: Matricaria chamomilla
common_names:
- Chamomile
- German chamomile
- blue chamomile
- wild chamomile
- Scented Mayweed
family: Asteraceae
external_ids:
  gbif: 8370958
  wikidata: Q28437
parts_used:
- Flower
botanical_description:
  text: Aromatic annual herb, 15-60 cm tall, with an erect, much-branched, hairless stem. Leaves are alternate
    and finely bi- to tripinnately divided into thread-like segments, giving a feathery appearance. Flower
    heads are small daisy-like composites, 1-2.5 cm across, with white ray florets that reflex sharply
    downward as the flower matures around a conical, hollow, yellow disc of tubular florets - the hollow,
    conical receptacle is a key feature distinguishing German chamomile from similar-looking daisies.
    The fruit is a tiny ribbed achene without a pappus.
  height: 15-60 cm
  habit: Erect, much-branched, aromatic annual herb
  leaves: Alternate, finely 2-3-pinnately divided into thread-like segments
  flowers: Small daisy-like heads with downward-reflexed white ray florets around a conical hollow yellow
    disc
  stem: Erect, much-branched, hairless
  root: Slender taproot
  fruit: Tiny ribbed achene, no pappus
  flowering_period: May-August
  reference_ids:
  - REF-1153
  - REF-1162
  status: verified
habitat:
  text: Native to Europe and western Asia and now naturalised worldwide, growing on disturbed, sunny ground
    - arable field margins, waste places, roadsides and sandy or loamy soils; widely cultivated as a medicinal
    crop.
  reference_ids:
  - REF-1153
  - REF-1158
  status: verified
harvesting:
  text: Flower heads are hand- or machine-harvested at full bloom, when the ray florets are horizontal
    and just beginning to reflex, then dried quickly at low temperature and out of direct light to preserve
    the volatile oil.
  parts:
  - Flower heads
  season: Late spring to summer, at full bloom
  reference_ids:
  - REF-1158
  status: verified
traditional_uses:
  text: Chamomile is one of the most widely used medicinal herbs in the world, with a long traditional
    history as a mild digestive, calming and anti-inflammatory remedy - taken as a tea for indigestion,
    cramping, and restlessness or poor sleep, and applied topically for skin and mucous-membrane inflammation
    and wound healing. Modern reviews confirm anti-inflammatory, antispasmodic, sedative/anxiolytic and
    antimicrobial pharmacological activity supporting these traditional uses.
  reference_ids:
  - REF-1153
  - REF-1158
  - REF-1162
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried flower heads steeped in hot water, the classic way of taking chamomile for digestive complaints,
    mild anxiety and sleep support.
  reference_ids:
  - REF-1158
  - REF-1162
  status: verified
- name: Essential oil
  text: Steam-distilled from the flower heads; a concentrated source of alpha-bisabolol and chamazulene,
    used mainly in topical and aromatherapy preparations.
  reference_ids:
  - REF-1153
  status: verified
- name: Topical cream/compress
  text: Concentrated extract or infused oil applied to skin, or as a compress - a randomised controlled
    trial found a topical chamomile oil preparation effective for knee osteoarthritis pain.
  reference_ids:
  - REF-2349
  status: verified
- name: Mouthwash/gargle
  text: Infusion used as a mouthwash or gargle, traditionally for mouth and throat irritation.
  status: draft
dosage:
- name: Infusion (tea)
  text: Traditional guidance and Duke (2002) suggest about 3 g of dried flower heads per cup of water,
    taken up to three times daily. Educational reference only, not a prescription.
  reference_ids:
  - REF-0079
  - REF-0112
  - REF-0189
  - REF-0231
  - REF-0280
  status: verified
constituents:
- name: Essential oil (alpha-bisabolol, chamazulene)
  compounds:
  - essential-oil
  - bisabolol
  - chamazulene
  note: The volatile oil, concentrated in the flower head, gives chamomile its characteristic blue colour
    (chamazulene) and much of its anti-inflammatory activity (alpha-bisabolol).
  reference_ids:
  - REF-1153
  - REF-1158
- name: Flavonoids (apigenin, quercetin, luteolin, rutin)
  compounds:
  - apigenin
  - quercetin
  - luteolin
  - rutin
  - flavonoid
  note: Apigenin is considered a key contributor to chamomile's sedative/anxiolytic activity via GABA-A
    receptor binding.
  reference_ids:
  - REF-1162
- name: Coumarins
  compounds:
  - coumarin
  note: Minor constituents (e.g. herniarin, umbelliferone) contributing to the mild antispasmodic action.
  reference_ids:
  - REF-1158
- name: Mucilage polysaccharides
  compounds:
  - mucilage
  - polysaccharide
  note: Contribute to the soothing, demulcent effect on irritated mucous membranes.
  reference_ids:
  - REF-1162
