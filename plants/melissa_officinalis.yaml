contraindications:
- note: Generally very safe for adults. Theoretically may interact with thyroid medications and sedatives.
    Avoid high therapeutic doses during pregnancy. Long-term safety data beyond a few months is limited.
  severity: caution
  reference_ids:
  - REF-0112
  - REF-0134
  - REF-0194
  status: verified
- note: Duke (2002) does not include a dedicated entry under 'Lemon Balm' or 'Melissa' in the Handbook
    of Medicinal Herbs, Second Edition.
  severity: info
