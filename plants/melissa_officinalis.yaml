drug_class_interactions:
- drug_class: sedatives-cns-depressants
  severity: caution
  mechanism: Lemon balm has calming, sedative effects (a randomised controlled trial found it reduces
    anxiety, stress and sleep disturbance); taken with sedatives, sleeping tablets or other central-nervous-system
    depressants (including alcohol) it may add to drowsiness and slowed reactions.
  reference_ids:
  - REF-2452
  - REF-2460
  - REF-2539
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: passiflora-incarnata
  type: synergy
  note: Lemon balm and passionflower are both gentle, GABA-acting calming herbs often blended together
    in anti-anxiety and sleep formulas; combined use may deepen relaxation but also add to drowsiness.
  reference_ids:
