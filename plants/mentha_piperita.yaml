id: mentha-piperita
scientific_name: Mentha × piperita
common_names:
- Peppermint
- brandy mint
- balm mint
family: Lamiaceae
external_ids:
  gbif: 8707933
wp_post_id: 155
parts_used:
- Flower
- Leaf
botanical_description:
  text: Perennial herb, 30-90 cm tall, a sterile natural hybrid (Mentha aquatica x M. spicata) that spreads
    by rhizomes and surface stolons rather than viable seed. Stems are square, often purple-tinged. Leaves
    are opposite, lance-shaped to ovate with a sharply toothed margin, and release a strong menthol scent
    when crushed. Small, pale purple flowers are borne in dense, interrupted terminal spikes.
  height: 30-90 cm
  habit: Rhizomatous, mat-forming perennial herb, sterile hybrid
  leaves: Opposite, lance-shaped to ovate, sharply toothed, strongly menthol-scented
  flowers: Small, pale purple, in dense interrupted terminal spikes
  stem: Square, often purple-tinged
  root: Spreading rhizomes and surface stolons
  fruit: Rarely sets seed (sterile hybrid); propagated vegetatively
  flowering_period: July-September
  reference_ids:
  - REF-1204
  status: verified
habitat:
  text: A cultivated hybrid grown worldwide as a crop and garden herb, propagated vegetatively since it
    rarely sets viable seed; naturalised in damp ground - streambanks, ditches and waste places - in temperate
    regions.
  reference_ids:
  - REF-1204
  status: verified
harvesting:
  text: Aerial parts are cut at or just before full flowering (mid- to late summer), when the essential-oil
    (menthol) content peaks, then dried quickly out of direct sun, or distilled fresh for essential oil.
  parts:
  - Leaf
  - Flowering tops
  season: Mid- to late summer, at or just before flowering
  reference_ids:
  - REF-1205
  status: verified
traditional_uses:
  text: Peppermint has one of the best-documented traditional uses of any herb - as a carminative and
    antispasmodic for indigestion, bloating and colic. Enteric-coated peppermint oil capsules are among
    the most clinically validated herbal treatments for irritable bowel syndrome, and topical or inhaled
    peppermint oil is traditionally and clinically used for tension-type headache and muscular aches.
  reference_ids:
  - REF-1203
  - REF-1204
  - REF-1206
  - REF-1207
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried leaf steeped in hot water, the classic digestive tea.
  reference_ids:
  - REF-1203
  status: verified
- name: Enteric-coated oil capsules
  text: Standardised peppermint oil in enteric-coated capsules, the clinically studied form for irritable
    bowel syndrome, releasing the oil in the intestine rather than the stomach.
  reference_ids:
  - REF-1206
  - REF-0004
  - REF-0100
  - REF-0163
  status: verified
- name: Essential oil (topical)
  text: Diluted essential oil applied to the temples and neck for tension-type headache.
  reference_ids:
  - REF-1207
  status: verified
- name: Tincture
  text: Alcoholic extract of the leaf.
  status: draft
dosage:
- name: Enteric-coated oil capsules
  text: 'Duke (2002) and Commission E guidance: about 0.6 mL enteric-coated oil two to three times daily
    between meals for IBS-type digestive complaints. Educational reference only, not a prescription.'
  reference_ids:
  - REF-0004
  - REF-0100
  - REF-0163
  status: verified
- name: Dried leaf infusion
  text: 'Traditional guidance: about 1.5-3 g dried leaf as a tea, up to three times daily for digestive
    complaints. Educational reference only, not a prescription.'
