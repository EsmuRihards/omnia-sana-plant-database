common_names:
- Bitter Melon
- Bitter gourd
- Karela
- Balsam pear
scientific_name: Momordica charantia
family: Cucurbitaceae
parts_used:
- name: Fruit (unripe)
  medicinal_actions:
  - action: Antidiabetic / blood-sugar lowering (improves glucose uptake and GLUT4 translocation)
    reference_ids:
    - REF-0412
    - REF-0413
    status: verified
  - action: Bitter digestive / stomachic (traditional use for poor digestion); mild laxative
    reference_ids:
    - REF-0412
    status: verified
  - action: Antioxidant and anti-inflammatory
    reference_ids:
    - REF-0412
    status: verified
constituents:
- name: Cucurbitane-type triterpenoids (momordicosides)
  note: Now regarded as the main antidiabetic principles.
  reference_ids:
  - REF-0412
- name: Charantin
  note: A mixture of two sterol glucosides, historically credited with the hypoglycaemic effect.
  reference_ids:
  - REF-0412
- name: Polypeptide-p ('plant insulin')
  note: An insulin-like polypeptide of the fruit and seed.
  reference_ids:
  - REF-0412
- name: Vicine (in the seeds)
  note: A pyrimidine glycoside that can trigger favism in G6PD-deficient people.
  reference_ids:
  - REF-0414
contraindications:
- note: 'Avoid in pregnancy: bitter melon can stimulate the uterus and has been associated with miscarriage;
    also avoid during breastfeeding.'
  reference_ids:
  - REF-0414
  status: verified
- note: 'Strong blood-sugar-lowering action: used with insulin or other diabetes medicines it can cause
    hypoglycaemia - monitor blood glucose and seek medical advice.'
  reference_ids:
  - REF-0414
  - REF-0412
  status: verified
- note: People with glucose-6-phosphate dehydrogenase (G6PD) deficiency should avoid the seeds, which
    contain vicine and can cause favism (haemolytic anaemia). Excessive intake may cause abdominal pain
    and diarrhoea.
  reference_ids:
  - REF-0414
  status: verified
internal_notes: Enriched 2026-06-12 from scientific and general literature (Frontiers in Pharmacology
  and Int J Mol Sci reviews; WebMD safety monograph). Originally a skeleton imported from the omniasana.bio
  Symptom-to-Plant Lookup tool (blood-sugar, indigestion); associations retained and now part-mapped and
  cited.
last_updated: '2026-06-12'
status: verified
