contraindications:
- note: 'Avoid in pregnancy: bitter melon can stimulate the uterus and has been associated with miscarriage;
    also avoid during breastfeeding.'
  severity: caution
  reference_ids:
  - REF-0414
  status: verified
- note: 'Strong blood-sugar-lowering action: used with insulin or other diabetes medicines it can cause
    hypoglycaemia - monitor blood glucose and seek medical advice.'
  severity: info
  reference_ids:
  - REF-0414
  - REF-0412
  status: verified
- note: People with glucose-6-phosphate dehydrogenase (G6PD) deficiency should avoid the seeds, which
    contain vicine and can cause favism (haemolytic anaemia). Excessive intake may cause abdominal pain
    and diarrhoea.
  severity: caution
  reference_ids:
  - REF-0414
  status: verified
