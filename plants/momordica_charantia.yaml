id: momordica-charantia
scientific_name: Momordica charantia
common_names:
- Bitter Melon
- Bitter gourd
- Karela
- Balsam pear
family: Cucurbitaceae
external_ids:
  gbif: 2874581
  wikidata: Q428750
parts_used:
- Fruit (unripe)
constituents:
- name: Cucurbitane-type triterpenoids (momordicosides)
  note: Now regarded as the main antidiabetic principles.
  reference_ids:
  - REF-0412
  - REF-1217
- name: Charantin
  compounds:
  - phytosterol
  note: A mixture of two sterol glucosides, historically credited with the hypoglycaemic effect.
  reference_ids:
  - REF-0412
- name: Polypeptide-p ('plant insulin')
  note: An insulin-like polypeptide of the fruit and seed.
  reference_ids:
  - REF-0412
- name: Vicine (in the seeds)
  compounds:
  - glycoside
  note: A pyrimidine glycoside that can trigger favism in G6PD-deficient people.
  reference_ids:
  - REF-0414
botanical_description:
  text: Climbing or trailing annual vine (Cucurbitaceae) that climbs by simple tendrils, typically 2-5
    m long. Leaves are alternate, long-stalked and palmately lobed with 5-7 deep, toothed lobes. Flowers
    are small, yellow and five-petalled, male and female flowers separate on the same plant. The fruit
    is an oblong, warty-skinned gourd that ripens from green to orange-yellow and splits open to reveal
    seeds coated in a bright red aril; the unripe green fruit is the part used medicinally and as food.
  height: 2-5 m (climbing/trailing vine)
  habit: Climbing or trailing annual vine, tendril-bearing
  leaves: Alternate, long-stalked, palmately 5-7-lobed with toothed margins
  flowers: Small, yellow, five-petalled, male and female separate on the same plant
  stem: Slender, climbing by simple tendrils
  root: Fibrous annual root system
  fruit: Oblong, warty-skinned gourd, green ripening to orange-yellow, splitting to reveal red-arilled
    seeds
  flowering_period: Summer, through the growing season in warm climates
  status: draft
habitat:
  text: Likely native to tropical Asia (possibly the Indian subcontinent), now widely cultivated across
    tropical and subtropical Asia, Africa, the Caribbean and increasingly the Americas as a vegetable
    and medicinal crop; needs warmth, full sun and a trellis or support to climb.
  reference_ids:
  - REF-0412
  status: verified
harvesting:
  text: The fruit is harvested unripe, while still green and firm, before it yellows and splits, for use
    as a vegetable and in traditional antidiabetic preparations; leaves are also traditionally gathered.
  parts:
  - Fruit (unripe)
  - Leaf
  season: Unripe fruit throughout the growing season
  reference_ids:
  - REF-0412
  status: verified
traditional_uses:
  text: Bitter melon has a long history in Asian, African and Caribbean traditional medicine as a bitter
    digestive tonic and mild laxative, and most notably as a remedy for diabetes and its complications;
    this traditional antidiabetic use is now the most scientifically supported of its properties, with
    numerous studies on its blood-glucose- and lipid-lowering effects.
  reference_ids:
  - REF-0412
  - REF-1216
  status: verified
preparations:
- name: Fresh fruit / juice
  text: The unripe fruit eaten cooked as a vegetable or juiced fresh - the traditional food-medicine form
    used for blood-sugar support.
  reference_ids:
  - REF-0412
  status: verified
- name: Dried fruit tea
  text: Dried fruit slices infused in hot water.
  status: draft
- name: Standardised extract capsule
  text: Encapsulated dry fruit extract, the form used in clinical trials for blood-sugar support.
  reference_ids:
  - REF-1213
  - REF-1216
  status: verified
dosage:
- name: Fruit extract / juice
  text: Clinical trials studying bitter melon for blood-sugar support have used standardised fruit extract
    or juice preparations taken daily over several weeks; dosing varies by product. Because it can lower
    blood glucose, monitor levels closely if combining with diabetes medication. Educational reference
    only, not a prescription.
  reference_ids:
  - REF-1213
  - REF-1216
  status: verified
