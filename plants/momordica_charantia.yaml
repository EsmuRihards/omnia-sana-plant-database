id: momordica-charantia
scientific_name: Momordica charantia
common_names:
- Bitter Melon
- Bitter gourd
- Karela
- Balsam pear
family: Cucurbitaceae
parts_used:
- Fruit (unripe)
constituents:
- name: Cucurbitane-type triterpenoids (momordicosides)
  note: Now regarded as the main antidiabetic principles.
  reference_ids:
  - REF-0412
- name: Charantin
  compounds:
  - phytosterol
  note: A mixture of two sterol glucosides, historically credited with the hypoglycaemic effect.
  reference_ids:
  - REF-0412
- name: Polypeptide-p ('plant insulin')
  note: An insulin-like polypeptide of the fruit and seed.
  reference_ids:
  - REF-0412
- name: Vicine (in the seeds)
  compounds:
  - glycoside
  note: A pyrimidine glycoside that can trigger favism in G6PD-deficient people.
  reference_ids:
  - REF-0414
actions:
- action: anti-inflammatory
  note: Antioxidant and anti-inflammatory
  reference_ids:
  - REF-0412
  status: verified
- action: antidiabetic
  note: Antidiabetic / blood-sugar lowering (improves glucose uptake and GLUT4 translocation)
  reference_ids:
  - REF-0412
  - REF-0413
