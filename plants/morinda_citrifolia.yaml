contraindications:
- note: Generally safe in moderate amounts. High potassium content — use caution in renal disease. Rare
    cases of hepatotoxicity reported with excessive consumption. May interact with warfarin (due to vitamin
    K content). Avoid during pregnancy.
  reference_ids:
  - REF-0110
  - REF-0197
  - REF-0303
  status: verified
- note: Duke (2002) rates noni as +++ and notes analgesic, antirheumatic, antiarthritic, antitumor, antispasmodic,
    and hypotensive activities at the experimental level (score 1). Traditional Polynesian and South Asian
    medicine values it as a broad-spectrum tonic. The plant contains morindine, proxeronine, and damnacanthal,
    which are under investigation for immunomodulatory and anti-tumor effects. Duke notes that noni fruit
    can be consumed as food and is generally safe, though the juice has a strong unpleasant odor and taste.
    No significant toxicity has been reported with regular food consumption (Duke, 2002).
  reference_ids:
  - REF-0110
  - REF-0197
  - REF-0303
  status: verified
