contraindications:
- note: 'Pregnancy: Do not use (traditional concern around stimulating menstruation/uterus) (Health Canada,
    n.d.). Breastfeeding: Health Canada advises talk to a healthcare professional first (Health Canada,
    n.d.). Kids: It’s often described as a “gentle” traditional tea, but large amounts are not a good
    idea—there’s a published case where a toddler became very sleepy/“slowed down” after consuming a lot.
    Keep catnip tea away from toddlers unless a clinician advises it (Osterhoudt et al., 1997). Sedatives
    / alcohol: Catnip can be calming, so don’t stack it with other sedating herbs/sleep meds/alcohol (you
    could get extra drowsy) (WebMD, n.d.a). Essential oil caution: Catnip essential oil is concentrated.
    Research notes it may cause mild skin irritation for some people—always dilute, patch test, and never
    treat it like “tea.” (Reichert et al., 2019)'
  severity: caution
  reference_ids:
  - REF-0035
  - REF-0095
  - REF-0232
  status: verified
- note: Duke (2002) describes catnip primarily as a sedative, diaphoretic, and emmenagogue with experimental
    (score 1) support. It has demonstrated uterotonic and oxytocic activity, making it contraindicated
    in pregnancy. The active compounds include nepetalactone and iridoids. Catnip is classified as a mild
    nervine and antispasmodic in traditional North American herbal medicine, though clinical trials are
    lacking. Due to its emmenagogue and uterotonic properties, medicinal-dose use should be avoided during
    pregnancy (Duke, 2002).
  severity: caution
  reference_ids:
  - REF-0035
  - REF-0095
  - REF-0232
  status: verified
