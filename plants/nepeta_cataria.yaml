id: nepeta-cataria
scientific_name: Nepeta cataria
common_names:
- Catnip
- catmint
- catnep
family: Lamiaceae
parts_used:
- Flower
- Leaf
- Stem
- Whole Plant
botanical_description:
  text: Perennial herb, 30-100 cm tall, with greyish-green, downy, square stems typical of the mint family.
    Leaves are opposite, triangular-ovate with scalloped or toothed margins, grey-green above and softly
    felted (whitish) beneath, releasing a minty-lemony aroma when crushed. Small white flowers, spotted
    with purple or pink, are borne in dense terminal and axillary spikes. Nepetalactone, the volatile
    compound famous for its effect on cats, is concentrated in glandular hairs on the leaves and stems.
  height: 30-100 cm
  habit: Erect, bushy, greyish-downy perennial herb
  leaves: Opposite, triangular-ovate, scalloped/toothed, felted white beneath
  flowers: Small, white with purple/pink spotting, in dense terminal and axillary spikes
  stem: Square, greyish-green, downy
  root: Fibrous perennial rootstock
  fruit: Four small nutlets (typical Lamiaceae schizocarp)
  flowering_period: June-September
  reference_ids:
  - REF-0938
  status: verified
habitat:
  text: Native to Europe and temperate Asia and widely naturalised in North America; grows on disturbed,
    sunny ground - roadsides, waste places, hedgebanks and dry, calcareous or well-drained soils.
  reference_ids:
  - REF-0938
  status: verified
harvesting:
  text: The flowering aerial parts (leaf, stem and flower) are cut at or just before flowering (summer),
    when volatile nepetalactone content is highest, and dried quickly out of direct light.
  parts:
  - Leaf
  - Stem
  - Flower
  season: Summer, at or just before flowering
  reference_ids:
  - REF-0938
  - REF-0931
  status: verified
traditional_uses:
  text: Catnip has a long North American and European folk-medicine history as a mild sedative/nervine,
    diaphoretic (fever-reducing, sweat-promoting) remedy, carminative digestive and traditional emmenagogue;
    it was also given as a children's tea for colic and restlessness, though large amounts are not advised
    for young children and it is traditionally avoided in pregnancy.
  reference_ids:
  - REF-0938
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried aerial parts steeped in hot water as a traditional calming, digestive tea.
  reference_ids:
  - REF-0938
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried aerial parts.
  status: draft
- name: Essential oil
  text: Steam-distilled from the aerial parts; used mainly as a natural insect repellent (nepetalactone)
    rather than taken internally.
  reference_ids:
  - REF-0935
  status: verified
dosage:
- name: Infusion (tea)
  text: Traditional herbal guidance suggests a mild infusion of the dried aerial parts, up to a few cups
    daily for adults. Keep away from toddlers/young children beyond very small amounts and avoid medicinal-dose
    use in pregnancy. Educational reference only, not a prescription.
  status: draft
