  - REF-2073
- name: Volatile oil (nigellone, thymol, carvacrol)
  compounds:
  - essential-oil
  - thymol
  - carvacrol
  note: The aromatic fraction of the seed, contributing antimicrobial and antioxidant activity.
  reference_ids:
