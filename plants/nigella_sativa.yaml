id: nigella-sativa
scientific_name: Nigella sativa
common_names:
- Black Cumin
- Black Seed
- Black Caraway
- Kalonji
- Roman Coriander
- Habbatul Barakah
family: Ranunculaceae
external_ids:
  gbif: 5371700
  wikidata: Q160575
parts_used:
- Seed
botanical_description:
  text: Annual herb (Ranunculaceae), 20-90 cm tall, with an erect, branched stem and finely divided, pinnately
    dissected, fern-like leaves. Delicate pale blue-white (occasionally pale purple) flowers, each with
    5-10 petal-like sepals, are surrounded by a feathery bract collar. The fruit is an inflated, many-celled
    capsule that dries and splits to release numerous small, black, angular seeds - the medicinal part.
  height: 20-90 cm
  habit: Erect, branched annual herb
  leaves: Finely pinnately dissected, fern-like
  flowers: Pale blue-white (occasionally pale purple), 5-10 petal-like sepals, feathery bract collar
  stem: Erect, branched
  root: Slender taproot
  fruit: Inflated capsule splitting to release small black angular seeds
  flowering_period: June-August
  reference_ids:
  - REF-2065
  status: verified
habitat:
  text: Native to the Mediterranean basin, southern Europe, western Asia and North Africa, and widely
    cultivated as a spice and medicinal crop across the Middle East, South Asia and North Africa; grows
    in cultivated fields and on disturbed ground.
  reference_ids:
  - REF-2065
  status: verified
harvesting:
  text: Seed capsules are harvested once dried and brown (late summer), then threshed to release the small
    black seeds. Seed is stored whole and either used directly or cold-pressed for oil shortly before
    use to preserve the volatile thymoquinone-rich fraction.
  parts:
  - Seed
  season: Late summer, once capsules have dried
  reference_ids:
  - REF-2065
  status: verified
traditional_uses:
  text: One of the most celebrated medicinal seeds in Middle Eastern and Islamic traditional medicine
    - known as 'Habbatul Barakah' (the blessed seed) - black seed has traditionally been used for digestive
    complaints, respiratory conditions (asthma, cough), pain, inflammation, skin conditions and as a general
    tonic. Modern research on its principal constituent thymoquinone supports broad anti-inflammatory,
    antioxidant, antimicrobial, antidiabetic and immunomodulatory activity.
  reference_ids:
  - REF-2065
  - REF-2066
  - REF-2073
  status: verified
preparations:
- name: Whole or ground seed
  text: Seed eaten directly, sprinkled on food, or ground into a paste - the traditional culinary-medicinal
    form.
  reference_ids:
  - REF-2065
  status: verified
- name: Cold-pressed seed oil
  text: The form most used in clinical trials, taken orally in capsules or as a liquid.
  reference_ids:
  - REF-2067
  - REF-2073
  status: verified
- name: Infusion/decoction
  text: Crushed seed steeped or simmered in hot water.
  status: draft
- name: Topical oil
  text: Seed oil applied to skin for irritation or infection.
  status: draft
dosage:
- name: Seed oil
  text: Clinical trials have generally been well tolerated at doses up to about 200 mg/day of oil taken
    for up to 90 days. Educational reference only, not a prescription; avoid medicinal doses in pregnancy.
  reference_ids:
