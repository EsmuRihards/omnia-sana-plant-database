- note: Duke (2002) describes black cumin (Nigella sativa) as one of the most multi-active medicinal spices,
    with experimental evidence for bronchodilation, immunostimulation, hepatoprotection, and antihistaminic
    activity. The prophet Muhammad reportedly described it as 'a cure for all things except death.' Key
    bioactive compounds include thymoquinone and nigellone. Antihistaminic and bronchodilatory activity
    supports its traditional use in asthma and allergic conditions. Duke notes it is generally safe at
    culinary amounts but recommends caution with medicinal doses in pregnancy due to potential uterotonic
    effects (Duke, 2002).
