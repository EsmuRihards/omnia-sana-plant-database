contraindications:
- note: Generally well-tolerated in clinical trials at doses up to 200 mg/day of oil for 90 days. Potential
    side effects may include mild gastrointestinal discomfort. Contraindicated during pregnancy due to
    potential uterine stimulant effects. May interact with immunosuppressants and antidiabetic medications.
    Allergic reactions possible in sensitive individuals. Consult healthcare provider before use, especially
    with concurrent medications.
