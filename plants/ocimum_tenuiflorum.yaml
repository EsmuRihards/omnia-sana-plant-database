contraindications:
- note: Generally well tolerated; mild nausea has been reported. Its blood-sugar-lowering effect means
    caution alongside antidiabetic medicines.
  severity: caution
  reference_ids:
  - REF-0466
  status: verified
- note: Animal studies suggest mild anti-fertility and antiplatelet effects, so avoid medicinal doses
    when pregnant or trying to conceive, and before surgery.
  severity: caution
