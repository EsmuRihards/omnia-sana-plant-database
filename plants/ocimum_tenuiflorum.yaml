internal_notes: 'Enriched 2026-06-12 from scientific literature (Evidence-Based Complementary and Alternative
  Medicine systematic review of clinical efficacy; Anti-Cancer Drugs ethnomedicinal review). Ocimum tenuiflorum
  = Ocimum sanctum. Originally a skeleton (merged tool + Materia Medica stub) from omniasana.bio (stress,
  anxiety, blood-sugar, immune-support); now fully part-mapped and cited. Further enriched 2026-06-14
  with a PubMed-sourced placebo-controlled study of holy basil leaf extract reporting improved cognitive
  parameters (reaction time, accuracy, P300 latency) in healthy adults (REF-0596; small single trial,
  hence needs-review). | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split
  out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific publications: added
  10 PubMed-verified @article sources (REF-1427, REF-1428, REF-1429, REF-1430, REF-1431, REF-1432, REF-1433,
  REF-1434, REF-1435, REF-1436) — woven into relevant actions/indications and the plant-level references
  bucket.'
