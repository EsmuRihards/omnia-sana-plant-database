common_names:
- Holy Basil
- Tulsi
- Sacred basil
scientific_name: Ocimum tenuiflorum
family: Lamiaceae
parts_used:
- name: Leaf
  medicinal_actions:
  - action: Adaptogen for stress and anxiety (improves stress scores and well-being in trials)
    reference_ids:
    - REF-0466
    status: verified
  - action: Supports blood-sugar control (lowers fasting and post-meal glucose)
    reference_ids:
    - REF-0466
    status: verified
  - action: Immunomodulatory / immune support
    reference_ids:
    - REF-0466
    - REF-0467
    status: verified
  - action: Antioxidant and anti-inflammatory
    reference_ids:
    - REF-0467
    status: verified
constituents:
- name: Volatile oil rich in eugenol
  note: The principal aromatic constituent, with anti-inflammatory and antimicrobial activity.
  reference_ids:
  - REF-0467
- name: Ursolic acid, rosmarinic acid, apigenin and luteolin
  note: Antioxidant and adaptogenic constituents.
  reference_ids:
  - REF-0467
contraindications:
- note: Generally well tolerated; mild nausea has been reported. Its blood-sugar-lowering effect means
    caution alongside antidiabetic medicines.
  reference_ids:
  - REF-0466
  status: verified
- note: Animal studies suggest mild anti-fertility and antiplatelet effects, so avoid medicinal doses
    when pregnant or trying to conceive, and before surgery.
  reference_ids:
  - REF-0466
  - REF-0467
  status: needs-review
internal_notes: Enriched 2026-06-12 from scientific literature (Evidence-Based Complementary and Alternative
  Medicine systematic review of clinical efficacy; Anti-Cancer Drugs ethnomedicinal review). Ocimum tenuiflorum
  = Ocimum sanctum. Originally a skeleton (merged tool + Materia Medica stub) from omniasana.bio (stress,
  anxiety, blood-sugar, immune-support); now fully part-mapped and cited.
last_updated: '2026-06-12'
status: verified
