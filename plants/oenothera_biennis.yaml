dosage:
- name: Seed oil
  text: Clinical trials evaluating evening primrose oil have most often used around 2-4 g of oil daily,
    taken for at least several weeks; evidence of benefit is inconsistent across most studied conditions.
    Educational reference only, not a prescription.
