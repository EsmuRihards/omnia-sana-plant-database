internal_notes: 'Enriched 2026-06-12 from scientific literature (BMC Complementary Medicine and Therapies
  systematic review; Cochrane review of EPO/borage oil for eczema). Evidence for most symptom claims is
  weak or negative, reflected in needs-review action statuses. Originally a skeleton imported from the
  omniasana.bio Symptom-to-Plant Lookup tool (eczema, pms, skin-irritation, inflammation, menopause);
  associations retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced
  randomized controlled trial reporting that evening primrose oil reduced cyclical mastalgia severity
  versus placebo (combination with vitamin E most effective) (REF-0600); the cyclical breast-pain action
  remains needs-review given the heterogeneous broader literature. | 2026-06-15: migrated to entity schema
  (actions->vocab ids, indications split out, constituents linked to compounds). Unmapped uses kept for
  reference: Dietary source of gamma-linolenic acid (GLA), an omega-6 fatty acid (the rationale for its
  use). | 2026-06-20: enriched to >=10 scientific publications: added 9 PubMed-verified @article sources
  (REF-1457, REF-1458, REF-1459, REF-1460, REF-1461, REF-1462, REF-1463, REF-1464, REF-1465) — woven into
  relevant actions/indications and the plant-level references bucket.'
