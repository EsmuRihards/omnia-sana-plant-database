botanical_description:
  text: 'Biennial herb (Onagraceae): a basal leaf rosette in the first year, followed in the second year
    by a stout, often reddish, erect flowering stem 30-150 cm tall. Leaves are alternate, lanceolate,
    with a prominent pale (often red-tinged) midrib and a wavy, untoothed margin. Large, fragrant, lemon-scented,
    four-petalled yellow flowers open in the evening and typically wilt by the following midday, followed
    by a narrow, cylindrical seed capsule.'
  height: 30-150 cm (flowering stem, second year)
  habit: 'Biennial: first-year basal rosette, second-year erect flowering stem'
  leaves: Alternate, lanceolate, wavy (untoothed) margin, prominent pale midrib
  flowers: Large, fragrant, lemon-scented, yellow, four-petalled, opening in the evening
  stem: Stout, often reddish, erect (second year)
  root: Taproot
  fruit: Narrow cylindrical seed capsule
  flowering_period: June-September
  status: draft
habitat:
  text: Native to eastern North America, widely naturalised across Europe, Asia and elsewhere on disturbed,
    sunny ground - waste places, roadsides, dunes and railway banks - as a hardy coloniser of poor, sandy
    or gravelly soils.
  status: draft
harvesting:
  text: Mature seed capsules are harvested in late summer to autumn once dry and brown, and the tiny seeds
    are cold-pressed for their oil, the medicinal part. The first-year rosette leaves and young shoots
    have traditionally been used as food, but must never be gathered without certain identification given
    the deadly foxglove look-alike risk documented for this plant.
  parts:
  - Seed
  season: Late summer to autumn
  reference_ids:
  - REF-2700
  status: verified
traditional_uses:
  text: Evening primrose has a Native American tradition as a food and poultice plant, but its modern
    use is almost entirely as a dietary source of gamma-linolenic acid (GLA), an omega-6 fatty acid marketed
    for skin, hormonal and inflammatory complaints. Clinical trial evidence for these specific uses (eczema,
    PMS, menopause) is mixed to weak, and a Cochrane review found oral evening primrose oil is not effective
    for eczema.
  reference_ids:
  - REF-0446
  - REF-0447
  - REF-1458
  status: verified
preparations:
- name: Cold-pressed seed oil (capsules)
  text: The standard commercial form, standardised for GLA content - the form used in most clinical trials.
  reference_ids:
