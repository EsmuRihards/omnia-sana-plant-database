id: oenothera-biennis
scientific_name: Oenothera biennis
common_names:
- Evening Primrose
- Evening star
- Sundrop
- Fever plant
family: Onagraceae
parts_used:
- Seed oil
constituents:
- name: Gamma-linolenic acid (GLA) and linoleic acid
  compounds:
  - gla
  note: Omega-6 essential fatty acids of the seed oil; GLA is the constituent the supplement is taken
    for.
  reference_ids:
  - REF-0446
  - REF-0447
  - REF-1457
  - REF-1459
  - REF-1461
  - REF-1465
- name: Other seed-oil fatty acids and plant sterols
  compounds:
  - phytosterol
  note: Minor lipid constituents.
  reference_ids:
  - REF-0446
actions:
- action: emollient
  note: Skin hydration and barrier function in healthy skin
  reference_ids:
  - REF-0446
  - REF-1457
  - REF-1461
  status: needs-review
indications:
- condition: eczema
  note: Eczema / atopic dermatitis - popularly used, but a Cochrane review found oral EPO is NOT effective
  reference_ids:
  - REF-0447
  - REF-1458
  - REF-2587
  status: needs-review
- condition: hot-flashes
  note: Menopausal hot flushes - some trial benefit reported
  reference_ids:
  - REF-0446
  - REF-2588
  status: needs-review
- condition: inflammation
  reference_ids: []
  status: needs-review
- condition: menopause
  reference_ids:
  - REF-2588
  status: needs-review
- condition: pain
  note: Premenstrual syndrome and cyclical breast pain - some positive but inconsistent trial results
    (a recent RCT found evening primrose oil reduced cyclical breast-pain severity versus placebo, with
    a combination of EPO and vitamin E most effective)
  reference_ids:
  - REF-0446
  - REF-0600
  - REF-1463
  status: needs-review
- condition: pms
  note: Premenstrual syndrome and cyclical breast pain - some positive but inconsistent trial results
    (a recent RCT found evening primrose oil reduced cyclical breast-pain severity versus placebo, with
    a combination of EPO and vitamin E most effective)
  reference_ids:
  - REF-0446
  - REF-0600
  status: needs-review
- condition: skin-irritation
  note: inferred from emollient action
  reference_ids:
  - REF-0446
  status: needs-review
contraindications:
- note: 'Evidence is weak and largely negative: a Cochrane review concluded that oral evening primrose
    oil is not an effective treatment for eczema, and the broader trial literature is heterogeneous. Adverse
    effects are mild and mainly gastrointestinal.'
  severity: info
  reference_ids:
  - REF-0447
  - REF-0446
  status: verified
- note: May increase bleeding risk and has been reported to interact with warfarin; avoid concentrated/medicinal
    use in pregnancy unless advised by a clinician.
  severity: caution
  reference_ids:
  - REF-0447
  status: verified
