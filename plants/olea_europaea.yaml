id: olea-europaea
scientific_name: Olea europaea
common_names:
- Olive
- common olive
- European olive
family: Oleaceae
parts_used:
- Fruit
- Leaf
- Seed
botanical_description:
  text: Evergreen tree (Oleaceae), typically 3-15 m tall, often gnarled and long-lived, with some specimens
    surviving for centuries. Leaves are narrow, leathery, lance-shaped, dark green above and silvery-grey
    beneath. Small, fragrant, creamy-white four-lobed flowers are borne in axillary clusters, followed
    by a fleshy drupe (the olive) that ripens from green to purple-black.
  height: 3-15 m
  habit: Evergreen tree, often gnarled and long-lived
  leaves: Narrow, leathery, lance-shaped, dark green above, silvery-grey beneath
  flowers: Small, fragrant, creamy-white, four-lobed, in axillary clusters
  stem: Woody, often gnarled trunk
  root: Extensive woody root system
  fruit: Fleshy drupe (the olive), ripening from green to purple-black
  flowering_period: Late spring to early summer (May-June)
  reference_ids:
  - REF-1437
  status: verified
habitat:
  text: Native to the Mediterranean basin, the Near East and parts of Africa, and cultivated for millennia
    across Mediterranean-type climates worldwide (warm, dry summers and mild winters); tolerates poor,
    rocky, calcareous soils and drought.
  reference_ids:
  - REF-1437
  status: verified
harvesting:
  text: Leaves can be harvested year-round from pruned or fallen branches, generally at their highest
    oleuropein content in late autumn and winter; fruit is hand- or machine-harvested from early autumn
    (green olives) through winter (fully ripe black olives), depending on the intended product.
  parts:
  - Leaf
  - Fruit
  season: Leaf year-round (peak late autumn/winter); fruit autumn to winter
  reference_ids:
  - REF-1446
  status: verified
traditional_uses:
  text: Olive leaf and fruit have a long Mediterranean tradition as a tonic, antipyretic and mild antihypertensive
    remedy, and olive oil is the foundation fat of the traditional Mediterranean diet, long associated
    with cardiovascular health. Modern research on oleuropein and other leaf polyphenols supports antioxidant,
    anti-inflammatory, antimicrobial, blood-pressure-lowering and insulin-sensitising effects consistent
    with these traditional and dietary uses.
  reference_ids:
  - REF-1437
  - REF-1440
  - REF-1443
  status: verified
preparations:
- name: Leaf infusion (tea)
  text: Dried leaf steeped in hot water, a traditional mild antihypertensive and tonic tea.
  status: draft
- name: Standardised leaf extract
  text: Capsule or liquid extract standardised for oleuropein content - the form used in most clinical
    trials.
  reference_ids:
  - REF-1443
  - REF-1445
  status: verified
- name: Olive oil (culinary)
  text: Extra-virgin, cold-pressed oil, the everyday dietary form and the basis of the Mediterranean diet.
  status: draft
- name: Table olives (fruit)
  text: Cured or fermented ripe or unripe fruit eaten as food.
  status: draft
dosage:
- name: Standardised leaf extract
  text: A meta-analysis of trials for blood pressure used around 500 mg/day of standardised olive leaf
    extract. Educational reference only, not a prescription; culinary olive oil and leaf tea are considered
    food-safe at normal dietary amounts.
  reference_ids:
  - REF-2537
  status: verified
