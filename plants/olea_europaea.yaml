contraindications:
- note: Olive leaf extract may lower blood pressure; use caution if already on antihypertensive medication.
    May have mild hypoglycaemic effects. Olive oil is safe for dietary use. Rare olive pollen allergy.
    Well tolerated in normal culinary and supplement doses.
  severity: caution
  reference_ids:
  - REF-0032
  - REF-0299
  - REF-0301
  status: verified
- note: Duke (2002) includes olive leaf as ++ and notes hypotensive, hypoglycemic, ACE inhibitor-like,
    and antioxidant activities at the experimental level (score 1). Olive leaf extract (containing oleuropein)
    has demonstrated blood pressure-lowering and antiarrhythmic effects consistent with clinical support
    (PHR). Duke notes that traditional Mediterranean use for both the leaf and fruit is food-grade and
    safe. Olive leaf preparations are used as mild antihypertensives in European phytotherapy. No significant
    adverse effects are reported at standard herbal doses (Duke, 2002).
  severity: info
  reference_ids:
  - REF-0032
  - REF-0299
  - REF-0301
  status: verified
