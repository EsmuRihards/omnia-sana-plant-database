  reference_ids:
  - REF-1437
- name: Squalene and monounsaturated fatty acids (oleic acid)
  note: The dominant fatty acid of the fruit oil, a key component of the Mediterranean-diet lipid profile.
  reference_ids:
  - REF-1437
