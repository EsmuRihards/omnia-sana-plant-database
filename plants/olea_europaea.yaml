drug_class_interactions:
- drug_class: antidiabetics
  severity: caution
  mechanism: 'Olive leaf improves insulin sensitivity and glucose handling; combined with diabetes medicines it may add to blood-sugar lowering, so monitor blood sugar.'
  reference_ids:
  - REF-2487
  - REF-2485
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antihypertensives
  severity: caution
  mechanism: 'Olive leaf can modestly lower blood pressure - a meta-analysis found about a 6 mmHg fall in systolic pressure at 500 mg/day, though the evidence base is small. Combined with blood-pressure medicines it may add to their effect, so monitor your blood pressure.'
  reference_ids:
  - REF-2537
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: nigella-sativa
  type: caution
  note: 'Olive leaf and black seed (Nigella sativa) can each mildly lower blood pressure, so taking them together — especially alongside blood-pressure medicines — may add up and lower blood pressure more than expected. Monitor your blood pressure.'
  reference_ids:
  - REF-2537
  - REF-2512
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
