botanical_description:
  text: A tough, deep-rooted perennial herb or low subshrub of the pea family, 30-80 cm tall, sometimes
    bearing soft spines. It has a very long, woody, tenacious taproot - so strong it was said to stop
    (arrest) the harrow, giving 'rest-harrow' its name. The stems are hairy and sticky, often reddish,
    and clothed in small trifoliolate (clover-like) leaves with toothed leaflets. The flowers are typical
    pea flowers, pink to purplish-pink (occasionally white), borne singly or in pairs in the leaf axils.
    Field restharrow (O. arvensis) is generally less spiny than its close relative spiny restharrow (O.
    spinosa).
  height: 30-80 cm
  habit: Deep-rooted perennial herb or low subshrub, sometimes softly spiny
  leaves: Trifoliolate (clover-like), with finely toothed leaflets; stems hairy and glandular-sticky
  flowers: Pea-type, pink to purplish-pink (rarely white), solitary or paired in the leaf axils
  stem: Erect to ascending, hairy and sticky, often reddish; less spiny than O. spinosa
  root: Very long, woody, tenacious taproot (the medicinal Ononidis radix)
  fruit: A small, hairy, few-seeded pea pod
  flowering_period: June-September
  reference_ids:
  - REF-2748
  - REF-2750
  status: verified
habitat:
  text: Rough grassland, field margins, roadsides, dunes and dry, sandy or calcareous waste ground across
    Europe, western Asia and parts of North Africa. As a deep-rooted, nitrogen-fixing legume it colonises
    poor, disturbed soils and was historically a troublesome weed of arable fields (hence 'restharrow').
  reference_ids:
  - REF-2748
  status: verified
harvesting:
  text: The root (Ononidis radix) is the principal medicinal part, dug in autumn from the second year
    onward and dried; the aerial flowering parts are also gathered in summer. The long woody taproot is
    cleaned and cut before drying for decoctions and infusions.
  parts:
  - Root
  - Aerial parts
  season: Root in autumn; aerial parts in flower (summer)
  reference_ids:
  - REF-2748
  status: verified
traditional_uses:
  text: Restharrow root has a long place in European herbal medicine as a gentle aquaretic diuretic used
    for 'irrigation therapy' of the urinary tract - to increase urine flow in cystitis, urinary gravel
    and stones, and to flush the bladder. Field restharrow (Ononis arvensis) is used interchangeably with
    the officinal spiny restharrow (O. spinosa, Ononidis radix). The root and flowering herb have also
    been used as a mild anti-inflammatory, for skin complaints and eczema, for rheumatic conditions, and
    (as a decoction or gargle) for the mouth and throat. The isoflavone-rich root is a folk remedy in
    central and eastern European traditions.
  reference_ids:
  - REF-2748
  - REF-2753
  status: verified
