contraindications:
- note: 'A safety signal exists in the genus: an Ononis spinosa root extract showed hepatotoxic effects
    at higher doses in animals (alongside analgesic activity). Avoid excessive or prolonged use, and use
    caution in liver disease.'
  severity: warning
  reference_ids:
  - REF-2758
  status: verified
- note: Used as an aquaretic for irrigation therapy of the urinary tract, restharrow should be taken with
    a generous fluid intake; it should NOT be used for 'flushing' when there is oedema due to impaired
    heart or kidney function (standard irrigation-therapy caution).
  severity: caution
  reference_ids:
  - REF-2753
  status: verified
- note: The root is rich in isoflavone phytoestrogens (formononetin); avoid medicinal doses in pregnancy
    and breastfeeding and use caution in hormone-sensitive conditions.
  severity: caution
  reference_ids:
