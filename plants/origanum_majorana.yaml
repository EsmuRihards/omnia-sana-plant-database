contraindications:
- note: Generally very safe as a culinary herb. Essential oil should not be ingested in large amounts
    and avoided in pregnancy. Theoretically may interact with anticoagulants. Avoid medicinal doses during
    pregnancy.
  severity: caution
  reference_ids:
  - REF-0020
  - REF-0112
  - REF-0266
  status: verified
- note: 'Duke (2002) rates marjoram (Origanum majorana) as +++ and notes antiviral, antispasmodic, COX-2
    inhibitory, and antiseptic activities at the experimental level (score 1). It demonstrates antiherpetic
    activity in vitro. The plant contains rosmarinic acid and thymol, which contribute to antioxidant
    and antimicrobial effects. Dose: 1–2 g dried herb as tea three times daily or equivalent preparations.
    Duke notes the plant is generally well-tolerated with no significant contraindications at usual herbal
    doses (Duke, 2002).'
  severity: caution
  reference_ids:
  - REF-0020
  - REF-0112
  - REF-0266
  status: verified
