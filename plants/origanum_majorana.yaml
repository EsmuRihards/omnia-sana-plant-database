id: origanum-majorana
scientific_name: Origanum majorana
common_names:
- Marjoram
- sweet marjoram
- knotted marjoram
family: Lamiaceae
parts_used:
- Flower
- Leaf
botanical_description:
  text: Tender perennial subshrub (Lamiaceae), often grown as an annual in cold climates, 20-60 cm tall,
    with square, downy, much-branched stems. Leaves are opposite, small, grey-green and ovate. Tiny white
    to pale pink, two-lipped flowers are borne in distinctive knot-like clustered spikes, the origin of
    the common name 'knotted marjoram'.
  height: 20-60 cm
  habit: Bushy, downy perennial subshrub (often grown as an annual)
  leaves: Opposite, small, grey-green, ovate
  flowers: Tiny, white to pale pink, two-lipped, in knot-like clustered spikes
  stem: Square, downy, much-branched
  root: Fibrous perennial rootstock (in warm climates)
  fruit: Four small nutlets (typical Lamiaceae schizocarp)
  flowering_period: July-September
  reference_ids:
  - REF-1228
  status: verified
habitat:
  text: Native to Cyprus, Turkey and the eastern Mediterranean, and widely cultivated as a culinary and
    medicinal herb in gardens worldwide; prefers full sun and well-drained, often calcareous soils.
  reference_ids:
  - REF-1228
  status: verified
harvesting:
  text: The aerial flowering parts are cut just before or at flowering (summer), when essential-oil content
    is highest, and dried quickly in a warm, shaded, well-ventilated place.
  parts:
  - Leaf
  - Flower
  season: Summer, just before or at flowering
  reference_ids:
  - REF-1231
  status: verified
traditional_uses:
  text: Marjoram has a long Mediterranean culinary-medicinal tradition as a digestive carminative and
    mild sedative for indigestion, cramping and poor sleep, and as an antiseptic for minor wounds and
    infections. Modern research confirms antispasmodic, antimicrobial, antioxidant and anti-inflammatory
    activity from its essential oil and phenolic constituents.
  reference_ids:
  - REF-1228
  - REF-1230
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried herb steeped in hot water as a digestive, calming tea.
  reference_ids:
  - REF-0020
  - REF-0112
  - REF-0266
  status: verified
- name: Essential oil (topical)
  text: Diluted essential oil applied for muscular aches or minor skin infections.
  reference_ids:
  - REF-1226
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried herb.
  status: draft
- name: Culinary use
  text: Fresh or dried herb used as a seasoning, providing a mild, ongoing dietary digestive benefit.
  status: draft
dosage:
- name: Infusion (tea)
  text: Duke (2002) suggests about 1-2 g dried herb as tea, three times daily, or equivalent preparations.
    Educational reference only, not a prescription; avoid medicinal doses in pregnancy.
