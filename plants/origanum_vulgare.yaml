contraindications:
- note: Culinary amounts are safe. Concentrated oregano essential oil is a strong irritant - dilute well
    before any topical use and do not take undiluted oil internally.
  severity: caution
  reference_ids:
  - REF-0486
  status: verified
- note: May lower blood sugar and has a mild antiplatelet effect, so use caution with antidiabetic or
    anticoagulant medicines; avoid medicinal/oil doses in pregnancy. Allergy is possible in people sensitive
    to the mint family (Lamiaceae).
  severity: caution
  reference_ids:
  - REF-0485
  status: needs-review
