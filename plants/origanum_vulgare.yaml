internal_notes: 'Enriched 2026-06-12 from scientific literature (Iranian Journal of Pharmaceutical Research
  phytochemistry/antimicrobial review; Phytotherapy Research carvacrol review). Note: this is Origanum
  vulgare (wild marjoram), distinct from the book''s Origanum majorana (sweet marjoram). Originally a
  skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (cold, cough, indigestion, infection,
  inflammation); associations retained and now part-mapped and cited. Further enriched 2026-06-14 with
  a PubMed-sourced small clinical study showing emulsified oregano oil eradicated enteric parasites (incl.
  Blastocystis hominis) and improved gastrointestinal symptoms (REF-0597). | 2026-06-15: migrated to entity
  schema (actions->vocab ids, indications split out, constituents linked to compounds). | 2026-06-20:
  enriched to >=10 scientific publications: added 10 PubMed-verified @article sources (REF-1447, REF-1448,
  REF-1449, REF-1450, REF-1451, REF-1452, REF-1453, REF-1454, REF-1455, REF-1456) — woven into relevant
  actions/indications and the plant-level references bucket. | 2026-07-11: added botanical_description/habitat/harvesting/traditional_uses/preparations/dosage
  monograph-base fields, sourced from the existing phytochemistry review (REF-0485) and carvacrol review
  (REF-0486).'
