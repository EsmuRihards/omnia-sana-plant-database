common_names:
- Oregano
- Wild marjoram
- Origanum
scientific_name: Origanum vulgare
family: Lamiaceae
parts_used:
- name: Aerial parts (leaf/herb) and essential oil
  medicinal_actions:
  - action: Antimicrobial (antibacterial and antifungal via carvacrol and thymol) - supports respiratory
      and gastrointestinal infections
    reference_ids:
    - REF-0485
    - REF-0486
    status: verified
  - action: Aromatic support for coughs and colds (traditional)
    reference_ids:
    - REF-0485
    status: needs-review
  - action: Carminative digestive for indigestion (traditional bitter aromatic)
    reference_ids:
    - REF-0485
    status: needs-review
  - action: Antioxidant and anti-inflammatory
    reference_ids:
    - REF-0486
    - REF-0485
    status: verified
constituents:
- name: Essential oil rich in carvacrol and thymol
  note: Phenolic monoterpenes responsible for the strong antimicrobial activity.
  reference_ids:
  - REF-0485
  - REF-0486
- name: Phenolic acids (rosmarinic acid) and flavonoids
  note: Antioxidant constituents.
  reference_ids:
  - REF-0485
contraindications:
- note: Culinary amounts are safe. Concentrated oregano essential oil is a strong irritant - dilute well
    before any topical use and do not take undiluted oil internally.
  reference_ids:
  - REF-0486
  status: verified
- note: May lower blood sugar and has a mild antiplatelet effect, so use caution with antidiabetic or
    anticoagulant medicines; avoid medicinal/oil doses in pregnancy. Allergy is possible in people sensitive
    to the mint family (Lamiaceae).
  reference_ids:
  - REF-0485
  status: needs-review
internal_notes: 'Enriched 2026-06-12 from scientific literature (Iranian Journal of Pharmaceutical Research
  phytochemistry/antimicrobial review; Phytotherapy Research carvacrol review). Note: this is Origanum
  vulgare (wild marjoram), distinct from the book''s Origanum majorana (sweet marjoram). Originally a
  skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (cold, cough, indigestion, infection,
  inflammation); associations retained and now part-mapped and cited.'
last_updated: '2026-06-12'
status: verified
