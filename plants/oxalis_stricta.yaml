  note: Tannins contributing to astringent/antidiarrhoeal activity.
  reference_ids:
  - REF-2781
- name: Oxalic acid and soluble oxalates
  note: The defining sour constituent - oxalic acid with potassium and calcium oxalates - biosynthesised
    in part from vitamin C. Responsible for the sour taste and for the kidney-stone/oxalate caution.
  reference_ids:
  - REF-2778
- name: Vitamin C (L-ascorbic acid)
  note: High ascorbate content (basis of the traditional antiscorbutic use); also a metabolic precursor
    of the plant's oxalic acid.
  reference_ids:
  - REF-2778
- name: Acidic polysaccharide
  compounds:
  - polysaccharide
  note: An acidic polysaccharide with antioxidant activity.
  reference_ids:
