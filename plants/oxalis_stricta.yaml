internal_notes: 'Created 2026-07-10. SPARSE species: genuine Oxalis stricta-specific medicinal literature
  is only 2 papers (REF-2778 oxalate/ascorbate metabolism; REF-2779 O. stricta-extract ZnO nanoparticle
  anticancer). The rest of PubMed for O. stricta is genomics/invasion-ecology/floristics/entomology (rejected).
  Entry therefore relies substantially on the near-identical congener Oxalis corniculata (creeping yellow
  woodsorrel), which shares the same folk-medicine identity (''yellow woodsorrel'') and is extensively
  studied - 13 clearly-labelled O. corniculata refs REF-2780..REF-2792 (2 reviews + 11 preclinical: hepatoprotective,
  gastroprotective, anticancer, antidiabetic, neuroprotective, antimicrobial/antiparasitic, wound/fracture
  healing, polysaccharide). Total 15 (2 genuine + 13 congener); genuine-species evidence is minimal -
  treat pharmacology as O. corniculata-derived. Research-workflow leads (wf_25f58939-508) self-verified
  via PubMed metadata (adversarial-verify stage failed on the session limit). Key safety: OXALATE content
  -> kidney-stone warning (REF-2778). lookalikes none-known (distinctive clover-like sour leaves + yellow
  flowers; no deadly confusable). Cross-links via shared compounds (flavonoid/quercetin/tannin/polysaccharide)
  and indications (liver-support/gastroprotective/antidiabetic). | 2026-07-13: added anticancer action
  (where absent) + cancer indication (anticancer/antitumour research) sourced from the plant''s cited
  literature, as part of the cancer-condition campaign.'
