contraindications:
- note: Yellow woodsorrel is RICH IN OXALIC ACID and soluble oxalates (the source of its sour taste).
    Avoid large or frequent quantities, and especially avoid it if you are prone to calcium-oxalate kidney
    stones, have gout, or have kidney disease. Oxalates also bind calcium and iron, reducing their absorption.
    Use only modest amounts, and cooking reduces soluble oxalate.
  severity: warning
  reference_ids:
  - REF-2778
  status: verified
- note: Safety in pregnancy and breastfeeding has not been established; avoid medicinal doses during pregnancy
    and lactation.
  severity: caution
  status: verified
- note: Most modern pharmacological data come from the near-identical congener Oxalis corniculata; the
    two yellow woodsorrels are used interchangeably in folk medicine, but human clinical trials are lacking
    for either species.
  severity: info
