botanical_description:
  text: A small, sour-tasting herbaceous annual to short-lived perennial of the woodsorrel family, 10-40
    cm tall. Its bright green leaves are clover-like, palmately divided into three heart-shaped (notched)
    leaflets that fold down at night and in strong sun. The small five-petalled flowers are bright yellow,
    borne in little clusters on axillary stalks. The whole plant tastes sharply sour from its oxalic-acid
    content. It is very similar to the creeping yellow woodsorrel (Oxalis corniculata) but has more upright
    stems that do not root at the nodes, and generally green (not purplish) foliage.
  height: 10-40 cm
  habit: Upright to ascending annual or short-lived perennial; stems not rooting at the nodes (unlike
    creeping O. corniculata)
  leaves: Alternate, long-stalked, trifoliolate (clover-like) with three heart-shaped leaflets that fold
    at night; sour to taste
  flowers: Small, 5-petalled, bright yellow, in axillary clusters
  stem: Slender, erect to ascending, branched, often finely hairy, green
  root: Slender fibrous roots, sometimes with thin rhizomes
  fruit: An erect, cylindrical, five-angled capsule that splits explosively to scatter the seeds
  flowering_period: May-October
  reference_ids:
  - REF-2780
  status: verified
habitat:
  text: 'A common weed of disturbed, open and cultivated ground: gardens, lawns, arable fields, roadsides,
    footpaths, waste places and greenhouses. It favours moist, fertile, well-lit soils and is excluded
    by dense established vegetation. Native to North America but now naturalised almost worldwide across
    temperate and warm regions.'
  reference_ids:
  - REF-2780
  status: verified
harvesting:
  text: The sour leaves and aerial parts are gathered when actively growing and flowering, used fresh
    or dried. Because the plant accumulates oxalic acid, harvesting for food or medicine should favour
    young growth in modest quantities. As a low weed it is easily hand-gathered.
  parts:
  - Aerial parts
  - Leaf
  - Flower
  season: Spring to autumn during active growth and flowering
  reference_ids:
  - REF-2780
  status: verified
traditional_uses:
  text: Yellow woodsorrel (Oxalis stricta and its near-identical relative O. corniculata) has a long folk-medicine
    history, deepest in South and East Asian traditions. The cooling, sour whole plant has been used as
    a refrigerant and thirst-quencher, as a sour leafy vegetable/condiment, and as a source of vitamin
    C against scurvy. Traditional medicinal uses (chiefly documented for O. corniculata) include dysentery
    and diarrhoea and other digestive complaints, fever, liver complaints, and topical application of
    the crushed leaves or juice to wounds, insect bites, warts, corns, mouth sores and inflamed skin,
    as well as use as a mild diuretic. O. stricta shares these uses where the two woodsorrels are not
    distinguished.
  reference_ids:
  - REF-2781
  - REF-2780
  status: verified
preparations:
- name: Fresh juice / poultice
  text: Crushed fresh leaves or expressed juice applied topically to wounds, insect bites, warts and inflamed
    skin, or taken in small amounts for its cooling sour effect.
  reference_ids:
  - REF-2781
  status: verified
- name: Infusion / decoction
  text: A whole-plant or leaf infusion/decoction used traditionally for fevers, diarrhoea and as a mild
    diuretic.
  reference_ids:
  - REF-2781
  status: draft
- name: Sour culinary green
  text: Young leaves eaten raw in small quantities as a tart salad green or to add sourness to food (edible
    'sourgrass').
  reference_ids:
  - REF-2780
  status: draft
dosage:
- name: Fresh herb (culinary/traditional)
  text: No standardised medicinal dose is established. Traditionally used as small quantities of the fresh
    sour herb or as leaf infusions. Because of the high oxalate content, keep amounts modest. Educational
    reference only.
  status: draft
constituents:
- name: Flavonoids
  compounds:
  - flavonoid
  - quercetin
  - apigenin
  note: Flavonoid glycosides (e.g. isovitexin, vitexin, quercetin and apigenin derivatives), the main
