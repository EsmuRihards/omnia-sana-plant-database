- note: Duke (2002) includes cranberry primarily at the experimental level for its astringent, diuretic,
    and antioxidant properties. Commission E has not approved cranberry for specific indications, though
    there is evidence supporting its role in preventing urinary tract infections (UTIs) by inhibiting
    bacterial adhesion to uroepithelial cells (proanthocyanidins). Duke notes the high vitamin C and organic
    acid content. Food-grade consumption is considered safe and beneficial as a urinary acidifier (Duke,
    2002).
  severity: info
