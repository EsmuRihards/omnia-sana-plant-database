internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx). reference_ids are
  plant-level: the book lists parts and actions as flat, unmapped lists, so the full set of references cited
  for this plant is attached to each action rather than split per action. constituents not yet extracted —
  manual enrichment pending. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split
  out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific publications: added 10
  PubMed-verified @article sources (REF-0940, REF-0941, REF-0942, REF-0943, REF-0944, REF-0945, REF-0946,
  REF-0947, REF-0948, REF-0949) — woven into relevant actions/indications and the plant-level references
  bucket. | 2026-07-11: added
  botanical_description/habitat/harvesting/traditional_uses/preparations/dosage/constituents monograph-base
  fields, sourced from the existing phytochemistry review (REF-0941, REF-0943) and field-ecology study
  (REF-0947). | 2026-07-18 (dosage-sourcing campaign, batch 7): WHO SEARCHED, WRONG SPECIES - documented so
  a future pass does not repeat the search or, worse, cite it. A text search of WHO monographs on selected
  medicinal plants Vols 1-4 surfaces a monograph whose text mentions this genus, but it covers a DIFFERENT
  species and its posology must not be transferred here. The hit is Fructus Macrocarponii (WHO Vol 4) =
  Vaccinium macrocarpon, the American cranberry. This record is the European cranberry (Oxycoccus palustris
  / Vaccinium oxycoccos), a different species. Cranberry dosing data is overwhelmingly for V. macrocarpon
  and should not be presented as this plant''s. Dosage entry remains unsourced. | 2026-07-19
  (dosage-sourcing campaign, closing sweep): DOCUMENTED DEAD END - closing sweep of the dosage-sourcing
  campaign. The remaining unsourced dosage entry/entries on this record were searched against every seam
  this campaign opened and none yields a dose for this species in this preparation. Seams checked: (1) the
  official EMA herbal medicines register (medicines-output-herbal_medicines-report, 251 rows, retrieved
  2026-07-18), matched on the accepted binomial AND on every synonym and common name appearing in a register
  row; (2) WHO monographs on selected medicinal plants Volumes 1-4, indexed by Latin drug title with each
  monograph''s Definition read to confirm the species - 177 monographs indexed; (3) this plant''s own
  reference bucket, mined for human studies that state an administered dose. Per the campaign''s integrity
  bar the entry is left unsourced at status draft rather than attached to a tangentially-related paper. See
  also the batch-7 note above: WHO''s Fructus Macrocarponii is Vaccinium macrocarpon (American cranberry), a
  different species from this European cranberry, and cranberry dosing data should not be presented as this
  plant''s.'