- Root
botanical_description:
  text: Slow-growing perennial herb (Araliaceae), 30-60 cm tall, harvested at 4 years of age or older.
    A single erect stem bears a whorl of palmately compound leaves, each with 3-5 toothed leaflets, at
    its top. Small greenish-white flowers are borne in a single terminal umbel, followed by small red
    berries. The fleshy, often forked or human-shaped taproot - the origin of the name 'ginseng' ('renshen',
    man-root) - is the medicinal part.
  height: 30-60 cm
  habit: Slow-growing perennial herb, single erect stem
  leaves: Palmately compound, whorled at the stem top, 3-5 toothed leaflets per leaf
  flowers: Small, greenish-white, in a single terminal umbel
  stem: Single, erect
  root: Fleshy, often forked, human-shaped taproot - the medicinal part
  fruit: Small red berries
  flowering_period: May-June
  reference_ids:
  - REF-1468
  status: verified
habitat:
  text: Native to the cool-temperate deciduous mountain forests of Manchuria, Korea and the Russian Far
    East. Historically wild-harvested, it is now predominantly cultivated, mainly in Korea and China,
    under artificial shade for several years before harvest.
  reference_ids:
  - REF-1466
  status: verified
harvesting:
  text: The root is harvested after at least 4-6 years of growth, once its ginsenoside content is fully
    developed. Roots are either air-dried as 'white ginseng' or steamed and then dried as 'red ginseng',
    a processing step that alters the ginsenoside profile.
  parts:
  - Root
  season: After 4-6+ years of cultivation
  reference_ids:
  - REF-1468
  status: verified
traditional_uses:
  text: Ginseng is one of the most celebrated tonic herbs of East Asian traditional medicine, used for
    millennia as a general adaptogen to restore vitality, support recovery from illness and improve stamina
    and cognitive performance. Modern clinical research supports adaptogenic, immunomodulatory, antioxidant,
    neuroprotective and mild antidiabetic effects consistent with this traditional use.
  reference_ids:
  - REF-1466
  - REF-1472
  status: verified
preparations:
- name: Standardised root extract (capsule)
  text: Commission E-recognised standardised extract (4-7% ginsenosides), the most clinically studied
    preparation.
  reference_ids:
  - REF-0014
  - REF-0137
  - REF-0192
  status: verified
- name: Dried root (sliced/whole)
  text: Sliced or whole dried root, chewed or decocted.
  status: draft
- name: Red ginseng (steamed and dried root)
  text: Traditional processed form (steamed then dried), which alters and concentrates the ginsenoside
    profile compared with white (unprocessed) ginseng.
  reference_ids:
  - REF-1468
  status: verified
- name: Tea/decoction
  text: Sliced root simmered in water.
  status: draft
dosage:
- name: Standardised extract
  text: 'Duke (2002) and Commission E guidance: 200-600 mg of standardised extract (4-7% ginsenosides)
    daily, used cyclically (2-3 weeks on, 2 weeks off) rather than continuously. Educational reference
    only, not a prescription.'
  reference_ids:
