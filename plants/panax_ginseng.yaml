contraindications:
- note: Generally well tolerated in short-term use (up to 3 months). May cause insomnia, headache, or
    gastrointestinal upset at high doses. Avoid during pregnancy and breastfeeding. May interact with
    warfarin, MAOIs, and diabetic medications. Not recommended for continuous use without breaks.
  severity: caution
  reference_ids:
  - REF-0014
  - REF-0137
  - REF-0192
  status: verified
- note: 'Duke (2002) rates Korean/Oriental ginseng (Panax ginseng) as highly active with clinical support
    for adaptogenic, immunostimulant, and performance-enhancing effects. Commission E approves standardized
    ginseng root extract (4–7% ginsenosides) as a tonic for fatigue and during convalescence. Dose: 200–600
    mg standardized extract daily. Duke cautions about ''Ginseng Abuse Syndrome'' (GAS) with overdose
    — symptoms include hypertension, insomnia, edema, and nervousness. Drug interactions are notable:
    ginseng potentiates MAOIs and may interact with warfarin, digoxin, and stimulants. Cycle use (2–3
    weeks on, 2 weeks off) is recommended (Duke, 2002).'
  severity: caution
  reference_ids:
  - REF-0014
  - REF-0137
  - REF-0192
  status: verified
