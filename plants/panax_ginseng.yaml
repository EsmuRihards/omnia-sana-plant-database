drug_class_interactions:
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: Ginseng may reduce the anticoagulant effect of warfarin (lower INR); a randomized trial of
    American ginseng showed a reduced INR. Monitor anticoagulation closely.
  reference_ids:
  - REF-2436
  - REF-2438
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antidepressants-serotonergic
  severity: caution
  mechanism: Case reports link ginseng with MAOI antidepressants (e.g. phenelzine) to headache, tremor
    and manic-like symptoms.
  reference_ids:
  - REF-2436
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antidiabetics
  severity: caution
  mechanism: Ginseng can lower blood glucose - a controlled trial in type 2 diabetes reduced fasting glucose
    and HbA1c, and ginseng also lowers post-meal glucose. Combined with diabetes medicines it may add
    to blood-sugar lowering and risk hypoglycaemia, so monitor blood sugar.
  reference_ids:
  - REF-2476
  - REF-2477
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: tanacetum-parthenium
  type: caution
  note: Ginseng and feverfew both reduce blood clotting/platelet stickiness, so taking them together may
    add up and raise the risk of bruising or bleeding — use caution, especially before surgery or alongside
    blood-thinning drugs.
  reference_ids:
  - REF-2457
