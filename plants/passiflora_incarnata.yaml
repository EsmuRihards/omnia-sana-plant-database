id: passiflora-incarnata
scientific_name: Passiflora incarnata
common_names:
- Passionflower
- Maypop
- Purple passionflower
- Passion vine
family: Passifloraceae
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Flavonoids (vitexin, isovitexin, chrysin)
  compounds:
  - flavonoid
  note: The principal calming constituents, thought to act on GABA pathways.
  reference_ids:
  - REF-0490
- name: Trace harman-type alkaloids
  compounds:
  - alkaloid
  note: Minor constituents that may contribute to the sedative effect.
  reference_ids:
  - REF-0490
actions:
- action: anxiolytic
  note: Anxiolytic for anxiety and nervous tension (reduces anxiety in clinical trials)
  reference_ids:
  - REF-0490
  - REF-0491
  status: verified
- action: sedative
  note: Sleep support for insomnia - improves subjective sleep quality and, on polysomnography, increases
    total sleep time
  reference_ids:
  - REF-0490
  - REF-0491
  - REF-0564
  - REF-0565
  status: verified
indications:
- condition: anxiety
  note: Anxiolytic for anxiety and nervous tension (reduces anxiety in clinical trials); Reduces preoperative
    / situational anxiety without sedation or psychomotor impairment (RCT in ambulatory surgery patients)
  reference_ids:
  - REF-0490
  - REF-0491
  - REF-0563
  status: verified
- condition: insomnia
  note: Sleep support for insomnia - improves subjective sleep quality and, on polysomnography, increases
    total sleep time
  reference_ids:
  - REF-0490
  - REF-0491
  - REF-0564
  - REF-0565
  status: verified
- condition: nervous-tension
  note: Anxiolytic for anxiety and nervous tension (reduces anxiety in clinical trials)
  reference_ids:
  - REF-0490
  - REF-0491
  status: verified
- condition: stress
  note: Relief of mild mental stress
  reference_ids:
  - REF-0490
  - REF-0491
  status: verified
contraindications:
- note: Generally well tolerated, with no serious adverse effects reported in trials. Its sedative effect
    can add to that of alcohol, sedatives and sleep medicines, so avoid combining and do not use before
    driving.
  severity: caution
  reference_ids:
  - REF-0490
  - REF-0491
  status: verified
- note: Use in pregnancy and breastfeeding is not recommended.
  severity: caution
  reference_ids:
  - REF-0491
  status: verified
provenance: website+pubmed+symptom-tool
status: verified
last_updated: '2026-06-14'
internal_notes: 'Enriched 2026-06-12 from scientific and regulatory literature (Nutrients systematic review;
  EMA HMPC monograph for Passiflorae herba). Originally a skeleton imported from the omniasana.bio Symptom-to-Plant
  Lookup tool (anxiety, insomnia, stress, nervous-tension); associations retained and now part-mapped
  and cited. Further enriched 2026-06-14 with PubMed-sourced RCTs - a double-blind preoperative-anxiety
  trial showing anxiolysis without sedation (REF-0563), a polysomnography trial showing increased total
  sleep time in insomnia disorder (REF-0564) and a placebo-controlled trial of passionflower tea improving
  subjective sleep quality (REF-0565). | 2026-06-15: migrated to entity schema (actions->vocab ids, indications
  split out, constituents linked to compounds).'
