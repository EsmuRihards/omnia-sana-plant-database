contraindications:
- note: Generally well tolerated, with no serious adverse effects reported in trials. Its sedative effect
    can add to that of alcohol, sedatives and sleep medicines, so avoid combining and do not use before
    driving.
  severity: caution
  reference_ids:
  - REF-0490
  - REF-0491
  status: verified
- note: Use in pregnancy and breastfeeding is not recommended.
