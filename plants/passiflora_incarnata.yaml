common_names:
- Passionflower
- Maypop
- Purple passionflower
- Passion vine
scientific_name: Passiflora incarnata
family: Passifloraceae
parts_used:
- name: Aerial parts (flowering herb)
  medicinal_actions:
  - action: Anxiolytic for anxiety and nervous tension (reduces anxiety in clinical trials)
    reference_ids:
    - REF-0490
    - REF-0491
    status: verified
  - action: Reduces preoperative / situational anxiety without sedation or psychomotor impairment (RCT in
      ambulatory surgery patients)
    reference_ids:
    - REF-0563
    status: verified
  - action: Sleep support for insomnia - improves subjective sleep quality and, on polysomnography, increases
      total sleep time
    reference_ids:
    - REF-0490
    - REF-0491
    - REF-0564
    - REF-0565
    status: verified
  - action: Relief of mild mental stress
    reference_ids:
    - REF-0490
    - REF-0491
    status: verified
constituents:
- name: Flavonoids (vitexin, isovitexin, chrysin)
  note: The principal calming constituents, thought to act on GABA pathways.
  reference_ids:
  - REF-0490
- name: Trace harman-type alkaloids
  note: Minor constituents that may contribute to the sedative effect.
  reference_ids:
  - REF-0490
contraindications:
- note: Generally well tolerated, with no serious adverse effects reported in trials. Its sedative effect
    can add to that of alcohol, sedatives and sleep medicines, so avoid combining and do not use before
    driving.
  reference_ids:
  - REF-0490
  - REF-0491
  status: verified
- note: Use in pregnancy and breastfeeding is not recommended.
  reference_ids:
  - REF-0491
  status: verified
internal_notes: Enriched 2026-06-12 from scientific and regulatory literature (Nutrients systematic review;
  EMA HMPC monograph for Passiflorae herba). Originally a skeleton imported from the omniasana.bio Symptom-to-Plant
  Lookup tool (anxiety, insomnia, stress, nervous-tension); associations retained and now part-mapped
  and cited. Further enriched 2026-06-14 with PubMed-sourced RCTs - a double-blind preoperative-anxiety
  trial showing anxiolysis without sedation (REF-0563), a polysomnography trial showing increased total
  sleep time in insomnia disorder (REF-0564) and a placebo-controlled trial of passionflower tea improving
  subjective sleep quality (REF-0565).
last_updated: '2026-06-14'
status: verified
