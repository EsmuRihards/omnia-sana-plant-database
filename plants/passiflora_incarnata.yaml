id: passiflora-incarnata
scientific_name: Passiflora incarnata
common_names:
- Passionflower
- Maypop
- Purple passionflower
- Passion vine
family: Passifloraceae
external_ids:
  gbif: 2874218
  wikidata: Q128939
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Flavonoids (vitexin, isovitexin, chrysin)
  compounds:
  - flavonoid
  note: The principal calming constituents, thought to act on GABA pathways.
  reference_ids:
  - REF-0490
- name: Trace harman-type alkaloids
  compounds:
  - alkaloid
  note: Minor constituents that may contribute to the sedative effect.
  reference_ids:
  - REF-0490
botanical_description:
  text: Fast-growing, climbing or trailing perennial vine (Passifloraceae) that climbs by axillary tendrils,
    reaching several metres. Leaves are alternate and deeply 3-lobed. The large, intricate flowers have
    a fringed corona of lavender-white filaments around a central structure whose parts were likened by
    early missionaries to instruments of the Passion of Christ, giving the plant its name. The fruit is
    an edible, egg-shaped, yellow-orange berry known as a 'maypop'.
  height: Climbing/trailing vine, several metres long
  habit: Fast-growing, tendril-climbing perennial vine
  leaves: Alternate, deeply 3-lobed
  flowers: Large, intricate, lavender-white with a fringed corona
  stem: Climbing by axillary tendrils
  root: Spreading rhizomatous root system
  fruit: Edible, egg-shaped, yellow-orange berry ('maypop')
  flowering_period: June-September
  reference_ids:
  - REF-0491
  status: verified
habitat:
  text: Native to the south-eastern United States, growing in thickets, fencerows, roadsides and disturbed
    sunny ground; widely cultivated and naturalised as an ornamental and medicinal crop elsewhere in warm-temperate
    and subtropical regions.
  reference_ids:
  - REF-0491
  status: verified
harvesting:
  text: The flowering and fruiting aerial parts (herb) are cut during the growing season, typically as
    flowering begins, and dried for use.
  parts:
  - Aerial parts (flowering herb)
  season: Growing season, at the start of flowering
  reference_ids:
  - REF-0491
  status: verified
traditional_uses:
  text: Passionflower has a traditional use, recognised by European regulatory herbal monographs, as a
    mild sedative and anxiolytic for nervous tension, mild anxiety and difficulty sleeping. Modern clinical
    trials support anxiolytic and sleep-supporting effects, including reduced preoperative anxiety without
    sedation or psychomotor impairment.
  reference_ids:
  - REF-0491
  - REF-0490
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried herb steeped in hot water as a calming, sleep-supporting tea.
  reference_ids:
  - REF-0491
  status: verified
- name: Standardised extract/tincture
  text: Liquid or encapsulated extract, the form used in most clinical trials.
  reference_ids:
  - REF-0490
  status: verified
- name: Tea blend
  text: Traditionally combined with other calming herbs such as chamomile or lemon balm.
  status: draft
dosage:
- name: Infusion (tea)
  text: EMA herbal-monograph guidance suggests around 0.5-2 g dried herb per cup as an infusion, up to
    several times daily, or an equivalent liquid/dry extract. Educational reference only, not a prescription.
  reference_ids:
  - REF-0491
  status: verified
actions:
- action: anxiolytic
  note: Anxiolytic for anxiety and nervous tension (reduces anxiety in clinical trials)
  reference_ids:
