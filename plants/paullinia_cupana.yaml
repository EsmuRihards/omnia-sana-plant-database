botanical_description:
  text: Woody climbing shrub or liana (Sapindaceae) in its native forest habitat, though often cultivated
    and pruned as a shrub. Leaves are alternate and pinnately compound with 5 leaflets. Small greenish-white
    flowers are borne in axillary panicles, followed by a red-orange, three-lobed capsule that splits
    open to reveal black seeds partly covered by a white aril - a fruit likened in Indigenous Amazonian
    folklore to a staring eye.
  height: Climbing shrub/liana (cultivated as a shrub of a few metres)
  habit: Woody climbing shrub or liana
  leaves: Alternate, pinnately compound with 5 leaflets
  flowers: Small, greenish-white, in axillary panicles
  stem: Woody, climbing in the wild
  root: Woody perennial root system
  fruit: Red-orange, three-lobed capsule splitting to reveal black, white-arilled seeds
  flowering_period: Variable, tropical (largely aseasonal)
  status: draft
habitat:
  text: Native to the Amazon basin, particularly Brazil, where it has long been cultivated by Indigenous
    peoples (notably the Sateré-Mawé); grows in tropical, humid lowland forest conditions.
  status: draft
harvesting:
  text: Ripe fruit capsules are hand-harvested as they split open; seeds are removed, roasted, and traditionally
    ground into a paste with water and shaped into sticks for storage, or dried and powdered.
  parts:
  - Seed
  season: As fruit capsules ripen and split
  status: draft
traditional_uses:
  text: Guarana seed has a long Amazonian Indigenous tradition as a stimulant tonic for fatigue and stamina
    and as a ceremonial and social beverage. Its very high caffeine content (greater by weight than coffee
    beans) underlies its modern use for cognitive performance, physical endurance and metabolic support,
    supported by clinical trials.
  reference_ids:
  - REF-0954
  status: verified
preparations:
- name: Powdered seed/paste
  text: Traditional roasted, ground seed, taken in water or food - the classic Amazonian Indigenous preparation.
  reference_ids:
  - REF-0954
  status: verified
- name: Standardised extract capsule
  text: The form used in most clinical trials for cognition, fatigue and physical performance.
  reference_ids:
  - REF-0950
  - REF-0955
  status: verified
- name: Guarana beverage/soft drink
  text: Seed extract used as a flavouring and stimulant ingredient in commercial beverages.
  status: draft
dosage:
- name: Extract/powder
  text: Guarana products vary widely in caffeine content (the seed is naturally 2-4 times more caffeine-dense
    than coffee by weight); follow product-specific dosing and apply the same cautions as for a strong
    caffeine source. Educational reference only, not a prescription.
  reference_ids:
