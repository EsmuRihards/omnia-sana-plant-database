id: pelargonium-sidoides
scientific_name: Pelargonium sidoides
common_names:
- Pelargonium
- Umckaloabo
- South African geranium
- Black geranium
family: Geraniaceae
external_ids:
  gbif: 3827581
  wikidata: Q900994
parts_used:
- Root (standardised extract EPs 7630)
constituents:
- name: Highly oxygenated coumarins (umckalin)
  compounds:
  - coumarin
  note: Characteristic root constituents with antibacterial activity.
  reference_ids:
  - REF-0493
- name: Polyphenols and proanthocyanidins (gallic acid derivatives)
  compounds:
  - proanthocyanidin
  - gallic-acid
