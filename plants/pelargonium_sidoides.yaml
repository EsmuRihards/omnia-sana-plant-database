id: pelargonium-sidoides
scientific_name: Pelargonium sidoides
common_names:
- Pelargonium
- Umckaloabo
- South African geranium
- Black geranium
family: Geraniaceae
parts_used:
- Root (standardised extract EPs 7630)
constituents:
- name: Highly oxygenated coumarins (umckalin)
  compounds:
  - coumarin
  note: Characteristic root constituents with antibacterial activity.
  reference_ids:
  - REF-0493
- name: Polyphenols and proanthocyanidins (gallic acid derivatives)
  compounds:
  - proanthocyanidin
  - gallic-acid
  - phenolic-compound
  note: Contribute to the antiviral and immunomodulatory effects.
  reference_ids:
  - REF-0493
actions:
- action: antiviral
  note: Antiviral and immunomodulatory (mechanism of action)
  reference_ids:
  - REF-0493
  status: verified
- action: immunomodulator
  note: Antiviral and immunomodulatory (mechanism of action)
  reference_ids:
  - REF-0493
  status: verified
indications:
- condition: bronchitis
  evidence: 4
  note: Acute bronchitis - reduces symptom severity and shortens illness
  reference_ids:
  - REF-0492
  - REF-0493
  - REF-0576
  status: verified
- condition: cold
  evidence: 3
  note: Common cold and acute respiratory tract infection
  reference_ids:
  - REF-0492
  status: verified
- condition: immune-support
  evidence: 2
  note: inferred from immunomodulator action
  reference_ids:
  - REF-0493
  status: needs-review
- condition: infection
  evidence: 3
  note: Common cold and acute respiratory tract infection
  reference_ids:
  - REF-0492
  status: verified
- condition: sinusitis
  evidence: 3
  note: Rhinosinusitis (sinusitis) support
  reference_ids:
  - REF-0492
  - REF-0577
  status: verified
- condition: sore-throat
  evidence: 3
  note: Sore throat / acute tonsillopharyngitis
  reference_ids:
  - REF-0492
  status: verified
contraindications:
- note: Generally well tolerated; the main effects are mild gastrointestinal upset or, rarely, an allergic
    skin reaction. Rare reports of liver injury mean you should stop and seek advice if signs of liver
    problems occur.
  severity: info
  reference_ids:
  - REF-0492
  - REF-0493
  status: verified
- note: The coumarin content gives a theoretical bleeding risk, so use caution with anticoagulant medicines;
    use in pregnancy and breastfeeding is not recommended.
  severity: caution
  reference_ids:
  - REF-0492
  status: needs-review
