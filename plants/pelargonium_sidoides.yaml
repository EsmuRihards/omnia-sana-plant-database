botanical_description:
  text: Low-growing herbaceous perennial (Geraniaceae) with a thick, dark, tuberous rootstock. Long-stalked,
    heart- to kidney-shaped, greyish-green, softly hairy leaves form a basal rosette. Slender flowering
    stems bear small, dark red to almost black, five-petalled flowers. The thick tuberous root is the
    medicinal part, used as the standardised extract EPs 7630.
  height: Low, basal rosette (flowering stems taller)
  habit: Low-growing herbaceous perennial, basal rosette
  leaves: Long-stalked, heart- to kidney-shaped, greyish-green, softly hairy
  flowers: Small, dark red to almost black, five-petalled
  stem: Slender flowering stems above a basal leaf rosette
  root: Thick, dark, tuberous rootstock - the medicinal part
  fruit: Small beaked capsule (typical Geraniaceae schizocarp)
  flowering_period: Spring-summer (native range, Southern Hemisphere)
  status: draft
habitat:
  text: Native to the grasslands of the Eastern Cape and Free State regions of South Africa and Lesotho,
    growing on rocky, well-drained grassland slopes at moderate to high altitude.
  status: draft
harvesting:
  text: The thick tuberous root is dug from mature plants - wild-harvested and increasingly cultivated
    - then cleaned and dried before being processed into the standardised ethanolic extract (EPs 7630)
    used commercially.
  parts:
  - Root
  season: Harvested from mature plants; specific season not standardised in the bucket
  status: draft
traditional_uses:
  text: Known locally as 'Umckaloabo', Pelargonium sidoides root has a long history of traditional use
    by South African indigenous peoples for respiratory and gastrointestinal complaints, and was popularised
    in Europe in the early 20th century as a tuberculosis remedy. Its modern use, now well supported by
    clinical trials, is as a standardised extract (EPs 7630) for acute bronchitis, the common cold and
    other upper respiratory tract infections.
  reference_ids:
  - REF-0492
  - REF-0493
  status: verified
preparations:
- name: Standardised liquid extract (EPs 7630)
  text: The clinically studied commercial form, taken as drops or syrup for acute bronchitis and upper
    respiratory tract infections.
  reference_ids:
  - REF-0492
  - REF-0493
  status: verified
- name: Tablets/lozenges
  text: Encapsulated standardised extract.
  status: draft
dosage:
- name: Standardised extract (EPs 7630)
  text: Clinical trials have used the standardised commercial extract per product labelling for acute
    bronchitis and respiratory infections in both adults and children; dosing (drops or syrup) differs
    by age, so follow product-specific instructions. Educational reference only, not a prescription.
  reference_ids:
