internal_notes: 'Enriched 2026-06-12 from scientific literature (Int J Gen Med and Wien Med Wochenschr
  reviews of the standardised root extract EPs 7630). Originally a skeleton imported from the omniasana.bio
  Symptom-to-Plant Lookup tool (bronchitis, cold, sore-throat, sinusitis); associations retained and now
  part-mapped and cited. Further enriched 2026-06-14 with PubMed-sourced systematic reviews - a meta-analysis
  showing EPs 7630 reduces acute-bronchitis symptom scores by day 7 versus placebo (REF-0576) and a systematic
  review of phytotherapy for acute rhinosinusitis in which EPs 7630 appeared useful (REF-0577; rhinosinusitis
  action upgraded to verified). | 2026-06-15: migrated to entity schema (actions->vocab ids, indications
  split out, constituents linked to compounds).'
