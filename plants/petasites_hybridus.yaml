internal_notes: 'Enriched 2026-06-12 from scientific literature (Pediatrics in Review integrative-medicine
  review). Further enriched 2026-06-13 with two PubMed sources: a randomised placebo-controlled migraine-prophylaxis
  trial (REF-0543, Grossmann & Schmidramsl 2000) and a systematic review of herbal medicines for allergic
  rhinitis covering six butterbur RCTs (REF-0544, Guo et al. 2007). Originally a skeleton imported from
  the omniasana.bio Symptom-to-Plant Lookup tool (migraine, allergy, headache, asthma); associations retained
  and now part-mapped and cited. CRITICAL: PA-free extracts only - see contraindications. | 2026-06-15:
  migrated to entity schema (actions->vocab ids, indications split out, constituents linked to compounds).'
