dangerous_lookalikes:
- dangerous_plant: adenostyles-alliariae
  severity: dangerous
  confused_part: Very large rounded leaves and rhizome gathered for use; alpendost has similar large rounded
    leaves and the same hepatotoxic pyrrolizidine alkaloids.
  confusion_context: Butterbur (Petasites hybridus) has very large rounded leaves and is used medicinally
    (as pyrrolizidine-free standardised extracts). In the wild its foliage is confused with alpendost
    (Adenostyles alliariae) and coltsfoot, all large-leaved damp-ground plants. Alpendost contains hepatotoxic
    pyrrolizidine alkaloids and, gathered in mistake for coltsfoot/butterbur and brewed as tea, has caused
    liver veno-occlusive disease (Sperl et al., 1995). Butterbur's own raw leaves also contain pyrrolizidine
    alkaloids, so wild butterbur should only be used as tested, PA-free products rather than home-gathered
    material.
  distinguishing_features:
  - 'Leaf: butterbur has enormous rounded leaves (up to about 1 m across when mature) on stout stalks;
    alpendost leaves are large but smaller and more coarsely toothed. Neither should be brewed from home-gathered
    material.'
  - 'Flowers: butterbur pushes up thick pinkish flower spikes in early spring before the leaves; alpendost
    has fluffy whitish-pink flower clusters among its leaves in summer.'
  - 'Best practice: do not brew wild butterbur or its large-leaved lookalikes at all - use only standardised,
    pyrrolizidine-free commercial butterbur preparations.'
  key_test: Do not gather large rounded 'butterbur' leaves for tea - butterbur, alpendost and coltsfoot
    all look alike and carry liver-damaging pyrrolizidine alkaloids. Use only standardised, pyrrolizidine-free
    commercial butterbur products rather than home-collected leaves.
  reference_ids:
  - REF-2688
