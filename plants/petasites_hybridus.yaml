contraindications:
- note: Use ONLY certified pyrrolizidine-alkaloid (PA)-free, standardised extracts. Raw or unprocessed
    butterbur contains PAs that are toxic to the liver and potentially carcinogenic.
  severity: serious
  reference_ids:
  - REF-0426
  status: verified
- note: Avoid during pregnancy and breastfeeding. As a member of the daisy family (Asteraceae), it can
    cause allergic reactions in people sensitive to ragweed and related plants. Watch for and report any
    signs of liver problems.
  severity: caution
  reference_ids:
  - REF-0426
  status: verified
