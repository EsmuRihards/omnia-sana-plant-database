id: petasites-hybridus
scientific_name: Petasites hybridus
common_names:
- Butterbur
- Bog rhubarb
- Pestilence wort
- Umbrella plant
family: Asteraceae
parts_used:
- Root
- rhizome and leaf (standardised PA-free extract)
constituents:
- name: Sesquiterpenes (petasin and isopetasin)
  compounds:
  - sesquiterpene
  note: The anti-inflammatory and antispasmodic active principles; standardised in commercial extracts.
  reference_ids:
  - REF-0426
  - REF-1477
  - REF-1480
  - REF-1482
  - REF-1484
  - REF-1485
- name: Pyrrolizidine alkaloids (PAs)
  compounds:
  - alkaloid
  note: Naturally present but hepatotoxic and carcinogenic; must be removed to make a safe product.
  reference_ids:
  - REF-0426
botanical_description:
  text: 'Robust, rhizomatous perennial herb (Asteraceae) that flowers before the leaves emerge: thick,
    pinkish, scaly flower spikes push up from the ground in early spring, followed by enormous rounded
    to heart-shaped leaves - up to about 1 m across at maturity - on stout stalks, giving rise to the
    common name ''umbrella plant''.'
  height: Flower spikes low in early spring; leaves later up to ~1 m across
  habit: Robust, rhizomatous, colony-forming perennial herb
  leaves: Enormous, rounded to heart-shaped, up to ~1 m across, on stout stalks
  flowers: Thick, pinkish, scaly flower spikes, appearing before the leaves
  stem: Thick underground rhizome; scaly flowering stalks in early spring
  root: Thick, spreading rhizome
  fruit: Small ribbed achenes with a pappus (typical Asteraceae)
  flowering_period: February-April, before the leaves emerge
  reference_ids:
  - REF-1477
  status: verified
habitat:
  text: Native to damp, marshy ground across Europe and western Asia - riverbanks, ditches, wet meadows
    and damp woodland margins - favouring moist, nutrient-rich soils.
  reference_ids:
  - REF-1477
  status: verified
harvesting:
  text: Rhizome/root is dug in autumn or early spring; leaves are gathered during the growing season.
    Raw material naturally contains hepatotoxic pyrrolizidine alkaloids, so commercial products are manufactured
    to remove them (PA-free standardised extracts); home-gathered material should never be used medicinally.
  parts:
  - Root/rhizome
  - Leaf
  season: Root/rhizome in autumn or early spring; leaf during the growing season
  reference_ids:
  - REF-0426
  status: verified
traditional_uses:
  text: Butterbur has a long European folk-medicine history as a fever remedy - the name 'pestilence wort'
    reflects its historic use during plague outbreaks - and for asthma, cough and migraine-type headache.
    Modern clinical trials of standardised, pyrrolizidine-alkaloid-free extracts support its use for migraine
    prevention and allergic rhinitis.
  reference_ids:
  - REF-1477
  - REF-1479
  - REF-1478
  status: verified
preparations:
- name: Standardised PA-free extract (tablet)
  text: The only recommended form - e.g. the CO2-extracted root product studied for migraine prevention,
    or the Ze 339 leaf extract studied for allergic rhinitis. Raw root or leaf tea should never be used,
    as it retains hepatotoxic pyrrolizidine alkaloids.
  reference_ids:
  - REF-1479
  - REF-1478
  - REF-0426
  status: verified
dosage:
- name: Standardised PA-free extract
  text: Clinical trials have used standardised PA-free extracts (for example around 50-75 mg twice daily
    of a CO2 root extract for migraine prevention). Always use a certified PA-free commercial product,
    never raw plant material. Educational reference only, not a prescription.
  reference_ids:
  - REF-1479
  - REF-1478
  status: verified
