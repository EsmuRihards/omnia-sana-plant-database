botanical_description:
  text: Biennial herb (Apiaceae), usually grown as an annual, 20-60 cm tall, with a slender taproot. Leaves
    are bright green and finely divided, either flat or tightly curled ('crisped') depending on variety.
    In the second year, small yellow-green flowers are borne in compound umbels, followed by small, ridged
    fruit (the 'seed').
  height: 20-60 cm
  habit: Biennial herb (usually cultivated as an annual)
  leaves: Bright green, finely divided, flat or curled ('crisped')
  flowers: Small, yellow-green, in compound umbels (second year)
  stem: Erect, branched (second-year flowering stem)
  root: Slender taproot (thickened in root-parsley varieties)
  fruit: Small, ridged, aromatic fruit ("seed")
  flowering_period: Second year, June-August
  reference_ids:
  - REF-0489
  status: verified
habitat:
  text: Native to the central Mediterranean (Sardinia and southern Italy), long cultivated worldwide as
    a culinary and medicinal herb in gardens and as a field crop.
  reference_ids:
  - REF-0489
  status: verified
harvesting:
  text: Leaves are picked fresh throughout the growing season; the root (of root-parsley varieties) is
    lifted in autumn; the seed (fruit) is collected from second-year plants once ripe and dry - it is
    used mainly in medicinal/aromatic preparations rather than food, given its higher concentration of
    the toxic essential-oil constituents apiole and myristicin.
  parts:
  - Leaf
  - Root
  - Seed
  season: Leaf throughout the growing season; root in autumn; seed once ripe (second year)
  reference_ids:
  - REF-0489
  status: verified
traditional_uses:
  text: Parsley has a long Mediterranean culinary-medicinal tradition as a carminative digestive tonic,
    breath freshener and mild diuretic traditionally used for urinary complaints and fluid retention.
    Modern research supports antioxidant, hepatoprotective, nephroprotective and diuretic activity.
  reference_ids:
  - REF-0489
  - REF-0546
  status: verified
preparations:
- name: Fresh leaf
  text: Eaten fresh as a garnish or herb - a traditional daily digestive and breath-freshening support.
  reference_ids:
  - REF-0489
  status: verified
- name: Infusion (tea)
  text: Dried leaf or crushed seed steeped in hot water, a traditional diuretic and digestive preparation.
  reference_ids:
  - REF-0489
  status: verified
- name: Root decoction
  text: Root simmered in water, a traditional diuretic preparation.
  status: draft
dosage:
- name: Leaf infusion
  text: Culinary amounts of leaf are food-safe; medicinal use should stick to modest infusion amounts
    (roughly 2-4 g dried leaf or root per cup, a few times daily). Avoid concentrated seed extract or
    essential oil, which are toxic and uterine-stimulant at higher doses, and avoid medicinal doses entirely
    in pregnancy. Educational reference only, not a prescription.
  reference_ids:
  - REF-0489
  status: verified
