contraindications:
- note: Generally safe when consumed in food amounts. Doses up to 20g daily considered safe for adults.
    May cause allergic reactions in some people. Caution advised during pregnancy and breastfeeding -
    stick to food amounts. Anethole can be toxic at high concentrations, particularly to the nervous system.
    Not enough safety data for medicinal use in children.
  reference_ids:
  - REF-0123
  - REF-0165
  - REF-0268
  - REF-0274
  - REF-0278
  status: verified
- note: Duke (2002) provides clinical evidence (score 2) for anise as an antibacterial, antiseptic, antispasmodic,
    and expectorant. It has demonstrated estrogenic activity and is used as a clinically supported lactagogue
    to promote milk production. Commission E and WHO have both approved its use for catarrh and gastrointestinal
    spasms. Typical dosages are 0.5–1 g crushed seed three times per day in tea, or 0.05–0.2 ml of the
    fruit essential oil (Duke, 2002).
  reference_ids:
  - REF-0123
  - REF-0165
  - REF-0268
  - REF-0274
  - REF-0278
  status: verified
