id: pimpinella-anisum
scientific_name: Pimpinella anisum
common_names:
- Anise
- Aniseed
- Anise seed
family: Apiaceae
parts_used:
- Fruit
- Seed
botanical_description:
  text: Annual herb (Apiaceae), 30-60 cm tall, with an erect, downy stem. Lower leaves are rounded and
    toothed or shallowly lobed, while upper leaves are finely feathery and pinnately divided. Small white
    flowers are borne in compound umbels, followed by small, ridged, downy fruit ('aniseed') with a strong,
    sweet, liquorice scent.
  height: 30-60 cm
  habit: Erect, downy annual herb
  leaves: Lower leaves rounded/toothed; upper leaves finely feathery, pinnately divided
  flowers: Small, white, in compound umbels
  stem: Erect, downy
  root: Slender taproot
  fruit: Small, ridged, downy, sweetly liquorice-scented fruit ("aniseed")
  flowering_period: July-August
  status: draft
habitat:
  text: Native to the eastern Mediterranean and south-west Asia, widely cultivated as a spice and medicinal
    crop in warm-temperate regions worldwide, needing a long, warm growing season and well-drained soil.
  status: draft
harvesting:
  text: Fruit ('seed') is harvested in late summer once the umbels have dried and turned brown, then threshed
    and dried further.
  parts:
  - Fruit
  - Seed
  season: Late summer, once umbels have dried
  status: draft
traditional_uses:
  text: Anise has a long Mediterranean and Middle Eastern tradition as a carminative digestive remedy
    for bloating and indigestion, an expectorant for coughs and catarrh, and a traditional galactagogue
    (milk-promoting) herb for nursing mothers. Commission E and WHO both approve its traditional use for
    catarrh of the upper respiratory tract and gastrointestinal spasms.
