contraindications:
- note: Generally safe in normal amounts. Pine essential oil should not be ingested; topical use only
    in diluted form. May irritate airways in high concentrations. Allergic reactions to pine pollen and
    resin are common. Turpentine products are irritant and potentially toxic if ingested.
  severity: caution
  reference_ids:
  - REF-0018
  - REF-0098
  - REF-0279
  status: verified
- note: 'Duke (2002) rates Scotch pine as + and notes antiseptic, antibacterial (score 1), and bronchospasmolytic
    activities. Commission E (KOM) and PhEur (PIP) approve pine needle preparations for topical use in
    rheumatic and neuralgic conditions and for inhalations in upper respiratory catarrh. Duke cautions
    that pine needle oil should not be inhaled by patients with severe asthma, whooping cough, or laryngospasm.
    Pine bud preparations are traditionally used for bronchitis and sinus congestion. Dose: 100–200 mg
    essential oil in ointment or cream for topical use (Duke, 2002).'
  severity: caution
