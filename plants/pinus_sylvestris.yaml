id: pinus-sylvestris
scientific_name: Pinus sylvestris
common_names:
- Scots Pine
- Scotch pine
- Baltic pine
family: Pinaceae
parts_used:
- Bark
- Leaf
- Sap
- Young sprouts
botanical_description:
  text: Evergreen coniferous tree (Pinaceae), 15-35 m tall, with a long, straight trunk at maturity, distinctive
    orange-red flaking bark in the upper crown and grey-brown fissured bark at the base. Needles are blue-green,
    borne in pairs (fascicles of two) with a papery basal sheath. Small yellow male cones release pollen
    in spring; female cones are woody and mature over two years.
  height: 15-35 m
  habit: Evergreen coniferous tree
  leaves: Needles blue-green, in pairs, with a papery basal sheath
  flowers: Small yellow male cones (pollen); separate woody female cones
  stem: Long, straight trunk; orange-red flaking bark in the upper crown, grey-brown fissured bark at
    the base
  root: Deep, wide-spreading root system
  fruit: Woody cone, maturing over two years
  flowering_period: May (pollen release)
  reference_ids:
  - REF-0098
  status: verified
habitat:
  text: Native across northern and central Europe and Siberia - the most widely distributed pine species
    in the world - forming extensive boreal and montane forests on poor, sandy or peaty, acidic soils;
    a pioneer species tolerant of dry, nutrient-poor ground.
  reference_ids:
  - REF-0098
  status: verified
harvesting:
  text: Young shoots ('candles') and needles are gathered in spring; bark is stripped from felled or cultivated
    trees; resin/sap is tapped from the trunk. Needle-bearing twigs can be cut for tea and for steam distillation
    of the essential oil year-round.
  parts:
  - Bark
  - Leaf (needles)
  - Sap
  - Young sprouts
  season: Young shoots/needles in spring; bark and sap variable
  reference_ids:
  - REF-0098
  status: verified
traditional_uses:
  text: Scots pine has a long northern European tradition as a source of resinous, aromatic preparations
    for respiratory complaints (coughs, bronchitis, catarrh) and topical rheumatic/muscular remedies,
    and pine-needle tea has traditionally been valued as a vitamin-C-rich winter tonic. Modern research
    on the needle essential oil supports antimicrobial, anti-inflammatory and expectorant activity.
  reference_ids:
  - REF-0098
  - REF-0018
  status: verified
preparations:
- name: Needle infusion (tea)
  text: Fresh or dried young needles steeped in hot water - the traditional vitamin-C-rich tonic tea.
    Only use needles from a certainly identified pine, never yew (see dangerous look-alikes).
  reference_ids:
  - REF-0098
  status: verified
- name: Essential oil (inhalation/topical)
  text: Steam-distilled from the needles; used diluted in ointments, chest rubs or steam inhalation for
    respiratory complaints.
  reference_ids:
  - REF-0018
  status: verified
- name: Bud/bark preparations
  text: Traditional syrup or decoction of young buds or bark for bronchitis and sinus congestion.
  status: draft
dosage:
- name: Essential oil (topical)
  text: 'Duke (2002): about 100-200 mg essential oil in an ointment or cream for topical use. Do not ingest
    the essential oil; avoid inhalation in severe asthma, whooping cough or laryngospasm. Educational
    reference only, not a prescription.'
  reference_ids:
  - REF-0018
  - REF-0098
  - REF-0279
  status: verified
constituents:
- name: Essential oil (alpha-pinene, beta-pinene, limonene)
  compounds:
  - essential-oil
  - terpene
  note: The needle oil is dominated by monoterpene hydrocarbons, chiefly alpha-pinene, giving the characteristic
    resinous scent and much of its antimicrobial activity.
  reference_ids:
  - REF-1235
  - REF-1236
- name: Resin acids (diterpene resin acids)
  compounds:
