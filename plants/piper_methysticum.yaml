id: piper-methysticum
scientific_name: Piper methysticum
common_names:
- Kava
- Kava Kava
- Kawa
- Awa
- Yaqona
family: Piperaceae
synonyms:
- Macropiper methysticum
wp_post_id: null
parts_used:
- Root
- Rhizome
constituents:
- name: Kavalactones (kavain, dihydrokavain, methysticin, dihydromethysticin, yangonin,
    desmethoxyyangonin)
  note: Lipophilic lactones concentrated in the root/rhizome; regarded as the main
    anxiolytic constituents, acting on GABA-A signalling and other CNS targets.
  reference_ids:
  - REF-2462
  - REF-2464
actions:
- action: anxiolytic
  parts:
  - Root
  - Rhizome
  note: Standardised kava extracts significantly reduce anxiety versus placebo in
    controlled trials (Hamilton Anxiety scale).
  reference_ids:
  - REF-2462
  - REF-2463
  - REF-2544
  - REF-2546
  - REF-2547
  status: verified
- action: sedative
  parts:
  - Root
  - Rhizome
  note: Kavalactones have calming, sleep-supporting and muscle-relaxant effects and
    can add to the action of other CNS depressants.
  reference_ids:
  - REF-2462
  - REF-2460
  status: verified
indications:
- condition: anxiety
  reference_ids:
  - REF-2462
  - REF-2463
  - REF-2544
  - REF-2546
  - REF-2547
  status: verified
- condition: stress
  note: inferred from anxiolytic action
  reference_ids:
  - REF-2462
  - REF-2463
  status: needs-review
- condition: nervous-tension
  note: inferred from anxiolytic action
  reference_ids:
  - REF-2462
  status: needs-review
- condition: insomnia
  note: inferred from sedative action
  reference_ids:
  - REF-2462
  - REF-2460
  status: needs-review
contraindications:
- note: 'Rare but serious drug-induced liver injury (hepatitis, cirrhosis, liver failure)
    has been reported with kava; it is contraindicated in people with liver disease
    and should not be combined with alcohol or other medicines that can harm the liver.
    To reduce risk, use only water-based extracts of peeled root/rhizome from a noble
    cultivar, keep the dose at or below about 250 mg kavalactones per day, and use
    short-term only. Stop and seek care for signs of liver trouble (dark urine, jaundice,
    nausea, abdominal pain).'
  severity: serious
  reference_ids:
  - REF-2464
  - REF-2545
  status: verified
- note: Kava is sedating and can add to the effects of alcohol, benzodiazepines and
    other central-nervous-system depressants, impairing alertness and driving; avoid
    such combinations. Not recommended in pregnancy or breastfeeding, or before surgery.
  severity: caution
  reference_ids:
  - REF-2460
  - REF-2462
  status: verified
drug_class_interactions:
- drug_class: sedatives-cns-depressants
  severity: caution
  mechanism: 'Kava adds to central-nervous-system depression, so combining it with
    benzodiazepines, sleeping tablets, opioids, barbiturates or alcohol can cause
    excessive drowsiness and impaired coordination.'
  reference_ids:
  - REF-2460
  - REF-2462
  - REF-2530
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: valeriana-officinalis
  type: caution
  note: 'Kava and valerian are both calming, sedating herbs; taken together they may
    add up to cause excessive drowsiness, so use caution and avoid before driving
    or combining with other sedatives.'
  reference_ids:
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: passiflora-incarnata
  type: caution
  note: 'Kava and passionflower are both relaxing, sedating herbs; combined use may
    deepen drowsiness and sedation, so use caution.'
  reference_ids:
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
