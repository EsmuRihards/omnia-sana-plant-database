id: piper-methysticum
scientific_name: Piper methysticum
common_names:
- Kava
- Kava Kava
- Kawa
- Awa
- Yaqona
family: Piperaceae
external_ids:
  gbif: 6678
  powo: 'urn:lsid:ipni.org:names:198437-2'
  wikidata: Q161067
synonyms:
- Macropiper methysticum
wp_post_id: null
parts_used:
- Root
- Rhizome
constituents:
- name: Kavalactones (kavain, dihydrokavain, methysticin, dihydromethysticin, yangonin, desmethoxyyangonin)
  note: Lipophilic lactones concentrated in the root/rhizome; regarded as the main anxiolytic constituents,
    acting on GABA-A signalling and other CNS targets.
  reference_ids:
  - REF-2462
  - REF-2464
  - REF-3063
- name: Flavokavains (flavokavain A, B, C)
  note: Chalcone-type constituents of the root; implicated by structure-activity analyses as the components
    most likely responsible for kava-associated liver injury, which is why water-based extracts of peeled
    noble-cultivar root are preferred.
  reference_ids:
  - REF-3063
botanical_description:
  text: Robust, shrubby perennial with thick, jointed, cane-like stems and large, heart-shaped, glossy
    green leaves. The plant rarely if ever flowers or sets viable seed in cultivation and is propagated
    entirely by stem cuttings; the thick, knotty underground rhizome and root, the medicinal part, contains
    the characteristic kavalactone-rich resin.
  height: 1-3 m
  habit: Robust, shrubby perennial with cane-like stems
  leaves: Large, heart-shaped, glossy green
  flowers: Rarely produced; the plant is propagated vegetatively by stem cuttings
  stem: Thick, jointed, cane-like
  root: Thick, knotty rhizome and root system, rich in kavalactone resin (the medicinal part)
  fruit: Rarely if ever sets viable seed
  flowering_period: Rarely flowers; propagated by cuttings
  status: draft
habitat:
  text: Native to the islands of the South Pacific (Vanuatu, Fiji, Tonga, Samoa and neighbouring islands);
    cultivated in warm, humid, shaded tropical conditions.
  status: draft
harvesting:
  text: The root and rhizome are dug from plants at least three to five years old, when kavalactone content
    is highest, then cleaned, peeled and dried or processed fresh into a beverage.
  parts:
  - Root
  - Rhizome
  season: From mature (3-5+ year) plants
  status: draft
traditional_uses:
  text: Kava root has a centuries-long ceremonial and social tradition across Pacific Island cultures,
    prepared as a communal beverage for its calming, sociable and relaxing effects; this traditional anxiolytic
    reputation is now supported by clinical trials of standardised water-based extracts for anxiety.
  reference_ids:
  - REF-2462
  status: verified
preparations:
- name: Traditional beverage (water-based)
  text: Peeled root pounded or ground and mixed with water, strained and drunk fresh, the traditional
    Pacific Island ceremonial and social preparation.
  reference_ids:
  - REF-2462
  status: verified
- name: Standardised extract
  text: Water-based extract standardised to kavalactone content, taken as capsules; the form used in most
    clinical anxiety trials, and the safer choice given documented hepatotoxicity concerns with some solvent-extracted
    products.
  reference_ids:
  - REF-2462
  status: verified
dosage:
- name: Standardised extract
  text: Clinical trials for anxiety commonly use extracts providing up to around 250 mg kavalactones daily,
    from water-based extracts of peeled root of a noble cultivar, for short-term use only, given the rare
    but serious hepatotoxicity risk. Educational reference only, not a prescription.
  reference_ids:
  - REF-2464
  status: draft
actions:
- action: anxiolytic
  parts:
  - Root
  - Rhizome
  note: Standardised kava extracts significantly reduce anxiety versus placebo in controlled trials (Hamilton
    Anxiety scale).
  reference_ids:
  - REF-2462
  - REF-2463
  - REF-2544
  - REF-2546
  - REF-2547
  - REF-3061
  status: verified
- action: sedative
  parts:
  - Root
  - Rhizome
  note: Kavalactones have calming, sleep-supporting and muscle-relaxant effects and can add to the action
    of other CNS depressants.
  reference_ids:
  - REF-2462
  - REF-2460
  status: verified
indications:
- condition: anxiety
  reference_ids:
  - REF-2462
  - REF-2463
  - REF-2544
  - REF-2546
  - REF-2547
  - REF-3061
  status: verified
- condition: stress
  note: inferred from anxiolytic action
  reference_ids:
  - REF-2462
  - REF-2463
  status: needs-review
- condition: nervous-tension
  note: Directly measured as a treatment target in a 156-patient observational trial of kava extract,
    where nervous tension and restlessness showed the largest improvements.
  reference_ids:
  - REF-2462
  - REF-3061
  status: verified
- condition: insomnia
  note: inferred from sedative action
  reference_ids:
  - REF-2462
  - REF-2460
  status: needs-review
contraindications:
- note: Rare but serious drug-induced liver injury (hepatitis, cirrhosis, liver failure) has been reported
    with kava; it is contraindicated in people with liver disease and should not be combined with alcohol
    or other medicines that can harm the liver. To reduce risk, use only water-based extracts of peeled
    root/rhizome from a noble cultivar, keep the dose at or below about 250 mg kavalactones per day, and
    use short-term only. Stop and seek care for signs of liver trouble (dark urine, jaundice, nausea,
    abdominal pain).
  severity: serious
  reference_ids:
  - REF-2464
  - REF-2545
  - REF-3063
  status: verified
- note: Kavalactones inhibit several cytochrome P450 enzymes (CYP1A2, 2C9, 2C19, 2D6 and 3A4), which
    metabolise a large share of prescription medicines. Kava may therefore raise blood levels of such
    drugs; check with a pharmacist or doctor before combining kava with any regular medication.
  severity: caution
  reference_ids:
  - REF-3062
  status: verified
- note: Kava is sedating and can add to the effects of alcohol, benzodiazepines and other central-nervous-system
    depressants, impairing alertness and driving; avoid such combinations. Not recommended in pregnancy
    or breastfeeding, or before surgery.
  severity: caution
  reference_ids:
  - REF-2460
  - REF-2462
  status: verified
drug_class_interactions:
- drug_class: sedatives-cns-depressants
  severity: caution
  mechanism: Kava adds to central-nervous-system depression, so combining it with benzodiazepines, sleeping
    tablets, opioids, barbiturates or alcohol can cause excessive drowsiness and impaired coordination.
  reference_ids:
  - REF-2460
  - REF-2462
  - REF-2530
  - REF-3062
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: valeriana-officinalis
  type: caution
  note: Kava and valerian are both calming, sedating herbs; taken together they may add up to cause excessive
    drowsiness, so use caution and avoid before driving or combining with other sedatives.
  reference_ids:
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: passiflora-incarnata
  type: caution
  note: Kava and passionflower are both relaxing, sedating herbs; combined use may deepen drowsiness and
    sedation, so use caution.
  reference_ids:
  - REF-2460
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
