internal_notes: '2026-07-03: new record created for the safety-data campaign (kava was previously absent,
  blocking herb-drug/herb-herb records that reference it). Built from PubMed-verified sources: Pittler
  & Ernst 2003 Cochrane meta-analysis (REF-2462, anxiolytic), Sarris 2009 KADSS RCT (REF-2463), Teschke
  2011 hepatotoxicity review (REF-2464), Block 2004 herbal-sedatives review (REF-2460). Hepatotoxicity
  flagged severity: serious. Constituents name-only (compound entities not yet linked). | 2026-07-11:
  added monograph-base fields (botanical_description, habitat, harvesting, traditional_uses, preparations,
  dosage) sourced from the existing references bucket; general/undated claims marked status: draft per
  the integrity-first sourcing policy. | 2026-07-18: >=10-reference campaign close-out. Added REF-3061
  (Kuchta 2020, 156-patient observational trial - wired to the anxiolytic action, anxiety indication and
  the nervous-tension indication, which it upgrades from inferred to directly measured), REF-3062 (Anke
  & Ramzan 2004, CYP450 drug-interaction review - wired to a new pharmacokinetic contraindication and
  to the sedatives-cns-depressants interaction) and REF-3063 (Wang 2021, kavalactone/flavokavain structure-activity
  and hepatotoxicity review - wired to the kavalactone constituent, a new flavokavain constituent, and
  the hepatotoxicity contraindication). All three PubMed-verified as Piper methysticum, not a Piper congener.
  Unique reference count now 12; campaign target met.'
