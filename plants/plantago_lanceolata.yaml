id: plantago-lanceolata
scientific_name: Plantago lanceolata
common_names:
- Ribwort Plantain
- Narrowleaf plantain
- English plantain
- Lamb's tongue
family: Plantaginaceae
parts_used:
- Leaf (and aerial parts)
constituents:
- name: Iridoid glycosides (aucubin, catalpol)
  compounds:
  - iridoid-glycoside
  - glycoside
  note: Anti-inflammatory and antimicrobial constituents.
  reference_ids:
  - REF-0499
- name: Mucilage polysaccharides (~2-3%)
  compounds:
  - polysaccharide
  - mucilage
  note: Coat and protect inflamed mucous membranes and reduce cough-receptor sensitivity.
  reference_ids:
  - REF-0499
- name: Phenylethanoids (acteoside/verbascoside, plantamajoside) and flavonoids (apigenin, luteolin)
  compounds:
  - verbascoside
  - flavonoid
  - apigenin
  - luteolin
  note: Antioxidant and anti-inflammatory constituents.
  reference_ids:
  - REF-0499
botanical_description:
  text: Perennial herb (Plantaginaceae) forming a low rosette of narrow, lance-shaped leaves with prominent
    parallel ribs (hence 'ribwort'). Slender, furrowed, leafless flowering stalks rise from the rosette
    bearing a dense, short, dark brown-black ovoid to cylindrical flower spike ringed by a 'collar' of
    protruding cream-white stamens.
  height: Low rosette; flowering stalks 10-45 cm
  habit: Low rosette-forming perennial herb
  leaves: Narrow, lance-shaped, prominently 3-5-ribbed, in a basal rosette
  flowers: Dense, short, dark brown-black ovoid to cylindrical spike with a ring of cream-white stamens
  stem: Slender, furrowed, leafless flowering stalk
  root: Fibrous perennial rootstock
  fruit: Small capsule with 1-2 seeds
  flowering_period: May-September
  reference_ids:
  - REF-0499
  status: verified
habitat:
  text: Native throughout Europe and temperate Asia and naturalised worldwide; common in grassland, meadows,
    lawns, roadsides and waste ground, tolerating trampling and a wide range of soils.
  reference_ids:
  - REF-0499
  status: verified
harvesting:
  text: Leaves and aerial parts are gathered during the growing season, ideally before or during flowering,
    and dried quickly.
  parts:
  - Leaf (aerial parts)
  season: Growing season, before or during flowering
  reference_ids:
  - REF-0499
  status: verified
traditional_uses:
  text: Ribwort plantain has an official European herbal-monograph tradition for the temporary relief
    of dry cough and irritation of the mouth and throat, and for minor skin wounds, reflecting its long
    folk use as a demulcent respiratory remedy and wound herb. Modern research confirms mucilage-driven
    demulcent action alongside antimicrobial and anti-inflammatory activity.
  reference_ids:
  - REF-0499
  - REF-0500
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried leaf steeped in hot water for cough and sore throat.
  reference_ids:
  - REF-0499
  status: verified
- name: Fresh pressed juice / syrup
  text: Fresh leaf juice, traditionally made into a cough syrup, often combined with honey.
  reference_ids:
  - REF-0500
  status: verified
- name: Poultice
  text: Crushed fresh leaf applied to minor wounds and insect bites.
  reference_ids:
  - REF-0500
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried leaf.
  status: draft
dosage:
- name: Infusion (tea)
  text: EMA/ESCOP herbal-monograph guidance suggests roughly 2-4 g dried leaf per cup as an infusion,
    up to three times daily, or an equivalent liquid extract. Educational reference only, not a prescription.
  reference_ids:
  - REF-0499
  - REF-0500
  status: verified
actions:
- action: anti-inflammatory
  note: Anti-inflammatory for temporary mild inflammation of the mouth and throat (sore throat); in vitro
    the extract inhibits nitric oxide production and inducible NOS in macrophages, supporting its traditional
    respiratory anti-inflammatory use
  reference_ids:
  - REF-0499
  - REF-0633
  - REF-0968
  status: verified
- action: antimicrobial
  note: Antibacterial, antiviral and immunostimulant (in vitro)
  reference_ids:
  - REF-0499
  - REF-0500
  - REF-0960
  - REF-0965
  status: verified
- action: antiviral
  note: Antibacterial, antiviral and immunostimulant (in vitro)
  reference_ids:
