id: plantago-lanceolata
scientific_name: Plantago lanceolata
common_names:
- Ribwort Plantain
- Narrowleaf plantain
- English plantain
- Lamb's tongue
family: Plantaginaceae
parts_used:
- Leaf (and aerial parts)
constituents:
- name: Iridoid glycosides (aucubin, catalpol)
  compounds:
  - iridoid-glycoside
  - glycoside
  note: Anti-inflammatory and antimicrobial constituents.
  reference_ids:
  - REF-0499
- name: Mucilage polysaccharides (~2-3%)
  compounds:
  - polysaccharide
  - mucilage
  note: Coat and protect inflamed mucous membranes and reduce cough-receptor sensitivity.
  reference_ids:
  - REF-0499
- name: Phenylethanoids (acteoside/verbascoside, plantamajoside) and flavonoids (apigenin, luteolin)
  compounds:
  - verbascoside
  - flavonoid
  - apigenin
  - luteolin
  note: Antioxidant and anti-inflammatory constituents.
  reference_ids:
  - REF-0499
actions:
- action: anti-inflammatory
  note: Anti-inflammatory for temporary mild inflammation of the mouth and throat (sore throat); in vitro
    the extract inhibits nitric oxide production and inducible NOS in macrophages, supporting its traditional
    respiratory anti-inflammatory use
  reference_ids:
  - REF-0499
  - REF-0633
  - REF-0968
  status: verified
- action: antimicrobial
  note: Antibacterial, antiviral and immunostimulant (in vitro)
  reference_ids:
  - REF-0499
  - REF-0500
  - REF-0960
  - REF-0965
  status: verified
- action: antiviral
  note: Antibacterial, antiviral and immunostimulant (in vitro)
  reference_ids:
  - REF-0499
  - REF-0500
  status: verified
- action: demulcent
  note: Demulcent for catarrh of the respiratory tract and dry, irritating cough / bronchitis (mucilage
    soothes and protects irritated airways)
  reference_ids:
  - REF-0499
  - REF-0500
  status: verified
- action: immunomodulator
  note: Antibacterial, antiviral and immunostimulant (in vitro)
  reference_ids:
  - REF-0499
  - REF-0500
  status: verified
- action: vulnerary
  note: Vulnerary for minor wounds and insect bites (topical)
  reference_ids:
  - REF-0499
  - REF-0500
  - REF-0966
  - REF-0967
