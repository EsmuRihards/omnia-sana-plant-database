id: plantago-lanceolata
scientific_name: Plantago lanceolata
common_names:
- Ribwort Plantain
- Narrowleaf plantain
- English plantain
- Lamb's tongue
family: Plantaginaceae
parts_used:
- Leaf (and aerial parts)
constituents:
- name: Iridoid glycosides (aucubin, catalpol)
  compounds:
  - iridoid-glycoside
  - glycoside
  note: Anti-inflammatory and antimicrobial constituents.
  reference_ids:
  - REF-0499
- name: Mucilage polysaccharides (~2-3%)
  compounds:
  - polysaccharide
  - mucilage
  note: Coat and protect inflamed mucous membranes and reduce cough-receptor sensitivity.
  reference_ids:
  - REF-0499
- name: Phenylethanoids (acteoside/verbascoside, plantamajoside) and flavonoids (apigenin, luteolin)
  compounds:
  - verbascoside
  - flavonoid
  - apigenin
  - luteolin
  note: Antioxidant and anti-inflammatory constituents.
  reference_ids:
  - REF-0499
botanical_description:
  text: Low, rosette-forming perennial herb with narrow, lance-shaped, strongly ribbed leaves arising
    directly from the base. Tiny, brownish flowers with prominent pale stamens are densely packed into
    a short, dark, cone-like spike atop a long, ridged, leafless flowering stalk.
  height: 15-45 cm (flowering stalk)
  habit: Low, rosette-forming perennial herb
  leaves: Narrow, lance-shaped, strongly ribbed (parallel-veined), in a basal rosette
  flowers: Tiny, brownish, with prominent pale stamens, in a short dark cone-like spike
  stem: Long, ridged, leafless flowering stalk
  root: Fibrous root system
  fruit: Small capsule with 1-2 seeds
  flowering_period: April-October
  reference_ids:
  - REF-0499
  status: verified
habitat:
  text: A very common plant of grassland, meadows, lawns, roadsides and waste ground on a wide range of
    soils; native to Europe and temperate Asia and naturalised worldwide.
  reference_ids:
  - REF-0499
  status: verified
harvesting:
  text: The leaves (and aerial parts) are picked through the growing season, ideally before flowering
    when mucilage and iridoid content is highest, and dried in a warm, shaded, airy place, or used fresh.
  parts:
  - Leaf (and aerial parts)
  season: Spring to summer, before flowering
  reference_ids:
  - REF-0499
  status: verified
traditional_uses:
  text: Ribwort plantain leaf has a long European tradition as a soothing demulcent and mild antimicrobial
    remedy for cough and irritated airways, and, per the EU herbal monograph, for temporary mild inflammation
    of the mouth and throat; the fresh leaf has also been used topically as a vulnerary for minor wounds
    and insect bites.
  reference_ids:
  - REF-0499
  status: verified
preparations:
- name: Infusion
  text: Dried leaf infused in hot water as a traditional demulcent cough and sore-throat tea.
  reference_ids:
  - REF-0499
  status: verified
- name: Syrup
  text: Leaf extract combined with honey or sugar syrup as a soothing cough remedy.
  status: draft
- name: Fresh leaf (topical)
  text: Fresh crushed leaf applied directly to minor wounds, stings and insect bites.
  reference_ids:
  - REF-0499
  status: verified
dosage:
- name: Infusion
  text: The EU herbal monograph describes traditional use of about 1-2 g dried leaf per cup, up to several
    times daily. Educational reference only, not a prescription.
  reference_ids:
  - REF-0499
  status: draft
actions:
- action: anti-inflammatory
  note: Anti-inflammatory for temporary mild inflammation of the mouth and throat (sore throat); in vitro
    the extract inhibits nitric oxide production and inducible NOS in macrophages, supporting its traditional
    respiratory anti-inflammatory use
  reference_ids:
  - REF-0499
  - REF-0633
  - REF-0968
  status: verified
- action: antimicrobial
  note: Antibacterial, antiviral and immunostimulant (in vitro)
  reference_ids:
  - REF-0499
  - REF-0500
  - REF-0960
  - REF-0965
  status: verified
- action: antiviral
