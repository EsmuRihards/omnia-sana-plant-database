internal_notes: 'Enriched 2026-06-12 from regulatory and phytotherapy literature (EMA HMPC and ESCOP monographs).
  Note: distinct from the book''s Plantago major (greater plantain). Originally a skeleton imported from
  the omniasana.bio Symptom-to-Plant Lookup tool (cough, sore-throat, wounds, inflammation, bronchitis);
  associations retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced
  in-vitro study showing Plantago lanceolata extract inhibits nitric oxide production and inducible NOS
  expression in macrophages (REF-0633), a molecular basis for its traditional respiratory anti-inflammatory
  use. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split out, constituents
  linked to compounds). | 2026-06-20: enriched to >=10 scientific publications: added 10 PubMed-verified
  @article sources (REF-0960, REF-0961, REF-0962, REF-0963, REF-0964, REF-0965, REF-0966, REF-0967, REF-0968,
  REF-0969) — woven into relevant actions/indications and the plant-level references bucket.'
