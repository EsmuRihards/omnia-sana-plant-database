botanical_description:
  text: Low, rosette-forming perennial herb (Plantaginaceae) with broad, oval to rounded leaves marked
    by 5-9 prominent parallel ribs, borne on long, channelled petioles. Slender, leafless flowering spikes
    rise from the rosette bearing tiny, densely packed greenish flowers, followed by small seed capsules.
  height: Low rosette; flowering spikes 10-40 cm
  habit: Low rosette-forming perennial herb
  leaves: Broad, oval to rounded, 5-9-ribbed, long-petioled
  flowers: Tiny, densely packed, greenish, in slender spikes
  stem: Slender, leafless flowering spike
  root: Fibrous perennial rootstock
  fruit: Small seed capsule
  flowering_period: June-September
  reference_ids:
  - REF-0364
  status: verified
habitat:
  text: Native to Europe and temperate Asia and now one of the most widespread naturalised weeds worldwide
    (the name 'waybread', or historically 'white man's foot', reflects its spread along paths and trails);
    thrives on compacted, disturbed ground such as paths, lawns and roadsides.
  reference_ids:
  - REF-0364
  status: verified
harvesting:
  text: Leaves are gathered fresh throughout the growing season, especially for poultice use; seed is
    collected in autumn once ripe.
  parts:
  - Leaf
  - Seed
  season: Leaf throughout the growing season; seed in autumn
  reference_ids:
  - REF-0364
  status: verified
traditional_uses:
  text: Greater plantain is one of the most widely used wound herbs across world folk-medicine traditions,
    applied fresh as a poultice to cuts, stings and insect bites, and taken as a tea for cough, digestive
    upset and mild diarrhoea. Modern reviews confirm broad anti-inflammatory, antimicrobial, antioxidant
    and wound-healing activity supporting these traditional uses.
  reference_ids:
  - REF-0364
  - REF-0354
  status: verified
preparations:
- name: Fresh leaf poultice
  text: Crushed or chewed fresh leaf applied directly to wounds, stings and insect bites - the classic
    traditional first-aid use.
  reference_ids:
  - REF-0364
  status: verified
- name: Infusion (tea)
  text: Dried leaf steeped in hot water for cough, digestive complaints and mild diarrhoea.
  reference_ids:
  - REF-0357
  - REF-0358
  status: verified
- name: Seed (bulk fibre)
  text: The mucilaginous seed, related to psyllium, used traditionally as a mild bulk laxative.
  reference_ids:
