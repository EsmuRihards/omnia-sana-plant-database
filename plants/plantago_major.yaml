contraindications:
- note: Extremely safe; one of the most widely used edible and medicinal plants in the world. Psyllium
    seeds (closely related) are well-studied as a bulk laxative but should always be taken with adequate
    water. Allergic reactions are rare but possible. No significant drug interactions documented at normal
    doses.
  severity: caution
  reference_ids:
  - REF-0234
  - REF-0260
  - REF-0309
  status: verified
- note: 'Duke (2002) rates plantain as ++ and notes anti-inflammatory, antitussive, antiatherosclerotic,
    and COX-2-inhibitory activities at the experimental level (score 1). The seeds (psyllium) of related
    species have clinical evidence for cholesterol reduction and as bulk laxatives, though entries here
    apply to the leaf. Dose: leaf as tea or poultice for wounds, sore throat, and bronchial conditions.
    Duke notes the plant is generally safe with anti-inflammatory topical use well-supported in traditional
    practice. Commission E approved plantain (ribwort species) for catarrh and wound healing (Duke, 2002).'
  severity: info
  reference_ids:
  - REF-0234
  - REF-0260
  - REF-0309
  status: verified
- note: Generally regarded as safe as food and in customary medicinal use; allergic reactions are uncommon,
    though the abundant wind-borne pollen can aggravate hay fever in sensitive people.
  severity: info
  reference_ids:
  - REF-0364
  - REF-0358
  status: verified
- note: Correct identification is essential and material should be gathered away from roadsides, sprayed
    lawns and other contaminated ground; deep or infected wounds warrant proper medical care.
  severity: info
  reference_ids:
  - REF-0365
  - REF-0364
  status: verified
- note: Additional omniasana.bio sources cited for Plantago major (identification, distribution, foraging,
    traditional use and supporting evidence; see bibliography).
