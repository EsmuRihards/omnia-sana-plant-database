botanical_description:
  text: Low, rosette-forming perennial herb with broad, oval to egg-shaped, strongly ribbed leaves on
    long stalks, arising directly from the base. Tiny, greenish flowers are densely packed into a long,
    slender, tapering spike atop a leafless flowering stalk.
  height: 10-30 cm (flowering stalk taller)
  habit: Low, rosette-forming perennial herb
  leaves: Broad, oval to egg-shaped, strongly ribbed, long-stalked, in a basal rosette
  flowers: Tiny, greenish, densely packed into a long, slender, tapering spike
  stem: Long, leafless flowering stalk
  root: Fibrous root system
  fruit: Small capsule with numerous tiny seeds
  flowering_period: June-October
  reference_ids:
  - REF-0364
  status: verified
habitat:
  text: One of the most common and widespread weeds in the world, growing on lawns, paths, waste ground
    and compacted or disturbed soil; native to Europe and Asia and now found on every inhabited continent.
  reference_ids:
  - REF-0364
  status: verified
harvesting:
  text: The leaves are picked fresh through the growing season for topical use, or dried for tea; the
    seed is collected in autumn once the flower spikes have dried, by stripping the ripe spikes.
  parts:
  - Leaf
  - Seed
  season: Leaf through the growing season; seed in autumn
  reference_ids:
  - REF-0364
  status: verified
traditional_uses:
  text: Greater plantain is one of the most widely used medicinal and edible plants in the world, with
    a documented history of use across many cultures as a wound-healing vulnerary (the fresh leaf classically
    chewed or crushed and applied to cuts, stings and bites), an astringent for mild diarrhoea, and a
    demulcent expectorant for coughs and catarrh; the mucilaginous seed has also been used as a mild bulk
    laxative, similarly to the related psyllium.
  reference_ids:
  - REF-0364
  status: verified
preparations:
- name: Fresh leaf poultice
  text: Fresh leaf crushed or chewed and applied directly to minor wounds, stings and insect bites, the
    classic and most immediate traditional use.
  reference_ids:
  - REF-0364
  status: verified
- name: Infusion
  text: Dried leaf infused in hot water as a traditional astringent and expectorant tea.
  status: draft
- name: Seed preparation
  text: Whole or ground seed soaked in water and taken as a mild bulk laxative, similarly to psyllium.
  status: draft
dosage:
- name: Infusion (leaf)
  text: Traditional herbal references suggest around 2-3 g of dried leaf per cup, up to three times daily.
    Educational reference only, not a prescription.
  status: draft
