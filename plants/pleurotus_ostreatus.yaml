id: pleurotus-ostreatus
scientific_name: Pleurotus ostreatus
common_names:
- Oyster mushroom
- tree oyster mushroom
family: Pleurotaceae
parts_used:
- Mycelium
- Whole Plant
botanical_description:
  text: Wood-decay fungus (not a true plant) forming overlapping, shelf-like clusters of fan- or oyster-shell-shaped
    caps on the trunks of dead or dying hardwood trees. Caps are typically grey, tan or brown (occasionally
    white), with white to cream gills running down a short, off-centre stem.
  height: Cap 5-20 cm across
  habit: Wood-decay fungus forming overlapping shelf-like clusters
  leaves: Not applicable (fungus)
  flowers: Not applicable (fungus); reproduces by spores
  stem: Short, thick, off-centre or lateral, often barely present
  root: Mycelium spreading through the wood substrate
  fruit: White to cream gills running down the stem, releasing spores
  flowering_period: Fruiting body develops over 1-2 weeks on the growing substrate
  status: draft
habitat:
  text: Grows as a wood-decay fungus on dead or dying broadleaf (hardwood) trees in temperate forests
    worldwide; commercially cultivated on straw, hardwood sawdust or agricultural waste substrate, one
    of the most widely cultivated edible mushrooms globally.
  status: draft
harvesting:
  text: Wild and cultivated fruiting bodies are hand-picked once the caps have expanded but before the
    margins curl upward, then used fresh or dried.
  parts:
  - Mycelium
  - Whole Plant
  status: draft
traditional_uses:
  text: Oyster mushroom is primarily valued as a food across many cultures, and has more recently been
    studied for its nutritional and medicinal properties as a cardiometabolic and immune-supporting mushroom,
    building on the broader East Asian tradition of medicinal mushroom use.
  reference_ids:
  - REF-0102
  status: verified
preparations:
- name: Culinary use
  text: Fresh fruiting body cooked and eaten as a food, the most common and traditional form of use.
  status: draft
- name: Standardised extract
  text: Fruiting-body extract standardised to polysaccharide content, taken as capsules for immune and
    metabolic support.
  reference_ids:
  - REF-1500
  status: verified
dosage:
- name: Standardised extract
  text: Traditional and product references commonly suggest around 1-3 g of dried extract daily, in divided
    doses. Educational reference only, not a prescription.
  status: draft
constituents:
- name: Beta-glucan polysaccharides
  compounds:
  - polysaccharide
  note: Immunomodulatory and antioxidant polysaccharides, the main focus of the mushroom's medicinal research.
  reference_ids:
  - REF-1500
- name: Lovastatin and sterols
  note: Oyster mushroom naturally contains lovastatin-type statins and ergosterol, of interest for cardiometabolic
    research.
  reference_ids:
  - REF-0102
