id: pleurotus-ostreatus
scientific_name: Pleurotus ostreatus
common_names:
- Oyster mushroom
- tree oyster mushroom
family: Pleurotaceae
parts_used:
- Mycelium
- Whole Plant
botanical_description:
  text: Wood-decay fungus (not a true plant, Pleurotaceae) that grows in shelf-like, overlapping clusters
    on dead or dying hardwood trees and stumps. Fan- or oyster-shell-shaped caps, 5-25 cm across, are
    usually grey, tan or brown (occasionally pale or white), with white gills running down a short, off-centre
    stem. The mycelium is a fine white network that colonises and decomposes the wood substrate before
    fruiting.
  height: Cap 5-25 cm across
  habit: Saprotrophic wood-decay fungus, shelf-forming clusters
  leaves: Not applicable (fungus)
  flowers: Not applicable (fungus); reproduces by spores
  stem: Short, off-centre or lateral, white decurrent gills running down it
  root: Mycelium spreading through the wood substrate
  fruit: Pale gilled underside releasing a white to lilac-grey spore print
  flowering_period: Fruiting bodies typically appear in cooler, moist seasons (autumn-spring in temperate
    climates)
  status: draft
habitat:
  text: Grows naturally on dead or dying broadleaf (hardwood) trees - beech, oak, poplar and others -
    in temperate forests worldwide; widely cultivated commercially on straw, sawdust and other lignocellulosic
    substrates.
  status: draft
harvesting:
  text: Wild fruiting bodies are picked as the caps mature but before they become tough or insect-damaged;
    cultivated mushrooms are harvested from substrate blocks or bags once the caps have expanded but before
    releasing significant spore load. Never forage a white shelf-fungus from wood without confirming the
    host tree, since the fatal Angel Wing look-alike is specific to conifer (softwood) wood.
  parts:
  - Fruiting body (mycelium/whole mushroom)
  season: Cooler, moist seasons (autumn-spring in temperate climates)
  reference_ids:
  - REF-2627
  status: verified
traditional_uses:
  text: Oyster mushroom is a widely eaten culinary mushroom with a growing modern reputation as a medicinal
    fungus, valued for immune support and general wellbeing. Contemporary research on its beta-glucan
    polysaccharides supports immunomodulatory, antioxidant, anticancer and cardiometabolic activity.
  reference_ids:
  - REF-1496
  - REF-1500
  status: verified
preparations:
- name: Cooked fruiting body (culinary)
  text: The common food form; always eaten cooked, never raw.
  status: draft
- name: Dried mushroom / powder
  text: Dried and powdered for use in soups, broths, or encapsulated supplements.
  status: draft
- name: Standardised polysaccharide extract
  text: Beta-glucan-rich extract, the form used in most bioactivity research.
  reference_ids:
  - REF-1500
  - REF-1502
  status: verified
dosage:
- name: Polysaccharide extract / culinary use
  text: Most research uses standardised polysaccharide (beta-glucan) extracts rather than a specific whole-food
    gram dose; as a food, oyster mushroom is eaten in normal culinary amounts, always well cooked. Educational
    reference only, not a prescription.
  reference_ids:
  - REF-1500
  - REF-1502
  status: verified
