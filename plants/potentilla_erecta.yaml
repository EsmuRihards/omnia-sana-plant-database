id: potentilla-erecta
scientific_name: Potentilla erecta
common_names:
- Tormentil
- Common tormentil
- Septfoil
- Bloodroot
family: Rosaceae
parts_used:
- Rhizome
constituents:
- name: Tannins (ellagitannins such as agrimoniin, and catechin-type tannins)
  compounds:
  - tannin
  - catechin
  note: The main astringent active constituents.
  reference_ids:
  - REF-0520
  - REF-0521
- name: Flavonoids and phenolic acids
  compounds:
  - phenolic-acid
  - flavonoid
  note: Antioxidant supporting constituents.
  reference_ids:
  - REF-0521
actions:
- action: anti-inflammatory
  note: Anti-inflammatory gargle / mouthwash for sore throat and inflammation of the mouth and throat
  reference_ids:
  - REF-0520
  - REF-0521
  status: verified
- action: antidiarrheal
  note: Astringent for mild diarrhoea (ellagitannins tighten the gut lining) - in a paediatric RCT, tormentil
    root extract shortened rotavirus diarrhoea (3 vs 5 days) and reduced rehydration needs
  reference_ids:
  - REF-0520
  - REF-0521
  - REF-0602
