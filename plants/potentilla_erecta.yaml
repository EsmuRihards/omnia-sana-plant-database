common_names:
- Tormentil
- Common tormentil
- Septfoil
- Bloodroot
scientific_name: Potentilla erecta
family: Rosaceae
parts_used:
- name: Rhizome
  medicinal_actions:
  - action: Astringent for mild diarrhoea (ellagitannins tighten the gut lining) - in a paediatric RCT,
      tormentil root extract shortened rotavirus diarrhoea (3 vs 5 days) and reduced rehydration needs
    reference_ids:
    - REF-0520
    - REF-0521
    - REF-0602
    status: verified
  - action: Anti-inflammatory gargle / mouthwash for sore throat and inflammation of the mouth and throat
    reference_ids:
    - REF-0520
    - REF-0521
    status: verified
  - action: Supportive in inflammatory bowel disease / ulcerative colitis (limited trial evidence)
    reference_ids:
    - REF-0521
    status: needs-review
constituents:
- name: Tannins (ellagitannins such as agrimoniin, and catechin-type tannins)
  note: The main astringent active constituents.
  reference_ids:
  - REF-0520
  - REF-0521
- name: Flavonoids and phenolic acids
  note: Antioxidant supporting constituents.
  reference_ids:
  - REF-0521
contraindications:
- note: 'Tannin-rich: high or prolonged intake may cause stomach upset or constipation and can reduce
    the absorption of iron and some medicines taken at the same time.'
  reference_ids:
  - REF-0520
  status: verified
- note: Diarrhoea persisting more than 3-4 days, or with fever or blood in the stool, needs medical care.
    Use in pregnancy and breastfeeding is not recommended in the absence of data.
  reference_ids:
  - REF-0520
  status: verified
internal_notes: Enriched 2026-06-12 from regulatory and phytotherapy literature (EMA HMPC and ESCOP monographs
  for Tormentillae rhizoma). Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup
  tool (diarrhea, sore-throat, ibd); associations retained and now part-mapped and cited. Further enriched
  2026-06-14 with a PubMed-sourced randomized, double-blind, placebo-controlled paediatric trial showing
  tormentil root extract shortened rotavirus diarrhoea and lowered rehydration requirements (REF-0602).
last_updated: '2026-06-14'
status: verified
