id: potentilla-erecta
scientific_name: Potentilla erecta
common_names:
- Tormentil
- Common tormentil
- Septfoil
- Bloodroot
family: Rosaceae
parts_used:
- Rhizome
constituents:
- name: Tannins (ellagitannins such as agrimoniin, and catechin-type tannins)
  compounds:
  - tannin
  - catechin
  note: The main astringent active constituents.
  reference_ids:
  - REF-0520
  - REF-0521
- name: Flavonoids and phenolic acids
  compounds:
  - phenolic-acid
  - flavonoid
  note: Antioxidant supporting constituents.
  reference_ids:
  - REF-0521
botanical_description:
  text: Low, sprawling to semi-erect perennial herb (Rosaceae) with wiry stems. Leaves are palmate, typically
    with 4-5 leaflets and large leaf-like stipules that give the impression of more leaflets. Flowers
    are small, yellow and four-petalled - unusual among Potentilla species, most of which have five petals.
    The thick, woody rhizome is reddish inside when cut, the origin of the old name 'bloodroot' for this
    European species.
  height: Low, sprawling to semi-erect, stems to about 30-45 cm
  habit: Low, sprawling to semi-erect perennial herb
  leaves: Palmate, typically 4-5 leaflets, with large leaf-like stipules
  flowers: Small, yellow, four-petalled (unusual among Potentilla species)
  stem: Wiry, sprawling to semi-erect
  root: Thick, woody rhizome, reddish inside when cut
  fruit: Small dry achenes (typical Rosaceae)
  flowering_period: May-September
  reference_ids:
  - REF-0520
  status: verified
habitat:
  text: Native to Europe and western Asia, common in acidic grassland, heath, moorland, open woodland
    and pastures on poor, well-drained soils.
  reference_ids:
  - REF-0520
  status: verified
harvesting:
  text: The rhizome is dug in autumn or early spring, when tannin content is highest, then cleaned and
    dried.
  parts:
  - Rhizome
  season: Autumn or early spring
  reference_ids:
  - REF-0520
  status: verified
traditional_uses:
  text: Tormentil rhizome has an official European herbal-monograph tradition for mild diarrhoea and inflammation
    of the mouth and throat, reflecting its long folk use as a powerful astringent for gut and mucous-membrane
    complaints. Modern trials confirm its ellagitannin-rich rhizome shortens the duration of infectious
    (rotavirus) diarrhoea.
  reference_ids:
  - REF-0520
  - REF-0521
  - REF-0602
  status: verified
preparations:
- name: Decoction
  text: Dried rhizome simmered in water, the standard astringent preparation for diarrhoea.
  reference_ids:
  - REF-0520
  status: verified
- name: Tincture
  text: Alcoholic extract, taken diluted or used as a gargle/mouthwash.
  reference_ids:
  - REF-0521
  status: verified
- name: Gargle/mouthwash
  text: Diluted decoction or tincture used for sore throat and mouth inflammation.
  reference_ids:
  - REF-0521
  status: verified
dosage:
- name: Decoction/tincture
  text: EMA/ESCOP guidance suggests around 4-6 g dried rhizome (or an equivalent decoction), divided into
    2-3 doses daily, for diarrhoea, or a diluted tincture used as a gargle several times daily. Educational
    reference only, not a prescription.
  reference_ids:
  - REF-0520
  - REF-0521
  status: verified
actions:
- action: anti-inflammatory
  note: Anti-inflammatory gargle / mouthwash for sore throat and inflammation of the mouth and throat
  reference_ids:
