id: potentilla-erecta
scientific_name: Potentilla erecta
common_names:
- Tormentil
- Common tormentil
- Septfoil
- Bloodroot
family: Rosaceae
parts_used:
- Rhizome
constituents:
- name: Tannins (ellagitannins such as agrimoniin, and catechin-type tannins)
  compounds:
  - tannin
  - catechin
  note: The main astringent active constituents.
  reference_ids:
  - REF-0520
  - REF-0521
- name: Flavonoids and phenolic acids
  compounds:
  - phenolic-acid
  - flavonoid
  note: Antioxidant supporting constituents.
  reference_ids:
  - REF-0521
botanical_description:
  text: Low, sprawling perennial herb with slender, wiry stems and small, deeply toothed, palmately divided
    leaves typically in fours (unusual among cinquefoils, which usually have five leaflets - hence 'septfoil').
    Small, bright yellow, four-petalled flowers are borne singly on long thin stalks.
  height: 10-30 cm (sprawling)
  habit: Low, sprawling perennial herb
  leaves: Small, deeply toothed, palmately divided, typically in fours
  flowers: Small, bright yellow, four-petalled, borne singly on long thin stalks
  stem: Slender, wiry, sprawling
  root: Thick, woody, reddish-brown rhizome (the medicinal part), red inside when cut
  fruit: Small cluster of achenes
  flowering_period: May-September
  reference_ids:
  - REF-0520
  status: verified
habitat:
  text: Grows on heath, moorland, acidic grassland, open woodland and pastures on well-drained, often
    poor or acidic soils; native to Europe and Western Asia.
  reference_ids:
  - REF-0520
  status: verified
harvesting:
  text: The rhizome is dug in autumn or early spring, when tannin content is highest, then cleaned and
    dried; the reddish colour revealed when cut is the traditional identifying feature giving the plant
    its old name 'bloodroot'.
  parts:
  - Rhizome
  season: Autumn or early spring
  reference_ids:
  - REF-0520
  status: verified
traditional_uses:
  text: Tormentil rhizome, one of the most tannin-rich temperate roots, has a long European folk and official
    (EU herbal monograph) use as a powerful astringent for mild diarrhoea, and as a gargle or mouthwash
    for inflammation of the mouth and throat, reflecting its very high tannin content.
  reference_ids:
  - REF-0520
  status: verified
preparations:
- name: Decoction
  text: Dried, chopped rhizome simmered in water as a strongly astringent traditional remedy for diarrhoea,
    or used as a gargle/mouthwash for sore throat.
  reference_ids:
  - REF-0520
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried rhizome.
  status: draft
dosage:
- name: Decoction/gargle
  text: The EU herbal monograph describes traditional use of about 2-4 g dried rhizome per cup, up to
    three times daily, or used as a gargle. Educational reference only, not a prescription.
  reference_ids:
  - REF-0520
  status: draft
actions:
- action: anti-inflammatory
  note: Anti-inflammatory gargle / mouthwash for sore throat and inflammation of the mouth and throat
  reference_ids:
  - REF-0520
  - REF-0521
  - REF-0970
  - REF-0973
  - REF-0975
  - REF-0977
  - REF-0978
  status: verified
- action: antidiarrheal
  note: Astringent for mild diarrhoea (ellagitannins tighten the gut lining) - in a paediatric RCT, tormentil
    root extract shortened rotavirus diarrhoea (3 vs 5 days) and reduced rehydration needs
  reference_ids:
  - REF-0520
  - REF-0521
  - REF-0602
  - REF-0970
  - REF-0973
  status: verified
- action: astringent
  note: Astringent for mild diarrhoea (ellagitannins tighten the gut lining) - in a paediatric RCT, tormentil
    root extract shortened rotavirus diarrhoea (3 vs 5 days) and reduced rehydration needs
  reference_ids:
  - REF-0520
  - REF-0521
