contraindications:
- note: 'Allergy risk: avoid if you’re allergic to cowslip/other Primula species (European Medicines Agency,
    2012). Stomach sensitivity: use caution if you have gastritis or a stomach ulcer—cowslip can upset
    the stomach in some people (European Medicines Agency, 2012). Possible side effects (especially high
    dose): nausea, vomiting, diarrhea; allergic reactions can happen (European Medicines Agency, 2012).
    Pregnancy/breastfeeding: not recommended due to lack of good safety data (European Medicines Agency,
    2012). Kids: many preparations are not recommended under 12 (and some root extracts under 4) unless
    a labeled product specifically allows it (European Medicines Agency, 2012).'
  severity: caution
  reference_ids:
  - REF-0075
  - REF-0235
  - REF-0306
  status: verified
- note: 'Duke (2002) provides clinical evidence (score 2) for cowslip''s expectorant and secretolytic
    activities, consistent with Commission E approval for bronchitis and cough with mucus. Dose: 0.5–1
    g root or 1–2 g herb as tea three times daily. Saponins in the root are responsible for the expectorant
    action. Duke warns that the plant may cause hemolysis in large doses due to saponin content, and caution
    is warranted in individuals with aspirin sensitivity due to phenolic acid content (Duke, 2002).'
  severity: caution
  reference_ids:
  - REF-0075
  - REF-0235
  - REF-0306
  status: verified
