botanical_description:
  text: Low perennial herb (Primulaceae) forming a basal rosette of wrinkled, oval, softly hairy leaves
    that taper abruptly to a winged stalk. A single leafless flowering stem rises from the rosette bearing
    a one-sided umbel of small, fragrant, deep yellow, funnel-shaped flowers with orange spots at the
    throat, nodding on slender pedicels.
  height: Low rosette; flowering stem 10-25 cm
  habit: Low rosette-forming perennial herb
  leaves: Wrinkled, oval, softly hairy, tapering to a winged stalk
  flowers: Small, fragrant, deep yellow, funnel-shaped with orange throat spots, in a one-sided nodding
    umbel
  stem: Single, leafless flowering stem
  root: Short rhizome with fibrous roots
  fruit: Small capsule
  flowering_period: April-May
  reference_ids:
