  status: verified
habitat:
  text: Native across Europe and western Asia, growing in unimproved, species-rich grassland, meadows,
    pastures, open woodland and hedge banks on calcareous or well-drained soils.
  reference_ids:
  - REF-0879
  status: verified
harvesting:
  text: Flowers are picked in spring as they open; the root/rhizome is dug in autumn.
  parts:
  - Flower
  - Root/rhizome
  season: Flower in spring; root/rhizome in autumn
  status: draft
traditional_uses:
  text: Cowslip has a long European folk tradition as an expectorant remedy for coughs and bronchial catarrh,
    and the flowers have traditionally been used as a mild sedative and for headache. Modern research
    on its saponin-rich root supports secretolytic (mucus-thinning) expectorant activity, and its flowers
    are rich in antioxidant phenolics.
  reference_ids:
  - REF-0870
  - REF-0875
  status: verified
preparations:
- name: Root decoction/tea
  text: Dried root simmered or infused, the traditional expectorant preparation for cough with mucus.
  reference_ids:
  - REF-0870
  status: verified
- name: Flower infusion (tea)
  text: Dried flower steeped in hot water, a milder traditional calming and headache remedy.
  status: draft
- name: Standardised combination extract
  text: Root is a component of some standardised multi-herb bronchial/cough products (e.g. combined with
    ivy and thyme).
  reference_ids:
  - REF-0870
  status: verified
dosage:
- name: Root/herb tea
  text: 'Duke (2002): about 0.5-1 g root or 1-2 g herb as tea, three times daily. Educational reference
    only, not a prescription; large doses of the saponin-rich root can cause gastrointestinal upset.'
  reference_ids:
