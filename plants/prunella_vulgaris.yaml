contraindications:
- note: Generally very safe and well tolerated. No significant known toxicity or drug interactions. Safe
    for topical and internal use in normal medicinal doses. Suitable for most adults including children
    in appropriate doses.
  severity: caution
  reference_ids:
  - REF-0098
  - REF-0200
  - REF-0314
  status: verified
- note: Duke (2002) rates self-heal as +++ and notes antioxidant (score 2), anti-inflammatory, antiviral,
    and COX-2 inhibitory activities. The plant contains luteolin, rosmarinic acid, and hyperoside — all
    with well-documented bioactivities. Hepatoprotective activity has been experimentally demonstrated.
    Duke notes that self-heal has a broad antimicrobial spectrum and an impressive antioxidant profile,
    supporting its traditional reputation as a versatile wound-healing herb. No significant safety concerns
    at normal herbal doses (Duke, 2002).
  severity: info
  reference_ids:
  - REF-0098
  - REF-0200
  - REF-0314
