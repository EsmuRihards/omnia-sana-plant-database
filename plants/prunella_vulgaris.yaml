constituents:
- name: Triterpenoids and phenolic acids
  note: Pentacyclic triterpenoids (ursolic, oleanolic and betulinic acids), the phenolic acid rosmarinic
    acid, coumarins (umbelliferone, scopoletin, esculetin) and the flavonoid luteolin are the main bioactives
    behind self-heal's antioxidant, anti-inflammatory and antimicrobial activity.
  reference_ids:
  - REF-0659
- name: Sulphated and polyphenol-conjugated polysaccharides
  note: Water-extracted polysaccharides — including a partially sulphated arabinogalactomannan (PSP-2B)
    and polyphenolic-protein-polysaccharide conjugates (PVG/PVE30) — are the principal antiviral and immunomodulatory
    constituents, blocking herpes simplex virus attachment and modulating innate immune signalling.
  reference_ids:
  - REF-0660
  - REF-0661
  - REF-0662
contraindications:
- note: Generally very safe and well tolerated. No significant known toxicity or drug interactions. Safe
    for topical and internal use in normal medicinal doses. Suitable for most adults including children
    in appropriate doses.
  reference_ids:
  - REF-0098
  - REF-0200
  - REF-0314
  status: verified
- note: Duke (2002) rates self-heal as +++ and notes antioxidant (score 2), anti-inflammatory, antiviral,
    and COX-2 inhibitory activities. The plant contains luteolin, rosmarinic acid, and hyperoside — all
    with well-documented bioactivities. Hepatoprotective activity has been experimentally demonstrated.
    Duke notes that self-heal has a broad antimicrobial spectrum and an impressive antioxidant profile,
    supporting its traditional reputation as a versatile wound-healing herb. No significant safety concerns
    at normal herbal doses (Duke, 2002).
  reference_ids:
  - REF-0098
  - REF-0200
  - REF-0314
  status: verified
internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx).
