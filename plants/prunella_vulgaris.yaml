internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx).
  reference_ids are plant-level: the book lists parts and actions as flat, unmapped lists, so the full
  set of references cited for this plant is attached to each action rather than split per action. constituents
  not yet extracted — manual enrichment pending. Further enriched 2026-06-14 with six PubMed-sourced studies
  (REF-0658..REF-0663): a spontaneous-colitis model showing anti-inflammatory/immune activity (REF-0658),
  a comprehensive phytochemistry/pharmacology review (REF-0659), and four polysaccharide studies establishing
  anti-herpes-simplex-virus and innate-immune mechanisms (REF-0660, REF-0661, REF-0662, REF-0663); triterpenoid/phenolic
  and polysaccharide constituents added. | 2026-06-15: migrated to entity schema (actions->vocab ids,
  indications split out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific
  publications: added 5 PubMed-verified @article sources (REF-0659, REF-2422, REF-2423, REF-2424, REF-2425)
  — woven into relevant actions/indications and the plant-level references bucket.'
