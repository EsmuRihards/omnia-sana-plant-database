id: prunella-vulgaris
scientific_name: Prunella vulgaris
common_names:
- Selfheal
- heal-all
- woundwort
family: Lamiaceae
external_ids:
  gbif: 5341297
  wikidata: Q158469
parts_used:
- Flower
- Leaf
- Stem
constituents:
- name: Triterpenoids and phenolic acids
  compounds:
  - rosmarinic-acid
  - phenolic-acid
  - coumarin
  - flavonoid
  - luteolin
  note: Pentacyclic triterpenoids (ursolic, oleanolic and betulinic acids), the phenolic acid rosmarinic
    acid, coumarins (umbelliferone, scopoletin, esculetin) and the flavonoid luteolin are the main bioactives
    behind self-heal's antioxidant, anti-inflammatory and antimicrobial activity.
  reference_ids:
  - REF-0659
  - REF-2423
- name: Sulphated and polyphenol-conjugated polysaccharides
  compounds:
  - polysaccharide
  - phenolic-compound
  note: Water-extracted polysaccharides — including a partially sulphated arabinogalactomannan (PSP-2B)
    and polyphenolic-protein-polysaccharide conjugates (PVG/PVE30) — are the principal antiviral and immunomodulatory
    constituents, blocking herpes simplex virus attachment and modulating innate immune signalling.
  reference_ids:
  - REF-0660
  - REF-0661
  - REF-0662
  - REF-2424
botanical_description:
  text: Low, creeping to semi-erect perennial herb (Lamiaceae), 5-30 cm tall, with square, often purplish
    stems. Leaves are opposite, ovate with slightly toothed margins. Small, two-lipped, violet-purple
    flowers are densely packed into a compact, club-shaped terminal spike subtended by purplish bracts.
  height: 5-30 cm
  habit: Low, creeping to semi-erect perennial herb
  leaves: Opposite, ovate, slightly toothed
  flowers: Small, two-lipped, violet-purple, in a compact club-shaped terminal spike
  stem: Square, often purplish
  root: Fibrous, spreading perennial rootstock
  fruit: Four small nutlets (typical Lamiaceae schizocarp)
  flowering_period: June-September
  reference_ids:
  - REF-0659
  status: verified
habitat:
  text: Native throughout Europe, Asia and North America (circumboreal), extremely common in lawns, meadows,
    woodland clearings, roadsides and waste ground, tolerating mowing and a wide range of soils.
  reference_ids:
  - REF-0659
  status: verified
harvesting:
  text: Whole flowering aerial parts (flower, leaf and stem) are cut during flowering (summer) and dried.
  parts:
  - Flower
  - Leaf
  - Stem
  season: Summer, during flowering
  reference_ids:
  - REF-0659
  status: verified
traditional_uses:
  text: Selfheal has an extremely broad folk-medicine reputation across European, North American and Traditional
    Chinese Medicine traditions - as its name suggests, used as an all-purpose wound herb, gargle for
    sore throat, and internal remedy for fevers and inflammation. Modern research on its triterpenoid,
    phenolic and polysaccharide constituents supports wide-ranging antioxidant, anti-inflammatory, antimicrobial
    and antiviral activity.
  reference_ids:
  - REF-0659
  status: verified
preparations:
- name: Fresh leaf poultice
  text: Crushed fresh herb applied to wounds, cuts and bruises.
  status: draft
- name: Infusion (tea)
  text: Dried aerial parts steeped in hot water, taken internally or used as a gargle or wash.
  reference_ids:
  - REF-0659
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried aerial parts.
  status: draft
dosage:
- name: Infusion (tea)
  text: Traditional guidance suggests roughly 2-4 g dried herb per cup as an infusion, up to three times
    daily, or an equivalent tincture; used topically as a wash or gargle at similar strength. Educational
    reference only, not a prescription.
  reference_ids:
  - REF-0659
  status: verified
