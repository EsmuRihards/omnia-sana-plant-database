constituents:
- name: Phytosterols (beta-sitosterol)
  compounds:
  - phytosterol
  note: Sterols associated with the prostate-supporting activity.
  reference_ids:
  - REF-0496
  - REF-0548
  - REF-1506
  - REF-1515
- name: Pentacyclic triterpenes (ursolic and oleanolic acid) and ferulic acid esters
  compounds:
