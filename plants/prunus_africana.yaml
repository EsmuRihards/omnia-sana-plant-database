  note: Anti-inflammatory supporting constituents of the bark.
  reference_ids:
  - REF-0496
botanical_description:
  text: Evergreen tree (Rosaceae), 10-30 m tall, with dark, fissured, red-brown bark (the source of the
    common name 'red stinkwood', from its unpleasant smell when cut). Leaves are glossy dark green, leathery,
    oblong with finely toothed margins. Small white, five-petalled flowers are borne in axillary racemes,
    followed by small reddish-brown, two-lobed fruit.
  height: 10-30 m
  habit: Evergreen tree
  leaves: Glossy dark green, leathery, oblong, finely toothed
  flowers: Small, white, five-petalled, in axillary racemes
  stem: Dark, fissured, red-brown, aromatic bark
  root: Deep woody root system
  fruit: Small, reddish-brown, two-lobed fruit
  flowering_period: Variable, often twice yearly in its native range
  status: draft
habitat:
  text: Native to montane forests of central and southern Africa (and Madagascar), growing at moderate
    to high altitude (roughly 900-3400 m). The species is CITES-listed and conservation-threatened owing
    to over-harvesting of bark for the pharmaceutical trade.
  status: draft
harvesting:
  text: Bark is traditionally stripped from mature trees. Unsustainable stripping - especially removing
    bark all the way round the trunk - kills the tree and has driven population decline, so sustainable,
    partial and rotational bark harvesting or cultivated sources are recommended.
  parts:
  - Bark
  season: Not standardised; sustainable/rotational harvesting recommended
  status: draft
traditional_uses:
  text: Prunus africana bark has a traditional use in East and Central African ethnomedicine for urinary
    complaints, and its extract (marketed as Pygeum) became one of the most widely used European phytotherapy
    remedies for benign prostatic hyperplasia (BPH) symptoms in the 20th century. Clinical evidence for
    symptom benefit is moderate but drawn from small, methodologically weak trials.
  reference_ids:
  - REF-0496
  status: verified
preparations:
- name: Standardised lipophilic bark extract (capsule)
  text: The clinically studied commercial form, standardised for phytosterol content.
  reference_ids:
  - REF-0496
  status: verified
- name: Traditional bark decoction
  text: Dried bark simmered in water, a traditional East/Central African preparation.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials have most often used around 100-200 mg/day of standardised lipophilic bark extract,
    divided into two doses. Educational reference only, not a prescription; any prostate or urinary symptom
    should be medically assessed first.
  reference_ids:
  - REF-0496
  status: verified
