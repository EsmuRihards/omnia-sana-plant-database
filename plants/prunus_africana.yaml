internal_notes: 'Enriched 2026-06-12 from scientific literature (Canadian Journal of Urology review of
  phytotherapy for BPH). Further enriched 2026-06-13 with two PubMed systematic reviews - the Cochrane
  review of Pygeum africanum for BPH (REF-0547, Wilt et al. 2002) and a J Urol phytotherapy review (REF-0548,
  Dedhia & McVary 2008). Evidence for efficacy is weak/mixed, reflected in needs-review action statuses.
  Note: Prunus africana is a conservation-threatened species (CITES-listed) - sustainable sourcing matters.
  Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (prostate-support);
  association retained and now cited. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications
  split out, constituents linked to compounds).'
