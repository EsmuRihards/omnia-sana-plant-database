contraindications:
- note: Lower urinary tract / prostate symptoms must be medically assessed first to exclude prostate cancer.
    The evidence is mixed and rests on small, short, methodologically weak trials, so men with moderate
    or severe BPH should not rely on it instead of proven treatment.
  severity: caution
