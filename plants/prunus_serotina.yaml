id: prunus-serotina
scientific_name: Prunus serotina
common_names:
- Wild Cherry Bark
- Black cherry
- Wild black cherry
- Rum cherry
family: Rosaceae
external_ids:
  gbif: 3021850
  wikidata: Q158987
parts_used:
- Bark (dried)
constituents:
- name: Cyanogenic glycoside prunasin
  compounds:
  - glycoside
  note: Releases trace hydrogen cyanide that calms the cough reflex - the basis of both the antitussive
    action and the safety caution.
  reference_ids:
  - REF-0524
  - REF-0525
  - REF-2556
- name: Tannins, coumarins (scopoletin) and benzaldehyde
  compounds:
  - coumarin
  - tannin
  note: Astringent and aromatic supporting constituents.
  reference_ids:
  - REF-0525
- name: Flavanones (naringenin) and methoxylated benzene derivatives
  compounds:
  - flavonoid
  note: Bio-guided fractionation of the bark identified naringenin and trimethoxy-benzene/benzoic-acid
    compounds; the bark extract also showed antiparasitic (cysticidal) activity in laboratory studies.
  reference_ids:
  - REF-0628
botanical_description:
  text: Deciduous tree (Rosaceae), 15-30 m tall, with dark, scaly, aromatic bark that has a distinctive
    bitter-almond smell when cut or crushed (from cyanogenic compounds). Leaves are glossy dark green,
    elliptical and finely toothed. Small white flowers are borne in drooping racemes, followed by small,
    dark purple-black cherries that are edible when fully ripe but otherwise bitter.
  height: 15-30 m
  habit: Deciduous tree
  leaves: Glossy dark green, elliptical, finely toothed
  flowers: Small, white, in drooping racemes
  stem: Dark, scaly, aromatic bark with a bitter-almond smell when cut
  root: Deep woody root system
  fruit: Small, dark purple-black cherries, bitter unless fully ripe
  flowering_period: April-May
  reference_ids:
  - REF-0524
  status: verified
habitat:
  text: Native to eastern North America, growing in a wide range of woodland, forest-edge and open habitats
    on well-drained soils; widely naturalised and, in parts of Europe, considered an invasive tree.
  reference_ids:
  - REF-0524
  status: verified
harvesting:
  text: Bark is stripped from the trunk and larger branches, traditionally in autumn, and must be thoroughly
    dried before use - fresh bark has a much higher cyanogenic-glycoside content and is more toxic.
  parts:
  - Bark
  season: Traditionally autumn; must be dried before use
  reference_ids:
  - REF-0525
  status: verified
traditional_uses:
  text: Wild cherry bark has a long Native American and European settler tradition as a cough remedy,
    valued specifically for its unusual cough-suppressant action - from the cyanogenic glycoside prunasin,
    which releases a trace, sedating amount of cyanide that calms the cough reflex. It remains a classic
    ingredient of traditional cough syrups.
  reference_ids:
  - REF-0524
  - REF-0525
  status: verified
preparations:
- name: Decoction/infusion
  text: Dried bark gently simmered or infused in hot water - the traditional cough preparation.
  reference_ids:
  - REF-0524
  - REF-0525
  status: verified
- name: Syrup
  text: Bark decoction sweetened - a classic cough-syrup base.
  reference_ids:
  - REF-0525
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried bark.
  status: draft
dosage:
- name: Decoction
  text: Traditional guidance suggests roughly 1-2 g dried bark per cup as a decoction, up to three times
    daily, using only properly dried bark; avoid large or prolonged doses given the cyanogenic-glycoside
    content, and avoid in pregnancy and breastfeeding. Educational reference only, not a prescription.
  reference_ids:
  - REF-0524
  - REF-0525
  status: verified
actions:
- action: anticancer
  reference_ids:
  - REF-2558
  status: needs-review
- action: antispasmodic
  note: Antispasmodic for bronchial cough and bronchitis (eases spasm of the airways)
  reference_ids:
  - REF-0525
  - REF-1000
  status: needs-review
- action: antitussive
  note: Antitussive - calms a persistent dry, irritating cough (prunasin quietens the cough reflex)
  reference_ids:
  - REF-0524
  - REF-0525
  - REF-0999
  status: verified
