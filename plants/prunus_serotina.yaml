id: prunus-serotina
scientific_name: Prunus serotina
common_names:
- Wild Cherry Bark
- Black cherry
- Wild black cherry
- Rum cherry
family: Rosaceae
parts_used:
- Bark (dried)
constituents:
- name: Cyanogenic glycoside prunasin
  compounds:
  - glycoside
  note: Releases trace hydrogen cyanide that calms the cough reflex - the basis of both the antitussive
    action and the safety caution.
  reference_ids:
  - REF-0524
  - REF-0525
- name: Tannins, coumarins (scopoletin) and benzaldehyde
  compounds:
  - coumarin
  - tannin
  note: Astringent and aromatic supporting constituents.
  reference_ids:
  - REF-0525
- name: Flavanones (naringenin) and methoxylated benzene derivatives
  compounds:
  - flavonoid
  note: Bio-guided fractionation of the bark identified naringenin and trimethoxy-benzene/benzoic-acid
    compounds; the bark extract also showed antiparasitic (cysticidal) activity in laboratory studies.
  reference_ids:
  - REF-0628
actions:
- action: antispasmodic
  note: Antispasmodic for bronchial cough and bronchitis (eases spasm of the airways)
  reference_ids:
  - REF-0525
  status: needs-review
- action: antitussive
  note: Antitussive - calms a persistent dry, irritating cough (prunasin quietens the cough reflex)
  reference_ids:
  - REF-0524
  - REF-0525
  status: verified
indications:
- condition: bronchitis
  note: Antispasmodic for bronchial cough and bronchitis (eases spasm of the airways)
  reference_ids:
  - REF-0525
  status: needs-review
- condition: cough
  note: Antispasmodic for bronchial cough and bronchitis (eases spasm of the airways); Antitussive - calms
    a persistent dry, irritating cough (prunasin quietens the cough reflex)
  reference_ids:
  - REF-0524
  - REF-0525
  status: needs-review
- condition: menstrual-cramps
  note: inferred from antispasmodic action
  reference_ids:
  - REF-0525
  status: needs-review
- condition: muscle-spasm
  note: inferred from antispasmodic action
  reference_ids:
  - REF-0525
  status: needs-review
- condition: sore-throat
  note: Soothes sore throat and respiratory irritation (traditional)
  reference_ids:
  - REF-0524
  status: needs-review
contraindications:
- note: 'Contains cyanogenic compounds: use only properly dried, prepared bark and avoid large or prolonged
    doses (fresh bark has a higher toxic content). It suppresses the cough reflex, so it suits dry, unproductive
    coughs - not productive coughs where mucus needs clearing.'
  severity: caution
  reference_ids:
  - REF-0524
  - REF-0525
  status: verified
- note: Avoid in pregnancy and breastfeeding because of the cyanogenic glycosides.
  severity: caution
  reference_ids:
  - REF-0525
  status: verified
provenance: website+pubmed+symptom-tool
status: verified
