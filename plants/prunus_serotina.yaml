common_names:
- Wild Cherry Bark
- Black cherry
- Wild black cherry
- Rum cherry
scientific_name: Prunus serotina
family: Rosaceae
parts_used:
- name: Bark (dried)
  medicinal_actions:
  - action: Antitussive - calms a persistent dry, irritating cough (prunasin quietens the cough reflex)
    reference_ids:
    - REF-0524
    - REF-0525
    status: verified
  - action: Antispasmodic for bronchial cough and bronchitis (eases spasm of the airways)
    reference_ids:
    - REF-0525
    status: needs-review
  - action: Soothes sore throat and respiratory irritation (traditional)
    reference_ids:
    - REF-0524
    status: needs-review
constituents:
- name: Cyanogenic glycoside prunasin
  note: Releases trace hydrogen cyanide that calms the cough reflex - the basis of both the antitussive
    action and the safety caution.
  reference_ids:
  - REF-0524
  - REF-0525
- name: Tannins, coumarins (scopoletin) and benzaldehyde
  note: Astringent and aromatic supporting constituents.
  reference_ids:
  - REF-0525
contraindications:
- note: 'Contains cyanogenic compounds: use only properly dried, prepared bark and avoid large or prolonged
    doses (fresh bark has a higher toxic content). It suppresses the cough reflex, so it suits dry, unproductive
    coughs - not productive coughs where mucus needs clearing.'
  reference_ids:
  - REF-0524
  - REF-0525
  status: verified
- note: Avoid in pregnancy and breastfeeding because of the cyanogenic glycosides.
  reference_ids:
  - REF-0525
  status: verified
