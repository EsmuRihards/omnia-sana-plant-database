contraindications:
- note: 'Contains cyanogenic compounds: use only properly dried, prepared bark and avoid large or prolonged
    doses (fresh bark has a higher toxic content). It suppresses the cough reflex, so it suits dry, unproductive
    coughs - not productive coughs where mucus needs clearing.'
  severity: caution
  reference_ids:
  - REF-0524
  - REF-0525
  status: verified
- note: Avoid in pregnancy and breastfeeding because of the cyanogenic glycosides.
  severity: caution
