id: psilocybe-cubensis
scientific_name: Psilocybe cubensis
common_names:
- Psilocybin mushrooms
- Psilocybin mushroom
- magic mushroom
- golden teacher
family: Hymenogastraceae
parts_used:
- Mycelium
- Whole Plant
botanical_description:
  text: Saprotrophic fungus (not a true plant, Hymenogastraceae) with a cap 2-8 cm across, convex to bell-shaped,
    golden-brown to caramel with a paler margin, fading as it dries. The whitish to yellowish stem often
    bears a thin ring (annulus) that darkens purple-black from falling spores; gills are grey to dark
    purple-brown, crowded and adnate. The mycelium colonises dung and dung-enriched, nutrient-rich soil.
    All parts stain blue-green when bruised or handled, from oxidation of psilocin.
  height: Cap 2-8 cm across; stem several cm tall
  habit: Saprotrophic, dung-loving fungus
  leaves: Not applicable (fungus)
  flowers: Not applicable (fungus); reproduces by spores
  stem: Whitish to yellowish, often with a thin ring (annulus) that darkens with spores
  root: Mycelium colonising dung and dung-enriched soil
  fruit: Grey to dark purple-brown gills; bruises blue-green when handled
  flowering_period: Fruiting bodies appear in warm, humid weather, often following rain
  reference_ids:
  - REF-1525
  status: verified
habitat:
  text: Most common in subtropical and tropical regions of the Americas (and increasingly recorded elsewhere),
    growing directly on the dung of grazing livestock - particularly cattle - and on dung-enriched pasture
    soil in warm, humid climates.
  reference_ids:
  - REF-1524
  status: verified
harvesting:
  text: Fruiting bodies are picked by hand as caps expand, typically in warm, humid weather following
    rain; cultivated production uses sterilised grain or dung-based substrate inoculated with mycelium
    under controlled humidity and temperature.
  parts:
  - Fruiting body (mycelium/whole mushroom)
  season: Warm, humid weather, often following rain
  reference_ids:
  - REF-1525
  status: verified
traditional_uses:
  text: Psilocybe mushrooms have a documented history of ceremonial and shamanic use in Mesoamerican indigenous
    traditions, later popularised globally from the mid-20th century onward. Contemporary clinical research
    on purified psilocybin, the principal active compound, supports use under professional supervision
    in psilocybin-assisted therapy for depression and anxiety, distinct from unsupervised recreational
    use.
  reference_ids:
  - REF-1524
  status: verified
preparations:
- name: Dried whole mushroom
  text: The traditional and most common form; drying concentrates and stabilises psilocybin/psilocin content.
  reference_ids:
  - REF-1518
  - REF-1521
  status: verified
- name: Purified psilocybin (clinical)
  text: The standardised, purified compound used in modern clinical trials, administered under professional
    supervision.
  reference_ids:
  - REF-1516
  - REF-1517
  status: verified
- name: Tea/extract
  text: Dried mushroom steeped in hot water, a traditional preparation said to reduce gastrointestinal
    discomfort.
  status: draft
dosage:
- name: Purified psilocybin (clinical)
  text: Clinical trials of psilocybin-assisted therapy have used purified, weight-calibrated doses (commonly
    in the range of 20-25 mg psilocybin) administered once or twice under professional supervision in
    a controlled clinical setting - fundamentally different from unsupervised recreational dosing. Psilocybin
    is illegal in most jurisdictions outside approved clinical/research settings and should never be used
    outside professional supervision. Educational reference only, not a prescription or an endorsement
    of unsupervised use.
  reference_ids:
  - REF-1519
  - REF-1516
  - REF-1517
  status: verified
constituents:
- name: Psilocybin
  note: The principal prodrug alkaloid, an indole (tryptamine) compound dephosphorylated to psilocin in
    the body; the primary active constituent driving the psychoactive and clinically studied antidepressant/anxiolytic
    effects.
  reference_ids:
  - REF-1516
  - REF-1518
- name: Psilocin
  note: The active metabolite of psilocybin, a serotonin (5-HT2A) receptor agonist directly responsible
    for the psychoactive effect.
  reference_ids:
  - REF-1516
  - REF-1517
- name: Baeocystin and norbaeocystin (minor tryptamine alkaloids)
  note: Minor related tryptamines present alongside psilocybin/psilocin at lower concentrations, of uncertain
    individual contribution.
  reference_ids:
  - REF-1521
actions:
- action: antidepressant
  note: Psilocybin-assisted therapy for depression (clinical trials)
  reference_ids:
