contraindications:
- note: Psilocybin is physiologically non-toxic and non-addictive in clinical contexts. Psychological
    risks include anxiety, paranoia, and triggering of latent psychiatric conditions (contraindicated
    in personal or family history of psychosis or schizophrenia). Use only in appropriate clinical/ceremonial
    settings with trained supervision. Illegal in most jurisdictions. Avoid mixing with lithium (seizure
    risk).
  severity: caution
