internal_notes: 'Enriched 2026-06-12 from scientific literature (Molecules study of Pulmonaria antioxidant
  and COX-2-inhibitory activity). Further enriched 2026-06-13 with a PubMed LC-MS/MS phenolic-constituents
  profiling study (REF-0549, Krzyzanowska-Kowalczyk et al. 2018). Lungwort is poorly covered by clinical
  trials, so respiratory actions remain needs-review. Originally a skeleton imported from the omniasana.bio
  Symptom-to-Plant Lookup tool (cough, bronchitis, sore-throat); associations retained and now part-mapped
  and cited. Further enriched 2026-06-14 with a PubMed-sourced study isolating yunnaneic acid B from P.
  officinalis and demonstrating its antioxidant (peroxynitrite-scavenging) activity (REF-0629). | 2026-06-15:
  migrated to entity schema (actions->vocab ids, indications split out, constituents linked to compounds).
  | 2026-06-20: enriched to >=10 scientific publications: added 9 PubMed-verified @article sources (REF-1544,
  REF-1545, REF-1546, REF-1547, REF-1548, REF-1549, REF-1550, REF-1551, REF-1552) — woven into relevant
  actions/indications and the plant-level references bucket. | 2026-07-11: added botanical_description/habitat/harvesting/traditional_uses/preparations/dosage
