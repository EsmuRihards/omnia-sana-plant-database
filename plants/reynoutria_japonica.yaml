botanical_description:
  text: Vigorous, invasive rhizomatous perennial (Polygonaceae) with hollow, bamboo-like, jointed stems
    1-3 m tall (occasionally taller), speckled reddish-purple. Leaves are broad, heart- to shovel-shaped
    with a flat base. Abundant sprays of small, creamy-white flowers appear in late summer, followed by
    small winged fruit.
  height: 1-3 m (occasionally to 4 m+)
  habit: Vigorous, invasive, rhizomatous perennial
  leaves: Broad, heart- to shovel-shaped, flat-based
  flowers: Small, creamy-white, in abundant sprays
  stem: Hollow, bamboo-like, jointed, reddish-purple speckled
  root: Extensive, deep, aggressively spreading rhizome
  fruit: Small winged achenes
  flowering_period: August-October
  reference_ids:
  - REF-0984
  status: verified
habitat:
  text: Native to East Asia (Japan, China, Korea), now a notorious invasive species across Europe and
    North America, growing in disturbed ground, riverbanks, roadsides and waste land, spreading aggressively
    via an extensive rhizome network.
  reference_ids:
  - REF-0984
  status: verified
harvesting:
  text: The rhizome/root, the main medicinal part, is dug in autumn or winter when resveratrol content
    is highest; young spring shoots (stems) are also edible and used. Strict containment is required when
    harvesting, given the plant's severe invasiveness.
  parts:
  - Root
  - Stem
  season: Root in autumn/winter; young stems in spring
  reference_ids:
  - REF-0984
  status: verified
traditional_uses:
  text: Known as Hu Zhang in Traditional Chinese Medicine, Japanese knotweed root has a centuries-old
    use for inflammation, infections, jaundice and menstrual complaints. Modern interest centres on its
    resveratrol and emodin content, now studied (as Polygonum cuspidatum extract) for antioxidant, anti-inflammatory,
    cardioprotective and hepatoprotective activity, and more recently for supportive use in acute respiratory
    infections.
  reference_ids:
  - REF-0981
  - REF-0984
  - REF-0980
  status: verified
