id: rhodiola-rosea
scientific_name: Rhodiola rosea
common_names:
- Rhodiola Rosea
- Rhodiola
- golden root
- roseroot
- Arctic root
family: Crassulaceae
external_ids:
  gbif: 2985688
  wikidata: Q161665
parts_used:
- Rhizome
- Root
botanical_description:
  text: Succulent perennial herb (Crassulaceae), 15-40 cm tall, with a thick, fleshy, branching rhizome
    that has a rose-like fragrance when cut - the origin of the name 'rosea'. Leaves are fleshy, greyish-green,
    oval to oblong. Small yellow (occasionally reddish) flowers are clustered in dense terminal heads;
    the species is dioecious, with separate male and female plants. Fruit follicles turn red as they ripen.
  height: 15-40 cm
  habit: Succulent perennial herb, dioecious
  leaves: Fleshy, greyish-green, oval to oblong
  flowers: Small, yellow (occasionally reddish), in dense terminal clusters
  stem: Erect, succulent
  root: Thick, fleshy, branching rhizome, rose-scented when cut
  fruit: Follicles, turning red as they ripen
  flowering_period: June-July
  reference_ids:
  - REF-1528
  status: verified
habitat:
  text: Native to arctic and mountainous regions of Europe, Asia and North America (circumpolar), growing
    in cold, rocky, high-altitude or high-latitude terrain - cliffs, rocky slopes and tundra - tolerating
    harsh, exposed conditions.
  reference_ids:
  - REF-1528
  status: verified
harvesting:
  text: Rhizome and root are dug from plants at least a few years old (traditionally 4-5 years), typically
    in autumn, then cleaned and dried. Wild populations grow slowly, so cultivated sources are increasingly
    preferred for sustainability.
  parts:
  - Rhizome
  - Root
  season: Autumn, from plants at least 4-5 years old
  reference_ids:
  - REF-1528
  status: verified
traditional_uses:
  text: Rhodiola has a long tradition of use across Scandinavian, Russian and Central Asian folk medicine
    as a tonic for cold-climate hardiness, physical endurance and mental stamina. It is classified as
    a modern 'adaptogen', and clinical trials support benefits for stress-related fatigue, mood and cognitive
    performance.
  reference_ids:
  - REF-1528
  - REF-1526
  status: verified
preparations:
- name: Standardised root extract (capsule)
  text: Standardised to rosavins and salidroside (commonly the SHR-5 extract), the form used in most clinical
    trials.
  reference_ids:
  - REF-1532
  - REF-1533
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried root.
  status: draft
- name: Decoction/tea
  text: Traditional preparation, less concentrated than standardised extracts.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials have most often used 340-680 mg/day of standardised root extract (e.g. SHR-5,
    standardised to rosavins/salidroside), typically taken in the morning to avoid overstimulation. Educational
    reference only, not a prescription.
  reference_ids:
  - REF-1532
  - REF-1533
  status: verified
constituents:
- name: Rosavins (rosavin, rosarin, rosin)
  note: Characteristic phenylpropanoid glycosides largely unique to Rhodiola rosea, used as a standardisation
    marker for commercial extracts.
  reference_ids:
  - REF-1528
- name: Salidroside and tyrosol
  note: Phenylethanoid glycosides considered key adaptogenic and antioxidant constituents.
  reference_ids:
  - REF-1528
- name: Phenylpropanoids and flavonoids
  compounds:
