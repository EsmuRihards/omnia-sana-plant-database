  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- partner_id: schisandra-chinensis
  type: synergy
  note: Rhodiola and schisandra are adaptogens co-formulated in clinically studied combinations for stress,
