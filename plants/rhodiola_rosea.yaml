drug_class_interactions:
- drug_class: antidepressants-serotonergic
  severity: caution
  mechanism: Rhodiola inhibits monoamine oxidase (MAO-A/B) and raises serotonin and dopamine activity;
    a case report described serotonergic-syndrome-type symptoms (restlessness, trembling) when rhodiola
    was added to the antidepressant paroxetine. Combined with antidepressants it may add to serotonergic
    effects.
  reference_ids:
  - REF-2483
  - REF-2482
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: eleutherococcus-senticosus
  type: synergy
  note: Rhodiola and eleuthero (Siberian ginseng) are classic adaptogens combined in traditional and studied
    fixed formulas to build resistance to stress and fatigue; used together their stress-protective effects
    are complementary.
  reference_ids:
  - REF-2470
