contraindications:
- note: Generally well tolerated. May cause agitation, insomnia, or vivid dreams in sensitive individuals
    — take in the morning. Avoid in manic episodes or severe anxiety. Theoretical interactions with MAOIs,
    SSRIs, and CNS stimulants. Avoid during pregnancy and breastfeeding.
  severity: caution
  reference_ids:
  - REF-0055
  - REF-0132
  - REF-0191
  status: verified
- note: Duke (2002) does not include a dedicated entry for Rhodiola rosea in the Handbook of Medicinal
    Herbs, Second Edition.
  severity: info
