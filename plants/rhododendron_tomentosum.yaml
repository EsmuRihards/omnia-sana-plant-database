botanical_description:
  text: Low evergreen shrub (Ericaceae), 30-100 cm tall. Leaves are narrow, leathery, with in-rolled margins
    and a dense, rust-coloured, woolly felt on the underside, strongly aromatic when crushed. Small white
    flowers are borne in terminal clusters.
  height: 30-100 cm
