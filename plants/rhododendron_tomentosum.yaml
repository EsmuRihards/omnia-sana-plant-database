  - REF-0053
  status: verified
harvesting:
  text: Leaves and young stems are gathered, traditionally in late summer, and dried. Only small amounts
    are used given the plant's ledol/grayanotoxin content, and correct identification against toxic bog
    look-alikes (bog rosemary) is essential.
  parts:
  - Leaf
  - Stem
  season: Traditionally late summer
  reference_ids:
  - REF-0884
  status: verified
traditional_uses:
  text: Labrador tea has a long Indigenous North American and Scandinavian folk-medicine tradition as
    a mild diuretic and respiratory remedy, and as an aromatic tea and spice, always used in small, cautious
    amounts given its narcotic/toxic potential at higher doses. Modern phytochemical work confirms anti-inflammatory
    and antioxidant activity of its essential oil.
  reference_ids:
  - REF-0053
  status: verified
