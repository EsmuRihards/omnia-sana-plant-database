contraindications:
- note: Labrador tea contains ledol, a toxic sesquiterpene alcohol, particularly concentrated in fresh
    leaves. Excessive consumption can cause dizziness, headache, nausea, and even toxicity (especially
    in the related Ledum palustre). Use only in small, controlled amounts. Not recommended during pregnancy
    or breastfeeding. Identify plant correctly — confusion with other bog plants can be dangerous.
  severity: caution
  reference_ids:
  - REF-0053
  - REF-0098
  - REF-0237
  status: verified
- note: Duke (2002) rates Labrador tea as + (caution warranted) and notes primarily folkloric activities,
    with the plant acting as a diuretic, expectorant, and vulnerary. Importantly, Duke classifies it as
    having narcotic and deliriant potential — large doses can cause intoxication, hallucinations, and
    toxicity. It contains ericolin and ledol, which are potentially neurotoxic compounds. Duke emphasizes
    that Labrador tea should be used only with caution and at low doses, and notes that it is not appropriate
    for regular internal use given its toxicity profile at higher amounts (Duke, 2002).
  severity: caution
  reference_ids:
  - REF-0053
  - REF-0098
  - REF-0237
  status: verified
