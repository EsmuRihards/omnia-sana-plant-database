  leaves: Narrow, leathery, in-rolled margins, rust-coloured woolly felt beneath, aromatic
  flowers: Small, white, in terminal clusters
  stem: Low, woody, evergreen
  root: Fibrous, shallow root system adapted to boggy ground
  fruit: Small dry capsule
  flowering_period: May-July
