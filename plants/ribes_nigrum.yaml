contraindications:
- note: 'Fruit (berries) • Generally safe as food for most people; adverse effects mainly GI discomfort
    or allergy in sensitive individuals. • If using high-dose extracts, use extra caution with blood-thinners/anticoagulants
    (evidence is not definitive, but polyphenol-rich supplements are often treated cautiously in practice).
    Leaf (folium) • EMA classifies blackcurrant leaf as a traditional herbal medicinal product (not “well-established
    use”): minor joint pain and urinary-tract flushing. • Typical label cautions (EMA-style): not recommended
    <18, avoid if you have edema due to impaired heart/kidney function, and seek medical advice if urinary
    symptoms persist/worsen. • Pregnancy/lactation: food use is fine, but medicinal leaf dosing is generally
    used cautiously due to limited robust safety data. Seed (seed oil) • Usually well tolerated, but may
    cause GI upset in some people. • Caution with anticoagulants/antiplatelet drugs (PUFA supplements
    are often used cautiously here). • Note: some trials explored maternal/infant contexts, but that does
    not automatically mean “recommended in pregnancy” outside medical supervision.'
  severity: caution
  reference_ids:
