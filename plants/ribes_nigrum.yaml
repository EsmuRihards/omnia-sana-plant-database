botanical_description:
  text: Deciduous shrub (Grossulariaceae), 1-2 m tall, aromatic when the leaves are crushed. Leaves are
    palmately lobed (3-5 lobes), toothed, with resinous glands on the underside. Small, greenish-white
    to dull purple, bell-shaped flowers are borne in drooping racemes, followed by clusters of glossy
    black berries.
  height: 1-2 m
  habit: Deciduous shrub
  leaves: Palmately lobed (3-5 lobes), toothed, resin-glanded beneath, aromatic
  flowers: Small, greenish-white to dull purple, bell-shaped, in drooping racemes
  stem: Woody, multi-stemmed
  root: Fibrous woody root system
  fruit: Clusters of glossy black berries
  flowering_period: April-May
  status: draft
habitat:
  text: Native to central and northern Europe and Siberia, growing in damp woodland, fens, riverbanks
    and hedgerows; widely cultivated commercially as a fruit crop in cool-temperate climates.
  status: draft
harvesting:
  text: Berries are hand- or machine-harvested in mid- to late summer once fully ripe and black. Leaves
    are gathered in late spring to early summer, before flowering fades, for the medicinal leaf preparation.
    Seed oil is cold-pressed from the seeds after juicing.
  parts:
  - Fruit
  - Leaf
  - Seed
  season: Berries mid-late summer; leaf late spring-early summer
  status: draft
traditional_uses:
  text: 'Blackcurrant has a long northern-European food-medicine tradition: the vitamin-C- and anthocyanin-rich
    berries have traditionally been used for colds, flu and general vitality, while the leaf has an official
    EU traditional-use registration for minor joint pain and as a urinary-tract flush, and the seed oil
    is valued as a source of gamma-linolenic acid (GLA). Modern research confirms broad antioxidant, anti-inflammatory,
    immunomodulatory and vasoprotective activity across the fruit, leaf and seed oil.'
  reference_ids:
  - REF-0097
  - REF-0238
  - REF-0302
  status: verified
preparations:
- name: Fresh or dried berries
  text: Eaten fresh or dried, or made into juice, jam or syrup.
  status: draft
- name: Leaf infusion (tea)
  text: Dried leaf steeped in hot water - the traditional joint-comfort/urinary-flush preparation.
  reference_ids:
