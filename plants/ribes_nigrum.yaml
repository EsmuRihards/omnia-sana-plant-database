  status: verified
dosage:
- name: Leaf infusion
  text: EMA-style traditional-use guidance for the leaf suggests roughly 2-4 g dried leaf per cup as an
    infusion, up to three times daily, for short-term joint or urinary support (not recommended under
    18, or with fluid retention linked to heart/kidney disease). Berries and juice are food-safe at normal
    dietary amounts. Educational reference only, not a prescription.
  reference_ids:
