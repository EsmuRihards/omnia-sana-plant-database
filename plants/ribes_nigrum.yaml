- note: Duke (2002) rates blackcurrant fruit highly (+++), with evidence for anti-inflammatory, angioprotective,
    and antioxidant activities. Ribes nigrum extracts showed the richest anthocyanin and polyphenol content
    in antioxidant studies, outperforming many other common berries. Clinical use is supported for diarrhea,
    colds, and flu. The high vitamin C and anthocyanin content underpin its vasoprotective effects. The
    fruit is treated as food-grade medicine and is classified as generally safe (Duke, 2002).
  reference_ids:
