  - REF-0238
  - REF-0302
  status: verified
- name: Seed oil (capsule)
  text: Cold-pressed, GLA-rich oil, taken as a supplement.
  status: draft
- name: Standardised fruit extract
  text: Concentrated anthocyanin extract used in some clinical research.
  reference_ids:
