internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx). reference_ids are
  plant-level: the book lists parts and actions as flat, unmapped lists, so the full set of references cited
  for this plant is attached to each action rather than split per action. constituents not yet extracted —
  manual enrichment pending. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split
  out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific publications: added 10
  PubMed-verified @article sources (REF-0989, REF-0990, REF-0991, REF-0992, REF-0993, REF-0994, REF-0995,
  REF-0996, REF-0997, REF-0998) — woven into relevant actions/indications and the plant-level references
  bucket. | 2026-07-11: added
  botanical_description/habitat/harvesting/traditional_uses/preparations/dosage/constituents monograph-base
  fields, sourced from the existing OA pharmacology review (REF-0990), the OA meta-analysis (REF-0989) and
  the bioactive-compounds/antioxidant study (REF-0993, REF-0992). | 2026-07-13: added anticancer action
  (where absent) + cancer indication (anticancer/antitumour research) sourced from the plant''s cited
  literature, as part of the cancer-condition campaign. | 2026-07-18 (EMA-citation audit):
  CITATION-INTEGRITY FLAG. REF-0076 is recorded as ''European Union herbal monograph on Rosa canina L.,
  fructus'' (EMA, 2012), but no such monograph exists. The official EMA herbal medicines register
  (medicines-output-herbal_medicines-report, 251 rows, retrieved 2026-07-18) contains only Rosae flos - Rosa
  centifolia / gallica / damascena, i.e. different species AND a different plant part - and HMPC has not
  processed Rosa canina fructus; all candidate monograph PDF URLs 404. This is the third phantom EMA
  citation found (see also REF-0072 on hyssopus_officinalis and REF-0522 on verbena_officinalis). REF-0076
  is used 8 times on this plant and does NOT source the dosage entry. TODO: audit those 8 uses and remove
  the bibliography entry. Dosage remains unsourced pending a real source (ESCOP has a rosehip monograph -
  candidate for a future batch). | 2026-07-18 (phantom-citation cleanup): REF-0076 CLEANUP. All 8 REF-0076
  citations removed (confirmed phantom - no EMA monograph for Rosa canina exists; the register holds only
  Rosae flos, i.e. R. centifolia/gallica/damascena, a different species and a different plant part, and HMPC
  has never processed Rosa canina fructus). Every use was CO-CITED with REF-0051 (Chrubasik 2008, a
  systematic review of Rosa canina efficacy) and REF-0239, plus plant-specific papers, so this was a clean
  drop - no claim lost a source and no substitute was needed. REF-0076 now has 0 citations across the
  database. CORRECTION TO MY OWN EARLIER NOTE: the batch-4 entry above states ''Dosage remains unsourced
  pending a real source''. That was WRONG - the dosage entry (''Rosehip powder'', ~5 g/day for
  osteoarthritis) was and is sourced to REF-0989, Christensen et al. 2008, a meta-analysis of randomised
  controlled trials in Osteoarthritis and Cartilage which reports the administered dose. No dosage work was
  needed on this plant. | 2026-07-19 (batch 1, PubMed): +10 verified references REF-3105..REF-3114. New
  indications: uti (REF-3105, one n=400 RCT, prevention after caesarean - NOT treatment of established UTI)
  and cognitive-function (REF-3111, diabetic-rat model only, marked needs-review - no human data). Arthritis
  strengthened with the two primary crossover RCTs (REF-3106 Winther 2005, REF-3107 Rein 2004) that sit
  underneath the existing meta-analysis. anti-inflammatory gained in-vitro COX-1/COX-2/5-LOX evidence
  (REF-3110); antioxidant gained REF-3110/3112/3113; constituents gained quantified carotenoid (REF-3112),
  leaf-vs-hip phenolics (REF-3113) and a new seed-oil entry (REF-3114). REF-3108 (skin wrinkles/elasticity
  RCT) and REF-3109 (ADHD adjunct RCT) went to the plant-level references bucket only: the conditions
  vocabulary has no entry for skin ageing or ADHD, and bending them into skin-irritation or
  cognitive-function would misstate what the trials tested. DOCUMENTED REJECTIONS from the same search, do
  not re-add: PMID 36268807 (tinnitus) and PMID 28614869 (gonarthritis) are multi-herb combination products
  (Neurotec, MA212/Rosaxan) whose effect cannot be attributed to R. canina alone; PMID 21533897 (lamb feed),
  36290672 (laying-hen feed), 38684952 (horticultural genotype screening), 12003323 (oil-extraction
  engineering), 35335128 (gamma-irradiation processing) and 37110582 (mayonnaise shelf-life) state no
  medicinal claim. Also confirmed ALREADY PRESENT and not duplicated: Chrubasik 2008 SR = REF-0051,
  Christensen 2008 meta-analysis = REF-0989, plus the Gruenwald 2019 SR and the antiobesity mouse study.'