contraindications:
- note: Rosa canina (dog rose) hips are generally recognized as safe (GRAS) for consumption, widely used
    in teas, jams, and supplements. They are highly nutritious but may cause minor digestive upset (nausea,
    diarrhea) in some users. The small, irritating hairs around the seeds should be removed before consumption.
  severity: info
  reference_ids:
  - REF-0051
  - REF-0076
  - REF-0239
  status: verified
- note: Duke (2002) rates dog rose hips as +++ with clinical evidence (score 2) for astringent activity
    and experimental support for antioxidant and diuretic effects. Dog rose hips are exceptionally rich
    in vitamin C and bioflavonoids. They are traditionally used for cold and influenza prevention, urinary
    tract health, and mild diarrhea. Duke notes the diuretic (score 1) and lipoxygenase-inhibitory activities
    as experimentally documented. The fruit is considered food-grade safe (Duke, 2002).
  severity: info
  reference_ids:
