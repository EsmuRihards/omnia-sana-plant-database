id: rosa-canina
scientific_name: Rosa canina
common_names:
- Dog-rose
- Dog rose
- rosehip
- wild rose
family: Rosaceae
external_ids:
  gbif: 3002461
  wikidata: Q146066
parts_used:
- Fruit
- Petals
- Seed
botanical_description:
  text: Scrambling, thorny deciduous shrub (Rosaceae), 1-5 m, with arching, prickly stems bearing hooked
    thorns. Leaves are pinnate with 5-7 oval, toothed leaflets. Pale pink to white, five-petalled flowers
    are followed by bright red-orange, egg-shaped hips (the fleshy hip is an accessory fruit; the true
    fruits are small hairy achenes inside it) that ripen in autumn and often persist into winter.
  height: 1-5 m
  habit: Scrambling, thorny deciduous shrub
  leaves: Pinnate, 5-7 oval, toothed leaflets
  flowers: Pale pink to white, five-petalled
  stem: Arching, prickly, with hooked thorns
  root: Deep, woody root system
  fruit: Bright red-orange, egg-shaped hip (accessory fruit) containing small hairy achenes
  flowering_period: June-July; hips ripen August-October
  reference_ids:
  - REF-0990
  status: verified
habitat:
  text: Native throughout Europe, north-west Africa and western Asia, common in hedgerows, woodland edges,
    scrub and roadside verges on a wide range of soils.
  reference_ids:
  - REF-0990
  status: verified
harvesting:
  text: Hips are picked in autumn once fully coloured, then dried for tea or powder, or processed fresh
    for syrup. The fine, irritant hairs surrounding the seeds inside the hip must be removed before consumption.
  parts:
  - Fruit (hip)
  - Petals
  - Seed
  season: Autumn
  reference_ids:
  - REF-0993
  status: verified
traditional_uses:
  text: Rosehip has a long European folk tradition as a vitamin-C-rich tonic for colds and general immunity,
    and as a mild diuretic and astringent for urinary and digestive complaints. Modern clinical trials
    on standardised rosehip powder show a modest, reproducible benefit for osteoarthritis pain and stiffness.
  reference_ids:
  - REF-0990
  - REF-0989
  status: verified
preparations:
- name: Rosehip powder (standardised, seedless)
  text: The form used in osteoarthritis clinical trials.
  reference_ids:
  - REF-0989
  status: verified
- name: Infusion/tea
  text: Dried, deseeded hip steeped in hot water - a traditional vitamin C tonic.
  status: draft
- name: Syrup
  text: Traditional preparation, historically used as a vitamin C supplement, particularly for children.
  status: draft
- name: Petals
  text: Occasionally used for their fragrance in traditional preparations.
  status: draft
dosage:
- name: Rosehip powder
  text: Clinical trials for osteoarthritis have most often used around 5 g/day of standardised rosehip
    powder. Educational reference only, not a prescription.
  reference_ids:
  - REF-0989
  status: verified
constituents:
- name: Vitamin C and carotenoids
  compounds:
  - carotenoid
  note: The hip is exceptionally rich in vitamin C and carotenoids, underpinning its traditional tonic
    use. Quantified in commercial dried fruit at beta-carotene 7.25 mg/100 g and lycopene 2.34 mg/100 g
    fresh weight.
  reference_ids:
  - REF-0993
  - REF-3112
- name: Galactolipid (GOPO)
  note: A specific galactolipid fraction studied as the likely active anti-inflammatory constituent in
    osteoarthritis trials of standardised rosehip powder.
  reference_ids:
  - REF-0990
- name: Flavonoids and tannins
  compounds:
  - flavonoid
  - tannin
  note: Contribute to antioxidant activity. Leaves carry a higher total phenolic, flavonoid and phenolic-acid
    content than the hips, and leaf infusions were the only preparation to show antibacterial activity in
    vitro.
  reference_ids:
  - REF-0992
  - REF-3113
- name: Seed oil (unsaturated fatty acids, tocopherols, phytosterols)
  compounds:
  - phytosterol
  note: Cold-pressed rose hip seed oil is high in linolenic acid, with phytosterols up to 6485 mg/kg,
    tocopherols up to 1125 mg/kg and carotenoids up to 108 mg/kg; p-coumaric acid methyl ester predominates
    among its phenolics.
  reference_ids:
  - REF-3114
actions:
- action: anti-inflammatory
  note: In vitro, the lipophilic (n-hexane and dichloromethane) rose hip extracts inhibited COX-1, COX-2
    and 5-LOX-mediated leukotriene B4 formation; the aqueous and methanol extracts were inactive.
  reference_ids:
  - REF-0051
  - REF-0239
  - REF-0989
  - REF-0990
  - REF-3110
  status: verified
- action: anticancer
  reference_ids:
  - REF-0992
  status: needs-review
- action: antioxidant
  reference_ids:
