indications:
- condition: arthritis
  note: Two placebo-controlled crossover RCTs of standardised rosehip powder (5 g/day) report reduced
    WOMAC pain and reduced rescue-medication use in knee/hip osteoarthritis, consistent with the existing
    meta-analysis.
  reference_ids:
  - REF-0051
  - REF-0239
  - REF-0989
  - REF-0990
  - REF-3106
  - REF-3107
  status: verified
- condition: cancer
  note: inferred from anticancer action
  reference_ids:
  - REF-0992
  status: needs-review
- condition: cognitive-function
  note: Animal evidence only. In high-fat-diet/streptozotocin diabetic rats, R. canina ethanol extract
    (250 mg/kg) improved recall and long-term memory and reduced hippocampal insulin resistance, amyloid-beta
    and acetylcholinesterase activity. No human data; the effect is reported in a diabetes model, not in
    healthy or cognitively impaired people.
  reference_ids:
  - REF-3111
  status: needs-review
- condition: inflammation
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0051
  - REF-0239
  - REF-0990
  status: needs-review
- condition: metabolic-support
  reference_ids:
  - REF-0051
  - REF-0239
  - REF-0991
  - REF-0994
  - REF-3111
  status: verified
- condition: skin-irritation
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0051
  - REF-0239
  - REF-0996
  status: needs-review
- condition: uti
  note: One triple-blind placebo-controlled RCT (n=400) found that 500 mg R. canina fruit capsules twice
    daily for 20 days after caesarean section reduced the incidence of urinary tract infection. The
    incidence of cystitis specifically did not differ significantly between groups. Prevention in a
    post-surgical population; not evidence for treating an established UTI.
  reference_ids:
  - REF-3105
  status: verified
contraindications:
- note: Rosa canina (dog rose) hips are generally recognized as safe (GRAS) for consumption, widely used
    in teas, jams, and supplements. They are highly nutritious but may cause minor digestive upset (nausea,
    diarrhea) in some users. The small, irritating hairs around the seeds should be removed before consumption.
  severity: info
  reference_ids:
  - REF-0051
  - REF-0239
  status: verified
- note: Duke (2002) rates dog rose hips as +++ with clinical evidence (score 2) for astringent activity
    and experimental support for antioxidant and diuretic effects. Dog rose hips are exceptionally rich
    in vitamin C and bioflavonoids. They are traditionally used for cold and influenza prevention, urinary
    tract health, and mild diarrhea. Duke notes the diuretic (score 1) and lipoxygenase-inhibitory activities
    as experimentally documented. The fruit is considered food-grade safe (Duke, 2002).
  severity: info
  reference_ids:
  - REF-0051
  - REF-0239
  - REF-0063
  status: verified
