id: rubus-fruticosus
scientific_name: Rubus fruticosus
common_names:
- Blackberry Leaf
- Bramble
- European blackberry
family: Rosaceae
parts_used:
- Leaf
constituents:
- name: Tannins (gallotannins and ellagitannins)
  compounds:
  - tannin
  note: The astringent principles of the leaf.
  reference_ids:
  - REF-0417
  - REF-0418
- name: Flavonoids and phenolic acids (including gallic acid)
  compounds:
  - phenolic-acid
  - gallic-acid
  - flavonoid
  note: Antioxidant and antibacterial constituents.
