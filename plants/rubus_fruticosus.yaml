botanical_description:
  text: Scrambling, thorny deciduous shrub (Rosaceae) forming dense thickets, with arching prickly stems
    that root at the tip. Leaves are palmately compound, usually with 3-5 toothed leaflets. White to pale
    pink, five-petalled flowers are followed by clusters of small drupelets forming the blackberry fruit,
    ripening from red to glossy black.
  height: Scrambling/arching canes, typically 1-3 m
  habit: Scrambling, thorny, thicket-forming shrub
  leaves: Palmately compound, usually 3-5 toothed leaflets
  flowers: White to pale pink, five-petalled
  stem: Arching, prickly, rooting at the tip
  root: Woody perennial root system
  fruit: Cluster of drupelets, ripening red to glossy black
  flowering_period: June-August
  reference_ids:
  - REF-0417
  status: verified
habitat:
  text: Native throughout Europe and widely naturalised elsewhere, an aggressive coloniser of hedgerows,
    woodland edges, scrub and waste ground. 'Rubus fruticosus' is a taxonomically complex aggregate comprising
    hundreds of closely related microspecies.
  reference_ids:
  - REF-0417
  status: verified
harvesting:
  text: Leaves are picked fresh throughout the growing season and dried for tea; berries are picked in
    late summer once fully ripe.
  parts:
  - Leaf
  season: Leaf throughout the growing season
  reference_ids:
  - REF-0417
  status: verified
traditional_uses:
  text: Blackberry leaf has a long European folk-medicine tradition as an astringent gargle for sore throat
    and mouth ulcers, and as a remedy for mild diarrhoea, reflecting its high tannin content; the berries
    themselves are valued as a nutritious, antioxidant-rich food.
  reference_ids:
  - REF-0417
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried leaf steeped in hot water, taken internally or used as a gargle/mouthwash.
  reference_ids:
  - REF-0417
  status: verified
- name: Gargle/mouthwash
  text: A stronger leaf infusion used topically for sore throat and mouth irritation.
  reference_ids:
  - REF-0417
  status: verified
- name: Fresh or dried berries
  text: Eaten as food, a rich source of antioxidants.
  status: draft
dosage:
- name: Infusion (tea)
  text: Traditional guidance suggests roughly 2-4 g dried leaf per cup as an infusion, up to three times
    daily, or used as a gargle at similar strength. Educational reference only, not a prescription.
  reference_ids:
  - REF-0417
  status: verified
