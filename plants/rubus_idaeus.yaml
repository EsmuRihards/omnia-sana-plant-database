botanical_description:
  text: Deciduous, thicket-forming shrub (Rosaceae), 1-2 m tall, with upright, prickly, biennial canes
    (vegetative in the first year, fruiting in the second). Leaves are pinnate with 3-7 toothed leaflets,
    whitish-felted beneath. Small white, five-petalled flowers are followed by the aggregate red raspberry
    fruit, a cluster of drupelets.
  height: 1-2 m
  habit: Deciduous, thicket-forming shrub with biennial canes
  leaves: Pinnate, 3-7 toothed leaflets, whitish-felted beneath
  flowers: Small, white, five-petalled
  stem: Upright, prickly canes
  root: Spreading suckering root system
  fruit: Aggregate red raspberry (cluster of drupelets)
  flowering_period: May-June
  reference_ids:
  - REF-1536
  status: verified
habitat:
  text: Native to Europe and northern Asia, widely cultivated as a fruit crop and naturalised on woodland
    edges, hedgerows and disturbed ground in temperate regions.
  reference_ids:
  - REF-1536
  status: verified
harvesting:
  text: Leaves are picked fresh during the growing season - before or during flowering is considered optimal
    - and dried; fruit is picked when fully ripe in summer.
  parts:
  - Leaf
  season: Leaf before/during flowering; fruit in summer
  reference_ids:
  - REF-1536
  status: verified
traditional_uses:
  text: Raspberry leaf has a long, very widely known folk tradition as a 'pregnancy tea', taken in the
    final weeks of pregnancy as a uterine tonic to prepare for labour. Observational studies and a small
    randomised controlled trial suggest a possible modest effect on labour duration, though robust proof
    is still lacking.
  reference_ids:
  - REF-0497
  - REF-0498
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried leaf steeped in hot water - the classic late-pregnancy preparation.
  reference_ids:
  - REF-0497
  status: verified
- name: Tincture
  text: Alcoholic extract, less commonly used than the tea.
  status: draft
- name: Standardised leaf extract
  text: Used in some observational and clinical research.
  reference_ids:
  - REF-1536
  status: verified
dosage:
- name: Infusion (tea)
  text: Popular guidance and observational studies generally describe starting raspberry-leaf tea or tablets
    in the last few weeks of pregnancy, at roughly 1-3 cups of tea daily; use should be discussed with
    a midwife or doctor given the lack of robust trial evidence. Educational reference only, not a prescription.
  reference_ids:
  - REF-0497
  - REF-0498
  status: verified
actions:
- action: antidiarrheal
  note: Astringent for mild diarrhoea (tannins)
  reference_ids:
  - REF-0497
  status: needs-review
- action: astringent
  note: Astringent for menstrual cramps (traditional); Astringent for mild diarrhoea (tannins)
  reference_ids:
  - REF-0497
  status: needs-review
- action: emmenagogue
  note: Traditional uterine tonic taken in late pregnancy to tone the uterus and support labour - one
    small double-blind RCT found a shorter second stage of labour and fewer forceps deliveries (no effect
    on the first stage), alongside observational signals; robust proof is still lacking
  reference_ids:
  - REF-0497
  - REF-0498
  - REF-0607
  - REF-1541
  status: needs-review
