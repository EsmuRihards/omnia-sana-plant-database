internal_notes: 'Enriched 2026-06-12 from scientific literature (BMC Complementary Medicine and Therapies
  observational study; ANZJOG survey). Evidence is weak/observational, reflected in needs-review action
  statuses. Note: distinct from the book''s Rubus fruticosus (blackberry leaf). Originally a skeleton
  imported from the omniasana.bio Symptom-to-Plant Lookup tool (menstrual-cramps, pregnancy-support, diarrhea);
  associations retained and now part-mapped and cited. Further enriched 2026-06-14 with the PubMed-sourced
  double-blind RCT by Simpson et al. (REF-0607; n=192, shorter second stage of labour and fewer forceps
  deliveries, no effect on first stage, no adverse effects) - the action remains needs-review given the
  single small trial. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split out,
  constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific publications: added 9 PubMed-verified
  @article sources (REF-0497, REF-1536, REF-1537, REF-1538, REF-1539, REF-1540, REF-1541, REF-1542, REF-1543)
  — woven into relevant actions/indications and the plant-level references bucket. | 2026-07-11: added
  botanical_description/habitat/harvesting/traditional_uses/preparations/dosage monograph-base fields,
  sourced from the existing pregnancy observational study (REF-0497), pregnancy survey (REF-0498) and
  phenolic-composition study (REF-1536).'
