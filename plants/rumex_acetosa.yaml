botanical_description:
  text: Perennial herb (Polygonaceae), 30-100 cm tall, with erect, often reddish, ridged flowering stems.
    Basal leaves are arrow- (hastate-) shaped with backward-pointing basal lobes, and sour-tasting from
    oxalic acid content. Tiny reddish-brown flowers are borne in narrow, branched spikes; the species
    is dioecious, with separate male and female plants.
  height: 30-100 cm
  habit: Erect perennial herb, dioecious
  leaves: Arrow- (hastate-) shaped with backward-pointing basal lobes, sour-tasting
  flowers: Tiny, reddish-brown, in narrow branched spikes
  stem: Erect, often reddish, ridged
  root: Fibrous perennial rootstock
  fruit: Small three-angled achenes
  flowering_period: May-June, fruiting through summer
  reference_ids:
  - REF-0048
  status: verified
habitat:
  text: Native throughout Europe and temperate Asia, common in meadows, grassland, pastures and roadside
    verges on a wide range of soils, tolerating both damp and dry ground.
  reference_ids:
  - REF-0048
  status: verified
harvesting:
  text: Leaves are gathered fresh in spring and early summer, before flowering, when they are most tender
    and least bitter. Avoid harvesting near roads or industrial areas, given the plant's tendency to accumulate
    heavy metals.
  parts:
  - Leaf
  - Stem
  season: Spring to early summer, before flowering
  reference_ids:
  - REF-0048
  status: verified
traditional_uses:
  text: Common sorrel has a long European culinary-medicinal tradition as a refreshing, vitamin-C-rich
    spring green and digestive bitter, and folk-medicinally as a diuretic and mild antiscorbutic (anti-scurvy)
    remedy. Modern research confirms antioxidant, anti-inflammatory and antimicrobial activity of its
    leaf extracts.
  reference_ids:
  - REF-0048
  status: verified
preparations:
- name: Fresh leaf (culinary)
  text: Eaten raw in salads or cooked into soups - the traditional spring tonic use.
  reference_ids:
  - REF-0048
  status: verified
- name: Infusion (tea)
  text: Dried leaf steeped in hot water, a traditional digestive/diuretic preparation.
  reference_ids:
  - REF-0048
  status: verified
- name: Juice
  text: Fresh leaf juice, traditionally used in small amounts.
  status: draft
dosage:
- name: Fresh leaf / infusion
  text: Sorrel is best treated as an occasional food rather than a daily medicinal herb, given its oxalate
    content; traditional infusions use roughly 2-4 g dried leaf per cup, taken occasionally rather than
    regularly. Educational reference only, not a prescription; avoid large or frequent amounts if prone
    to kidney stones or gout.
  reference_ids:
  - REF-0048
  status: verified
