dangerous_lookalikes:
- dangerous_plant: arum-maculatum
  severity: dangerous
  confused_part: Young arrow-shaped spring leaves gathered as a tangy salad or pot herb; lords-and-ladies pushes up similar arrow-shaped leaves in the same season.
  confusion_context: 'Common sorrel (Rumex acetosa) is foraged in spring for its lemony arrow-shaped leaves. Lords-and-ladies (Arum maculatum, cuckoo-pint) unfurls similar arrow- to heart-shaped leaves at the same time and, as the Foraging Course Company notes, can be confused with common sorrel. Arum is one of the commonest causes of plant-poisoning hospital visits: every part contains sharp calcium oxalate crystals that cause intense burning and swelling of the mouth and throat, and severe cases can cause life-threatening throat swelling. Because young sorrel and young Arum both appear as arrow-shaped leaves in spring, this is a genuine hazard.'
  distinguishing_features:
  - 'Flower (decisive when present): lords-and-ladies has an unmistakable hooded flower - a pale green-and-purple cowl (spathe) wrapped around a finger-like spadix. Sorrel has tall slender stems of tiny reddish-brown flowers. A hooded cowl means Arum, never sorrel.'
  - 'Leaf lobes and veins: sorrel leaves have sharply pointed basal lobes that angle backwards and simple veins; Arum leaves are broader and glossy with rounded basal lobes, a netted (reticulate) vein pattern, and are often marked with dark purple-black blotches.'
  - 'Taste (sorrel only - never taste a suspected Arum): true sorrel is soft and pleasantly lemony-sour, whereas Arum is acrid and instantly burns the lips. If any burning or tingling starts, spit it out at once. Do not taste-test unless the flower or leaves have already confirmed sorrel.'
  key_test: Look for the flower and leaf detail. A hooded green-purple cowl (spathe), glossy dark leaves with rounded lobes, netted veins and dark blotches = lords-and-ladies (Arum) - do not eat; it burns the mouth and throat. Slim reddish flower spikes with matt leaves, sharp backward-pointing lobes and a pleasant lemony taste = sorrel. If in any doubt, do not eat it.
  reference_ids:
