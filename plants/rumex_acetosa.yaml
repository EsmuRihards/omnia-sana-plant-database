contraindications:
- note: 'High in oxalates (the sour taste): Large, frequent amounts can be a bad idea if you’re prone
    to kidney or bladder stones, or certain “rheumatic-type” complaints (Royal Botanic Gardens, Kew, n.d.).
    Moderation matters: Measured oxalate levels in leaves can be high, and researchers recommend treating
    sorrel more like an occasional delicacy than a daily staple (Tuazon-Nartea & Savage, 2013). Mineral
    binding: Oxalic acid can reduce how much calcium you absorb from a meal (Tuazon-Nartea & Savage, 2013).
    Sensitive stomach/mouth: Very sour leaves can irritate some people (common-sense caution; strongest
    source is the oxalate discussion above). Pregnancy/lactation: As a normal food herb in culinary amounts
    is generally considered fine, but avoid high-dose “medicinal” use because safety data are limited
    (Bello et al., 2019). Foraging safety (important): Sorrel can accumulate heavy metals depending on
    where it grows; avoid harvesting near roads/industrial areas (Gawęda, 2009).'
  severity: caution
  reference_ids:
  - REF-0048
  - REF-0098
