  status: verified
- note: Duke (2002) rates sorrel as ++ and notes diuretic, antiscorbutic (high vitamin C), and depurative
    activities at experimental and folkloric levels. The plant is traditionally used for anemia, fever,
    and scurvy prevention. High oxalic acid content is an important consideration — excessive consumption
    can promote kidney stone formation (oxalate stones) and may be harmful in individuals with gout or
    existing kidney disease. Duke advises limiting medicinal use and avoiding in those with a history
    of calcium oxalate kidney stones (Duke, 2002).
  severity: caution
