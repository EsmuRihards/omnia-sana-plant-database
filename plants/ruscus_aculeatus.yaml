botanical_description:
  text: Evergreen, rhizomatous subshrub (Asparagaceae), 30-80 cm tall. Unusually, its apparent 'leaves'
    are flattened, leaf-like stems (cladodes) - stiff, dark green, ending in a sharp spine; the true leaves
    are reduced to tiny scales. Small greenish-white flowers arise from the centre of the cladode, followed
    on female plants by a bright red berry.
  height: 30-80 cm
  habit: Evergreen, rhizomatous subshrub
  leaves: True leaves reduced to tiny scales; photosynthesis occurs via leaf-like cladodes
  flowers: Small, greenish-white, borne from the centre of the cladode
  stem: Stiff, upright, with flattened spine-tipped cladodes
  root: Underground rhizome - the medicinal part
  fruit: Bright red berry (on female plants)
  flowering_period: Winter to early spring (January-April)
  reference_ids:
  - REF-0424
  status: verified
habitat:
  text: Native to the Mediterranean region and western Europe, growing in dry woodland, scrub and rocky
    ground, often in shade under trees.
  reference_ids:
  - REF-0424
  status: verified
harvesting:
  text: The underground rhizome, the medicinal part, is dug in autumn or spring from established plants.
  parts:
  - Rhizome (underground parts)
  season: Autumn or spring
  reference_ids:
  - REF-0424
  status: verified
traditional_uses:
  text: Butcher's broom takes its name from the traditional use of its stiff, bristly stems bundled together
    as a broom by butchers. Medicinally its rhizome has a long European tradition, and modern use, supported
    by clinical trials, is for chronic venous insufficiency (heavy, tired, swollen legs, varicose veins)
    and haemorrhoids, reflecting its steroidal-saponin-driven venotonic and vasoconstrictive activity.
  reference_ids:
  - REF-0424
  - REF-0425
  status: verified
preparations:
- name: Standardised extract (capsule/tablet)
  text: The clinically studied commercial form, often combined with hesperidin methyl chalcone and vitamin
    C.
  reference_ids:
  - REF-0424
  - REF-0425
  status: verified
- name: Topical cream/gel
  text: Rhizome extract applied to affected areas for haemorrhoid symptoms.
  reference_ids:
  - REF-0425
  status: verified
- name: Decoction
  text: Traditional preparation of the dried rhizome, less commonly used than standardised extracts.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials for venous insufficiency have most often used standardised rhizome extract in
    combination products (e.g. with hesperidin methyl chalcone and vitamin C), typically providing the
    equivalent of roughly 72-150 mg of ruscogenins daily. Educational reference only, not a prescription.
  reference_ids:
  - REF-0424
  - REF-0425
  status: verified
actions:
- action: anti-oedematous
  note: Anti-oedematous (reduces leg swelling)
  reference_ids:
