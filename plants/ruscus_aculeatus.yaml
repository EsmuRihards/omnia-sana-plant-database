id: ruscus-aculeatus
scientific_name: Ruscus aculeatus
common_names:
- Butcher's Broom
- Knee holly
- Box holly
- Sweet broom
family: Asparagaceae
parts_used:
- Rhizome (underground parts)
constituents:
- name: Steroidal saponins (spirostanol and furostanol)
  compounds:
  - saponin
  note: Aglycones ruscogenin and neoruscogenin carry the vasoconstrictive and venotonic activity.
  reference_ids:
  - REF-0424
- name: Phytosterols and flavonoids
  compounds:
  - phytosterol
  - flavonoid
  note: Supporting constituents of the rhizome.
  reference_ids:
  - REF-0424
actions:
- action: anti-oedematous
  note: Anti-oedematous (reduces leg swelling)
  reference_ids:
  - REF-0424
  - REF-0425
  status: verified
- action: venotonic
  note: Venotonic / vasoconstrictive support for chronic venous insufficiency (heavy, tired, swollen legs
    and varicose veins) - a meta-analysis of a Ruscus-based combination (with hesperidin methyl chalcone
    and vitamin C) significantly reduced pain, cramps, heaviness and paraesthesia versus placebo
  reference_ids:
  - REF-0424
  - REF-0425
  - REF-0595
  status: verified
