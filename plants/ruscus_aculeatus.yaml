id: ruscus-aculeatus
scientific_name: Ruscus aculeatus
common_names:
- Butcher's Broom
- Knee holly
- Box holly
- Sweet broom
family: Asparagaceae
external_ids:
  gbif: 2769766
  wikidata: Q161425
parts_used:
- Rhizome (underground parts)
constituents:
- name: Steroidal saponins (spirostanol and furostanol)
