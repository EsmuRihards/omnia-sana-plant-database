id: salix-alba
scientific_name: Salix alba
common_names:
- Willow Bark
- White willow
- European willow
family: Salicaceae
parts_used:
- Bark
constituents:
- name: Salicin and related salicylates
  note: Metabolised in the body to salicylic acid - the 'natural aspirin' that gives the analgesic, anti-inflammatory
    and antipyretic effects.
  reference_ids:
  - REF-0529
  - REF-0530
- name: Polyphenols, flavonoids and tannins
  compounds:
  - phenolic-compound
  - flavonoid
  - tannin
  note: Contribute additionally to the anti-inflammatory and antioxidant activity.
  reference_ids:
  - REF-0530
actions:
- action: analgesic
  note: Analgesic and anti-inflammatory for low back pain (moderate evidence; dose-dependent, around 240
    mg salicin/day) - in an RCT, 240 mg salicin/day left 39% pain-free vs 6% on placebo within 4 weeks
  reference_ids:
  - REF-0529
  - REF-0530
  - REF-0592
  status: verified
- action: anti-inflammatory
  note: Analgesic and anti-inflammatory for low back pain (moderate evidence; dose-dependent, around 240
    mg salicin/day) - in an RCT, 240 mg salicin/day left 39% pain-free vs 6% on placebo within 4 weeks
  reference_ids:
  - REF-0529
  - REF-0530
  - REF-0592
  status: verified
- action: antipyretic
  note: Antipyretic (reduces fever)
  reference_ids:
  - REF-0530
  status: verified
indications:
- condition: arthritis
  evidence: 3
  note: Relief of joint pain, osteoarthritis and rheumatic complaints
  reference_ids:
  - REF-0529
  - REF-0530
  status: verified
- condition: back-pain
  evidence: 4
  note: Analgesic and anti-inflammatory for low back pain (moderate evidence; dose-dependent, around 240
    mg salicin/day) - in an RCT, 240 mg salicin/day left 39% pain-free vs 6% on placebo within 4 weeks
  reference_ids:
  - REF-0529
  - REF-0530
  - REF-0592
  status: verified
- condition: fever
  evidence: 3
  note: Antipyretic (reduces fever)
  reference_ids:
  - REF-0530
  status: verified
- condition: headache
  evidence: 3
  reference_ids:
  - REF-0530
  status: verified
- condition: inflammation
  evidence: 3
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0529
  - REF-0530
  - REF-0592
  status: needs-review
- condition: pain
  evidence: 4
  note: Analgesic and anti-inflammatory for low back pain (moderate evidence; dose-dependent, around 240
    mg salicin/day) - in an RCT, 240 mg salicin/day left 39% pain-free vs 6% on placebo within 4 weeks;
    Relief of joint pain, osteoarthritis and rheumatic complaints
  reference_ids:
  - REF-0529
  - REF-0530
  - REF-0592
  status: verified
- condition: skin-irritation
  evidence: 2
  note: inferred from anti-inflammatory action
  reference_ids:
