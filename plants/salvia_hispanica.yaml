contraindications:
- note: 'Never swallow a spoon of dry chia seeds and “chase” with water. They can swell fast and (rarely)
    cause a blockage, especially if someone already has swallowing problems (American College of Gastroenterology,
    2014) Blood pressure / diabetes meds: if you’re on medication for blood pressure or blood sugar, chia
    as a major daily addition may slightly add to the effect for some people—monitor and talk to your
    clinician (Saadh et al., 2024) (Pam et al., 2024).'
  severity: info
