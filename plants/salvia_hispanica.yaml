id: salvia-hispanica
scientific_name: Salvia hispanica
common_names:
- Chia
- chia seed
- Spanish sage
- Salba
family: Lamiaceae
external_ids:
  gbif: 2926992
  wikidata: Q1071585
parts_used:
- Seed
botanical_description:
  text: Annual herb (Lamiaceae), 1-1.5 m tall, with square stems. Leaves are opposite, ovate to oblong
    with a toothed margin. Small purple to white, two-lipped flowers are borne in dense terminal spikes,
    followed by small oval seeds (grey-brown, mottled, or occasionally white) - the part used.
  height: 1-1.5 m
  habit: Erect annual herb
  leaves: Opposite, ovate to oblong, toothed
  flowers: Small, purple to white, two-lipped, in dense terminal spikes
  stem: Square, erect
  root: Fibrous annual root system
  fruit: Small oval seeds, grey-brown and mottled (or occasionally white)
  flowering_period: Variable, typically late summer in its native range
  reference_ids:
  - REF-1263
  status: verified
habitat:
  text: Native to central and southern Mexico and Guatemala, historically a staple crop of Aztec and Mayan
    agriculture; now cultivated commercially in warm subtropical and tropical regions worldwide (notably
    South America and Australia) as a food crop.
  reference_ids:
  - REF-1263
  status: verified
harvesting:
  text: Seed heads are harvested once dry, typically in autumn, and threshed to release the small seeds.
  parts:
  - Seed
  season: Autumn, once seed heads have dried
  reference_ids:
  - REF-1263
  status: verified
traditional_uses:
  text: Chia seed has an ancient Mesoamerican food-medicine tradition as an energy-sustaining staple food
    for Aztec warriors and runners. Its modern popularity centres on its dense nutrient profile - fibre,
    omega-3 (alpha-linolenic acid) fatty acids, protein and antioxidants - studied for metabolic, cardiovascular
    and digestive support.
  reference_ids:
  - REF-1263
  status: verified
preparations:
- name: Whole or ground seed (culinary)
  text: Eaten whole, ground, or soaked to form a gel (due to the seed's high mucilage content), stirred
    into food or drinks.
  reference_ids:
  - REF-1263
  status: verified
- name: Chia gel/pudding
  text: Seeds soaked in liquid until they swell into a gel - a popular modern preparation.
  status: draft
- name: Chia oil
  text: Cold-pressed oil, a concentrated source of alpha-linolenic acid.
  status: draft
dosage:
- name: Whole/ground seed
  text: Typical dietary and study amounts range from about 15-25 g (roughly 1-2 tablespoons) of seed daily,
    usually soaked or ground for better digestibility. Educational reference only, not a prescription;
    always take with adequate liquid, never dry-swallowed.
  reference_ids:
  - REF-1263
  - REF-1264
  status: verified
constituents:
- name: Alpha-linolenic acid (omega-3 fatty acid)
  note: The dominant fatty acid of chia oil, one of the richest plant sources of omega-3 known.
  reference_ids:
  - REF-1263
- name: Mucilage polysaccharides (seed coat)
  compounds:
  - mucilage
  - polysaccharide
  note: Responsible for the seed's characteristic gel-forming property when soaked.
  reference_ids:
  - REF-1264
- name: Phenolic antioxidants (chlorogenic acid, caffeic acid, quercetin, kaempferol)
  compounds:
  - chlorogenic-acid
  - caffeic-acid
  - quercetin
  - kaempferol
  note: Contribute to the seed's antioxidant activity.
  reference_ids:
  - REF-1263
- name: Protein and dietary fibre
  note: Chia is a complete plant protein source and exceptionally high in dietary fibre.
  reference_ids:
  - REF-1264
