  status: verified
- condition: inflammation
  note: Gargle/rinse for sore throat and inflammation of the mouth and throat
  reference_ids:
  - REF-0501
  status: verified
- condition: memory
  note: Memory and cognitive-function support (enhances cognition in healthy subjects and people with
    dementia)
  reference_ids:
  - REF-0502
  - REF-0503
  - REF-1274
  - REF-1279
  status: verified
- condition: menopause
  reference_ids:
