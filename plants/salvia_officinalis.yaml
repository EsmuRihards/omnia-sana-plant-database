id: salvia-officinalis
scientific_name: Salvia officinalis
common_names:
- Sage
- Common sage
- Garden sage
- True sage
family: Lamiaceae
parts_used:
- Leaf
constituents:
- name: Essential oil (thujone, 1,8-cineole, camphor, borneol)
  compounds:
  - essential-oil
  - camphor
  - cineole
  note: Aromatic constituents; thujone is the safety-limiting compound.
  reference_ids:
  - REF-0501
  - REF-1281
- name: Rosmarinic acid and other phenolic acids
  compounds:
  - rosmarinic-acid
  - phenolic-acid
  note: Antioxidant and anti-inflammatory constituents associated with the cognitive effects.
  reference_ids:
  - REF-0501
  - REF-0502
  - REF-1277
- name: Flavonoids
  compounds:
  - flavonoid
  note: Additional antioxidant constituents.
  reference_ids:
  - REF-0501
  - REF-1280
  - REF-1282
botanical_description:
  text: Evergreen, woody-based perennial subshrub (Lamiaceae), 30-70 cm tall, with square, downy, greyish
    stems. Leaves are opposite, oblong, wrinkled, grey-green and softly velvety, with a strong camphoraceous
    aroma. Violet-blue, two-lipped flowers are borne in whorled spikes.
  height: 30-70 cm
  habit: Evergreen, woody-based perennial subshrub
  leaves: Opposite, oblong, wrinkled, grey-green, velvety, strongly aromatic
  flowers: Violet-blue, two-lipped, in whorled spikes
  stem: Square, downy, greyish, woody at the base
  root: Woody perennial rootstock
  fruit: Four small nutlets (typical Lamiaceae schizocarp)
  flowering_period: May-July
  reference_ids:
  - REF-0501
  status: verified
habitat:
  text: Native to the northern Mediterranean coast (particularly the Balkans and Italy), widely cultivated
    as a culinary and medicinal herb in gardens worldwide, preferring sunny, well-drained, often calcareous
    soils.
  reference_ids:
  - REF-0501
  status: verified
harvesting:
  text: Leaves are harvested throughout the growing season, ideally just before flowering, when essential-oil
    content is highest, and dried quickly in a warm, shaded place.
  parts:
  - Leaf
  season: Growing season, ideally just before flowering
  reference_ids:
  - REF-0501
  status: verified
traditional_uses:
  text: Sage has an ancient reputation - its Latin name 'salvia' derives from 'salvere', to be saved or
    healed - as a digestive, antiseptic and cognitive tonic. It has official European herbal-monograph
    use for dyspeptic complaints and excessive sweating, and as a gargle for inflammation of the mouth
    and throat; modern clinical trials support cognitive-enhancing effects in both healthy adults and
    people with dementia.
  reference_ids:
  - REF-0501
  - REF-0502
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried leaf steeped in hot water, for digestive complaints or excessive sweating.
  reference_ids:
  - REF-0501
  status: verified
- name: Gargle/mouthwash
  text: A stronger infusion used topically for sore throat and mouth inflammation.
  reference_ids:
  - REF-0501
  status: verified
- name: Standardised extract (capsule)
  text: The form used in cognitive-function clinical trials.
  reference_ids:
  - REF-0502
  - REF-0503
  status: verified
- name: Essential oil (aromatherapy)
  text: Used diluted for cognitive/mood effects via inhalation; not for internal use given the thujone
    content.
  status: draft
dosage:
- name: Infusion (tea)
  text: EMA herbal-monograph guidance suggests about 1-3 g dried leaf per cup as an infusion, up to three
    times daily for digestive complaints, or a stronger preparation used as a gargle. Avoid prolonged
    or high-dose (essential-oil) use given the neurotoxic thujone content, especially in pregnancy and
    epilepsy. Educational reference only, not a prescription.
  reference_ids:
  - REF-0501
  status: verified
actions:
- action: carminative
  note: Carminative for mild dyspeptic complaints (indigestion)
  reference_ids:
  - REF-0501
  status: verified
- action: neuroprotective
  note: Memory and cognitive-function support (enhances cognition in healthy subjects and people with
    dementia)
  reference_ids:
