contraindications:
- note: Culinary use is entirely safe. Essential oil should not be ingested in large amounts; avoid during
    pregnancy in medicinal doses. May trigger epileptic seizures in predisposed individuals at high doses.
    May interact with anticoagulants and antiplatelet drugs.
  reference_ids:
  - REF-0112
  - REF-0173
  - REF-0194
  status: verified
- note: Duke (2002) does not appear to include a dedicated entry for rosemary (Salvia rosmarinus / Rosmarinus
    officinalis) as a primary herb entry in the section searched; however, rosemary is referenced throughout
    the text in relation to antioxidant and antimicrobial properties of its key compounds (carnosol, rosmarinic
    acid). Commission E (KOM) approves rosemary for dyspeptic complaints and externally for rheumatic
    conditions and circulatory problems.
  reference_ids:
