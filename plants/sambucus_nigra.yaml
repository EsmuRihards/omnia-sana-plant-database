botanical_description:
  text: Deciduous shrub or small tree (Adoxaceae), 3-10 m tall (occasionally larger), with corky, furrowed
    grey-brown bark. Leaves are pinnate with 5-7 toothed leaflets. Abundant flat-topped clusters (corymbs)
    of small, fragrant, creamy-white flowers are followed by drooping clusters of small, glossy, purple-black
    berries.
  height: 3-10 m (occasionally larger)
  habit: Deciduous shrub or small tree
  leaves: Pinnate, 5-7 toothed leaflets
  flowers: Small, fragrant, creamy-white, in flat-topped clusters (corymbs)
  stem: Corky, furrowed, grey-brown bark
  root: Fibrous, spreading root system
  fruit: Drooping clusters of small, glossy, purple-black berries
  flowering_period: May-June; berries ripen August-September
  reference_ids:
  - REF-0085
  status: verified
habitat:
  text: Native throughout Europe, western Asia and North Africa, extremely common in hedgerows, woodland
    edges, waste ground and disturbed sites, tolerating a wide range of soils.
  reference_ids:
  - REF-0085
  status: verified
harvesting:
  text: Flowers are picked in full bloom (late spring/early summer), ideally on a dry day, and dried quickly.
    Berries are picked in late summer/early autumn once fully ripe (deep purple-black) and always cooked
    before use, as raw berries - and all other parts of the plant - contain cyanogenic glycosides and
    should not be eaten raw.
  parts:
  - Flower
  - Fruit
  season: Flower late spring/early summer; berries late summer/early autumn
  reference_ids:
  - REF-0085
  status: verified
traditional_uses:
  text: Elder has one of the most celebrated European folk-medicine reputations, described as a 'medicine
    chest' of the countryside. The flowers have official European herbal-monograph use for symptoms of
    the common cold, and the berries - cooked, or as a standardised extract - are widely used and clinically
    studied for upper respiratory and flu-like symptoms.
  reference_ids:
  - REF-0085
  - REF-1016
  status: verified
