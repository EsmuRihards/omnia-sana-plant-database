- note: 'Duke (2002) rates elderflower and elderberry as +++ with clinical evidence (score 2) for bronchostimulant,
    diaphoretic, and secretagogue activities, consistent with Commission E approval. Clinical use for
    colds, bronchitis, and fever is well-supported. Dose: dried flower: 3–5 g as tea three times daily.
    Important safety consideration: raw elderberries and elder bark contain sambunigrin (cyanogenic glycoside)
    and lectins — always cook berries before consumption, and avoid bark preparations for medicinal use
    without expert guidance (Duke, 2002).'
