contraindications:
- note: 'SERIOUS: the saponins are irritant and can cause haemolysis (destruction of red blood cells).
    Never take soapwort in large doses or for prolonged periods. Internal use can cause severe gastrointestinal
    irritation (cramps, nausea, vomiting, diarrhoea).'
  severity: info
  reference_ids:
  - REF-0511
  - REF-0512
  status: verified
- note: Internal use should only be under professional supervision; its expectorant use is now largely
    outdated. Avoid in pregnancy and breastfeeding.
  severity: caution
  reference_ids:
  - REF-0512
  status: verified
