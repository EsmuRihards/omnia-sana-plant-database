common_names:
- Soapwort
- Bouncing Bet
- Common soapwort
- Fuller's herb
scientific_name: Saponaria officinalis
family: Caryophyllaceae
parts_used:
- name: Root (and aerial parts)
  medicinal_actions:
  - action: Expectorant for cough, bronchitis and upper-respiratory catarrh (saponins stimulate the cough
      reflex and loosen mucus) - largely an outdated use
    reference_ids:
    - REF-0511
    - REF-0512
    status: needs-review
  - action: Topical cleansing/soothing for skin ailments (the saponins act as a natural soap; traditional
      for eczema)
    reference_ids:
    - REF-0512
    status: needs-review
constituents:
- name: Triterpenoid saponins (up to ~5%; e.g. saponarioside, vaccaroside)
  note: Surfactant compounds giving the soapy, expectorant and irritant properties; their surface activity
    has been confirmed experimentally, with Saponaria officinalis saponins forming stable oil-in-water
    nanoemulsions.
  reference_ids:
  - REF-0511
  - REF-0512
  - REF-0631
- name: Flavonoids, vitamin C and resin
  note: Supporting constituents of the root.
  reference_ids:
  - REF-0512
contraindications:
- note: 'SERIOUS: the saponins are irritant and can cause haemolysis (destruction of red blood cells).
    Never take soapwort in large doses or for prolonged periods. Internal use can cause severe gastrointestinal
    irritation (cramps, nausea, vomiting, diarrhoea).'
  reference_ids:
  - REF-0511
  - REF-0512
  status: verified
- note: Internal use should only be under professional supervision; its expectorant use is now largely
    outdated. Avoid in pregnancy and breastfeeding.
  reference_ids:
  - REF-0512
  status: verified
internal_notes: Enriched 2026-06-12 from general literature (Drugs.com and MedicineNet monographs). Record
  status set to needs-review because the saponins carry a real haemolysis/irritation risk and the internal
  use is largely outdated. Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup
  tool (cough, skin-irritation); associations retained and now part-mapped and cited. Further enriched
  2026-06-14 with a PubMed-sourced study demonstrating the surfactant/emulsifying behaviour of Saponaria
  officinalis saponins (REF-0631), the physicochemical basis of its traditional "natural soap" use.
last_updated: '2026-06-14'
status: needs-review
