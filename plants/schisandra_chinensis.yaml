traditional_uses:
  text: Schisandra berry ('Wu Wei Zi') has a centuries-old place in Traditional Chinese Medicine as a
    premier adaptogen and 'astringent' tonic, used to boost energy, sharpen mental focus, and support
    liver and kidney function. It is one of the classically defined adaptogen herbs, and modern research
    on its dibenzocyclooctadiene lignans supports antioxidant, hepatoprotective and stress-resistance
    activity.
  reference_ids:
  - REF-0506
  - REF-0505
  status: verified
