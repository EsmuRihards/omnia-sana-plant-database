botanical_description:
  text: 'Deciduous woody climbing vine (liana, Schisandraceae) that can reach several metres, with twining
    stems and reddish-brown bark. Leaves are alternate, elliptical and glossy. Small, fragrant, pink-white
    flowers are followed by drooping clusters of small, bright red berries - the ''five-flavour'' fruit,
    said to embody all five traditional flavours: sour, bitter, sweet, pungent and salty.'
  height: Climbing vine, several metres
  habit: Deciduous woody climbing vine (liana)
