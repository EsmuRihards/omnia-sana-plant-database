contraindications:
- note: Generally well tolerated; mild gastrointestinal upset or heartburn can occur. It affects drug-metabolising
    enzymes and transporters - inhibition of CYP3A and P-glycoprotein is documented (with enzyme induction
    also reported on prolonged use) - so there is a real potential to alter the levels of co-administered
    medicines.
  severity: info
  reference_ids:
  - REF-0506
  - REF-0505
  - REF-0583
  status: verified
- note: Traditionally avoided in pregnancy (uterine-stimulant reputation) and in epilepsy, peptic ulcer
    and raised intracranial pressure.
  severity: caution
  reference_ids:
  - REF-0506
  status: needs-review
