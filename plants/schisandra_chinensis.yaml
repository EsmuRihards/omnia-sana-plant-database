dosage:
- name: Dried berry / extract
  text: Traditional Chinese Medicine dosing typically uses about 1.5-6 g dried berry per day as a decoction,
    and standardised extract capsules follow product-specific dosing (commonly a few hundred mg to 1-2
    g/day of extract). Educational reference only, not a prescription; because schisandra affects CYP3A/P-glycoprotein
    drug metabolism, check for interactions with any prescription medicines.
  reference_ids:
