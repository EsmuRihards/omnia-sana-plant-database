internal_notes: 'Enriched 2026-06-12 from general literature (WebMD and herbal monographs); Scrophularia
  nodosa is not covered by clinical trials, so efficacy actions are needs-review. Originally a skeleton
  imported from the omniasana.bio Symptom-to-Plant Lookup tool (eczema, psoriasis, skin-irritation); associations
  retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced phytochemical/pharmacological
  study of S. nodosa that isolated seven flavonoids and demonstrated smooth-muscle-relaxant (spasmolytic)
  activity on isolated intestine (REF-0630). | 2026-06-15: migrated to entity schema (actions->vocab ids,
  indications split out, constituents linked to compounds).'
