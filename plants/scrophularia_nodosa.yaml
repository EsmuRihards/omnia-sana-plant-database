id: scrophularia-nodosa
scientific_name: Scrophularia nodosa
common_names:
- Figwort
- Woodland figwort
- Common figwort
- Scrofula plant
family: Scrophulariaceae
parts_used:
- Aerial parts (and root)
constituents:
- name: Iridoid glycosides (aucubin, harpagoside, harpagide, catalpol)
  compounds:
  - iridoid-glycoside
  - harpagoside
  - glycoside
  note: Anti-inflammatory constituents; harpagoside also has cardiac (inotropic) activity.
  reference_ids:
  - REF-0452
  - REF-0451
- name: Flavonoids
  compounds:
  - flavonoid
  note: Antioxidant constituents.
  reference_ids:
  - REF-0452
- name: Phenolic acids (caffeic, ferulic, vanillic)
  compounds:
  - phenolic-acid
  - caffeic-acid
  - ferulic-acid
  note: Supporting antioxidant constituents.
  reference_ids:
  - REF-0452
actions:
- action: alterative
  note: Mild diuretic and lymphatic 'detoxifying' herb (traditional); Traditional 'alterative' for chronic
    skin conditions - eczema, psoriasis, rashes (as a poultice, salve or tea)
  reference_ids:
  - REF-0451
  - REF-0452
  status: needs-review
- action: anti-inflammatory
  note: Anti-inflammatory; soothes inflamed, irritated skin
  reference_ids:
  - REF-0452
  status: needs-review
- action: antispasmodic
  note: Antispasmodic / smooth-muscle relaxant (preclinical - an extract relaxed isolated intestinal smooth
    muscle, apparently via muscarinic receptors)
  reference_ids:
  - REF-0630
  status: needs-review
- action: diuretic
  note: Mild diuretic and lymphatic 'detoxifying' herb (traditional)
  reference_ids:
  - REF-0452
  status: needs-review
