contraindications:
- note: 'Avoid if you have a heart condition or take cardiac medicines: figwort''s harpagoside has a stimulating
    (inotropic) effect on the heart, so it is traditionally avoided with rapid heartbeat or heart disease.'
  severity: caution
  reference_ids:
  - REF-0451
  - REF-0452
  status: verified
- note: Avoid during pregnancy. There is insufficient reliable evidence on the safety of taking figwort
    by mouth, so internal use should be cautious and short-term.
  severity: caution
  reference_ids:
  - REF-0451
  status: verified
