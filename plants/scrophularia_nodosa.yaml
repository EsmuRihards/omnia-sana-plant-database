botanical_description:
  text: Tall perennial herb (Scrophulariaceae), 50-100 cm (occasionally more), with a distinctly square
    stem. Leaves are opposite, ovate, toothed and unpleasant-smelling. Small, dull maroon-brown, two-lipped
    flowers are borne in loose, branched clusters (cymes), followed by small dry seed capsules.
  height: 50-100 cm (occasionally more)
  habit: Tall, square-stemmed perennial herb
  leaves: Opposite, ovate, toothed, unpleasant-smelling
  flowers: Small, dull maroon-brown, two-lipped, in loose branched cymes
  stem: Distinctly square
  root: Knotty rhizomatous root (historically likened to swollen glands, per the Doctrine of Signatures)
  fruit: Small dry seed capsule
  flowering_period: June-September
  reference_ids:
  - REF-0452
  status: verified
habitat:
  text: Native to Europe and western Asia, growing in damp woods, hedge banks, ditches and shady waste
    ground on moist, nutrient-rich soils.
  reference_ids:
  - REF-0452
  status: verified
harvesting:
  text: Aerial parts are cut during flowering (summer); the root can also be dug in autumn.
  parts:
  - Aerial parts
  - Root
  season: Aerial parts in summer (flowering); root in autumn
  reference_ids:
  - REF-0452
  status: verified
traditional_uses:
  text: Figwort takes one common name, 'scrofula plant', from its historic traditional use for scrofula
    (tuberculous lymph-node swelling) under the Doctrine of Signatures, its knotty root resembling swollen
    glands. It has a long folk-medicine reputation as an 'alterative' (blood-purifying) herb for chronic
    skin conditions such as eczema and psoriasis, applied as a poultice, salve or tea.
  reference_ids:
  - REF-0451
  - REF-0452
  status: verified
preparations:
- name: Poultice/salve (topical)
  text: Crushed fresh or prepared aerial parts applied to skin conditions such as eczema and psoriasis.
  reference_ids:
  - REF-0452
  status: verified
- name: Infusion (tea)
  text: Dried aerial parts steeped in hot water, a traditional alterative/diuretic preparation.
  reference_ids:
  - REF-0452
  status: verified
- name: Tincture
  text: Alcoholic extract, less commonly used.
  status: draft
dosage:
- name: Infusion (tea)
  text: Traditional guidance suggests roughly 2-4 g dried herb per cup as an infusion, taken cautiously
    and short-term given limited safety data and the cardioactive harpagoside content. Educational reference
    only, not a prescription; avoid with heart conditions/cardiac medicines and in pregnancy.
  reference_ids:
  - REF-0451
  - REF-0452
  status: verified
