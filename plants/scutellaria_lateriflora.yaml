id: scutellaria-lateriflora
scientific_name: Scutellaria lateriflora
common_names:
- Skullcap
- American skullcap
- Blue skullcap
- Mad-dog skullcap
family: Lamiaceae
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Flavonoids (baicalin, baicalein)
  compounds:
  - flavonoid
  note: Bind the benzodiazepine site of the GABA-A receptor, underlying the calming effect; baicalin is
    used as the HPLC quality marker, and its content varies widely between commercial tinctures.
  reference_ids:
  - REF-0510
  - REF-0550
- name: GABA and glutamine (amino acids)
  note: GABA is the main inhibitory neurotransmitter and contributes to the anxiolytic activity.
  reference_ids:
  - REF-0510
actions:
- action: anxiolytic
  note: Anxiolytic for anxiety and nervous tension (the flavonoids baicalin and baicalein bind the benzodiazepine
    site of the GABA-A receptor); a randomised, double-blind, placebo-controlled crossover trial in healthy
    volunteers found significantly improved overall mood without loss of energy or cognition; Calming
    nervine for stress and nervous disorders (traditional)
  reference_ids:
  - REF-0510
  - REF-0551
  status: verified
- action: sedative
  note: Sedative / sleep support (insomnia)
  reference_ids:
  - REF-0510
  status: verified
indications:
- condition: anxiety
  evidence: 4
  note: Anxiolytic for anxiety and nervous tension (the flavonoids baicalin and baicalein bind the benzodiazepine
    site of the GABA-A receptor); a randomised, double-blind, placebo-controlled crossover trial in healthy
    volunteers found significantly improved overall mood without loss of energy or cognition
  reference_ids:
  - REF-0510
  - REF-0551
  status: verified
- condition: insomnia
  evidence: 3
  note: Sedative / sleep support (insomnia)
  reference_ids:
  - REF-0510
  status: verified
- condition: nervous-tension
  evidence: 4
  note: Anxiolytic for anxiety and nervous tension (the flavonoids baicalin and baicalein bind the benzodiazepine
    site of the GABA-A receptor); a randomised, double-blind, placebo-controlled crossover trial in healthy
    volunteers found significantly improved overall mood without loss of energy or cognition
  reference_ids:
  - REF-0510
  - REF-0551
  status: verified
- condition: stress
  evidence: 2
  note: Calming nervine for stress and nervous disorders (traditional)
  reference_ids:
  - REF-0510
  - REF-0551
  status: verified
contraindications:
- note: Generally well tolerated; its sedative effect can add to that of alcohol, sedatives and sleep
    medicines, and it may inhibit some drug-metabolising (CYP) enzymes.
  severity: info
  reference_ids:
  - REF-0510
  status: verified
- note: 'Buy from a reputable source: skullcap products have historically been adulterated with hepatotoxic
    germander (Teucrium), and the flavonoid content of commercial tinctures varies widely. Safety in pregnancy
    and breastfeeding is not established.'
  severity: serious
  reference_ids:
  - REF-0510
  - REF-0550
  status: needs-review
