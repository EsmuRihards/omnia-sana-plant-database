  - REF-1562
  status: verified
- condition: nervous-tension
  note: Anxiolytic for anxiety and nervous tension (the flavonoids baicalin and baicalein bind the benzodiazepine
    site of the GABA-A receptor); a randomised, double-blind, placebo-controlled crossover trial in healthy
    volunteers found significantly improved overall mood without loss of energy or cognition
  reference_ids:
  - REF-0510
  - REF-0551
  status: verified
- condition: stress
  note: Calming nervine for stress and nervous disorders (traditional)
  reference_ids:
  - REF-0510
  - REF-0551
  status: verified
contraindications:
- note: Generally well tolerated; its sedative effect can add to that of alcohol, sedatives and sleep
    medicines, and it may inhibit some drug-metabolising (CYP) enzymes.
  severity: info
  reference_ids:
  - REF-0510
  status: verified
- note: 'Buy from a reputable source: skullcap products have historically been adulterated with hepatotoxic
    germander (Teucrium), and the flavonoid content of commercial tinctures varies widely. Safety in pregnancy
    and breastfeeding is not established.'
  severity: serious
  reference_ids:
  - REF-0510
  - REF-0550
  status: needs-review
