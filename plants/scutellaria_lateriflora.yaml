  status: verified
- name: Standardised extract (capsule)
  text: Flavonoid-standardised commercial extract.
  status: draft
dosage:
- name: Infusion (tea) / tincture
  text: Traditional guidance suggests roughly 1-2 g dried herb per cup as an infusion, up to three times
    daily, or a tincture per product-specific dosing given known variability in flavonoid content between
    commercial products. Educational reference only, not a prescription; buy only from a source that has
    authenticated the species and tested for germander adulteration.
  reference_ids:
