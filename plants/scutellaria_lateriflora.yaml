internal_notes: 'Enriched 2026-06-12 from scientific literature (Phytomedicine phytochemical/anxiolytic
  study). Further enriched 2026-06-13 with two PubMed sources - a randomised, double-blind, placebo-controlled
  crossover mood trial (REF-0551, Brock et al. 2014) and an HPLC study of flavonoid-marker variability
  in commercial tinctures (REF-0550, Gao et al. 2008). Note: this is the American skullcap, distinct from
  Chinese skullcap (Scutellaria baicalensis). Originally a skeleton imported from the omniasana.bio Symptom-to-Plant
  Lookup tool (anxiety, insomnia, stress, nervous-tension); associations retained and now part-mapped
  and cited. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split out, constituents
  linked to compounds).'
