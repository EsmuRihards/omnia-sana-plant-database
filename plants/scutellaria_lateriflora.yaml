botanical_description:
  text: Perennial herb (Lamiaceae), 30-80 cm tall, with square stems. Leaves are opposite, ovate to lance-shaped
    and toothed. Small blue, two-lipped flowers are borne in one-sided leafy racemes arising from the
    leaf axils; the helmet-shaped calyx gives the genus its 'skullcap' name.
  height: 30-80 cm
  habit: Erect perennial herb
  leaves: Opposite, ovate to lance-shaped, toothed
  flowers: Small, blue, two-lipped, in one-sided axillary racemes
  stem: Square
  root: Fibrous perennial rootstock
  fruit: Four small nutlets (typical Lamiaceae schizocarp)
  flowering_period: June-September
  reference_ids:
  - REF-0510
  status: verified
habitat:
  text: Native to North America, growing in damp meadows, marshes, streambanks and wet woodland margins.
  reference_ids:
  - REF-0510
  status: verified
harvesting:
  text: The whole flowering aerial parts are cut at flowering (summer) and dried. Given the well-documented
    history of adulteration with toxic germander, sourcing from an authenticated, tested supplier is essential
    rather than home foraging of an uncertain look-alike.
  parts:
  - Aerial parts (flowering herb)
  season: Summer, at flowering
  reference_ids:
  - REF-0510
  status: verified
traditional_uses:
  text: American skullcap has a Native American and 19th-century Eclectic-medicine tradition as a calming
    nervine for anxiety and nervous tension - the old name 'mad-dog skullcap' reflects a folk remedy explored
    for rabies. Modern research on its flavonoids baicalin and baicalein, which bind the benzodiazepine
    site of the GABA-A receptor, supports its calming, anxiolytic and sleep-supporting reputation.
  reference_ids:
  - REF-0510
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried aerial parts steeped in hot water - the classic calming preparation.
  reference_ids:
  - REF-0510
  status: verified
- name: Tincture
  text: Alcoholic extract, a common commercial form; content is known to vary widely between products.
  reference_ids:
