internal_notes: 'Enriched 2026-06-12 from scientific literature (Cochrane systematic review/meta-analysis;
  Canadian Journal of Urology review). High-quality evidence finds no benefit over placebo, reflected
  in needs-review action statuses. Originally a skeleton imported from the omniasana.bio Symptom-to-Plant
  Lookup tool (prostate-support, uti); associations retained and now part-mapped and cited. Further enriched
  2026-06-14 with two PubMed-sourced meta-analyses of the hexanic extract Permixon (REF-0571, REF-0572)
  reporting symptom benefit and good tolerability; these are extract-specific and partly industry-linked,
  so the conflict with the pooled Cochrane null is flagged needs-review rather than overriding it. | 2026-06-15:
  migrated to entity schema (actions->vocab ids, indications split out, constituents linked to compounds).
  Unmapped uses kept for reference: Standardised hexanic extract (Permixon) specifically - meta-analyses
  report reduced nocturia and improved urinary flow versus placebo and efficacy comparable to tamsulosin
  and short-term finasteride, with better sexual-function tolerability; this contrasts with the null finding
  for pooled mixed extracts. | 2026-06-20: enriched to >=10 scientific publications: added 11 PubMed-verified
  @article sources (REF-1887, REF-0571, REF-1888, REF-1889, REF-1890, REF-1891, REF-1892, REF-1893, REF-0572,
  REF-1894, REF-1895) — woven into relevant actions/indications and the plant-level references bucket.'
