drug_class_interactions:
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: 'Saw palmetto has been linked to prolonged bleeding time, and a case of severe intraoperative haemorrhage was reported in a patient taking it; combining it with anticoagulant or antiplatelet drugs may add to bleeding risk, so stop it before surgery.'
