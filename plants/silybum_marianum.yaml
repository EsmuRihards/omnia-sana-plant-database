  - REF-0484
  status: verified
- action: digestive
  note: Digestive support / mild dyspepsia (traditional)
  reference_ids:
  - REF-0483
  status: needs-review
- action: hepatoprotective
  note: Hepatoprotective / liver support (protects liver cells, antioxidant and antifibrotic); May improve
    liver enzymes and hepatic fat in non-alcoholic fatty liver disease (NAFLD); Supports liver recovery
    and 'detox' (traditional framing of the hepatoprotective action)
  reference_ids:
  - REF-0483
  - REF-0484
  - REF-0560
  status: needs-review
