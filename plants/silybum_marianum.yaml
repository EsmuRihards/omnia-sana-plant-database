  - REF-0484
  status: verified
- action: antidiabetic
  note: Improves glycemic control in type 2 diabetes - lowers fasting blood glucose and HbA1c
  reference_ids:
  - REF-0559
  status: verified
- action: antioxidant
  note: Anti-inflammatory and antioxidant; Hepatoprotective / liver support (protects liver cells, antioxidant
