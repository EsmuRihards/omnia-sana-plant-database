botanical_description:
  text: Robust biennial (occasionally annual) thistle (Asteraceae), 30-150 cm tall. Leaves are glossy
    dark green with distinctive white marbled veining (the 'milk' of legend), spiny-margined and deeply
    lobed. Large, solitary, purple-pink thistle-type flower heads are surrounded by spiny bracts, followed
    by shiny, mottled brown-black seeds - the part used.
  height: 30-150 cm
  habit: Robust biennial (occasionally annual) thistle
  leaves: Glossy dark green with white marbled veining, spiny-margined, deeply lobed
  flowers: Large, solitary, purple-pink thistle heads with spiny bracts
  stem: Erect, ridged
  root: Deep taproot
  fruit: Shiny, mottled brown-black seed (achene)
  flowering_period: June-August
  reference_ids:
  - REF-0483
  status: verified
habitat:
  text: Native to the Mediterranean region, now naturalised worldwide on disturbed, sunny ground - roadsides,
    waste places and dry pastures - and widely cultivated commercially for its seed.
  reference_ids:
  - REF-0483
  status: verified
harvesting:
  text: Seed heads are harvested once fully dry (late summer), and the seeds (fruit) are threshed out.
  parts:
  - Seed (fruit)
  season: Late summer
  reference_ids:
  - REF-0483
  status: verified
traditional_uses:
  text: Milk thistle has a very long European folk-medicine tradition, documented since antiquity, as
    a liver tonic, and its seed extract, standardised to the flavonolignan complex silymarin, is one of
    the most extensively studied herbal hepatoprotectants. Modern research supports antioxidant, anti-inflammatory
    and liver-protective activity, with growing interest in metabolic/blood-sugar effects.
  reference_ids:
  - REF-0483
  - REF-0484
  status: verified
preparations:
- name: Standardised extract (capsule/tablet)
  text: Standardised to silymarin content (typically 70-80%), the clinically studied commercial form.
  reference_ids:
  - REF-0483
  - REF-0484
  status: verified
- name: Powdered seed
  text: Ground whole seed, a less concentrated traditional form.
  status: draft
- name: Tincture
  text: Alcoholic extract; silymarin has limited water/alcohol solubility, so phospholipid-complexed or
    standardised extracts are generally preferred clinically.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials have most often used standardised extract providing 200-450 mg/day of silymarin,
    divided into 2-3 doses. Educational reference only, not a prescription.
  reference_ids:
  - REF-0483
  - REF-0484
  status: verified
