contraindications:
- note: Very well tolerated, even at high doses; the main effects are mild gastrointestinal upset (nausea,
    loose stools). As a member of the daisy family (Asteraceae), it can cause allergic reactions in sensitive
    people.
  severity: info
  reference_ids:
  - REF-0483
  status: verified
- note: Has a low potential for drug interactions (little effect on liver CYP enzymes), but use caution
    with medicines that have a narrow therapeutic window. Human pregnancy data are limited, so use cautiously.
  severity: caution
  reference_ids:
  - REF-0483
  status: verified
