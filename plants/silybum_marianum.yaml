drug_class_interactions:
- drug_class: cyp3a4-substrates
  severity: likely-safe
  mechanism: Milk thistle (silymarin) was once thought to inhibit the CYP3A4 enzyme, but a controlled
    human study found no meaningful effect on a CYP3A4 test drug, so clinically important interactions
    with CYP3A4-metabolised medicines are unlikely at usual doses.
  reference_ids:
  - REF-2455
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
- drug_class: antidiabetics
  severity: caution
  mechanism: Milk thistle (silymarin) reduced fasting blood glucose and HbA1c across randomized trials
    in type 2 diabetes; combined with diabetes medicines it may add to blood-sugar lowering, so monitor
    blood sugar.
  reference_ids:
  - REF-0559
  - REF-2490
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
