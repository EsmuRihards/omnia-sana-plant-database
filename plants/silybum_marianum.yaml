internal_notes: 'Enriched 2026-06-12 from scientific literature (Phytotherapy Research safety/toxicity
  review; Biomedicine & Pharmacotherapy review). Originally a skeleton imported from the omniasana.bio
  Symptom-to-Plant Lookup tool (liver-support, detox, indigestion, inflammation); associations retained
  and now part-mapped and cited. Further enriched 2026-06-14 with PubMed-sourced clinical evidence - a
  meta-analysis of RCTs in type 2 diabetes (REF-0559; significant reductions in fasting glucose and HbA1c)
  and a network meta-analysis in NAFLD (REF-0560; modest liver-enzyme benefit, with novel metabolic agents
  outperforming plant drugs, hence needs-review). | 2026-06-15: migrated to entity schema (actions->vocab
  ids, indications split out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific
  publications: added 11 PubMed-verified @article sources (REF-1896, REF-1897, REF-1898, REF-1899, REF-1900,
  REF-1901, REF-1902, REF-1903, REF-1904, REF-1905, REF-1906) — woven into relevant actions/indications
  and the plant-level references bucket.'
