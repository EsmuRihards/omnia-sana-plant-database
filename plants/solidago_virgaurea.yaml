traditional_uses:
  text: Goldenrod has a long European folk-medicine tradition as a mild 'aquaretic' diuretic and anti-inflammatory
    remedy for the urinary tract, used traditionally for urinary-tract irrigation therapy alongside adequate
    fluid intake, and topically as a wound herb (one common name is 'woundwort'). Modern phytochemical
    work confirms saponin- and flavonoid-driven anti-inflammatory, antioxidant and diuretic activity.
  reference_ids:
  - REF-0069
  - REF-1045
  status: verified
