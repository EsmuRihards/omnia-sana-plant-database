  status: verified
habitat:
  text: Native throughout Europe and temperate Asia, growing on dry grassland, woodland clearings, heaths
    and rocky ground; less aggressively spreading than the North American Solidago canadensis, with which
    it is sometimes confused.
  reference_ids:
  - REF-1045
  - REF-0069
  status: verified
harvesting:
  text: The flowering aerial parts are cut during flowering (late summer) and dried.
  parts:
