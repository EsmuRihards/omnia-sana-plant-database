botanical_description:
  text: Perennial herb (Asteraceae), 20-100 cm tall, with erect, often reddish, downy or smooth stems.
    Leaves are alternate, lance-shaped and toothed. Numerous small, bright yellow, daisy-like flower heads
    are clustered into branched, plume-like terminal sprays, followed by small ribbed achenes with a tuft
    of hairs (pappus).
  height: 20-100 cm
  habit: Erect perennial herb
  leaves: Alternate, lance-shaped, toothed
  flowers: Small, bright yellow, daisy-like, in branched plume-like sprays
  stem: Erect, often reddish, downy or smooth
  root: Fibrous perennial rootstock
  fruit: Small ribbed achenes with a hairy pappus
  flowering_period: July-October
  reference_ids:
