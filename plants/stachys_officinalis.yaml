botanical_description:
  text: Perennial herb (Lamiaceae), 30-60 cm tall, with square, mostly unbranched, hairy stems. Leaves
    are mostly basal, oblong to heart-shaped, toothed and wrinkled. Small, reddish-purple, two-lipped
    flowers are borne in a dense, interrupted terminal spike.
  height: 30-60 cm
  habit: Erect perennial herb
  leaves: Mostly basal, oblong to heart-shaped, toothed, wrinkled
  flowers: Small, reddish-purple, two-lipped, in a dense interrupted terminal spike
  stem: Square, mostly unbranched, hairy
  root: Fibrous perennial rootstock
  fruit: Four small nutlets (typical Lamiaceae schizocarp)
  flowering_period: June-September
  reference_ids:
  - REF-0535
  status: verified
habitat:
  text: Native to Europe, growing in open woodland, grassland, hedgebanks and heathland on well-drained,
    often slightly acidic soils.
  reference_ids:
  - REF-0535
  status: verified
harvesting:
  text: Aerial flowering parts are cut during flowering (summer) and dried.
  parts:
  - Aerial parts (flowering herb)
  season: Summer, during flowering
  reference_ids:
  - REF-0535
  status: verified
traditional_uses:
  text: Wood betony has an ancient European reputation - praised in Anglo-Saxon and medieval herbals as
    a cure-all, giving rise to the saying 'sell your coat and buy betony' - as a gentle nervine for headache,
    anxiety and nervous tension, and as a digestive bitter. Modern phytochemical studies confirm it is
    among the strongest antioxidants of the Lamiaceae family, alongside anti-inflammatory and antispasmodic
    constituents.
  reference_ids:
  - REF-0535
  - REF-0534
  status: verified
preparations:
- name: Infusion (tea)
  text: Dried aerial parts steeped in hot water - the classic calming and digestive preparation.
  reference_ids:
  - REF-0535
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried herb.
  status: draft
dosage:
- name: Infusion (tea)
  text: Traditional guidance suggests roughly 1-2 g dried herb per cup as an infusion, up to three times
    daily. Educational reference only, not a prescription; use caution alongside blood-pressure medicines
    and avoid in pregnancy.
  reference_ids:
  - REF-0534
  - REF-0535
  status: verified
