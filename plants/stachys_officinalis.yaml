internal_notes: 'Enriched 2026-06-12 from general phytotherapy literature (PeaceHealth and Naturopathic
  Herbalist monographs). Stachys officinalis = Betonica officinalis. Originally a skeleton imported from
  the omniasana.bio Symptom-to-Plant Lookup tool (headache, anxiety, nervous-tension, indigestion); associations
  retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced comparative
  study of Lamiaceae antioxidants in which Stachys officinalis was among the strongest free-radical scavengers
  (REF-0621), adding an antioxidant action. | 2026-06-15: migrated to entity schema (actions->vocab ids,
  indications split out, constituents linked to compounds).'
