traditional_uses:
  text: Chickweed has a long European and North American folk-medicine tradition as a cooling, soothing
    emollient for itchy, inflamed skin conditions such as eczema, and as a nutritious wild spring green.
    Modern phytochemical review confirms broad anti-inflammatory and antioxidant activity, though clinical
    trial evidence remains limited.
  reference_ids:
