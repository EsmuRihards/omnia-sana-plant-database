botanical_description:
  text: Low, sprawling annual herb (Caryophyllaceae) forming mats, with weak trailing stems bearing a
    single line of fine hairs running up one side, switching sides at each leaf node - a key identification
    feature. Leaves are opposite, ovate and pointed. Tiny white, star-shaped flowers have five deeply
    notched petals that appear as ten, followed by a small capsule.
  height: Low, sprawling/mat-forming, stems to about 40 cm
  habit: Low, sprawling, mat-forming annual herb
  leaves: Opposite, ovate, pointed
  flowers: Tiny, white, star-shaped, five deeply notched petals (appearing as ten)
  stem: Weak, trailing, with a single line of fine hairs switching sides at each node
  root: Shallow fibrous roots
  fruit: Small capsule
  flowering_period: Can flower almost year-round in mild climates, peaking spring-autumn
  reference_ids:
  - REF-0900
  status: verified
habitat:
  text: Native to Europe, now a cosmopolitan weed found worldwide, growing in disturbed ground, gardens,
    cultivated land and waste places, tolerating cool, moist conditions.
  reference_ids:
