dosage:
- name: Topical root preparation
  text: EU herbal-monograph guidance describes comfrey root preparations applied topically for minor bruises
    and sprains in adults, for a limited duration (commonly up to about 10 days); do not apply to broken
    skin or near eyes/mucous membranes. Comfrey must never be taken internally (no teas, tinctures or
    capsules) because of its pyrrolizidine alkaloid content. Educational reference only, not a prescription.
  reference_ids:
