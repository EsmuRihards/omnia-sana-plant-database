- note: Duke (2002) classifies common comfrey (Symphytum officinale) with anti-inflammatory and wound-healing
    properties, supported by allantoin content (promotes cell proliferation). However, comfrey also contains
    hepatotoxic pyrrolizidine alkaloids. Internal use is no longer recommended, and Commission E approved
    only external use. Duke emphasizes that pyrrolizidine alkaloids are cumulative hepatotoxins associated
    with veno-occlusive disease, and prolonged or internal use is contraindicated (Duke, 2002).
  reference_ids:
  - REF-0074
  - REF-0246
  - REF-0281
  status: verified
