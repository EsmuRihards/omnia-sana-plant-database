contraindications:
- note: 'Big headline: Comfrey naturally contains pyrrolizidine alkaloids (PAs), which can seriously harm
    the liver if taken internally (Staiger, 2012; EMA, 2015). • Do not ingest comfrey (no teas, no internal
    tinctures, no capsules), because PA exposure from internal use is the main safety problem (Staiger,
    2012; Bach et al., 1990). • Topical use only, short-term: EU herbal guidance describes comfrey root
    preparations for minor bruises and sprains in adults, and recommends limited duration (commonly up
    to about 10 days) (EMA, 2015; EMA/HMPC, 2024). • Do not apply to broken skin (open wounds, damaged/irritated
    skin) and avoid eyes/mucous membranes (EMA/HMPC, 2024). • Pregnancy & breastfeeding: best avoided
    (not enough safety margin for medicinal use) (EMA/HMPC, 2024). • Children/adolescents: not recommended
    for medicinal topical use in EU monograph context (EMA/HMPC, 2024). • If you have liver disease or
    take medicines that stress the liver, skip comfrey completely (risk management logic based on PA concern)
    (Staiger, 2012; EMA, 2015). • Skin reactions: mild rash/irritation can occur; stop if it irritates
    (Smith and Jacobson, 2011).'
  reference_ids:
