  status: verified
harvesting:
  text: Leaves are cut during the growing season (before flowering is often preferred for lower pyrrolizidine-alkaloid
    content); root is dug in autumn or spring from mature plants.
  parts:
  - Leaf
  - Root
  season: Leaf during the growing season (ideally before flowering); root autumn or spring
  reference_ids:
  - REF-0074
  status: verified
traditional_uses:
  text: Comfrey has one of the strongest traditional reputations of any European herb for wound healing
    and bone/tissue repair - the folk names 'knitbone' and 'boneset' reflect this - owing to its high
    allantoin content, which stimulates cell proliferation. Because the plant also contains hepatotoxic
    pyrrolizidine alkaloids, modern regulatory use is restricted to topical preparations only, for minor
    bruises and sprains, and internal use (teas, tinctures) is no longer recommended.
  reference_ids:
  - REF-0074
  status: verified
