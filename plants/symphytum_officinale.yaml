botanical_description:
  text: Robust, hairy perennial herb (Boraginaceae), 60-120 cm tall, with a thick, black-skinned, mucilaginous
    taproot. Leaves are large, broad, lance-shaped and bristly-hairy, running down the stem as raised
    wings (decurrent) - the leaf base's smooth, untoothed margin is a key feature distinguishing it from
    toxic foxglove. Drooping clusters of tubular, bell-shaped flowers are cream, pink or purple depending
    on variety.
  height: 60-120 cm
  habit: Robust, hairy perennial herb
  leaves: Large, broad, lance-shaped, bristly-hairy, decurrent (winging the stem), untoothed margin
  flowers: Tubular, bell-shaped, cream, pink or purple, in drooping clusters
  stem: Winged by decurrent leaf bases, hairy
  root: Thick, black-skinned, mucilaginous taproot
  fruit: Small nutlets (typical Boraginaceae)
  flowering_period: May-June, into summer
