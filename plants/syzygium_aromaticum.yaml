id: syzygium-aromaticum
scientific_name: Syzygium aromaticum
common_names:
- Clove
- Clove bud
- aromatic clove
family: Myrtaceae
parts_used:
- Flower
- Leaf
- Stem
botanical_description:
  text: Evergreen tree (Myrtaceae), 8-12 m tall (occasionally to 20 m), with a pyramidal crown. Leaves
    are glossy, elliptical and aromatic. Small crimson flowers are borne in terminal clusters; the unopened
    flower buds, picked before they open and dried, are the 'cloves' of commerce and the medicinal/culinary
    part used.
  height: 8-12 m (occasionally to 20 m)
  habit: Evergreen tree with a pyramidal crown
  leaves: Glossy, elliptical, aromatic
  flowers: Small, crimson, in terminal clusters; unopened buds are the harvested cloves
  stem: Woody, branching
  root: Deep woody root system
  fruit: Small drupe ("mother clove"), less commonly harvested than the flower bud
  flowering_period: Variable, often twice a year in tropical climates
  reference_ids:
  - REF-1075
  status: verified
habitat:
  text: Native to the Maluku Islands (Moluccas, the historic 'Spice Islands') of Indonesia, now cultivated
    throughout the tropics, notably Zanzibar, Madagascar, Sri Lanka and Indonesia, in warm, humid, well-drained
    tropical conditions.
  reference_ids:
  - REF-1075
  status: verified
harvesting:
  text: Unopened flower buds are hand-picked while still green-pink, just before they would open, then
    sun-dried until they turn dark reddish-brown - the familiar clove spice.
  parts:
  - Flower
  season: Before the flower buds open
  reference_ids:
  - REF-1075
  status: verified
traditional_uses:
  text: Clove has an ancient trade history and a long traditional use across Asian, African and European
    medicine as a dental analgesic (chewed or applied as oil for toothache), a digestive carminative,
    and an antiseptic. Modern research on its principal constituent eugenol supports strong analgesic,
    antimicrobial, antioxidant and anti-inflammatory activity, with clove oil remaining a recognised topical
    dental-pain remedy.
  reference_ids:
  - REF-1075
  status: verified
preparations:
- name: Whole clove (culinary/chewed)
  text: Whole dried flower buds chewed or infused for digestive and dental use.
  reference_ids:
  - REF-1075
  status: verified
- name: Clove oil (topical, diluted)
  text: The classic dental-pain remedy, applied to the affected tooth/gum, always diluted.
  reference_ids:
  - REF-0029
  - REF-0247
  - REF-0309
  status: verified
- name: Infusion (tea)
  text: Crushed cloves steeped in hot water for digestive complaints.
  status: draft
- name: Essential oil (aromatherapy)
  text: Diluted for topical or inhaled use.
  status: draft
dosage:
- name: Clove oil / powder
  text: 'Duke (2002): a 1-5% clove oil preparation topically, or about 150 mg clove powder internally.
    Educational reference only, not a prescription; never apply undiluted oil to skin or mucous membranes.'
  reference_ids:
  - REF-0029
  - REF-0247
  - REF-0309
  status: verified
