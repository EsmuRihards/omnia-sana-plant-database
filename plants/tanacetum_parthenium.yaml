drug_class_interactions:
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: 'Feverfew and its component parthenolide inhibit platelet aggregation and serotonin release, so combining it with anticoagulant or antiplatelet drugs may increase bleeding risk.'
