id: tanacetum-parthenium
scientific_name: Tanacetum parthenium
common_names:
- Feverfew
- Featherfew
- Bachelor's buttons
- Midsummer daisy
family: Asteraceae
parts_used:
- Leaf (aerial parts)
constituents:
- name: Sesquiterpene lactones (parthenolide)
  compounds:
  - sesquiterpene-lactone
  - sesquiterpene
  - parthenolide
  note: Parthenolide is the principal active compound, to which extracts are often standardised; it is
    biosynthesised and stored in the glandular trichomes of the aerial parts.
  reference_ids:
  - REF-0450
  - REF-0552
  - REF-0553
  - REF-1579
  - REF-1580
- name: Flavonoids and essential oil
  compounds:
  - essential-oil
  - flavonoid
  note: Supporting antioxidant and aromatic constituents.
  reference_ids:
  - REF-0450
botanical_description:
  text: Aromatic perennial herb (Asteraceae), 20-60 cm tall, with much-branched, downy stems. Leaves are
    yellow-green, bipinnately divided and strongly scented. Small, daisy-like flower heads have white
    ray florets and a flat yellow disc, borne in loose clusters.
  height: 20-60 cm
  habit: Erect, much-branched, aromatic perennial herb
  leaves: Yellow-green, bipinnately divided, strongly scented
  flowers: Small, daisy-like, white ray florets around a flat yellow disc
  stem: Much-branched, downy
  root: Fibrous perennial rootstock
  fruit: Small ribbed achenes (typical Asteraceae)
  flowering_period: June-September
  reference_ids:
  - REF-0553
  status: verified
habitat:
  text: Native to the Balkans and Caucasus region, now naturalised across Europe, North America and elsewhere;
    grows on disturbed ground, walls, roadsides and waste places, and is widely cultivated.
  reference_ids:
  - REF-0450
  status: verified
harvesting:
  text: Leaves (aerial parts) are gathered during the growing season, ideally at flowering, and dried
    or used fresh.
  parts:
  - Leaf (aerial parts)
  season: Growing season, ideally at flowering
  reference_ids:
  - REF-0553
  status: verified
traditional_uses:
  text: Feverfew has a long European folk tradition, its name derived from 'febrifuge' (fever-reducer),
    as a remedy for fevers, headaches and joint pain. Modern use and clinical research focus on migraine
    prevention, with parthenolide identified as the key active compound responsible for inhibiting the
    inflammatory pathways implicated in migraine.
  reference_ids:
  - REF-0450
  status: verified
preparations:
- name: Fresh leaf (chewed, traditional)
  text: A few fresh leaves chewed daily - the classic, though mouth-irritating, traditional preparation.
  status: draft
- name: Standardised leaf extract (capsule)
  text: Freeze-dried or standardised-parthenolide extract, the form used in most clinical trials.
  reference_ids:
  - REF-0450
  status: verified
- name: Infusion (tea)
  text: Dried leaf steeped in hot water.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried leaf.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials for migraine prevention have most often used standardised extracts providing around
    0.2-0.6% parthenolide, taken daily; do not stop abruptly after prolonged use given a documented 'post-feverfew'
    rebound syndrome. Educational reference only, not a prescription; avoid in pregnancy and with anticoagulants.
  reference_ids:
  - REF-0450
  - REF-0552
  status: verified
actions:
- action: anti-inflammatory
  note: Anti-inflammatory - parthenolide inhibits NF-kB and nitroglycerin-induced neuronal (Fos) activation,
    the proposed basis of its antimigraine action
  reference_ids:
  - REF-0450
  - REF-0552
  - REF-1574
  - REF-1578
  status: verified
indications:
- condition: arthritis
  note: Traditional use for fever and for joint pain / arthritis
  reference_ids:
  - REF-0450
  - REF-1574
  status: needs-review
- condition: fever
  note: Traditional use for fever and for joint pain / arthritis
  reference_ids:
  - REF-0450
  - REF-1574
  status: needs-review
- condition: headache
  note: Headache prevention and relief
  reference_ids:
  - REF-0450
  - REF-1572
  - REF-1577
  status: verified
- condition: inflammation
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0450
  - REF-0552
  - REF-1578
  status: needs-review
- condition: migraine
  note: Migraine prophylaxis - reduces attack frequency (evidence favourable for some standardised preparations,
    though mixed); parthenolide is identified as the component responsible for the antimigraine effect
    in animal models
  reference_ids:
  - REF-0450
  - REF-0552
  - REF-1572
  - REF-1573
  - REF-1574
  - REF-1575
  - REF-1576
  - REF-1577
  - REF-1581
  status: verified
- condition: pain
  note: Traditional use for fever and for joint pain / arthritis
  reference_ids:
  - REF-0450
  status: needs-review
- condition: skin-irritation
  note: inferred from anti-inflammatory action
  reference_ids:
  - REF-0450
  - REF-0552
  status: needs-review
contraindications:
- note: As a member of the daisy family (Asteraceae), it can cause allergic reactions in people sensitive
    to ragweed and related plants. Chewing fresh leaves commonly causes mouth ulcers and oral soreness.
  severity: info
  reference_ids:
  - REF-0450
  status: verified
- note: Stopping feverfew abruptly after prolonged use can cause a 'post-feverfew' rebound of headache,
    anxiety and muscle/joint stiffness. Avoid in pregnancy (uterine-stimulant) and breastfeeding, and
    use caution with anticoagulant/antiplatelet medicines.
  severity: caution
  reference_ids:
  - REF-0450
  status: verified
