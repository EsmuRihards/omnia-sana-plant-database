drug_class_interactions:
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: Feverfew and its component parthenolide inhibit platelet aggregation and serotonin release,
    so combining it with anticoagulant or antiplatelet drugs may increase bleeding risk.
  reference_ids:
  - REF-2444
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: zingiber-officinale
  type: caution
  note: Feverfew and ginger both reduce blood clotting/platelet stickiness, so taking them together may
    add up and raise the risk of bruising or bleeding — use caution, especially before surgery or alongside
    blood-thinning drugs.
  reference_ids:
  - REF-2457
  - REF-2444
  - REF-2443
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
