contraindications:
- note: 'CAUTION: Tansy is considered toxic in medicinal doses and is NOT recommended for internal use.
    Thujone can cause convulsions, liver and kidney damage. Contraindicated in pregnancy (uterotonic and
    abortifacient). External use (as insect repellent) is generally safe. For information and historical
    reference only — do not use internally.'
  severity: caution
  reference_ids:
  - REF-0098
  - REF-0139
  - REF-0187
  status: verified
- note: Duke (2002) rates tansy as ++ but emphasizes important safety concerns. The plant contains thujone
    (a neurotoxic ketone) and camphor, making it potentially toxic with internal use. Documented activities
    include emmenagogue, abortifacient (score 1), and insecticide. Duke strongly cautions against internal
    use except under professional supervision, noting that historical cases of tansy poisoning have resulted
    in convulsions and death. Topical use as an insect repellent is safer but should still avoid prolonged
    skin contact due to the essential oil's sensitizing potential. Strictly contraindicated in pregnancy
    (Duke, 2002).
  severity: caution
  reference_ids:
  - REF-0098
  - REF-0139
  - REF-0187
  status: verified
