botanical_description:
  text: Aromatic perennial herb (Asteraceae), 50-120 cm tall, with erect, reddish, ridged stems. Leaves
    are finely divided, fern-like and strongly camphor-scented. Flat-topped clusters of small, yellow,
    button-like flower heads lack ray florets (petals).
  height: 50-120 cm
  habit: Erect, aromatic perennial herb
  leaves: Finely divided, fern-like, strongly camphor-scented
  flowers: Small, yellow, button-like heads with no ray florets, in flat-topped clusters
  stem: Erect, reddish, ridged
  root: Spreading rhizomatous root system
  fruit: Small ribbed achenes (typical Asteraceae)
  flowering_period: July-September
  reference_ids:
  - REF-0098
  status: verified
habitat:
  text: Native to Europe and temperate Asia, widely naturalised elsewhere; grows on roadsides, waste ground,
    riverbanks and disturbed grassland.
  reference_ids:
  - REF-0098
  status: verified
harvesting:
  text: Flowering aerial parts are cut in summer, when in full flower, and dried for external/historical
    use; given this plant's real toxicity (thujone content) at internal doses, this record does not recommend
    or describe internal harvesting for medicinal consumption.
  parts:
  - Flower
  - Leaf
  - Stem
  season: Summer, at full flower
  reference_ids:
  - REF-0098
  status: verified
traditional_uses:
  text: Tansy has a long European history as a strewing herb, insect repellent and, historically, an internal
    vermifuge and emmenagogue, but its thujone and camphor content make internal medicinal use unsafe
    by modern standards. Today it is used, with caution, mainly as an external insect repellent; the traditional
    internal uses are recorded here for historical reference only, not as a recommendation.
  reference_ids:
  - REF-0098
  status: verified
preparations:
- name: Dried herb (insect repellent, external)
  text: Dried flowering tops used as a traditional moth/insect deterrent, for example in sachets.
  reference_ids:
  - REF-0098
  status: verified
- name: Essential oil (external, historical)
  text: Used historically as an insect repellent; prolonged skin contact should still be avoided given
    its sensitising potential.
  reference_ids:
  - REF-1293
  status: verified
dosage:
- name: Internal use
  text: Tansy is NOT recommended for internal use at any dose given its thujone content and documented
    toxicity (convulsions, liver/kidney damage) - internal use recorded here is for historical reference
    only. External use (e.g. as an insect repellent) should avoid prolonged skin contact. Educational
    reference only, not a prescription; strictly avoid in pregnancy.
  reference_ids:
