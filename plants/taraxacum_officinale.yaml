constituents:
- name: Sesquiterpene lactones
  note: Bitter principles (e.g. taraxacin) responsible for the characteristic bitterness and bitter-tonic
    action.
  reference_ids:
  - REF-0326
  - REF-0338
- name: Triterpenes and plant sterols
  note: Including taraxasterol; contribute to anti-inflammatory and hepatoprotective signals.
  reference_ids:
  - REF-0326
  - REF-0333
- name: Phenolic acids and flavonoids
  note: Antioxidant constituents (e.g. chicoric acid, luteolin derivatives).
  reference_ids:
  - REF-0329
  - REF-0333
- name: Inulin
  note: Fructan storage carbohydrate; prebiotic fibre concentrated in the autumn root.
  reference_ids:
  - REF-0329
  - REF-0326
contraindications:
- note: Allergy risk in individuals sensitive to Asteraceae (daisy family) plants such as ragweed and
    chamomile.
  reference_ids:
  - REF-0328
  - REF-0332
  status: verified
- note: Avoid medicinal use in anyone with a blocked bile duct or gallstones; use caution with gallbladder
    or serious liver disease.
  reference_ids:
  - REF-0328
  status: verified
- note: May potentiate prescription diuretics; possible interactions with lithium and drugs metabolised
    by the liver.
  reference_ids:
  - REF-0332
  - REF-0328
  status: verified
- note: Can accumulate soil pollutants and heavy metals; harvest from clean, unpolluted sites.
  reference_ids:
  - REF-0338
  - REF-0328
  status: verified
- note: Use during pregnancy or breastfeeding should be guided by a qualified practitioner. Herbal use
    should support, not replace, conventional medical care.
  reference_ids:
  - REF-0328
  status: verified
