contraindications:
- note: Allergy risk in individuals sensitive to Asteraceae (daisy family) plants such as ragweed and
    chamomile.
  severity: info
  reference_ids:
  - REF-0328
  - REF-0332
  status: verified
- note: Avoid medicinal use in anyone with a blocked bile duct or gallstones; use caution with gallbladder
    or serious liver disease.
  severity: caution
  reference_ids:
  - REF-0328
  status: verified
- note: May potentiate prescription diuretics; possible interactions with lithium and drugs metabolised
    by the liver.
  severity: caution
  reference_ids:
  - REF-0332
  - REF-0328
  status: verified
- note: Can accumulate soil pollutants and heavy metals; harvest from clean, unpolluted sites.
  severity: info
  reference_ids:
  - REF-0338
  - REF-0328
  status: verified
- note: Use during pregnancy or breastfeeding should be guided by a qualified practitioner. Herbal use
    should support, not replace, conventional medical care.
  severity: caution
