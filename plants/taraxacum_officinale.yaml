constituents:
- name: Sesquiterpene lactones
  compounds:
  - sesquiterpene-lactone
  - sesquiterpene
  note: Bitter principles (e.g. taraxacin) responsible for the characteristic bitterness and bitter-tonic
    action.
  reference_ids:
