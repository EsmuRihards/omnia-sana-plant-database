  - REF-0333
- name: Phenolic acids and flavonoids
  compounds:
  - phenolic-acid
  - flavonoid
  - luteolin
  note: Antioxidant constituents (e.g. chicoric acid, luteolin derivatives).
  reference_ids:
  - REF-0329
  - REF-0333
- name: Inulin
  compounds:
  - polysaccharide
  - inulin
  note: Fructan storage carbohydrate; prebiotic fibre concentrated in the autumn root.
  reference_ids:
