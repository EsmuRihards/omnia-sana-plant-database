botanical_description:
  text: Small evergreen tree (Malvaceae), 4-8 m tall (up to 10 m unpruned), with a dense, spreading crown.
    Leaves are large, glossy and oblong. Small pink-white flowers are borne directly on the trunk and
    older branches (cauliflory), followed by large, ridged, football-shaped pods that ripen from green
    to yellow/orange/red-purple, each containing 20-60 seeds (the cocoa beans) embedded in sweet white
    pulp.
  height: 4-8 m (up to 10 m unpruned)
  habit: Small evergreen tree, cauliflorous (flowers/pods on the trunk)
  leaves: Large, glossy, oblong
  flowers: Small, pink-white, borne directly on the trunk and older branches
  stem: Woody trunk, flowers and pods arising directly from it
  root: Moderate, spreading root system
  fruit: Large, ridged pod containing 20-60 seeds in sweet white pulp
  flowering_period: Can flower year-round in tropical conditions
  reference_ids:
  - REF-1084
  status: verified
habitat:
  text: Native to the tropical rainforest understorey of Central and South America (the Amazon and Orinoco
    basins), now cultivated throughout the tropics within about 20 degrees of the equator (notably West
    Africa, Southeast Asia and South America), requiring warm, humid, shaded conditions.
  reference_ids:
  - REF-1084
  status: verified
harvesting:
  text: Ripe pods are hand-harvested, cut open, and the seeds (with pulp) are removed, fermented for several
    days - essential for developing chocolate flavour and reducing bitterness - then dried and roasted.
  parts:
  - Fruit
  - Seed
  season: As pods ripen, largely year-round in the tropics
  reference_ids:
  - REF-1084
  status: verified
traditional_uses:
  text: Cacao has an ancient Mesoamerican tradition (Maya and Aztec) as a ceremonial, medicinal and nutritive
    beverage, valued as a stimulant tonic and considered sacred - 'food of the gods', reflected in the
    genus name Theobroma. Modern research on its polyphenol (flavanol) content supports cardiovascular,
    antioxidant, anti-inflammatory and neuroprotective/cognitive benefits, particularly from minimally
    processed, high-flavanol cocoa.
  reference_ids:
  - REF-1084
  status: verified
preparations:
- name: Traditional cacao drink
  text: Roasted, ground beans made into a beverage - the historic Mesoamerican preparation, often unsweetened
    and sometimes spiced.
  status: draft
- name: Cocoa powder
  text: Defatted, roasted, ground beans, used in modern beverages and food.
  status: draft
- name: Dark chocolate (high cocoa content)
  text: Minimally processed chocolate retaining more flavanols than milk chocolate.
  reference_ids:
  - REF-1084
  status: verified
- name: Standardised flavanol extract (capsule)
  text: Concentrated extract used in some clinical cardiovascular research.
  reference_ids:
  - REF-1085
  status: verified
dosage:
- name: Cocoa flavanol extract
  text: Large clinical trials of cocoa flavanol supplementation for cardiovascular prevention have used
    around 500 mg/day of cocoa flavanols. Educational reference only, not a prescription; treat concentrated
    cacao as a mild stimulant (theobromine, some caffeine) and moderate intake accordingly, especially
    in pregnancy, with heart-rhythm conditions, or on stimulant-sensitive medication.
  reference_ids:
  - REF-1085
  status: verified
constituents:
- name: Methylxanthines (theobromine, caffeine)
  note: Theobromine is the dominant methylxanthine and the main stimulant/bronchodilator constituent,
    with lesser amounts of caffeine.
  reference_ids:
