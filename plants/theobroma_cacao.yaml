- note: Duke (2002) notes that cacao is primarily known for its cardiotonic, CNS-stimulant, and broncholytic
    activities at the experimental level (score 1). Theobromine is identified as the principal active
    constituent responsible for mild bronchodilation and cardiovascular stimulation. Cocoa butter is classified
    as emollient (score 1). Chocolate's content of phenylethylamine may contribute to reported aphrodisiac
    properties. Duke notes that excessive consumption may be cariogenic and pro-acneic, and cocoa is a
    known allergen in sensitive individuals (Duke, 2002).
  severity: info
  reference_ids:
  - REF-0131
  - REF-0167
  - REF-0249
  status: verified
