contraindications:
- note: '• Stimulant effect (most common issue): cacao naturally contains theobromine (and some caffeine).
    In larger amounts it can feel like a “gentle coffee”: faster heartbeat, restlessness, trouble sleeping.
    • Heavy metals (quality matters): cocoa/chocolate can contain cadmium and lead from soil and processing.
    For frequent use (especially powders, dark chocolate, “ceremonial” paste), choose brands that publish
    lab tests. • Pregnancy (extra caution late pregnancy): some research suggests very polyphenol-rich
    foods (including cocoa/dark chocolate) could affect fetal circulation in late pregnancy. This is not
    “everyone must avoid chocolate,” but high-dose cacao drinks are something to discuss with a clinician
    if pregnant—especially in the 3rd trimester. • Breastfeeding: moderate chocolate/cacao is usually
    fine, but very large amounts can affect some infants (stimulation/irritability) because stimulant
    compounds can pass into milk in small amounts. • If you’re sensitive: cacao can worsen reflux/heartburn,
    trigger migraines in some people, or cause nausea—especially in strong ceremonial-style servings.
    • Medication caution: if you take stimulant-sensitive meds, have heart rhythm issues, severe anxiety,
    or use MAOI antidepressants, treat high-dose cacao drinks like a stimulant and be cautious'
  severity: caution
