contraindications:
- note: Generally safe at culinary doses. Essential oil is highly concentrated and must be diluted before
    topical use; undiluted application can cause skin sensitisation. Not recommended internally during
    pregnancy (uterine stimulant effects possible). Phenol-rich thyme preparations should be avoided long-term
    in high doses. May potentiate anticoagulant medications.
  severity: caution
  reference_ids:
  - REF-0071
  - REF-0133
  - REF-0250
  status: verified
- note: 'Duke (2002) rates Thymus vulgaris (garden thyme, closely related to breckland thyme) as +++ with
    clinical evidence (score 2) for antibacterial, bronchospasmolytic, and antispasmodic activities, consistent
    with Commission E and WHO approvals for bronchitis and upper respiratory catarrh. The primary active
    constituent is thymol, with carvacrol as a secondary compound. Dose: 1–2 g dried herb as tea three
    times daily. The plant demonstrates COX-2 inhibitory activity and calcium antagonism, which may explain
    its antispasmodic effects (Duke, 2002).'
  severity: info
  reference_ids:
  - REF-0071
  - REF-0133
  - REF-0250
  status: verified
