common_names:
- Thyme
- Common thyme
- Garden thyme
scientific_name: Thymus vulgaris
family: Lamiaceae
parts_used:
- name: Aerial parts (herb) and essential oil
  medicinal_actions:
  - action: Expectorant for productive (chesty) cough associated with cold and bronchitis - a fixed thyme-ivy
      extract combination outperformed placebo in acute bronchitis (faster, greater reduction in coughing
      fits)
    reference_ids:
    - REF-0519
    - REF-0593
    status: verified
  - action: Antitussive and antispasmodic (eases bronchial spasm and coughing)
    reference_ids:
    - REF-0519
    status: verified
  - action: Sore throat relief (antiseptic gargle)
    reference_ids:
    - REF-0519
    status: verified
  - action: Antimicrobial (thymol and carvacrol) - supports respiratory infection
    reference_ids:
    - REF-0486
    - REF-0519
    status: verified
constituents:
- name: Essential oil rich in thymol and carvacrol
  note: Phenolic monoterpenes responsible for the antimicrobial and expectorant actions.
  reference_ids:
  - REF-0519
  - REF-0486
- name: Flavonoids and rosmarinic acid
  note: Antioxidant and anti-inflammatory constituents.
  reference_ids:
  - REF-0519
contraindications:
- note: Culinary amounts are safe. Thyme essential oil is a strong irritant - dilute well before any topical
    use and do not take the undiluted oil internally.
  reference_ids:
  - REF-0486
  status: verified
- note: A cough that persists beyond about a week, or with fever or breathlessness, needs medical assessment.
    Avoid medicinal/oil doses in pregnancy; allergy is possible in people sensitive to the mint family
    (Lamiaceae).
  reference_ids:
  - REF-0519
  status: verified
internal_notes: 'Enriched 2026-06-12 from regulatory and scientific literature (EMA HMPC monograph for
  Thymi herba; Phytotherapy Research carvacrol review). Note: this is Thymus vulgaris (garden thyme),
  distinct from the book''s Thymus serpyllum (Breckland thyme). Originally a skeleton imported from the
  omniasana.bio Symptom-to-Plant Lookup tool (cough, cold, sore-throat, bronchitis, infection); associations
  retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced double-blind,
  placebo-controlled RCT of a fixed thyme-ivy fluid-extract combination in acute bronchitis with productive
  cough (REF-0593; faster and greater reduction in coughing fits than placebo).'
last_updated: '2026-06-14'
status: verified
