id: thymus-vulgaris
scientific_name: Thymus vulgaris
common_names:
- Thyme
- Common thyme
- Garden thyme
family: Lamiaceae
parts_used:
- Aerial parts (herb) and essential oil
constituents:
- name: Essential oil rich in thymol and carvacrol
  compounds:
  - essential-oil
  - terpene
  - carvacrol
  - thymol
  note: Phenolic monoterpenes responsible for the antimicrobial and expectorant actions.
  reference_ids:
  - REF-0519
  - REF-0486
  - REF-1304
  - REF-1308
  - REF-1311
- name: Flavonoids and rosmarinic acid
  compounds:
  - rosmarinic-acid
  - flavonoid
  note: Antioxidant and anti-inflammatory constituents.
  reference_ids:
  - REF-0519
botanical_description:
  text: Low, woody-based aromatic perennial subshrub with small, narrow, grey-green leaves and small,
    pale pink to lilac, two-lipped flowers borne in whorled clusters along the upper stems.
  height: 15-40 cm
  habit: Low, woody-based, bushy aromatic perennial subshrub
  leaves: Small, narrow, grey-green, strongly aromatic
  flowers: Small, pale pink to lilac, two-lipped, in whorled clusters along upper stems
  stem: Woody at the base, upright to sprawling, finely hairy
  root: Woody taproot
  fruit: Small nutlet
  flowering_period: May-August
  reference_ids:
  - REF-0519
  status: verified
habitat:
  text: Grows on dry, sunny, rocky, well-drained soils; native to the western Mediterranean and widely
    cultivated as a culinary and medicinal herb worldwide.
  reference_ids:
  - REF-0519
  status: verified
harvesting:
  text: The flowering aerial parts are cut just as flowering begins, when essential oil content is highest,
    and dried in a warm, shaded, airy place; essential oil is obtained by steam distillation of the fresh
    or dried herb.
  parts:
  - Aerial parts (herb) and essential oil
  season: Late spring to summer, at the start of flowering
  reference_ids:
  - REF-0519
  status: verified
traditional_uses:
  text: Thyme has a long Mediterranean and European tradition as an antimicrobial and expectorant remedy
    for coughs, bronchitis and sore throat, formalised in EU herbal monograph recognition, with a fixed
    thyme-ivy extract combination shown superior to placebo for acute bronchitis with productive cough
    in clinical trial.
  reference_ids:
  - REF-0519
  - REF-0593
  status: verified
preparations:
- name: Infusion
  text: Dried herb infused in hot water as a traditional cough, cold and digestive tea.
  reference_ids:
  - REF-0519
  status: verified
- name: Gargle
  text: Infusion used as a gargle for sore throat, drawing on the antiseptic essential oil constituents.
  reference_ids:
  - REF-0519
  status: verified
- name: Standardized fluid extract (thyme-ivy combination)
  text: Standardized fluid extract, often combined with ivy leaf, the form studied in clinical trials
    for acute bronchitis.
  reference_ids:
  - REF-0593
  status: verified
dosage:
- name: Infusion
  text: The EU herbal monograph suggests around 1-2 g of dried herb per cup, up to three times daily.
    Educational reference only, not a prescription; do not take the essential oil undiluted internally.
  reference_ids:
  - REF-0519
  status: verified
actions:
- action: antimicrobial
  note: Antimicrobial (thymol and carvacrol) - supports respiratory infection; Sore throat relief (antiseptic
    gargle)
  reference_ids:
  - REF-0486
  - REF-0519
  - REF-1303
  - REF-1304
  - REF-1305
  - REF-1306
  - REF-1307
  - REF-1309
  - REF-1310
  - REF-1312
  status: verified
- action: antispasmodic
  note: Antitussive and antispasmodic (eases bronchial spasm and coughing)
  reference_ids:
  - REF-0519
  - REF-1305
  status: verified
- action: antitussive
  note: Antitussive and antispasmodic (eases bronchial spasm and coughing)
  reference_ids:
  - REF-0519
  status: verified
- action: expectorant
  note: Expectorant for productive (chesty) cough associated with cold and bronchitis - a fixed thyme-ivy
    extract combination outperformed placebo in acute bronchitis (faster, greater reduction in coughing
    fits)
  reference_ids:
  - REF-0519
  - REF-0593
  status: verified
