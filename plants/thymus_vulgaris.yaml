contraindications:
- note: Culinary amounts are safe. Thyme essential oil is a strong irritant - dilute well before any topical
    use and do not take the undiluted oil internally.
  severity: caution
  reference_ids:
  - REF-0486
  status: verified
- note: A cough that persists beyond about a week, or with fever or breathlessness, needs medical assessment.
    Avoid medicinal/oil doses in pregnancy; allergy is possible in people sensitive to the mint family
    (Lamiaceae).
  severity: caution
  reference_ids:
