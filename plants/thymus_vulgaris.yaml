internal_notes: 'Enriched 2026-06-12 from regulatory and scientific literature (EMA HMPC monograph for
  Thymi herba; Phytotherapy Research carvacrol review). Note: this is Thymus vulgaris (garden thyme),
  distinct from the book''s Thymus serpyllum (Breckland thyme). Originally a skeleton imported from the
  omniasana.bio Symptom-to-Plant Lookup tool (cough, cold, sore-throat, bronchitis, infection); associations
  retained and now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced double-blind,
  placebo-controlled RCT of a fixed thyme-ivy fluid-extract combination in acute bronchitis with productive
  cough (REF-0593; faster and greater reduction in coughing fits than placebo). | 2026-06-15: migrated
  to entity schema (actions->vocab ids, indications split out, constituents linked to compounds). | 2026-06-20:
  enriched to >=10 scientific publications: added 10 PubMed-verified @article sources (REF-1303, REF-1304,
  REF-1305, REF-1306, REF-1307, REF-1308, REF-1309, REF-1310, REF-1311, REF-1312) — woven into relevant
  actions/indications and the plant-level references bucket.'
