id: tilia-cordata
scientific_name: Tilia cordata
common_names:
- Linden
- Lime flower
- Small-leaved lime
- Basswood
family: Malvaceae
parts_used:
- Flower (lime
- linden flower)
constituents:
- name: Flavonoids (quercetin and kaempferol glycosides, tiliroside)
  compounds:
  - flavonoid
  - glycoside
  - kaempferol
  - quercetin
  note: Antioxidant constituents associated with the diaphoretic and calming effects; tiliroside is highlighted
    as a key anxiolytic flavonoid of the genus.
  reference_ids:
  - REF-0478
  - REF-0554
  - REF-0555
  - REF-1315
  - REF-1317
  - REF-1322
- name: Mucilage
  compounds:
  - polysaccharide
  - mucilage
  note: Soothing, demulcent polysaccharides.
  reference_ids:
  - REF-0478
- name: Volatile oil (with farnesol), phenolic acids and tannins
  compounds:
  - phenolic-acid
  - essential-oil
  - tannin
  note: Aromatic and astringent constituents.
  reference_ids:
  - REF-0478
botanical_description:
  text: Large deciduous tree with a rounded crown and heart-shaped, finely toothed, asymmetrical leaves.
    Small, pale yellow, fragrant flowers hang in clusters from a distinctive pale green, leaf-like bract,
    developing into small, round, downy nutlets.
  height: 20-30 m
  habit: Large deciduous tree with a rounded, dense crown
  leaves: Heart-shaped, finely toothed, asymmetrical at the base
  flowers: Small, pale yellow, fragrant, hanging in clusters from a pale green bract
  stem: Tall trunk with smooth grey bark, becoming furrowed with age
  root: Deep, spreading root system
  fruit: Small, round, downy nutlet, attached to the persistent bract
  flowering_period: June-July
  reference_ids:
  - REF-0478
  status: verified
habitat:
  text: Grows in deciduous woodland, hedgerows and as a widely planted street and park tree; native to
    Europe including Britain.
  reference_ids:
  - REF-0478
  status: verified
harvesting:
  text: The flowers, together with their attached bract, are picked shortly after opening in early-to-mid
    summer and dried quickly in a warm, shaded, airy place.
  parts:
  - Flower (lime, linden flower)
  season: Early-to-mid summer, shortly after flowers open
  reference_ids:
  - REF-0478
  status: verified
traditional_uses:
  text: Linden flower has a long European tradition, recognised in the EU herbal monograph, as a gentle
    calming and sleep-supportive herb and as a diaphoretic remedy for feverish colds and flu, with modern
    research on its flavonoid fraction (notably tiliroside) supporting a mechanistic basis for the traditional
    calming action.
  reference_ids:
  - REF-0478
  status: verified
preparations:
- name: Infusion
  text: Dried flower (with bract) infused in hot water as the classic traditional calming and diaphoretic
    tea.
  reference_ids:
  - REF-0478
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried flower.
  status: draft
dosage:
- name: Infusion
  text: The EU herbal monograph suggests around 2-4 g of dried flower per cup, up to several times daily
    as needed for calming or feverish colds. Educational reference only, not a prescription; well tolerated
    including in children per the monograph.
  reference_ids:
  - REF-0478
  status: verified
actions:
- action: anticancer
  reference_ids:
  - REF-1314
  - REF-1318
  status: needs-review
- action: antioxidant
  note: Antioxidant and acetylcholinesterase-inhibitory (linden-flower extract scavenges free radicals
    and inhibits AChE in vitro)
  reference_ids:
  - REF-0554
  - REF-1314
  - REF-1321
  status: verified
- action: antispasmodic
  note: Antispasmodic (traditional)
  reference_ids:
  - REF-0478
  status: needs-review
- action: anxiolytic
  note: Relief of mild mental stress and to aid sleep (gentle calming); flavonoid fractions of Tilia (notably
    tiliroside) show anxiolytic activity in animal models via the serotonergic and GABA/benzodiazepine
    systems (mechanistic evidence from the related species T. americana)
  reference_ids:
  - REF-0478
  - REF-0555
  - REF-1321
  - REF-1322
  status: verified
- action: demulcent
  note: Demulcent for cough and catarrh (soothing mucilage)
  reference_ids:
  - REF-0478
  status: verified
- action: diaphoretic
  note: Diaphoretic infusion for feverish colds and flu (promotes sweating to support a fever)
  reference_ids:
  - REF-0478
  status: verified
