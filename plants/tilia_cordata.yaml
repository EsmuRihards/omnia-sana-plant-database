id: tilia-cordata
scientific_name: Tilia cordata
common_names:
- Linden
- Lime flower
- Small-leaved lime
- Basswood
family: Malvaceae
parts_used:
- Flower (lime
- linden flower)
constituents:
- name: Flavonoids (quercetin and kaempferol glycosides, tiliroside)
  compounds:
  - flavonoid
  - glycoside
  - kaempferol
  - quercetin
  note: Antioxidant constituents associated with the diaphoretic and calming effects; tiliroside is highlighted
    as a key anxiolytic flavonoid of the genus.
  reference_ids:
  - REF-0478
  - REF-0554
  - REF-0555
  - REF-1315
  - REF-1317
  - REF-1322
- name: Mucilage
  compounds:
  - polysaccharide
  - mucilage
  note: Soothing, demulcent polysaccharides.
  reference_ids:
  - REF-0478
- name: Volatile oil (with farnesol), phenolic acids and tannins
  compounds:
  - phenolic-acid
  - essential-oil
  - tannin
  note: Aromatic and astringent constituents.
  reference_ids:
  - REF-0478
actions:
- action: antioxidant
  note: Antioxidant and acetylcholinesterase-inhibitory (linden-flower extract scavenges free radicals
    and inhibits AChE in vitro)
  reference_ids:
  - REF-0554
  - REF-1314
  - REF-1321
  status: verified
- action: antispasmodic
  note: Antispasmodic (traditional)
  reference_ids:
  - REF-0478
  status: needs-review
- action: anxiolytic
  note: Relief of mild mental stress and to aid sleep (gentle calming); flavonoid fractions of Tilia (notably
    tiliroside) show anxiolytic activity in animal models via the serotonergic and GABA/benzodiazepine
    systems (mechanistic evidence from the related species T. americana)
  reference_ids:
  - REF-0478
  - REF-0555
  - REF-1321
  - REF-1322
  status: verified
- action: demulcent
  note: Demulcent for cough and catarrh (soothing mucilage)
  reference_ids:
  - REF-0478
  status: verified
- action: diaphoretic
  note: Diaphoretic infusion for feverish colds and flu (promotes sweating to support a fever)
  reference_ids:
  - REF-0478
  status: verified
