contraindications:
- note: Generally very well tolerated, including (per the EU herbal monograph) in children. A feverish
    cold that persists or worsens, or a high or prolonged fever, needs medical assessment.
  severity: info
  reference_ids:
  - REF-0478
  status: verified
- note: Use in pregnancy and breastfeeding is not recommended in the absence of adequate data.
