internal_notes: 'Enriched 2026-06-12 from regulatory literature (EMA HMPC monograph for Tiliae flos, covering
  T. cordata with T. platyphyllos and T. x vulgaris). Further enriched 2026-06-13 with two PubMed studies
  - an in-vitro antioxidant/acetylcholinesterase-inhibition study of T. cordata flowers (REF-0554, Guller
  et al. 2021) and a flavonoid-fraction anxiolytic study (REF-0555, Nogueron-Merino et al. 2015) on the
  related species T. americana, cited as genus-level mechanistic support for the calming action (tiliroside).
  Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (anxiety, insomnia,
  cold, fever, stress); associations retained and now part-mapped and cited. | 2026-06-15: migrated to
  entity schema (actions->vocab ids, indications split out, constituents linked to compounds). | 2026-06-20:
  enriched to >=10 scientific publications: added 10 PubMed-verified @article sources (REF-1313, REF-1314,
  REF-1315, REF-1316, REF-1317, REF-1318, REF-1319, REF-1320, REF-1321, REF-1322) — woven into relevant
  actions/indications and the plant-level references bucket.'
