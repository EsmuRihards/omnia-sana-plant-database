botanical_description:
  text: Slender annual herb with finely divided, feathery leaves, resembling a smaller parsley. Small
    white flowers are borne in flat-topped umbels, giving way to small, ridged, aromatic, oval seeds (technically
    schizocarps) that are the primary part used.
  height: 30-90 cm
  habit: Slender, erect annual herb
  leaves: Finely divided, feathery, parsley-like
  flowers: Small, white, in flat-topped umbels
  stem: Erect, branching, ridged
  root: Fibrous taproot
  fruit: Small, ridged, aromatic, oval seed (schizocarp), the main part used
  flowering_period: Summer (varies by growing region)
  reference_ids:
  - REF-0015
  status: verified
habitat:
  text: Cultivated as an annual crop, mainly in India, Iran, Pakistan, Afghanistan and Egypt; believed
    native to the eastern Mediterranean region.
  reference_ids:
  - REF-0251
  status: verified
harvesting:
  text: Seeds are harvested when the umbels dry and turn brown, then threshed and dried further; leaves
    are gathered fresh through the growing season and the root is dug when needed.
  parts:
  - Leaf
  - Root
  - Seed
  season: Seed at late-season maturity; leaf through growing season
  reference_ids:
  - REF-0015
  status: verified
traditional_uses:
  text: Ajwain seed has a long South Asian and Middle Eastern culinary and Ayurvedic tradition as a warming
    digestive carminative for bloating and indigestion, an antispasmodic for menstrual cramps, an oral-health
    antiseptic, and a respiratory-supportive remedy, with its high thymol content underlying much of its
    antimicrobial and antispasmodic activity.
  reference_ids:
  - REF-0015
  - REF-0017
  - REF-0031
  status: verified
preparations:
- name: Seed infusion/chewed seed
  text: Whole seeds chewed after meals or infused in hot water as the classic digestive preparation.
  reference_ids:
  - REF-0015
  status: verified
- name: Seed decoction
  text: Seeds simmered in water, a traditional preparation for stronger digestive or respiratory use.
  status: draft
- name: Diluted essential oil (topical/oral-care)
  text: Essential oil, well diluted, used in oral-care preparations; not taken undiluted internally due
    to thymol content.
  reference_ids:
  - REF-0017
  status: verified
dosage:
- name: Seed
  text: Traditional sources suggest around 3-6 g of powdered seed daily, or 125 mg of a standardized extract.
    Educational reference only, not a prescription.
  reference_ids:
