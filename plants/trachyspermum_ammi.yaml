contraindications:
- note: Generally safe at culinary amounts used in Indian and Middle Eastern cooking. Ajwain essential
    oil is highly concentrated and should not be ingested in large quantities — thymol toxicity can cause
    nausea, vomiting, and central nervous system effects at high doses. May increase photosensitivity
    (phototoxic potential of essential oil). May mildly lower blood pressure and blood sugar — caution
    when combined with antihypertensive or antidiabetic medications. Contains thymol, which may enhance
    anticoagulant effects at very high doses. Not recommended in medicinal doses during pregnancy (has
    emmenagogue properties in traditional use) or breastfeeding. Avoid in large amounts with peptic ulcer
    as it may aggravate gastric acidity in some individuals (Bairwa et al., 2012).
  severity: caution
  reference_ids:
  - REF-0015
  - REF-0017
  - REF-0031
  - REF-0251
  - REF-0275
  status: verified
- note: According to Duke (2002), ajowan essential oil is fungitoxic at 500 ppm and possesses spasmogenic
    activity. The oil is rich in thymol, which may be responsible for many of the plant's biological activities
    including its antispasmodic, carminative, and antimicrobial effects. Recommended dosage in traditional
    medicine is 3–6 g of powdered seed, or 125 mg of standardized extract (Duke, 2002).
  severity: info
