id: trametes-versicolor
scientific_name: Trametes versicolor
common_names:
- Turkey tail
- Turkey tail mushroom
- many-zoned polypore
- yun zhi
family: Polyporaceae
parts_used:
- Mycelium
- Whole Plant
botanical_description:
  text: Bracket fungus (not a true plant) forming thin, tough, fan-shaped, overlapping shelves on dead
    or decaying hardwood, with a velvety, concentrically zoned upper surface in bands of brown, tan, cream,
    blue-grey and rust, and a white, minutely pored underside.
  height: Individual brackets 2-8 cm across, forming overlapping clusters
  habit: Bracket (shelf) fungus growing directly from dead wood, in tiered, overlapping clusters
  leaves: Not applicable (fungus); the fruiting body is a thin, tough bracket
  flowers: Not applicable (fungus); reproduces via spores released from pores on the underside
  stem: No true stem; the bracket attaches directly to the wood
  root: Not applicable; mycelium threads through the wood substrate
  fruit: Fan-shaped fruiting body (bracket) with a white, densely pored underside
  flowering_period: Fruiting bodies present year-round, most abundant in autumn
  status: draft
habitat:
  text: Grows on dead, dying or fallen hardwood logs, stumps and branches in woodlands worldwide, including
    Europe, Asia and North America.
  status: draft
harvesting:
  text: Fresh brackets are harvested by cutting from the wood; for medicinal use the tough fruiting body
    is typically dried and then decocted (simmered) for a long time, or extracted, since the beneficial
    polysaccharides are not well-extracted by simple infusion.
  parts:
  - Mycelium
  - Whole Plant
  season: Year-round, most abundant in autumn
  status: draft
traditional_uses:
  text: Turkey tail has a long history of use in traditional Chinese medicine (as yun zhi) and is one
    of the most researched medicinal mushrooms, with standardized polysaccharide-K (PSK) and polysaccharopeptide
    (PSP) extracts used clinically in Japan and China alongside conventional cancer treatment to support
    immune function.
  reference_ids:
  - REF-0052
  - REF-0282
  - REF-0300
  status: verified
preparations:
- name: Long decoction
  text: Dried fruiting body simmered in water for an extended period (often 1-2 hours) to extract the
    beta-glucan polysaccharides, then strained.
  reference_ids:
  - REF-0052
  status: verified
- name: Standardized extract (PSK/PSP)
  text: Standardized polysaccharide-K (PSK) or polysaccharopeptide (PSP) extract, the pharmaceutical-grade
    forms used in clinical research.
  reference_ids:
  - REF-0282
  status: verified
- name: Dual-extract tincture
  text: Combined alcohol/water (dual) extraction, used to capture both water-soluble polysaccharides and
    alcohol-soluble triterpenes.
  status: draft
dosage:
- name: Standardized extract
  text: Clinical research on PSK commonly uses around 3 g daily in divided doses. Educational reference
    only, not a prescription.
  reference_ids:
  - REF-0282
  status: verified
constituents:
- name: Beta-glucan polysaccharides
  compounds:
  - polysaccharide
  note: The principal immunomodulating constituents, forming the basis of PSK/PSP extracts.
  reference_ids:
