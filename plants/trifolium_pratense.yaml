contraindications:
- note: Generally safe in normal dietary amounts. Isoflavones are phytoestrogens — exercise caution in
    oestrogen-receptor-positive breast cancer patients or those taking hormone therapies. May interact
    with warfarin (antiplatelet activity). Avoid in pregnancy and breastfeeding. Well tolerated in most
    adults.
  severity: caution
  reference_ids:
  - REF-0013
  - REF-0036
  - REF-0112
  status: verified
- note: 'Duke (2002) rates red clover as +++ and provides clinical evidence (score 2) for estrogenic activity
    — the plant is one of the richest plant sources of isoflavones (formononetin, biochanin A, daidzein,
    genistein). Clinical applications include menopausal symptom relief, osteoporosis prevention, and
    cardiovascular protection in peri-menopausal women. Dose: standardized extract providing 40–160 mg
    isoflavones daily. Duke cautions that due to strong estrogenic activity, red clover is not recommended
    in estrogen-dependent cancers (breast, uterine) or alongside hormone replacement therapy without medical
    supervision. Anti-coagulant coumarins are also present (Duke, 2002).'
  severity: caution
  reference_ids:
  - REF-0013
  - REF-0036
  - REF-0112
  status: verified
