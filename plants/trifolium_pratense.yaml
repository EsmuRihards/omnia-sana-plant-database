drug_class_interactions:
- drug_class: hormonal-therapies
  severity: caution
  mechanism: Red clover is rich in isoflavones that act like weak oestrogens; its safety alongside hormone
    medicines (such as the contraceptive pill, HRT, or breast-cancer hormone treatments like tamoxifen)
    or in hormone-sensitive conditions is not established, so combined use warrants caution and medical
    advice.
