id: trifolium-pratense
scientific_name: Trifolium pratense
common_names:
- Red Clover
- meadow clover
- cow clover
family: Fabaceae
external_ids:
  gbif: 8324121
  wikidata: Q156635
parts_used:
- Flower
- Leaf
botanical_description:
  text: Short-lived perennial herb with trifoliate leaves, each leaflet oval and often marked with a pale
    chevron, arising from a spreading, slightly hairy stem. Dense, rounded, pink to magenta flower heads
    are borne at the stem tips.
  height: 20-60 cm
  habit: Short-lived perennial herb, spreading via a branching taproot
  leaves: Trifoliate, each leaflet oval with a pale chevron marking, slightly hairy
  flowers: Dense, rounded heads of small pink to magenta pea-like flowers
  stem: Slightly hairy, branching, spreading
  root: Branching taproot with nitrogen-fixing root nodules
  fruit: Small pod containing 1-2 seeds, enclosed within the dried flower head
  flowering_period: May-September
  reference_ids:
  - REF-0036
  status: verified
habitat:
  text: Grows in meadows, pastures, roadsides and grassy waste ground; native to Europe, western Asia
    and North Africa and widely naturalised and cultivated as a forage crop elsewhere.
  reference_ids:
  - REF-0036
  status: verified
harvesting:
  text: The flowering heads are picked at full bloom in summer and dried quickly in a warm, shaded, airy
    place to preserve isoflavone content and colour.
  parts:
  - Flower
  - Leaf
  season: Summer, at full bloom
  reference_ids:
  - REF-0036
  status: verified
traditional_uses:
  text: Red clover flower has a long folk tradition as a blood-purifying and expectorant remedy for coughs
    and skin complaints, and more recently has become one of the most studied herbal sources of isoflavone
    phytoestrogens, researched for menopausal symptom relief and cardiovascular and bone support.
  reference_ids:
  - REF-0013
  - REF-0036
  - REF-0112
  status: verified
preparations:
- name: Infusion (flower)
  text: Dried flower heads infused in hot water as a traditional tea for coughs and as a general tonic.
  reference_ids:
  - REF-0036
  status: verified
- name: Standardized isoflavone extract
  text: Standardized isoflavone extract in tablet form, the form used in most menopause-related clinical
    research.
  reference_ids:
  - REF-0013
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried flower.
  status: draft
dosage:
- name: Standardized extract
  text: Clinical research commonly uses around 40-80 mg isoflavones daily. Educational reference only,
    not a prescription.
  reference_ids:
  - REF-0013
  status: verified
constituents:
- name: Isoflavones (formononetin, biochanin A, daidzein, genistein)
  compounds:
  - flavonoid
  note: Phytoestrogenic isoflavones responsible for the plant's estrogenic and cardiovascular research
    interest; one of the richest known plant sources.
  reference_ids:
  - REF-0013
- name: Coumarins
  compounds:
  - coumarin
  note: Contribute mild anticoagulant activity; relevant to the plant's caution around blood-thinning
