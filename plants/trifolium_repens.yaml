contraindications:
- note: Generally very safe as a food and in moderate herbal use. Cyanogenic glucosides present in very
    small amounts — not significant in normal food or tea use. Isoflavones are phytoestrogens (as in red
    clover) — same precautions apply in hormone-sensitive conditions. Well tolerated by most people.
  severity: caution
  reference_ids:
  - REF-0027
  - REF-0098
  - REF-0140
  status: verified
- note: Duke (2002) does not include a dedicated entry for white clover (Trifolium repens) in the Handbook
    of Medicinal Herbs, Second Edition.
