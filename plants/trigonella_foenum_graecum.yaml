id: trigonella-foenum-graecum
scientific_name: Trigonella foenum-graecum
common_names:
- Fenugreek
- Bird’s foot
- goat’s horn
- Greek clover
- and alholva
family: Fabaceae
external_ids:
  gbif: 5360475
  wikidata: Q133205
parts_used:
- Leaf
- Seed
- Young sprouts
botanical_description:
  text: Erect annual herb with trifoliate leaves, each leaflet oblong and finely toothed toward the tip.
    Small, pale yellow to white, pea-like flowers are borne singly or in pairs in the leaf axils, followed
    by long, slender, curved seed pods.
  height: 30-80 cm
  habit: Erect annual herb
  leaves: Trifoliate, each leaflet oblong, finely toothed toward the tip
  flowers: Small, pale yellow to white, pea-like, borne singly or in pairs in leaf axils
  stem: Erect, branching, slightly hairy
  root: Taproot with nitrogen-fixing nodules
  fruit: Long, slender, curved seed pod (10-15 cm) containing 10-20 hard, angular, yellow-brown seeds
  flowering_period: May-June
  reference_ids:
  - REF-0308
  status: verified
habitat:
  text: Cultivated widely as a food and forage crop; native to the eastern Mediterranean and western Asia,
    now grown throughout South Asia, the Middle East and North Africa.
  reference_ids:
  - REF-0308
  status: verified
harvesting:
  text: Leaves and young sprouts are harvested throughout the growing season; seed pods are collected
    when fully mature and dried, then the hard seeds are threshed out.
  parts:
  - Leaf
  - Seed
  - Young sprouts
  season: Leaf/sprouts through growing season; seed at maturity
  reference_ids:
  - REF-0308
  status: verified
traditional_uses:
  text: Fenugreek seed has an ancient tradition across the Mediterranean, Middle East and South Asia as
    a digestive and appetite-stimulant remedy and lactation aid, and modern clinical research strongly
    supports its traditional use for blood sugar and cholesterol management, formalised in Commission
    E approval as an appetite stimulant.
  reference_ids:
  - REF-0148
  - REF-0182
  - REF-0308
  status: verified
preparations:
- name: Ground seed / seed tea
  text: Ground seeds taken with food, or whole seeds soaked/simmered as a tea, the traditional preparation
    for digestive and blood sugar support.
  reference_ids:
  - REF-0182
  status: verified
- name: Standardized extract (capsule)
  text: Standardized seed extract in capsule form, the form most used in clinical trials on blood sugar
    and cholesterol.
  reference_ids:
  - REF-0182
  status: verified
- name: Sprouted seed / leaf (food use)
  text: Young sprouts and leaves used as a leafy vegetable or salad green, milder in taste and effect
    than the seed.
  status: draft
dosage:
- name: Seed
  text: Clinical research and traditional sources suggest around 6-50 g of ground seed daily (higher end
    for blood sugar management), or 1-4 g in tea for digestive use. Educational reference only, not a
    prescription.
  reference_ids:
  - REF-0148
  - REF-0182
  status: verified
constituents:
- name: Steroidal saponins (diosgenin)
  compounds:
  - saponin
  note: Thought to contribute to the antidiabetic and cholesterol-lowering effects.
  reference_ids:
  - REF-0148
- name: Galactomannan (soluble fiber)
  compounds:
  - polysaccharide
  note: Mucilaginous soluble fiber that slows carbohydrate absorption, a key mechanism behind the blood-sugar-lowering
    effect.
  reference_ids:
  - REF-0182
- name: 4-hydroxyisoleucine (amino acid)
  note: An unusual amino acid studied for insulin-potentiating activity.
  reference_ids:
  - REF-0148
- name: Sotolon (flavor compound)
  note: Aromatic lactone responsible for fenugreek's characteristic maple-syrup smell, including the body-odor
    effect reported with supplementation.
  reference_ids:
  - REF-0308
