  reviewed_date: '2026-07-03'
- partner_id: nigella-sativa
  type: caution
  note: Fenugreek and black seed (Nigella sativa) can each lower blood sugar, so taking them together
    — especially alongside diabetes medicines — may add up and increase the risk of hypoglycaemia. Monitor
    your blood glucose.
  reference_ids:
