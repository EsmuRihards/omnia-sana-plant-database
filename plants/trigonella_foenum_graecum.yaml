drug_class_interactions:
- drug_class: antidiabetics
  severity: caution
  mechanism: Fenugreek seed lowers fasting and post-meal blood sugar (confirmed by a meta-analysis of
    randomised trials in type 2 diabetes and prediabetes), so taken with diabetes medicines it may add
    to their effect and increase the risk of hypoglycaemia; monitor blood glucose.
  reference_ids:
  - REF-2449
  - REF-2515
  status: approved
  reviewed_by: Omnia Sana (owner-authorized)
  reviewed_date: '2026-07-03'
pairings:
- partner_id: momordica-charantia
  type: caution
  note: Fenugreek and bitter melon can each lower blood sugar, so taking them together — especially alongside
    diabetes medicines — may add up and increase the risk of hypoglycaemia. Monitor your blood glucose.
  reference_ids:
  - REF-2515
  - REF-2528
  status: approved
