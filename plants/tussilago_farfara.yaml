botanical_description:
  text: 'Low perennial herb notable for flowering before its leaves appear: solitary, bright yellow, dandelion-like
    flower heads emerge on scaly pinkish stalks in very early spring, followed later by large, hoof-shaped
    (heart-shaped with angular teeth), white-woolly-backed leaves arising directly from the creeping rhizome.'
  height: 10-30 cm (flowering stalks); leaves slightly taller once expanded
  habit: Low perennial herb spreading by a creeping rhizome, flowers before leaves appear
  leaves: Hoof-shaped (heart-shaped with angular teeth), white-woolly underneath, appearing after flowering
  flowers: Solitary, bright yellow, dandelion-like heads on scaly pinkish stalks
  stem: Scaly, pinkish flowering stalks appearing before the leaves
  root: Creeping rhizome
  fruit: Small achene with a fluffy white pappus (like a small dandelion clock)
  flowering_period: February-April, before the leaves appear
  reference_ids:
  - REF-0252
  status: verified
habitat:
  text: Grows on disturbed, damp or clay-rich waste ground, riverbanks, railway embankments and bare soil;
    native to Europe, North Africa and temperate Asia and naturalised in North America.
  reference_ids:
  - REF-0252
  status: verified
harvesting:
  text: Flowers are gathered in very early spring before the leaves appear; leaves are gathered later
    in the season once expanded. Given the plant's pyrrolizidine alkaloid content, harvesting from a positively
    confirmed patch (not a look-alike) and preferring PA-tested commercial material for internal use is
    strongly advised.
  parts:
  - Flower
  - Leaf
  season: Flower in very early spring; leaf later in the growing season
  reference_ids:
  - REF-0068
  status: verified
traditional_uses:
  text: Coltsfoot has an ancient European and Chinese tradition, reflected in its Latin name (tussis =
    cough), as an expectorant and demulcent remedy for coughs, bronchitis and irritated airways; because
    of its pyrrolizidine alkaloid content, contemporary use is restricted to short courses of PA-controlled
    preparations under regulatory limits (see contraindications).
  reference_ids:
  - REF-0068
  - REF-0304
  status: verified
preparations:
- name: PA-controlled commercial extract
  text: Commercially prepared, pyrrolizidine-alkaloid-tested extract or syrup, the only form recommended
    for internal use given the plant's natural PA content.
  reference_ids:
  - REF-0068
  status: verified
- name: Infusion (short-term, traditional)
  text: Dried flower or leaf infused in hot water; traditional but subject to strict duration/PA-content
    limits under EU herbal regulation.
  reference_ids:
  - REF-0068
  status: verified
- name: Topical preparation
  text: Leaf used topically (e.g. poultice) on intact skin; EMA guidance still notes PA-exposure limits
    apply to topical products.
  reference_ids:
  - REF-0068
  status: verified
dosage:
- name: PA-controlled internal use
  text: EU regulatory guidance restricts internal use to PA-controlled preparations, generally not exceeding
    about 4-6 weeks per year; not for use in pregnancy, breastfeeding, or children. Educational reference
    only, not a prescription — consult a qualified practitioner and prefer tested commercial products.
  reference_ids:
  - REF-0068
  status: verified
constituents:
- name: Pyrrolizidine alkaloids (senkirkine, senecionine-type)
  compounds:
