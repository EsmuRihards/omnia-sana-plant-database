internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx). reference_ids are
  plant-level: the book lists parts and actions as flat, unmapped lists, so the full set of references cited
  for this plant is attached to each action rather than split per action. constituents not yet extracted —
  manual enrichment pending. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications split
  out, constituents linked to compounds). | 2026-06-20: enriched to >=10 scientific publications: added 10
  PubMed-verified @article sources (REF-0910, REF-0911, REF-0912, REF-0913, REF-0914, REF-0915, REF-0916,
  REF-0917, REF-0918, REF-0919) — woven into relevant actions/indications and the plant-level references
  bucket. | 2026-07-12: added monograph-base fields (botanical_description, habitat, harvesting,
  traditional_uses, preparations, dosage + constituents) sourced from the existing references bucket;
  general/undated claims marked status: draft per the integrity-first sourcing policy. | 2026-07-18
  (EMA-citation audit + dosage sourcing): the dosage entry was sourced to REF-0068, ''Assessment report on
  Tussilago farfara L., folium'' (EMA, 2007) - a document that could not be verified: Tussilago is entirely
  absent from the official EMA herbal medicines register (retrieved 2026-07-18) and the farfarae-folium /
  tussilaginis-folium medicine pages and candidate assessment-report PDFs all 404. There is no EMA monograph
  for Tussilago farfara and therefore no official posology for the herb. The underlying regulatory claim IS
  real but comes from a different document: the EMA public statement on unsaturated pyrrolizidine alkaloids,
  EMA/HMPC/893108/2011 Rev. 1 (now REF-3070), which names Tussilago and records the 1 microgram/day internal
  limit for a maximum of 6 weeks per year. The dosage entry was repointed REF-0068 -> REF-3070, its ''4-6
  weeks per year'' corrected to the stated 6 weeks, and it now says explicitly that these are PA-intake
  limits rather than a herb dose. REF-0068''s OTHER 20 uses on this plant are untouched and still need
  auditing - a PA safety document would not support most of them either. | 2026-07-18 (REF-0068 audit):
  REF-0068 AUDIT AND REMOVAL - completes the citation-integrity work from the EMA audit earlier this
  session. REF-0068 was recorded as ''Assessment report on Tussilago farfara L., folium'' (EMA, 2007). It
  could not be verified and has been removed: Tussilago is entirely absent from the official EMA herbal
  medicines register (251 rows, retrieved 2026-07-18), the medicine-page slugs farfarae-folium /
  tussilaginis-farfarae-folium / tussilago-farfara / farfarae-herba all 404, and no candidate
  assessment-report or monograph PDF resolves. There is no EMA monograph for coltsfoot and therefore no
  official posology for the herb. All 20 citations were re-sourced from this plant''s own literature rather
  than dropped, because 14 of them were co-cited only with REF-0252 - which is a POWO taxonomic record, and
  cannot support a therapeutic or safety claim - and 6 were sole-cited. Substitutes: REF-0911 (Zhao et al.,
  a review of the ethnobotanical value, phytochemistry, pharmacology, TOXICITY and QUALITY CONTROL of
  Tussilago farfara) carries the harvesting, preparation, constituent, traditional-use and pharmacology
  claims; REF-0910 (2025 Natural Product Research review) co-carries traditional use and constituents;
  REF-3070 (EMA public statement on unsaturated pyrrolizidine alkaloids, EMA/HMPC/893108/2011 Rev. 1)
  carries the PA-regulatory claims on the PA-controlled extract and topical preparations; and REF-0914
  (systematic review and quality assessment of adverse-event case reports for borage, coltsfoot and comfrey)
  was added to all 7 contraindications, which is a far better source for PA harm than the phantom ever was.
  ONE DEMOTION: the ''sedative'' action went verified -> needs-review. None of the substitutes confirms a
  sedative effect for coltsfoot, and after removing REF-0068 it would otherwise have rested on a taxonomic
  record plus a PA-content assay. It is left cited but flagged rather than silently kept at verified. The
  dosage entry was already repointed to REF-3070 during the audit and is unchanged. REF-0068 has been
  deleted from bibliography.bibtex and is gone from the public citation feed. SEPARATE PRE-EXISTING BUG
  FIXED HERE: common_names contained four junk entries - ''Kuan Dong Hua / Farfarae Flos (Chen et al'',
  ''2020'', ''Liu et al'', ''2020)'' - a citation string that an earlier ingest comma-split into list items.
  These surface publicly on the plant page, in the plant-name dictionary and in search. Repaired to the two
  real names, ''Kuan Dong Hua'' and ''Farfarae Flos''. Worth grepping other plants for the same
  split-citation pattern.'