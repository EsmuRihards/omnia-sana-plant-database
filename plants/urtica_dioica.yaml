- name: Phenolic acids
  compounds:
  - phenolic-acid
  note: Antioxidant phenolics found throughout the leaf.
  reference_ids:
  - REF-0050
- name: Sterols (beta-sitosterol) and lignans (root)
  compounds:
  - phytosterol
  - lignan
  note: Thought to underlie the root's traditional use for BPH-related urinary symptoms.
  reference_ids:
  - REF-0263
- name: Histamine, formic acid, acetylcholine (stinging hairs)
  note: The irritant compounds responsible for the fresh plant's sting; destroyed by cooking, drying or
    freeze-drying.
  reference_ids:
