contraindications:
- note: Fresh plant causes stinging skin reaction (formic acid, histamine). Once cooked, dried, or freeze-dried,
    this is eliminated. Root tincture may interact with diuretics, antihypertensives, and antidiabetic
    drugs. Generally very safe in culinary and standard medicinal use. Avoid very high doses in pregnancy.
  severity: caution
  reference_ids:
  - REF-0050
  - REF-0098
  - REF-0263
  status: verified
- note: 'Duke (2002) rates stinging nettle as +++ and provides clinical evidence (score 2) for antiprostatitic
    activity (BPH — benign prostatic hyperplasia), consistent with Commission E approval for irritative
    urination symptoms associated with BPH. Dose: 4–6 g dried herb daily or 600–1200 mg root extract.
    The root preparations are used for BPH while leaf preparations are used for antiallergic and anti-inflammatory
    purposes. Duke also notes experimental antiarthritic and analgesic activity. Generally safe; the most
    common adverse effect is mild gastrointestinal upset (Duke, 2002).'
  severity: info
  reference_ids:
  - REF-0050
  - REF-0098
  - REF-0263
  status: verified
