contraindications:
- note: Best supported for PREVENTION of recurrent UTIs, not for treating an active infection; an established
    UTI needs proper medical assessment and, usually, antibiotics.
  severity: info
  reference_ids:
  - REF-0389
  - REF-0391
  status: verified
- note: May interact with the anticoagulant warfarin (evidence is conflicting); people taking warfarin
    should be cautious and consult their clinician.
  severity: caution
  reference_ids:
  - REF-0391
  status: verified
- note: High in oxalates; people with a history of kidney stones should avoid large or prolonged intake.
    Many cranberry juices are also high in sugar.
  severity: caution
  reference_ids:
  - REF-0391
  status: verified
