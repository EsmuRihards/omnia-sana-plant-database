drug_class_interactions:
- drug_class: anticoagulants-antiplatelets
  severity: caution
  mechanism: Regularly drinking large amounts of cranberry juice has been linked to raised INR and bleeding
    in people taking warfarin, and UK drug-safety authorities advise caution; occasional small amounts
    are unlikely to matter. If you take a blood thinner, keep cranberry intake modest and steady and tell
    your clinician.
  reference_ids:
