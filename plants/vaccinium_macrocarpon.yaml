id: vaccinium-macrocarpon
scientific_name: Vaccinium macrocarpon
common_names:
- American Cranberry
- Cranberry
- Large cranberry
- Bearberry
family: Ericaceae
external_ids:
  gbif: 2882841
  wikidata: Q149397
parts_used:
- Fruit (berry)
constituents:
- name: A-type proanthocyanidins (PACs)
  compounds:
  - proanthocyanidin
  note: The constituents responsible for the anti-adhesion effect against uropathogenic E. coli.
  reference_ids:
  - REF-0390
- name: Flavan-3-ols, anthocyanins and other flavonoids
  compounds:
  - anthocyanin
  - phenolic-compound
  - flavonoid
  note: Antioxidant polyphenols of the berry.
  reference_ids:
  - REF-0390
- name: Phenolic acids and organic acids (quinic, malic, citric)
  compounds:
  - phenolic-acid
  note: Contribute to the acidity and antioxidant capacity.
  reference_ids:
  - REF-0390
- name: Oxalates
  note: Present in relatively high amounts; relevant to kidney-stone risk.
  reference_ids:
  - REF-0391
botanical_description:
  text: Low, trailing, evergreen woody vine with small, wiry stems and small, oval, leathery leaves. Small,
    pink, four-petalled flowers with reflexed petals give way to round to oblong, tart red berries.
  height: 5-20 cm (trailing vine, stems can spread 1-2 m)
  habit: Low, trailing, evergreen woody vine
  leaves: Small, oval, leathery, dark green above and pale beneath
  flowers: Small, pink, four-petalled with reflexed (swept-back) petals
  stem: Wiry, trailing, rooting at nodes
  root: Shallow, fibrous root system
  fruit: Round to oblong, tart, red berry
  flowering_period: May-July
  status: draft
habitat:
  text: Grows in acidic bogs, wetlands and sandy peat soils; native to North America and now widely cultivated
    commercially, especially in flooded bogs.
  status: draft
harvesting:
  text: Berries are harvested in autumn when fully red, either dry-picked or by flooding the bog so the
    berries float (wet harvest) for collection.
  parts:
  - Fruit (berry)
  season: Autumn
  status: draft
traditional_uses:
  text: Cranberry has a long Native American and North American folk tradition as a food and remedy for
    urinary complaints, an association now well supported by modern research showing its A-type proanthocyanidins
    prevent E. coli from adhering to the urinary tract lining, making it most useful for prevention of
    recurrent UTIs rather than treatment of an active infection.
  reference_ids:
  - REF-0389
  status: verified
preparations:
- name: Juice
  text: Unsweetened or lightly sweetened cranberry juice, taken regularly as a traditional and modern
    preventive measure for recurrent UTIs.
  reference_ids:
  - REF-0389
  status: verified
- name: Standardized tablet/capsule
  text: Standardized proanthocyanidin (PAC) extract in tablet or capsule form, used for UTI prevention
    in clinical research.
  reference_ids:
  - REF-0389
  status: verified
dosage:
- name: Juice/extract
  text: Clinical research commonly uses around 36 mg PAC daily (standardized extract) or 240-300 mL unsweetened
    juice daily for UTI prevention. Educational reference only, not a prescription.
  reference_ids:
  - REF-0389
  status: verified
actions:
