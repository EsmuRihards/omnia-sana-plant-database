traditional_uses:
  text: Bilberry has a long European folk tradition as a food and remedy for diarrhoea, eye strain and
    circulatory complaints, with dried berry and standardized anthocyanin extracts studied for cardiovascular
    and metabolic support; claims of improved night vision in people with normal eyesight are not supported
    by rigorous clinical trials.
  reference_ids:
