botanical_description:
  text: Low, deciduous, much-branched shrub with sharply angled green stems and small, oval, finely toothed
    leaves. Small, pinkish-green, globe-shaped flowers are borne singly or in pairs, giving way to single,
    dark blue-black berries with a distinctive crowned top.
  height: 15-50 cm
  habit: Low, deciduous, much-branched shrub
  leaves: Small, oval, finely toothed, bright green, turning red in autumn
  flowers: Small, pinkish-green, globe-shaped, borne singly or in pairs
  stem: Sharply angled (winged), green, much-branched
  root: Shallow, spreading rhizome
  fruit: Single dark blue-black berry with a small crowned top, red-purple staining flesh
  flowering_period: April-June
