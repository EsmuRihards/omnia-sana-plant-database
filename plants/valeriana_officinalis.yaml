contraindications:
- note: Generally well tolerated for short-to-medium term use. May cause vivid dreams, morning grogginess,
    or headache in some individuals. Avoid combining with alcohol, sedatives, or anaesthetics. Do not
    drive immediately after taking high doses. Do not use in children under 3 years. Abrupt discontinuation
    after long-term use may cause withdrawal symptoms.
  severity: caution
  reference_ids:
  - REF-0025
  - REF-0091
  - REF-0112
  status: verified
- note: 'Duke (2002) does not appear to include a primary entry for Valeriana officinalis (European valerian)
    in the sections searched. The entry found was for Indian valerian (Valeriana jatamansi). Commission
    E approves European valerian for restlessness and sleep disorders. Dose: 400–900 mg standardized root
    extract before bedtime. Interactions include potentiation of CNS depressants and sedatives.'
  severity: caution
