botanical_description:
  text: Tall, upright perennial herb with hollow, grooved stems and opposite, pinnately divided leaves.
    Small, pale pink to white, sweetly scented flowers are borne in dense, domed clusters (cymes) at the
    top of the stem; the dried root has a distinctive strong, earthy, 'dirty sock' smell.
  height: 1-1.5 m
  habit: Tall, upright perennial herb
  leaves: Opposite, pinnately divided into toothed leaflets
  flowers: Small, pale pink to white, sweetly scented, in dense domed cymes
  stem: Hollow, grooved, upright, unbranched below the flower head
  root: Short rhizome with numerous fibrous roots, strongly aromatic when dried
  fruit: Small achene with a feathery pappus
  flowering_period: June-August
  reference_ids:
  - REF-0112
  status: verified
habitat:
  text: Grows in damp meadows, ditches, riverbanks and marshy ground, tolerating both sun and partial
    shade; native to Europe and parts of Asia and naturalised in North America.
  reference_ids:
  - REF-0112
  status: verified
harvesting:
  text: The rhizome and roots are dug in autumn of the second year, once the strong characteristic aroma
    has developed, then cleaned and dried.
  parts:
  - Rhizome
  - Root
  season: Autumn (second year)
  reference_ids:
  - REF-0112
  status: verified
traditional_uses:
  text: Valerian root has a long European tradition, formalised in Commission E approval, as a sedative
    and mild anxiolytic for restlessness and sleep disorders, and as an antispasmodic for menstrual cramps
    and muscle spasm; modern systematic reviews support a modest benefit for sleep quality.
  reference_ids:
  - REF-0025
  - REF-0091
  - REF-0112
  status: verified
preparations:
- name: Standardized root extract (capsule/tablet)
  text: Standardized root extract taken shortly before bedtime, the form most used in clinical research.
  reference_ids:
  - REF-0025
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried root, typically 1:5.
  status: draft
- name: Decoction/infusion
  text: Dried root simmered briefly in water or infused, though the strong smell and taste make extracts
    more commonly used.
  status: draft
dosage:
- name: Standardized extract
  text: Commission E and clinical research commonly suggest around 400-900 mg standardized root extract
    taken 30-60 minutes before bedtime. Educational reference only, not a prescription.
  reference_ids:
  - REF-0112
  status: verified
constituents:
- name: Valerenic acid and valerenal
  compounds:
