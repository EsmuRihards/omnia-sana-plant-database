botanical_description:
  text: Tall, stately biennial herb, very similar to great mullein, forming a low first-year rosette of
    large, thick, woolly grey-green leaves; the second-year flowering spike bears densely packed, large
    bright yellow flowers, generally more densely and showily flowered than V. thapsus.
  height: 1-2 m (flowering stem, second year)
  habit: Tall, biennial herb; woolly basal rosette in year one, dense tall flowering spike in year two
  leaves: Large, thick, woolly grey-green, entire to faintly scalloped margin
  flowers: Densely packed, large, bright yellow, five-petalled, along a tall unbranched spike
  stem: Single, tall, unbranched, woolly flowering stem (second year only)
  root: Stout taproot
  fruit: Small capsule with numerous tiny seeds
  flowering_period: June-September (second year)
  reference_ids:
  - REF-0441
  status: verified
habitat:
  text: Grows on dry, sunny waste ground, roadsides and disturbed soil; native to Europe and western Asia.
  reference_ids:
  - REF-0441
  status: verified
harvesting:
  text: The flowers (Verbasci flos) are picked individually as they open through summer, since they open
    only a few at a time and fade quickly, then dried promptly to preserve colour and mucilage content.
  parts:
  - Flower (Verbasci flos)
  season: Summer, as flowers open
  reference_ids:
  - REF-0441
  status: verified
traditional_uses:
  text: Together with great mullein and V. phlomoides, dense-flowered mullein flower is officially recognised
    in the EU herbal monograph and ESCOP monograph as a traditional demulcent and mild expectorant for
    cough and cold with sore throat, used to soothe irritated mucous membranes of the upper respiratory
    tract.
  reference_ids:
  - REF-0441
  - REF-0442
  status: verified
preparations:
- name: Infusion (flower)
  text: Dried flower infused in hot water, carefully strained to remove fine hairs, as the standard traditional
    preparation for cough and sore throat.
  reference_ids:
  - REF-0441
  - REF-0442
  status: verified
- name: Infused oil (flower, earache)
  text: Flowers infused in oil, traditionally used (often combined with other herbs) as ear drops for
    earache.
  reference_ids:
  - REF-0442
  status: verified
dosage:
- name: Infusion
  text: The EU herbal monograph suggests around 1.5-2 g of dried flower per cup, up to three times daily,
    in adults and adolescents over 12 years. Educational reference only, not a prescription.
  reference_ids:
  - REF-0441
  status: verified
