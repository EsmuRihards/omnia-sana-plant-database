id: verbascum-thapsus
scientific_name: Verbascum thapsus
common_names:
- Great Mullein
- common mullein
- Aaron's rod
- flannel leaf
- velvet plant
family: Scrophulariaceae
external_ids:
  gbif: 3171949
  wikidata: Q160095
parts_used:
- Flower
- Leaf
botanical_description:
  text: Tall, stately biennial herb forming a low first-year rosette of large, soft, thick, densely woolly
    grey-green leaves; in the second year it sends up a single, tall, unbranched flowering spike densely
    packed with bright yellow, five-petalled flowers that open a few at a time.
  height: 1-2 m (flowering stem, second year)
  habit: Tall, biennial herb; woolly basal rosette in year one, single tall flowering spike in year two
  leaves: Large, soft, thick, densely woolly grey-green, entire to faintly scalloped margin
  flowers: Bright yellow, five-petalled, densely packed along a tall unbranched spike
  stem: Single, tall, unbranched, woolly flowering stem (second year only)
  root: Stout taproot
  fruit: Small capsule with numerous tiny seeds
  flowering_period: June-September (second year)
  reference_ids:
  - REF-1123
  status: verified
habitat:
  text: Grows on dry, sunny waste ground, roadsides, disturbed soil and rocky slopes; native to Europe,
    North Africa and Asia and widely naturalised in North America and elsewhere.
  reference_ids:
  - REF-1123
  status: verified
harvesting:
  text: The flowers are picked individually as they open through summer (since they open only a few at
    a time and quickly fade once picked); leaves are gathered from the first-year rosette or second-year
    plant and dried, with care to filter out the fine leaf hairs, which can irritate the throat if not
    strained from tea.
  parts:
  - Flower
  - Leaf
  season: Flowers through summer as they open; leaf from rosette or flowering plant
  reference_ids:
  - REF-1123
  status: verified
traditional_uses:
  text: Great mullein has a long European and Native American tradition as a soothing demulcent and expectorant
    remedy for cough, bronchitis and irritated airways, and the flower has also been infused in oil as
    a traditional remedy for earache; the soft, woolly leaf gave rise to old names like 'flannel leaf'
    and 'velvet plant'.
  reference_ids:
  - REF-1123
  - REF-1124
  status: verified
preparations:
- name: Infusion (flower or leaf)
  text: Dried flower or leaf infused in hot water and carefully strained (to remove fine irritant hairs)
    as a traditional demulcent cough and respiratory tea.
  reference_ids:
  - REF-1123
  status: verified
- name: Infused oil (flower, earache)
  text: Fresh flowers infused in oil, traditionally warmed and used as ear drops for earache.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried flower or leaf, carefully filtered.
  status: draft
dosage:
- name: Infusion
  text: The EU herbal monograph gives 1.5-2 g of the flower in 150 mL of boiling water as an infusion,
    three to four times daily (daily dose 4.5-8 g), in adolescents, adults and elderly; the infusion should
    be carefully strained to remove the irritant hairs. The monograph covers the FLOWER (Verbasci flos)
    only — it gives no posology for the leaf. Not recommended under 12 years. Educational reference only,
    not a prescription.
  reference_ids:
  - REF-0441
  status: verified
constituents:
- name: Iridoid glycosides (aucubin, catalpol)
  compounds:
  - iridoid-glycoside
  - glycoside
  note: Anti-inflammatory iridoids contributing to the plant's traditional respiratory and anti-inflammatory
    use.
  reference_ids:
