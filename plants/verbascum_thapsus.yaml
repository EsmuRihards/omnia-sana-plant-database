contraindications:
- note: Generally considered safe for short-term use. The tiny hairs on the leaves can cause irritation
    if tea is not properly filtered. No significant drug interactions documented. Not recommended during
    pregnancy or breastfeeding due to lack of safety data.
  severity: caution
  reference_ids:
  - REF-0186
  - REF-0254
  - REF-0289
  status: verified
- note: 'Duke (2002) rates mullein as ++ with clinical evidence (score 2) for its expectorant activity,
    consistent with Commission E approval for catarrh and inflammation of the respiratory tract. It functions
    as a demulcent and emollient for mucous membranes. Traditionally used for bronchitis, asthma, and
    earaches (oil infusion). Dose: 1.5–2 g dried flower or leaf as tea, three to four times daily. Duke
    notes an antiviral (antiherpetic) activity at the experimental level. The plant is generally well-tolerated
    with no known significant contraindications at therapeutic doses (Duke, 2002).'
  severity: caution
  reference_ids:
