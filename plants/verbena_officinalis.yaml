botanical_description:
  text: Slender, upright perennial herb with wiry, square, sparsely hairy stems and deeply lobed, toothed
    leaves. Tiny, pale lilac to pale purple, five-lobed flowers are borne sparsely along thin, wiry spikes
    at the ends of the branches, opening a few at a time.
  height: 30-90 cm
  habit: Slender, upright, wiry-stemmed perennial herb
  leaves: Deeply lobed, toothed, opposite
  flowers: Tiny, pale lilac to pale purple, five-lobed, sparsely arranged along thin wiry spikes
  stem: Wiry, square, sparsely hairy, branching
  root: Fibrous rootstock
  fruit: Small nutlet, splitting into four when ripe
  flowering_period: June-September
  reference_ids:
  - REF-0523
  status: verified
habitat:
  text: Grows on dry waste ground, roadsides, field margins and disturbed soil; native to Europe, North
    Africa and temperate Asia and widely naturalised elsewhere.
  reference_ids:
  - REF-0523
  status: verified
harvesting:
  text: The flowering aerial parts are cut in summer as the plant comes into flower and dried in a warm,
    shaded, airy place.
  parts:
