botanical_description:
  text: Slender, upright perennial herb with wiry, square, sparsely hairy stems and deeply lobed, toothed
    leaves. Tiny, pale lilac to pale purple, five-lobed flowers are borne sparsely along thin, wiry spikes
    at the ends of the branches, opening a few at a time.
  height: 30-90 cm
  habit: Slender, upright, wiry-stemmed perennial herb
  leaves: Deeply lobed, toothed, opposite
  flowers: Tiny, pale lilac to pale purple, five-lobed, sparsely arranged along thin wiry spikes
  stem: Wiry, square, sparsely hairy, branching
  root: Fibrous rootstock
  fruit: Small nutlet, splitting into four when ripe
  flowering_period: June-September
  reference_ids:
  - REF-0522
  status: verified
habitat:
  text: Grows on dry waste ground, roadsides, field margins and disturbed soil; native to Europe, North
    Africa and temperate Asia and widely naturalised elsewhere.
  reference_ids:
  - REF-0522
  status: verified
harvesting:
  text: The flowering aerial parts are cut in summer as the plant comes into flower and dried in a warm,
    shaded, airy place.
  parts:
  - Aerial parts (flowering herb)
  season: Summer, at flowering
  reference_ids:
  - REF-0522
  status: verified
traditional_uses:
  text: Vervain has an ancient European reputation, reflected in its old names 'holy herb' and 'herb of
    the cross', as a calming nervine for nervous tension, anxiety and sleeplessness, and as a bitter digestive
    tonic; it has also traditionally been used topically and internally for aches, pains and mild inflammation.
  reference_ids:
  - REF-0522
  status: verified
preparations:
- name: Infusion
  text: Dried flowering herb infused in hot water as a traditional calming, digestive tea.
  reference_ids:
  - REF-0522
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried flowering herb.
  status: draft
dosage:
- name: Infusion
  text: Traditional herbal references suggest around 1.5-3 g of dried herb per cup, up to three times
    daily. Educational reference only, not a prescription.
  status: draft
