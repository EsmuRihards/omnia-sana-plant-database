internal_notes: 'Enriched 2026-06-12 from regulatory and scientific literature (EMA HMPC monograph for
  Verbenae herba; Planta Medica review). Originally a skeleton imported from the omniasana.bio Symptom-to-Plant
  Lookup tool (anxiety, insomnia, nervous-tension, inflammation, depression); associations retained and
  now part-mapped and cited. Further enriched 2026-06-14 with a PubMed-sourced study showing Verbena officinalis
  crude extract has anxiolytic, sedative and anticonvulsant activity in rodent models (REF-0616), supporting
  the nervine action mechanistically. | 2026-06-15: migrated to entity schema (actions->vocab ids, indications
  split out, constituents linked to compounds).'
