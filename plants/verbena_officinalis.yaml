common_names:
- Vervain
- Common vervain
- Holy herb
- Herb of the cross
scientific_name: Verbena officinalis
family: Verbenaceae
parts_used:
- name: Aerial parts (flowering herb)
  medicinal_actions:
  - action: Nervine / anxiolytic for nervous tension and mild anxiety; supports sleep (traditional)
    reference_ids:
    - REF-0523
    - REF-0522
    status: verified
  - action: Mild mood support / antidepressant (traditional)
    reference_ids:
    - REF-0523
    status: needs-review
  - action: Anti-inflammatory and analgesic
    reference_ids:
    - REF-0523
    status: verified
  - action: Digestive bitter and relief of mild mental stress
    reference_ids:
    - REF-0522
    status: needs-review
constituents:
- name: Iridoid glycosides (verbenalin, hastatoside)
  note: Characteristic constituents; verbenalin has a dopaminergic effect.
  reference_ids:
  - REF-0523
  - REF-0522
- name: Phenylpropanoid glycosides (verbascoside/acteoside)
  note: Antioxidant and anti-inflammatory constituents.
  reference_ids:
  - REF-0523
- name: Flavonoids, phenolic acids and essential oil
  note: Supporting antioxidant and aromatic constituents.
  reference_ids:
  - REF-0523
contraindications:
- note: Generally well tolerated in traditional use. Avoid during pregnancy - vervain has a traditional
    uterine-stimulant (oxytocic) reputation linked to verbenalin.
  reference_ids:
  - REF-0522
  - REF-0523
  status: verified
- note: May add to the effect of sedatives; use in breastfeeding is not recommended in the absence of
    data.
  reference_ids:
  - REF-0522
  status: needs-review
