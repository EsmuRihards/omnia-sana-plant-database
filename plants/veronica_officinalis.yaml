common_names:
- Speedwell
- Common speedwell
- Heath speedwell
- Gypsyweed
scientific_name: Veronica officinalis
family: Plantaginaceae
parts_used:
- name: Aerial parts (flowering herb)
  medicinal_actions:
  - action: Traditional expectorant for cough and respiratory complaints (iridoid glycosides inhibit lung
      inflammation) - a standardised extract suppressed COX-2 and eotaxin via the NF-kB pathway in human
      lung epithelial cells
    reference_ids:
    - REF-0513
    - REF-0514
    - REF-0632
    status: needs-review
  - action: Mild digestive / stomach tonic (indigestion)
    reference_ids:
    - REF-0514
    status: needs-review
  - action: Soothing for skin irritation (topical)
    reference_ids:
    - REF-0514
    status: needs-review
  - action: Anti-inflammatory and antioxidant
    reference_ids:
    - REF-0513
    status: verified
constituents:
- name: Iridoid glycosides (aucubin, catalpol, verproside, verminoside)
  note: Anti-inflammatory constituents that inhibit pro-inflammatory mediators in lung cells.
  reference_ids:
  - REF-0513
- name: Flavonoids and phenolic acids
  note: Antioxidant constituents.
  reference_ids:
  - REF-0513
contraindications:
- note: Traditional use only; clinical evidence is limited, so a persistent cough or digestive complaint
    needs medical assessment. Safety in pregnancy and breastfeeding is not established.
  reference_ids:
  - REF-0514
  status: needs-review
- note: 'Buy from a reputable source: Veronica officinalis is frequently adulterated with the related
    Veronica chamaedrys.'
  reference_ids:
  - REF-0513
  status: verified
internal_notes: Enriched 2026-06-12 from scientific and general literature (Frontiers in Pharmacology
  authentication/phytochemistry study; HerbaZest monograph). Speedwell is poorly covered by clinical trials,
  so most actions are needs-review. Originally a skeleton imported from the omniasana.bio Symptom-to-Plant
  Lookup tool (cough, indigestion, skin-irritation); associations retained and now part-mapped and cited.
  Further enriched 2026-06-14 with a PubMed-sourced study showing a standardised Veronica officinalis extract
  inhibits proinflammatory mediators (COX-2, eotaxin) via NF-kB in a human lung cell line (REF-0632), giving
  a molecular rationale for the traditional respiratory use.
last_updated: '2026-06-14'
status: verified
