id: viburnum-opulus
scientific_name: Viburnum opulus
common_names:
- Cramp Bark
- Guelder rose
- Snowball tree
- High cranberry
family: Adoxaceae
parts_used:
- Bark (stem bark)
constituents:
- name: Coumarins (scopoletin)
  compounds:
  - coumarin
  note: A principal antispasmodic constituent of the bark. A phytochemistry/biological-effects review
    documents the species' antioxidant, anti-inflammatory and antimicrobial activity and its traditional
    use for cramps and colds.
  reference_ids:
  - REF-0439
  - REF-0610
- name: Viopudial and hydroquinones (arbutin)
  note: Contribute to the smooth-muscle-relaxant and astringent activity.
  reference_ids:
  - REF-0439
  - REF-0440
- name: Tannins
  compounds:
  - tannin
  note: Astringent constituents.
  reference_ids:
  - REF-0439
actions:
- action: analgesic
  note: Mild analgesic for cramping pain
  reference_ids:
  - REF-0439
  status: needs-review
- action: antispasmodic
  note: Antispasmodic for general muscle spasm and cramping (smooth-muscle relaxant); Antispasmodic for
    menstrual cramps (relaxes uterine smooth muscle)
  reference_ids:
  - REF-0439
  - REF-0440
  - REF-0610
  status: verified
indications:
- condition: back-pain
  evidence: 2
  note: inferred from analgesic action
  reference_ids:
  - REF-0439
  status: needs-review
- condition: headache
  evidence: 2
  note: inferred from analgesic action
  reference_ids:
  - REF-0439
  status: needs-review
- condition: menstrual-cramps
  evidence: 3
  note: Antispasmodic for menstrual cramps (relaxes uterine smooth muscle)
  reference_ids:
  - REF-0439
  - REF-0440
  - REF-0610
  status: verified
- condition: muscle-spasm
  evidence: 3
  note: Antispasmodic for general muscle spasm and cramping (smooth-muscle relaxant)
  reference_ids:
  - REF-0439
  status: verified
- condition: pain
  evidence: 2
  note: Mild analgesic for cramping pain
  reference_ids:
  - REF-0439
  status: needs-review
contraindications:
- note: Only the bark is used medicinally; the raw berries are toxic and cause stomach upset, vomiting
    and diarrhoea if eaten in quantity.
  severity: info
  reference_ids:
  - REF-0440
  - REF-0439
  status: verified
- note: Human safety data are limited; medicinal use in pregnancy or breastfeeding should only be under
    the guidance of a qualified practitioner.
  severity: caution
  reference_ids:
  - REF-0439
  status: needs-review
provenance: website+pubmed+symptom-tool
status: verified
