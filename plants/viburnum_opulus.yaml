id: viburnum-opulus
scientific_name: Viburnum opulus
common_names:
- Cramp Bark
- Guelder rose
- Snowball tree
- High cranberry
family: Adoxaceae
parts_used:
- Bark (stem bark)
constituents:
- name: Coumarins (scopoletin)
  compounds:
  - coumarin
  note: A principal antispasmodic constituent of the bark. A phytochemistry/biological-effects review
    documents the species' antioxidant, anti-inflammatory and antimicrobial activity and its traditional
    use for cramps and colds.
  reference_ids:
  - REF-0439
  - REF-0610
- name: Viopudial and hydroquinones (arbutin)
  note: Contribute to the smooth-muscle-relaxant and astringent activity.
  reference_ids:
  - REF-0439
  - REF-0440
- name: Tannins
  compounds:
  - tannin
  note: Astringent constituents.
  reference_ids:
  - REF-0439
  - REF-1133
botanical_description:
  text: Deciduous shrub with maple-like, three-lobed, toothed leaves that turn red in autumn. Flat-topped
    clusters of white flowers are borne in late spring, the outer ring of larger, showy sterile flowers
    surrounding smaller fertile ones, followed by translucent red berries in autumn.
  height: 2-4 m
  habit: Deciduous shrub
  leaves: Maple-like, three-lobed, toothed, turning red in autumn
  flowers: Flat-topped clusters of white flowers, with showy sterile outer flowers ringing smaller fertile
    ones
  stem: Multiple woody stems; the medicinal bark is stripped from branches
  root: Woody root system
  fruit: Translucent red berry, toxic raw in quantity, not used medicinally
  flowering_period: May-June
  reference_ids:
  - REF-0439
  status: verified
habitat:
  text: Grows in hedgerows, woodland margins, damp scrub and riverbanks on moist, often calcareous soils;
    native to Europe, North Africa and temperate Asia.
  reference_ids:
  - REF-0439
  status: verified
harvesting:
  text: The bark is stripped from branches (not the main trunk) in spring or autumn, avoiding girdling
    any single branch, then dried.
  parts:
  - Bark (stem bark)
  season: Spring or autumn
  status: draft
traditional_uses:
  text: Cramp bark has a long European and North American folk reputation, reflected in its common name,
    as an antispasmodic remedy for muscle cramps, menstrual cramps and general smooth-muscle spasm, acting
    as a relaxant on both skeletal and uterine muscle.
  reference_ids:
  - REF-0439
  status: verified
preparations:
- name: Decoction
  text: Dried bark simmered in water as the traditional antispasmodic preparation.
  reference_ids:
  - REF-0439
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried bark, typically around 1:5.
  status: draft
dosage:
- name: Decoction/tincture
  text: Traditional herbal references suggest around 1-2 g of dried bark per cup, or 2-4 mL of a 1:5 tincture,
    up to three times daily. Educational reference only, not a prescription.
  status: draft
actions:
- action: analgesic
  note: Mild analgesic for cramping pain
  reference_ids:
  - REF-0439
  - REF-1139
  status: needs-review
- action: antispasmodic
  note: Antispasmodic for general muscle spasm and cramping (smooth-muscle relaxant); Antispasmodic for
    menstrual cramps (relaxes uterine smooth muscle)
  reference_ids:
  - REF-0439
  - REF-0440
  - REF-0610
  status: verified
indications:
- condition: back-pain
  note: inferred from analgesic action
  reference_ids:
  - REF-0439
  status: needs-review
- condition: headache
  note: inferred from analgesic action
  reference_ids:
  - REF-0439
  status: needs-review
- condition: menstrual-cramps
  note: Antispasmodic for menstrual cramps (relaxes uterine smooth muscle)
  reference_ids:
  - REF-0439
  - REF-0440
  - REF-0610
  - REF-1140
  status: verified
- condition: muscle-spasm
  note: Antispasmodic for general muscle spasm and cramping (smooth-muscle relaxant)
  reference_ids:
  - REF-0439
  status: verified
- condition: pain
  note: Mild analgesic for cramping pain
  reference_ids:
  - REF-0439
  status: needs-review
contraindications:
- note: Only the bark is used medicinally; the raw berries are toxic and cause stomach upset, vomiting
    and diarrhoea if eaten in quantity.
  severity: info
  reference_ids:
  - REF-0440
  - REF-0439
  status: verified
- note: Human safety data are limited; medicinal use in pregnancy or breastfeeding should only be under
    the guidance of a qualified practitioner.
  severity: caution
  reference_ids:
  - REF-0439
  status: needs-review
