internal_notes: 'Enriched 2026-06-12 from general phytotherapy literature (Herbal Reality monograph; ScienceDirect
  overview). Viburnum opulus is poorly covered by clinical trials, so some actions remain needs-review.
  Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool (menstrual-cramps,
  muscle-spasm, pain); associations retained and now part-mapped and cited. Further enriched 2026-06-14
  with a PubMed-sourced phytochemistry and biological-effects review of Viburnum opulus (REF-0610) supporting
  the constituent profile and its antioxidant/anti-inflammatory activity; clinical trial data remain limited.
