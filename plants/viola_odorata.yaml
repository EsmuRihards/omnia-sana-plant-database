contraindications:
- note: Generally well tolerated as flower/leaf preparations. It contains salicylates, so use caution
    if you are salicylate-sensitive; the root in large doses is emetic and purgative.
  severity: caution
  reference_ids:
  - REF-0517
  - REF-0518
  status: verified
- note: Safety in pregnancy and breastfeeding is not established, so avoid medicinal doses.
