botanical_description:
  text: Low, spreading perennial herb with heart-shaped, softly toothed leaves arising from a short rootstock,
    spreading by runners (stolons). Fragrant, deep violet-purple (occasionally white) flowers with five
    petals, the lower petal spurred, are borne singly on slender stalks.
  height: 5-15 cm
  habit: Low, spreading perennial herb, spreading by runners
  leaves: Heart-shaped, softly toothed
  flowers: Fragrant, deep violet-purple (occasionally white), five-petalled, the lower petal spurred,
    borne singly
  stem: Very short; leaves and flowers arise from a basal rootstock, spreading by stolons
  root: Short rootstock with spreading runners
  fruit: Small three-valved capsule
  flowering_period: February-April (with a lighter second flush in autumn)
  reference_ids:
  - REF-0517
  status: verified
habitat:
  text: Grows in woodland edges, hedgerows, shaded banks and gardens on moist, humus-rich soils; native
    to Europe, North Africa and Asia and widely naturalised and cultivated elsewhere.
  reference_ids:
  - REF-0517
  status: verified
harvesting:
  text: Flowers are picked as they open in early spring; leaves can be gathered through the growing season
    and dried.
  parts:
  - Flower and leaf (aerial parts)
  season: Flower in early spring; leaf through the growing season
  reference_ids:
  - REF-0517
  status: verified
traditional_uses:
  text: Sweet violet flower and leaf have a long European folk history as a soothing demulcent and expectorant
    remedy for cough, bronchitis and catarrh, and as a mild sedative for sleeplessness and headache; the
    flower syrup in particular has a long tradition as a children's cough remedy.
  reference_ids:
  - REF-0517
  status: verified
preparations:
- name: Syrup (flower)
  text: Fresh flowers infused and combined with sugar syrup as a traditional soothing cough remedy, particularly
    for children.
  reference_ids:
  - REF-0609
  status: verified
- name: Infusion
  text: Dried flower or leaf infused in hot water as a traditional demulcent, calming tea.
  reference_ids:
  - REF-0517
  status: verified
- name: Tincture
  text: Alcoholic extract of the dried flower and leaf.
  status: draft
dosage:
- name: Infusion/syrup
  text: Traditional herbal references suggest around 2-4 g of dried flower and leaf per cup, up to three
    times daily; syrup dosed per product labelling. Educational reference only, not a prescription.
  status: draft
