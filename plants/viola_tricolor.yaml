id: viola-tricolor
scientific_name: Viola tricolor
common_names:
- Heartsease
- Wild pansy
- Johnny-jump-up
- Love-in-idleness
family: Violaceae
external_ids:
  gbif: 5331347
  wikidata: Q190326
parts_used:
- Aerial parts (flowering herb)
constituents:
- name: Cyclotides (cyclic plant peptides)
  note: Bioactive cyclic peptides shown to suppress over-active immune (T-cell) responses - the rationale
    for use in inflammatory skin disease; the cytotoxic cyclotides vitri A, varv A and varv E have been
    isolated from V. tricolor. Cyclotide-enriched preparations (including hot-water decoctions) reduce
    T-cell proliferation and macrophage cytokine output in vitro, of interest for inflammatory bowel disease.
  reference_ids:
  - REF-0463
  - REF-0556
  - REF-0617
- name: Flavonoids (rutin, violanthin), salicylates and mucilage
  compounds:
  - flavonoid
  - mucilage
  - rutin
  note: Antioxidant, anti-inflammatory and soothing constituents.
  reference_ids:
  - REF-0463
  - REF-1605
  - REF-1606
botanical_description:
  text: Small, low-growing annual or short-lived perennial herb with oval to lance-shaped, scalloped leaves
    and large, leaf-like stipules. The distinctive flowers are tricoloured - purple, yellow and white
    in varying combinations - with five petals, the lower petal often marked with dark veining (a 'face'
    pattern), giving rise to the name 'heartsease'.
  height: 10-30 cm
  habit: Small, low-growing annual or short-lived perennial herb
  leaves: Oval to lance-shaped, scalloped, with large leaf-like stipules
  flowers: Tricoloured (purple, yellow, white), five-petalled, often with dark facial veining on the lower
    petal
  stem: Slender, branching
  root: Slender taproot
  fruit: Small three-valved capsule
  flowering_period: April-September
  reference_ids:
  - REF-0463
  status: verified
habitat:
  text: Grows in grassland, cultivated ground, gardens and waste places on a wide range of soils; native
    to Europe and widely naturalised elsewhere as a common garden and wild plant.
  reference_ids:
  - REF-0463
  status: verified
harvesting:
  text: The flowering aerial parts are cut in summer while in flower and dried in a warm, shaded, airy
    place.
  parts:
  - Aerial parts (flowering herb)
  season: Summer, at flowering
  reference_ids:
  - REF-0463
  status: verified
traditional_uses:
  text: Heartsease has a long European folk history as a soothing remedy for skin conditions such as eczema
    and itching, and as a traditional demulcent and expectorant for coughs and chest complaints; this
    traditional skin-supportive use is now linked to immunomodulatory cyclic peptides (cyclotides) unique
    to the Viola genus.
  reference_ids:
  - REF-0463
  status: verified
preparations:
- name: Infusion
  text: Dried flowering herb infused in hot water, taken internally for cough or used as a cooled compress
    for skin irritation.
  reference_ids:
  - REF-0463
  status: verified
- name: Cream/ointment
  text: Extract formulated into a topical cream or ointment for eczema and irritated skin.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried flowering herb.
  status: draft
dosage:
- name: Infusion
  text: The EU herbal monograph gives, for oral use in adults and elderly, 3 g of the comminuted herb
    as an infusion 1-3 times daily. For cutaneous use, 5-20 g/L as an infusion applied as a wet dressing
    2-3 times daily, or 5-10 g/L as a bath additive (1 litre of infusion per bath). Contraindicated in
    hypersensitivity to salicylates, and cutaneously on open wounds or large areas of damaged skin. Oral
    use not recommended under 18 years. Educational reference only, not a prescription.
  reference_ids:
  - REF-3074
  status: verified
actions:
- action: anti-inflammatory
  note: Anti-inflammatory / immunomodulatory for chronic skin conditions - eczema, psoriasis, itching
    and scabs (traditional, supported by cyclotide research) - cyclotide-enriched V. tricolor preparations
    suppress T-cell proliferation and pro-inflammatory cytokine secretion in vitro; Soothes irritated
    skin (demulcent and anti-inflammatory)
  reference_ids:
