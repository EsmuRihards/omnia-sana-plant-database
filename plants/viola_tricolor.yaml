common_names:
- Heartsease
- Wild pansy
- Johnny-jump-up
- Love-in-idleness
scientific_name: Viola tricolor
family: Violaceae
parts_used:
- name: Aerial parts (flowering herb)
  medicinal_actions:
  - action: Anti-inflammatory / immunomodulatory for chronic skin conditions - eczema, psoriasis, itching
      and scabs (traditional, supported by cyclotide research) - cyclotide-enriched V. tricolor preparations
      suppress T-cell proliferation and pro-inflammatory cytokine secretion in vitro
    reference_ids:
    - REF-0463
    - REF-0617
    status: verified
  - action: Soothes irritated skin (demulcent and anti-inflammatory)
    reference_ids:
    - REF-0463
    status: verified
  - action: Traditional demulcent / expectorant for cough, bronchitis and chest inflammation
    reference_ids:
    - REF-0463
    status: needs-review
  - action: Cytotoxic / antiproliferative against cancer cell lines in vitro (cyclotides vitri A, varv
      A and varv E)
    reference_ids:
    - REF-0556
    status: needs-review
constituents:
- name: Cyclotides (cyclic plant peptides)
  note: Bioactive cyclic peptides shown to suppress over-active immune (T-cell) responses - the rationale
    for use in inflammatory skin disease; the cytotoxic cyclotides vitri A, varv A and varv E have been
    isolated from V. tricolor. Cyclotide-enriched preparations (including hot-water decoctions) reduce
    T-cell proliferation and macrophage cytokine output in vitro, of interest for inflammatory bowel disease.
  reference_ids:
  - REF-0463
  - REF-0556
  - REF-0617
- name: Flavonoids (rutin, violanthin), salicylates and mucilage
  note: Antioxidant, anti-inflammatory and soothing constituents.
  reference_ids:
  - REF-0463
contraindications:
- note: Regarded as safe in customary traditional use; because the extract suppresses immune-cell activity,
    there is a theoretical caution when taking immunosuppressant medicines.
  reference_ids:
  - REF-0463
  status: verified
- note: Contains salicylates, so use caution if you are salicylate-sensitive; safety in pregnancy and
    breastfeeding is not established.
  reference_ids:
  - REF-0463
  status: needs-review
internal_notes: Enriched 2026-06-12 from scientific literature (Journal of Ethnopharmacology study identifying
  immunosuppressive cyclotides). Further enriched 2026-06-13 with a PubMed study isolating cytotoxic cyclotides
  (vitri A, varv A, varv E) from V. tricolor (REF-0556, Svangard et al. 2004); a new in-vitro cytotoxic
  action was added. Originally a skeleton imported from the omniasana.bio Symptom-to-Plant Lookup tool
  (eczema, skin-irritation, cough); associations retained and now part-mapped and cited. Further enriched
  2026-06-14 with a PubMed-sourced study of cyclotide-enriched V. tricolor preparations that suppress T-cell
  proliferation and macrophage cytokine secretion in vitro (REF-0617), reinforcing the immunomodulatory action.
