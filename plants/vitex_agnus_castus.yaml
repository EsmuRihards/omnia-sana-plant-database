  - REF-3117
  status: verified
contraindications:
- note: Reported adverse events are mild and reversible (nausea, headache, gastrointestinal upset, menstrual
    changes, acne, itching or rash).
  severity: info
  reference_ids:
  - REF-0434
  status: verified
- note: Because it acts on dopamine and the hormonal axis, avoid alongside dopamine-antagonist (antipsychotic)
    or dopamine-agonist drugs and use caution with hormonal medicines (oral contraceptives, HRT) and hormone-sensitive
    conditions.
  severity: caution
  reference_ids:
  - REF-0434
  status: verified
- note: Avoid during pregnancy and breastfeeding. A systematic review found only poor-grade evidence
    (theoretical, expert opinion and in vitro) suggesting oestrogenic, progesteronic, uterine-stimulant
    and emmenagogue activity, and expert opinion actively conflicts on whether chastetree increases or
    decreases lactation. The precaution rests on absence of safety data rather than on demonstrated harm.
  severity: caution
  reference_ids:
  - REF-0434
  - REF-3118
  status: verified
