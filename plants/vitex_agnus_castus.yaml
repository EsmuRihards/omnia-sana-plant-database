  - REF-1610
  - REF-2580
  status: needs-review
- condition: pain
  note: Eases cyclical breast pain (mastalgia) and menstrual-cycle complaints including cramping. The
    proposed mechanism is dopaminergic suppression of latent hyperprolactinaemia.
  reference_ids:
  - REF-0433
  - REF-0435
  - REF-1609
  - REF-1610
  - REF-1613
  - REF-3119
  status: verified
- condition: pms
  note: Eases cyclical breast pain (mastalgia) and menstrual-cycle complaints including cramping; Relief
    of premenstrual syndrome (PMS) symptoms
  reference_ids:
  - REF-0433
  - REF-0435
  - REF-1607
  - REF-1608
  - REF-1609
  - REF-1610
  - REF-1611
  - REF-1613
  - REF-2580
