id: vitex-agnus-castus
scientific_name: Vitex agnus-castus
common_names:
- Chasteberry
- Chaste tree
- Monk's pepper
- Agnus castus
family: Lamiaceae
parts_used:
- Fruit (berry)
constituents:
- name: Diterpenes (e.g. rotundifuran, clerodadienols)
  compounds:
  - terpene
  note: Bind dopamine D2 receptors in the pituitary, reducing prolactin release - the key mechanism.
  reference_ids:
  - REF-0435
- name: Flavonoids (casticin, vitexin)
  compounds:
  - flavonoid
  note: Antioxidant constituents of the fruit.
  reference_ids:
  - REF-0433
- name: Iridoid glycosides (agnuside, aucubin)
  compounds:
  - iridoid-glycoside
  - glycoside
  note: Characteristic constituents used in standardisation.
  reference_ids:
  - REF-0434
indications:
- condition: acne
  note: Cycle-related (hormonal) acne (traditional)
  reference_ids:
  - REF-0434
  status: needs-review
- condition: menopause
  reference_ids: []
  status: needs-review
- condition: menstrual-cramps
  reference_ids: []
  status: needs-review
- condition: pain
  note: Eases cyclical breast pain (mastalgia) and menstrual-cycle complaints including cramping
  reference_ids:
  - REF-0433
  - REF-0435
  status: verified
- condition: pms
  note: Eases cyclical breast pain (mastalgia) and menstrual-cycle complaints including cramping; Relief
    of premenstrual syndrome (PMS) symptoms
  reference_ids:
  - REF-0433
  - REF-0435
  status: verified
contraindications:
- note: Reported adverse events are mild and reversible (nausea, headache, gastrointestinal upset, menstrual
    changes, acne, itching or rash).
  severity: info
  reference_ids:
  - REF-0434
  status: verified
- note: Because it acts on dopamine and the hormonal axis, avoid alongside dopamine-antagonist (antipsychotic)
    or dopamine-agonist drugs and use caution with hormonal medicines (oral contraceptives, HRT) and hormone-sensitive
    conditions.
  severity: caution
  reference_ids:
  - REF-0434
  status: verified
- note: Avoid during pregnancy and breastfeeding.
  severity: caution
  reference_ids:
  - REF-0434
  status: verified
provenance: website+symptom-tool
status: verified
