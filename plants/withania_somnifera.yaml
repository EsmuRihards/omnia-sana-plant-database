  status: verified
- note: Duke (2002) classifies ashwagandha activities primarily at the experimental level (score 1), with
    adaptogenic, sedative, immunostimulant, and anti-inflammatory actions demonstrated in animal and in
    vitro models. Root preparations are used at 2–3 g powdered root three times daily, or 150–300 mg of
    standardized extract. Importantly, the plant has documented abortifacient and antifertility properties
    in animal studies, and its use should be avoided during pregnancy. It may potentiate the effects of
    barbiturates and sedatives (Duke, 2002).
