id: withania-somnifera
scientific_name: Withania somnifera
common_names:
- Ashwagandha
- Indian Ginseng
- Winter Cherry
- Poison Gooseberry
- Ajagandha
- Kanaje Hindi
- Asgand
family: Solanaceae
wp_post_id: 149
parts_used:
- Leaf
- Root
botanical_description:
  text: Erect, branching perennial shrub with soft, downy, oval to lance-shaped leaves. Small, inconspicuous,
    greenish-yellow bell-shaped flowers are borne in the leaf axils, followed by a small orange-red berry
    enclosed in a papery, lantern-like calyx, giving rise to the name 'winter cherry'.
  height: 0.3-1.5 m
  habit: Erect, branching perennial shrub
  leaves: Soft, downy, oval to lance-shaped
  flowers: Small, inconspicuous, greenish-yellow, bell-shaped
  stem: Erect, branching, downy
  root: Long, thick, tapering, pale brown root (the medicinal part), aromatic with a distinctive horse-like
    smell (the source of the name ashwagandha)
  fruit: Small orange-red berry enclosed in a papery, lantern-like calyx
  flowering_period: Summer to autumn
  reference_ids:
  - REF-2249
  status: verified
habitat:
  text: Native to the drier regions of India, the Middle East and parts of Africa; cultivated in warm,
    semi-arid climates on well-drained soils, notably in central and western India.
  reference_ids:
  - REF-2249
  status: verified
harvesting:
  text: The root is dug in winter from plants around one year old, when withanolide content is highest,
    then cleaned, cut and dried; the leaves are picked through the growing season.
  parts:
  - Leaf
  - Root
  season: Root in winter, from around one-year-old plants; leaf through the growing season
  reference_ids:
  - REF-2249
  status: verified
traditional_uses:
  text: Ashwagandha root is one of the most important rasayana (rejuvenative) tonics of Ayurvedic medicine,
    traditionally used to build strength and vitality, support healthy stress response, and promote restful
    sleep; this traditional adaptogenic reputation is now supported by clinical trials of standardised
    root extract for stress, sleep and physical performance.
  reference_ids:
  - REF-2249
  - REF-2245
  status: verified
preparations:
- name: Standardised extract
  text: Root extract standardised to withanolide content, taken as capsules or tablets; the form used
    in most clinical stress, sleep and performance studies.
  reference_ids:
  - REF-2249
  - REF-2245
  status: verified
- name: Decoction/churna (traditional)
  text: Dried root powder (churna) taken with warm milk or water, or simmered as a decoction, the classic
    Ayurvedic preparation.
  status: draft
- name: Tincture
  text: Alcoholic extract of the dried root.
  status: draft
dosage:
- name: Standardised extract
  text: Clinical trials for stress and sleep commonly use around 300-600 mg of standardised root extract
    daily, in divided doses, over several weeks. Educational reference only, not a prescription.
  reference_ids:
  - REF-2245
  status: draft
constituents:
- name: Withanolides (withaferin A, withanolide A)
  compounds:
  - withanolide
  note: Steroidal lactones considered the principal bioactive compounds, responsible for most of the plant's
    adaptogenic, anti-inflammatory and anticancer research interest.
  reference_ids:
  - REF-2249
- name: Alkaloids (withanine, somniferine)
  compounds:
  - alkaloid
  note: Minor tropane-type alkaloids contributing to the traditional sedative reputation.
  reference_ids:
  - REF-2249
- name: Sitoindosides and saponins
  compounds:
  - saponin
  note: Glycowithanolides linked to adaptogenic and immunomodulatory activity.
  reference_ids:
