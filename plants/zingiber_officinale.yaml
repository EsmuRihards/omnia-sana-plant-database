  - REF-0269
  - REF-0295
  status: verified
- note: Duke (2002) rates ginger as a triple-plus herb (+++) with strong clinical support (score 3) for
    antiemetic activity, including motion sickness, morning sickness, and postoperative nausea, and score
    2 evidence for dyspepsia, diarrhea, and inflammation. Typical doses are 2-4 g dry rhizome per day
    or 500-1000 mg fresh root three times daily; Commission E approves ginger for dyspepsia and motion
    sickness. Ginger has antiplatelet properties and should be used with caution alongside anticoagulant
    medications (Duke, 2002).
  severity: caution
