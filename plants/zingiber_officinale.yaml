- note: 'Pregnancy: Ginger is among the most studied herbal remedies for pregnancy nausea. At doses up
    to 1 g/day, it is generally considered safe and effective for nausea and vomiting of pregnancy (NVP),
    based on multiple RCTs. The EMA monograph supports its use for NVP. Avoid doses >1.5 g/day during
    pregnancy due to theoretical concern about anticoagulant activity. Breastfeeding: generally considered
    safe at food amounts; limited data for medicinal doses (European Medicines Agency, 2012a).'
