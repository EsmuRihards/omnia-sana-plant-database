internal_notes: 'Bulk-ingested from the Omnia Sana book manuscript (Koffetablbok_with_additions.docx).
  reference_ids are plant-level: the book lists parts and actions as flat, unmapped lists, so the full
  set of references cited for this plant is attached to each action rather than split per action. constituents
  not yet extracted — manual enrichment pending. Further enriched 2026-06-14 with six PubMed-sourced studies
  (REF-0634..REF-0639): an RCT and meta-analyses for chemotherapy- and pregnancy-related nausea (REF-0634,
  REF-0635), a primary-dysmenorrhoea pain meta-analysis (REF-0636), two osteoarthritis supplement meta-analyses
  showing reduced pain and inflammatory markers (REF-0637, REF-0638), and a type-2-diabetes meta-analysis
  showing improved HbA1c (REF-0639); gingerol/shogaol constituents added. | 2026-06-15: migrated to entity
  schema (actions->vocab ids, indications split out, constituents linked to compounds).'
