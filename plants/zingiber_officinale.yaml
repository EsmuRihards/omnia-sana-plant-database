contraindications:
- note: Ginger is widely considered safe at culinary and conventional supplemental doses. At high doses
    (>5 g/day), ginger may cause heartburn, acid reflux, mouth irritation, and mild gastrointestinal discomfort.
    Ginger may modestly inhibit platelet aggregation and enhance the effects of anticoagulants (e.g.,
    warfarin) — clinical significance at dietary amounts is low, but caution is warranted with high-dose
    supplementation alongside blood-thinning medications (Shalansky et al., 2007). May lower blood sugar
    — monitor closely if combining with antidiabetic medications.
  severity: caution
  reference_ids:
