id: zingiber-officinale
scientific_name: Zingiber officinale
common_names:
- Ginger
- garden ginger
- common ginger
family: Zingiberaceae
wp_post_id: 153
parts_used:
- Rhizome
- Root
constituents:
- name: Gingerols and shogaols
  compounds:
  - gingerol
  note: The pungent phenolic constituents of the rhizome (notably 6-gingerol, which dehydrates to 6-shogaol
    on drying) responsible for ginger's antiemetic and anti-inflammatory activity; a standardized regimen
    of 84 mg/day gingerols/shogaols was effective against chemotherapy-induced nausea.
  reference_ids:
  - REF-0634
  - REF-0637
botanical_description:
  text: Rhizomatous perennial herb with narrow, lance-shaped leaves arising in two ranks from slender,
    reed-like pseudostems. Pale yellow-green flowers with purple markings are borne in a dense, cone-like
    spike on a separate short stalk arising directly from the rhizome, though ginger rarely flowers in
    cultivation. The branching, knobbly rhizome has a pale yellow interior and a characteristic pungent,
    spicy aroma.
  height: 0.5-1 m
  habit: Rhizomatous perennial herb
  leaves: Narrow, lance-shaped, arising in two ranks from reed-like pseudostems
  flowers: Pale yellow-green with purple markings, in a dense cone-like spike; rarely produced in cultivation
  stem: Slender, reed-like pseudostem formed by overlapping leaf bases
  root: Branching, knobbly rhizome with a pale yellow interior (the medicinal part), plus fibrous roots
  fruit: Rarely sets seed in cultivation; propagated by rhizome division
  flowering_period: Rarely flowers in cultivation
  reference_ids:
  - REF-0634
  status: verified
habitat:
  text: Believed native to tropical Southeast Asia; cultivated extensively throughout the tropics and
    subtropics (India, China, Nigeria, the Caribbean) in warm, humid conditions on well-drained, fertile
    soil.
  status: draft
harvesting:
  text: The rhizome is dug 8-10 months after planting, once the leaves have died back, for mature ('old')
    ginger with the fullest pungency, or earlier for milder young ('green') ginger; cleaned and used fresh
    or dried and ground.
  parts:
  - Rhizome
  - Root
  season: 8-10 months after planting for mature rhizome; earlier for young ginger
  status: draft
traditional_uses:
  text: Ginger rhizome has one of the longest and most widespread medicinal histories of any spice, used
    across Chinese, Ayurvedic and Western herbal traditions as a warming digestive carminative, an antiemetic
    for nausea and motion sickness, and an anti-inflammatory remedy for joint pain; this traditional reputation
    is now supported by an extensive clinical evidence base, particularly for nausea (including pregnancy
    and chemotherapy-related) and osteoarthritis.
  reference_ids:
  - REF-0634
  status: verified
preparations:
- name: Fresh rhizome / infusion
  text: Fresh or dried rhizome grated or sliced and infused in hot water as the classic digestive and
    antiemetic ginger tea.
  status: draft
- name: Standardised extract/powder
  text: Dried rhizome powder or standardised extract, taken as capsules for nausea or joint-pain studies.
  reference_ids:
  - REF-0634
  status: verified
- name: Culinary use
  text: Fresh, dried or crystallised rhizome used extensively as a food spice and flavouring.
  status: draft
dosage:
- name: Standardised extract/powder
  text: Clinical trials for nausea commonly use around 1-1.5 g of dried rhizome powder daily, in divided
    doses (up to 1 g/day in pregnancy); osteoarthritis studies commonly use similar or somewhat higher
    doses. Educational reference only, not a prescription.
  reference_ids:
  - REF-0634
  status: draft
