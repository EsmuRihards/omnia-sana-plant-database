# Omnia Sana — controlled vocabulary: ACTIONS (pharmacological mechanisms)
# Schema: ../schema/action.schema.json
#
# Each free-text action string in plants/*.yaml maps onto one (or more) of these
# ids. A single string may yield several actions AND an indication, e.g.
#   "Antispasmodic for menstrual cramps (relaxes uterine smooth muscle)"
#     -> actions: [antispasmodic]   indications: [menstrual-cramps]
# That per-plant split is applied in the migration's plant-rewrite phase (Phase 5).
# `synonyms` lists the free-text variants that collapse onto each id (also used for
# search). `related_conditions` is the action -> indication bridge.

# ---------------------------------------------------------------- inflammation / cellular
- id: anti-inflammatory
  label: Anti-inflammatory
  category: inflammation
  synonyms: ["antiinflammatory", "anti-inflammatory and antioxidant", "antioxidant and anti-inflammatory", "antiphlogistic", "anti-oedematous and anti-inflammatory"]
  related_conditions: [inflammation, arthritis, skin-irritation]
- id: antioxidant
  label: Antioxidant
  category: cellular
  synonyms: ["free-radical scavenger", "free radical scavenging", "hydroxyl-radical scavenging"]
- id: anticancer
  label: Anticancer (preclinical)
  category: cellular
  synonyms: ["antiproliferative", "cytotoxic", "antineoplastic", "antitumour"]

