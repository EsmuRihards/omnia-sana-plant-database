# Omnia Sana — controlled vocabulary: DANGEROUS PLANTS / FUNGI
# Schema: ../schema/dangerous_plant.schema.json
#
# One entry per toxic plant/fungus a medicinal plant can be realistically mistaken
# for. Canonical toxicology lives here ONCE (DRY); each entry is referenced by id
# from a medicinal plant's dangerous_lookalikes[]. The PAIRWISE "how to tell them
# apart" datum lives on the medicinal-plant record, NOT here.
#
# `editor_notes` is EDITOR-FACING and stripped from public build output (like
# drug_classes' `examples`). `references` anchor each entry's identity + toxicology
# and are filled as the safety literature is gathered.

# ============================================================ Apiaceae killers
- id: conium-maculatum
  label: Poison hemlock
  scientific_name: Conium maculatum
  family: Apiaceae
  kingdom: plant
  synonyms: ["hemlock", "poison parsley", "spotted hemlock", "poison fool's parsley"]
  toxic_principle: Coniine and γ-coniceine (piperidine alkaloids)
  toxicity: Ingestion causes burning of the mouth, salivation, muscle weakness and an ascending paralysis that can stop breathing; a few leaves or seeds can be fatal, and the mind stays clear as paralysis sets in.
  toxicity_category: neurotoxic
  onset: Rapid (30 min–2 h)
  default_severity: fatal
  references:
  - REF-2610
  - REF-2611

- id: cicuta-virosa
  label: Cowbane (European water hemlock)
  scientific_name: Cicuta virosa
  family: Apiaceae
  kingdom: plant
  synonyms: ["water hemlock", "northern water hemlock", "mackenzie's water hemlock"]
  toxic_principle: Cicutoxin (a C17 polyacetylene convulsant)
  toxicity: One of the most violently poisonous temperate plants; the chambered, sweet-smelling rootstock causes rapid onset of severe, recurrent seizures and can be fatal within hours.
  toxicity_category: neurotoxic
  onset: Very rapid (15–60 min)
  default_severity: fatal
  references:
  - REF-2615

- id: oenanthe-crocata
  label: Hemlock water-dropwort
  scientific_name: Oenanthe crocata
  family: Apiaceae
  kingdom: plant
  synonyms: ["dead man's fingers", "water dropwort", "five-fingered death"]
  toxic_principle: Oenanthotoxin (a C17 polyacetylene convulsant, akin to cicutoxin)
  toxicity: Among the most poisonous plants in Britain; the fleshy, parsnip-like roots ("dead man's fingers") are intensely toxic and cause vomiting, violent convulsions and death; often smells pleasant, which disarms foragers.
  toxicity_category: neurotoxic
  onset: Very rapid (30 min–3 h)
  default_severity: fatal
  references:
  - REF-2612

- id: aethusa-cynapium
  label: Fool's parsley
  scientific_name: Aethusa cynapium
  family: Apiaceae
  kingdom: plant
  synonyms: ["lesser hemlock", "dog poison", "fool's cicely"]
  toxic_principle: Polyacetylenes (aethusin, aethusanol) and related compounds
  toxicity: A hemlock relative that mimics parsley and chervil; ingestion has caused burning of the mouth, nausea, vomiting and neurological symptoms, particularly in children — treat any parsley look-alike with a foul or garlicky smell as suspect.
  toxicity_category: neurotoxic
  onset: Rapid (under a few hours)
  default_severity: dangerous
  references:
  - REF-2613
  - REF-2614
  editor_notes: Historic toxicity is real but its lethality is milder and more debated than Conium; keep severity 'dangerous' unless a case-report basis supports 'fatal'.

- id: heracleum-mantegazzianum
  label: Giant hogweed
  scientific_name: Heracleum mantegazzianum
  family: Apiaceae
  kingdom: plant
  synonyms: ["giant cow parsnip", "cartwheel flower"]
  toxic_principle: Furanocoumarins (furocoumarins, e.g. psoralens)
  toxicity: The clear, watery sap makes skin hypersensitive to sunlight; contact followed by sun exposure causes severe blistering burns (phytophotodermatitis) and long-lasting scars, and sap in the eye can damage sight. Not a poison by ingestion but a serious contact hazard for anyone gathering tall umbellifers.
  toxicity_category: dermatotoxic
  onset: Skin reaction develops 15 min–2 h after sun exposure; blisters peak 2–3 days later
  default_severity: irritant
  references:
  - REF-2616

# ============================================================ Cardiac / alkaloid killers
- id: veratrum-album
  label: White hellebore (false hellebore)
  scientific_name: Veratrum album
  family: Melanthiaceae
  kingdom: plant
  synonyms: ["false helleborine", "white veratrum", "European white hellebore"]
  toxic_principle: Steroidal alkaloids (protoveratrines, veratridine, jervine)
  toxicity: The classic and repeatedly fatal mix-up for foragers gathering yellow gentian; the root and early rosette cause vomiting, a dangerously slow heartbeat and collapse in blood pressure within hours.
  toxicity_category: cardiotoxic
  onset: Rapid (30 min–4 h)
  default_severity: fatal
  references:
  - REF-2599
  - REF-2600
  - REF-2601
  - REF-2602

- id: digitalis-purpurea
  label: Foxglove
  scientific_name: Digitalis purpurea
  family: Plantaginaceae
  kingdom: plant
  synonyms: ["purple foxglove", "lady's glove", "fairy gloves"]
  toxic_principle: Cardiac glycosides (digitoxin, digoxin-like glycosides)
  toxicity: All parts contain heart poisons; the non-flowering leaf rosette is easily mistaken for comfrey, mullein or borage, and ingestion causes nausea, disturbed colour vision and dangerous, potentially fatal heart-rhythm disturbances.
  toxicity_category: cardiotoxic
  onset: Delayed (several hours)
  default_severity: fatal
  references:
  - REF-2603
  - REF-2604
  - REF-2605
  - REF-2606
  - REF-2607

- id: convallaria-majalis
  label: Lily-of-the-valley
  scientific_name: Convallaria majalis
  family: Asparagaceae
  kingdom: plant
  synonyms: ["may lily", "our lady's tears"]
  toxic_principle: Cardiac glycosides (convallatoxin, convalloside)
  toxicity: Whole plant is poisonous; its broad green spring leaves are notoriously confused with wild garlic (ramsons) before flowering, and ingestion can cause vomiting and serious, potentially fatal heart-rhythm disturbances.
  toxicity_category: cardiotoxic
  onset: Delayed (1–several hours)
  default_severity: fatal
  references:
  - REF-2621
  - REF-2622
  - REF-2623

- id: colchicum-autumnale
  label: Autumn crocus (meadow saffron)
  scientific_name: Colchicum autumnale
  family: Colchicaceae
  kingdom: plant
  synonyms: ["meadow saffron", "naked lady", "autumn crocus"]
  toxic_principle: Colchicine (an antimitotic alkaloid)
  toxicity: There is no antidote; the strap-shaped spring leaves are mistaken for wild garlic and the corm/flower for saffron. Poisoning is deceptively delayed (2–12 h) then causes catastrophic vomiting, organ failure and death.
  toxicity_category: cytotoxic
  onset: Deceptively delayed (2–12 h) then multi-organ failure
  default_severity: fatal
  references:
  - REF-2617
  - REF-2618
  - REF-2619
  - REF-2620

- id: arum-maculatum
  label: Lords-and-ladies (cuckoo-pint)
  scientific_name: Arum maculatum
  family: Araceae
  kingdom: plant
  synonyms: ["cuckoo-pint", "wild arum", "jack-in-the-pulpit", "snakeshead"]
  toxic_principle: Insoluble calcium-oxalate raphides (needle crystals)
  toxicity: Biting into any part fires microscopic needle crystals into the mouth and throat, causing intense burning, swelling and blistering; severe swelling can threaten the airway. The arrow-shaped spring leaves grow among ramsons and other foraged greens.
  toxicity_category: gastrointestinal
  onset: Immediate (on contact/chewing)
  default_severity: dangerous
  references:
  - REF-2623

# ============================================================ Elder / chickweed confusables
- id: sambucus-ebulus
  label: Dwarf elder (danewort)
  scientific_name: Sambucus ebulus
  family: Viburnaceae
  kingdom: plant
  synonyms: ["danewort", "dane weed", "walewort", "dwarf elderberry"]
  toxic_principle: Cyanogenic glycosides and ebulin (a ribosome-inactivating lectin)
  toxicity: A herbaceous elder relative whose berries and foliage are markedly more toxic than true elder; ingestion causes severe nausea, vomiting and diarrhoea. Its flat-topped white flower clusters and dark berries are easily confused with elder.
  toxicity_category: gastrointestinal
  onset: Rapid (30 min–a few hours)
  default_severity: dangerous
  references:
  - REF-2633
  - REF-2634
  - REF-2635

- id: lysimachia-arvensis
  label: Scarlet pimpernel
  scientific_name: Lysimachia arvensis
  family: Primulaceae
  kingdom: plant
  synonyms: ["Anagallis arvensis", "poor man's weatherglass", "red pimpernel", "shepherd's weatherglass"]
  toxic_principle: Triterpenoid saponins (e.g. anagalligenin/cyclamin-type)
  toxicity: A low sprawling weed of the same habitats as chickweed; the plant is bitter and mildly toxic (saponins), causing gastrointestinal upset, and has caused poisoning in grazing animals. Its square-ish stems and orange-red flowers distinguish it.
  toxicity_category: gastrointestinal
  onset: Variable
  default_severity: irritant
  references:
  - REF-2640
  - REF-2641

- id: euphorbia-peplus
  label: Petty spurge
  scientific_name: Euphorbia peplus
  family: Euphorbiaceae
  kingdom: plant
  synonyms: ["radium weed", "cancer weed", "milkweed (spurge)"]
  toxic_principle: Diterpene esters (ingenol mebutate) in the milky latex
  toxicity: Every part exudes a caustic milky latex that severely irritates and blisters skin and, in the eye, can cause serious injury; ingestion burns the mouth and gut. It grows as a weed among low salad greens such as chickweed.
  toxicity_category: dermatotoxic
  onset: Immediate (on contact with latex)
  default_severity: irritant
  references:
  - REF-2636
  - REF-2637
  - REF-2638

# ============================================================ Foraged-fungi killers / confusables
- id: galerina-marginata
  label: Funeral bell (deadly Galerina)
  scientific_name: Galerina marginata
  family: Hymenogastraceae
  kingdom: fungus
  synonyms: ["Galerina autumnalis", "deadly skullcap", "autumn skullcap", "deadly Galerina"]
  toxic_principle: Amatoxins (α-amanitin)
  toxicity: Contains the same liver-destroying amatoxins as the death cap; a few of these small brown mushrooms can kill. Symptoms are deceptively delayed (6–24 h) — vomiting and diarrhoea, apparent recovery, then catastrophic liver failure.
  toxicity_category: cytotoxic
  onset: Delayed (6–24 h; deceptively symptom-free early)
  default_severity: fatal
  references:
  - REF-2624
  - REF-2625
  - REF-2626

- id: omphalotus-olearius
  label: Jack-o'-lantern mushroom
  scientific_name: Omphalotus olearius
  family: Omphalotaceae
  kingdom: fungus
  synonyms: ["Omphalotus illudens", "Omphalotus japonicus", "jack o lantern"]
  toxic_principle: Illudin S and related sesquiterpenes
  toxicity: A clustered orange wood-rotting mushroom with true, sharp-edged gills (that glow faintly in the dark); eating it causes severe vomiting and cramps, though it is rarely fatal. Confused with chanterelles and, when growing on wood, with oyster mushrooms.
  toxicity_category: gastrointestinal
  onset: Rapid (30 min–3 h)
  default_severity: dangerous
  references:
  - REF-2630
  - REF-2631
  - REF-2632

- id: pleurocybella-porrigens
  label: Angel wing
  scientific_name: Pleurocybella porrigens
  family: Marasmiaceae
  kingdom: fungus
  synonyms: ["angel's wing", "angel wing oyster"]
  toxic_principle: An unstable amino-acid toxin (pleurocybellaziridine) affecting the brain
  toxicity: A thin white bracket that grows on conifer wood and is easily taken for an oyster mushroom; linked to an outbreak of fatal brain inflammation (encephalopathy), especially in people with kidney impairment. Now regarded as unsafe to eat.
  toxicity_category: neurotoxic
  onset: Delayed (days to a few weeks in reported cases)
  default_severity: dangerous
  references:
  - REF-2627
  - REF-2628
  - REF-2629

- id: stereum-hirsutum
  label: Hairy curtain crust
  scientific_name: Stereum hirsutum
  family: Stereaceae
  kingdom: fungus
  synonyms: ["false turkey tail", "hairy stereum", "curtain crust"]
  toxic_principle: None established (inedible, not regarded as poisonous)
  toxicity: Not a poison, but a common "false turkey tail" that is confused with turkey tail (Trametes versicolor); it has a smooth to wrinkled underside with NO pores, so it lacks the medicinal properties sought and wastes a forager's effort.
  toxicity_category: mixed
  onset: n/a
  default_severity: caution
  references:
  - REF-2644
  - REF-2645
  - REF-2646
- id: ranunculus-repens
  label: Creeping buttercup
  scientific_name: Ranunculus repens
  family: Ranunculaceae
  kingdom: plant
  synonyms: ["buttercup", "creeping crowfoot", "sitfast"]
  toxic_principle: Protoanemonin, a volatile vesicant lactone released from ranunculin when fresh tissue is crushed or chewed; destroyed on drying.
  toxicity: Fresh sap and leaves are acrid and irritant. Skin contact can cause dermatitis and blistering, and chewing fresh material burns and inflames the mouth and gut (gastroenteritis). Rarely dangerous, because the toxin is destroyed on drying and the acrid, blistering taste discourages swallowing any quantity.
  toxicity_category: mixed
  onset: Minutes to a few hours after contact with or ingestion of fresh material
  default_severity: irritant
  references:
  - REF-2647

- id: prunus-laurocerasus
  label: Cherry laurel
  scientific_name: Prunus laurocerasus
  family: Rosaceae
  kingdom: plant
  synonyms: ["common laurel", "English laurel", "cherry-laurel", "laurel hedge"]
  toxic_principle: Cyanogenic glycosides (prunasin, prulaurasin, amygdalin) in the leaves and seeds; crushing, chewing or cooking releases hydrogen cyanide (HCN) via beta-glucosidase.
  toxicity: The leaves and seeds are cyanogenic. When crushed, chewed or cooked they release hydrogen cyanide, which blocks the body's cells from using oxygen; poisoning can cause headache, dizziness, vomiting, breathlessness and convulsions, and severe cases (especially in children and livestock) can be fatal. The thick glossy leaves closely resemble edible bay/laurel and have been collected in mistake for it.
  toxicity_category: cytotoxic
  onset: Minutes to a few hours after ingesting or chewing crushed leaves
  default_severity: dangerous
  references:
  - REF-2657
  - REF-2658

- id: podostroma-cornu-damae
  label: Poison fire coral
  scientific_name: Podostroma cornu-damae
  family: Hypocreaceae
  kingdom: fungus
  synonyms: ["Trichoderma cornu-damae", "poison fire coral", "fire coral fungus"]
  toxic_principle: Macrocyclic trichothecene mycotoxins (satratoxin H and related satratoxins, roridins, verrucarol) that inhibit protein synthesis and cell division.
  toxicity: One of the few deadly-poisonous fungi. Its bright red, antler- or coral-like fruit bodies contain macrocyclic trichothecenes; even a small amount taken as food or tea causes early gastrointestinal upset followed by delayed multi-organ failure - pancytopenia, skin desquamation, liver and kidney failure and disseminated intravascular coagulation - and has repeatedly caused death. In its immature stage it resembles the medicinal fungi Ganoderma lucidum (reishi/lingzhi) and Cordyceps militaris and has been collected in mistake for them. Occurs in East Asia (Korea, Japan, China) and has been reported spreading elsewhere.
  toxicity_category: cytotoxic
  onset: Early gastrointestinal symptoms within hours; delayed pancytopenia and organ failure over days
  default_severity: fatal
  references:
  - REF-2659
  - REF-2660

- id: taxus-baccata
  label: Yew
  scientific_name: Taxus baccata
  family: Taxaceae
  kingdom: plant
  synonyms: ["English yew", "common yew", "European yew"]
  toxic_principle: Cardiotoxic taxine alkaloids (taxine A and B) present in all parts except the fleshy red aril, plus the marker 3,5-dimethoxyphenol; taxines block cardiac sodium and calcium channels.
  toxicity: One of the most poisonous trees in Europe. All parts except the red flesh of the berry-like aril contain taxine alkaloids; ingestion of even a few leaves can cause vomiting, dizziness, dilated pupils, then life-threatening heart-rhythm disturbances, seizures and sudden cardiac arrest, and has caused many deaths. There is no specific antidote. The flat evergreen needles and red berry-like arils are mistaken for edible conifers such as pine.
  toxicity_category: cardiotoxic
  onset: Symptoms within 30 minutes to a few hours; cardiac collapse can be rapid
  default_severity: fatal
  references:
  - REF-2662
  - REF-2663

- id: juniperus-sabina
  label: Savin juniper
  scientific_name: Juniperus sabina
  family: Cupressaceae
  kingdom: plant
  synonyms: ["savin", "savine", "sabin"]
  toxic_principle: Podophyllotoxin (an antimitotic cell poison) plus the essential-oil terpenes sabinene and sabinol; sabinol is a uterine stimulant (abortifacient).
  toxicity: A low, spreading ornamental juniper that is genuinely poisonous, unlike edible common juniper. Its foliage and shoots contain podophyllotoxin and irritant terpenes; ingestion causes violent gastrointestinal irritation, kidney damage and, taken historically as an abortifacient, severe poisoning and deaths. Modern guidance advises against any internal use. It is widely planted in gardens and parks, so 'juniper berries' picked from landscaping can be this toxic species.
  toxicity_category: mixed
  onset: Gastrointestinal and systemic symptoms within hours of ingestion
  default_severity: dangerous
  references:
  - REF-2665
  - REF-2666

- id: iris-pseudacorus
  label: Yellow flag iris
  scientific_name: Iris pseudacorus
  family: Iridaceae
  kingdom: plant
  synonyms: ["yellow flag", "yellow iris", "water flag"]
  toxic_principle: Pentacyclic terpenoids (zeorin, missourin, missouriensin) and irritant resinous glycosides, concentrated in the rhizome.
  toxicity: A low-severity poison of wet ground. All parts, especially the rhizome, cause salivation, vomiting, drooling and diarrhoea if eaten, and the sap can irritate the skin. Its erect sword-shaped leaves are odourless and closely resemble those of aromatic sweet flag, whose prized rhizome it is confused with; the scientific name pseudacorus means 'false sweet-flag'.
  toxicity_category: gastrointestinal
  onset: Salivation and gastrointestinal symptoms within hours of ingestion
  default_severity: irritant
  references:
  - REF-2668

- id: agave-americana
  label: Agave
  scientific_name: Agave americana
  family: Asparagaceae
  kingdom: plant
  synonyms: ["century plant", "American aloe", "maguey"]
  toxic_principle: Calcium oxalate raphides, steroidal saponins and acrid oils in the sap.
  toxicity: A large rosette succulent whose sap is a skin and mucous-membrane irritant, not a soothing gel. Cutaneous exposure causes painful irritant contact dermatitis (with blistering and, in reported cases, purpura); contact with the mouth or gut burns and inflames. It forms a rosette very like an aloe and is easily mistaken for it, but no part is a safe aloe substitute.
  toxicity_category: dermatotoxic
  onset: Burning and dermatitis within minutes to hours of skin or mucous-membrane contact
  default_severity: irritant
  references:
  - REF-2669
  - REF-2670

- id: atropa-belladonna
  label: Deadly nightshade
  scientific_name: Atropa belladonna
  family: Solanaceae
  kingdom: plant
  synonyms: ["belladonna", "deadly nightshade", "banewort"]
  toxic_principle: Tropane alkaloids - atropine, hyoscyamine and scopolamine - which block muscarinic acetylcholine receptors (anticholinergic).
  toxicity: One of the most poisonous plants in Europe. All parts, especially the roots and the shiny black berries, contain tropane alkaloids; poisoning causes dry flushed skin, widely dilated pupils, blurred vision, fever, urinary retention, a racing heartbeat, agitation, hallucinations, delirium, seizures and can be fatal - a few berries can kill a child. The root resembles burdock and other edible roots, and the berries are mistaken for cherries or other dark berries.
  toxicity_category: neurotoxic
  onset: Anticholinergic symptoms within 30 minutes to a few hours; effects may last for days
  default_severity: fatal
  references:
  - REF-2673
  - REF-2675

- id: equisetum-palustre
  label: Marsh horsetail
  scientific_name: Equisetum palustre
  family: Equisetaceae
  kingdom: plant
  synonyms: ["marsh horsetail"]
  toxic_principle: The piperidine alkaloids palustrine and palustridiene, plus thiaminase (which destroys vitamin B1); alkaloid levels are highest in early growth.
  toxicity: One of the most poisonous plants of wet grasslands. It contains the alkaloids palustrine and palustridiene together with high thiaminase activity; it is a well-known cause of livestock poisoning and should not be used in herbal teas. It closely resembles the medicinal field horsetail, with which it is confused and which it can adulterate.
  toxicity_category: neurotoxic
  onset: Cumulative with repeated ingestion (thiamine deficiency and alkaloid effects)
  default_severity: dangerous
  references:
  - REF-2676
  - REF-2677

- id: teucrium-chamaedrys
  label: Germander
  scientific_name: Teucrium chamaedrys
  family: Lamiaceae
  kingdom: plant
  synonyms: ["wall germander", "American germander", "Teucrium canadense"]
  toxic_principle: Hepatotoxic furano neo-clerodane diterpenoids, characteristic markers of the Teucrium genus.
  toxicity: Germander species contain neo-clerodane diterpenoids that damage the liver; germander preparations have caused numerous cases of acute hepatitis, some progressing to liver failure and death. American and European germander are documented adulterants of skullcap, which has given 'skullcap' products an undeserved reputation for liver toxicity.
  toxicity_category: hepatotoxic
  onset: Liver injury over weeks to months of repeated use
  default_severity: dangerous
  references:
  - REF-2680
  - REF-2681

- id: actaea-pachypoda
  label: Baneberry
  scientific_name: Actaea pachypoda
  family: Ranunculaceae
  kingdom: plant
  synonyms: ["doll's eyes", "white baneberry", "red baneberry", "Actaea rubra"]
  toxic_principle: An acrid irritant glycoside (protoanemonin-type) in all parts, including the rhizome and the white or red berries.
  toxicity: All parts are toxic. Ingestion causes intense burning of the mouth and throat, severe vomiting and diarrhoea (gastroenteritis), dizziness and, in serious cases, seizures; red baneberry poisoning can be fatal, especially in children. Its woodland foliage and rhizome closely resemble black cohosh, with which it is confused and mixed during harvesting.
  toxicity_category: gastrointestinal
  onset: Burning and gastrointestinal symptoms soon after ingestion
  default_severity: dangerous
  references:
  - REF-2682
  - REF-2683
