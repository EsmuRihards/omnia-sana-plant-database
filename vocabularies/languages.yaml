# Controlled vocabulary of languages in scope for the Multilingual Plant-Name Dictionary.
# This IS the canonical, version-controlled language list — the pipeline harvests only
# `enabled` languages and the front-end shows only these.
#
# Fields:
#   code     ISO 639-1 (2-letter) — used for hreflang, UI, URLs, and as the key in names/<id>.yaml.
#   iso3     ISO 639-3 (3-letter) — GBIF's vernacularNames `language` field uses this form.
#   iso3_alt other 3-letter forms GBIF/other sources may emit (639-2/B or macrolanguage variants).
#   name_en  English name of the language.
#   endonym  the language's own name for itself.
#   script   primary writing system (drives the optional `romanization` field for non-Latin names).
#   tier     eu-official | non-eu-major.
#   enabled  whether the pipeline harvests + the UI renders this language.
#
# ── 24 official EU languages ────────────────────────────────────────────────
- code: bg
  iso3: bul
  name_en: Bulgarian
  endonym: Български
  script: Cyrillic
  tier: eu-official
  enabled: true
